## Rulebook Draft — App Edition

---

# Chapter 1: What is URFS?

URFS is a miniatures wargame where players field teams of giant piloted Robots equipped with science fiction weapons and gear. Unlike traditional wargames where you pick units from a roster, every Robot in URFS is custom-built from Components loaded with Modules. The result is a game where no two Robots are alike — even when using the same physical model.

URFS is miniatures-first: you measure your model at its longest dimension and that measurement — the Robot's Silhouette — determines its base stat and build limits. Anything works as a model: Gunpla, Transformers, 3D prints, action figures, other wargame minis. A LEGO minifigure can fight a six-foot Mecha Godzilla if that's the battle you want.

The game is designed to work with the URFS companion app, which handles Robot construction, stat tracking, and combat bookkeeping. This rulebook teaches you the rules of play; the app handles the math.

URFS can simulate any giant robot setting: the lumbering firefights of Battletech, the acrobatic dogfights of Macross, the shonen battles of G Gundam, or wars between intelligent Robots like Transformers. It can also be played setting-agnostic — pit your favorite Megazord against Mazinger Z if you want.

## How to Play

URFS is played on any table the players agree on, with terrain and obstacles placed by agreement. Players need:

- Robot models (any kind)
- Six-sided dice (a good handful)
- A measuring tool (tape measure, ruler)
- The URFS companion app

Players agree on a Build Point (BP) total for the game. Suggested levels:

| BP Total | Scale |
|----------|-------|
| 600 | One-on-one or low-powered Robots |
| 1200 | Well-equipped grunt squads |
| 2000 | High-powered squads or one massive Robot |

Players construct forces up to the agreed BP total using the app's Robot builder. The player with the lower point total is the **Assaulting Player** and begins with Priority. The player with the higher total is the **Entrenched Player**. If both forces are the same BP, determine the Assaulting Player with a die roll.

The Entrenched Player places Robots first, alternating placement on opposite table edges. Deployment proceeds one Robot at a time, strictly alternating: the Entrenched Player places one Robot, then the Assaulting Player places one, and so on until all Robots are deployed. Each Robot is placed on its owner's table edge — the two players each claim one of the two long edges of the table (or the two short edges, by mutual agreement before deployment begins). By agreement, players may increase the distance from the edge of the table for deployment as they decide. For games with more than two players on more than two different sides, please refer to the scenario chapter for multiplayer rules.

A player wins by disabling all enemy Robots or achieving the scenario objective. Robots can be disabled by destroying vital Components, knocking Pilots unconscious, or forcing Emergency Shutdown.

**A note on Priority:** URFS uses a flowing Priority system instead of alternating turns. The Assaulting Player holds Priority at the start of the game — this is always the lower-BP force. Priority passes mid-round based on what happens in play; see Chapter 4 for the full Priority rules.
# Chapter 2: Core Concepts

## Scale Units

URFS is scale-agnostic. All distances are measured in **Scale Units (SU)**, which can be any unit of measurement players agree on — inches, centimeters, or any custom unit. The game works the same at any scale.

## Silhouette

A Robot's **Silhouette** is its size in Scale Units, determined by measuring the model. Silhouette is the foundation stat — it determines stat maximums, strain thresholds, melee reach, movement scaling in flight, and more. Bigger Robots are more powerful but also bigger targets.

Terrain also has a Silhouette, determined by the size of the terrain piece.

During construction, half-sizes may be rounded up or down (a 5.5" model can be Sil 5 or Sil 6).

## Hits

A **Hit** in URFS is a 5 or 6 on a d6, unless otherwise specified. When a rule says "roll X dice," count the 5s and 6s as Hits.

## The Facing Die

Every Robot has a **Facing Die** — a standard d6 (opposite faces sum to 7) placed near the model with the 1-pip facing forward. The 1-pip always indicates the Robot's front. The die serves double duty: the 1-pip tracks facing direction, and the **top face** indicates Robot status. Rotate the die around the 1–6 axis to change status without losing facing.

| Top Pip | Status |
|---------|--------|
| **2** | **Standing** — Normal operating state |
| **3** | **Crouched** — Half Silhouette for enemy Ranged Attacks |
| **4** | **Down** — Robot is prone |
| **5** | **Flying** — Robot is airborne (place Altitude counter nearby) |
| **6** | **Shutdown** — Robot is offline (2-pip now indicates forward facing) |

**Facing Die Placement:** The Facing Die is placed directly in front of the Robot model, within a Scale Unit. It should not be placed on the Robot's base, or between its legs if it is baseless; this keeps Facing Die placement consistent across all models.

**Shutdown facing clarification:** When the top face is 6 (Shutdown), the 1-pip is on a horizontal face and no longer useful as a forward indicator. Instead, the **2-pip face** indicates the Robot's forward direction — it will now be on one of the four side faces. Because opposite faces sum to 7, the 1-pip (opposite the 6) is face-down when Shutdown, so the 2-pip (opposite the 5) becomes the natural fallback facing. Rotate the die to place the 2-pip toward the Robot's front before shutting down, or adjust it as the Robot shuts down.

## Lines of Fire

To determine if one Robot can target another:

1. Draw a line from the center of each Robot model to the other. If this line passes through terrain or obstacles, those may block or modify the shot (see Terrain).
2. Draw a **Targeting Line** from the attacker's Facing Die to the defender's Facing Die. This determines which Components are on a targetable Facing.

Lines of Fire have no height consideration. All targeting is calculated from a top-down perspective. Any terrain an overhead line would cross is still considered. This is a deliberate simplification — Robots are large enough that battlefield geometry is best resolved from above. Terrain matters for cover and obstruction, not line-of-sight trigonometry.

## Components

Robots are built from **Components**: Arms, Legs, Heads, a Core (chest/torso), and Utility Components. Each Component is attached to a Facing and filled with Modules that provide game effects. Components are either **Frame** (Core, structural Arms, structural Legs, structural Heads) or **Non-Frame** (Utility Components, Utility Arms/Legs/Heads). Components that are Frame-integral get a save against damage, and Components that are non-Frame are simply destroyed when they take any damage. Both can have Armor modules installed, which effectively give them an HP bar before destruction becomes possible. For both frame and non-frame Components, destroying them removes their Modules and any attached equipment from play (excepting manipulator-held equipment).

The Core is special — it's the central Component that other Components attach to. Non-Core Components are always dependent on other Components (an Arm attached to a Utility shoulder piece, for example), and all Components ultimately depend upon the Core. If a Robot's Core is destroyed, that Robot is destroyed.

Any Component that depends on a Non-Frame Component must also be Non-Frame, but Non-Frame Components can depend on Frame Components.


## Facings

Components also have **Facings**, which correlate to the Facing Die. The Core has all the facings, and Components must be attached to it on one of its six Facings. Any Component dependent on a non-core Component inherits its parent Component's Facing(s). 

Weapons and Equipment also inherit facings from the Components they are attached to, and all sockets on a Core are required to have a specific Facing when added during build. When a Robot attacks with a Weapon, it can only draw lines of fire from the Facings that weapon has available.

### Head Shared Facings

When two Arms each share at least one Facing with the same Head, those Arms gain **coordinated facings** through that Head — they effectively share the union of the facings each Arm has in common with the Head. The Head acts as a sensor / targeting coordination hub between the two Arms.

**Example:** Arm A is facing FRONT and RIGHT, Arm B is facing FRONT and LEFT, and a Head is facing FRONT, LEFT, and RIGHT. The Head shares FRONT+RIGHT with Arm A and FRONT+LEFT with Arm B, so through the Head both Arms can fire from/act from FRONT, LEFT, and RIGHT.

Coordination requires **a partner Arm** — a lone Arm sharing facings with a Head but having no other Arm also touching that Head gains no bonus facings. Multiple Heads on the same robot can each create independent coordination pairings. If the partner arm is destroyed, the remaining arm retains its shared facings[[NOTE TO AI: This is a rules change, please keep note of it as we will have to surface it to the app.]]

## Modules

**Modules** are installed in Components during construction and provide all of a Robot's capabilities: boosters, weapons sockets, armor, shield generators, sensors, manipulators, and more. The full Module list is maintained in the companion app. Different Components have different Module Slot counts:

| Component | Module Slots |
|---|---|
| Head | 6 |
| Arm (each) | 4 |
| Leg (each) | 4 |
| Core | 8 |
| Utility | 8 |

Non-Frame Components have the same Module Slot counts as their Frame counterparts.

## Equipment and Weapons

**Equipment** covers everything a Robot has installed internally or externally, which can be changed out — weapons, shields, tools, and other devices. Equipment is defined by its Silhouette and Keywords. A piece of Equipment can have up to **3 x its Silhouette** in Keywords.

**Weapons** are Equipment with the Melee or Ranged keyword. They are used to attack other Robots.

Equipment costs BP equal to its number of Keywords multiplied by its Silhouette. Equipment weighs its Silhouette unless modified by Keywords. Equipment has a default Armor of 5 and is immune to Burst weapon damage.

Equipment attaches to Robots via Sockets (internal or external mounts) or can be Grabbed by Manipulators. All Equipment is assumed to have a handle unless it has the Mount Point keyword.

**Equipment Silhouette cap** — A piece of Equipment may have a Silhouette up to **2× the wielding Robot's Silhouette**. A Sil 4 Robot may equip weapons up to Sil 8; a Sil 9 weapon is too large for it to wield.

---

## Frame Stats

Every Robot has three frame stats set during construction. They appear throughout the combat rules — this section defines them once for reference.

### [Frame Strength]

[**Frame Strength** is a robot-wide numeric stat with a limit of ≤ 5 × Silhouette (minimum 1). It represents the structural and muscular capability of the robot's frame. Frame Strength is used in melee damage, throw range, and Max Load calculations:

- **Melee damage**: Weapon Damage + (½ × Frame Strength × arms wielding the weapon)
- **Throw range**: Frame Strength × participating arms (minus thrown object weight)
- **Max Load**: Frame Strength × count of BOTTOM-facing Components (Core counts as BOTTOM)

Frame Strength is applied once per qualifying arm in melee damage and throw range — it is not a per-component stat. See Chapter 6 for arm participation rules on throws and two-handed+ melee.]

### [Frame Durability]

**Frame Durability (FD)** is a robot-wide numeric stat with a limit of 3 x Silhouette. It is the number of d6 rolled when a Frame Component makes a **Frame Save**. Higher Frame Durability gives more chances to shrug off damage after Armor is depleted. Frame Durability is set during construction and affects the robot's BP cost.

### [Frame Material]

[**Frame Material (FM)** is a robot-wide integer in the range **1–4**. It sets the hit threshold for Frame Saves:

| Frame Material | Frame Save threshold (d6) |
|:--------------:|:-------------------------:|
| 1 | 6+ |
| 2 | 5+ |
| 3 | 4+ |
| 4 | 3+ |

Formula: **Frame Save threshold = 7 − Frame Material**.

When a Frame Component's Armor is depleted by an attack, roll **Frame Durability d6**: each die that meets or exceeds the threshold counts as a save hit. Reduce any incoming damage (that has exceeded or bypassed Armor) by the number of save hits. If there is any damage remaining, the Component is destroyed.

Higher FM = easier saves but higher BP cost (BP formula includes FD × Sil × FM). Frame Material 4 represents advanced alloys or reactive composites; Frame Material 1 represents scavenged or minimal-budget frames.]

---

## Robot Resources

Robots have two battle resources that must be tracked alongside their structural stats: **Power** and **Fuel**. Both are derived from installed modules.

### [Power]

[**Power** is the net electrical budget of the robot. It is the sum of all module power ratings — generator modules contribute positive values, active systems (boosters, weapons, shields, sensors) contribute negative values. Power is computed at the start of the battle and updated whenever a module is toggled on or off or a Component is destroyed.

- **Positive or zero Power**: the robot operates normally.
- **Negative Power**: the robot is drawing more than its generators supply. When any action would be resolved with the robot's Power budget negative **and** System Strain is simultaneously at or above its Strain Threshold, the robot enters **immediate Shutdown** with no check. Either condition alone triggers a normal **Emergency Shutdown** check; both at once skip the check entirely.

See Chapter 7 for Shutdown rules.

### [Fuel]

**Fuel** is the robot's boost propellant pool, but may be drawn by other modules and equipment. It is the sum of all Fuel Capacity values from installed Booster and Reactor modules. Fuel is spent whenever a Boost action is taken — the cost per Scale Unit paid is the robot's **Boost Draw**:

**Boost Draw** = ⌈Robot Load ÷ Boost Power⌉ fuel per SU paid

(Robot Load is the robot's total weight with modules and equipment; Boost Power is the sum of boost values from Booster modules. Both are derived during construction — see Chapter 13.)

Fuel is not replenished during a standard battle, barring certain modules and scenarios. When a robot runs out of fuel it cannot Boost. Fuel cost scales with vector direction in flight — see Chapter 9 for the multipliers (Front 1×, Left/Right 2×, Rear 3×); Flying also allows a Robot to move further while boosting for less fuel(A Robot moves its Silhouette rather than a single Scale Unit).

---
# Chapter 3: Pilots

Pilots provide the dice pools for all checks in URFS. The Robot provides the hardware; the Pilot provides the skill.

## Pilot Stats

Pilots have three stats. Each stat is a dice pool — the number of d6 rolled for checks using that stat.

**Physical** — Toughness and physical prowess. Used for:
- Melee Attack Checks
- Fortitude Checks (resisting damage from impacts, Inertia, falls)
- Dodge Reactions
- Grappling (initiating and breaking free)

**Mental** — Mental acuity and endurance. Used for:
- Ranged Attack checks
- Emergency Shutdown checks
- Strain Vent checks
- Salvo targeting overflow
- Sets the **Pilot Strain threshold** (tokens beyond Mental = damage to Pilot)

**Training** — Rote memory, drilled responses, practiced skill. Used for:
- Can substitute for Physical or Mental on any **Priority Action** roll
- Does NOT apply to Reactions, Fortitude Checks, Shutdown Checks, or other non-Priority checks.

Training is the "by-the-book" stat. A high-Training pilot executes textbook maneuvers reliably but doesn't have the raw toughness or mental endurance to handle reactive pressure. Think a pilot who has only trained in simulations — technically proficient but crumbles when things go sideways.

## Pilot Tiers

| Tier | BP Cost | Stat Points | Talent Slots |
|------|---------|------------|--------------|
| Rookie | 20 | 10 | 2 |
| Experienced | 40 | 13 | 4 |
| Veteran | 80 | 16 | 6 |

All three stats must have at least 1 point after creation.

**Pilot BP cost** = tier base cost + sum of Talent costs.

A Pilot's stat points are distributed as the player chooses between their three stats. A Pilot can have as many talents as they have slots for.

## Pilot HP

A Pilot's hit points equal **2 × Physical**. When all boxes are marked, the Pilot is unconscious.

**Core stat callout — Pilot HP formula**: HP = 2 × Physical. Pilots with the Tank Talent have HP = 3 × Physical instead.

## Pilot Strain Threshold

The Pilot Strain threshold is equal to the Pilot's **Mental** stat. When a Pilot has more Action Tokens on their card than their Mental stat, they are over threshold: each action they resolve at that point deals **1 damage** to the Pilot, including the first one that pushes them past their threshold.

Talent modifiers to the Strain threshold (Calm Under Fire, Coordinated, Shield Rider, Commander) are covered in Chapter 11.

## Pilot KO Threshold

A Pilot is knocked out when they reach 0 HP. Some Talents may modify this.

## AI Pilots

AI Pilots can be either cheaper or more expensive, but are limited:
- No Talents
- Stats purchased at 3 BP per point (1-for-3 basis)
- **Hard cap**: Cannot have more Action Tokens than their Mental stat. Must Pass when they reach their limit.
- AI Pilot modules are **toggleable**. If an AI Pilot module is toggled off (by an opponent's effect or power loss), the Robot immediately enters Emergency Shutdown.

**AI Pilot BP formula**: BP = 3 × (Physical + Mental + Training). There is no flat base cost — the full cost is the per-point sum. A standard AI Pilot with 3/3/3 stats costs 27 BP.

The AI Socket Module increases in power usage based on AI stats.

---
# Chapter 4: The Dramatic Priority System

URFS does not use alternating turns. Instead, it uses the **Dramatic Priority System** — an action economy modeled after the flow of a basketball game, where offense and defense shift rapidly and control of the action can change suddenly.

One player has **Priority** at any given time. The Priority player takes actions with their Robots. The non-Priority player responds with Reactions. Priority changes hands when specific conditions are met.

**Starting Priority.** At battle start, the lower-BP force takes Priority and becomes the Assaulting Player. The higher-BP force is the Entrenched Player and takes the first Reaction.

## Priority Pass Conditions

Priority passes to the opponent when:

1. The Priority player takes the **Pass** action
2. A non-Priority Robot **deals damage** to a Priority Robot (a successful Reaction attack)
3. A Priority Robot **whiffs** an attack roll (zero hits on a Ranged or Melee Attack check)
4. A Priority Robot **fails an Emergency Shutdown check** (this is the natural shot clock — the longer you push, the more likely a Shutdown will cost you control)
5. Any other game effect explicitly causes Priority to pass

**These are mandatory** Priority shift occurs at the end of resolution for the current Priority Action.

**Whiff scope.** A whiff (zero hits) only passes Priority on **attack rolls** — Ranged checks and Melee Attack checks. Fortitude Checks, Shutdown checks, and all other non-attack rolls do **not** trigger a whiff, even if they produce zero hits. Shutdown check failure passes Priority by its own rule (condition 4 above), not the whiff rule.

## Action Tokens

Every time a Robot takes an action, an **Action Token** is placed on it and the Pilot that took the action. Tokens are unlimited — you can always take another action. But every token adds strain:

- Tokens accumulate on the Pilot, causing **Pilot Strain** when they exceed the Pilot's Mental stat.
- Tokens also accumulate as **System Strain** on the Robot, risking **Emergency Shutdown** when they exceed the Robot's threshold.

## Three Action Tiers

| Tier | When | Token Cost |
|------|------|-----------|
| **Priority Actions** | Only when you have Priority | 1 token (some cost more) |
| **Reactions** | In response to enemy actions | 1 token per Reaction |
| **Incidentals** | Free with each Priority Action | None |

Every Priority Action comes with one free Incidental, taken before or after the Priority Action.

## The Game Loop

1. Priority player picks a Robot, declares a Priority Action(including targetting), places a token on it and optionally resolves an incidental.
2. Non-Priority player declares Reactions with eligible Robots (placing tokens as they react)
3. Reactions resolve
4. Priority Action resolves, with option to resolve incidental afterward.
5. Pilot Strain checked — if tokens on Pilot exceed Mental, Pilot takes 1 damage
6. System Strain checked — if Robot's System Strain exceeds threshold, make Shutdown check(Priority AND non-Priority)
7. Priority passes if any pass condition was met
8. Inertia moves resolve (highest to lowest Inertia; collisions resolved before next Robot moves)
9. Repeat from step 1

**Switching Robots between Priority Actions.** The Priority player picks which Robot acts at the start of each Priority Action cycle (step 1). They may switch to a different Robot on any new cycle. They may not switch Robots mid-resolution — once a Robot is declared and Reactions are called, that Robot sees the full action through to step 7 before a new Robot may be chosen.


Play continues until one player wins.

---
# Chapter 5: Actions

## Priority Actions

Priority Actions can only be taken when you have Priority. Each Priority Action includes one free Incidental, taken either at Priority declaration or after Priority resolution(but before strain damage, etc.). The Priority player may use their Training stat in place of Physical or Mental for any Priority Action roll - including their free Incidental.

**Pass** — Does not cost a token. Pass Priority to the opponent. Also reboots a Shutdown Robot if taken by that Robot's conscious Pilot. Clears all Pilot Strain tokens on the passing Robot (does NOT clear System Strain). A Robot shutting down automatically causes that player to lose Priority, so to Reboot a Robot that player must gain priority again and then take the action to reboot the Robot; Shutdown causes a robot and its pilots to clear their tokens, so they will start fresh, but will not have priority. If a player has only shutdown Robots, they have lost the game.

**Run** — Move up to full Ground Speed in any direction. Half speed if moving in reverse (a direction that could draw a Line of Fire to the Robot's Rear facing). You may make a Physical check and move 2x the number of hits in additional Scale Units.

**Charge** — Move up to Ground Speed in a non-reverse direction — OR — Boost any number of Scale Units (up to maximum), then make a Melee Attack at the end of movement.

**Strafe** — Move up to Ground Speed in a non-reverse direction — OR — Boost any number of Scale Units, then make a Ranged Attack. May also make the Ranged Attack before moving.

**Salvo** — Make Ranged Attacks with up to your full complement of ranged weapons. Costs one token per weapon. If the number of targets exceeds your Mental stat, make a Mental check against the number of targets. Fail = subtract the difference between your hits and the number of excess targets from each attack's dice pool. Each weapon can only make one attack against one target, unless its keywords state otherwise. Each attack must be reacted to individually.

> *Example.* A Pilot with Mental 4 declares Salvo against 6
> targets. Because \`targets (6) > Mental (4)\`, they roll a Mental
> check: 4d6, hits on 5+, threshold = 6 targets. They get 1 hit.
> Deficit = \`2 excess targets − 1 hits = 1\`. Each of the 6 attacks now
> rolls with 1 fewer die than its normal pool.

**Melee Assault** — Make Melee Attacks with up to your full complement of melee weapons. Costs one token per weapon. You choose the order of attacks. Each attack must be reacted to individually.

**Boost** — Available at any altitude. Travel up to your maximum Boost distance(Your Boost Power in SU or in Silhouettes while flying). While Flying, if changing direction off-Vector, make a Fortitude Check per the flying rules. Inertia gain (+1 per Silhouette moved) also applies only while Flying. Neither the Fortitude Check nor Inertia gain triggers when Boosting at Altitude 0. Boosting ends the Crouch status. May pay for altitude raise first to gain flight, then pay for flight movement + inertia gain after that, all within one action and one instant fuel drain.

**Double Incidental** — Take two Incidental actions, plus the free Incidental from the Priority Action (three total). Costs 1 token, like other Priority Actions.

## Reactions

Reactions are taken in response to enemy actions. Robots resolving a Priority Action cannot take reactions to enemy Reactions, since they are in the middle of resolving an action. Each Reaction costs one Action Token. Players should place a token on the table next to any Robot with a declared Reaction, as a reminder to resolve it before the Priority Action. Reactions resolve in proximity order to the Priority Robot; a few technically resolve after the Priority Action (attacks, mostly). Leave your token on the table until your action is resolved, then move on to the next step in the priority cycle.

**Target redirection.** If a Reaction causes the original target of an attack to become unavailable — examples: the target Pivots/rotates and the attacker is no longer in a valid facing arc; the target Boost-Dodges out of range or line of fire; a Reaction status change (Crouched, Down) makes the target untargetable for this attack kind — the attacker picks a new valid target before resolving their action. The attacker does not lose the action; the attack redirects. If no valid replacement target exists, the action resolves as a whiff (zero hits) and Priority passes accordingly. For Salvo, redirection applies per-weapon-slot independently. Talents pre-declared against the original target (Sharpshooter, Deadeye) carry to the redirect target.

**Quick Move** — Move up to half Ground Speed, or 1/4 if moving in reverse. Cannot perform at Altitude > 0.

**Boost Dodge** — Make a Physical check and Boost up to the number of hits in SU in any direction(Only SU, even if flying). Increase the required hit threshold of the opponent's attack by your hits. The number of Scale Units you can boost is capped at your Boost Power as normal. Fuel cost is the same as a normal Boost (Boost Draw × SU traveled).] Costs fuel as normal. Against Area attacks, does not reduce opponent's hits but still moves your Robot(potentially out of Danger).

**Block** — Redirect the incoming attack to a Component of your choice. If that Component is destroyed, overflow damage goes to original target.

**Parry** — Roll a melee attack using your own melee weapon. Your hits increase the number the opponent needs to succeed. If no damage is dealt from their attack, you gain Priority.

**Quick Strike** — Make a single Melee Attack. If the Priority Action includes a melee attack, Quick Strike resolves after it. If the Priority Action is not a melee attack, Quick Strike resolves before the Priority Action.

**Hip Shot** — Make a single Ranged Attack after the current Priority Action resolves.

**Incidental** — Perform any Incidental action as a Reaction.

## Incidental Actions

Incidentals are free — one comes with every Priority Action, and they cost no tokens. They can also be taken as a Reaction (costing one token in that case).

**Crouch** — Only for Robots with legs, at Altitude 0 and Inertia 0. Silhouette counts as half for enemy Ranged Attacks. Crouched Robots get +2 dice on Ranged Attack checks with Grabbed weapons. Any movement, Boosting, or Altitude/Inertia change ends the Crouch.

**Strain Vent** — Make a Mental check. Remove System Strain from this Robot equal to the number of hits. (Being an Incidental means it can be taken as a Reaction via "Incidental as Reaction," allowing strain venting on the opponent's turn.)

**Toggle** — Turn a Component or Module on or off, or activate anything requiring a Toggle. This includes spending Capacitors for Shield recovery or System Strain clearing.

**Step** — Move up to half Silhouette in Scale Units in any direct, even reverse. Cannot Step if Altitude or Inertia > 0.

**Grab/Draw Weapon** — Change an equipment location or add Grabs. Requires a Manipulator.

**Drop** — Drop a held object or weapon adjacent to the Robot. Place a token on the map for it. Can be combined with a Draw as one Incidental.

**Pivot** — Change Facing by up to 90 degrees. When Flying, may turn up to 180 degrees if Facing is not locked to Vector.

**Decelerate** — Spend Fuel to reduce Inertia via Boosting. One Boost payment per point of Inertia. May only reduce to 0, not negatives.

---
# Chapter 6: Attacks and Damage

## Ranged Attacks

Ranged Attacks are made with weapons that have the Ranged keyword. 

1. **Declare**: Choose a weapon and designate a target Robot in range. Declare a target Component on a valid Facing (per Line of Fire rules). You may target beyond weapon Range, but lose 1 die per Scale Unit over.
2. **Reactions**: The target declares Reactions if able, as part of the Priority resolution cycle; if the target is on the same side as the Priroity Robot that is acting, they can still declare a reaction to your attack(if you are using Hip Shot for instance).
3. **Set Difficulty**: Base = 1 hit required.
   - Target is smaller: +1 required hit per Sil difference
   - Target is larger: -1 required hit per Sil difference (minimum 1)
   - Add modifiers from Reactions, terrain, and other effects
4. **Roll**: Mental + Module/Talent bonuses. Count hits (5s and 6s).
5. **Resolve**: If hits meet or exceed difficulty, the attack hits. Deal the weapon's Damage to the targeted Component. If the target Blocked, they chose the Component instead. If the total dice pool became zero, the target cannot be damaged normally, but things like cover can be damaged instead.

### Minimum Range
Ranged weapons have a "Minimum Range" which is, without keyword modification, the silhouette of the weapon. Internally mounted weapons have no minimum range. Minimum range is the minimum distance from the Robot the target must be; a Robot may not target anything with a weapon within that weapon's minimum range.

## Melee Attacks

Melee Attacks are made with weapons that have the Melee keyword, or with any Arm (even without a weapon).

1. **Declare**: Choose a weapon (or arm) and designate a target Robot. Declare a target Component. Target must be within **Reach** = Robot Reach + Weapon Reach. 
    **Weapon Reach** = Weapon Sil + (1/2 Weapon Sil × Reach Extender count (minimum 0 Reach Extender instances)). **Robot Reach** is defined in Chapter 2 (Construction Stats).
2. **Reactions**: Target declares Reactions if able, as part of the Priority resolution cycle; if the target is on the same side as the Priroity Robot that is acting, they can still declare a reaction to your attack(if you are using Quick Strike for instance).
3. **Set Difficulty**: Same Silhouette comparison as Ranged.
4. **Roll**: Physical + Module/Talent bonuses + 2 dice per extra Manipulator gripping the weapon.
5. **Damage**: Weapon Damage + (half Robot Strength per arm wielding the weapon). If the Robot has Inertia > 0, add [Inertia x Silhouette] bonus damage. Objects used as weapons take equal damage back.
6. **Inertia Impact**: If Inertia was used in damage and it hits a Component containing a Pilot, that Pilot makes a Fortitude Check against the Inertia score. If the hit destroys a Component and damage overflows to a Component containing a Pilot, that Pilot makes the Fortitude Check against the full Inertia score, regardless of how much damage actually carried over.

## Throwing

A Robot can throw an object using any arm that either (a) has a **free
Manipulator** module (one not currently gripping anything else), or
(b) is already holding the object being thrown. An arm grasping a
different held object cannot participate in the throw.

- Roll: **Physical** check (not Mental — this is not a Ranged Attack for keyword purposes)
- Range: Robot Reach + Robot Strength x Arms used, minus the weight of the thrown object
- Damage: Weight of the object + any melee damage rating
- On a hit, place a token for the thrown object at or adjacent to the target. On a **miss**, the thrower places the token anywhere within Sil Scale Units of the target — the object goes wide but does not scatter infinitely.
- Requires two arms to throw two-handed weapons or heavy equipment

> **Robot Strength definition.** "Robot Strength" in throw / melee
> / grapple formulas means the Robot's **Frame Strength**, applied
> once per participating arm. Strength is a robot-wide stat, not
> a per-component one. When multiple arms cooperate (two-handed
> throw, multi-arm grab), each arm contributes one full Frame
> Strength to the total(which may be halved in certain formulas). A Sil 6 Robot with Frame Strength 4
> throwing with one arm reaches Reach(3) + Frame Strength(4)) × 1 arm = 7 SU
> range (minus thrown weight); the same Robot throwing with two
> arms reaches Reach + Frame Strength × 2 arms = 11 SU.

> *Example.* A Sil 6 Robot with Frame Strength 4 throws a Weight-2
> object using two arms. Range = (4 × 2) − 2 = 6 SU. Damage = 2
> (weight) + any melee bonus rating on the throwing arm.

A Robot can throw a grappled Robot if that math kicks out a positive number.

A Robot may not throw an object beyond its equipment silhouette limit(2 * Robot Silhouette).

## Grappling

Any Robot with a Manipulator module can attempt to Grapple. The participating arm must have a **free Manipulator** — one not currently holding an object. An arm already gripping a weapon or other held object cannot initiate the Grapple. Either Robot involved may add +2 dice to their check per Free Manipulator. Every manipulator used in a grab counts as occupied while the grabbing Robot is engaged in the Grapple.

1. **Initiate**: Declare a Grapple instead of a normal Melee Attack. The attacker's Pilot makes a **Physical** check opposed by a **Physical** check from a Pilot of the defender's choice. Each Pilot adds their Robot's Frame Strength in dice to the check, plus bonus dice for extra Manipulators.
2. **Grappled**: If the attacker wins, the target is Grappled. A Grappled Robot cannot take Movement actions and has -2 Dice on Ranged Attacks. If the grappled Robot boosts, they may boost as if their weight was the total weight of both robots(equipment and all), if possible. Grappled Robots must be moved immediately adjacent to eachother(move the Robot with lower Weight), but a Robot can initiate a Grapple against any target within Reach.
3. **Break Free**: The Grappled Robot can take a Reaction or Priority Action and make a new opposed check. If they win, they're free. These actions cost tokens as normal.
4. **Throw**: A Robot grappling a target can spend an action to throw the target according to the Throwing rules. Distance and damage are derived from the thrower's **Strength** stat as normal. This is an inherent ability of strong Robots, not a keyword.

If either Robot has a free arm/other way to make a melee attack, they may make melee attacks against their grappler/grapplee. Ranged attacks are subject to the minimum range rule, but may be possible(largely with internally mounted Weapons).

The Grappling Robot can disengage the Grapple during any action.

## Damage Application

1. Shields absorb damage first (whole-robot pool). If Shields remain, no Component damage.
2. If Shields are depleted or absent, damage goes to the targeted Component.
3. If the defender **Blocked**, they chose which Component takes the hit instead.
4. If the damaged Component is destroyed, Damage carries through the next Component in dependency(the parent Component of the one that was destroyed). Block only redirects the initial hit; if the component/equipment used to Block is destroyed, overflow damage goes to the original target.

5. **Frame Save**: When a **Frame Component** takes damage that exceeds its armor pool — whether by depleting armor normally **or** by a Penetrating hit that bypasses armor — roll Frame Durability in d6. Hits on **(7 - Frame Material)+**. Each hit reduces incoming damage by 1. A Penetrating attack reduces the defender's effective armor for that hit before the save is rolled; the Frame Save still applies to whatever damage reaches the component. Penetrating does not bypass the Frame Save itself.

**Frame Material values & thresholds**:

- Frame Material 1 → save on **6+**
- Frame Material 2 → save on **5+**
- Frame Material 3 → save on **4+**
- Frame Material 4 → save on **3+**

**Example.** A Frame Component with Frame Durability 4 and Frame
Material 3 takes 6 incoming damage. Roll 4d6, hits on 4+. Suppose
2 hits — reduce damage by 2. The component takes 4 damage, which destroys it. Any damage leftover from the Frame Save destroys a component.

Components are either **Frame** or **Non-Frame**. Frame Components (Core, structural Arms, structural Legs, structural Heads) get a Frame Save when their Armor is depleted. Non-Frame Components (Utility Components, Utility Arms/Legs/Heads) are destroyed when their Armor reaches 0 and the Component would be assigned any more damage.

Damage is either **Physical** or **Energy**. Both apply the same way, but certain keywords interact differently with each type. Energy Weapons require Power to operate.

### Guarding Equipment/Components

When a piece of Equipment or Component guards a certain Component(either on a single face for a core, or the entire component on any non-core), Damage is applied first to the guarding Equipment/Component, and then overflow applies to the guarded Component if the guarding Equipment/Component is destroyed.

### Overcharged Weapons

Overcharged weapons deal bonus damage but stress their own frame. **Each time an Overcharged weapon fires, it takes Physical damage equal to its own Silhouette.** The damage applies to the weapon component directly and is not reduced by the wielding Robot's armor, shields, or any other effect. If an overcharged weapon is destroyed by resolving the effects of its own keyword, it explodes and deals its damage as an Explosion attack to the component it is attached to. This damage bypasses armor if it is internally mounted. Full self-damage routing and keyword entry are in Chapter 12.

## Falling Damage

When Altitude drops to 0 and decrease was > 1:
1. Pilot Physical check against Altitude decrease.
2. Pass: Fortitude check against decrease only. Land standing.
3. Fail: Robot goes Down. Fortitude check against (decrease + Silhouette).

In **multi-cockpit robots**, all falling and landing Fortitude checks apply to **every conscious pilot**, not just the primary pilot. Each conscious pilot resolves the check independently.

### Ejector Coupling — Detached Component Falling Damage

When the Ejector Coupling module detaches a component at **Altitude > 1**, the detached component takes **Physical damage equal to (Altitude + Robot Silhouette)**. This represents the component falling unsupported from height. The robot's armor and Frame Save do not reduce this impact — it applies directly to the detached component's armor pool. Full module rules are in the Ejector Coupling entry (Chapter 12).

---
# Chapter 7: Strain and Shutdown

Every action a Robot takes generates strain on two concurrent tracks.

---

## Pilot Strain

Each action places a token on the acting Pilot. When a Pilot's token count exceeds their **Mental stat**, they take **1 damage** for each token beyond their limit. This is flat 1 damage per additional token.

**Pass clears Pilot Strain.** When a Robot takes the Pass action, all Pilot tokens on that Robot are cleared. The Pilots catch their breath.

When a Pilot is **incapacitated** (HP reaches 0), their Pilot tokens are removed — but System Strain is unaffected, since it was tracked independently all along.

---

## System Strain

Each action adds +1 **System Strain** to the Robot independent of Pilot tokens. System Strain is its own counter — it represents heat, mechanical wear, and system stress. Pilot tokens going up or down (from Pass, incapacitation, etc.) has no effect on System Strain.

**[Strain Threshold** = (Silhouette / 2) + coprocessorBonus across **active** Coprocessor modules. The threshold updates immediately when a Coprocessor is toggled off mid-battle — a Robot that was safely below threshold can tip over it in the same action that the module deactivates.]

When System Strain exceeds the threshold, the Robot must make an **Emergency Shutdown Check** after the action resolves.

---

### Emergency Shutdown Check

Each time an action is resolved and the Robot has either a negative Power score **-OR-** more strain tokens than its threshold, its Pilots must make an Emergency Shutdown Check. This check is made to keep the Robot functioning when it is past its limits or exceeding its power generation capability.

All conscious Pilots of the Robot make a combined roll: pool = total Mental dice + 1 die per Capacitor remaining. Roll all the dice; they hit on a 5+ as normal. The check passes if total hits ≥ current System Strain, or pass on any hits if Power is negative. If a Robot has no power generation at all and no capacitors, they do not make a check at all and immediately shutdown.

- **Pass**: The Robot stays active. Continue operating.
- **Fail**: The Robot **shuts down**. All Pilot tokens are cleared. System Strain tokens are also cleared. Every AI Core module on the Robot is immediately flipped off; an AI Pilot cannot reboot a Shutdown Robot. The Robot cannot take any actions until rebooted with a Pass action declared by a conscious human Pilot. **Priority also passes** to the opponent. If a player has only Shutdown Robots, they have lost the game.

---

### Dual-Trigger Immediate Shutdown

If a Robot simultaneously triggers **both** a Power-negative condition (total Power budget drops below zero) **and** a Strain-overflow condition (System Strain exceeds threshold) in the same action resolution, the Robot shuts down immediately — **no Emergency Shutdown Check is made**. Either condition alone still permits a check. This double-penalty represents cascading catastrophic failure; neither safety catch fires in time.

---

### Clearing System Strain

System Strain is NOT cleared by Pass. It persists across possessions. Two methods:

- **Strain Vent** (Incidental): as described in the Actions chapter.
- **Capacitor Spend** (Toggle): Permanently deplete 1 Capacitor to remove 1 System Strain. This is the emergency option — effective but costly. Both Capacitor spends (Strain-clearing and Shield recovery) are Toggle actions and are **blocked during Shutdown.** A shut-down Robot cannot spend Capacitors for any purpose until rebooted.

---

## Capacitor Banks

Capacitor Bank modules add the "Capacitor X" quality to a Robot (X = number of banks × 2). Capacitors serve three purposes from a single permanent pool:

1. **Passive Shutdown Bonus**: +1 die to Emergency Shutdown checks per Capacitor remaining. Always active.
2. **Shield Recovery** (Toggle): Permanently spend 1 Capacitor → +10 Shields (capped at shieldsMax). Blocked during Shutdown.
3. **System Strain Clearing** (Toggle): Permanently spend 1 Capacitor → −1 System Strain. Blocked during Shutdown.

Once a Capacitor is spent, it is gone for the rest of the game. The tension: every Capacitor spent on shields or strain clearing reduces your passive Shutdown bonus.

---

## Shields

Shield Generator modules give a Robot whole-robot Shields equal to **Shield Generators × Silhouette**. Shields absorb damage before any Component takes a hit, regardless of facing. Shield Generators are toggleable (Core/Utility slot, weight 2, power −10).

Shields do not regenerate on their own. Recovery requires spending Capacitors via Toggle.

---
# Chapter 8: Movement

## Ground Movement

A Robot's **Ground Speed** is the maximum Scale Units it can travel per ground movement action. See §Construction (Ch. 13) for the full derivation. The headline formula is:

> **Ground Speed** = (leg count × Sil) + moveMod + wheels mod
>
> where **moveMod** = ((Max Load − robot weight) / 5). moveMod can be negative on overloaded builds. Robots with no legs and no wheel modules have Ground Speed 0 on the ground.

**Max Load** = Frame Strength × count of BOTTOM-facing components (the Core counts as BOTTOM-facing) + 2 × count of Lift Enhancement modules. This is the weight the robot was designed to carry; going over it degrades moveMod.

To move on the ground, follow these steps:

1. Choose a destination point on the battlefield.
2. Draw a line from your Robot to that point. Consider anything in the path:
   - Light Terrain can be breached if the Robot's Strength ≥ the terrain's Silhouette, costing extra movement equal to the terrain's Silhouette in SU (see Terrain). Heavy Terrain cannot be breached — go around or destroy it first.
   - Other Robots block your path.
   - Hindering Terrain costs 2x movement to pass through.
3. Check Facing: draw a Targeting Line from the Facing Die to the destination.
   - Non-reverse: full Ground Speed.
   - **Reverse**: movement is Reverse if its primary direction is into the Rear arc — i.e., the destination can draw a line of fire to the rear facing of the facing die. Strictly backward movement is not required; any rearward-arc destination qualifies. Reverse: half Ground Speed.
4. Move the Robot and Facing Die, maintaining the same facing direction.

Players may re-measure and re-declare movements freely while planning.

## Short Moves

Not every move is a full-speed run. Two abbreviated movement options are available without an action token:

- **Step** — A minor reposition. Distance = floor(Sil / 2) SU. Counts as an Incidental. Requires Altitude 0 and Inertia 0.
- **Quick Move** — A fast half-speed dash used as a Reaction. Distance = (Ground Speed / 2) SU. Must have Altitude 0.

## Boosting

Boosting is rocket-assisted movement that consumes Fuel.

**Boost Draw** = Robot Load / Boost Power (rounded up). This is the Fuel cost per Scale Unit of Boost on the ground.

- On the ground: pay Boost Draw per Scale Unit, move that many SU.
- In the air: each Scale Unit of Boost moves the Robot its Silhouette in Scale Units (see Flying).
- Maximum Boost per action = Boost Power (in SU on ground, Silhouettes when Flying).

## Inertia

Inertia is momentum carried between actions. It applies on the ground and in the air alike; flight adds extra rules layered on top (see Chapter 9 for the flight overlays).

- **Gain (ground).** Ground Move, Charge, and Strafe actions generate +1 Inertia per Silhouette-length of distance moved. A Sil 4 Robot moving 12 SU gains 3 Inertia (12 ÷ 4 = 3), not 12.
- **Gain (flight).** Boost movement while Flying also generates +1 Inertia per Silhouette-length moved. See Chapter 9.
- **Drift.** After each Priority Action resolves, every Robot with Inertia > 0 drifts along its Vector Die direction by its Inertia in Scale Units. Highest Inertia moves first; same-bracket Robots move simultaneously (Priority player's Robots first).
- **Decay.** Inertia decreases by floor(Sil / 2) − Glide after each action resolves, minimum 0. Glide modules (such as Wings) slow this decay.
- **Decelerate.** A Robot can actively reduce Inertia by spending Fuel: 1 Fuel per 1 Inertia reduced.

Inertia in combat: when targeting a Robot with Inertia > 0, the attacker needs +1 hit per point of Inertia. Melee Attacks deal Inertia × Silhouette bonus damage; the target's Pilot makes a Fortitude Check against the attacker's Inertia. This bonus applies at any altitude — grounded Robots benefit too.

## Robot Statuses

**Standing** — Normal status. Full Silhouette. All actions available.

**Crouched** — Half Silhouette for enemy Ranged Attacks. +2 dice on Ranged Attacks with Grabbed weapons. Requires legs, Altitude 0, Inertia 0. Any movement ends Crouch.

**Down** — The Robot has fallen. Silhouette counts as 1/3. Cannot make Melee Attacks or Parry. Must spend 1/3 Silhouette in movement to stand up before any other movement.

**Flying** — Altitude above 0. See Chapter 9.

---
# Chapter 9: Flying

## Getting Airborne

A Robot starts Flying when its Altitude rises above 0. To gain Altitude, Boost
straight up — paying Boost Draw (Robot Load / Boost Power) fuel per Scale
Unit paid grants +1 Altitude for each Silhouette in Scale Units climbed. A Robot
can gain multiple Altitude in a single Boost by paying multiple times; after 1 Altitude is gained, all payment converts to silhouettes of movement instead of Scale Units.

## The Vector Die

Once airborne, a Robot gains a **Vector Die** — a second d6 showing the direction of flight.

- If the Robot's Facing and flight direction are the same, the Facing Die doubles as the Vector Die. No extra die needed.
- If they differ (the Robot is looking one direction while flying another), use a separate colored die for the Vector.
- After any flight movement, the Vector Die rotates to face the direction just moved. Put it in front of the Robot in that direction. Keep the Facing die at the actual front Facing of the Robot model at all times.

## Movement in Flight

Flying Robots can only move by Boosting — no Ground Speed actions.

For every 1 Scale Unit of Boost paid, a Flying Robot moves its Silhouette in Scale
Units. A Sil 6 Robot paying 3 SU of Boost travels 18 Scale Units. The tradeoff:
the Robot must move the full distance paid. No partial moves in the air. They also gain Inertia, covered in its own section later.

**Flight fuel cost** = Boost Draw × SU paid × vector multiplier (see Turning in
Flight, below).

Maximum Boost per action is still limited by Boost Power.

## Turning in Flight

The Vector Die divides the sky into four 90-degree arcs: Front, Left, Right, and Rear. Moving within the Front arc is straightforward. Turning costs more — in both Fuel and Pilot stress.

| Direction | Fuel Multiplier | Fortitude Check |
|-----------|----------------|-----------------|
| Front arc | 1× (normal) | None |
| Left or Right arc | 2× Fuel | Physical vs. (Silhouettes moved × 2) |
| Rear arc | 3× Fuel | Physical vs. (Silhouettes moved × 3) |

"Silhouettes moved" means the total distance traveled divided by the Robot's
Silhouette — i.e., Silhouette-lengths of distance, not raw SU paid. A Sil 6
Robot moving 18 SU has moved 3 Silhouettes.

Hard turns at high speed are extremely dangerous and can kill Pilots outright.

**Example:** A Sil 6 Robot flying at Altitude 3 wants to reverse direction. It pays
for 3 SU of Boost (moving 18 Scale Units — 3 Silhouettes), into the Rear arc —
Fuel cost is tripled. The Pilot makes a Fortitude Check against 3 Silhouettes
moved × 3 = 9. Only the toughest Pilots survive regular reversals at speed.

## Inertia in Flight

Inertia is covered in full in Chapter 8 (Movement) — gain, drift, decay, and decelerate apply identically on the ground and in the air. The flight-only overlays follow.

- **Flight Inertia gain**: +1 Inertia per Silhouette-length of distance moved while Flying — same per-Silhouette rule as ground movement.
- **Off-Vector Fortitude**: changing direction off-Vector while Flying requires a Fortitude Check per the Turning in Flight rules above. Grounded movement never triggers this check.
- **Flight fuel multiplier**: turning costs double or triple Fuel depending on arc (see Turning in Flight). The multiplier applies only while Flying.
- **Landing**: If Altitude reaches 0 with Inertia > 0, Inertia is immediately reduced to 0 and the Pilot makes a Fortitude Check against the reduction (see Inertia-Loss Landing, below).

### Inertia in Combat

- **Defensive**: +1 hit needed per point of Inertia when targeting any Robot with Inertia (flying or grounded).
- **Offensive**: Melee Attacks deal Inertia × Silhouette bonus damage; the target's Pilot makes a Fortitude Check against the attacker's Inertia. This bonus applies at any altitude — grounded Robots with Inertia from ground movement also benefit.

## Losing Altitude

Flying Robots sink after each Priority Action resolves:

- **With Inertia > 0**: Lose (Silhouette − Glide) Altitude.
- **With Inertia = 0**: Lose Silhouette Altitude (dropping like a stone without forward momentum).
- **Hover Systems** set a minimum Altitude the Robot won't drop below. Stackable.
  The Hover floor applies to both altitude decay AND manual altitude reduction —
  a Robot cannot deliberately descend below its Hover floor without turning off the modules providing Hover.

## Falling

When a Robot's Altitude drops to 0 and the decrease was more than 1 point:

1. Pilot makes a **Physical check** against the Altitude decrease.
2. **Pass**: Robot lands Standing. Pilot makes a Fortitude Check against the
   Altitude decrease only. Damage = (decrease − hits).
3. **Fail**: Robot goes **Down**. Pilot makes a Fortitude Check against (Altitude
   decrease + Robot Silhouette). Damage = ((decrease + Sil) − hits).

In multi-cockpit Robots, falling damage applies to all conscious Pilots and each one makes their own individual checks. The physical check to remain standing is made by one conscious pilot of the player's choice.

## Height and Lines of Fire

Altitude lets you see over terrain:

- For each point of Altitude, reduce the effective Silhouette of terrain between the Flying Robot and its target by 1. This works in both directions (shooting up at a flyer, or a flyer shooting down).
- Flying Robots can move over terrain with Silhouette less than their Altitude.

## Collisions

A Collision occurs when a Robot moves into or through another Robot or terrain. Collisions do **not** pass Priority.

### Collision Types

**Chasing**: A Robot collides with another on the target's Rear Vector and that Robot has an Inertia > 0. The colliding Robot's player assigns damage to both Robots.

**Converging**: Head-on or angled collision between Robots with Inertia, or one Robot is stationary. Each player assigns their own incoming damage as if Blocking.

### Collision Damage

- **Robot vs. Robot**: (Total Involved Inertia) × Silhouette, from the largest Robot, applied to both. If one Robot was stationary, the colliding Robot's Silhouette is used.
- **Robot vs. Terrain**: (Inertia × Silhouette) to the terrain. Remaining movement is lost if the terrain isn't destroyed; Robot Inertia drops to 0, and the Pilot must make a Fortitude check against the Inertia loss.

### After a Collision

- **Converging**: Both Robots reduce Inertia by the greatest Inertia involved. If this produces a negative Inertia for one Robot, move it that many SU in the opposite direction and set its Inertia to 0.
- **Chasing**: The colliding Robot's Inertia decreases and the target's Inertia increases, both by the collider's Inertia used in damage calculation.

Collisions should be calculated before moving Robots into their colliding positions, to preserve Lines of Fire between Facing Dice for damage assignment. Valid damageable components are found by drawing a line of fire before the Collision.

Collisions that push a Robot can cause more Collisions(Converging hit) which are resolved after the current one.

## Flight Formula Summary

| Stat | Formula |
|------|---------|
| Boost Draw | ceil(Robot Load / Boost Power) fuel per SU |
| Flight fuel cost | Boost Draw × SU paid × vector multiplier |
| Flight distance | Sil SU per 1 SU Boost paid (Flying only) |
| Inertia gain (flight) | +1 per Silhouette-length moved (= per Sil SU traveled) |
| Inertia gain (ground) | +1 per SU moved (Move / Charge / Strafe) |
| Decelerate cost | 1 fuel per 1 Inertia reduced |
| Altitude decay (Inertia > 0) | Sil − Glide per action |
| Altitude decay (Inertia = 0) | Sil per action |
| Inertia decay | floor(Sil / 2) − Glide per action, min 0 |
| Off-vector Fortitude threshold | Silhouettes moved × 2 (Left/Right); × 3 (Rear) |
| Falling Fortitude (Standing) | vs. Altitude decrease; damage = max(0, decrease − hits) |
| Falling Fortitude (Down) | vs. decrease + Sil; damage = max(0, (decrease + Sil) − hits) |
| Inertia-loss landing Fortitude | vs. inertiaAtLanding; damage = max(0, inertia − hits) |
| Collision (robot-vs-robot) | (Movement + Inertia) × Sil, both robots |
| Collision (robot-vs-terrain) | Movement × Sil, both robot and terrain |
# Chapter 10: Terrain

Terrain in URFS is defined by its **Silhouette** — how big it is in Scale Units. There are two types.

**Some modules modify how a Robot's own Silhouette interacts with cover — see Horizontal Framing Module, Ch. 12**

## Light Terrain

Light Terrain obscures but does not fully block. Think trees, fences, rubble, light structures.

**Cover:** Light Terrain provides cover only if the terrain's Silhouette is at least half the covered Robot's Silhouette. When a Line of Fire passes through Light Terrain that provides cover, split the attack's damage: half hits the terrain, half hits the Robot. No persistent HP tracking — terrain is either standing or destroyed.

**Destruction:** Light Terrain is **destroyed** if the damage dealt to it in a single shot equals or exceeds 2x its Silhouette. When destroyed, any excess damage beyond the threshold passes through to the Robot. Replace destroyed Light Terrain with Hindering Terrain markers.

**Breach:** A Robot with Strength equal to or greater than the terrain's Silhouette can move through Light Terrain, destroying it. This costs extra movement equal to the terrain's Silhouette in Scale Units.

**Wieldable:** Light Terrain marked as **Wieldable** can be picked up by Robots with sufficient Strength and used as a melee weapon. Wieldable terrain gains the Melee keyword when grabbed, and is destroyed after a successful attack (it takes equal damage back).

## Heavy Terrain

Heavy Terrain blocks Lines of Fire. Think buildings, thick walls, solid rock.

**Cover:** If a Line of Fire passes through Heavy Terrain, reduce the target Robot's effective Silhouette by the terrain's Silhouette. Cover only applies if the terrain's Silhouette is at least half the covered Robot's Silhouette. If the target's modified Silhouette is 0 or less, they **cannot be targeted**.

**Destruction:** Heavy Terrain is **destroyed** if it takes damage equal to 5x its Silhouette in one instance. Replace with Hindering Terrain markers. Heavy Terrain cannot be breached by movement — destroy it first, then move through the rubble.

## Hindering Terrain

Hindering Terrain (rubble, wreckage, destroyed terrain) costs **2x movement** to pass through.

Hindering terrain markers are just any markers distributed in a similar footprint as the former terrain piece, in the same area.

## Terrain and Melee

Terrain does not meaningfully affect melee combat between Robots. It matters for Lines of Fire and ranged cover, not close-quarters fighting.

## Terrain and Collisions

When a Robot collides with Heavy terrain, damage is calculated using the collision formula from **Chapter 9** — specifically: **(Inertia × Robot Silhouette)** to the terrain. Compare the terrain damage result against the destruction threshold above to determine whether the terrain is destroyed on impact.

**Altitude and Terrain Silhouette:** Each point of Altitude a Flying Robot has reduces the effective Silhouette of intervening terrain by 1 for Line of Fire purposes (see **Chapter 9 — Flying**). A Flying Robot can pass over terrain with Silhouette < its current Altitude without interaction.

# Chapter 11: Pilot Talents

Pilots can have Talents that give them an edge in battle. The number of Talents a Pilot can have is limited by their Talent Slots (2 for Rookies, 4 for Experienced, 6 for Veterans). Talents cost additional BP added to the Pilot's base cost.

AI Pilots cannot have Talents.

---

## Physical Talents

**Tank** (+5 BP) — Pilot HP is Physical × 3 instead of Physical × 2.

**Neural Link** (+7 BP) — Physical is used instead of Mental for determining when Pilot Strain causes damage, and as the base for the Pilot Strain Threshold (tokens-before-damage count). If a Frame Component on this Pilot's Robot is destroyed, the Pilot makes a Fortitude Check against (remaining Frame Components + 3) and takes the difference as damage, where "remaining" means surviving (undestroyed) Frame Components on this Robot at the time of the check].

**Fast Fingers** (+2 BP) — Whenever you take a Toggle action, you may take 2 instead.

**G-Adapted** (+4 BP) — +4 dice to Fortitude Checks made to resist Inertia loss when decelerating or off-Vector turns while Flying. 

**Cool Head Under Pressure** (+5 BP) — When this Pilot rolls a Fortitude Check after taking a Reaction and takes no damage, remove one Action Token from the Pilot.

**Quick Troubleshooter** (+2 BP) — When this Pilot would check for Emergency Shutdown due to power loss, they may take an action token to perform Toggles equal to 2× Pilot Mental before making the check. If Power output is neutral or positive after this, skip the Shutdown Check.

**Martial Artist** (+5 BP) — Add Training to Physical for checks made for Melee Attacks and Parry.(Double training if you are using it for a Priority Melee Attack)

**Gunslinger** (+5 BP) — When taking the Salvo action, if you must make a Mental check for more targets than your Mental stat, add +1 die to the check for each target past the first.

**Deadeye** (+6 BP) — After rolling a single-target Ranged Attack, you may add an additional Action Token to this Pilot to make the attack Unblockable.

**Coordinated** (+4 BP) — While Pilot HP is above half, meaning strictly greater than half — at exactly half HP this talent is inactive, this Pilot's Strain Threshold is (Mental × 1.5) instead of Mental.

**Coolant Manager** (+5 BP) — Once per Priority Action, you may perform a Strain Vent as an additional Incidental. The Pilot takes 1 damage each time this talent is used.

**Sharpshooter** (+3 BP) — Once per game, when taking the Salvo Action targeting only 1 target, you may burn your free Incidental. If you do, add +3 dice to each attack. Only works at Inertia 0.

---

## Mental Talents

**Calm Under Fire** (+5 BP) — This Pilot's Strain Threshold is base Strain Threshold + 2. Always active; no conditions.

**Overclock** (+3 BP) — Once per game, this Pilot may roll 2× Mental dice on a single Emergency Shutdown check (hits on 5+ as normal). The Pilot takes 2 damage regardless of outcome.

---

## Training Talents

**Ace Pilot** (+10 BP) — +5 Stat Points. Takes two Talent Slots.

**Brawler** (+3 BP) — When making a melee attack with no Grabbed weapon (bare arm or socket mounted), add an extra half Frame Strength to the attack's Damage.

**Combo Fighter** (+5 BP) — When making a Melee Assault with a weapon held in more than one Manipulator, the Robot makes one separate attack with that weapon per Manipulator holding it. Example: a weapon gripped in 3 Manipulators produces 3 separate attack rolls on a Melee Assault.

**Commander** (+10 BP) — While the Commander on your force is conscious, ALL friendly pilots (including the Commander) gain +1 to their Strain Threshold as a passive force-wide bonus. When the Commander on your force is incapacitated, all Pilots whose current Action Token count exceeds their own Mental stat take Strain damage for each token over — all at once. You may only have one Pilot with this Talent on a Force.

**Fighter Pilot** (+2 BP) — While at Altitude > 0, when hit by an attack from your Rear Vector, make a Training Check and reduce damage by the number of hits.

**Commando** (+2 BP) — After deployment, move up to maximum Ground Speed before the game starts.

**Heavy Weapons Specialist** (+4 BP) — If your Robot has a weapon with a larger Silhouette than the Robot's own, add +2 dice when attacking with it.

**Disarm** (+3 BP) — When making a Melee Attack, you may instead make an opposed Training Check to end a target's Grab on a piece of Equipment. If your hits exceed theirs, that Grab ends and the Equipment may be Dropped.

---

## General Talents

**Last Stand** (+4 BP) — When this Pilot's HP is at 10% or less (rounded up, minimum 1), add +3 dice to all attack rolls.

**Shield Rider** (+3 BP) — While the Robot has Shields remaining, this Pilot's Strain Threshold is increased by +2.

**Evasive Instinct** (+3 BP) — When this Pilot's Robot has Inertia > 0, add Inertia as bonus dice to Boost Dodge Reactions.

---

## Strain-Keyed Talents

**Berserker Protocol** (+6 BP) — When this Pilot is beyond their Strain Threshold, they may add dice equal to Strain Token count to any attack roll they make. The Pilot takes damage equal to the dice added.

**Combat Instinct** (+5 BP) — When this Pilot has Strain Tokens, add dice equal to Strain Token count to any rolls made as part of taking a Reaction. The Pilot takes +1 damage per Reaction taken while over Mental threshold.

**Override** (+4 BP) — When making an Emergency Shutdown check, roll additional dice equal to Strain Token count as bonus dice, hits on 5+ as normal. On any check made with this talent, the Pilot takes 1 damage after the check resolves.

---

## Strain Threshold Summary

For reference, all modifiers that affect the Pilot Strain Threshold stack as follows:

**Base threshold** = Mental (or Physical if Neural Link is active)
**+ Calm Under Fire**: +2 always
**+ Coordinated**: replace base with (base × 1.5) while HP > half
**+ Shield Rider**: +2 while Shields > 0
**+ Commander (force-wide)**: +1 while any conscious Commander is on your force
These are cumulative. A pilot with Neural Link (Physical base), Calm Under Fire, and Shield Rider active would have: Physical + 2 + 2 = Physical + 4.

# Chapter 12: Equipment Keywords

Equipment is defined by Keywords. Keywords with **(W)** designate Equipment as a Weapon. Keywords with **(M)** may be taken multiple times.

**Equipment costs** = number of Keywords x Silhouette in BP.
**Max Keywords** = 3 x Equipment Silhouette.
**Equipment Weight** = its Silhouette (unless modified). Base weight before any keyword modifications = Sil.
**Equipment Armor** = 5 (default). Base armor before any keyword modifications = 5. Immune to Burst damage.

**Equipment Silhouette cap** — Equipment may not have a Silhouette greater than twice the wielding Robot's Silhouette. A Sil 4 Robot may equip weapons up to Sil 8; a Sil 9 weapon is too large to be wielded or mounted.

Weapons may not be used to Block.

## Order of Operations

When computing an equipment's final stats by hand, apply keyword modifiers in the following order so that you reach the same result as the app:

1. **Damage**: base (Melee or Ranged → +Sil) → Edge (+Sil) → Energy Edge (+Sil) → Scatter override (sets base damage before additions to 2×Sil) → Energy Weapon (+2×Sil per instance) → Overcharged (+Sil per instance) → Limited Ammo (+2×Sil) → Two-handed (×2, applied last)
2. **Range**: Ranged base (Sil×3) → Extended Range (+Sil per instance, additive) → Long Range (×2, applied last)
3. **Weight**: base = Sil → Energy Weapon (melee) sets weight = weight/3 → Extended Magazine (+1 per instance) → Armored (+1 per instance)
4. **Ammo**: computed only if Limited Ammo is present → Sil/2 × (1 + Extended Magazine count)
5. **Power**: each instance applies separately; Energy Weapon power scales with Sil; Energy Edge and Power Cell are flat

When calculating damage from Keywords, multiplication occurs after all other modifications, except in base damage replacement which always occurs before all other modifications.

---

## Weapon Type Keywords

**Melee (W)** — Weapon may be used in Melee. Deals Silhouette in Damage. Immune to Physical Damage.

**Ranged (W)** — Weapon is a Ranged Weapon. Range = Sil x 3. Deals Silhouette in Damage.

---

## Damage Modifier Keywords

**Edge** — +Sil Damage. Requires Melee.

**Energy Edge** — Damage counts as Energy instead of Physical. +Sil Damage. Power -5. Immune to Energy Damage while Parrying. Requires Edge. Cannot combine with Energy Weapon.

**Energy Weapon (M)** — Damage is Energy. +2 Damage x Sil per instance. Melee Energy Weapons are immune to Energy Damage and weight is divided by 3. Energy Weapons impart no Inertia. Power: -5 x Sil per instance. Requires Melee or Ranged.

**Explosive** — Deals Damage to hit Component, half Damage to any attached Component. Pilot checks against half Damage received to cockpit-containing Component as Inertia. Requires Ranged.

**Scatter** — Base Damage = 2 × Sil Base Range = Sil × 2 (shorter than standard). Hits all targetable Components of target on success. **Targetable Components**: any Component on the target Robot with a facing the attacker can reach via line of fire. Requires Ranged. Cannot be combined with Long Range.

**Limited Ammo** — +2 × Sil Damage, but may only fire a limited number of times before the weapon is empty.

- **Formula**: maxAmmo = Sil/2 × (1 + Extended Magazine count). Each Extended Magazine instance adds another Sil/2 shots AND +1 Weight.

> *Example.* A Sil 4 weapon with Limited Ammo gets +8 damage but
> can only fire \`4 / 2 = 2\` times before it's empty. Adding
> the **Extended Magazine** keyword (see Utility Keywords)
> adds another half-Sil shots: Extended Magazine x1 on this Sil 4
> weapon brings the magazine to \`(4/2) × (1 + 1) = 4\` shots; x2
> gives \`(4/2) × (1 + 2) = 6\` shots; and so on. Each Extended
> Magazine instance also adds +1 Weight.

Requires Ranged.

**Two-handed** — Multiply Damage by 2 while held with two Manipulators. This multiplier is applied last, after all additive damage modifiers. Melee weapons may still be wielded one-handed but lose the multiplier. Requires Melee or Ranged; cannot be combined with Mount Point.

**Overcharged (M)** — +Sil × 3 Damage per instance. The weapon also takes Sil damage to itself each time it fires — this self-damage is applied per firing, not per instance of the keyword. Small weapons punch above their weight but burn out fast. Requires Ranged. If the weapon is destroyed by damage from resolving Overcharge, deal its damage as an Explosive attack on the attached Component; if it is mounted internally, bypass all armor for this attack.

**Penetrating (M)** — Each instance bypasses weapon Silhouette in Component Armor. If total bypass exceeds the Component's remaining Armor, Frame Components make a Frame Save; Non-Frame Components are destroyed outright. Requires Ranged.

---

## Range and Reach Keywords

**Extended Range (M)** — +Sil to Range per instance. Applied additively before Long Range. Requires Ranged.

**Long Range** — Double the weapon's Range (after keyword modifiers). Applied last, after all Extended Range additions. Minimum range equals the pre-doubled range. Requires Ranged.

**Reach Extender (M)** — +(Sil/2) to Weapon Reach per instance. Weapon Reach = Sil + (Reach Extender count × (Sil/2)). Requires Melee.

---

## Projectile Keywords

**Auto (M)** — May make one additonal Ranged Attack per instance of this keyword when firing. If firing at multiple targets, subtract -1 die from the attack pool for every target past the first. When firing on a single target, add +1 die per instance and +1 Damage per net hit. Requires Ranged.

**Burst** — Projectile explodes on impact, dealing Damage to everything within 1 SU per Silhouette. Pilot can target a specific map point for -2 dice (any hits succeed). Place a die at impact point and draw Lines of Fire from all horizontal faces. Cover applies as per normal. Requires Ranged.

**Indirect** — Ignore Lines of Fire; target any legal target within range. Minimum Range becomes 1/3 maximim range. Requires Ranged.

**Kinetic (M)** — Hits apply +1 Inertia per instance (does not increase Damage, but forces a Fortitude Check). Cannot be combined with Energy Weapon. Requires Ranged.

**Inertia Additive (M)** — +1 Inertia per instance added to a Melee hit. Does not increase Damage; affects Fortitude Checks only. Requires Melee.

---

## Mounting and Attachment Keywords

**Mount Point** — Equipment may be mounted on a Socket. Assumed to have no handle; cannot be operated if unmounted.

**Extending Grip** — Makes Mount Point equipment drawable/holsterable. May also be Grabbed. If a Weapon, treat the Mount Point as a Manipulator for calculating bonus dice from additional grabs. Requires Mount Point.

**Link Point** — May link to another piece of Equipment with Link Point. Linked Equipment is treated as one piece; Silhouette = greatest of its parts, but each piece calculates Damage from its own Sil. Requires one Link Point per attached piece. Linked Weapons of the same type(Melee/Ranged) can fire with one Attack check but deal damage as separate instances and take all the negatives provided by keywords. May only target within the largest minimum range and the smallest maximum range between the Linked weapons. Different typed weapons can be linked for ease of use, but may not be combined in the same attack. A piece of Linked Equipment has the greatest armor among its Equipment parts, and immediately loses any damage immunities aside from Energy-Reflective Coating.

**Tethered** — Equipment can mount to a Tether Socket, receiving Power and Fuel. Tethered Equipment cannot move outside the Robot's Reach; if it is dropped, the weapon token is placed within Reach after the Robot is moved.

---

## Utility Keywords

**Power Cell (M)** — +5 Power.

**Armored (M)** — +5 Equipment Armor per instance. +1 Weight per instance.

**Guard** — Equipment guards the Component it is grabbed by or attached to. If on a Core Mount Point, guards that facing. Guarding Equipment absorbs incoming damage up to its full armor pool **before** the guarded Component takes any. Once the Guard's armor is depleted, any excess damage passes through to the guarded Component as normal and the Guarding Equipment is destroyed. Guarding Equipment and weapons lose any damage immunities, except Energy Reflective coating if applied.

**Energy-Reflective Coating** — Equipment is immune to Energy Damage while Armor is at full.

**Module Slot** — Adds a Module Slot to this Equipment.

**Extended Magazine (M)** — Weapon may fire an additional (Sil/2) times before depleting, per instance. +1 Weight per instance. Requires Limited Ammo.

---

## Worked Example — Metal Sword

> **Building the Metal Sword** (Sil 4, keywords: Melee + Two-handed + Edge)
>
> 1. **Base stats**: weight = 4 (base = Sil), armor = 5.
> 2. **Melee**: +4 damage, weapon reach = 4. Immune to Physical damage.
> 3. **Edge**: +4 damage. Running total: 4 + 4 = 8.
> 4. **Two-handed**: multiply last. Damage = 8 × 2 = **16**.
> 5. **BP**: 3 keywords × Sil 4 = **12 BP**.
> 6. **Summary**: weight 4, armor 5, damage 16, reach 4, immune Physical, BP 12.

**Horizontal Framing** (Core only) — This Robot's Silhouette counts as half (rounded up) for all Line of Fire and cover calculations. The Robot is built wide or long rather than tall — think quadrupedal Zoids, low-slung tanks, or centaur frames. Full Silhouette is still used for construction, melee reach, collision damage, and all other purposes.

Robot construction is handled entirely by the URFS companion app. The app's builder walks you through the process of assembling Components, filling them with Modules, attaching Equipment, and assigning Pilots. Refer to the app for construction rules, point costs, and build validation.

## Overview

[Robot construction takes place **before the game begins**, during list building. You define the robot from the frame out: choose a Silhouette, set Frame Stats, assemble Components, fill each Component with Modules, attach Equipment, and assign Pilots. The result is a complete robot with fully derived stats — Ground Speed, Armor, Shields, Power budget, and BP cost — ready for the table. The companion app automates every formula in this chapter; the chapter exists so you can verify, override, or build by hand.]

## Silhouette

[A robot's **Silhouette** is its size, measured in Scale Units (SU) from the model. You choose a Silhouette before choosing anything else — it is the single number that scales the most derived stats. There is no minimum or maximum; use whatever fits your model.]

[Silhouette appears in: Ground Speed, Armor, Shields, Strain Threshold, Boost movement rate, melee Reach, collision damage, BP costs, and Equipment Silhouette cap. Getting it right matters more than any other single choice.]

> [editor's note: The Core Concepts chapter defines Silhouette as model-measured. This section is deliberately thin — it just points to Sil as the first choice and flags its downstream importance. If Tom wants construction to define Sil or just reference Ch. 2, cut the first paragraph here.]

## Frame Stats

[A robot has three Frame Stats set at construction. They define the durability and quality of the robot's chassis.]

| Stat | Abbreviation | Range | Role |
|---|---|---|---|
| [Frame Strength] | [FS] | [≥ 1, no cap] | [Max Load, melee damage, throw range] |
| [Frame Durability] | [FD] | [≥ 1, no cap] | [Dice pool for Frame Saves; counts toward BP] |
| [Frame Material] | [FM] | [1 – 4] | [Hit threshold for Frame Saves: 7 − FM] |

[**Frame Strength** is a robot-wide stat. It is not per-component. All formulas that reference "Robot Strength" (melee damage, throw range) use Frame Strength, applied once per participating arm.]

[**Frame Durability** is the number of d6 rolled when a Frame Component makes a Frame Save. Higher FD gives more chances to absorb damage after Armor is stripped.]

[**Frame Material** sets the hit threshold on those dice. FM 1 = needs 6+; FM 2 = needs 5+; FM 3 = needs 4+; FM 4 = needs 3+. A Frame Save is: roll FD d6, count hits on (7 − FM)+. See Ch. 6.]

[Frame Material is capped at 4. Frame Strength and Frame Durability have no upper limit beyond what you can afford in BP.]

> [editor's note: These three stats currently appear in the Frame Save formula (Ch. 6) and the Quick Reference without being defined anywhere in the rulebook body. The gap audit flags them as \`GAP_TERM\`. This section closes all three definitions.]

## Components

[A robot is assembled from **Components**. Every robot must have exactly one **Core**. All other Components are optional but must attach (directly or through a chain) to the Core.]

[**Component types:**]

| Type | Description |
|---|---|
| [**CORE**] | [Torso/chassis. Required. Has all 6 Facings. Required for Shield Generators and most utility modules.] |
| [**HEAD**] | [Sensor / targeting hub. Enables Head Shared Facings coordination between Arms (see Ch. 2).] |
| [**ARM**] | [Weapon-bearing or manipulation limb. Required to wield Equipment or Grapple.] |
| [**LEG**] | [Locomotion. Required for Ground Speed, Crouch, and Step.] |
| [**UTILITY**] | [Additional mounting point. Non-Frame — destroyed at Armor 0, no Frame Save. Module cap same as Core.] |

[**Frame vs. Non-Frame:** Core, ARM, HEAD, and LEG components are Frame components — they make a Frame Save when Armor is depleted. UTILITY components are Non-Frame — destroyed when Armor reaches 0, no save.]

[**Parent-child hierarchy:** Each non-Core Component must attach to a parent Component. A Component that is destroyed removes all its children from play as well. There is no limit on how many Components can share the same parent (subject to facing availability).]

> [editor's note: The rules don't explicitly limit robot Component count, only BP and slot space. The app has no hard cap. If Tom wants a hard cap (e.g. max 8 Components per robot), this is where it would go.]
