    ` : ""}
    ${(c.equipment || []).length > 0 ? `
      <div class="label-small" style="margin-top:10px">EQUIPMENT</div>
      ${c.equipment.map((e, i) => {
        const broken = e.armorCurrent <= 0;
        return `
        <div class="card tight"${broken ? ` style="opacity:0.6"` : ""}>
          <div class="row-between">
            <strong${broken ? ` style="text-decoration:line-through"` : ""}>${escapeHtml(e.name || ("Equipment " + (i+1)))}</strong>
            <div class="row-gap">
              ${broken ? `<span class="chip red">BROKEN</span>` : ""}
              <span class="chip ${broken ? "red" : e.armorCurrent < e.armorMax ? "amber" : "muted"}">ARM ${e.armorCurrent}/${e.armorMax}</span>
            </div>
          </div>
          <div class="row-gap" style="margin-top:6px">
            <button class="btn ghost" data-act="bump-eq-arm" data-id="${rid}" data-cid="${cid}" data-ei="${i}" data-d="-1" ${broken ? "disabled" : ""}>${broken ? "DAMAGED" : "DAMAGE −1"}</button>
            <button class="btn ghost" data-act="repair-eq" data-id="${rid}" data-cid="${cid}" data-ei="${i}" ${e.armorCurrent >= e.armorMax ? "disabled" : ""}>REPAIR</button>
          </div>
        </div>`;
      }).join("")}
    ` : ""}
    <div class="actions"><button class="btn ghost" data-act="comp-sheet-done">DONE</button></div>
  `;
};
handlers["comp-sheet-done"] = () => {
  closeModal();
  // Scroll schematic back into view so user lands with context, not at page top.
  requestAnimationFrame(() => {
    const el = document.querySelector(".schematic-wrap");
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  });
};
handlers["bump-comp-hp"] = ({ id, cid, d }) => {
  const rid = Number(id);
  const cidNum = Number(cid);
  const r = findBattleRobot(state.activeBattle, rid);
  const c = r.components.find(x => x.componentId === cidNum);
  if (!c) return;
  const delta = parseInt(d, 10);
  if (delta < 0 && c.hpMax > 0 && (c.hpCurrent + delta) <= 0) {
    // Decrement would reach 0 — route through pipeline so Frame Save fires.
    applyDamage(rid, cidNum, Math.abs(delta), "Manual", {});
    // applyDamage calls dbPut + render internally; just reopen the sheet.
    pushModal("comp-sheet", { id: rid, cid: cidNum });
    return;
  }
  c.hpCurrent = Math.max(0, Math.min(c.hpMax, c.hpCurrent + delta));
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: rid, cid: cidNum });
};
handlers["repair-comp"] = ({ id, cid }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.hpCurrent = c.hpMax;
  // Only restore if not destroyed; destruction needs explicit UNDO
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["restore-comp"] = ({ id, cid }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.isDestroyed = false;
  c.hpCurrent = c.hpMax;
  // Per alpha.356: cascade collateral (stowed children, fuel-spilled
  // siblings, dropped equipment) is NOT auto-rewound — the player taps
  // each one if they want it back. This restore just clears the host
  // flag, refills its armor, and re-derives shields/cap/strain so the
  // pools snap back to include this component's modules again.
  recomputeDerivedStats(r);
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["toggle-mod"] = ({ id, cid, mi }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  const m = c.modules[parseInt(mi, 10)];
  const def = MODULES_BY_ID[m.moduleId];
  const turningOn = m.toggledOn === false;
  // ON requires: fuel ≥ activation cost, and net power balance stays ≥ 0
  // after activating (def.power is negative for consumers, positive for
  // reactors). OFF flips are always allowed — they free fuel/power back.
  if (turningOn) {
    const fuelCost = def?.fuelToActivate || 0;
    if (fuelCost > 0 && (r.fuelCurrent ?? 0) < fuelCost) {
      showToast(`Not enough fuel (need ${fuelCost}, have ${r.fuelCurrent || 0}).`);
      return;
    }
    // Power: sum of `power` across all ACTIVE non-destroyed modules
    // (toggleable + currently on, or non-toggleable). Then check the
    // candidate's power contribution doesn't push net < 0.
    let netPower = 0;
    for (const comp of (r.components || [])) {
      if (comp.isDestroyed) continue;
      for (const mod of (comp.modules || [])) {
        const mdef = MODULES_BY_ID[mod.moduleId];
        if (!mdef) continue;
        const on = mdef.toggleable ? (mod.toggledOn !== false) : true;
        if (on) netPower += (mdef.power || 0);
      }
    }
    const candidatePower = def?.power || 0;
    if (netPower + candidatePower < 0) {
      showToast(`Not enough power (would drop net to ${netPower + candidatePower}).`);
      return;
    }
    if (fuelCost > 0) r.fuelCurrent = (r.fuelCurrent ?? 0) - fuelCost;
  }
  m.toggledOn = turningOn;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["bump-eq-arm"] = ({ id, cid, ei, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (!e) return;
  e.armorCurrent = Math.max(0, Math.min(e.armorMax, e.armorCurrent + parseInt(d, 10)));
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["repair-eq"] = ({ id, cid, ei }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (!e) return;
  e.armorCurrent = e.armorMax;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};

function stepperDialog(title, value, brief, bumpAct, rid) {
  return `
    <h2>${title}</h2>
    <p>${escapeHtml(brief)}</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-${bumpAct}" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${value}</strong>
      <button class="btn ghost" data-act="bump-${bumpAct}" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
}

<script>
// ════════════════════════════════════════════════════════════════════
// 2D SCHEMATIC RENDERER
// Port of android/ui/garage/builder/SchematicRenderer.kt — BFS from
// Core, facing-offset placement, perpendicular sibling spread, post-
// pass collision resolution (alpha.348 fix), mirror convention
// (viewer's right = robot's LEFT).
//
// Returns an HTML string. Callers pass `mode = "build" | "battle"` to
// choose what's bound to each tile's click (open module editor vs
// open damage sheet) and what color rules apply.
// ════════════════════════════════════════════════════════════════════
const SCH_NODE_W = 100, SCH_NODE_H = 56;
const SCH_SPACING_X = 130, SCH_SPACING_Y = 90;
const SCH_PADDING = 24;

// Mirror convention: robot's LEFT side is on the viewer's RIGHT.
// Matches SchematicRenderer.kt facingOffset().
function facingOffset(facing) {
  switch (facing) {
    case "TOP":    return [ 0, -1];
    case "BOTTOM": return [ 0,  1];
    case "FRONT":  return [ 1, -1];
    case "BACK":   return [-1,  1];
    case "RIGHT":  return [-1,  0];
    case "LEFT":   return [ 1,  0];
    default:       return [ 1, -1];
  }
}
// Perpendicular sibling spread — same formula as Kotlin
// perpendicularOffsets(n).
function perpendicularOffsets(n) {
  if (n <= 1) return [0];
  if (n % 2 === 0) {
    const half = n / 2;
    const arr = [];
    for (let i = -half; i <= -1; i++) arr.push(i);
    for (let i =  1; i <=  half; i++) arr.push(i);
    return arr;
  }
  const half = Math.floor(n / 2);
  const arr = [];
  for (let i = -half; i <= half; i++) arr.push(i);
  return arr;
}

function computeSchematicLayout(components) {
  // Build child-of-parent index. Each component is a battle/build
  // component shape — we use tempId/componentId interchangeably (caller
  // normalizes).
  const idOf = c => c._id;
  const byParent = new Map();
  for (const c of components) {
    const p = c._parentId;
    if (!byParent.has(p)) byParent.set(p, []);
    byParent.get(p).push(c);
  }
  const core = components.find(c => c.definition === "CORE") || components[0];
  if (!core) return { nodes: [], minX: 0, minY: 0, maxX: 0, maxY: 0 };

  const positions = [];
  const queue = [{ comp: core, gridX: 0, gridY: 0 }];
  while (queue.length > 0) {
    const cur = queue.shift();
    positions.push(cur);
    const children = byParent.get(idOf(cur.comp)) || [];
    // Group by primary facing.
    const byFacing = new Map();
    for (const ch of children) {
      const f = ch.facing || "FRONT";
      if (!byFacing.has(f)) byFacing.set(f, []);
      byFacing.get(f).push(ch);
    }
    for (const [facing, siblings] of byFacing) {
      const [dx, dy] = facingOffset(facing);
      const perpX = -dy, perpY = dx;
      const offsets = perpendicularOffsets(siblings.length);
      siblings.forEach((ch, idx) => {
        const perp = offsets[idx];
        queue.push({
          comp: ch,
          gridX: cur.gridX + dx + perpX * perp,
          gridY: cur.gridY + dy + perpY * perp,
        });
      });
    }
  }

  // Collision resolution pass (alpha.348 fix). Walk later occupants
  // perpendicular to the parent-link direction until they hit a free
  // cell.
  const occupied = new Set();
  const cellKey = (x, y) => `${x},${y}`;
  for (let i = 0; i < positions.length; i++) {
    let { gridX, gridY } = positions[i];
    if (!occupied.has(cellKey(gridX, gridY))) {
      occupied.add(cellKey(gridX, gridY));
      continue;
    }
    const parent = positions.find(p => idOf(p.comp) === positions[i].comp._parentId);
    let [dx, dy] = parent ? [gridX - parent.gridX, gridY - parent.gridY] : [1, 0];
    dx = Math.sign(dx) || 0; dy = Math.sign(dy) || 0;
    const perpX = -dy || 1, perpY = dx || 0;
    let step = 1;
    let nx = gridX, ny = gridY;
    while (occupied.has(cellKey(nx, ny))) {
      const sign = step % 2 === 1 ? 1 : -1;
      const mag = Math.floor((step + 1) / 2);
      nx = gridX + perpX * sign * mag;
      ny = gridY + perpY * sign * mag;
      step++;
      if (step > 20) break;
    }
    occupied.add(cellKey(nx, ny));
    positions[i] = { ...positions[i], gridX: nx, gridY: ny };
  }

  const minX = Math.min(...positions.map(p => p.gridX));
  const maxX = Math.max(...positions.map(p => p.gridX));
  const minY = Math.min(...positions.map(p => p.gridY));
  const maxY = Math.max(...positions.map(p => p.gridY));
  return { nodes: positions, minX, maxX, minY, maxY };
}

/**
 * Render a 2D schematic from a list of components (battle OR build
 * shape). Each component must have:
 *   _id           : stable component identifier
 *   _parentId     : id of parent, or null for Core
 *   definition    : "CORE" / "HEAD" / "ARM" / "LEG" / "UTILITY"
 *   facing        : "FRONT" / "BACK" / ...
 *   name          : display name
 *   _hpRatio      : 0..1 (1 = full armor, 0 = destroyed)
 *   _destroyed    : boolean
 *   _hpLabel      : "8/8" or "—" etc.
 * Returns an HTML string. `mode` is "build" or "battle"; click action
 * dispatches `tapAct` with `{ id: _id }`.
 */
function renderSchematic(components, opts) {
  const o = Object.assign({ tapAct: "noop", selectedId: null }, opts || {});
  const layout = computeSchematicLayout(components);
  if (layout.nodes.length === 0) {
    return `<div class="meta" style="padding:12px; text-align:center; color:var(--on-surface-muted)">No components yet.</div>`;
  }
  const cols = layout.maxX - layout.minX + 1;
  const rows = layout.maxY - layout.minY + 1;
  const w = SCH_SPACING_X * cols + SCH_NODE_W + 2 * SCH_PADDING;
  const h = SCH_SPACING_Y * rows + SCH_NODE_H + 2 * SCH_PADDING;
  const originX = SCH_PADDING - layout.minX * SCH_SPACING_X;
  const originY = SCH_PADDING - layout.minY * SCH_SPACING_Y;

  // Sort positions so front-row (smaller gridY) draws last → on top
  // for click priority (alpha.348 parity).
  const drawOrder = layout.nodes.slice().sort((a, b) => {
    if ((a.comp._parentId === null) !== (b.comp._parentId === null))
      return a.comp._parentId === null ? -1 : 1;
    if (a.gridY !== b.gridY) return b.gridY - a.gridY;
    return a.gridX - b.gridX;
  });

  // Build the connection-line SVG.
  const lines = [];
  for (const n of layout.nodes) {
    const parent = layout.nodes.find(p => p.comp._id === n.comp._parentId);
    if (!parent) continue;
    const x1 = originX + parent.gridX * SCH_SPACING_X + SCH_NODE_W / 2;
    const y1 = originY + parent.gridY * SCH_SPACING_Y + SCH_NODE_H / 2;
    const x2 = originX + n.gridX * SCH_SPACING_X + SCH_NODE_W / 2;
    const y2 = originY + n.gridY * SCH_SPACING_Y + SCH_NODE_H / 2;
    lines.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#5a6c80" stroke-width="2"/>`);
  }

  const nodeHtml = drawOrder.map(n => {
    const c = n.comp;
    const left = originX + n.gridX * SCH_SPACING_X;
    const top  = originY + n.gridY * SCH_SPACING_Y;
    let cls = "sch-node " + (c.definition || "").toLowerCase();
    if (c._destroyed) cls += " dead";
    else if (c._hpRatio < 0.33) cls += " bad";
    else if (c._hpRatio < 0.66) cls += " warn";
    if (o.selectedId === c._id) cls += " selected";
    const labelChip = c._parentId == null ? "" : `
      <div class="sch-facing" style="left: ${left + SCH_NODE_W / 2}px; top: ${top + SCH_NODE_H - 4}px">
        ${escapeHtml(c.facing || "?")}
      </div>
    `;
    return `
      ${labelChip}
      <div class="${cls}" style="left:${left}px; top:${top}px"
           data-act="${o.tapAct}" data-id="${c._id}" data-rid="${o.rid || ""}">
        <div class="def">${defAbbr2(c.definition)}</div>
        <div class="nm">${escapeHtml(c.name)}</div>
        <div class="hp">${escapeHtml(c._hpLabel || "")}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="schematic-wrap" style="height: ${Math.min(h, 380)}px">
      <div class="schematic-grid" style="width: ${w}px; height: ${h}px">
        <svg width="${w}" height="${h}">${lines.join("")}</svg>
        ${nodeHtml}
      </div>
    </div>
  `;
}
function defAbbr2(d) {
  return ({ CORE: "COR", HEAD: "HEA", ARM: "ARM", LEG: "LEG", UTILITY: "UTL" })[d] || (d || "?").slice(0, 3);
}

// ─ Adapters: normalize a build-shape robot or a battle robot to the
//   schematic data contract.
function robotToSchemNodes(robot) {
  // Build shape uses tempId + parentTempId. Inferred chain: every
  // non-core component without an explicit parent attaches to the
  // core.
  const core = (robot.components || []).find(c => c.definition === "CORE");
  return (robot.components || []).map(c => {
    const isCore = c === core;
    return {
      _id: c.tempId,
      _parentId: isCore ? null : (c.parentTempId ?? (core ? core.tempId : null)),
      definition: c.definition,
      facing: c.facing,
      name: c.name || c.definition,
      _hpRatio: 1,
      _destroyed: false,
      _hpLabel: "",
    };
  });
}
function battleRobotToSchemNodes(r) {
  const core = r.components.find(c => c.definition === "CORE");
  return r.components.map(c => {
    const isCore = c === core;
    const ratio = c.hpMax > 0 ? c.hpCurrent / c.hpMax : 1;
    const label = c.isDestroyed ? "DEAD" : c.hpMax === 0 ? "—" : `${c.hpCurrent}/${c.hpMax}`;
    return {
      _id: c.componentId,
      _parentId: isCore ? null : (c.parentComponentId ?? (core ? core.componentId : null)),
      definition: c.definition,
      facing: c.facing,
      name: c.name || c.definition,
      _hpRatio: ratio,
      _destroyed: !!c.isDestroyed,
      _hpLabel: label,
    };
  });
}
handlers["noop"] = () => {};
handlers["edit-component-from-schem"] = ({ rid, id }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(id) });
};
handlers["open-comp-from-schem"] = ({ rid, id }) => {
  pushModal("comp-sheet", { id: Number(rid), cid: Number(id) });
};
handlers["toggle-schem3d"] = ({ rid }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  if (r) { r._schematic3D = !r._schematic3D; dbPut("robots", r); render(); }
};
handlers["toggle-schem3d-battle"] = ({ rid }) => {
  const r = findBattleRobot(state.activeBattle, Number(rid));
  if (r) { r._schematic3D = !r._schematic3D; dbPut("battles", state.activeBattle); render(); }
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// 3D SCHEMATIC RENDERER
// Hand-rolled orthographic projection, painter's-algorithm depth sort,
// PointerEvent orbit + pinch, wheel zoom, tap-to-select.
// No external dependencies.
// ════════════════════════════════════════════════════════════════════

// World-space box size per definition (x-width, y-height, z-depth).
const DEF_SIZE = {
  CORE:    [52, 52, 52],
  HEAD:    [36, 36, 28],
  ARM:     [28, 44, 22],
  LEG:     [32, 50, 28],
  UTILITY: [30, 30, 22],
};
const DEF_DEFAULT = [32, 36, 24];

// Face colours per definition (base, light-face, dark-face multiplier).
const DEF_COLOR = {
  CORE:    "#4dd0e1",
  HEAD:    "#ef5350",
  ARM:     "#4ece71",
  LEG:     "#ffb347",
  UTILITY: "#8da0b6",
};
const GAP3D = 10;

// Facing → world direction vector.
function facing3D(f) {
  switch (f) {
    case "FRONT":  return [ 0, 0,  1];
    case "BACK":   return [ 0, 0, -1];
    case "LEFT":   return [-1, 0,  0];
    case "RIGHT":  return [ 1, 0,  0];
    case "TOP":    return [ 0, 1,  0];
    case "BOTTOM": return [ 0,-1,  0];
    default:       return [ 0, 0,  1];
  }
}

// Build {id → {pos:[x,y,z], size:[w,h,d]}} world layout from component list.
function build3DLayout(components) {
  const byId = new Map(components.map(c => [c._id, c]));
  const byParent = new Map();
  for (const c of components) {
    const p = c._parentId;
    if (!byParent.has(p)) byParent.set(p, []);
    byParent.get(p).push(c);
  }
  const core = components.find(c => c.definition === "CORE") || components[0];
  if (!core) return new Map();

  const placed = new Map();
  placed.set(core._id, { pos: [0, 0, 0], size: (DEF_SIZE[core.definition] || DEF_DEFAULT).slice() });

  const queue = [core._id];
  while (queue.length) {
    const pid = queue.shift();
    const pp = placed.get(pid);
    if (!pp) continue;
    const children = byParent.get(pid) || [];
    // Group by facing so we can spread siblings perpendicular.
    const byFacing = new Map();
    for (const ch of children) {
      const f = ch.facing || "FRONT";
      if (!byFacing.has(f)) byFacing.set(f, []);
      byFacing.get(f).push(ch);
    }
    for (const [facing, siblings] of byFacing) {
      const dir = facing3D(facing);
      const sz = DEF_SIZE[byId.get(pid)?.definition] || DEF_DEFAULT;
      // perpendicular spread axis: if dir is along Z, spread along X; if X, spread along Z; if Y, spread along X.
      let perpAxis = 0;
      if (Math.abs(dir[2]) > 0.5) perpAxis = 0; // spread X
      else if (Math.abs(dir[0]) > 0.5) perpAxis = 2; // spread Z
      else perpAxis = 0;
      const n = siblings.length;
      const halfSpread = (n - 1) / 2;
      siblings.forEach((ch, i) => {
        const cSz = (DEF_SIZE[ch.definition] || DEF_DEFAULT).slice();
        const parentHalf = sz[dir[0] !== 0 ? 0 : dir[1] !== 0 ? 1 : 2] / 2;
        const childHalf  = cSz[dir[0] !== 0 ? 0 : dir[1] !== 0 ? 1 : 2] / 2;
        const offset = (i - halfSpread) * (cSz[perpAxis] + GAP3D);
        const pos = [
          pp.pos[0] + dir[0] * (parentHalf + childHalf + GAP3D) + (perpAxis === 0 ? offset : 0),
          pp.pos[1] + dir[1] * (parentHalf + childHalf + GAP3D),
          pp.pos[2] + dir[2] * (parentHalf + childHalf + GAP3D) + (perpAxis === 2 ? offset : 0),
        ];
        placed.set(ch._id, { pos, size: cSz });
        queue.push(ch._id);
      });
    }
  }
  return placed;
}

// Project a 3D point to canvas 2D, given camera angles and scale.
function project(x, y, z, rotY, rotX, scale, cx, cy) {
  // Yaw
  const cy_ = Math.cos(rotY), sy_ = Math.sin(rotY);
  const x1 = x * cy_ - z * sy_;
  const z1 = x * sy_ + z * cy_;
  // Pitch
  const cx_ = Math.cos(rotX), sx_ = Math.sin(rotX);
  const y2 = y * cx_ - z1 * sx_;
  // Orthographic project (flip y for canvas)
  return [cx + x1 * scale, cy - y2 * scale];
}

// Lighten/darken a hex colour by a ratio.
function tintColor(hex, ratio) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const t = v => Math.min(255, Math.max(0, Math.round(v * ratio)));
  return `rgb(${t(r)},${t(g)},${t(b)})`;
}

// Draw a single cuboid face (convex polygon) on ctx.
function drawFace(ctx, pts, fill, strokeW) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.45)";
  ctx.lineWidth = strokeW;
  ctx.stroke();
}

// Draw a single component as a depth-sorted cuboid.
function drawBox(ctx, corners2d, baseColor, selected, dead, hpRatio) {
  // corners2d: array of 8 projected points [tlf, trf, brf, blf, tlb, trb, brb, blb]
  // (front face = 0-3, back face = 4-7)
  // For painter's algorithm we just draw 3 visible faces: top, right, front
  // (visible depends on camera angle; we always draw all 3, painter's algo handles order).
  const alpha = dead ? 0.35 : 1;
  const base = dead ? "#555" : (hpRatio < 0.33 ? "#ef5350" : hpRatio < 0.66 ? "#ffb347" : baseColor);
  const light  = tintColor(base, 1.35);
  const mid    = tintColor(base, 0.85);
  const dark   = tintColor(base, 0.55);

  const sw = selected ? 2.5 : 1;
  ctx.globalAlpha = alpha;

  // Bottom face (y-down)
  drawFace(ctx, [corners2d[3], corners2d[2], corners2d[6], corners2d[7]], dark, sw);
  // Back face
  drawFace(ctx, [corners2d[4], corners2d[5], corners2d[6], corners2d[7]], dark, sw);
  // Left face
  drawFace(ctx, [corners2d[0], corners2d[4], corners2d[7], corners2d[3]], mid, sw);
  // Right face
  drawFace(ctx, [corners2d[1], corners2d[5], corners2d[6], corners2d[2]], mid, sw);
  // Front face
  drawFace(ctx, [corners2d[0], corners2d[1], corners2d[2], corners2d[3]], light, sw);
  // Top face
  drawFace(ctx, [corners2d[0], corners2d[1], corners2d[5], corners2d[4]], light, sw);

  if (selected) {
    // Highlight rim on front + top
    ctx.strokeStyle = "#4dd0e1";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(corners2d[0][0], corners2d[0][1]);
    for (const p of [corners2d[1], corners2d[2], corners2d[3], corners2d[0], corners2d[4], corners2d[5], corners2d[1]]) ctx.lineTo(p[0], p[1]);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

// Get 8 corners of a box centred at (px, py, pz) with half-extents hx,hy,hz.
function boxCorners(px, py, pz, hx, hy, hz, rotY, rotX, scale, cx, cy) {
  const verts = [
    [-hx,  hy,  hz], [ hx,  hy,  hz], [ hx, -hy,  hz], [-hx, -hy,  hz],
    [-hx,  hy, -hz], [ hx,  hy, -hz], [ hx, -hy, -hz], [-hx, -hy, -hz],
  ];
  return verts.map(([x, y, z]) => project(px+x, py+y, pz+z, rotY, rotX, scale, cx, cy));
}

// Full 3D draw pass.
function draw3D(canvas, components, placed, cam, selectedId, tapAct, rid) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;

  // Build draw list with depth key = avg camera-space z.
  const items = components.map(c => {
    const p = placed.get(c._id);
    if (!p) return null;
    const [px, py, pz] = p.pos;
    const cy_ = Math.cos(cam.rotY), sy_ = Math.sin(cam.rotY);
    const cx_ = Math.cos(cam.rotX), sx_ = Math.sin(cam.rotX);
    const z1 = px * sy_ + pz * cy_;
    const depth = z1 * cx_;
    return { c, p, depth };
  }).filter(Boolean);

  // Back-to-front (painter's).
  items.sort((a, b) => a.depth - b.depth);

  // Store projected centers for hit-test.
  canvas._centers = [];
  for (const { c, p } of items) {
    const [px, py, pz] = p.pos;
    const [sw, sh, sd] = p.size;
    const corners = boxCorners(px, py, pz, sw/2, sh/2, sd/2, cam.rotY, cam.rotX, cam.scale, cx, cy);
    const base = DEF_COLOR[c.definition] || "#8da0b6";
    drawBox(ctx, corners, base, c._id === selectedId, !!c._destroyed, c._hpRatio ?? 1);

    // Label
    const [sx, sy] = project(px, py, pz, cam.rotY, cam.rotX, cam.scale, cx, cy);
    ctx.globalAlpha = 0.9;
    ctx.font = "bold 9px ui-monospace,monospace";
    ctx.fillStyle = "#d6e3f0";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText((c.name || c.definition || "?").slice(0, 8), sx, sy);
    ctx.globalAlpha = 1;

    canvas._centers.push({ id: c._id, sx, sy, tapAct, rid });
  }
}

// Attach pointer/wheel/pinch interaction to a canvas3d element.
// cam is a mutable camera object shared per canvas.
function attach3DInteraction(canvas, components, placed, cam, getSelectedId, setSelectedId, redraw) {
  let ptrState = null;
  let lastPinchDist = null;

  canvas.addEventListener("pointerdown", e => {
    canvas.setPointerCapture(e.pointerId);
    ptrState = { x: e.clientX, y: e.clientY, moved: false, id: e.pointerId };
  });

  canvas.addEventListener("pointermove", e => {
    if (!ptrState || ptrState.id !== e.pointerId) return;
    const dx = e.clientX - ptrState.x;
    const dy = e.clientY - ptrState.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) ptrState.moved = true;
    cam.rotY += dx * 0.008;
    cam.rotX = Math.max(-1.3, Math.min(1.3, cam.rotX + dy * 0.008));
    ptrState.x = e.clientX; ptrState.y = e.clientY;
    redraw();
  });

  canvas.addEventListener("pointerup", e => {
    if (!ptrState || ptrState.id !== e.pointerId) return;
    if (!ptrState.moved && canvas._centers) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
      const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
      let best = null, bestD = 30 * 30;
      for (const item of canvas._centers) {
        const d = (item.sx - mx) ** 2 + (item.sy - my) ** 2;
        if (d < bestD) { bestD = d; best = item; }
      }
      if (best) setSelectedId(best.id, best.tapAct, best.rid);
    }
    ptrState = null;
  });

  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    cam.scale = Math.max(0.3, Math.min(3.0, cam.scale * (e.deltaY > 0 ? 0.92 : 1.09)));
    redraw();
  }, { passive: false });

  // Pinch via two simultaneous pointers.
  const touches = new Map();
  canvas.addEventListener("pointerdown", e => { touches.set(e.pointerId, { x: e.clientX, y: e.clientY }); });
  canvas.addEventListener("pointermove", e => {
    touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (touches.size === 2) {
      const [a, b] = [...touches.values()];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (lastPinchDist !== null) {
        const ratio = dist / lastPinchDist;
        cam.scale = Math.max(0.3, Math.min(3.0, cam.scale * ratio));
        redraw();
      }
      lastPinchDist = dist;
    } else {
      lastPinchDist = null;
    }
  });
  canvas.addEventListener("pointerup",   e => { touches.delete(e.pointerId); if (touches.size < 2) lastPinchDist = null; });
  canvas.addEventListener("pointercancel", e => { touches.delete(e.pointerId); if (touches.size < 2) lastPinchDist = null; });
}

// Cameras keyed by robotId so orbit state survives re-renders within a session.
const _cam3D = {};

// Main entry: mount (or update) the 3D canvas inside `wrap`.
// wrap is a .schem3d-wrap div with data-rid, data-tapact, data-battle.
function mount3DSchematic(wrap) {
  const rid = wrap.dataset.rid;
  const tapAct = wrap.dataset.tapact;
  const isBattle = wrap.dataset.battle === "1";

  const robot = isBattle
    ? findBattleRobot(state.activeBattle, Number(rid))
    : state.robots.find(r => r.id === Number(rid));
  if (!robot) return;

  const nodes = isBattle ? battleRobotToSchemNodes(robot) : robotToSchemNodes(robot);
  const placed = build3DLayout(nodes);

  // Measure wrap to size canvas.
  const W = Math.max(wrap.clientWidth || 320, 200);
  const H = Math.min(W * 0.65, 380);

  let canvas = wrap.querySelector("canvas");
  if (!canvas) {
    canvas = document.createElement("canvas");
    wrap.appendChild(canvas);
  }
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  wrap.style.height   = H + "px";

  if (!_cam3D[rid]) {
    _cam3D[rid] = { rotY: 0.52, rotX: 0.44, scale: (W / 420) * 1.1 };
  }
  const cam = _cam3D[rid];

  // Scale canvas coords (dpr).
  const dctx = canvas.getContext("2d");
  dctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  let selectedId = wrap._selectedId || null;

  function redraw() {
    dctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw3D(canvas, nodes, placed, cam, selectedId, tapAct, rid);
  }

  function setSelectedId(id, act, r) {
    selectedId = id;
    wrap._selectedId = id;
    redraw();
    // Show ⚙ by re-dispatching the normal handler.
    if (act && act !== "noop") {
      const h = handlers[act];
      if (h) h({ rid: r, id });
    }
  }

  // Avoid double-binding events.
  if (!canvas._3dBound) {
    canvas._3dBound = true;
    attach3DInteraction(canvas, nodes, placed, cam, () => selectedId, setSelectedId, redraw);
  }

  redraw();
}

// Called by render() after DOM insertion to hook up all 3D wraps.
function mountAll3D() {
  document.querySelectorAll(".schem3d-wrap").forEach(wrap => mount3DSchematic(wrap));
}

// Wrap renderSchematic to optionally return 3D scaffold instead of 2D HTML.
// Returns HTML string (3D mode returns a canvas placeholder + toggle; JS mounts after insertion).
const _canvas3DSupported = (() => {
  try { return !!document.createElement("canvas").getContext("2d"); } catch { return false; }
})();

function renderSchematicWithToggle(components, opts, robot, isBattle) {
  const r = robot;
  const is3D = _canvas3DSupported && !!(r && r._schematic3D);
  const rid = opts.rid || "";
  const toggleAct = isBattle ? "toggle-schem3d-battle" : "toggle-schem3d";

  const toggle = _canvas3DSupported ? `
    <div class="schem-toggle-row">
      <span class="schem-toggle-chip ${!is3D ? 'active' : ''}" data-act="${toggleAct}" data-rid="${rid}">2D</span>
      <span class="schem-toggle-chip ${is3D ? 'active' : ''}"  data-act="${toggleAct}" data-rid="${rid}">3D</span>
    </div>
  ` : "";

  if (is3D) {
    return `
      ${toggle}
      <div class="schem3d-wrap" data-rid="${rid}" data-tapact="${opts.tapAct || 'noop'}" data-battle="${isBattle ? 1 : 0}"></div>
    `;
  }
  return toggle + renderSchematic(components, opts);
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PILOT ASSIGN MODAL
// ════════════════════════════════════════════════════════════════════
function renderPilotAssign(fid, assignments) {
  const f = state.forces.find(x => x.id === fid);
  if (!f) return `<h2>FORCE NOT FOUND</h2>`;
  const allSlots = forceCockpitSlots(f);
  const humanSlots = allSlots.filter(s => !s.isAi);

  // Empty-pilots guard: no pilots created yet but cockpit slots need filling.
  if (state.pilots.length === 0 && humanSlots.length > 0) {
    return `
      <h2>ASSIGN PILOTS</h2>
      <div class="meta" style="margin-bottom:12px">${escapeHtml(f.name)}</div>
      <p style="margin:16px 0">No pilots created yet. Create one in the Pilots tab first.</p>
      <div class="actions" style="margin-top:16px">
        <button class="btn ghost" data-act="cancel-pilot-assign" data-fid="${fid}">CANCEL</button>
        <button class="btn amber" data-act="open-pilots-tab">GO TO PILOTS</button>
      </div>
    `;
  }

  const assignedPilotIds = new Set(Object.values(assignments).filter(Boolean));

  let robotSections = "";
  for (const rid of f.robotIds || []) {
    const robot = state.robots.find(r => r.id === rid);
    if (!robot) continue;
    const slots = robotCockpitSlots(robot);
    if (slots.length === 0) continue;
    robotSections += `<div class="label-small" style="margin:12px 0 6px">${escapeHtml(robot.name || "Unnamed")}</div>`;
    for (const slot of slots) {
      const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
      if (slot.isAi) {
        robotSections += `
          <div class="list-card" style="margin-bottom:6px">
            <div style="flex:1">
              <div class="meta">${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)} · ${escapeHtml(slot.componentName)}</div>
              <span class="chip muted">A.I. Core (auto-piloted)</span>
            </div>
          </div>`;
      } else {
        const currentPilotId = assignments[slotKey] || "";
        // Pilots not assigned elsewhere (or assigned to this slot)
        const available = state.pilots.filter(p =>
          !assignedPilotIds.has(p.id) || p.id === currentPilotId
        );
        const opts = `<option value="">— Unassigned —</option>` +
          available.map(p =>
            `<option value="${p.id}" ${p.id === currentPilotId ? "selected" : ""}>${escapeHtml(p.name || "Pilot")} (${p.rank || ""})</option>`
          ).join("");
        robotSections += `
          <div class="list-card" style="margin-bottom:6px">
            <div style="flex:1">
              <div class="meta">${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)} · ${escapeHtml(slot.componentName)}</div>
              <select data-act="pilot-slot-changed" data-fid="${fid}" data-key="${slotKey}"
                style="margin-top:6px;width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:6px;border-radius:4px">
                ${opts}
              </select>
            </div>
          </div>`;
      }
    }
  }

  const allAssigned = humanSlots.every(s => {
    const k = `${s.robotId}:${s.componentId}:${s.slotIndex}`;
    return assignments[k];
  });
  const deployDisabled = allAssigned ? "" : "disabled";
  const deployClass = allAssigned ? "btn amber" : "btn amber disabled";
  const side = (state.modal && state.modal.data && state.modal.data.side) || "P1";
  const deployLabel = side === "P2" ? "ADD TO BATTLE" : "DEPLOY";

  return `
    <h2>ASSIGN PILOTS</h2>
    <div class="meta" style="margin-bottom:12px">${escapeHtml(f.name)}</div>
    ${robotSections}
    <div class="actions" style="margin-top:16px">
      <button class="btn ghost" data-act="cancel-pilot-assign" data-fid="${fid}">CANCEL</button>
      <button class="${deployClass}" data-act="confirm-pilot-assign" data-fid="${fid}" ${deployDisabled}>${deployLabel}</button>
    </div>
  `;
}

handlers["pilot-slot-changed"] = ({ fid, key }, value) => {
  if (!state.modal || state.modal.kind !== "pilot-assign") return;
  state.modal.data.assignments[key] = value || null;
  render();
};

handlers["confirm-pilot-assign"] = ({ fid }) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  const modalData = (state.modal && state.modal.data) || {};
  const assignments = modalData.assignments || {};
  const side = modalData.side || "P1";
  const slots = forceCockpitSlots(f);
  const humanSlots = slots.filter(s => !s.isAi);
  if (humanSlots.some(s => !assignments[`${s.robotId}:${s.componentId}:${s.slotIndex}`])) return;

  if (side === "P2") {
    // Add opponent robots to the existing active battle.
    const b = state.activeBattle;
    if (!b) return;
    const p2Robots = f.robotIds.map(rid => {
      const robot = state.robots.find(r => r.id === rid);
      if (!robot) return null;
      const bs = buildBattleRobotState(robot, "P2");
      bs.cockpitPilots = robotCockpitSlots(robot).map(slot => {
        const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
        return {
          componentId: slot.componentId,
          moduleIndex: slot.moduleIndex,
          slotIndex: slot.slotIndex,
          slotName: slot.slotName,
          pilotId: slot.isAi ? null : (assignments[slotKey] || null),
          isAi: slot.isAi,
          sysStrain: 0,
          pilotStrain: 0,
        };
      });
      return bs;
    }).filter(Boolean);
    for (const br of p2Robots) b.p2Robots.push(br);
    b.p2ForceId = f.id;
    b.p2ForceName = f.name;
    dbPut("battles", b);
    closeModal();
    render();
  } else {
    deployForceWithAssignments(f, assignments);
  }
};

handlers["cancel-pilot-assign"] = ({ fid }) => {
  pushModal("force-editor", { id: Number(fid) });
};

handlers["open-pilots-tab"] = () => {
  closeModal();
  state.tab = "pilots";
  render();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// MODAL ROUTER + INIT
// ════════════════════════════════════════════════════════════════════
function renderSettingsModal() {
  const rows = state.packs.map((p, i) => {
    const activeClass = p.active ? "chip" : "chip muted";
    return `
      <div style="padding:10px 0; border-bottom:1px solid var(--border)">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap">
          <div style="flex:1; min-width:0">
            <div style="font-size:13px; font-weight:700">${escapeHtml(p.name)}</div>
            <div class="meta">v${escapeHtml(p.version)} · ${(p.modules||[]).length} modules · ${(p.talents||[]).length} talents · ${(p.keywords||[]).length} keywords</div>
          </div>
          ${p.id === "urfs-core"
            ? `<span class="chip">CORE (always on)</span>`
            : `<button class="btn ghost" style="padding:5px 10px; font-size:11px" data-act="toggle-pack" data-idx="${i}">${p.active ? "DEACTIVATE" : "ACTIVATE"}</button>`}
        </div>
      </div>`;
  }).join("");
  return `
    <h2>CONTENT PACKS</h2>
    <div style="max-height:55vh; overflow-y:auto; margin:8px 0">${rows}</div>
    <label class="btn ghost wide" style="margin-top:10px; display:block; text-align:center; cursor:pointer">
      IMPORT PACK (JSON)
      <input type="file" accept="application/json,.json" style="display:none" id="pack-import-input">
    </label>
    <button class="btn ghost wide" style="margin-top:8px" data-act="close-modal">CLOSE</button>
  `;
}
handlers["open-settings"] = () => pushModal("settings", {});
handlers["toggle-pack"] = ({ idx }) => {
  const p = state.packs[Number(idx)];
  if (!p || p.id === "urfs-core") return;
  p.active = !p.active;
  rebuildContent();
  dbPut("settings", { id: "packs", value: state.packs });
  pushModal("settings", {});
};

function renderActionLog() {
  const b = state.activeBattle;
  const stack = b ? (b.undoStack || []) : [];
  const rows = stack.length === 0
    ? `<p style="color:var(--muted, #6b7c8d); margin:16px 0">No recorded actions yet.</p>`
    : [...stack].reverse().map((entry, revIdx) => {
        const realIdx = stack.length - 1 - revIdx;
        const t = new Date(entry.when);
        const ts = t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        return `<div style="display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border)">
          <div style="flex:1; min-width:0">
            <div style="font-size:13px; font-weight:600">${escapeHtml(entry.label)}</div>
            <div class="meta">${ts}</div>
          </div>
          <button class="btn ghost" style="padding:5px 10px; font-size:11px; flex-shrink:0" data-act="undo-battle-step" data-idx="${realIdx}">UNDO</button>
        </div>`;
      }).join("");
  return `
    <h2>ACTION LOG</h2>
    <div style="max-height:60vh; overflow-y:auto; margin-top:8px">${rows}</div>
    <button class="btn ghost wide" style="margin-top:14px" data-act="close-modal">CLOSE</button>
  `;
}

renderModal = function () {
  if (!state.modal) return "";
  const { kind, data } = state.modal;
  let body = "";
  switch (kind) {
    case "robot-editor":     body = renderRobotEditor(data.id); break;
    case "add-component":    body = renderAddComponent(data.rid); break;
    case "edit-component":   body = renderEditComponent(data.rid, data.cid); break;
    case "module-picker":    body = renderModulePicker(data.rid, data.cid); break;

const ONBOARDING_STEPS = [
  { title: "GARAGE — BUILD",    body: "Design your mechs. Add components, install modules, equip weapons. Each robot has a silhouette rating and a frame with defined sections." },
  { title: "FORCES — DEPLOY",   body: "Assemble robots into a force, assign pilots to cockpits, and set a BP cap. Hit DEPLOY to launch into battle with your squad." },
  { title: "BATTLE — RESOLVE",  body: "Track armor, fuel, actions, and pilot strain per robot. Use the action sheet to resolve attacks, maneuvers, and reactions each round." },
];
let _obStep = 0;
function renderOnboarding() {
  const s = ONBOARDING_STEPS[_obStep];
  const dots = ONBOARDING_STEPS.map((_, i) => `<div class="ob-dot${i === _obStep ? " active" : ""}"></div>`).join("");
  const isLast = _obStep === ONBOARDING_STEPS.length - 1;
  return `
    <div class="ob-card">
      <div class="ob-dots">${dots}</div>
      <h2>${s.title}</h2>
      <p>${s.body}</p>
      <button class="btn wide" id="ob-next-btn" style="background:var(--cyan);color:#07111a">${isLast ? "GET STARTED" : "NEXT"}</button>
    </div>`;
}
function showOnboarding() {
  _obStep = 0;
  const el = document.getElementById("onboarding-overlay");
  el.innerHTML = renderOnboarding();
  el.style.display = "flex";
  document.getElementById("ob-next-btn").addEventListener("click", advanceOnboarding);
}
function advanceOnboarding() {
  if (_obStep < ONBOARDING_STEPS.length - 1) {
    _obStep++;
    const el = document.getElementById("onboarding-overlay");
    el.innerHTML = renderOnboarding();
    document.getElementById("ob-next-btn").addEventListener("click", advanceOnboarding);
  } else {
    document.getElementById("onboarding-overlay").style.display = "none";
    dbPut("settings", { id: "onboardingSeen", value: true });
  }
}
handlers["show-onboarding"] = showOnboarding;

async function init() {
  await openDb();
  const [robots, pilots, equipment, forces, battles] = await Promise.all([
    dbGetAll("robots"), dbGetAll("pilots"), dbGetAll("equipment"),
    dbGetAll("forces"), dbGetAll("battles"),
  ]);
  state.robots = robots; state.pilots = pilots; state.equipment = equipment;
  state.forces = forces; state.battles = battles;
  // Load content packs; seed urfs-core if not persisted yet.
  const packsRecord = await dbGet("settings", "packs");
  if (packsRecord?.value) {
    state.packs = packsRecord.value;
  } else {
    state.packs = [{
      id: "urfs-core", name: "URFS Core", version: "1.0",
      active: true,
      modules: _CORE_MODULES,
      talents: _CORE_TALENTS,
      keywords: _CORE_KEYWORDS,
    }];
    dbPut("settings", { id: "packs", value: state.packs });
  }
  rebuildContent();
  // Migrate robots built before parentTempId was tracked — attach all
  // orphan components to Core so the schematic tree is valid.
  for (const r of state.robots) {
    const core = (r.components || []).find(c => c.definition === "CORE");
    if (!core) continue;
    for (const c of r.components) {
      if (c.definition !== "CORE" && c.parentTempId == null) {
        c.parentTempId = core.tempId;
      }
    }
  }
  // Migrate components built before additionalFacings was tracked.
  for (const r of state.robots) {
    for (const c of (r.components || [])) {
      if (c.additionalFacings == null) c.additionalFacings = [];
    }
  }
  // Normalize legacy battles that predate two-forces schema.
  for (const b of battles) {
    b.p1Robots = b.p1Robots || [];
    b.p2Robots = b.p2Robots || [];
  }
  // If there's a single active battle, resume it.
  if (battles.length === 1) state.activeBattle = battles[0];
  render();
  const seen = await dbGet("settings", "onboardingSeen");
  if (!seen?.value) showOnboarding();
}
init().catch(err => {
  console.error(err);
  document.getElementById("screen").innerHTML = `<div class="empty"><h2>STARTUP ERROR</h2><p>${escapeHtml(err.message)}</p></div>`;
});
</script>

// Side-by-side stat comparison modal for two robots.

function renderRobotCompare(idA, idB) {
  const rA = state.robots.find(r => r.id === idA);
  const rB = state.robots.find(r => r.id === idB);
  if (!rA || !rB) return "<p>Robot not found.</p>";

  const stats = [
    { label: "BP",          vA: calcRobotBP(rA),           vB: calcRobotBP(rB),           higherWins: true  },
    { label: "WEIGHT",      vA: calcTotalWeight(rA),        vB: calcTotalWeight(rB),        higherWins: false },
    { label: "MAX LOAD",    vA: calcMaxLoad(rA),            vB: calcMaxLoad(rB),            higherWins: true  },
    { label: "POWER",       vA: calcRobotPower(rA),         vB: calcRobotPower(rB),         higherWins: true  },
    { label: "FUEL MAX",    vA: calcFuelMax(rA),            vB: calcFuelMax(rB),            higherWins: true  },
    { label: "SHIELDS MAX", vA: calcShieldsMax(rA),         vB: calcShieldsMax(rB),         higherWins: true  },
    { label: "CAPACITORS",  vA: calcCapacitorPool(rA),      vB: calcCapacitorPool(rB),      higherWins: true  },
    { label: "STRAIN THR",  vA: calcStrainThreshold(rA),    vB: calcStrainThreshold(rB),    higherWins: true  },
    { label: "GSPD",        vA: calcGroundSpeed(rA),        vB: calcGroundSpeed(rB),        higherWins: true  },
    { label: "BOOST",       vA: calcTotalBoost(rA),         vB: calcTotalBoost(rB),         higherWins: true  },
    { label: "COMPONENTS",  vA: (rA.components||[]).length, vB: (rB.components||[]).length, higherWins: null  },
    { label: "EQUIPMENT",   vA: (rA.components||[]).reduce((s,c)=>s+(c.equipment||[]).length,0),
                            vB: (rB.components||[]).reduce((s,c)=>s+(c.equipment||[]).length,0), higherWins: null },
  ];

  function winChip(va, vb, higherWins, side) {
    if (higherWins === null || va === vb) return "";
    const aWins = higherWins ? va > vb : va < vb;
    if ((side === "A" && aWins) || (side === "B" && !aWins)) {
      return `<span class="chip green" style="margin-left:4px;font-size:10px">WIN</span>`;
    }
    return "";
  }

  const thumb = r => r.imageData
    ? `<img src="${escapeHtml(r.imageData)}" style="width:56px;height:56px;object-fit:cover;border-radius:var(--bevel)" />`
    : `<span style="font-size:28px">🤖</span>`;

  const rows = stats.map(s => `
    <tr>
      <td style="padding:5px 6px;text-align:right;color:${s.vA > s.vB && s.higherWins || s.vA < s.vB && s.higherWins===false ? "var(--green)" : "var(--on-surface)"}">
        ${s.vA}${winChip(s.vA,s.vB,s.higherWins,"A")}
      </td>
      <td style="padding:5px 6px;text-align:center;font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--on-surface-muted);white-space:nowrap">${s.label}</td>
      <td style="padding:5px 6px;text-align:left;color:${s.vB > s.vA && s.higherWins || s.vB < s.vA && s.higherWins===false ? "var(--green)" : "var(--on-surface)"}">
        ${winChip(s.vA,s.vB,s.higherWins,"B")}${s.vB}
      </td>
    </tr>
  `).join("");

  return `
    <h2>⚖️ COMPARE</h2>
    <table style="width:100%;border-collapse:collapse;margin-bottom:12px">
      <thead>
        <tr>
          <th style="padding:6px;text-align:center;width:40%">
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
              ${thumb(rA)}
              <span style="color:var(--cyan);font-weight:700;font-size:13px">${escapeHtml(rA.name||"Unnamed")}</span>
              <span class="chip">SIL ${rA.silhouette||1}</span>
            </div>
          </th>
          <th style="width:20%"></th>
          <th style="padding:6px;text-align:center;width:40%">
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
              ${thumb(rB)}
              <span style="color:var(--cyan);font-weight:700;font-size:13px">${escapeHtml(rB.name||"Unnamed")}</span>
              <span class="chip">SIL ${rB.silhouette||1}</span>
            </div>
          </th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CLOSE</button>
    </div>
  `;
}
</script>

// ════════════════════════════════════════════════════════════════════
// RULEBOOK  (rules.rulebook_screen)
// Embedded rulebook.md with search + accordion sections.
// ════════════════════════════════════════════════════════════════════

// Embedded verbatim from android/app/src/main/assets/rulebook.md
// (752 lines, 14 chapters + appendix). Escape: none needed (no backticks
// or ${ in source). Line numbers preserved for deep-link from action sheet.
const RULEBOOK_MD = `# URFS — Universal Robot Fighting System
## Rulebook Draft — App Edition

---

# Chapter 1: What is URFS?

URFS is a miniatures wargame where players field teams of giant piloted Robots equipped with science fiction weapons and gear. Unlike traditional wargames where you pick units from a roster, every Robot in URFS is custom-built from Components loaded with Modules. The result is a game where no two Robots are alike — even when using the same model.

URFS is miniatures-first: you measure your model, and that measurement — the Robot's Silhouette — determines its base stats and build limits. Anything works as a model: Gunpla, Transformers, 3D prints, action figures, other wargame minis. A Lego minifigure can fight a six-foot Mecha Godzilla if that's the battle you want.

The game is designed to work with the URFS companion app, which handles Robot construction, stat tracking, and combat bookkeeping. This rulebook teaches you the rules of play; the app handles the math.

URFS can simulate any giant robot setting: the lumbering firefights of Battletech, the acrobatic dogfights of Macross, the shonen battles of G Gundam, or wars between intelligent Robots like Transformers. It can also be played setting-agnostic — pit your favorite Megazord against Mazinger Z if you want.

## How to Play

URFS is played on any table the players agree on, with terrain and obstacles placed by agreement. Players need:

- Robot models (any kind)
- Six-sided dice (a good handful)
- A measuring tool (tape measure, ruler)
- The URFS companion app

Players agree on a Build Point (BP) total for the game. Suggested levels:

| BP Total | Scale |
|----------|-------|
| 600 | One-on-one or low-powered Robots |
| 1200 | Well-equipped grunt squads |
| 2000 | High-powered squads or one massive Robot |

Players construct forces up to the agreed BP total using the app's Robot builder. The player with the lower point total is the **Assaulting Player** and begins with Priority. The player with the higher total is the **Entrenched Player**. The Entrenched Player places Robots first, alternating placement on opposite table edges.

A player wins by disabling all enemy Robots or achieving the scenario objective. Robots can be disabled by destroying vital Components, knocking Pilots unconscious, or forcing Emergency Shutdown.

*Note: Game length will vary by BP total and player count. Expect to playtest for calibration.*

---

# Chapter 2: Core Concepts

## Scale Units

URFS is scale-agnostic. All distances are measured in **Scale Units (SU)**, which can be any unit of measurement players agree on — inches, centimeters, or any custom unit. The game works the same at any scale.

## Silhouette

A Robot's **Silhouette** is its size in Scale Units, determined by measuring the model. Silhouette is the foundation stat — it determines shield capacity, strain thresholds, melee reach, movement scaling in flight, and more. Bigger Robots are more powerful but also bigger targets.

Terrain also has a Silhouette, determined by the size of the terrain piece.

During construction, half-sizes may be rounded up or down (a 5.5" model can be Sil 5 or Sil 6).

## Hits

A **Hit** in URFS is a 5 or 6 on a d6, unless otherwise specified. When a rule says "roll X dice," count the 5s and 6s.

## The Facing Die

Every Robot has a **Facing Die** — a standard d6 (opposite faces sum to 7) placed near the model with the 1-pip facing forward. The 1-pip always indicates the Robot's front. The die serves double duty: the 1-pip tracks facing direction, and the **top face** indicates Robot status. Rotate the die around the 1–6 axis to change status without losing facing.

| Top Pip | Status |
|---------|--------|
| **2** | **Standing** — Normal operating state |
| **3** | **Crouched** — Half Silhouette for enemy Ranged Attacks |
| **4** | **Down** — Robot is prone |
| **5** | **Flying** — Robot is airborne (place Altitude counter nearby) |
| **6** | **Shutdown** — Robot is offline (2-pip now indicates forward facing) |

## Lines of Fire

To determine if one Robot can target another:

1. Draw a line from the center of each Robot model to the other. If this line passes through terrain or obstacles, those may block or modify the shot (see Terrain).
2. Draw a **Targeting Line** from the attacker's Facing Die to the defender's Facing Die. This determines which Components are on a targetable Facing.

Lines of Fire have no height consideration. All targeting is calculated from a top-down perspective. Any terrain an overhead line would cross is still considered. This is a deliberate simplification — Robots are large enough that battlefield geometry is best resolved from above. Terrain matters for cover and obstruction, not line-of-sight trigonometry.

## Components

Robots are built from **Components**: Arms, Legs, Heads, a Core (chest/torso), and Utility Components. Each Component is attached to a Facing and filled with Modules that provide game effects. Components have HP, and destroying them removes their Modules and any attached equipment from play.

The Core is special — it's the central Component that other Components attach to. Components can be dependent on other Components (an Arm attached to a Utility shoulder piece, for example).

## Modules

**Modules** are installed in Components during construction and provide all of a Robot's capabilities: boosters, weapons sockets, armor, shield generators, sensors, manipulators, and more. The full Module list is maintained in the companion app.

**Horizontal Framing** (Core only) — This Robot's Silhouette counts as half (rounded up) for all Line of Fire and cover calculations. The Robot is built wide or long rather than tall — think quadrupedal Zoids, low-slung tanks, or centaur frames. Full Silhouette is still used for construction, melee reach, collision damage, and all other purposes.

## Equipment and Weapons

**Equipment** covers everything a Robot carries or mounts externally — weapons, shields, tools, and other devices. Equipment is defined by its Silhouette and Keywords. A piece of Equipment can have up to **3 x its Silhouette** in Keywords.

**Weapons** are Equipment with the Melee or Ranged keyword. They are used to attack other Robots.

Equipment costs BP equal to its number of Keywords multiplied by its Silhouette. Equipment weighs its Silhouette unless modified by Keywords. Equipment has a default Armor of 5 and is immune to Burst weapon damage.

Equipment attaches to Robots via Sockets (internal or external mounts) or can be Grabbed by Manipulators. All Equipment is assumed to have a handle unless it has the Mount Point keyword.

---

# Chapter 3: Pilots

Pilots provide the dice pools for all checks in URFS. The Robot provides the hardware; the Pilot provides the skill.

## Pilot Stats

Pilots have three stats. Each stat is a dice pool — the number of d6 rolled for checks using that stat.

**Physical** — Toughness and physical prowess. Used for:
- Fortitude Checks (resisting damage from impacts, Inertia, falls)
- Dodge Reactions
- Grappling (initiating and breaking free)

**Mental** — Mental acuity and endurance. Used for:
- Ranged Attack checks
- Emergency Shutdown checks
- Heat Vent checks
- Salvo targeting overflow
- Sets the **Pilot Strain threshold** (tokens beyond Mental = damage)

**Training** — Rote memory, drilled responses, practiced skill. Used for:
- Melee Attack checks
- Can substitute for Physical or Mental on any **Priority Action** roll
- Does NOT apply to Reactions, Fortitude Checks, Shutdown Checks, or other non-Priority checks

Training is the "by-the-book" stat. A high-Training pilot executes textbook maneuvers reliably but doesn't have the raw toughness or mental endurance to handle reactive pressure. Think a pilot who has only trained in simulations — technically proficient but crumbles when things go sideways.

## Pilot Tiers

| Tier | BP Cost | Stat Points | Talent Slots |
|------|---------|------------|--------------|
| Rookie | 20 | 10 | 2 |
| Experienced | 40 | 13 | 4 |
| Veteran | 80 | 16 | 6 |

All three stats must have at least 1 point after creation.

## Pilot HP

A Pilot's hit points equal **2 x Physical**. When all boxes are marked, the Pilot is unconscious.

## AI Pilots

AI Pilots are cheaper but limited:
- No Talents
- Stats purchased at 3 BP per point (1-for-3 basis)
- **Hard cap**: Cannot have more Action Tokens than their Mental stat. Must Pass when they reach their limit.
- AI Pilot modules are **toggleable**. If an AI Pilot module is toggled off (by an opponent's effect or power loss), the Robot immediately enters Emergency Shutdown.

---

# Chapter 4: The Dramatic Priority System

URFS does not use alternating turns. Instead, it uses the **Dramatic Priority System** — an action economy modeled after the flow of a basketball game, where offense and defense shift rapidly and control of the action can change suddenly.

One player has **Priority** at any given time. The Priority player takes actions with their Robots. The non-Priority player responds with Reactions. Priority changes hands when specific conditions are met.

## Priority Pass Conditions

Priority passes to the opponent when:

1. The Priority player takes the **Pass** action
2. A non-Priority Robot **deals damage** to a Priority Robot (a successful Reaction attack)
3. A Priority Robot **whiffs** an attack roll (zero hits on a Ranged or Melee Attack check)
4. A Priority Robot **fails an Emergency Shutdown check** (this is the natural shot clock — the longer you push, the more likely a Shutdown will cost you control)
5. Any other game effect explicitly causes Priority to pass

## Action Tokens

Every time a Robot takes an action, an **Action Token** is placed on it. Tokens are unlimited — you can always take another action. But every token adds strain:

- Tokens accumulate on the Pilot (tracked by the app), causing **Pilot Strain** when they exceed the Pilot's Mental stat.
- Tokens also accumulate as **System Strain** on the Robot, risking **Emergency Shutdown** when they exceed the Robot's threshold.

There is no ante step or pre-distribution of tokens. You act, you take a token, you deal with the consequences.

## Three Action Tiers

| Tier | When | Token Cost |
|------|------|-----------|
| **Priority Actions** | Only when you have Priority | 1 token (some cost more) |
| **Reactions** | In response to enemy actions | 1 token per Reaction |
| **Incidentals** | Free with each Priority Action | None |

Every Priority Action comes with one free Incidental, taken before or after the Priority Action.

## The Game Loop

1. Priority player picks a Robot, declares a Priority Action, places a token on it
2. Non-Priority player declares Reactions with eligible Robots (placing tokens as they react)
3. Reactions resolve
4. Priority Action resolves
5. Pilot Strain checked — if tokens on Pilot exceed Mental, Pilot takes 1 damage
6. System Strain checked — if Robot's System Strain exceeds threshold, make Shutdown check
7. Priority passes if any pass condition was met
8. Inertia moves resolve (highest to lowest Inertia; collisions resolved before next Robot moves)
9. Repeat from step 1

Play continues until one player wins.

---

# Chapter 5: Actions

## Priority Actions

Priority Actions can only be taken when you have Priority. Each Priority Action includes one free Incidental. The Priority player may use their Training stat in place of Physical or Mental for any Priority Action roll.

**Pass** — Does not cost a token. Pass Priority to the opponent. Also reboots a Shutdown Robot. Clears all Pilot Strain tokens on the passing Robot (does NOT clear System Strain).

**Run** — Move up to full Ground Speed in any direction. Half speed if moving in reverse (a direction that could draw a Line of Fire to the Robot's Rear facing). You may make a Physical check and move 2x the number of hits in additional Scale Units.

**Charge** — Move up to Ground Speed in a non-reverse direction — OR — Boost any number of Scale Units (up to maximum), then make a Melee Attack at the end of movement.

**Strafe** — Move up to Ground Speed in a non-reverse direction — OR — Boost any number of Scale Units, then make a Ranged Attack. May also make the Ranged Attack before moving.

**Salvo** — Make Ranged Attacks with up to your full complement of ranged weapons. Costs one token per target. If the number of targets exceeds your Mental stat, make a Mental check against the number of targets. Fail = subtract the difference from each attack's dice pool.

**Melee Assault** — Make Melee Attacks with up to your full complement of melee weapons. Costs one token per target. You choose the order of attacks. Each attack must be reacted to individually.

**Boost** — Travel up to your maximum Boost distance. If Flying and changing direction off-Vector, make a Fortitude Check per the flying rules.

**Double Incidental** — Take two Incidental actions, plus the free Incidental from the Priority Action (three total).

## Reactions

Reactions are taken in response to enemy actions, regardless of who has Priority. Each Reaction costs one Action Token.

**Quick Move** — Move up to half Ground Speed. Cannot perform at Altitude > 0. May increase Inertia if you move far enough, potentially making you harder to hit. Requires legs.

**Boost Dodge** — Make a Physical check and Boost up to the number of hits in any direction. Increase the required hits of the opponent's attack by your hits. Costs fuel as normal. Against Area attacks, does not reduce opponent's hits but still moves your Robot.

**Block** — Redirect the incoming attack to a Component of your choice. If that Component is destroyed, the attacker picks the next Component for overflow.

**Parry** — Roll a melee attack using your own melee weapon. Your hits increase the number the opponent needs to succeed. If no damage is dealt from their attack, you gain Priority.

**Quick Strike** — Make a single Melee Attack. If against a Robot whose Priority Action includes a melee attack, Quick Strike resolves after theirs.

**Hip Shot** — Make a single Ranged Attack after the current Priority Action resolves.

**Incidental** — Perform any Incidental action as a Reaction.

## Incidental Actions

Incidentals are free — one comes with every Priority Action, and they cost no tokens. They can also be taken as a Reaction (costing a token in that case).

**Crouch** — Only for Robots with legs, at Altitude 0 and Inertia 0. Silhouette counts as half for enemy Ranged Attacks. Crouched Robots get +2 dice on Ranged Attack checks with Grabbed weapons. Any movement, Boosting, or Altitude/Inertia change ends the Crouch.

**Heat Vent** — Make a Mental check. Remove System Strain from this Robot equal to the number of hits. (Being an Incidental means it can be taken as a Reaction via "Incidental as Reaction," allowing strain venting on the opponent's turn.)

**Toggle** — Turn a Component or Module on or off, or activate anything requiring a Toggle. This includes spending Capacitors for Shield recovery or System Strain clearing.

**Step** — Move up to half Silhouette in Scale Units. Cannot Step if Altitude or Inertia > 0.

**Grab/Draw Weapon** — Change an equipment location or add Grabs. Requires a Manipulator.

**Drop** — Drop a held object or weapon adjacent to the Robot. Place a token on the map. Can be combined with a Draw as one Incidental.

**Pivot** — Change Facing by up to 90 degrees. When Flying, may turn up to 180 degrees if Facing is not locked to Vector.

**Decelerate** — Spend Fuel to reduce Inertia via Boosting. One Boost payment per point of Inertia. May only reduce to 0, not negatives.

---

# Chapter 6: Attacks and Damage

## Ranged Attacks

Ranged Attacks are made with weapons that have the Ranged keyword.

1. **Declare**: Choose a weapon and designate a target Robot in range. Declare a target Component on a valid Facing (per Line of Fire rules). You may target beyond weapon Range, but lose 1 die per Scale Unit over.
2. **Reactions**: The target declares Reactions if able.
3. **Set Difficulty**: Base = 1 hit required.
   - Target is smaller: +1 required hit per Sil difference
   - Target is larger: -1 required hit per Sil difference (minimum 1)
   - Add modifiers from Reactions, terrain, and other effects
4. **Roll**: Mental + Module/Talent bonuses. Count hits (5s and 6s).
5. **Resolve**: If hits meet or exceed difficulty, the attack hits. Deal the weapon's Damage to the targeted Component. If the target Blocked, they chose the Component instead.

## Melee Attacks

Melee Attacks are made with weapons that have the Melee keyword, or with any Arm (even without a weapon).

1. **Declare**: Choose a weapon (or arm) and designate a target Robot. Declare a target Component. Target must be within **Reach** = Robot Reach + Weapon Reach (Weapon Sil + reach keywords).
2. **Reactions**: Target declares Reactions if able.
3. **Set Difficulty**: Same Silhouette comparison as Ranged.
4. **Roll**: Training + Module/Talent bonuses + 2 dice per extra Manipulator gripping the weapon.
5. **Damage**: Weapon Damage + (half Robot Strength per arm wielding the weapon). If the Robot has Inertia > 0, add [Inertia x Silhouette] bonus damage. Objects used as weapons take equal damage back.
6. **Inertia Impact**: If Inertia was used in damage and it hits a Component containing a Pilot, that Pilot makes a Fortitude Check against the Inertia score. If the hit destroys a Component and damage overflows to a Component containing a Pilot, that Pilot makes the Fortitude Check against the full Inertia score, regardless of how much damage actually carried over.

## Throwing

Any Robot with a Manipulator can throw held objects.

- Roll: **Physical** check (not Mental — this is not a Ranged Attack for keyword purposes)
- Range: Robot Strength x Arms used, minus the weight of the thrown object
- Damage: Weight of the object + any melee damage rating
- Place a token for the thrown object near the target regardless of hit or miss
- Requires two arms to throw two-handed weapons or heavy equipment

## Grappling

Any Robot with a Manipulator module can attempt to Grapple.

1. **Initiate**: Declare a Grapple instead of a normal Melee Attack. The attacker's Pilot makes a **Physical** check opposed by a **Physical** check from a Pilot of the defender's choice.
2. **Grappled**: If the attacker wins, the target is Grappled. A Grappled Robot cannot take Movement actions and has -1 die on Ranged Attacks.
3. **Break Free**: The Grappled Robot spends an action and makes an opposed Physical check. If they win, they're free.
4. **Throw**: A Robot grappling a target with Silhouette equal to or less than its own can spend an action to throw the target. Distance and damage are derived from the thrower's **Strength** stat. This is an inherent ability of strong Robots, not a keyword.

## Damage Application

1. Shields absorb damage first (whole-robot pool). If Shields remain, no Component damage.
2. If Shields are depleted or absent, damage goes to the targeted Component.
3. If the defender **Blocked**, they chose which Component takes the hit instead.
4. If the damaged Component is destroyed, the **attacker** picks the next Component for overflow damage — even if the defender Blocked. Block only redirects the initial hit.
5. **Frame Save**: When a **Frame Component** takes damage, roll Frame Durability in d6. Hits on **(7 - Frame Material)+**. Each hit reduces incoming damage by 1.

Components are either **Frame** or **Non-Frame**. Frame Components (Core, structural Arms, structural Legs, structural Heads) get a Frame Save when their Armor is depleted. Non-Frame Components (Utility Components, Utility Arms/Legs/Heads) are destroyed when their Armor reaches 0 with no save.

Damage is either **Physical** or **Energy**. Both apply the same way, but certain keywords interact differently with each type. Energy Weapons require Power to operate.

# Chapter 7: Strain and Shutdown

Every action a Robot takes generates strain on two concurrent tracks.

## Pilot Strain

Each action places a token on the acting Pilot (tracked by the app). When a Pilot's token count exceeds their **Mental stat**, they take **1 damage** for each subsequent action resolved. This is flat 1 damage per action — not cumulative with previous overage.

**Pass clears Pilot Strain.** When a Robot takes the Pass action, all Pilot tokens on that Robot are cleared. The Pilots catch their breath.

When a Pilot is **incapacitated** (HP reaches 0), their Pilot tokens are removed — but System Strain is unaffected, since it was tracked independently all along.

## System Strain

Each action adds +1 **System Strain** to the Robot independently of Pilot tokens. System Strain is its own counter — it represents heat, mechanical wear, and system stress. Pilot tokens going up or down (from Pass, incapacitation, etc.) has no effect on System Strain.

**System Strain Threshold** = ceil(Silhouette / 2) + active System Strain Coprocessor modules.

When System Strain exceeds the threshold, the Robot must make an **Emergency Shutdown Check** after the action resolves.

### Emergency Shutdown Check

All conscious Pilots of the Robot make a combined **Mental check**. They need hits equal to or greater than the Robot's current System Strain.

- **Pass**: The Robot stays active. Continue operating.
- **Fail**: The Robot **shuts down**. All Pilot tokens are cleared. The Robot cannot take any actions until rebooted with a Pass action. **Priority also passes** to the opponent.

### Clearing System Strain

System Strain is NOT cleared by Pass. It persists across possessions. Two methods:

- **Heat Vent** (Incidental): Mental check, remove System Strain equal to the number of hits.
- **Capacitor Spend** (Toggle): Permanently deplete 1 Capacitor to remove 1 System Strain. This is the emergency option — effective but costly.

## Capacitor Banks

Capacitor Bank modules add the "Capacitor X" quality to a Robot (X = number of banks x 2). Capacitors serve three purposes from a single permanent pool:

1. **Passive Shutdown Bonus**: +1 die to Emergency Shutdown checks per Capacitor remaining. Always active.
2. **Shield Recovery**: Toggle to permanently spend 1 Capacitor and recover 10 Shield points.
3. **System Strain Clearing**: Toggle to permanently spend 1 Capacitor and remove 1 System Strain.

Once a Capacitor is spent, it is gone for the rest of the game. The tension: every Capacitor spent on shields or strain clearing reduces your passive Shutdown bonus.

## Shields

Shield Generator modules give a Robot whole-robot Shields equal to **Shield Generators x Silhouette**. Shields absorb damage before any Component takes a hit, regardless of facing. Shield Generators are toggleable (Core/Utility slot, weight 2, power -10).

Shields do not regenerate on their own. Recovery requires spending Capacitors via Toggle.

# Chapter 8: Movement

## Ground Movement

To move on the ground, follow these steps:

1. Choose a destination point on the battlefield.
2. Draw a line from your Robot to that point. Consider anything in the path:
   - Light Terrain can be breached if the Robot's Strength ≥ the terrain's Silhouette, costing extra movement equal to the terrain's Silhouette in SU (see Terrain). Heavy Terrain cannot be breached — go around or destroy it first.
   - Other Robots can be moved past, but enemy Robots in Melee range may declare Reactions.
   - Hindering Terrain costs 2x movement to pass through.
3. Check Facing: draw a Targeting Line from the Facing Die to the destination.
   - Non-reverse: full Ground Speed.
   - Reverse (line could be drawn to Rear facing): half Ground Speed.
4. Move the Robot and Facing Die, maintaining the same facing direction.

Players may re-measure and re-declare movements freely while planning.

## Boosting

Boosting is rocket-assisted movement that consumes Fuel.

**Boost Draw** = Robot Load / Boost Power (rounded up). This is the Fuel cost per Scale Unit of Boost on the ground.

- On the ground: pay Boost Draw per Scale Unit, move that many SU.
- In the air: each Scale Unit of Boost moves the Robot its Silhouette in Scale Units (see Flying).
- Maximum Boost per action = Boost Power (in SU on ground, Silhouettes when Flying).

## Robot Statuses

**Standing** — Normal status. Full Silhouette. All actions available.

**Crouched** — Half Silhouette for enemy Ranged Attacks. +2 dice on Ranged Attacks with Grabbed weapons. Requires legs, Altitude 0, Inertia 0. Any movement ends Crouch.

**Down** — The Robot has fallen. Silhouette counts as 1/3. Cannot make Melee Attacks or Parry. Must spend 1/3 Silhouette in movement to stand up before any other movement.

**Flying** — Altitude above 0. See Chapter 9.

# Chapter 9: Flying

## Getting Airborne

A Robot becomes Flying when its Altitude rises above 0. To gain Altitude, Boost straight up — paying Boost Draw for the Robot's Silhouette in Scale Units grants +1 Altitude. A Robot can gain multiple Altitude in a single Boost by paying multiple times.

## The Vector Die

Once airborne, a Robot gains a **Vector Die** — a second d6 showing the direction of flight.

- If the Robot's Facing and flight direction are the same, the Facing Die doubles as the Vector Die. No extra die needed.
- If they differ (the Robot is looking one direction while flying another), use a separate colored die for the Vector.
- After any flight movement, the Vector Die rotates to face the direction just moved.

## Movement in Flight

Flying Robots can only move by Boosting — no Ground Speed actions.

For every 1 Scale Unit of Boost paid, a Flying Robot moves **its Silhouette in Scale Units**. A Sil 6 Robot paying for 3 SU of Boost travels 18 Scale Units. The tradeoff: the Robot must move the full distance paid. No partial moves in the air.

Maximum Boost per action is still limited by Boost Power.

## Turning in Flight

The Vector Die divides the sky into four 90-degree arcs: Front, Left, Right, and Rear. Moving within the Front arc is straightforward. Turning costs more — in both Fuel and Pilot stress.

| Direction | Fuel Multiplier | Fortitude Check |
|-----------|----------------|-----------------|
| Front arc | 1x (normal) | None |
| Left or Right arc | 2x Fuel | Physical vs. (Silhouettes moved x 2) |
| Rear arc | 3x Fuel | Physical vs. (Silhouettes moved x 3) |

Hard turns at high speed are extremely dangerous and can kill Pilots outright.

**Example:** A Sil 6 Robot flying at Altitude 3 wants to reverse direction. It pays for 3 SU of Boost (moving 18 Scale Units), but into the Rear arc — Fuel cost is tripled. The Pilot makes a Fortitude Check against 3 Silhouettes moved x 3 = 9. Only the toughest Pilots survive regular reversals at speed.

## Inertia

Flying generates Inertia — momentum the Robot cannot instantly stop.

- **Building Inertia**: +1 Inertia for each Silhouette of distance moved while Flying.
- **Drift**: After each Priority Action resolves, all Robots with Inertia > 0 drift along their Vector Die direction by their Inertia in Scale Units. Highest Inertia moves first; same-bracket Robots move simultaneously (Priority player's Robots first).
- **Decay**: Inertia decreases by (half Silhouette - Glide) after each action resolves. Glide modules (such as Wings) slow this decay.
- **Landing**: If Altitude reaches 0, Inertia is immediately reduced to 0 and the Pilot makes a Fortitude Check against the reduction.

### Inertia in Combat

- **Defensive**: +1 hit needed per point of Inertia when targeting a Flying Robot. Fast-moving targets are hard to hit.
- **Offensive**: Melee Attacks deal [Inertia x Silhouette] bonus damage. A flying charge hit is enormous. The target's Pilot also makes a Fortitude Check against the attacker's Inertia.

## Losing Altitude

Flying Robots sink after each Priority Action resolves:

- **With Inertia > 0**: Lose (Silhouette - Glide) Altitude.
- **With Inertia = 0**: Lose Silhouette Altitude (dropping like a stone without forward momentum).
- **Hover Systems** set a minimum Altitude the Robot won't drop below. Stackable.

## Falling

When a Robot's Altitude drops to 0 and the decrease was more than 1 point:

1. Pilot makes a **Physical check** against the Altitude decrease.
2. **Pass**: Pilot makes a Fortitude Check against the Altitude decrease only. Robot lands Standing.
3. **Fail**: Robot goes **Down**. Pilot makes a Fortitude Check against (Altitude decrease + Robot Silhouette). Hard landing.

## Height and Lines of Fire

Altitude lets you see over terrain:

- For each point of Altitude, reduce the effective Silhouette of terrain between the Flying Robot and its target by 1. This works in both directions (shooting up at a flyer, or a flyer shooting down).
- Flying Robots can move over terrain with Silhouette equal to or less than their Altitude.

## Collisions

A Collision occurs when a Robot moves into or through another Robot or terrain. Collisions do **not** pass Priority.

### Collision Types

**Chasing**: A Robot collides with another on the target's Rear Vector, or both Robots are on the ground. The colliding Robot's player assigns damage to both Robots.

**Converging**: Head-on or angled collision between Robots with Inertia. Each player assigns their own incoming damage as if Blocking.

### Collision Damage

- **Robot vs. Robot**: (Movement + Inertia) x Silhouette, from the colliding Robot, applied to both.
- **Robot vs. Terrain**: (pre-collision Movement x Silhouette) to both the Robot and the terrain. Remaining movement is lost if the terrain isn't destroyed.

### After a Collision

- **Converging**: Both Robots reduce Inertia by the greatest Inertia involved. If this produces a negative Inertia for one Robot, move it that many SU in the opposite direction and set its Inertia to 0.
- **Chasing**: The colliding Robot's Inertia decreases and the target's Inertia increases, both by the collider's Inertia used in damage calculation.

Collisions should be calculated before moving Robots into their colliding positions, to preserve Lines of Fire between Facing Dice for damage assignment.
