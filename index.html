// Frame Save: FD d6 vs (7-FM)+. Tom 2026-06-13 (§15.A, Ch 2 L114):
// each hit REDUCES incoming damage by 1 (was: binary survive/destroy).
// reducedDamage = max(0, breach − hits). If reducedDamage === 0, Component

// remaining damage walks the parent chain as overflow (§15.B).
function renderFrameSave(rid, cid, fd, fm, breach, lastRoll) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const c = r.components.find(c => (c.componentId ?? c.tempId) === cid);
  if (!c) return "<p>?</p>";
  const threshold = Math.max(2, 7 - fm); // clamp to 2+ so FM ≥ 6 caps at 1+
  const dieChip = v => {
    const hit = v >= threshold;

  };

    <h2>FRAME SAVE</h2>

    <div class="row-gap" style="flex-wrap:wrap;gap:4px;margin-top:4px">

      ${rulePeek("apply-damage-pipeline", { label: "📖 PIPELINE" })}

      <div style="margin-top:12px">

        ? `<button class="btn amber" data-act="frame-save-done">DONE</button>`

function rollFrameSaveDice(fd) {

handlers["frame-save-roll"] = () => {
  const d = state.modal.data;
  const threshold = Math.max(2, 7 - d.fm);
  const dice = rollFrameSaveDice(d.fd);
  const hits = dice.filter(v => v >= threshold).length;
  // Tom 2026-06-13 (§15.A): hits reduce incoming damage, not binary save.
  const breach = d.breach || 0;
  const reducedDamage = Math.max(0, breach - hits);
  d.lastRoll = { dice, hits, threshold, reducedDamage };
  if (reducedDamage > 0) {
    // Component destroyed; route the remaining damage as overflow.
    // §15.B (default): walk to parent in the build dependency chain.
    // §15.C (Block-redirect): if blockOriginalCid is stashed on the modal,
    // route overflow back to the originally-targeted Component instead
    // of walking the blocker's parent chain (Ch 6 L82).
    const r = findBattleRobot(state.activeBattle, d.rid);
    const destroyed = r ? r.components.find(c => (c.componentId ?? c.tempId) === d.cid) : null;
    destroyComponent(d.rid, d.cid);
    if (destroyed) {
      if (d.blockOriginalCid != null && d.blockOriginalCid !== d.cid) {
        showToast(`${reducedDamage} overflow → original Block target (§15.C).`);

        // §15.C overflow from a failed Frame Save on the blocker.

          d.rid,
          d.blockOriginalCid,
          reducedDamage,
          d.type || "Physical",
          { bypassShields: true, isOverflow: true, bypassArmor: d.bypassArmor || 0 }
        );

        applyOverflowDamage(d.rid, destroyed, reducedDamage, d.type || "Physical");
      }
    }
  }

  // before opening this modal).
  dbPut("battles", state.activeBattle);
  render();
};

// Destroy a component AND fire the cascade per Android:
// - stowed children destroyed (recursive),
// - fuel-tank components spill silhouette damage to siblings + parent,
// - destroyed component drops its equipment[].
// Spillage applies direct to buffer (no nested Frame Save modal — that
// would spiral). Players resolve spillage-triggered destructions
// manually via the next APPLY DAMAGE if they want a save roll on a
// cascaded breach.
function destroyComponent(robotId, componentId) {
  const r = findBattleRobot(state.activeBattle, robotId);
  if (!r) return;
  const c = r.components.find(x => (x.componentId ?? x.tempId) === componentId);
  if (!c || c.isDestroyed) return;
  c.isDestroyed = true;
  c.hpCurrent = 0;
  r.cascadeLog = r.cascadeLog || [];
  r.cascadeLog.push({ kind: "destroyed", componentId, when: Date.now() });

  // §92 (Ch 2 L65) — Head Shared Facings retention. If the destroyed
  // component is an ARM that was coordinating through a Head, find any
  // OTHER non-destroyed Arm coordinating through the same Head and flag
  // it `retainedSharedFacings = true` so `componentEffectiveFacings`
  // keeps including the destroyed partner in the union.
  if (c.definition === "ARM") {
    const headRef = c.sharesFacingsWithComponentId
                 ?? c.sharesFacingsWithTempId
                 ?? null;
    if (headRef !== null) {
      for (const other of r.components) {
        if (other === c) continue;
        if (other.definition !== "ARM") continue;
        if (other.isDestroyed) continue;
        const oRef = other.sharesFacingsWithComponentId
                  ?? other.sharesFacingsWithTempId
                  ?? null;
        if (oRef === headRef) {
          other.retainedSharedFacings = true;
          r.cascadeLog.push({
            kind: "facings-retained",
            componentId: other.componentId ?? other.tempId,
            from: componentId,
            when: Date.now(),
          });
        }
      }
    }
  }

  const parentRef = c.parentComponentId ?? c.parentTempId ?? null;

  // (1) Cascade to stowed children. Recursive — children of children
  // also fall.
  for (const child of r.components) {
    const childParent = child.parentComponentId ?? child.parentTempId ?? null;
    if (childParent === componentId && !child.isDestroyed) {
      destroyComponent(robotId, child.componentId ?? child.tempId);
    }
  }

  // (2) Fuel-tank spillage. Apply silhouette damage to siblings + parent.
  const hadFuel = (c.modules || []).some(m => (MODULES_BY_ID[m.moduleId]?.fuelCapacity || 0) > 0);
  if (hadFuel) {
    const sil = r.silhouette || 1;
    const adjacent = r.components.filter(x => !x.isDestroyed
      && ((x.parentComponentId ?? x.parentTempId ?? null) === parentRef
          || (x.componentId ?? x.tempId) === parentRef));
    for (const a of adjacent) {
      const armorBefore = a.hpCurrent || 0;
      const absorbed = Math.min(armorBefore, sil);
      a.hpCurrent = armorBefore - absorbed;
      r.cascadeLog.push({ kind: "fuel-spill", componentId: a.componentId ?? a.tempId, damage: sil, absorbed, breach: sil - absorbed });
    }
  }

  // (3) Drop equipment.
  if ((c.equipment || []).length > 0) {
    r.droppedEquipment = (r.droppedEquipment || []).concat(c.equipment);
    r.cascadeLog.push({ kind: "drop-equipment", componentId, count: c.equipment.length });
    c.equipment = [];
  }

  // (4) Recompute derived stats — destroyed component's modules no
  // longer contribute. Clamp current values down to new max.
  recomputeDerivedStats(r);

  // (5) Neural Link: rulebook (Ch 11 Neural Link) — "If a Frame Component on
  // this Pilot's Robot is destroyed, the Pilot makes a Fortitude Check
  // against (remaining Frame Components + 3) and takes the difference as
  // damage." Frame components are flagged isFrame at build time. The local
  // `c` is the just-destroyed component (already marked isDestroyed=true
  // above). Count REMAINING frame components AFTER all cascade (children
  // of this frame may have been destroyed by the recursive loop in step 1).
  // MULTI-PILOT: enumerates EVERY conscious Neural Link pilot across EVERY
  // cockpit on the robot — each rolls Fortitude independently. (§44 audit
  // 2026-06-17 confirmed correct iteration; see triggerFallingDamage for
  // the multi-pilot Fortitude-queue contract.)
  if (c.isFrame) {
    const nlPilots = (r.cockpitPilots || []).filter(cp =>
      !cp.isAi && !cp.isKO && cp.pilotId && pilotHasNeuralLink(cp.pilotId)
    );
    if (nlPilots.length > 0) {
      const remainingFrameCount = (r.components || []).filter(
        x => x.isFrame && !x.isDestroyed
      ).length;
      const threshold = remainingFrameCount + 3;
      for (const cp of nlPilots) {
        _enqueueFortItem(r, {
          phase: "fortitude",
          threshold,
          cpSlot: _cpSlotKey(cp),
          source: "neural-link",
        });
      }
      const names = nlPilots.map(cp => PILOTS_BY_ID[cp.pilotId]?.name || "pilot").join(", ");
      showToast(`Neural Link: ${names} — Fortitude vs ${threshold} (remaining Frame ${remainingFrameCount} + 3). Ch 11.`, 3200);
    }
  }

  // (6) §44 (Tom 2026-06-17): Cockpit host-Component destruction. Rulebook
  // Ch 13 L138 — "The Component the Cockpit is installed in is that Pilot's
  // host Component — if it is destroyed, the Pilot is ejected or
  // incapacitated per the Ejection rules." The rulebook forwards to
  // "Ejection rules" but no Ejection chapter exists in the current
  // revision (Ch 13 L138 only). Webapp models the consequence as KO: any
  // non-KO'd Pilot whose host Component is the just-destroyed `c` is
  // marked KO. This iterates EVERY pilot in EVERY cockpit slot whose
  // componentId matches the destroyed component (multi-cockpit-in-one-
  // component edge: e.g. a Component with two Standard Cockpits — both
  // pilots KO together).
  //
  // Cascade interaction: step (1) recursively destroyComponent's children
  // BEFORE this step runs, so each cascade call already runs its own
  // step (6) and KO'd its own pilots. We only need to handle `c` itself.
  // AI cockpits (cp.isAi) are also handled — their controlling AI core
  // module sits inside `c` and is lost; flag the cockpit slot as KO so
  // downstream consciousness checks (Shutdown Mental pool, talent gates,
  // Fortitude queue eligibility) skip it. The Robot's shutdown trigger
  // for AI-Core-only Robots is handled separately by the existing
  // recomputeDerivedStats / power-loss flow.
  const destroyedCid = c.componentId ?? c.tempId;
  const hostedPilots = (r.cockpitPilots || []).filter(cp =>
    cp.componentId === destroyedCid && !cp.isKO
  );
  if (hostedPilots.length > 0) {
    const koNames = [];
    for (const cp of hostedPilots) {
      cp.isKO = true;
      // §43 Fortitude-queue: when a host is destroyed mid-queue (rare —
      // most Fortitudes resolve before the destroying hit lands), strip
      // pending entries for the KO'd pilot so the modal doesn't try to
      // roll on a KO'd cp.
      if (Array.isArray(r._pendingFortQueue) && r._pendingFortQueue.length > 0) {
        const slotKey = _cpSlotKey(cp);
        r._pendingFortQueue = r._pendingFortQueue.filter(item =>
          !item || item.cpSlot !== slotKey
        );
      }
      const pname = cp.isAi
        ? "AI Core"
        : ((state.pilots || []).find(p => p.id === cp.pilotId)?.name || "Pilot");
      koNames.push(pname);
    }
    r.cascadeLog.push({
      kind: "pilot-ko-host-destroyed",
      componentId: destroyedCid,
      pilotSlots: hostedPilots.map(cp => _cpSlotKey(cp)),
      when: Date.now(),
    });
    showToast(`⚠ Cockpit host destroyed — ${koNames.join(", ")} INCAPACITATED. §44 / Ch 13 L138`, 3600);
  }
}

// Re-derive shields max, capacitor pool, and strain threshold from the
// LIVE component set (skip destroyed). Existing calc* helpers take a
// build-shape robot — we pass a shadow with components pre-filtered.
function recomputeDerivedStats(r) {
  const live = { ...r, components: (r.components || []).filter(c => !c.isDestroyed) };
  const newShieldsMax = calcShieldsMax(live);
  const newCapMax     = calcCapacitorPool(live);
  const newStrainMax  = calcStrainThreshold(live);
  const newFuelMax    = calcFuelMax(live);  // §74
  r.shieldsMax = newShieldsMax;
  r.shieldsCurrent = Math.min(r.shieldsCurrent || 0, newShieldsMax);
  r.capacitorsMax = newCapMax;
  r.capacitorsRemaining = Math.min(r.capacitorsRemaining || 0, newCapMax);
  r.systemStrainThreshold = newStrainMax;
  r.fuelMax = newFuelMax;                                                          // §74
  r.fuelCurrent = Math.min(r.fuelCurrent || 0, newFuelMax);                        // §74
  // Disable modules whose `requires` chain now points at a destroyed
  // component (or a module installed on a destroyed component). E.g.
  // destroying the aux reactor disables its dependents.
  const liveModuleIds = new Set();
  for (const c of live.components) for (const m of (c.modules || [])) liveModuleIds.add(m.moduleId);
  for (const c of r.components) {
    if (c.isDestroyed) continue;
    for (const m of (c.modules || [])) {
      const def = MODULES_BY_ID[m.moduleId];
      const reqs = def?.requires || [];
      if (reqs.length > 0 && !reqs.some(rq => liveModuleIds.has(rq))) {
        m.toggledOn = false;
      }
    }
  }
}
handlers["frame-save-done"] = () => {

// Set shutdownPending + Quick Troubleshooter availability flag.
function setShutdownPending(r) {
  r.shutdownPending = true;
  // Quick Troubleshooter: flag available if any conscious pilot has the talent.
  const hasQT = (r.cockpitPilots || []).some(cp =>
    !cp.isAi && !cp.isKO && cp.pilotId &&
    (PILOTS_BY_ID[cp.pilotId]?.talents || []).includes("Quick Troubleshooter")
  );
  r.quickTroubleshooterAvailable = hasQT;
}

// Tom 2026-06-10: entering Shutdown auto-disables every AI Core on
// the Robot. AI cannot reboot — only a living human Pilot may take
// the Pass action that clears Shutdown. (§6.A)
function disableAiCoresOnShutdown(r) {
  for (const c of r.components || []) {
    for (const m of c.modules || []) {
      if (m.moduleId === "ai_core" && m.toggledOn !== false) {
        m.toggledOn = false;
      }
    }
  }
}

// §6.G + §6.A: chokepoint for everything that fires the instant a Robot

  if (r.statusEffects) {
    r.statusEffects = r.statusEffects.filter(s =>
      s !== "FLYING" && s !== "STANDING" && s !== "CROUCHED"
    );
    if (!r.statusEffects.includes("SHUTDOWN")) r.statusEffects.push("SHUTDOWN");
  } else {
    r.statusEffects = ["SHUTDOWN"];
  }
}

// §21.A: entering Shutdown auto-passes Priority. If the Shutting-down
// Robot's side currently holds Priority, transfer it to the opponent.
function shutdownTransferPriority(b, r) {
  if (!b || !r || !r.side) return;
  if (b.priority === r.side) {
    b.priority = r.side === "P1" ? "P2" : "P1";
    showToast(`${r.name || "Robot"} Shutdown — Priority passes to ${b.priority}.`);
  }
}

// §43 (Tom 2026-06-17, Ch 7 L29): Net Power for the Robot at the moment
// of an action-resolution check. Sums `power` across non-destroyed
// components for modules that are currently active — toggleable modules
// only count when toggledOn !== false; non-toggleable modules always
// count. AI Cores use the dynamic powerDynamic curve based on bound AI
// pilot stats (mirrors calcRobotPower's logic but skips destroyed
// components and respects toggle state, which the build-time calc does
// not). Drives the Emergency Shutdown Check trigger and the dual-trigger
// immediate-Shutdown path. Per Ch 7 L31: a Robot with zero power
// generation will naturally flip negative here once any consumer fires,
// so the no-generation edge case is captured by this single check.
function getRobotNetPower(r) {
  let total = 0;
  for (const c of r?.components || []) {
    if (c.isDestroyed) continue;
    for (const m of c.modules || []) {
      const def = MODULES_BY_ID[m.moduleId];
      if (!def) continue;
      const on = def.toggleable ? (m.toggledOn !== false) : true;
      if (!on) continue;
      if (def.powerDynamic && m.moduleId === "ai_core") {
        const aiPilot = findAiPilotForSlot(r, c, m) ||
          { physical: 3, mental: 3, training: 3 };
        total += aiCorePowerDraw(aiPilot);
      } else {
        total += def.power || 0;
      }
    }
  }
  return total;
}

// §43 (Tom 2026-06-17, Ch 7 L40): dual-trigger chokepoint. When BOTH the
// Strain trigger AND the Power<0 trigger fire in the same action
// resolution, the Robot goes straight to Shutdown — no Check rolled.
// Surfaces a "cascading failure" toast so the table sees why the modal
// was skipped. Idempotent — if r.shutdown is already true, no-ops.
function applyImmediateShutdown(b, r, reason) {
  if (!r || r.shutdown) return;
  r.shutdown = true;
  r.shutdownPending = false;
  applyShutdownEntryEffects(r);
  shutdownTransferPriority(b, r);
  checkAllShutdownLoss(b);
  showToast(`${r.name || "Robot"} Shutdown — cascading failure (${reason || "Strain + Power<0"}).`, 4200);
}

// §43 (Tom 2026-06-17, Ch 7 L29 + L40): post-action evaluation of both
// Emergency Shutdown Check triggers. Replaces the three legacy strain-
// only check sites (BOOST resolution, primary/reaction strain bump,
// manual strain stepper). Decision tree:
//   - BOTH Strain > Threshold AND Net Power < 0 → immediate Shutdown
//   - EITHER trigger alone → setShutdownPending (surfaces the modal)
//   - neither → no-op (and clear shutdownPending if both have cleared)
function checkPostActionShutdownTriggers(b, r) {
  if (!r || r.shutdown) return;
  const strainOver = r.systemStrain >= r.systemStrainThreshold;
  const powerNeg = getRobotNetPower(r) < 0;
  if (strainOver && powerNeg) {
    applyImmediateShutdown(b, r, "Strain + Power<0");
    return;
  }
  if (strainOver || powerNeg) {
    setShutdownPending(r);
    return;
  }
  // Both triggers cleared (e.g. manual strain stepper just brought us
  // back under threshold AND power is currently >= 0). The legacy
  // bump-strain handler had a similar clear-line; we keep symmetric
  // behavior so the modal dismisses when neither trigger holds.
  if (r.shutdownPending) r.shutdownPending = false;
}

// §33: starting Priority goes to the LOWER-BP force (Assaulting Player).
// On ties the rulebook says roll a die — we pick a side at random and
// surface it in the toast so the table knows the call was randomised
// (rather than silently defaulting to P1, which is the bug we're fixing).
// Reads the two side Forces out of state by id and reuses depBP for the
// per-Robot BP (it already includes pilot BP via pilotAssignments).
function computeForceBPById(forceId) {
  if (!forceId) return 0;
  const f = FORCES_BY_ID[forceId];
  if (!f) return 0;
  return (f.robotIds || []).reduce((sum, rid) => {
    const r = ROBOTS_BY_ID[rid];
    return r ? sum + depBP(r, f) : sum;
  }, 0);
}
function computeStartingPriority(b) {
  if (!b) return;
  const p1bp = computeForceBPById(b.p1ForceId);
  const p2bp = computeForceBPById(b.p2ForceId);
  let chosen, reason;
  if (p1bp === p2bp) {
    // Tie — pick at random. Surface the call in the toast.
    chosen = Math.random() < 0.5 ? "P1" : "P2";
    reason = `tied at ${p1bp} BP — random pick`;
  } else if (p1bp < p2bp) {
    chosen = "P1";
    reason = `${p1bp} BP < ${p2bp} BP`;
  } else {
    chosen = "P2";
    reason = `${p2bp} BP < ${p1bp} BP`;
  }
  b.priority = chosen;
  showToast(`Starting Priority → ${chosen} (${reason}).`, 4200);
}

// §34: whiff — zero-hit Ranged or Melee attack passes Priority to the
// opponent if the rolling Robot's side currently holds it. Scope is
// ONLY attack rolls (RANGED / MELEE); Fortitude / Shutdown / Boost /
// Physical / Mental rolls do NOT trigger whiff. Mirrors the
// shutdownTransferPriority signature so call sites are symmetric.
function whiffTransferPriority(b, r) {
  if (!b || !r || !r.side) return;
  if (b.priority === r.side) {
    b.priority = r.side === "P1" ? "P2" : "P1";
    showToast(`${r.name || "Robot"} whiff — Priority passes to ${b.priority}.`);
  }
}

// ════════════════════════════════════════════════════════════════════
// §16 — COLLISION SYSTEM (Tom 2026-06-13 rewrite, Ch 9 L115–131, L152)
//
// The webapp does not own positional state — collisions are resolved at
// the table. These helpers power the COLLISION calculator modal opened
// from the per-robot INERTIA stat-cell. They also expose a pure
// computational API so future code (positional simulator, AI, tests)
// can call them directly.
//
//   §16.A Robot v Robot damage: (Total Involved Inertia) × Sil, where
//         Sil is the LARGER Robot's Sil — except when the target is
//         stationary (Inertia 0), in which case use the colliding
//         Robot's Sil. Both Robots take this damage.
//
//   §16.A Robot v Terrain damage: Inertia × Sil to the terrain. The
//         Robot's Inertia drops to 0 and the Pilot makes a Fortitude
//         Check against the lost Inertia score.
//
//   §16.B Chaining: a collision that pushes a Robot into another
//         Robot triggers a follow-up Converging hit, resolved AFTER
//         the current collision finishes. Iterative queue, NOT
//         recursive (multi-hop chains are legal).
//
//   §16.C Chasing classification: only when collider is on target's
//         Rear Vector AND target has Inertia > 0. The old
//         "OR both on ground" branch is removed — grounded chases are
//         now plain Converging unless rear-vector applies.
// ════════════════════════════════════════════════════════════════════

// Effective Sil for a Robot-v-Robot collision (§16.A).
// `collider` is the Robot whose movement caused the collision;
// `target` is the Robot being hit. If `target` is stationary
// (Inertia 0), use the collider's Sil; otherwise use the larger Sil.
function effectiveCollisionSil(collider, target) {
  const cSil = Number(collider?.silhouette || 0);
  const tSil = Number(target?.silhouette || 0);
  const tInr = Number(target?.inertia || 0);
  const cInr = Number(collider?.inertia || 0);
  if (tInr === 0 && cInr > 0) return cSil;
  return Math.max(cSil, tSil);
}

// §16.A Robot-v-Robot damage. Returns { damage, useSil,
// involvedInertia } so callers can show their work. Both Robots
// take `damage`.
function computeRobotVRobotCollisionDamage(collider, target) {
  const cInr = Number(collider?.inertia || 0);
  const tInr = Number(target?.inertia || 0);
  const involvedInertia = cInr + tInr;
  const useSil = effectiveCollisionSil(collider, target);
  return { damage: involvedInertia * useSil, useSil, involvedInertia };
}

// §16.A Robot-v-Terrain damage. Returns the damage the terrain takes,
// the Inertia score the Pilot rolls Fortitude against (= the lost
// Inertia), and the post-collision Inertia (always 0). Callers that
// want to mutate live state should set `collider.inertia = 0` and
// pipe `lostInertia` into a Fortitude Check.
function computeRobotVTerrainCollisionDamage(collider) {
  const cInr = Number(collider?.inertia || 0);
  const cSil = Number(collider?.silhouette || 0);
  return {
    damage: cInr * cSil,
    lostInertia: cInr,
    newInertia: 0,
  };
}

// §16.C Classify a collision as CHASING or CONVERGING.
// Caller passes `colliderOnRearVector` because the webapp does not
// know facing geometry — the user picks it in the modal. (When
// positional state lands, this boolean comes from isOnRearVector().)
function classifyCollision(target, colliderOnRearVector) {
  const tInr = Number(target?.inertia || 0);
  if (colliderOnRearVector && tInr > 0) return "CHASING";
  return "CONVERGING";
}

// §21.B: All-Shutdown loss check. If a player has only Shutdown (or
// effectively-out) Robots on the table, that side loses. A Robot whose
// CORE component is destroyed counts as out as well — the robot is
// dead, not merely Shutdown.
function checkAllShutdownLoss(b) {
  if (!b || b.gameOver) return false;
  for (const side of ["P1", "P2"]) {
    const robots = side === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
    if (robots.length === 0) continue;
    const allOut = robots.every(r => {
      if (r.shutdown) return true;
      const core = (r.components || []).find(c => c.definition === "CORE");
      if (core && core.isDestroyed) return true;
      return false;
    });
    if (allOut) {
      b.gameOver = true;
      b.winner = side === "P1" ? "P2" : "P1";
      b.lossReason = `All ${side} Robots Shutdown`;
      b.loserSide = side;
      dbPut("battles", b);
      // Iter 22 (Tom 2026-06-17): replaced 6s toast with dedicated
      // game-over modal. Toast remains as a brief background notice in
      // case the player dismisses the modal — they can re-summon it by
      // checking `b.gameOver` (renderBattleOverview surfaces a banner).
      showToast(`${side} has only Shutdown Robots — DEFEAT. ${b.winner} wins.`, 3200);
      // Defer pushModal so any in-flight modal close (cascading-failure
      // path resolves through several sync handlers) doesn't get stomped.
      setTimeout(() => {
        if (state.activeBattle?.id !== b.id) return;
        if (state.modal && state.modal.kind !== "fortitude-sequence") return;
        pushModal("game-over", { battleId: b.id });
      }, 0);
      return true;
    }
  }
  return false;
}

// Iter 22 (Tom 2026-06-17): dedicated game-over modal. Visible whenever
// b.gameOver === true. Displays winner side, loss reason, and per-Robot
// final state (destroyed / shutdown / active) on both sides. CLOSE
// returns to the battle overview screen — Tom can hit END BATTLE from
// there to clear state, or open another battle from FORCES.
function renderGameOver(data) {
  const b = state.activeBattle;
  if (!b || !b.gameOver) {
    return `<h2>BATTLE STATUS</h2><p class="meta">No completed battle.</p>
      <div class="actions"><button class="btn ghost" data-act="modal-close">CLOSE</button></div>`;
  }
  const winner = b.winner || "—";
  const loser = b.loserSide || (winner === "P1" ? "P2" : "P1");
  const reason = b.lossReason || `All ${loser} Robots Shutdown`;
  const robotFinalState = (r) => {
    const core = (r.components || []).find(c => c.definition === "CORE");
    if (core && core.isDestroyed) {
      return { tag: "DESTROYED", color: "var(--critical-red)" };
    }
    if (r.shutdown) {
      return { tag: "SHUTDOWN", color: "var(--phosphor-amber)" };
    }
    return { tag: "ACTIVE", color: "var(--comm-cyan)" };
  };
  const sideBlock = (sideId) => {
    const robots = sideId === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
    const isWinner = sideId === winner;
    const accent = isWinner ? "var(--squad-gold)" : "var(--critical-red)";
    const label = isWinner ? "WINNER" : "LOSER";
    return `
      <div style="margin-top:14px; padding:10px; border:1px solid ${accent}; border-radius:2px; background:rgba(0,0,0,0.18)">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <div style="font-family:'Saira Condensed',sans-serif; font-weight:800; font-size:16px; letter-spacing:0.06em; color:${accent}">${sideId}</div>
          <div class="chip" style="background:${accent}; color:var(--hull)">${label}</div>
        </div>
        ${robots.length === 0
          ? `<div class="meta" style="font-size:12px; margin-top:6px">No robots deployed.</div>`
          : `<div style="display:flex; flex-direction:column; gap:4px; margin-top:8px">
              ${robots.map(r => {
                const st = robotFinalState(r);
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:4px 6px; background:var(--hull-dim); border-left:2px solid ${st.color}">
                  <span style="font-size:13px">${escapeHtml(r.robotName || r.name || "Robot")}</span>
                  <span style="font-family:'Space Mono',ui-monospace,monospace; font-size:10px; letter-spacing:0.08em; color:${st.color}">${st.tag}</span>
                </div>`;
              }).join("")}
            </div>`}
      </div>
    `;
  };
  return `
    <h2 style="color:var(--squad-gold)">${escapeHtml(winner)} WINS</h2>
    <p class="meta" style="font-size:14px">${escapeHtml(reason)}.</p>
    ${sideBlock(winner)}
    ${sideBlock(loser)}
    <div class="actions" style="margin-top:14px">
      <button class="btn amber" data-act="game-over-close">CLOSE</button>
    </div>
  `;
}
handlers["game-over-close"] = () => { closeModal(); };

// §55 (Tom 2026-06-17, Ch 7 L46 rulebook canon): the baseline Emergency
// Shutdown Check is rolled by the ROBOT, not the pilot, using a pool of
// Σ(consciousPilotMental) + capacitorsRemaining. Pass on hits >= System
// Strain (or pass on any hits if Net Power < 0 per rulebook footnote).
// Returns the breakdown so the modal can surface the math.
//
// AI cockpits count too — they share the cockpit roll. We can't use
// _consciousCockpitPilots() directly because that helper filters out
// `cp.isAi`; here we want every non-KO cockpit slot with a resolvable
// pilot stat. For AI cores the bound pilot is on the module via
// findAiPilotForSlot(); for human cockpits, state.pilots by id.
function computeShutdownPool(r) {
  let mentalTotal = 0;
  if (r) {
    for (const cp of (r.cockpitPilots || [])) {
      if (!cp || cp.isKO) continue;
      let pilot = null;
      if (cp.isAi) {
        // Resolve via the owning component/module so the bound AI
        // pilot's mental counts. Fall through to a generic AI lookup
        // if the slot didn't bind explicitly (matches getRobotNetPower).
        const comp = (r.components || []).find(c => (c.componentId ?? c.tempId) === cp.componentId);
        const mod = comp ? (comp.modules || [])[cp.moduleIndex] : null;
        pilot = (comp && mod) ? findAiPilotForSlot(r, comp, mod) : null;
        if (!pilot) pilot = (state.pilots || []).find(p => p && p.isAi) || null;
      } else if (cp.pilotId != null) {
        pilot = (state.pilots || []).find(p => p.id === cp.pilotId) || null;
      }
      if (pilot) mentalTotal += (pilot.mental || 0);
    }
  }
  const capacitorsRemaining = (r && (r.capacitorsRemaining ?? r.capacitorsMax)) || 0;
  return { mentalTotal, capacitorsRemaining, dicePool: mentalTotal + capacitorsRemaining };
}

// Shutdown reboot test. Roll (Σ Mental + Capacitors) d6 vs 5+:
//   hits ≥ systemStrain → success, sysStrain -= 3 (clamped), shutdownPending cleared
//   hits < systemStrain → fail, r.shutdown = true (robot skips turn until round
//             advance, which clears the flag in pass-priority + round-next)
// Power<0 footnote (Ch 7): pass on ANY hits if Net Power < 0.
function renderShutdownReboot(rid, lastRoll) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const { mentalTotal, capacitorsRemaining, dicePool } = computeShutdownPool(r);
  const threshold = 5;
  const netPower = getRobotNetPower(r);
  const powerNegPass = netPower < 0;
  const passTarget = powerNegPass ? 1 : (r.systemStrain || 0);
  const dieChip = v => {
    const hit = v >= threshold;
    return `<span class="chip ${hit ? "amber" : "muted"}" style="font-size:14px; padding:6px 10px; margin-right:4px">${v}</span>`;
  };
  // §31 Override (Tom 2026-06-13 canonical): pool = FD + Strain Token
  // count (i.e., current systemStrain). Prior `fd + excess` formula was
  // wrong — Strain Token count is total strain, not strain ABOVE
  // threshold. Pilot takes +1 strain after the check resolves
  // regardless of pass/fail (was conditional on success).
  const overridePilot = (r.cockpitPilots || []).find(cp =>
    !cp.isKO && cp.pilotId &&
    (PILOTS_BY_ID[cp.pilotId]?.talents || []).includes("Override")
  );
  // Overclock: 2×Mental d6 at 5+, once per game; +2 strain to acting pilot.
  const overclockPilot = !r.overclockUsed && (r.cockpitPilots || []).find(cp =>
    !cp.isKO && cp.pilotId &&
    (PILOTS_BY_ID[cp.pilotId]?.talents || []).includes("Overclock")
  );
  const fd = r.frameDurability || 1;
  const strainTokens = r.systemStrain || 0;
  const overrideDiceCount = fd + strainTokens;
  const overclockDiceCount = overclockPilot ? 2 * ((PILOTS_BY_ID[overclockPilot.pilotId]?.mental) || 1) : 0;
  return `
    <h2>SHUTDOWN CHECK</h2>
    <p class="meta">System Strain <strong>${r.systemStrain}/${r.systemStrainThreshold}</strong>. Roll ${dicePool} d6 vs ${threshold}+ (Mental ${mentalTotal} + Capacitors ${capacitorsRemaining}).<br/>
      ${powerNegPass
        ? `<span style="color:var(--amber)">Power negative — pass on any hits.</span>`
        : `Hits ≥ System Strain (${strainTokens}) → −3 System Strain, robot clears. Hits &lt; System Strain → Shutdown (skip turn until next round).`}</p>
    ${r.quickTroubleshooterAvailable ? `<p class="meta" style="color:var(--cyan)">Quick Troubleshooter active — after reboot, pick which module to retoggle.</p>` : ""}
    ${lastRoll ? `
      <div style="margin-top:12px">
        <div class="label-small">LAST ROLL ${lastRoll.variant ? `(${lastRoll.variant})` : ""}</div>
        <div style="margin-top:6px">${lastRoll.dice.map(dieChip).join("")}</div>
        <div style="margin-top:10px; font-size:18px">
          ${(lastRoll.passed ?? (lastRoll.hits > 0))
            ? `<span class="label-cyan">✓ REBOOTED · ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} · −3 Strain${lastRoll.pilotCost ? ` · +${lastRoll.pilotCost} strain on acting pilot` : ""}</span>`
            : `<span class="label-red">✗ SHUTDOWN · ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} · skip turn</span>`}
        </div>
      </div>
    ` : ""}
    <div class="actions" style="margin-top:14px; flex-wrap:wrap; gap:8px">
      ${lastRoll
        ? `<button class="btn amber" data-act="shutdown-reboot-done">DONE</button>`
        : `<button class="btn ghost" data-act="modal-close">SKIP (manual)</button>
           <button class="btn amber" data-act="shutdown-reboot-roll">ROLL ${dicePool} D6 VS ${threshold}+</button>
           ${overridePilot ? `<button class="btn ghost" style="color:var(--cyan)" data-act="shutdown-override-roll" data-id="${rid}">OVERRIDE · ${overrideDiceCount} D6 VS 5+ (FD ${fd} + ${strainTokens} strain)</button>` : ""}
           ${overclockPilot ? `<button class="btn ghost" style="color:var(--amber)" data-act="shutdown-overclock-roll" data-id="${rid}">OVERCLOCK · ${overclockDiceCount} D6 VS 5+ (once)</button>` : ""}`}
    </div>
  `;
}
handlers["shutdown-reboot-roll"] = () => {
  const d = state.modal.data;
  const r = findBattleRobot(state.activeBattle, d.id);
  if (!r) return;
  // §55 (Tom 2026-06-17, Ch 7 L46): pool = Σ(consciousPilotMental) +
  // capacitorsRemaining. Pass when hits >= systemStrain (or any hits if
  // Net Power < 0).

  const threshold = 5;
  const netPower = getRobotNetPower(r);

    r.shutdownPending = false;

    r.shutdownPending = false;

    shutdownTransferPriority(state.activeBattle, r);

};

// Iter 23 (Tom 2026-06-17): pure read-only what-if for the damage
// pipeline. Mirrors applyDamage's stages (shields → guard → armor coating
// → component armor → frame save) without mutating any state. Returns
// a populated breakdown the modal can render directly. Honors §15.C
// block redirect for overflow path prediction.
//   { shieldsBefore, shieldsAfter, shieldAbsorb,
//     guardName, guardAbsorb, guardBreaksOut,
//     coatingFullAbsorb,
//     armorBefore, armorAfter, armorAbsorb, breach,
//     componentDestroyed, isFrame,
//     frameDice, frameThreshold,
//     overflowDamage, overflowTargetName }
function computeDamagePreview(r, c, amount, type, opts = {}) {
  if (!r || !c || amount <= 0) return null;
  const out = {
    shieldsBefore: r.shieldsCurrent || 0,
    shieldsAfter: r.shieldsCurrent || 0,
    shieldAbsorb: 0,
    guardName: null,
    guardAbsorb: 0,
    guardArmorBefore: 0,
    guardArmorAfter: 0,
    guardBreaksOut: false,
    coatingFullAbsorb: false,
    armorBefore: c.hpCurrent || 0,
    armorAfter: c.hpCurrent || 0,
    armorAbsorb: 0,
    breach: 0,
    componentDestroyed: false,
    isFrame: !!c.isFrame,
    frameDice: 0,
    frameThreshold: 0,
    overflowDamage: 0,
    overflowTargetName: null,
  };
  let remaining = amount;
  // Stage 1: shields (unless bypassShields).
  if (!opts.bypassShields && (r.shieldsCurrent || 0) > 0) {
    const absorb = Math.min(r.shieldsCurrent, remaining);
    out.shieldAbsorb = absorb;
    out.shieldsAfter = r.shieldsCurrent - absorb;
    remaining -= absorb;
    if (remaining <= 0) return out;
  }
  // Stage 2: Guard equipment.
  const guardEq = (c.equipment || []).find(e =>
    (e.keywords || []).includes("Guard") && (e.armorCurrent ?? 0) > 0
  );
  if (guardEq) {
    // Energy-Reflective Coating reflects full Energy at full guard armor.
    if (type === "Energy"
        && (guardEq.keywords || []).includes("Energy-Reflective Coating")
        && guardEq.armorCurrent === guardEq.armorMax) {
      out.guardName = guardEq.name || "Guard";
      out.guardReflect = true;
      return out;
    }
    const absorb = Math.min(guardEq.armorCurrent, remaining);
    out.guardName = guardEq.name || "Guard";
    out.guardArmorBefore = guardEq.armorCurrent;
    out.guardArmorAfter = guardEq.armorCurrent - absorb;
    out.guardAbsorb = absorb;
    out.guardBreaksOut = out.guardArmorAfter <= 0;
    remaining -= absorb;
    if (remaining <= 0) return out;
  }
  // Stage 3: Armor Coating (Energy immunity at full armor).
  const hasArmorCoating = (c.modules || []).some(m => m.moduleId === "armor_coating");
  if (hasArmorCoating && type === "Energy" && (c.hpCurrent || 0) === (c.hpMax || 0)) {
    out.coatingFullAbsorb = true;
    return out;
  }
  // Stage 4: Component armor (hpCurrent is the armor buffer).
  let effectiveArmor = c.hpCurrent || 0;
  const bypass = opts.bypassArmor || 0;
  if (bypass > 0) effectiveArmor = Math.max(0, effectiveArmor - bypass);
  const absorbed = Math.min(effectiveArmor, remaining);
  const breach = remaining - absorbed;
  out.armorAbsorb = absorbed;
  out.armorAfter = (c.hpCurrent || 0) - absorbed;
  out.breach = breach;
  if (breach > 0) {
    if (c.isFrame) {
      // Frame Save: FD d6 vs (7-FM)+. Hits reduce breach; if any breach
      // remains, Component destroyed + overflow walks to parent.
      out.frameDice = r.frameDurability || 1;
      out.frameThreshold = Math.max(2, 7 - (r.frameMaterial || 1));
      // Cannot know dice outcome here; we surface the dice math only.
      // The "expected hits" = (7-threshold)/6 × FD; user reads the rough
      // odds at the table.
    } else {
      // Non-Frame: instant destruction; overflow routes per §15.C if
      // block-redirected, otherwise walks build parent chain.
      out.componentDestroyed = true;
      out.overflowDamage = breach;
      if (opts.blockOriginalCid != null && opts.blockOriginalCid !== (c.componentId ?? c.tempId)) {
        const orig = (r.components || []).find(x => (x.componentId ?? x.tempId) === opts.blockOriginalCid);
        if (orig) out.overflowTargetName = orig.name || orig.definition || "(original target)";
      } else {
        const parent = parentComponentOf(r, c);
        out.overflowTargetName = parent ? (parent.name || parent.definition || "(parent)") : "(robot root)";
      }
    }
  }
  return out;
}

function renderApplyDamagePreview(r, c, amount, type, opts) {
  const p = computeDamagePreview(r, c, amount, type, opts);
  if (!p) return "";
  const rows = [];
  const cName = escapeHtml(c.name || c.definition || "?");
  // Shields row
  if (p.shieldsBefore > 0 || p.shieldAbsorb > 0) {
    rows.push(`<div style="display:flex; justify-content:space-between"><span>Shields</span><strong>${p.shieldsBefore} → ${p.shieldsAfter}</strong></div>`);
    if (p.shieldAbsorb > 0) rows.push(`<div class="meta" style="font-size:11px; margin-top:-2px">Absorbs <strong>${p.shieldAbsorb}</strong> ${p.shieldsAfter === 0 && p.shieldAbsorb < amount ? `(${amount - p.shieldAbsorb} continues)` : "(stops the hit)"}</div>`);
  }
  // Guard row
  if (p.guardReflect) {
    rows.push(`<div class="label-small label-cyan">${escapeHtml(p.guardName)} REFLECTS the Energy hit (§15.D)</div>`);
  } else if (p.guardName && p.guardAbsorb > 0) {
    rows.push(`<div style="display:flex; justify-content:space-between"><span>Guard · ${escapeHtml(p.guardName)}</span><strong>${p.guardArmorBefore} → ${p.guardArmorAfter}${p.guardBreaksOut ? " · BROKEN" : ""}</strong></div>`);
  }
  // Armor Coating
  if (p.coatingFullAbsorb) {
    rows.push(`<div class="label-small label-cyan">Armor Coating absorbs all Energy (full armor; §15)</div>`);
  }
  // Component armor row
  if (!p.guardReflect && !p.coatingFullAbsorb) {
    rows.push(`<div style="display:flex; justify-content:space-between"><span>${cName} armor</span><strong>${p.armorBefore} → ${p.armorAfter}</strong></div>`);
    if (p.armorAbsorb > 0) {
      rows.push(`<div class="meta" style="font-size:11px; margin-top:-2px">Absorbs <strong>${p.armorAbsorb}</strong>${p.breach > 0 ? ` · <strong>${p.breach} breach</strong>` : ""}</div>`);
    } else if (p.breach > 0) {
      rows.push(`<div class="meta" style="font-size:11px; margin-top:-2px">Armor already 0 · <strong>${p.breach} breach</strong></div>`);
    }
  }
  // Frame Save row
  if (p.breach > 0 && p.isFrame) {
    // Expected-hits math: each die hits with prob (7-threshold)/6.
    const hitProb = (7 - p.frameThreshold) / 6;
    const expectedHits = (p.frameDice * hitProb).toFixed(1);
    rows.push(`<div class="label-small label-amber" style="margin-top:4px">FRAME SAVE: ${p.frameDice}d6 vs ${p.frameThreshold}+ · expected ~${expectedHits} hits (each hit −1 breach). If any breach remains → destroyed + overflow.</div>`);
  }
  // Overflow row
  if (p.componentDestroyed && p.overflowDamage > 0) {
    rows.push(`<div class="label-small label-amber" style="margin-top:4px">DESTROYED · ${p.overflowDamage} overflow → ${escapeHtml(p.overflowTargetName || "(none)")}</div>`);
  }
  // §44 (Tom 2026-06-17): cockpit host-destruction advisory. When the
  // targeted Component hosts ≥1 non-KO'd Pilot AND the pipeline projects
  // destruction (non-Frame destroyed outright OR Frame breach > 0 → save
  // not guaranteed), warn the player which pilots will be KO'd. Per Ch
  // 13 L138 ("if [host Component] is destroyed, the Pilot is ejected or
  // incapacitated"). The webapp's destroyComponent step (6) handles the
  // KO; this preview shows the future-state cost. Surface even on Frame
  // breach (save can still fail) so the player sees the worst-case.
  const cid = c.componentId ?? c.tempId;
  const willDestroyOutright = p.componentDestroyed; // non-Frame, no save path
  const couldDestroyOnFailedSave = p.isFrame && p.breach > 0;
  if (willDestroyOutright || couldDestroyOnFailedSave) {
    const hostedPilots = (r.cockpitPilots || []).filter(cp =>
      cp.componentId === cid && !cp.isKO
    );
    if (hostedPilots.length > 0) {
      const names = hostedPilots.map(cp =>
        cp.isAi ? "AI Core" : ((state.pilots || []).find(pp => pp.id === cp.pilotId)?.name || "Pilot")
      ).join(", ");
      const verb = willDestroyOutright ? "will be" : "will be (on failed Frame Save)";
      rows.push(`<div class="label-small label-red" style="margin-top:4px">⚠ COCKPIT HOST · ${escapeHtml(names)} ${verb} INCAPACITATED. §44 / Ch 13 L138</div>`);
    }
  }
  if (rows.length === 0) {
    rows.push(`<div class="meta" style="font-size:11px">No effect — pipeline absorbs cleanly.</div>`);
  }
  return `
    <div style="margin-top:10px; padding:8px; border:1px solid rgba(255,161,59,0.30); border-radius:4px; background:rgba(255,161,59,0.05)">
      <div class="label-small label-amber" style="margin-bottom:6px">⚡ DAMAGE PREVIEW</div>
      <div style="display:flex; flex-direction:column; gap:4px; font-size:12px">
        ${rows.join("")}
      </div>
    </div>
  `;
}

function renderApplyDamage(rid, cid, amount, type) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const comps = (r.components || []).filter(c => !c.isDestroyed);
  const cidOf = c => c.componentId ?? c.tempId;
  const d = state.modal?.data || {};
  const viaBlock = !!d.viaBlock;
  const viaScatter = !!d.viaScatter;
  const viaPenetrating = !!d.viaPenetrating;
  const bypass = Math.max(0, Number(d.bypass) || 0);
  const originalTargetCid = d.originalTargetCid;
  const fromBlockReaction = !!d.fromBlockReaction;
  const prefilledFromRoll = !!d.prefilledFromRoll;
  const prefilledKeywords = Array.isArray(d.prefilledKeywords) ? d.prefilledKeywords : [];
  const blockerLabel = viaBlock ? "BLOCKER (takes the hit)" : (viaScatter ? "COMPONENT (informational — Scatter hits ALL)" : "COMPONENT");
  const blockReactionBanner = fromBlockReaction
    ? `<p class="label-small label-cyan" style="margin-top:6px">🛡 BLOCK REACTION — pick the ORIGINAL target Component (the attacker's chosen hit) AND the BLOCKER (the Component you're redirecting into). §15.C</p>`
    : "";
  // Iter 51 (Tom 2026-06-17): roller→apply-damage prefill chip. When the
  // player taps "APPLY DAMAGE TO TARGET" in the dice-roller result panel,
  // the handoff handler stamps prefilledFromRoll=true and prefilledKeywords
  // with the weapon-keyword chip names. Surfaces here as a single amber
  // banner so the player sees which flags came from the roll snapshot
  // (and can untoggle any that don't apply for this particular component).
  const prefillBanner = (prefilledFromRoll && prefilledKeywords.length > 0)
    ? `<p class="label-small label-amber" style="margin-top:6px">⚡ PRE-FILLED FROM LAST ROLL: ${prefilledKeywords.map(escapeHtml).join(" · ")} — verify before APPLY. Toggle any flag below to override.</p>`
    : "";
  // Iter 23 (Tom 2026-06-17): live "what-if" preview computed from the
  // canonical pipeline (shields → guard → armor coating → component
  // armor → frame save). Re-runs on every change handler (cid/amount/
  // type/viaBlock/originalTargetCid) because all of those call render().
  // Iter 51: forward bypass into preview so the player sees the
  // Penetrating-adjusted armor math BEFORE committing.
  const targetComp = comps.find(c => cidOf(c) === cid);
  const previewOpts = {};
  if (viaBlock && originalTargetCid != null && originalTargetCid !== cid) {
    previewOpts.blockOriginalCid = originalTargetCid;
  }
  if (viaPenetrating && bypass > 0 && !viaScatter) {
    previewOpts.bypassArmor = bypass;
  }
  // §49 (Ch 12 L46) Scatter preview: skip the per-component preview
  // (it would only describe ONE of N targets and mislead the player).
  // Show a roll-up banner naming each targetable Component instead.
  let preview;
  if (viaScatter) {
    const targetable = viaBlock && originalTargetCid != null
      ? comps.filter(c => cidOf(c) !== originalTargetCid)
      : comps;
    const names = targetable.map(c => escapeHtml(c.name || c.definition || "?")).join(", ");
    preview = `
      <div style="margin-top:10px; padding:8px; border:1px solid rgba(255,161,59,0.30); border-radius:4px; background:rgba(255,161,59,0.05)">
        <div class="label-small label-amber" style="margin-bottom:6px">⚡ SCATTER PREVIEW · §49 / Ch 12 L46</div>
        <p style="font-size:12px; margin:0">
          ${amount} ${escapeHtml(type)} damage hits <strong>${targetable.length}</strong> targetable Component${targetable.length === 1 ? "" : "s"}${viaBlock ? " (plus 1 hit redirected to the blocker via §15.C)" : ""}.
          Each runs the full pipeline independently (shields → Guard → Armor Coating → armor → Frame Save).
        </p>
        <p class="meta" style="font-size:11px; margin-top:6px">Targets: ${names || "<em>none</em>"}</p>
        <p class="meta" style="font-size:10px; margin-top:4px; opacity:0.7">Webapp has no facing/LoF state — "targetable" defaults to ALL non-destroyed Components. Narrow at the table if needed.</p>
      </div>
    `;
  } else {
    preview = targetComp ? renderApplyDamagePreview(r, targetComp, amount, type, previewOpts) : "";
  }
  return `
    <h2>APPLY DAMAGE</h2>
    <p class="meta">Target component, amount, and type. Pipeline applies armor first, then Frame Save on overflow.</p>
    <div class="row-gap" style="flex-wrap:wrap;gap:4px;margin-top:4px">
      ${rulePeek("apply-damage-pipeline", { label: "📖 PIPELINE" })}
      ${rulePeek("frame-save", { label: "📖 FRAME SAVE" })}
      ${viaScatter ? rulePeek("scatter", { label: "📖 SCATTER" }) : ""}
      ${viaBlock ? rulePeek("block-redirect", { label: "📖 BLOCK §15.C" }) : ""}
      ${type === "Inertia (Melee)" ? rulePeek("inertia-impact-melee", { label: "📖 INERTIA IMPACT §50" }) : ""}
    </div>
    ${prefillBanner}
    ${blockReactionBanner}
    <div class="label-small label-cyan" style="margin-top:10px">${blockerLabel}</div>
    <select data-act="apply-damage-set-cid" data-key="cid" style="width:100%; margin-top:4px; padding:8px" ${viaScatter && !viaBlock ? "disabled" : ""}>
      ${comps.map(c => `
        <option value="${cidOf(c)}" ${cidOf(c) === cid ? "selected" : ""}>
          ${escapeHtml((c.name || c.definition || "?") + " · " + c.definition + " · armor " + (c.hpCurrent ?? 0) + "/" + (c.hpMax ?? 0))}
        </option>
      `).join("")}
    </select>
    <div class="label-small label-cyan" style="margin-top:10px">AMOUNT</div>
    <input type="number" min="0" value="${amount}" data-act="apply-damage-set-amount" style="width:100%; padding:8px; margin-top:4px" />
    <div class="label-small label-cyan" style="margin-top:10px">TYPE</div>
    <div class="row-gap" style="margin-top:4px; flex-wrap:wrap; gap:4px">
      <button class="btn ${type === "Physical" ? "amber" : "ghost"}" data-act="apply-damage-set-type" data-type="Physical">PHYSICAL</button>
      <button class="btn ${type === "Energy" ? "amber" : "ghost"}" data-act="apply-damage-set-type" data-type="Energy">ENERGY</button>
      <button class="btn ${type === "Inertia (Melee)" ? "amber" : "ghost"}" data-act="apply-damage-set-type" data-type="Inertia (Melee)" title="Damage was a melee/charge hit that included Inertia bonus. Pipeline = Physical; on cockpit hit, per-pilot Fortitude vs Inertia score auto-enqueues. §50 / Ch 6 L29">INERTIA (MELEE)</button>
    </div>
    ${type === "Inertia (Melee)" ? `
      <div style="margin-top:10px; padding:8px; border:1px solid rgba(255,161,59,0.30); border-radius:4px; background:rgba(255,161,59,0.05)">
        <div class="label-small label-amber">⚡ INERTIA SCORE (attacker's Inertia at hit time)</div>
        <p class="meta" style="font-size:11px; margin:2px 0 6px 0">Used as the Fortitude threshold per cockpit pilot whose Component took the hit (direct OR overflow). Rulebook L29: "Pilot makes a Fortitude Check against the Inertia score." §50 / Ch 6 L29.</p>
        <input type="number" min="0" value="${state.modal?.data?.inertiaScore ?? 0}" data-act="apply-damage-set-inertia" style="width:100%; padding:8px" />
        <p class="meta" style="font-size:10px; margin-top:4px; opacity:0.7">Pipeline applies as <strong>Physical</strong>. The Fortitude is the §50 hook, not the damage type.</p>
      </div>
    ` : ""}
    ${preview}
    <div style="margin-top:12px; padding:8px; border:1px solid rgba(255,161,59,0.20); border-radius:4px">
      <label style="display:flex; gap:6px; align-items:center; cursor:pointer; font-size:13px">
        <input type="checkbox" ${viaScatter ? "checked" : ""} data-act="apply-damage-toggle-scatter" />
        <span>Weapon has <strong>Scatter</strong> — damage hits ALL targetable Components on the target Robot (§49 / Ch 12 L46)</span>
      </label>
    </div>
    <div style="margin-top:12px; padding:8px; border:1px solid rgba(255,161,59,0.20); border-radius:4px">
      <label style="display:flex; gap:6px; align-items:center; cursor:pointer; font-size:13px">
        <input type="checkbox" ${viaPenetrating ? "checked" : ""} data-act="apply-damage-toggle-penetrating" />
        <span>Weapon has <strong>Penetrating</strong> — bypass <strong>${bypass || 1}</strong> Component Armor (= weapon Silhouette per Penetrating instance, §Ch 12 L13437)</span>
      </label>
      ${viaPenetrating ? `
        <div class="label-small label-cyan" style="margin-top:8px">BYPASS AMOUNT</div>
        <input type="number" min="0" value="${bypass}" data-act="apply-damage-set-bypass" style="width:100%; padding:8px; margin-top:4px" />
        <p class="meta" style="font-size:11px; margin-top:4px; opacity:0.85">Each Penetrating instance bypasses weapon Silhouette in armor. Stacks if multiple Penetrating hits on one Component. Routes through applyDamage's bypassArmor opt — armor &lt; bypass on a non-Frame Component destroys it outright.</p>
        ${(viaScatter || viaBlock || type === "Inertia (Melee)") ? `<p class="label-small label-amber" style="margin-top:4px">↪ Bypass applies through all selected routings (Scatter → every spread Component, Block → blocker + overflow, Inertia/Melee → final hit target). §Ch 12 Penetrating</p>` : ""}
      ` : ""}
    </div>
    <div style="margin-top:12px; padding:8px; border:1px solid rgba(77,208,225,0.20); border-radius:4px">
      <label style="display:flex; gap:6px; align-items:center; cursor:pointer; font-size:13px">
        <input type="checkbox" ${viaBlock ? "checked" : ""} data-act="apply-damage-toggle-block" />
        <span>Damage via <strong>Block</strong> — overflow on blocker destruction returns to original target (§15.C)</span>
      </label>
      ${viaBlock ? `
        <div class="label-small label-cyan" style="margin-top:8px">ORIGINAL TARGET (gets overflow if blocker destroyed)</div>
        <select data-act="apply-damage-set-original" style="width:100%; margin-top:4px; padding:8px">
          ${comps.map(c => `
            <option value="${cidOf(c)}" ${cidOf(c) === originalTargetCid ? "selected" : ""}>
              ${escapeHtml((c.name || c.definition || "?") + " · " + c.definition + " · armor " + (c.hpCurrent ?? 0) + "/" + (c.hpMax ?? 0))}
            </option>
          `).join("")}
        </select>
      ` : ""}
    </div>
    <div class="actions" style="margin-top:14px">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>
      <button class="btn amber" data-act="apply-damage-submit" ${amount <= 0 ? "disabled" : ""}>APPLY</button>
    </div>
  `;
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// ACTION RESOLVE MODAL + STRAIN DIALOGS + COMPONENT SHEET
// ════════════════════════════════════════════════════════════════════
handlers["toggle-off-vector"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  if (!r) return;
  r.offVectorLock = !r.offVectorLock;
  render();
};
handlers["set-pivot-rotation"] = ({ rot }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.rotateBy = Number(rot) || 0;
  render();
};
handlers["set-charge-distance"] = (_, elValue) => {
  // Iter 31 (Tom 2026-06-17): typed value comes through as the second
  // positional arg from the global change-event delegator (line ~2209).
  // The <input> has no data-value, so dataset.value is always undefined —
  // must read elValue. See apply-damage-set-amount for the canonical pattern.
  const d = state.modal?.data;
  if (!d) return;
  d.distance = Math.max(0, Number(elValue) || 0);
  // No re-render needed — the input keeps focus and other UI is unaffected.
};
// §59 (Tom 2026-06-17, L246 / Ch 6): MOVE and QUICK_MOVE have a reverse
// modifier. classifyReverseMove() short-circuits to unknownGeometry in
// the webapp (no positional state), so the player toggles reverse
// explicitly via a chip in the action picker. The flag is stashed on
// the modal data and consumed by the distance cap + the resolve handler.
handlers["toggle-move-reverse"] = () => {
  const d = state.modal?.data;
  if (!d) return;
  d.moveReverse = !d.moveReverse;
  // Distance cap halves on reverse-toggle; reset the typed distance so
  // the input doesn't stay above the new cap by accident.
  d.distance = undefined;
  render();
};
handlers["set-boost-hdist"] = (_, elValue) => {
  // Iter 31 (Tom 2026-06-17): see set-charge-distance — read elValue, not
  // dataset.value (which is always undefined for <input> elements).
  const d = state.modal?.data;
  if (!d) return;
  d.hDist = Math.max(0, Number(elValue) || 0);
};
handlers["set-boost-vdist"] = (_, elValue) => {
  // Iter 31 (Tom 2026-06-17): see set-charge-distance — read elValue, not
  // dataset.value (which is always undefined for <input> elements).
  const d = state.modal?.data;
  if (!d) return;
  d.vDist = Number(elValue) || 0;
};
// Iter 22 (Tom 2026-06-17): Vector-arc direction picker for the BOOST
// modal. While Flying, turning off-Vector costs more Fuel AND triggers
// a Fortitude Check (rulebook L11178). Direction is one of:
//   'front' (1× fuel, no Fortitude),
//   'lr'    (2× fuel, Fortitude vs Silhouettes-moved × 2),
//   'rear'  (3× fuel, Fortitude vs Silhouettes-moved × 3).
// Source label 'off-vector-fortitude' is recognized by
// gAdaptedAppliesToSource so G-Adapted pilots auto-get +4 dice.
handlers["set-boost-dir"] = ({ dir }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.boostDir = (dir === "lr" || dir === "rear") ? dir : "front";
  render();
};
handlers["set-decel-pts"] = (_, elValue) => {
  // Iter 31 (Tom 2026-06-17): see set-charge-distance — read elValue, not
  // dataset.value (which is always undefined for <input> elements).
  const d = state.modal?.data;
  if (!d) return;
  d.decelPts = Math.max(0, Number(elValue) || 0);
};
handlers["bump-salvo-count"] = ({ d }) => {
  const cur = state.modal?.data?.targetCount ?? 1;
  const next = Math.max(1, Math.min(10, cur + Number(d)));
  if (state.modal?.data) state.modal.data.targetCount = next;
  render();
};
// Iter 19 (Tom 2026-06-17): per-weapon opt-in toggle for the Linked
// Equipment banner. Each linked constituent has a unique key
// `${cid}:${eqIdx}:${partIdx}`. Untouched (key absent) = default-on;
// first click stores explicit `false`; subsequent clicks flip.
handlers["toggle-linked-weapon"] = ({ key }) => {
  if (!key || !state.modal?.data) return;
  state.modal.data.linkedWeaponSelections = state.modal.data.linkedWeaponSelections || {};
  const sel = state.modal.data.linkedWeaponSelections;
  // Initial (absent) = on. Flip to false. If false, flip to true.
  if (!(key in sel)) sel[key] = false;
  else sel[key] = !sel[key];
  render();
};
// Iter 46 (Tom 2026-06-17): per-weapon opt-in toggle for STANDALONE
// Ranged equipment in the SALVO picker. Mirrors toggle-linked-weapon's
// shape but keys by `${cid}:${eqIdx}` (no partIdx — standalone Equipment
// is not a Linked composite). Untouched (key absent) = default-on so
// existing behavior (every standalone Ranged equipment fires) is
// preserved as backward-compat. First click stores `false`; subsequent
// clicks flip. Consumed by salvoWeaponsFiredCount() when its optional
// standaloneSelections arg is passed.
handlers["toggle-salvo-standalone-weapon"] = ({ key }) => {
  if (!key || !state.modal?.data) return;
  state.modal.data.salvoStandaloneSelections = state.modal.data.salvoStandaloneSelections || {};
  const sel = state.modal.data.salvoStandaloneSelections;
  if (!(key in sel)) sel[key] = false;
  else sel[key] = !sel[key];
  render();
};
// §72 (Tom 2026-06-17): MELEE_ASSAULT mirror of the iter-46 SALVO
// standalone opt-in toggle. Independent storage key
// (meleeStandaloneSelections) so picking a SALVO opt-out in one action
// session does not bleed into a MELEE_ASSAULT picker in the same modal
// data lifetime — and vice-versa.
handlers["toggle-melee-assault-standalone-weapon"] = ({ key }) => {
  if (!key || !state.modal?.data) return;
  state.modal.data.meleeStandaloneSelections = state.modal.data.meleeStandaloneSelections || {};
  const sel = state.modal.data.meleeStandaloneSelections;
  if (!(key in sel)) sel[key] = false;
  else sel[key] = !sel[key];
  render();
};
handlers["toggle-salvo-target"] = ({ tid }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.targetIds = d.targetIds || [];
  const n = Number(tid);
  const i = d.targetIds.indexOf(n);
  if (i >= 0) d.targetIds.splice(i, 1); else d.targetIds.push(n);
  render();
};
handlers["open-action"] = ({ id, k }) => {
  // Defense-in-depth: refuse to open a spent action even if the disabled
  // attribute was bypassed somehow. PASS is always available.
  const r = findBattleRobot(state.activeBattle, id);
  const a = ACTIONS[k];
  if (r && a && k !== "PASS") {
    // §64 (Tom 2026-06-17): Rulebook Ch 4 L24 — "Tokens are unlimited —
    // you can always take another action." The old Primary-spent /
    // Reactions-spent cap-toasts have been removed. The cost of an
    // extra token is now ENFORCED via Pilot Strain accumulation (iter
    // 12 §4: over Mental → +1 Pilot HP damage) and System Strain (over
    // threshold → Emergency Shutdown Check, §55), surfaced visually via
    // the strain-consequence chip in renderActionSheet.
    // §22 + §32 Reaction validator: block "react to a Reaction during
    // own Priority Action resolution" with toast. Friendly-fire
    // reactions are NOT gated (rule #2).
    if (a.bucket === "reaction") {
      const gate = canDeclareReaction(r, k);
      if (!gate.ok) { showToast(gate.blockReason || "Cannot declare Reaction now."); return; }
    }
  }
  // Shutdown gate: if strain reached threshold, the robot must roll a
  // reboot test before doing anything else. STRAIN_CLEAR + STRAIN_VENT +
  // COOLANT_VENT can drain strain so they're the escape hatch and remain allowed.
  // PASS also bypasses (you can always pass priority).
  if (r?.shutdownPending && k !== "STRAIN_CLEAR" && k !== "STRAIN_VENT" && k !== "COOLANT_VENT" && k !== "PASS") {
    // §55 (Tom 2026-06-17, Ch 7 rulebook): "If a Robot has no power
    // generation at all and no capacitors, they do not make a check at
    // all and immediately shutdown." Zero dicePool + non-positive net
    // power = no surface to roll on. Skip the modal entirely.
    const pool = computeShutdownPool(r).dicePool;
    if (pool === 0 && getRobotNetPower(r) <= 0) {
      applyImmediateShutdown(state.activeBattle, r, "No power, no capacitors");
      dbPut("battles", state.activeBattle);
      render();
      return;
    }
    pushModal("shutdown-reboot", { id: Number(id) });
    return;
  }
  // Already in Shutdown (last round's reboot failed) — robot can't act.
  if (r?.shutdown && k !== "PASS") {
    showToast("Robot is Shutdown — skip turn or wait for reboot next round.");
    return;
  }
  if (k === "STEP" && r && ((r.altitude ?? 0) !== 0 || (r.inertia ?? 0) !== 0)) {
    showToast("STEP requires grounded + still.");
    return;
  }
  // §41 (Tom 2026-06-17): Quick Move requires Altitude 0 (grounded).
  if (k === "QUICK_MOVE" && r && (r.altitude ?? 0) > 0) {
    showToast(`QUICK MOVE requires Altitude 0 — currently ${r.altitude ?? 0}.`);
    return;
  }
  if (k === "STAND_UP" && r && !(r.statusEffects || []).includes("DOWN")) {
    showToast("STAND UP requires DOWN status.");
    return;
  }
  // §22 + §32: track the currently-resolving Priority Action robot so
  // canDeclareReaction() can block "react to a Reaction during own
  // Priority Action resolution" (rule #1). Reactions / Incidentals
  // do NOT set this — only Primary actions establish the resolution
  // chain. Cleared in modal-close + resolve-action.
  if (r && a && a.bucket === "primary" && k !== "PASS") {
    state.activePriorityRobotId = r.robotId;
  }
  pushModal("action-resolve", { id: Number(id), k, targetIds: [] });
};
let renderActionResolve = function (rid, k) {
  const r = findBattleRobot(state.activeBattle, rid);
  const a = ACTIONS[k];
  if (!r || !a) return "<p>?</p>";
  const cockpits = r.cockpitPilots || [];
  // §13.E — surface a mid-grapple advisory: Melee and Ranged still
  // ALLOWED while GRAPPLED. Ranged is restricted to internally-mounted
  // weapons (§27 isValidRangedTarget already enforces min-range).
  const _grappledBanner = (() => {
    if (!(r.statusEffects || []).includes("GRAPPLED")) return "";
    if (k === "MELEE_ASSAULT" || k === "CHARGE" || k === "QUICK_STRIKE" || k === "PARRY") {
      return `<p class="label-small label-amber" style="margin-top:6px">⚠ Mid-grapple — Melee OK with any FREE Manipulator wielding a melee weapon. Grappling partner is a valid target (§13.E).</p>`;
    }
    if (k === "SALVO" || k === "STRAFE" || k === "HIP_SHOT") {
      return `<p class="label-small label-amber" style="margin-top:6px">⚠ Mid-grapple — Ranged limited to INTERNALLY-MOUNTED weapons. Min Range still applies (§27). Pool −2 dice (§13.C).</p>`;
    }
    return "";
  })();
  // §31 Brawler damage banner — surfaced on any Melee Priority Action
  // / Reaction so the player remembers to add ½ FS damage at the table
  // on bare-arm or socket-mounted melee hits. Damage bonus is NOT a
  // dice chip; it's added to final damage after the attack roll.
  const _brawlerBanner = (() => {
    if (k !== "CHARGE" && k !== "MELEE_ASSAULT" && k !== "QUICK_STRIKE" && k !== "PARRY") return "";
    const bonus = brawlerMeleeDamageBonus(r);
    if (bonus <= 0) return "";
    return `<p class="label-small label-cyan" style="margin-top:6px">BRAWLER: add <strong>+${bonus}</strong> Damage on bare-arm OR socket-mounted melee hit (½ Frame Strength). §31</p>`;
  })();
  // §40 (Tom 2026-06-17): melee Inertia-bonus damage banner. Attacker

          showToast("GRAB picks up adjacent equipment. To grapple another Robot use INITIATE GRAPPLE (§13).");
        } else {
          showToast("Grab — resolve equipment pick-up at the table.");
        }
      }
      // §13.B INITIATE_GRAPPLE — opposed Physical. Each side adds +2
      // dice per free Manipulator. Attacker wins on hits > defender;
      // ties go to defender (existing opposed-check convention).
      // On success: lower-weight Robot moves adjacent (webapp can't
      // place tokens — toast instructs the table); both Robots flip to
      // GRAPPLED / GRAPPLING with back-links; one Manipulator per side
      // is marked occupiedByGrappleId.
      if (k === "INITIATE_GRAPPLE") {
        const tids = state.modal?.data?.targetIds || [];
        const tid = tids[0];
        const b = state.activeBattle;
        const all = [...(b.p1Robots || []), ...(b.p2Robots || [])];
        const target = tid != null ? all.find(x => x.robotId === tid) : null;
        if (!target) {
          showToast("Initiate Grapple — pick a target first.");
        } else if ((target.statusEffects || []).includes("GRAPPLED")) {
          showToast(`${target.robotName || "Target"} is already GRAPPLED.`);
        } else if (countFreeManipulators(r) === 0) {
          showToast("Initiate Grapple — no free Manipulators to grab with.");
        } else {
          const atkPilot = pickRespondingPilot(r);
          const defPilot = pickRespondingPilot(target);
          if (!atkPilot || !defPilot) {
            showToast("Initiate Grapple — no conscious pilot one side, resolve at table.");
          } else {
            const atkFree = countFreeManipulators(r);
            const defFree = countFreeManipulators(target);
            const atkPool = Math.max(0, (atkPilot.physical || 0) + 2 * atkFree);
            const defPool = Math.max(0, (defPilot.physical || 0) + 2 * defFree);
            const atkDice = [], defDice = [];
            for (let i = 0; i < atkPool; i++) atkDice.push(1 + Math.floor(Math.random() * 6));
            for (let i = 0; i < defPool; i++) defDice.push(1 + Math.floor(Math.random() * 6));
            const atkHits = atkDice.filter(v => v >= 5).length;
            const defHits = defDice.filter(v => v >= 5).length;
            // Tie → defender (existing opposed-check convention).
            if (atkHits > defHits) {
              // Mark linkage on both sides.
              target.statusEffects = [...(target.statusEffects || []).filter(s => s !== "STANDING"), "GRAPPLED"];
              target.grappledById = r.robotId;
              r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING"), "GRAPPLING"];
              r.grapplingId = target.robotId;
              // Occupy one Manipulator each (§13 — "Manipulator(s)
              // committed to the grab"; smallest unit = 1 per side).
              occupyManipulatorsForGrapple(r, target.robotId, 1);
              occupyManipulatorsForGrapple(target, r.robotId, 1);
              // Lower-weight moves adjacent to higher-weight (§13).
              const aW = r.robotWeight || 0;
              const tW = target.robotWeight || 0;
              const moved = (aW < tW) ? (r.robotName || "Attacker")
                          : (tW < aW) ? (target.robotName || "Target")
                          : "(tie weight — table decides)";
              showToast(`Initiate Grapple — atk ${atkHits} vs def ${defHits}: GRAPPLED. ${moved} moves adjacent.`);
            } else {
              showToast(`Initiate Grapple — atk ${atkHits} vs def ${defHits}: defender wins (ties to defender).`);
            }
          }
        }
      }
      // §13.A BREAK_FREE — opposed Physical (Tom 2026-06-13). Was a
      // single d6 vs 5+ ≥1 hit escape. Each side adds +2 dice per free
      // Manipulator; ties go to defender (the grappler).
      if (k === "BREAK_FREE") {
        if (!(r.statusEffects || []).includes("GRAPPLED")) {
          showToast("Not GRAPPLED.");
        } else {
          const b = state.activeBattle;
          const all = [...(b.p1Robots || []), ...(b.p2Robots || [])];
          const grappler = all.find(x => x.robotId === r.grappledById);
          if (!grappler) {
            showToast("Break Free — grappler not found, resolve at table.");
          } else {
            const escapePilot = pickRespondingPilot(r);
            const grapplerPilot = pickRespondingPilot(grappler);
            if (!escapePilot || !grapplerPilot) {
              showToast("Break Free — no rolling pilot one side, resolve at table.");
            } else {
              const escFree = countFreeManipulators(r);
              const grpFree = countFreeManipulators(grappler);
              const escPool = Math.max(0, (escapePilot.physical || 0) + 2 * escFree);
              const grpPool = Math.max(0, (grapplerPilot.physical || 0) + 2 * grpFree);
              const escDice = [], grpDice = [];
              for (let i = 0; i < escPool; i++) escDice.push(1 + Math.floor(Math.random() * 6));
              for (let i = 0; i < grpPool; i++) grpDice.push(1 + Math.floor(Math.random() * 6));
              const escHits = escDice.filter(v => v >= 5).length;
              const grpHits = grpDice.filter(v => v >= 5).length;
              // Tie → defender (grappler).
              if (escHits > grpHits) {
                clearGrappleLink(r, grappler);
                showToast(`Break Free — ${escHits} vs ${grpHits}: escaped! Manipulators released.`);
              } else {
                showToast(`Break Free — ${escHits} vs ${grpHits}: still GRAPPLED (ties to grappler).`);
              }
            }
          }
        }
      }
      if (k === "CROUCH") {
        if (!(r.statusEffects || []).includes("CROUCHED")) {
          r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING"), "CROUCHED"];
        }
        showToast("Crouched. +2 die on Ranged with Grabbed weapons. Cleared by movement.");
      }
      if (k === "STAND_UP") {
        // Ch 8: DOWN → STANDING. Cost (1/3 Sil in movement) surfaced
        // in toast; webapp doesn't track per-action movement budgets.
        r.statusEffects = [...(r.statusEffects || [])
          .filter(s => s !== "DOWN" && s !== "STANDING"), "STANDING"];
        const _sil = r.silhouette || 1;
        const _suCost = Math.ceil(_sil / 3);
        showToast(`Stand Up — DOWN → STANDING. Costs ${_suCost} SU (1/3 Sil ${_sil}). Ch 8`, 3200);
      } else if (k === "DECELERATE") {
        const rawPts = state.modal?.data?.decelPts ?? 0;
        const pts = Math.max(0, Math.min(r.inertia ?? 0, Math.min(r.fuelCurrent ?? 0, rawPts)));
        if (pts === 0) {
          showToast("Decelerate — 0 points, nothing changed.");
        } else {
          r.fuelCurrent = (r.fuelCurrent ?? 0) - pts;
          r.inertia = Math.max(0, (r.inertia ?? 0) - pts);
          // Ch 5: Decelerate changes Inertia → ends Crouch.
          endCrouchIfActive(r, "Decelerate");
          showToast(`Decelerate — inertia −${pts}, fuel −${pts}. Inertia now ${r.inertia}.`);
        }
      } else if (k === "STEP") {
        // Ch 5: Step is movement → ends Crouch.
        endCrouchIfActive(r, "Step");
        showToast("Step — moved up to ½ Sil SU.");
      } else if (k === "PIVOT") {
        // Pivot: rotate facing by the chosen amount (mod 360).
        const rot = state.modal?.data?.rotateBy || 0;
        if (rot !== 0) {
          const before = r.facingDegrees ?? 0;
          r.facingDegrees = ((before + rot) % 360 + 360) % 360;
          const compass = ["N","NE","E","SE","S","SW","W","NW"][Math.round(r.facingDegrees / 45) % 8];
          showToast(`Pivot — facing ${before}° → ${r.facingDegrees}° (${compass}).`);
        } else {
          showToast(`${a.label} — free incidental.`);
        }
      } else {
        showToast(`${a.label} — free incidental.`);
      }
    }
  } else {
    showToast(`${a.label} — manually resolved.`);
  }
  // §35 Cool Head Under Pressure: stash `_justTookReaction` on the picked
  // cockpit pilot when bucket=reaction. Clear it on any non-Reaction action
  // by that same pilot. Triggered by triggerCoolHead() at Fortitude
  // resolution + by manual COOL_HEAD action when the auto-fire didn't fire.
  // COOL_HEAD itself is an incidental — don't let its resolution clear the
  // flag (the manual fallback should still find it set).
  if (k !== "PASS" && k !== "COOL_HEAD" && _pickedPilot && _pickedPilot !== "MANUAL") {
    const _cpReact = (r.cockpitPilots || []).find(c =>
      `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot
    );
    if (_cpReact) {
      if (a && a.bucket === "reaction") {
        _cpReact._justTookReaction = true;
      } else {
        _cpReact._justTookReaction = false;
      }
    }
  }
  _pickedPilot = null;
  // §22 + §32: Priority Action finished resolving — clear the active
  // tracker so future Reactions on this Robot work normally next round.
  state.activePriorityRobotId = null;
  // Bump per-robot action budget — purely additive; UI affordances in next slice.
  if (k !== "PASS") {
    r.actionBudget = r.actionBudget || { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    if (a.bucket === "primary") r.actionBudget.primaryUsed++;
    else if (a.bucket === "reaction") r.actionBudget.reactionsUsed++;
    else if (a.bucket === "incidental") r.actionBudget.incidentalsUsed++;
  }
  // §41 (Tom 2026-06-17): per-action Inertia decay. Rulebook L10062
  // — Inertia decreases by floor(Sil/2) − Glide after each action
  // resolves (min 0). Fires for Primary + Reaction actions, NOT
  // incidentals (incidentals don't constitute an "action" in the
  // round-economy sense, and Step/Stand-Up/Pivot would otherwise
  // double-pump decay). DECELERATE already moved inertia explicitly
  // — let the decay still fire on top per the rulebook.
  if (k !== "PASS" && a && (a.bucket === "primary" || a.bucket === "reaction")) {
    const decayed = applyInertiaDecay(r);
    if (decayed > 0) {
      showToast(`Inertia decay — ${r.robotName || "Robot"} −${decayed} Inertia (now ${r.inertia}). §41`, 2400);
    }
  }
  // §66 (Audit 11, Ch 9 L66-74): Flying Robots sink after each
  // Primary/Reaction action. Decay = Sil − Glide if Inertia > 0,
  // else Sil ("dropping like a stone without forward momentum").
  // Hover floor protects (stackable, applies to decay AND manual
  // descent per Ch 9 L74). Altitude → 0 fires the §43 cascade
  // (Inertia-Loss Landing + Falling Damage) via handleLandingTransition.
  // Incidentals (Step / Stand-Up / Pivot) deliberately do NOT decay —
  // same scoping as §41 Inertia decay above, to avoid double-pump.
  if (k !== "PASS" && a && (a.bucket === "primary" || a.bucket === "reaction") && (r.altitude ?? 0) > 0) {
    const _altSil = r.silhouette || 1;
    const _altGlide = calcGlide(r);
    const _altInertia = r.inertia ?? 0;
    const _altDecay = _altInertia > 0 ? Math.max(0, _altSil - _altGlide) : _altSil;
    const _altOld = r.altitude;
    const _altHoverFloor = hoverFloorFor(r);
    r.altitude = Math.max(_altHoverFloor, _altOld - _altDecay);
    const _altDelta = _altOld - r.altitude;
    if (_altDelta > 0) {
      syncFlyingStatus(r);
      // handleLandingTransition is a no-op when newAlt > 0 — safe to
      // call unconditionally. Uses pre-decay Inertia for §43 landing
      // (Inertia-loss fires off the value at the moment of touchdown).
      handleLandingTransition(r, _altOld, _altInertia);
      recordUndo(`${escapeHtml(r.name || r.robotName || "Robot")}: altitude decay ${_altOld}→${r.altitude} (−${_altDelta}). §66`);
      showToast(`Altitude decay — ${r.robotName || r.name || "Robot"} −${_altDelta} Altitude (now ${r.altitude}). §66`, 2400);
    }
  }
  dbPut("battles", state.activeBattle);
  // §15.C Block reaction → chain into apply-damage modal pre-filled with
  // viaBlock=true so the player picks the BLOCKER + ORIGINAL TARGET on
  // one screen. The reaction's strain has already been paid above; this
  // skips the trailing closeModal() and replaces the modal in-place.
  if (k === "BLOCK") {
    const firstAlive = (r.components || []).find(c => !c.isDestroyed);
    const defaultCid = firstAlive ? (firstAlive.componentId ?? firstAlive.tempId) : null;
    pushModal("apply-damage", {
      rid: Number(id),
      cid: defaultCid,         // BLOCKER — player adjusts via picker
      amount: 1,
      type: "Physical",
      viaBlock: true,          // §15.C pre-checked for Block reaction
      originalTargetCid: defaultCid, // player MUST pick the actual original target
      fromBlockReaction: true, // diagnostic — banner copy in the modal
    });
    return;
  }
  closeModal();
};

// ────────────────────────────────────────────────────────────────────
// §10 Redirect-Target modal — surfaces alternative targets per
// invalidated slot. For SALVO each invalid (weapon, target) tuple
// shows its own row; the player picks an alternative Robot OR clicks
// SKIP to whiff that slot. The action as a whole still completes —
// remaining valid slots resolve normally and any redirected slot
// resolves against the new target.
//
// Talent carry: pre-declared talents (Sharpshooter, Deadeye) are
// roller chips that the player toggles at dice-roll time. They are
// NOT bound to a target ID, so a redirect leaves them intact — they
// apply to whichever target the slot ultimately resolves against
// (per §10 edge case 2: "the talent commits to a single attack on a
// single target; if the target changes, the talent applies to the
// new target").
// ────────────────────────────────────────────────────────────────────
function renderRedirectTarget(data) {
  const r = findBattleRobot(state.activeBattle, data.id);
  const a = ACTIONS[data.k];
  if (!r || !a) return "<p>?</p>";
  const invalidTids = data.invalidTids || [];
  const invalidReasons = data.invalidReasons || [];
  const all = [
    ...((state.activeBattle?.p1Robots) || []),
    ...((state.activeBattle?.p2Robots) || []),
  ];
  const isMultiSlot = data.k === "SALVO" || data.k === "MELEE_ASSAULT" || data.k === "STRAFE";
  return `
    <h2>↻ TARGET REDIRECT</h2>
    <p style="font-size:12px; color:var(--on-surface-muted)">
      One or more targets are no longer valid after a Reaction. Pick a new target per slot OR skip → that slot whiffs (§34). Pre-declared talents (Sharpshooter / Deadeye) carry to whichever target the slot resolves against.
    </p>
    <div class="label-small label-amber" style="margin-top:8px">${escapeHtml(a.label)} — ${r.robotName || r.name || "Attacker"}</div>
    <div style="display:flex; flex-direction:column; gap:8px; margin-top:8px">
      ${invalidTids.map((tid, i) => {
        const origTarget = all.find(x => x.robotId === tid);
        const origName = origTarget?.robotName || origTarget?.name || `Target ${tid}`;
        const reason = invalidReasons[i] || "Invalid target.";
        const alternatives = legalTargetsFor(r, null, tid);
        const picked = (data.redirects || {})[tid];
        return `
          <div class="card">
            <div class="label-small label-amber">SLOT ${i+1}: ${escapeHtml(origName)}</div>
            <p style="font-size:11px; color:var(--on-surface-muted); margin-top:2px">${escapeHtml(reason)}</p>
            ${alternatives.length === 0 ? `
              <p class="label-small label-amber" style="margin-top:6px">⚠ No legal alternatives — slot will whiff.</p>
            ` : `
              <div style="display:flex; flex-direction:column; gap:4px; margin-top:6px">
                ${alternatives.map(t => {
                  const on = picked === t.robotId;
                  return `<div class="card tight" data-act="redirect-pick" data-tid="${tid}" data-newtid="${t.robotId}" style="border-color:${on ? "var(--amber)" : "var(--surface-3)"}; cursor:pointer">
                    <strong>${escapeHtml(t.robotName || t.name || "Target")}</strong>
                    <span class="chip ${t.side === "P2" ? "red" : ""}" style="margin-left:8px">${t.side || "P1"}</span>
