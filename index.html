}
function renderOpponentForcePicker() {
  const b = state.activeBattle;
  // Exclude the deployed P1 force AND any force that would put a robot.id
  // into both sides (findBattleRobot resolves first-match-wins, so a
  // collision would make a P2 robot effectively unreachable).
  const p1RobotIds = new Set((b.p1Robots || []).map(r => r.robotId));
  const eligible = state.forces.filter(f => {
    if (f.id === b.p1ForceId) return false;
    const fRobotIds = f.robotIds || [];
    return !fRobotIds.some(id => p1RobotIds.has(id));
  });
  const p1Label = b.p1ForceName || "your force";
  if (eligible.length === 0) {
    return `
      <h2>ADD OPPONENT FORCE</h2>
      <p style="margin:16px 0">No other forces available — every existing force either is your current one or shares a robot with it. Create a new force in the FORCES tab first.</p>
      <div class="actions" style="margin-top:16px">
        <button class="btn ghost" data-act="close-opponent-picker">CANCEL</button>
      </div>
    `;
  }
  return `
    <h2>ADD OPPONENT FORCE</h2>
    <div class="meta" style="margin-bottom:12px">Pick the force that will oppose ${escapeHtml(p1Label)}.</div>
    ${eligible.map(f => `
      <div class="list-card" data-act="select-opponent-force" data-fid="${f.id}" style="cursor:pointer;margin-bottom:6px">
        <div style="flex:1">
          <h3 style="margin:0">${escapeHtml(f.name || "Unnamed Force")}</h3>
          <div class="meta">${f.robotIds ? f.robotIds.length : 0} robot(s)</div>
        </div>
        <span class="chip">SELECT</span>
      </div>
    `).join("")}
    <div class="actions" style="margin-top:16px">
      <button class="btn ghost" data-act="close-opponent-picker">CANCEL</button>
    </div>
  `;
}

handlers["add-opponent-force"] = () => {
  pushModal("opponent-force-picker", {});
};

handlers["close-opponent-picker"] = () => {
  closeModal();
};

handlers["select-opponent-force"] = ({ fid }) => {
  pushModal("pilot-assign", { fid: Number(fid), assignments: {}, side: "P2" });
};

function robotOverviewCard(r) {
  const armorCurrent = r.components.reduce((a, c) => a + c.hpCurrent, 0);
  const armorMax = r.components.reduce((a, c) => a + c.hpMax, 0);
  const sideClass = r.side === "P2" ? "opposing" : "friendly";
  return `
    <div class="card ${sideClass}" data-act="open-robot" data-id="${r.robotId}">
      <div class="row-between">
        <div>
          <h3 style="margin:0">${escapeHtml(r.robotName)}</h3>
        </div>
        <div class="row-gap">
          ${statusChip(r)}
          ${silChip(r)}
        </div>
      </div>
      <div class="stat-grid" style="margin-top:8px">
        <div class="stat-cell ${armorCurrent < armorMax ? 'warn' : 'ok'}"><span class="lbl">ARM</span><span class="val">${armorCurrent}/${armorMax}</span></div>
        <div class="stat-cell ${r.fuelMax > 0 && r.fuelCurrent < r.fuelMax * 0.25 ? 'warn' : 'ok'}"><span class="lbl">FUEL</span><span class="val">${r.fuelMax === 0 ? "—" : `${r.fuelCurrent}/${r.fuelMax}`}</span></div>
        <div class="stat-cell ok"><span class="lbl">SHLD</span><span class="val">${r.shieldsCurrent}/${r.shieldsMax}</span></div>
        <div class="stat-cell ${r.systemStrain > r.systemStrainThreshold ? 'over' : 'ok'}"><span class="lbl">STR</span><span class="val">${r.systemStrain}/${r.systemStrainThreshold}</span></div>
      </div>
    </div>
  `;
}
function silChip(r) {
  const eff = calcEffectiveSilBattle(r);
  if (eff !== r.silhouette) return `<span class="chip amber">SIL ${eff}* (base ${r.silhouette})</span>`;
  return `<span class="chip">SIL ${r.silhouette}</span>`;
}
function statusChip(r) {
  const s = r.statusEffects || [];
  if (s.includes("SHUTDOWN")) return `<span class="chip red">SHUTDOWN</span>`;
  if (s.includes("DOWN")) return `<span class="chip red">DOWN</span>`;
  if (s.includes("GRAPPLED")) return `<span class="chip orange">GRAPPLED</span>`;
  if (s.includes("GRAPPLING")) return `<span class="chip orange">GRAPPLING</span>`;
  if (s.includes("CROUCHED")) return `<span class="chip amber">CROUCHED</span>`;
  if (s.includes("FLYING") || r.altitude > 0) return `<span class="chip">FLYING</span>`;
  return `<span class="chip green">STANDING</span>`;
}
function calcEffectiveSilBattle(r) {
  let s = r.silhouette;
  const hf = r.components.some(c => c.modules.some(m => m.moduleId === "horizontal_framing"));
  if (hf) s = Math.ceil(s / 2);
  if ((r.statusEffects || []).includes("CROUCHED")) s = Math.ceil(s / 2);
  return s;
}
function findBattleRobot(b, rid) {
  // Either id type may be string or number depending on call site.
  const n = Number(rid);
  const p1 = (b?.p1Robots || []).find(x => x.robotId === n || x.robotId === rid);
  if (p1) return p1;
  return (b?.p2Robots || []).find(x => x.robotId === n || x.robotId === rid);
}
// Deducts fuel for active fuel_gen / fuel_powered_generator modules each round.
// Auto-deactivates if fuel hits 0 while the generator is still on.
function applyRoundFuelBurn(robot) {
  for (const c of robot.components || []) {
    for (const m of c.modules || []) {
      const def = MODULES_BY_ID[m.moduleId];
      if (!def || !def.fuelConsumption) continue;
      if (!(m.toggledOn ?? true)) continue;
      robot.fuelCurrent = Math.max(0, (robot.fuelCurrent || 0) - def.fuelConsumption);
      if (robot.fuelCurrent === 0) m.toggledOn = false;
    }
  }
}
function hoverFloorFor(r) {
  // Returns 1 if any hover_system module is toggled ON, else 0.
  return r.components.some(c => c.modules.some(m => m.moduleId === "hover_system" && (m.toggledOn ?? true))) ? 1 : 0;
}
function syncFlyingStatus(r) {
  const flying = (r.statusEffects || []).includes("FLYING");
  if ((r.altitude ?? 0) > 0 && !flying) {
    r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING"), "FLYING"];
  } else if ((r.altitude ?? 0) <= 0 && flying) {
    r.statusEffects = (r.statusEffects || []).filter(s => s !== "FLYING");
  }
}
handlers["pass-priority"] = ({ side } = {}) => {
  const b = state.activeBattle;
  if (!b) return;
  const _passSide = side || b.priority || "P1";
  recordUndo(`${_passSide} passed`);
  b.passedThisRound = b.passedThisRound || { P1: false, P2: false };
  const passingSide = side || b.priority || "P1";
  const sideRobots = passingSide === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
  // Pass clears Pilot Strain per L220. fuel_reactor generates +4 fuel per Pass (rulebook).
  for (const r of sideRobots) {
    r.pilotTokens = 0;
    r.cockpitPilots = (r.cockpitPilots || []).map(p => ({ ...p, pilotStrain: 0 }));
    const hasFuelReactor = r.components?.some(c => c.modules?.some(m => m.moduleId === "fuel_reactor"));
    if (hasFuelReactor) {
      const fuelMax = calcFuelMax(r) || 0;
      r.fuelCurrent = Math.min(fuelMax, (r.fuelCurrent || 0) + 4);
    }
  }
  b.passedThisRound[passingSide] = true;
  const hasP2 = (b.p2Robots || []).length > 0;
  if (!hasP2 || (b.passedThisRound.P1 && b.passedThisRound.P2)) {
    // Skirmish solo path OR both sides passed → advance round.
    b.round = (b.round || 1) + 1;
    b.passedThisRound = { P1: false, P2: false };
    b.priority = "P1";
    for (const robot of [...(b.p1Robots || []), ...(b.p2Robots || [])]) {
      robot.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
      robot.gspdSpent = 0;
      robot.pendingParryReductions = 0;
      const cap = robot.capacitorsMax ?? 0;
      robot.capacitorsRemaining = Math.min(cap, (robot.capacitorsRemaining || 0) + 1);
      // Shutdown-this-round clears at round advance; robot can act again.
      if (robot.shutdown) robot.shutdown = false;
      applyRoundFuelBurn(robot);
    }
    showToast(`Round ${b.round} begins.`);
  } else {
    b.priority = passingSide === "P1" ? "P2" : "P1";
    showToast(`${passingSide} passed. ${b.priority} has priority.`);
  }
  dbPut("battles", b);
  render();
};
handlers["round-prev"] = () => { if (state.activeBattle.round > 1) state.activeBattle.round--; dbPut("battles", state.activeBattle); render(); };
handlers["round-next"] = () => {
  const b = state.activeBattle;
  recordUndo(`Round ${b.round} ended`);
  b.round++;
  b.passedThisRound = { P1: false, P2: false };
  b.priority = "P1";
  for (const robot of [...(b.p1Robots || []), ...(b.p2Robots || [])]) {
    robot.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    const cap = robot.capacitorsMax ?? 0;
    robot.capacitorsRemaining = Math.min(cap, (robot.capacitorsRemaining || 0) + 1);
    if (robot.shutdown) robot.shutdown = false;
    applyRoundFuelBurn(robot);
    // Fast Fingers: grant 1 free Toggle Incidental per Fast Fingers pilot per round.
    const ffCount = (robot.cockpitPilots || [])
      .filter(cp => !cp.isAi && !cp.isKO && cp.pilotId)
      .filter(cp => (state.pilots.find(p => p.id === cp.pilotId)?.talents || []).includes("Fast Fingers"))
      .length;
    robot.freeToggleIncidentals = ffCount;
  }
  dbPut("battles", b);
  render();
};
handlers["end-battle"] = async () => {
  if (!confirm("End this battle?")) return;
  await dbDelete("battles", state.activeBattle.id);
  state.battles = state.battles.filter(b => b.id !== state.activeBattle.id);
  state.activeBattle = null;
  render();
};
handlers["open-robot"] = ({ id }) => {
  state.activeRobotId = Number(id);
  render();
};
handlers["open-action-log"] = () => pushModal("action-log", {});
handlers["undo-battle-step"] = ({ idx }) => {
  const b = state.activeBattle;
  if (!b || !b.undoStack) return;
  const i = Number(idx);
  const entry = b.undoStack[i];
  if (!entry) return;
  // Restore snapshot, keep the stack up to (not including) this entry.
  const restored = JSON.parse(JSON.stringify(entry.snapshot));
  restored.undoStack = b.undoStack.slice(0, i);
  state.activeBattle = restored;
  // Sync back into battles array and persist.
  const bi = state.battles.findIndex(x => x.id === restored.id);
  if (bi >= 0) state.battles[bi] = restored;
  dbPut("battles", restored);
  // Stay on action-log modal so user can see the updated (shorter) list.
  pushModal("action-log", {});
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PER-ROBOT BATTLE — VitalsPanel, action sheet, components map
// ════════════════════════════════════════════════════════════════════
function renderPerRobotBattle(b, rid) {
  const r = findBattleRobot(b, rid);
  if (!r) return `<p>Robot ${rid} not found.</p>`;
  const armorCurrent = r.components.reduce((a, c) => a + c.hpCurrent, 0);
  const armorMax = r.components.reduce((a, c) => a + c.hpMax, 0);
  const eff = calcEffectiveSilBattle(r);
  const silModified = eff !== r.silhouette;
  return `
    <div class="card">
      <div class="row-between">
        <button class="btn ghost" style="padding:4px 10px" data-act="back-overview">← ${escapeHtml(b.p1ForceName)}</button>
        <h3 style="margin:0">${escapeHtml(r.robotName)}</h3>
        ${silModified
          ? `<span class="chip amber">SIL ${eff}* (base ${r.silhouette})</span>`
          : `<span class="chip">SIL ${r.silhouette}</span>`}
      </div>
      <div class="row-gap" style="margin-top:6px; flex-wrap:wrap">
        ${statusChip(r)}
        <button class="btn ghost" style="padding:4px 8px" data-act="status-picker" data-id="${r.robotId}">▾ STATUS</button>
        <button class="btn ghost" style="padding:4px 8px" data-act="show-loadout" data-id="${r.robotId}">LOADOUT</button>
        <button class="btn ghost" style="padding:4px 8px; margin-left:auto" data-act="open-roller" data-id="${r.robotId}" data-k="">🎲 ROLL</button>
      </div>
      <div class="stat-grid" style="margin-top:8px">
        <div class="stat-cell ${armorCurrent < armorMax ? 'warn' : 'ok'}" data-act="show-armor" data-id="${r.robotId}"><span class="lbl">ARMOR</span><span class="val">${armorCurrent}/${armorMax}</span></div>
        <div class="stat-cell ${r.fuelMax > 0 && r.fuelCurrent < r.fuelMax * 0.25 ? 'warn' : 'ok'}" data-act="show-fuel" data-id="${r.robotId}"><span class="lbl">FUEL</span><span class="val">${r.fuelMax === 0 ? "—" : `${r.fuelCurrent}/${r.fuelMax}`}</span></div>
        <div class="stat-cell ok" data-act="show-shields" data-id="${r.robotId}"><span class="lbl">SHLD</span><span class="val">${r.shieldsCurrent}/${r.shieldsMax}</span></div>
        <div class="stat-cell" data-act="show-pilots" data-id="${r.robotId}">
          <span class="lbl">P TOK</span>
          <span class="val">${pilotTokSummary(r)}</span>
        </div>
      </div>
      <div class="stat-grid" style="margin-top:6px">
        <div class="stat-cell ${r.systemStrain > r.systemStrainThreshold ? 'over' : 'ok'}" data-act="show-strain" data-id="${r.robotId}"><span class="lbl">STR</span><span class="val">${r.systemStrain}/${r.systemStrainThreshold}</span></div>
        <div class="stat-cell ok" data-act="show-capacitors" data-id="${r.robotId}"><span class="lbl">CAP</span><span class="val">${(r.capacitorsMax ?? 0) === 0 ? "—" : `${r.capacitorsRemaining ?? 0}/${r.capacitorsMax}`}</span></div>
        <div class="stat-cell ${(r.gspdSpent || 0) >= (r.groundSpeed || 0) && (r.groundSpeed || 0) > 0 ? "warn" : "ok"}" data-act="show-move" data-id="${r.robotId}"><span class="lbl">GSPD</span><span class="val">${r.groundSpeed ? `${(r.groundSpeed - (r.gspdSpent || 0))}/${r.groundSpeed}` : "—"}</span></div>
        <div class="stat-cell ${r.boostPower > 0 ? "cyan" : "ok"}" data-act="show-move" data-id="${r.robotId}"><span class="lbl">BOOST</span><span class="val">${r.boostPower || "—"}</span></div>
      </div>
      <div class="stat-grid" style="margin-top:6px">
        <div class="stat-cell ${(r.inertia || 0) > 0 ? "warn" : "ok"}"><span class="lbl">INERTIA</span><span class="val">${r.inertia ?? 0}</span></div>
        <div class="stat-cell ${(r.altitude || 0) > 0 ? "cyan" : "ok"}"><span class="lbl">ALT</span><span class="val">${r.altitude ?? 0}</span></div>
      </div>
    </div>
    ${renderCockpitPilots(r)}
    ${renderActionBudget(r)}
    ${renderActionSheet(r)}
    ${renderComponentMap(r)}
  `;
}
function renderActionBudget(r) {
  const b = r.actionBudget || { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
  const pAtCap = b.primaryUsed >= 1;
  const rAtCap = b.reactionsUsed >= 2;
  const chip = (label, cls) => `<span class="chip ${cls}">${label}</span>`;
  return `
    <div class="card tight" style="display:flex; align-items:center; gap:8px">
      <span class="label-small">ACTIONS THIS ROUND</span>
      ${chip(`P:${b.primaryUsed}/1`,      pAtCap ? "amber" : "")}
      ${chip(`R:${b.reactionsUsed}/2`,    rAtCap ? "amber" : "")}
      ${chip(`I:${b.incidentalsUsed}`,    "")}
    </div>
  `;
}
function renderCockpitPilots(r) {
  const cps = r.cockpitPilots || [];
  if (cps.length === 0) return "";
  const rows = cps.map(cp => {
    if (cp.isAi) {
      return `<div class="list-card static">
        <strong>${escapeHtml(cp.slotName)}</strong>
        <span class="chip">A.I. Core</span>
      </div>`;
    }
    const p = state.pilots.find(x => x.id === cp.pilotId);
    if (!p) {
      return `<div class="list-card static">
        <strong>${escapeHtml(cp.slotName)}</strong>
        <span class="chip muted">unassigned</span>
      </div>`;
    }
    const koThreshold = 5 + (p.training || 0) + calcPilotStrainBonus(r, cp);
    const portrait = p.imageData
      ? `<div style="width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0"><img src="${escapeHtml(p.imageData)}" style="width:100%;height:100%;object-fit:cover" /></div>`
      : `<span style="font-size:20px">👤</span>`;
    return `<div class="list-card static" ${cp.isKO ? `style="opacity:0.5"` : ""}>
      ${portrait}
      <strong>${escapeHtml(cp.slotName)}</strong>
      <span class="chip">${escapeHtml(p.name || "Pilot")}</span>
      ${cp.isKO ? `<span class="chip red" style="margin-left:6px">KO</span>` : ""}
      <div class="meta">${escapeHtml(p.rank || "ROOKIE")} · P-STR ${cp.pilotStrain}/${koThreshold}</div>
    </div>`;
  }).join("");
  return `
    <div class="bucket pilots open">
      <div class="header static">PILOTS</div>
      <div class="actions-list">
        ${rows}
      </div>
    </div>
  `;
}
function pilotTokSummary(r) {
  const cockpits = r.cockpitPilots || [];
  if (cockpits.length === 0) return `${r.pilotTokens || 0}/${r.pilotMental}`;
  const anyOver = cockpits.some(p => p.mental > 0 && p.tokens > p.mental);
  return anyOver ? `${cockpits.length} ⚠` : `${cockpits.length} ›`;
}
function renderActionSheet(r) {
  const groups = { primary: [], reaction: [], incidental: [] };
  // Talent-gated actions: only surface when a conscious pilot has the talent.
  const consciousTalents = robotConsciousTalents(r);
  const talentGated = {
    COOL_HEAD:    "Cool Head",
    COOLANT_VENT: "Coolant Manager",
  };
  for (const [k, a] of Object.entries(ACTIONS)) {
    if (talentGated[k] && !consciousTalents.has(talentGated[k])) continue;
    groups[a.bucket].push([k, a]);
  }
  const budget = r.actionBudget || { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
  const bucketSpent = b => (b === "primary" && budget.primaryUsed >= 1)
                       || (b === "reaction" && budget.reactionsUsed >= 2);
  const activeBucket = state._actionBucketTab || "primary";
  const tabRow = ["primary","reaction","incidental"].map(bucket => {
    const isActive = bucket === activeBucket;
    return `<button class="chip${isActive ? " primary" : ""}" style="flex:1;cursor:pointer;border:none" data-act="set-action-tab" data-bucket="${bucket}">${bucketIcon(bucket)} ${bucket.toUpperCase()}</button>`;
  }).join("");
  const items = groups[activeBucket].map(([k, a]) => {

// ── Damage pipeline (stage 4) ────────────────────────────────────────
// applyDamage is the canonical "damage hits a component" entry point.
// Pipeline: shields → Guard equipment → armor_coating → armor → Frame Save.
// opts.bypassShields — skip shield interception (Penetrating attacks).
// opts.bypassArmor   — reduce effective armor by this amount for the hit.
// opts.viaEquipment  — equipment object that dealt damage (for Guard checks).
function applyDamage(robotId, componentId, amount, type, opts = {}) {
  const r = findBattleRobot(state.activeBattle, robotId);
  if (!r) return { breach: 0 };
  const c = r.components.find(c => (c.componentId ?? c.tempId) === componentId);
  if (!c) return { breach: 0 };
  recordUndo(`Damage ${amount} to ${c.name || c.definition || "component"} (${escapeHtml(r.name || "Robot")})`);


  let remaining = amount;

  // ── Stage 1: Shields ────────────────────────────────────────────────
  if (!opts.bypassShields && (r.shieldsCurrent || 0) > 0) {
    const shieldAbsorb = Math.min(r.shieldsCurrent, remaining);
    r.shieldsCurrent -= shieldAbsorb;
    remaining -= shieldAbsorb;
    if (remaining <= 0) {
      r.damageLog = r.damageLog || [];
      r.damageLog.push({ when: Date.now(), componentId, amount, type, shieldAbsorb, absorbed: 0, breach: 0 });
      dbPut("battles", state.activeBattle);
      showToast(`Shields absorb ${shieldAbsorb} damage. Shields now ${r.shieldsCurrent}/${r.shieldsMax}.`);
      render();
      return { shieldAbsorb, absorbed: 0, breach: 0 };
    }
    // Partial shield absorption — remainder continues down the pipeline.
    showToast(`Shields absorb ${shieldAbsorb}. ${remaining} continues to armor.`);
  }

  // ── Stage 2: Guard equipment ────────────────────────────────────────
  // Guard equipment on the component intercepts damage before component armor.
  const guardEq = (c.equipment || []).find(e =>
    (e.keywords || []).includes("Guard") && (e.armorCurrent ?? 0) > 0
  );
  if (guardEq) {
    // Energy-Reflective Coating: reflect full Energy hit when guard is at full armor.
    if (type === "Energy"
        && (guardEq.keywords || []).includes("Energy-Reflective Coating")
        && guardEq.armorCurrent === guardEq.armorMax) {
      r.damageLog = r.damageLog || [];
      r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "reflected" });
      dbPut("battles", state.activeBattle);
      showToast(`Energy REFLECTED by ${escapeHtml(guardEq.name || "Guard equipment")}.`);
      render();
      return { reflected: true };
    }
    // Melee keyword on Guard grants Physical immunity (per calculateEquipmentStats).
    if (type === "Physical" && (guardEq.keywords || []).includes("Melee")) {
      r.damageLog = r.damageLog || [];
      r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "deflected" });
      dbPut("battles", state.activeBattle);
      showToast(`Physical DEFLECTED by ${escapeHtml(guardEq.name || "Guard equipment")}.`);
      render();
      return { deflected: true };
    }
    // Otherwise Guard equipment absorbs up to its armorCurrent.
    const guardAbsorb = Math.min(guardEq.armorCurrent, remaining);
    guardEq.armorCurrent -= guardAbsorb;
    remaining -= guardAbsorb;
    if (remaining <= 0) {
      r.damageLog = r.damageLog || [];
      r.damageLog.push({ when: Date.now(), componentId, amount, type, guardAbsorb, absorbed: 0, breach: 0 });
      dbPut("battles", state.activeBattle);
      showToast(`${guardAbsorb} absorbed by ${escapeHtml(guardEq.name || "Guard equipment")}. No breach.`);
      render();
      return { guardAbsorb, absorbed: 0, breach: 0 };
    }
  }

  // ── Stage 3: Armor Coating (Energy immunity at full armor) ──────────
  const hasArmorCoating = (c.modules || []).some(m => m.moduleId === "armor_coating");
  if (hasArmorCoating && type === "Energy" && (c.hpCurrent || 0) === (c.hpMax || 0)) {
    r.damageLog = r.damageLog || [];
    r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "coating-absorbed" });
    dbPut("battles", state.activeBattle);
    showToast(`Armor Coating absorbs ${remaining} Energy damage (full armor).`);
    render();
    return { coatingAbsorbed: true };
  }

  // ── Stage 4: Component armor (hpCurrent/hpMax legacy naming) ────────
  // Webapp stores armor as hpCurrent/hpMax (legacy v0.0.1 naming).
  let effectiveArmor = c.hpCurrent || 0;
  const bypass = opts.bypassArmor || 0;
  if (bypass > 0) {
    // Penetrating bypass reduces effective armor for this hit.
    // If bypass overwhelms armor on a non-frame component → outright destroyed.
    if (bypass >= effectiveArmor && !c.isFrame) {
      c.hpCurrent = 0;
      r.damageLog = r.damageLog || [];
      r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "overwhelmed" });
      dbPut("battles", state.activeBattle);
      showToast(`Armor overwhelmed — ${escapeHtml(c.name || c.definition || "component")} destroyed!`);
      destroyComponent(robotId, componentId);
      render();
      return { overwhelmed: true };
    }
    effectiveArmor = Math.max(0, effectiveArmor - bypass);
  }
  const absorbed = Math.min(effectiveArmor, remaining);
  const breach = remaining - absorbed;
  c.hpCurrent = (c.hpCurrent || 0) - absorbed;
  r.damageLog = r.damageLog || [];
  r.damageLog.push({ when: Date.now(), componentId, amount, type, absorbed, breach });
  dbPut("battles", state.activeBattle);
  if (breach > 0) {
    showToast(`${absorbed} absorbed, ${breach} breach — rolling Frame Save.`);
    pushModal("frame-save", {
      rid: robotId, cid: componentId,
      fd: r.frameDurability || 1,
      fm: r.frameMaterial || 1,
      breach,
      lastRoll: null,
    });
  } else {
    showToast(`${absorbed} absorbed by armor. No breach.`);
    render();
  }
  return { absorbed, breach };
}
// Frame Save: FD d6 vs (7-FM)+. Hits ≥ 1 → save succeeds, breach absorbed.
// Hits = 0 → component destroyed (binary; components have no HP per rulebook).
function renderFrameSave(rid, cid, fd, fm, breach, lastRoll) {

  };

    </div>
  `;
}
function rollFrameSaveDice(fd) {
  const dice = [];
  for (let i = 0; i < fd; i++) dice.push(1 + Math.floor(Math.random() * 6));
  return dice;
}

// Destroy a component AND fire the cascade per Android:
// - stowed children destroyed (recursive),
// - fuel-tank components spill silhouette damage to siblings + parent,
// - destroyed component drops its equipment[].
// Spillage applies direct to buffer (no nested Frame Save modal — that
// would spiral). Players resolve spillage-triggered destructions
// manually via the next APPLY DAMAGE if they want a save roll on a
// cascaded breach.
function destroyComponent(robotId, componentId) {
  const r = findBattleRobot(state.activeBattle, robotId);
  if (!r) return;
  const c = r.components.find(x => (x.componentId ?? x.tempId) === componentId);
  if (!c || c.isDestroyed) return;
  c.isDestroyed = true;
  c.hpCurrent = 0;
  r.cascadeLog = r.cascadeLog || [];
  r.cascadeLog.push({ kind: "destroyed", componentId, when: Date.now() });

  const parentRef = c.parentComponentId ?? c.parentTempId ?? null;

  // (1) Cascade to stowed children. Recursive — children of children
  // also fall.
  for (const child of r.components) {
    const childParent = child.parentComponentId ?? child.parentTempId ?? null;
    if (childParent === componentId && !child.isDestroyed) {
      destroyComponent(robotId, child.componentId ?? child.tempId);
    }
  }

  // (2) Fuel-tank spillage. Apply silhouette damage to siblings + parent.
  const hadFuel = (c.modules || []).some(m => (MODULES_BY_ID[m.moduleId]?.fuelCapacity || 0) > 0);
  if (hadFuel) {
    const sil = r.silhouette || 1;
    const adjacent = r.components.filter(x => !x.isDestroyed
      && ((x.parentComponentId ?? x.parentTempId ?? null) === parentRef
          || (x.componentId ?? x.tempId) === parentRef));
    for (const a of adjacent) {
      const armorBefore = a.hpCurrent || 0;
      const absorbed = Math.min(armorBefore, sil);
      a.hpCurrent = armorBefore - absorbed;
      r.cascadeLog.push({ kind: "fuel-spill", componentId: a.componentId ?? a.tempId, damage: sil, absorbed, breach: sil - absorbed });
    }
  }

  // (3) Drop equipment.
  if ((c.equipment || []).length > 0) {
    r.droppedEquipment = (r.droppedEquipment || []).concat(c.equipment);
    r.cascadeLog.push({ kind: "drop-equipment", componentId, count: c.equipment.length });
    c.equipment = [];
  }

  // (4) Recompute derived stats — destroyed component's modules no
  // longer contribute. Clamp current values down to new max.
  recomputeDerivedStats(r);

  // (5) Neural Link: conscious Neural Link pilots make a Physical fortitude
  // check (Physical d6 vs 5+) when a FRAME component is destroyed. Frame
  // components are flagged isFrame at build time (Core is always frame; other
  // components may be frame or utility per builder choice).
  const destroyed = (r.components || []).find(c => c.tempId === componentId)
    || (r.battleComponents || []).find(c => c.id === componentId);
  if (destroyed?.isFrame) {
    const nlPilots = (r.cockpitPilots || []).filter(cp =>
      !cp.isAi && !cp.isKO && cp.pilotId && pilotHasNeuralLink(cp.pilotId)
    );
    if (nlPilots.length > 0) {
      r._pendingNeuralLink = (r._pendingNeuralLink || []).concat(
        nlPilots.map(cp => ({ pilotSlot: `${cp.componentId}:${cp.moduleIndex}:${cp.slotIndex}`, componentId }))
      );
      const names = nlPilots.map(cp => state.pilots.find(p => p.id === cp.pilotId)?.name || "pilot").join(", ");
      showToast(`Neural Link: ${names} must make a Physical fortitude check (d6 vs 5+).`);
    }
  }
}

// Re-derive shields max, capacitor pool, and strain threshold from the
// LIVE component set (skip destroyed). Existing calc* helpers take a
// build-shape robot — we pass a shadow with components pre-filtered.
function recomputeDerivedStats(r) {
  const live = { ...r, components: (r.components || []).filter(c => !c.isDestroyed) };
  const newShieldsMax = calcShieldsMax(live);
  const newCapMax     = calcCapacitorPool(live);
  const newStrainMax  = calcStrainThreshold(live);
  r.shieldsMax = newShieldsMax;
  r.shieldsCurrent = Math.min(r.shieldsCurrent || 0, newShieldsMax);
  r.capacitorsMax = newCapMax;
  r.capacitorsRemaining = Math.min(r.capacitorsRemaining || 0, newCapMax);
  r.systemStrainThreshold = newStrainMax;
  // Disable modules whose `requires` chain now points at a destroyed
  // component (or a module installed on a destroyed component). E.g.
  // destroying the aux reactor disables its dependents.
  const liveModuleIds = new Set();
  for (const c of live.components) for (const m of (c.modules || [])) liveModuleIds.add(m.moduleId);
  for (const c of r.components) {
    if (c.isDestroyed) continue;
    for (const m of (c.modules || [])) {
      const def = MODULES_BY_ID[m.moduleId];
      const reqs = def?.requires || [];
      if (reqs.length > 0 && !reqs.some(rq => liveModuleIds.has(rq))) {
        m.toggledOn = false;
      }
    }
  }
}

function setShutdownPending(r) {

// Shutdown reboot test. Roll FD d6 vs 5+:
//   hits ≥ 1 → success, sysStrain -= 3 (clamped), shutdownPending cleared
//   hits = 0 → fail, r.shutdown = true (robot skips turn until round
//             advance, which clears the flag in pass-priority + round-next)
function renderShutdownReboot(rid, lastRoll) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const fd = r.frameDurability || 1;
  const threshold = 5;
  const dieChip = v => {
    const hit = v >= threshold;
    return `<span class="chip ${hit ? "amber" : "muted"}" style="font-size:14px; padding:6px 10px; margin-right:4px">${v}</span>`;
  };
  // Quick Troublemaker: opponent's Emergency Shutdown at +2 difficulty (once per game).
  const qtmPilot = (r.cockpitPilots || []).find(cp =>
    !cp.isAi && !cp.isKO && cp.pilotId &&
    (state.pilots.find(p => p.id === cp.pilotId)?.talents || []).includes("Quick Troublemaker")
  );
  const canQTM = qtmPilot && !r.quickTroublemakerUsed;
  // Override: FD + max(0, systemStrain - threshold) d6 at 5+; on success +1 strain to acting pilot.
  const overridePilot = (r.cockpitPilots || []).find(cp =>
    !cp.isKO && cp.pilotId &&
    (state.pilots.find(p => p.id === cp.pilotId)?.talents || []).includes("Override")
  );
  // Overclock: 2×Mental d6 at 5+, once per game; +2 strain to acting pilot.
  const overclockPilot = !r.overclockUsed && (r.cockpitPilots || []).find(cp =>
    !cp.isKO && cp.pilotId &&
    (state.pilots.find(p => p.id === cp.pilotId)?.talents || []).includes("Overclock")
  );
  const excessDice = Math.max(0, (r.systemStrain || 0) - (r.systemStrainThreshold || 0));
  const overrideDiceCount = fd + excessDice;
  const overclockDiceCount = overclockPilot ? 2 * ((state.pilots.find(p => p.id === overclockPilot.pilotId)?.mental) || 1) : 0;
  return `
    <h2>SHUTDOWN CHECK</h2>
    <p class="meta">System Strain <strong>${r.systemStrain}/${r.systemStrainThreshold}</strong>. Roll ${fd} d6 vs ${threshold}+ to reboot.<br/>
      Hits ≥ 1 → −3 System Strain, robot clears. Hits = 0 → Shutdown (skip turn until next round).</p>
    ${r.quickTroubleshooterAvailable ? `<p class="meta" style="color:var(--cyan)">Quick Troubleshooter active — after reboot, pick which module to retoggle.</p>` : ""}
    ${canQTM ? `<button class="btn ghost" style="margin-top:8px; width:100%" data-act="use-quick-troublemaker" data-id="${rid}">⚡ QUICK TROUBLEMAKER · force opponent +2 difficulty (once)</button>` : ""}
    ${lastRoll ? `
      <div style="margin-top:12px">
        <div class="label-small">LAST ROLL ${lastRoll.variant ? `(${lastRoll.variant})` : ""}</div>
        <div style="margin-top:6px">${lastRoll.dice.map(dieChip).join("")}</div>
        <div style="margin-top:10px; font-size:18px">
          ${lastRoll.hits > 0
            ? `<span class="label-cyan">✓ REBOOTED · ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} · −3 Strain${lastRoll.pilotCost ? ` · +${lastRoll.pilotCost} strain on acting pilot` : ""}</span>`
            : `<span class="label-red">✗ SHUTDOWN · 0 hits · skip turn</span>`}
        </div>
      </div>
    ` : ""}
    <div class="actions" style="margin-top:14px; flex-wrap:wrap; gap:8px">
      ${lastRoll
        ? `<button class="btn amber" data-act="shutdown-reboot-done">DONE</button>`
        : `<button class="btn ghost" data-act="modal-close">SKIP (manual)</button>
           <button class="btn amber" data-act="shutdown-reboot-roll">ROLL ${fd} D6 VS ${threshold}+</button>
           ${overridePilot ? `<button class="btn ghost" style="color:var(--cyan)" data-act="shutdown-override-roll" data-id="${rid}">OVERRIDE · ${overrideDiceCount} D6 VS 5+ (+${excessDice} excess)</button>` : ""}
           ${overclockPilot ? `<button class="btn ghost" style="color:var(--amber)" data-act="shutdown-overclock-roll" data-id="${rid}">OVERCLOCK · ${overclockDiceCount} D6 VS 5+ (once)</button>` : ""}`}
    </div>
  `;
}

handlers["shutdown-overclock-roll"] = ({ id }) => {

  for (let i = 0; i < pool; i++) dice.push(1 + Math.floor(Math.random() * 6));
  const hits = dice.filter(v => v >= threshold).length;
  r.overclockUsed = true;
  let pilotCost = 2;
  cp.pilotStrain = (cp.pilotStrain || 0) + 2;
  if (hits > 0) {
    r.systemStrain = Math.max(0, r.systemStrain - 3);
    r.shutdownPending = false;
  } else {
    r.shutdown = true;
    r.shutdownPending = false;
  }

<script>
// ════════════════════════════════════════════════════════════════════
// ACTION RESOLVE MODAL + STRAIN DIALOGS + COMPONENT SHEET
// ════════════════════════════════════════════════════════════════════
handlers["toggle-off-vector"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);

  render();
};
handlers["set-pivot-rotation"] = ({ rot }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.rotateBy = Number(rot) || 0;
  render();
};
handlers["set-charge-distance"] = ({ value }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.distance = Math.max(0, Number(value) || 0);
  // No re-render needed — the input keeps focus and other UI is unaffected.
};
handlers["set-boost-hdist"] = ({ value }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.hDist = Math.max(0, Number(value) || 0);
};
handlers["set-boost-vdist"] = ({ value }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.vDist = Number(value) || 0;
};
handlers["set-decel-pts"] = ({ value }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.decelPts = Math.max(0, Number(value) || 0);
};
handlers["bump-salvo-count"] = ({ d }) => {
  const cur = state.modal?.data?.targetCount ?? 1;
  const next = Math.max(1, Math.min(10, cur + Number(d)));
  if (state.modal?.data) state.modal.data.targetCount = next;
  render();
};
handlers["toggle-salvo-target"] = ({ tid }) => {
  const d = state.modal?.data;
  if (!d) return;

handlers["open-action"] = ({ id, k }) => {
  // Defense-in-depth: refuse to open a spent action even if the disabled

  const r = findBattleRobot(state.activeBattle, id);
  const a = ACTIONS[k];
  if (r && a && k !== "PASS") {

    if (a.bucket === "primary" && b.primaryUsed >= 1) { showToast("Primary already spent this round."); return; }

};
let renderActionResolve = function (rid, k) {

        <p style="font-size:12px; color:var(--on-surface-muted)">Each target gets 1 saturation token. If targets > pilot Mental (${mental}), roll an extra Mental check.</p>
        <div id="salvo-target-list" style="display:flex; flex-direction:column; gap:4px">
          ${targets.map(t => {
            const on = sel.has(t.robotId);
            return `<div class="card tight" data-act="toggle-salvo-target" data-tid="${t.robotId}" style="border-color:${on ? "var(--amber)" : "var(--surface-3)"}; cursor:pointer">
              <strong>${escapeHtml(t.robotName || "Target")}</strong>
              <span class="chip ${t.side === "P2" ? "red" : ""}" style="margin-left:8px">${t.side || "P1"}</span>
              ${on ? `<span class="chip amber" style="margin-left:6px">✓ TARGET</span>` : ""}

      const offVector = !!r.offVectorLock;
      const locked = flying && !offVector;

          <div style="margin-top:6px; padding:8px; background:rgba(239,83,80,0.10); border:1px solid rgba(239,83,80,0.45); border-radius:var(--bevel)">

            <button class="btn ghost" style="display:block; margin-top:6px" data-act="toggle-off-vector" data-id="${rid}">UNLOCK (off-vector)</button>
          </div>
        ` : `
          <div class="row-gap" style="margin-top:6px">
            <button class="btn ${rot === -90 ? "amber" : "ghost"}" data-act="set-pivot-rotation" data-rot="-90">−90° CCW</button>

    ${(() => {
      if (k !== "CHARGE" && k !== "STRAFE" && k !== "MOVE") return "";
      // MOVE: full Ground Speed per rulebook L222. CHARGE/STRAFE: half.

        <div class="label-small label-cyan" style="margin-top:10px">${a.label.toUpperCase()} DISTANCE</div>

      `;
    })()}
    ${(() => {
      if (k !== "BOOST") return "";

          <input type="number" min="${vMin}" max="${remainAfterH}" value="${vClamped}" data-act="set-boost-vdist" style="flex:1; padding:8px" />
        </div>

      `;
    })()}
    ${(() => {
      if (k !== "DECELERATE") return "";
      const inertia = r.inertia ?? 0;
      const fuel = r.fuelCurrent ?? 0;
      const pts = state.modal?.data?.decelPts ?? Math.min(inertia, fuel);

      return `
        <div class="label-small label-cyan" style="margin-top:10px">DECELERATE</div>
        <p style="font-size:12px; color:var(--on-surface-muted)">Current inertia: ${inertia}. Fuel: ${fuel}. Each point costs 1 fuel.</p>

      <button class="btn wide" style="margin-top:10px" data-act="open-roller" data-id="${rid}" data-k="${k}">🎲 OPEN DICE ROLLER</button>
      <div class="meta" style="font-size:10px; margin-top:2px; color:var(--on-surface-muted)">Shows the pool composition, available bonus chips, and lets you roll — doesn't auto-apply hits.</div>
    ` : ""}
    <details style="margin-top:10px">
      <summary class="label-small label-cyan" style="cursor:pointer">▶ SHOW FULL RULES</summary>

    </details>
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>

};
// Per spec: these four actions surface the pilot picker for pilot-strain routing.
// (HEAT_VENT/COOL_HEAD/COOLANT_VENT show it to identify the acting pilot — cost is Free.)
function actionShowsPilotPicker(k) {
  return k === "SALVO" || k === "CHARGE" || k === "MELEE_ASSAULT" || k === "HEAT_VENT" || k === "STRAFE" || k === "HIP_SHOT" || k === "QUICK_STRIKE" || k === "PARRY" || k === "BOOST_DODGE" || k === "BREAK_FREE" || k === "COOL_HEAD" || k === "COOLANT_VENT";
}
// True if the robot has at least one equipped melee weapon on a
// non-destroyed component (item with "Melee" in its keywords array).
function robotHasMeleeWeapon(r) {
  for (const c of (r.components || [])) {
    if (c.isDestroyed) continue;
    for (const e of (c.equipment || [])) {
      // Broken equipment (armorCurrent <= 0) counts as unequipped.
      if (e.armorMax > 0 && (e.armorCurrent ?? 0) <= 0) continue;
      const kw = (e.keywords || []).map(s => String(s).toLowerCase());
      if (kw.includes("melee")) return true;

  return (r.cockpitPilots || []).some(cp =>
    !cp.isAi && !cp.isKO && cp.pilotId &&
    (state.pilots.find(p => p.id === cp.pilotId)?.talents || []).includes("Martial Artist")

function actionPilotStrainCost(k, targetCount = 1) {

}

function actionRollKind(k) {
  switch (k) {
    case "CHARGE": case "MELEE_ASSAULT": case "QUICK_STRIKE": case "PARRY":
      return "MELEE";
    case "STRAFE": case "SALVO": case "HIP_SHOT":
      return "RANGED";
    case "DODGE": case "BOOST_DODGE":
      return "PHYSICAL";
    case "HEAT_VENT": case "COOLANT_VENT":
      return "MENTAL";
    case "BOOST":
      return null; // resolved at table, no roll inherent to BOOST itself
    case "QUICK_MOVE": case "MOVE":
      return "PHYSICAL"; // optional Physical check on MOVE
    default:
      return null;

}
handlers["open-roller"] = ({ id, k }) => {
  const rid = Number(id);
  const extraData = {};
  if (k === "SALVO") {

    const tids = state.modal?.data?.targetIds || [];
    if (tids.length > 0) {
      extraData.targetIds = tids;
      const r = findBattleRobot(state.activeBattle, rid);
      const pilot = _pickedPilot && _pickedPilot !== "MANUAL" && r
        ? (() => {
            const cp = (r.cockpitPilots || []).find(c => `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot);
            return cp ? (state.pilots || []).find(p => p.id === cp.pilotId) : null;
          })()
        : null;

      const overflow = Math.max(0, tids.length - mental);

let _pickedPilot = null;
handlers["pick-pilot"] = ({ pilot }) => {
  _pickedPilot = pilot; // composite key "componentId:moduleIndex:slotIndex" or "MANUAL"
  for (const el of document.querySelectorAll("#pilot-pick-list .card")) {
    el.style.borderColor = "var(--surface-3)";
  }
  const target = document.querySelector(`#pilot-pick-list [data-pilot="${pilot}"]`);
  if (target) target.style.borderColor = "var(--cyan)";
};
handlers["resolve-action"] = ({ id, k }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const a = ACTIONS[k];
  if (!r || !a) return;
  const isManual = _pickedPilot === "MANUAL";
  if (k === "BOOST_DODGE" && (r.fuelCurrent ?? 0) < 1) {
    showToast("Boost Dodge needs ≥ 1 fuel.");
    _pickedPilot = null;
    return;
  }
  // PASS delegates to pass-priority which records its own undo entry.
  if (k !== "PASS") recordUndo(`${escapeHtml(r.name || "Robot")} — ${a.label}`);
  if (k === "PASS") {
    handlers["pass-priority"]({ side: r.side || state.activeBattle.priority || "P1" });
  } else if (k === "SHIELD_RECOVERY") {
    if (r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax) {
      r.capacitorsRemaining--;

      showToast("Can't recover shields (no cap or already full).");

    }

      if (r.systemStrain < r.systemStrainThreshold) r.shutdownPending = false;
      showToast("−1 System Strain, −1 Cap.");
    } else {
      showToast("Can't clear strain.");
      _pickedPilot = null;

    }
  } else if (k === "HEAT_VENT" && !isManual) {
    // Rulebook L266: Mental check; remove System Strain = hits. Roll the
    // picked pilot's mental d6 vs 5+. Auto-resolve on RESOLVE so the
    // player sees the outcome inline; SKIP/MANUAL preserves at-table.
    let mental = 0, pilotName = "pilot";
    if (_pickedPilot && _pickedPilot !== "MANUAL") {
      const cp = (r.cockpitPilots || []).find(c =>
        `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot
      );
      const pilot = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
      if (pilot) { mental = pilot.mental || 0; pilotName = pilot.name || "pilot"; }
    }
    if (mental <= 0) {
      showToast("Heat Vent — no rolling pilot, resolve at table.");
    } else {
      // Tank talent: +1 extra d6 on Heat Vent rolls (Mental+1 dice pool).
      const cp = (r.cockpitPilots || []).find(c =>
        _pickedPilot && `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot
      );
      const pilot2 = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
      if (pilot2 && pilotHasTank(pilot2.id)) mental += 1;

      for (let i = 0; i < mental; i++) dice.push(1 + Math.floor(Math.random() * 6));
      const hits = dice.filter(v => v >= 5).length;

        `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot
      );

        cp.pilotStrain = Math.max(0, before - 1);

    let mental = 0, pilotName = "pilot";
    if (_pickedPilot && _pickedPilot !== "MANUAL") {
      const cp = (r.cockpitPilots || []).find(c =>
        `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot
      );
      const pilot = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
      if (pilot) { mental = pilot.mental || 0; pilotName = pilot.name || "pilot"; }
    }
    if (mental <= 0) {
      showToast("Coolant Vent — no rolling pilot, resolve at table.");
    } else {
      const dice = [];
      for (let i = 0; i < mental; i++) dice.push(1 + Math.floor(Math.random() * 6));
      const hits = dice.filter(v => v >= 5).length;
      const removed = hits * 2;
      if (hits > 0) {
        r.systemStrain = Math.max(0, r.systemStrain - removed);
        if (r.systemStrain < r.systemStrainThreshold) r.shutdownPending = false;

  } else if (k === "BOOST" && !isManual) {

    if ((r.fuelCurrent ?? 0) < unitCost) {

    }
    const rawH = state.modal?.data?.hDist ?? 0;
    const rawV = state.modal?.data?.vDist ?? 0;

    const hDist = Math.max(0, Math.min(maxTotal, rawH));

            }

      if (k === "CROUCH") {
        if (!(r.statusEffects || []).includes("CROUCHED")) {
          r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING"), "CROUCHED"];
        }
        showToast("Crouched. +2 die on Ranged with Grabbed weapons. Cleared by movement.");
      }
      if (k === "STAND_UP") {
        r.statusEffects = (r.statusEffects || []).filter(s => s !== "DOWN");
        showToast("Stand Up — DOWN cleared.");
      } else if (k === "DECELERATE") {
        const rawPts = state.modal?.data?.decelPts ?? 0;
        const pts = Math.max(0, Math.min(r.inertia ?? 0, Math.min(r.fuelCurrent ?? 0, rawPts)));

        r.statusEffects = (r.statusEffects || []).filter(s => s !== "CROUCHED");

      } else if (k === "PIVOT") {

        } else {
          showToast(`${a.label} — free incidental.`);
        }
      } else {
        showToast(`${a.label} — free incidental.`);
      }

  }

    else if (a.bucket === "reaction") r.actionBudget.reactionsUsed++;
    else if (a.bucket === "incidental") r.actionBudget.incidentalsUsed++;
  }

  closeModal();
};

<script>
// ════════════════════════════════════════════════════════════════════
// DICE ROLLER
// Pool composition + applicable bonus chips per robot/action context
// + actual dice roll. Doesn't auto-apply hits — Tom's spec was
// "display what all needs to be rolled / options for a roll." The
// player still reads hits and decides damage at the table.
//
// Chip catalog ports DiceTalentChips.kt: cockpit-module dice
// (motion/open-air, +3 each), Sharpshooter / Deadeye (talent gated),
// targeting-computer (+1 die ranged), melee-computer (+1 die melee),
// Crouched-on-grabbed-weapon (+2 ranged), multi-arm grab (+2 per
// alive grabber on a melee), inertia-driver pre-melee bonus.
// ════════════════════════════════════════════════════════════════════
const _roller = {
  poolBase: 4,
  threshold: 5,
  chips: {}, // chipId -> boolean
  lastRoll: null, // { rolls: [...], hits, threshold }
};
function rollerComputeChips(r, rollKind) {
  const ids = r.components.flatMap(c => c.modules.map(m => m.moduleId));
  const has = id => ids.includes(id);
  const count = id => ids.filter(x => x === id).length;
  const chips = [];
  // Cockpit-module chips (apply when their cockpit type matches roll kind).
  const motionCockpits = r.components.filter(c => c.modules.some(m => m.moduleId === "motion_cockpit" && (m.toggledOn ?? true))).length;
  if (motionCockpits > 0 && (rollKind === "PHYSICAL" || rollKind === "MELEE")) {
    chips.push({ id: "motion", label: `+${motionCockpits * 3} MOTION COCKPIT`, dice: motionCockpits * 3, hint: "+3 dice per cockpit on Physical / Melee checks (rulebook L630)" });
  }
  const openAirCockpits = r.components.filter(c => c.modules.some(m => m.moduleId === "open_air_cockpit" && (m.toggledOn ?? true))).length;
  if (openAirCockpits > 0 && (rollKind === "RANGED" || rollKind === "PHYSICAL")) {
    chips.push({ id: "openair", label: `+${openAirCockpits * 3} OPEN-AIR`, dice: openAirCockpits * 3, hint: "+3 dice per open-air cockpit on Maneuver / Ranged" });
  }
  // Combat computers: detected by module ID, not equipment name strings.
  const targetingComps = count("targeting_comp");
  if (targetingComps > 0 && rollKind === "RANGED") {
    chips.push({ id: "targeting", label: `+${targetingComps * 2} TARGETING`, dice: targetingComps * 2, hint: "+2 dice per Targeting Computer for Ranged" });
  }
  const meleeComps = count("melee_comp");
  if (meleeComps > 0 && rollKind === "MELEE") {
    chips.push({ id: "melee", label: `+${meleeComps * 2} MELEE COMP`, dice: meleeComps * 2, hint: "+2 dice per Melee Computer" });
  }
  // CROUCHED on Grabbed weapons (rulebook L264) → +2 dice on Ranged.
  if ((r.statusEffects || []).includes("CROUCHED") && rollKind === "RANGED") {
    chips.push({ id: "crouched", label: `+2 CROUCHED · grabbed`, dice: 2, hint: "Crouched +2 dice on Ranged with grabbed weapons (L264)" });
  }
  // Inertia driver pre-melee charge bonus.
  if (rollKind === "MELEE" && has("inertia_driver")) {
    chips.push({ id: "inertia", label: `+${r.silhouette} INERTIA DRIVER`, dice: r.silhouette, hint: "Inertia Driver activation. Costs Sil fuel; toggle if used." });
  }
  // Multi-arm grab: presence of any additionalGrabberComponentIds on a weapon (v0.0.2 simplification: skip unless we wire that field).
  // Talent chips (player toggles before roll). Cockpit pilots only store
  // pilotId — talents live on state.pilots, so look them up there.
  const cockpitPilots = r.cockpitPilots || [];
  // KO'd or shutdown pilots can't contribute talent bonuses — only conscious crew.
  const allTalents = cockpitPilots
    .filter(cp => !cp.isAi && !cp.isKO && cp.pilotId)
    .flatMap(cp => state.pilots.find(p => p.id === cp.pilotId)?.talents || []);
  if (rollKind === "RANGED" && allTalents.includes("Sharpshooter")) {
    chips.push({ id: "sharpshooter", label: "+3 SHARPSHOOTER", dice: 3, hint: "Burns the free Incidental, single target only (L631)" });
  }
  if (rollKind === "RANGED" && allTalents.includes("Deadeye")) {
    chips.push({ id: "deadeye", label: "DEADEYE · Unblockable", dice: 0, hint: "Costs +1 token; makes single-target Ranged Unblockable (L625)" });
  }
  if (rollKind === "MELEE" && allTalents.includes("Brawler")) {
    chips.push({ id: "brawler", label: "+1 BRAWLER", dice: 1, hint: "Brawler talent: +1 die on Melee" });
  }
  // Berserker: +1 die on Melee when systemStrain > floor(threshold/2).
  if (rollKind === "MELEE" && allTalents.includes("Berserker")) {
    const halfThresh = Math.floor((r.systemStrainThreshold || 0) / 2);
    if ((r.systemStrain || 0) > halfThresh) {
      chips.push({ id: "berserker", label: "+1 BERSERKER", dice: 1, hint: `Berserker: +1 die on Melee when Strain > ${halfThresh} (floor(threshold/2))` });
    }
  }
  // Combat Instinct: +1 die on Melee or Ranged when any cockpit pilot's strain >= floor((5+training)/2).
  if ((rollKind === "MELEE" || rollKind === "RANGED") && allTalents.includes("Combat Instinct")) {
    const triggered = cockpitPilots.some(cp => {
      if (cp.isKO || !cp.pilotId) return false;
      const p = (state.pilots || []).find(x => x.id === cp.pilotId);
      if (!p || !(p.talents || []).includes("Combat Instinct")) return false;
      const thresh = Math.floor((5 + (p.training || 0)) / 2);
      return (cp.pilotStrain || 0) >= thresh;
    });
    if (triggered) {
      chips.push({ id: "combat-instinct", label: "+1 INSTINCT", dice: 1, hint: "Combat Instinct: +1 die when a cockpit pilot's strain ≥ floor((5+training)/2)" });
    }
  }
  // Coordinated: +1 die on ANY check when ≥2 Coordinated pilots share this robot.
  const coordinatedCount = allTalents.filter(t => t === "Coordinated").length;
  if (coordinatedCount >= 2) {
    chips.push({ id: "coordinated", label: "+1 COORDINATED", dice: 1, hint: "Two+ Coordinated pilots in this robot — +1 die on all checks" });
  }
  // Martial Artist: enables unarmed melee chip.
  if (rollKind === "MELEE" && allTalents.includes("Martial Artist")) {
    chips.push({ id: "martial-artist", label: "UNARMED MELEE", dice: 0, hint: "Martial Artist: unarmed OK; damage = 1d6 + ½ Physical. Parry without weapon." });
  }
  return chips;
}

// Passive talent helpers — called from outside rollerComputeChips.

// Shield Rider: +2 Pilot Strain Threshold per Shield Rider pilot while shields > 0.
function calcPilotStrainBonus(r, cp) {
  const p = state.pilots.find(x => x.id === cp.pilotId);
  if (!p) return 0;
  let bonus = 0;
  if ((p.talents || []).includes("Shield Rider") && (r.shieldsCurrent || 0) > 0) bonus += 2;
  bonus += forceCommanderBonus(r.side);
  return bonus;
}
// Commander passive: +1 Pilot Strain Threshold to all friendly pilots when any
// conscious Commander pilot is on the same side (force-wide, not per-robot).
function forceCommanderBonus(side) {
  const b = state.activeBattle;
  if (!b || !side) return 0;
  const sideRobots = side === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
  for (const robot of sideRobots) {
    for (const cp of (robot.cockpitPilots || [])) {
      if (cp.isKO || !cp.pilotId) continue;
      const p = (state.pilots || []).find(x => x.id === cp.pilotId);
      if ((p?.talents || []).includes("Commander")) return 1;
    }
  }
  return 0;
}

// Tank: HP formula flip — 3 × Physical instead of 2 × Physical.
// KO threshold is used as HP proxy (5 + training); Tank doesn't change that
// formula directly but does flip the HEAT_VENT extra die (wired in action handler).
function pilotHasTank(pilotId) {
  const p = state.pilots.find(x => x.id === pilotId);
  return p ? (p.talents || []).includes("Tank") : false;
}

// Neural Link: Physical replaces Mental for pilot strain source.
function pilotHasNeuralLink(pilotId) {
  const p = state.pilots.find(x => x.id === pilotId);
  return p ? (p.talents || []).includes("Neural Link") : false;
}
let renderDiceRoller = function (rid, k) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const rollKind = k ? actionRollKind(k) : "GENERIC";
  const chips = rollKind ? rollerComputeChips(r, rollKind) : [];
  const enabledChipDice = chips
    .filter(c => _roller.chips[c.id])
    .reduce((sum, c) => sum + (c.dice || 0), 0);
  const total = _roller.poolBase + enabledChipDice;
  const a = k ? ACTIONS[k] : null;
  const salvoOverflow = state.modal?.data?.salvoOverflow || 0;
  return `
    <h2>🎲 ${a ? a.label.toUpperCase() : "ROLL DICE"} ${rollKind && rollKind !== "GENERIC" ? `<span class="chip">${rollKind}</span>` : ""}</h2>
    <p style="font-size:12px; color:var(--on-surface-muted)">
      ${a ? "Pool starts at your base attack/skill dice. Toggle each chip below if it applies. The roller shows hits; you read damage at the table." : "Generic d6 pool for ad-hoc rule checks."}
    </p>
    ${salvoOverflow > 0 ? `<span class="chip red" style="margin-top:6px; display:inline-block">Salvo Overflow −${salvoOverflow}</span>` : ""}

    <div class="label-small label-cyan" style="margin-top:10px">POOL</div>
    <div class="row-gap" style="margin-top:4px">
      <button class="btn ghost" data-act="roller-pool" data-d="-1">−</button>
      <strong style="flex:1; text-align:center; font-size:18px">${total} d6</strong>
      <button class="btn ghost" data-act="roller-pool" data-d="1">+</button>
    </div>
    <div class="meta" style="font-size:11px; text-align:center; color:var(--on-surface-muted)">
      base ${_roller.poolBase}${enabledChipDice > 0 ? ` + ${enabledChipDice} chips` : ""}
    </div>

    <div class="label-small label-cyan" style="margin-top:10px">HITS ON</div>
    <div class="row-gap" style="margin-top:4px">
      ${[4,5,6].map(t => `<button class="btn ${_roller.threshold === t ? "primary" : "ghost"}" style="flex:1" data-act="roller-thresh" data-t="${t}">${t}+</button>`).join("")}
    </div>

    ${chips.length > 0 ? `
      <div class="label-small label-cyan" style="margin-top:10px">APPLICABLE CHIPS</div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px">
        ${chips.map(c => `
          <button class="action-btn" data-act="roller-toggle-chip" data-id="${c.id}">
            <span class="nm" style="color: ${_roller.chips[c.id] ? "var(--cyan)" : "var(--on-surface-muted)"}">
              ${_roller.chips[c.id] ? "☑" : "☐"} ${escapeHtml(c.label)}
            </span>
            <span class="hint">${escapeHtml(c.hint)}</span>
          </button>
        `).join("")}
      </div>
    ` : `
      <p class="meta" style="font-size:11px; margin-top:10px">No bonus chips available for this roll kind.</p>
    `}

    <button class="btn amber wide" style="margin-top:12px" data-act="roller-roll">ROLL ${total} d6 vs ${_roller.threshold}+</button>

    ${_roller.lastRoll ? `
      <div class="card" style="margin-top:12px">
        <div class="label-small">LAST ROLL</div>
        <div class="row-gap" style="flex-wrap:wrap; margin-top:6px">
          ${_roller.lastRoll.rolls.map(v => `<span class="chip ${v >= _roller.lastRoll.threshold ? "green" : "muted"}" style="font-size:14px; padding:4px 8px">${v}</span>`).join("")}
        </div>
        <p style="margin-top:8px; text-align:center; font-size:20px; font-weight:700">
          ${_roller.lastRoll.hits} HIT${_roller.lastRoll.hits === 1 ? "" : "S"}
        </p>
      </div>
    ` : ""}

    <div class="actions">
      <button class="btn ghost" data-act="roller-reset">RESET</button>
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
handlers["roller-pool"] = ({ d }) => {
  _roller.poolBase = Math.max(0, _roller.poolBase + parseInt(d, 10));
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-thresh"] = ({ t }) => {
  _roller.threshold = parseInt(t, 10);
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-toggle-chip"] = ({ id }) => {
  _roller.chips[id] = !_roller.chips[id];
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-roll"] = () => {
  const r = findBattleRobot(state.activeBattle, state.modal.data.id);
  const rollKind = state.modal.data.k ? actionRollKind(state.modal.data.k) : "GENERIC";
  const chips = rollKind && r ? rollerComputeChips(r, rollKind) : [];
  const chipDice = chips.filter(c => _roller.chips[c.id]).reduce((s, c) => s + (c.dice || 0), 0);
  const total = _roller.poolBase + chipDice;
  const rolls = [];
  for (let i = 0; i < total; i++) rolls.push(1 + Math.floor(Math.random() * 6));
  const hits = rolls.filter(v => v >= _roller.threshold).length;
  _roller.lastRoll = { rolls, hits, threshold: _roller.threshold };
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-reset"] = () => {
  _roller.poolBase = 4;
  _roller.threshold = 5;
  _roller.chips = {};
  _roller.lastRoll = null;
  pushModal("dice-roller", state.modal.data);
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// STRAIN / TOKENS / SHIELDS / CAPACITORS / FUEL dialogs
// ════════════════════════════════════════════════════════════════════
handlers["show-strain"] = ({ id }) => pushModal("strain-dialog", { id: Number(id) });
handlers["show-pilots"] = ({ id }) => pushModal("pilots-dialog", { id: Number(id) });
handlers["show-shields"] = ({ id }) => pushModal("shields-dialog", { id: Number(id) });
handlers["show-capacitors"] = ({ id }) => pushModal("cap-dialog", { id: Number(id) });
handlers["show-fuel"] = ({ id }) => pushModal("fuel-dialog", { id: Number(id) });
handlers["show-armor"] = ({ id }) => pushModal("armor-dialog", { id: Number(id) });
handlers["show-move"] = ({ id }) => pushModal("move-dialog", { id: Number(id) });
handlers["status-picker"] = ({ id }) => pushModal("status-picker", { id: Number(id) });

let renderStrainDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return stepperDialog("SYSTEM STRAIN",
    `${r.systemStrain} / ${r.systemStrainThreshold}`,
    "Robot-wide. +1 per action; clears via Heat Vent or a Capacitor spend.",
    "strain", rid);
};
handlers["bump-strain"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.systemStrain = Math.max(0, r.systemStrain + parseInt(d, 10));
  if (r.systemStrain >= r.systemStrainThreshold && !r.shutdown) setShutdownPending(r);
  if (r.systemStrain < r.systemStrainThreshold && r.shutdownPending) r.shutdownPending = false;
  dbPut("battles", state.activeBattle);
  pushModal("strain-dialog", { id: Number(id) });
};

let renderPilotsDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  const cockpits = r.cockpitPilots || [];
  if (cockpits.length === 0) {
    // fall back to robot-level tokens
    return stepperDialog("PILOT TOKENS",
      `${r.pilotTokens} / ${r.pilotMental}`,
      "Single-pilot robot. Each action places a token; PASS clears.",
      "tokens", rid);
  }
  return `
    <h2>PILOT STRAIN</h2>
    <p>Action Tokens per pilot. PASS clears.</p>
    ${cockpits.map((cp, i) => {
      const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
      const displayName = pilot?.name ?? "(unassigned)";
      const mental = pilot?.mental ?? 0;
      const strain = cp.pilotStrain || 0;
      return `
      <div class="card tight">
        <div class="row-between">
          <strong>${escapeHtml(displayName)}</strong>
          <span>${strain}${mental ? " / " + mental : ""}</span>
        </div>
        <div class="row-gap" style="margin-top:6px">
          <button class="btn ghost" data-act="bump-pilot-tok" data-id="${rid}" data-p="${i}" data-d="-1">− 1</button>
          <button class="btn ghost" data-act="bump-pilot-tok" data-id="${rid}" data-p="${i}" data-d="1">+ 1</button>
        </div>
      </div>`;
    }).join("")}
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-tokens"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.pilotTokens = Math.max(0, r.pilotTokens + parseInt(d, 10));
  dbPut("battles", state.activeBattle);
  pushModal("pilots-dialog", { id: Number(id) });
};
handlers["bump-pilot-tok"] = ({ id, p, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const target = r.cockpitPilots[parseInt(p, 10)];
  if (!target) return;
  target.tokens = Math.max(0, (target.tokens || 0) + parseInt(d, 10));
  dbPut("battles", state.activeBattle);
  pushModal("pilots-dialog", { id: Number(id) });
};

let renderShieldsDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>SHIELDS</h2>
    <p>Whole-robot shield pool. Absorbs damage before any component takes a hit. Recovery: spend 1 capacitor for +10 (rulebook L417).</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-shields" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${r.shieldsCurrent} / ${r.shieldsMax}</strong>
      <button class="btn ghost" data-act="bump-shields" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <button class="btn wide ${r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax ? "amber" : "ghost"}"
      ${r.capacitorsRemaining <= 0 || r.shieldsCurrent >= r.shieldsMax ? "disabled" : ""}
      data-act="recover-shields" data-id="${rid}">RECOVER · 1 Cap → +10</button>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-shields"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.shieldsCurrent = Math.max(0, Math.min(r.shieldsMax, r.shieldsCurrent + parseInt(d, 10)));
  dbPut("battles", state.activeBattle);
  pushModal("shields-dialog", { id: Number(id) });
};
handlers["recover-shields"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  if (r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax) {
    r.capacitorsRemaining--;
    r.shieldsCurrent = Math.min(r.shieldsMax, r.shieldsCurrent + 10);
    dbPut("battles", state.activeBattle);
    pushModal("shields-dialog", { id: Number(id) });
  }
};

let renderCapDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>CAPACITORS — ${r.capacitorsRemaining} left</h2>
    <p>+1 die per remaining cap to Shutdown checks. Spend 1 to recover 10 Shields OR remove 1 SStrain (rulebook L417-420).</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-cap" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${r.capacitorsRemaining}</strong>
      <button class="btn ghost" data-act="bump-cap" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <button class="btn wide ${r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax ? "" : "ghost"}"
      ${r.capacitorsRemaining <= 0 || r.shieldsCurrent >= r.shieldsMax ? "disabled" : ""}
      data-act="recover-shields" data-id="${rid}">+10 SHIELDS · spend 1 Cap</button>
    <button class="btn wide ${r.capacitorsRemaining > 0 && r.systemStrain > 0 ? "" : "ghost"}" style="margin-top:6px"
      ${r.capacitorsRemaining <= 0 || r.systemStrain <= 0 ? "disabled" : ""}
      data-act="spend-cap-strain" data-id="${rid}">−1 SYSTEM STRAIN · spend 1 Cap</button>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-cap"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.capacitorsRemaining = Math.max(0, r.capacitorsRemaining + parseInt(d, 10));
  dbPut("battles", state.activeBattle);
  pushModal("cap-dialog", { id: Number(id) });
};
handlers["spend-cap-strain"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  if (r.capacitorsRemaining > 0 && r.systemStrain > 0) {
    r.capacitorsRemaining--; r.systemStrain--;
    dbPut("battles", state.activeBattle);
    pushModal("cap-dialog", { id: Number(id) });
  }
};

let renderFuelDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>FUEL</h2>
    <p>Spent on Boost actions.</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-fuel" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${r.fuelCurrent} / ${r.fuelMax}</strong>
      <button class="btn ghost" data-act="bump-fuel" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-fuel"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.fuelCurrent = Math.max(0, Math.min(r.fuelMax, r.fuelCurrent + parseInt(d, 10)));
  dbPut("battles", state.activeBattle);
  pushModal("fuel-dialog", { id: Number(id) });
};

let renderArmorDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>ARMOR</h2>
    <p>Per-component armor. Tap a component tile on the schematic to take or repair damage.</p>
    ${r.components.map(c => `
      <div class="row-between" style="margin:4px 0">
        <strong>${escapeHtml(c.name)}</strong>
        <span class="${c.isDestroyed ? "label-red" : c.hpMax === 0 ? "" : c.hpCurrent < c.hpMax ? "label-amber" : "label-cyan"}">
          ${c.isDestroyed ? "DESTROYED" : c.hpMax === 0 ? "—" : `${c.hpCurrent} / ${c.hpMax}`}
        </span>
      </div>
    `).join("")}
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
let renderMoveDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  const boostDraw = r.boostPower > 0 ? Math.ceil(r.robotWeight / r.boostPower) : 0;
  return `
    <h2>MOVEMENT</h2>
    <div class="card tight">Ground Speed: <strong>${r.groundSpeed || "—"}</strong> SU</div>
    <div class="card tight">Boost Power: <strong>${r.boostPower || "—"}</strong></div>
    <div class="card tight">Boost Draw: <strong>${boostDraw || "—"}</strong> fuel per SU</div>
    <div class="card tight">Lift / Load: <strong>${r.robotWeight} / ${r.maxLoad}</strong></div>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};

const STATUSES = ["STANDING","CROUCHED","FLYING","GRAPPLED"];
let renderStatusPicker = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>SET STATUS</h2>
    <p>Player-controlled canonical status. DOWN / SHUTDOWN are gameplay-set.</p>
    ${STATUSES.map(s => {
      const active = (r.statusEffects || []).includes(s) || (s === "STANDING" && (r.statusEffects || []).length === 0);
      return `<div class="card tight ${active?"":""}" data-act="set-status" data-id="${rid}" data-s="${s}" style="border-color: var(--${s==="STANDING"?"green":s==="CROUCHED"?"amber":s==="FLYING"?"cyan":"orange"})">${s} ${active ? "<span style='float:right'>ACTIVE</span>" : ""}</div>`;
    }).join("")}
    <div class="actions">
      <button class="btn ghost" data-act="clear-status" data-id="${rid}">CLEAR → STANDING</button>
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
const CANONICAL_STATUSES = ["STANDING","CROUCHED","FLYING","DOWN","SHUTDOWN","GRAPPLED"];
handlers["set-status"] = ({ id, s }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.statusEffects = (r.statusEffects || []).filter(e => !CANONICAL_STATUSES.includes(e));
  if (s !== "STANDING") r.statusEffects.push(s);
  dbPut("battles", state.activeBattle);
  closeModal();
};
handlers["clear-status"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.statusEffects = (r.statusEffects || []).filter(e => !CANONICAL_STATUSES.includes(e));
  dbPut("battles", state.activeBattle);
  closeModal();
};

handlers["open-comp"] = ({ id, cid }) => {
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["show-loadout"] = ({ id }) => pushModal("loadout-sheet", { id: Number(id) });
let renderLoadoutSheet = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const allEquip = r.components.flatMap(c => (c.equipment || []).map(e => ({ ...e, _comp: c })));
  const weapons = allEquip.filter(e => (e.damage || 0) > 0);
  const guards  = allEquip.filter(e => (e.keywords || []).includes("Guard"));
  const utility = allEquip.filter(e => (e.damage || 0) <= 0 && !(e.keywords || []).includes("Guard"));
  const eqRow = (e) => {
    const broken = (e.armorCurrent || 0) <= 0 && (e.armorMax || 0) > 0;
    return `<div class="card tight" style="${broken ? 'opacity:0.55' : ''}">
      <div class="row-between">
        <strong${broken ? ' style="text-decoration:line-through"' : ''}>${escapeHtml(e.name || "Equipment")}</strong>
        <div class="row-gap">
          ${broken ? `<span class="chip red">BROKEN</span>` : ""}
          ${(e.damage||0)>0 ? `<span class="chip">DMG ${e.damage}</span>` : ""}
          ${(e.range||0)>0  ? `<span class="chip muted">RNG ${e.range}</span>` : ""}
          ${(e.armorMax||0)>0 ? `<span class="chip ${broken?'red':e.armorCurrent<e.armorMax?'amber':'muted'}">ARM ${e.armorCurrent}/${e.armorMax}</span>` : ""}
          ${(e.maxAmmo||0)>0 ? `<span class="chip muted">AMMO ${e.ammoRemaining??e.maxAmmo}/${e.maxAmmo}</span>` : ""}
        </div>
      </div>
      <div class="meta">${escapeHtml(e._comp.name)} · ${escapeHtml(e._comp.facing || "all facings")}</div>
    </div>`;
  };
  const section = (label, items) => items.length === 0 ? "" : `
    <div class="label-small label-cyan" style="margin-top:12px">${label} (${items.length})</div>
    ${items.map(eqRow).join("")}`;
  return `
    <h2>LOADOUT — ${escapeHtml(r.robotName)}</h2>
    <div class="row-gap" style="margin-bottom:8px">
      <span class="chip">${weapons.length} weapon${weapons.length !== 1 ? 's' : ''}</span>
      <span class="chip muted">${allEquip.length} total items</span>
    </div>
    ${allEquip.length === 0 ? `<p class="meta">No equipment installed.</p>` : ""}
    ${section("WEAPONS", weapons)}
    ${section("GUARDS", guards)}
    ${section("UTILITY", utility)}
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
let renderCompSheet = function (rid, cid) {
  const r = findBattleRobot(state.activeBattle, rid);
  const c = r?.components.find(x => x.componentId === cid);
  if (!c) return "<p>?</p>";
  return `
    <div class="label-small" style="margin-bottom:6px;opacity:0.6">← ${escapeHtml(r.robotName)}</div>
    <h2>${escapeHtml(c.name)}</h2>
    <div class="row-gap">
      <span class="chip">${c.definition}</span>
      <span class="chip muted">${c.facing}</span>
      ${c.isFrame ? `<span class="chip">FRAME</span>` : ""}
      ${c.isDestroyed ? `<span class="chip red">DESTROYED</span>` : ""}
    </div>
    <div style="margin:10px 0; padding:10px; background:rgba(0,0,0,0.15); border-radius:var(--bevel)">
      <div class="label-small">ARMOR</div>
      <div class="row-gap" style="margin-top:4px">
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="-1">− 1</button>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="-5">−5</button>
        <strong style="flex:1; text-align:center; font-size:18px">${c.isDestroyed ? "DESTROYED" : c.hpMax === 0 ? "— (no armor)" : `${c.hpCurrent} / ${c.hpMax}`}</strong>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="+1">+ 1</button>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="+5">+5</button>
      </div>
      <button class="btn wide" style="margin-top:6px" data-act="repair-comp" data-id="${rid}" data-cid="${cid}">REPAIR TO MAX</button>
      ${c.isDestroyed ? `
        <button class="btn wide" style="margin-top:6px; background:var(--cyan); color:#07111a" data-act="restore-comp" data-id="${rid}" data-cid="${cid}">UNDO · RESTORE</button>
        <div class="meta" style="font-size:10px; margin-top:2px">Mistake recovery — full HP, no cascade rewind</div>
      ` : ""}
    </div>
    ${(c.modules || []).length > 0 ? `
      <div class="label-small">MODULES</div>
      ${c.modules.map((m, i) => {
        const def = MODULES_BY_ID[m.moduleId];
        return `
          <div class="card tight row-between">
            <div>
              <strong>${escapeHtml(def?.name || m.moduleId)}</strong>
              ${def?.toggleable ? `<span class="chip ${m.toggledOn !== false ? "green" : "muted"}" style="margin-left:8px">${m.toggledOn !== false ? "ON" : "OFF"}</span>` : ""}
            </div>
