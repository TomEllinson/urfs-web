<script>
// ════════════════════════════════════════════════════════════════════
// 2D SCHEMATIC RENDERER
// Port of android/ui/garage/builder/SchematicRenderer.kt — BFS from
// Core, facing-offset placement, perpendicular sibling spread, post-
// pass collision resolution (alpha.348 fix), mirror convention
// (viewer's right = robot's LEFT).
//
// Returns an HTML string. Callers pass `mode = "build" | "battle"` to
// choose what's bound to each tile's click (open module editor vs
// open damage sheet) and what color rules apply.
// ════════════════════════════════════════════════════════════════════
const SCH_NODE_W = 100, SCH_NODE_H = 56;
const SCH_SPACING_X = 130, SCH_SPACING_Y = 90;
const SCH_PADDING = 24;

// Mirror convention: robot's LEFT side is on the viewer's RIGHT.
// Matches SchematicRenderer.kt facingOffset().
function facingOffset(facing) {
  switch (facing) {
    case "TOP":    return [ 0, -1];
    case "BOTTOM": return [ 0,  1];
    case "FRONT":  return [ 1, -1];
    case "BACK":   return [-1,  1];
    case "RIGHT":  return [-1,  0];
    case "LEFT":   return [ 1,  0];
    default:       return [ 1, -1];
  }
}
// Perpendicular sibling spread — same formula as Kotlin
// perpendicularOffsets(n).
function perpendicularOffsets(n) {
  if (n <= 1) return [0];
  if (n % 2 === 0) {
    const half = n / 2;
    const arr = [];
    for (let i = -half; i <= -1; i++) arr.push(i);
    for (let i =  1; i <=  half; i++) arr.push(i);
    return arr;
  }
  const half = Math.floor(n / 2);
  const arr = [];
  for (let i = -half; i <= half; i++) arr.push(i);
  return arr;
}

function computeSchematicLayout(components) {
  // Build child-of-parent index. Each component is a battle/build
  // component shape — we use tempId/componentId interchangeably (caller
  // normalizes).
  const idOf = c => c._id;
  const byParent = new Map();
  for (const c of components) {
    const p = c._parentId;
    if (!byParent.has(p)) byParent.set(p, []);
    byParent.get(p).push(c);
  }
  const core = components.find(c => c.definition === "CORE") || components[0];
  if (!core) return { nodes: [], minX: 0, minY: 0, maxX: 0, maxY: 0 };

  const positions = [];
  const queue = [{ comp: core, gridX: 0, gridY: 0 }];
  while (queue.length > 0) {
    const cur = queue.shift();
    positions.push(cur);
    const children = byParent.get(idOf(cur.comp)) || [];
    // Group by primary facing.
    const byFacing = new Map();
    for (const ch of children) {
      const f = ch.facing || "FRONT";
      if (!byFacing.has(f)) byFacing.set(f, []);
      byFacing.get(f).push(ch);
    }
    for (const [facing, siblings] of byFacing) {
      const [dx, dy] = facingOffset(facing);
      const perpX = -dy, perpY = dx;
      const offsets = perpendicularOffsets(siblings.length);
      siblings.forEach((ch, idx) => {
        const perp = offsets[idx];
        queue.push({
          comp: ch,
          gridX: cur.gridX + dx + perpX * perp,
          gridY: cur.gridY + dy + perpY * perp,
        });
      });
    }
  }

  // Collision resolution pass (alpha.348 fix). Walk later occupants
  // perpendicular to the parent-link direction until they hit a free
  // cell.
  const occupied = new Set();
  const cellKey = (x, y) => `${x},${y}`;
  for (let i = 0; i < positions.length; i++) {
    let { gridX, gridY } = positions[i];
    if (!occupied.has(cellKey(gridX, gridY))) {
      occupied.add(cellKey(gridX, gridY));
      continue;
    }
    const parent = positions.find(p => idOf(p.comp) === positions[i].comp._parentId);
    let [dx, dy] = parent ? [gridX - parent.gridX, gridY - parent.gridY] : [1, 0];
    dx = Math.sign(dx) || 0; dy = Math.sign(dy) || 0;
    const perpX = -dy || 1, perpY = dx || 0;
    let step = 1;
    let nx = gridX, ny = gridY;
    while (occupied.has(cellKey(nx, ny))) {
      const sign = step % 2 === 1 ? 1 : -1;
      const mag = Math.floor((step + 1) / 2);
      nx = gridX + perpX * sign * mag;
      ny = gridY + perpY * sign * mag;
      step++;
      if (step > 20) break;
    }
    occupied.add(cellKey(nx, ny));
    positions[i] = { ...positions[i], gridX: nx, gridY: ny };
  }

  const minX = Math.min(...positions.map(p => p.gridX));
  const maxX = Math.max(...positions.map(p => p.gridX));
  const minY = Math.min(...positions.map(p => p.gridY));
  const maxY = Math.max(...positions.map(p => p.gridY));
  return { nodes: positions, minX, maxX, minY, maxY };
}

/**
 * Render a 2D schematic from a list of components (battle OR build
 * shape). Each component must have:
 *   _id           : stable component identifier
 *   _parentId     : id of parent, or null for Core
 *   definition    : "CORE" / "HEAD" / "ARM" / "LEG" / "UTILITY"
 *   facing        : "FRONT" / "BACK" / ...
 *   name          : display name
 *   _hpRatio      : 0..1 (1 = full armor, 0 = destroyed)
 *   _destroyed    : boolean
 *   _hpLabel      : "8/8" or "—" etc.
 * Returns an HTML string. `mode` is "build" or "battle"; click action
 * dispatches `tapAct` with `{ id: _id }`.
 */
function renderSchematic(components, opts) {
  const o = Object.assign({ tapAct: "noop", selectedId: null }, opts || {});
  const layout = computeSchematicLayout(components);
  if (layout.nodes.length === 0) {
    return `<div class="meta" style="padding:12px; text-align:center; color:var(--on-surface-muted)">No components yet.</div>`;
  }
  const cols = layout.maxX - layout.minX + 1;
  const rows = layout.maxY - layout.minY + 1;
  const w = SCH_SPACING_X * cols + SCH_NODE_W + 2 * SCH_PADDING;
  const h = SCH_SPACING_Y * rows + SCH_NODE_H + 2 * SCH_PADDING;
  const originX = SCH_PADDING - layout.minX * SCH_SPACING_X;
  const originY = SCH_PADDING - layout.minY * SCH_SPACING_Y;

  // Sort positions so front-row (smaller gridY) draws last → on top
  // for click priority (alpha.348 parity).
  const drawOrder = layout.nodes.slice().sort((a, b) => {
    if ((a.comp._parentId === null) !== (b.comp._parentId === null))
      return a.comp._parentId === null ? -1 : 1;
    if (a.gridY !== b.gridY) return b.gridY - a.gridY;
    return a.gridX - b.gridX;
  });

  // Build the connection-line SVG.
  const lines = [];
  for (const n of layout.nodes) {
    const parent = layout.nodes.find(p => p.comp._id === n.comp._parentId);
    if (!parent) continue;
    const x1 = originX + parent.gridX * SCH_SPACING_X + SCH_NODE_W / 2;
    const y1 = originY + parent.gridY * SCH_SPACING_Y + SCH_NODE_H / 2;
    const x2 = originX + n.gridX * SCH_SPACING_X + SCH_NODE_W / 2;
    const y2 = originY + n.gridY * SCH_SPACING_Y + SCH_NODE_H / 2;
    lines.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#5a6c80" stroke-width="2"/>`);
  }

  const nodeHtml = drawOrder.map(n => {
    const c = n.comp;
    const left = originX + n.gridX * SCH_SPACING_X;
    const top  = originY + n.gridY * SCH_SPACING_Y;
    let cls = "sch-node " + (c.definition || "").toLowerCase();
    if (c._destroyed) cls += " dead";
    else if (c._hpRatio < 0.33) cls += " bad";
    else if (c._hpRatio < 0.66) cls += " warn";
    if (o.selectedId === c._id) cls += " selected";
    const labelChip = c._parentId == null ? "" : `
      <div class="sch-facing" style="left: ${left + SCH_NODE_W / 2}px; top: ${top + SCH_NODE_H - 4}px">
        ${escapeHtml(c.facing || "?")}
      </div>
    `;
    // 0.2.7: armor health bar at top of each component node. Width
    // proportional to current/max armor; color tier follows the
    // .bad/.warn coloration on the parent node so it shifts amber →
    // red as armor drops. Unarmored components (armorMax 0) show a
    // thin dim track so the player notices the gap at a glance.
    const armorMax = c._armorMax || 0;
    const armorCur = c._armorCurrent || 0;
    const armorRatio = armorMax > 0 ? Math.max(0, Math.min(1, armorCur / armorMax)) : 0;
    const armorBar = armorMax > 0
      ? `<div class="armor-bar"><div class="armor-fill" style="width:${(armorRatio * 100).toFixed(1)}%"></div></div>`
      : `<div class="armor-bar armor-empty"></div>`;
    return `
      ${labelChip}
      <div class="${cls}" style="left:${left}px; top:${top}px"
           data-act="${o.tapAct}" data-id="${c._id}" data-rid="${o.rid || ""}">
        ${armorBar}
        <div class="def">${defAbbr2(c.definition)}</div>
        <div class="nm">${escapeHtml(c.name)}</div>
        <div class="hp">${escapeHtml(c._hpLabel || "")}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="schematic-wrap" style="height: ${Math.min(h, 380)}px">
      <div class="schematic-grid" style="width: ${w}px; height: ${h}px">
        <svg width="${w}" height="${h}">${lines.join("")}</svg>
        ${nodeHtml}
      </div>
    </div>
  `;
}
function defAbbr2(d) {
  return ({ CORE: "COR", HEAD: "HEA", ARM: "ARM", LEG: "LEG", UTILITY: "UTL" })[d] || (d || "?").slice(0, 3);
}

// ─ Adapters: normalize a build-shape robot or a battle robot to the
//   schematic data contract.
// 0.2.7: build-time armor max per component — sum each module's
// armorMultiplier × robot silhouette. Mirrors buildBattleRobotState's
// hpMax calc at line ~1078 so build-time and battle reads agree.
function componentArmorMax(c, silhouette) {
  let a = 0;
  for (const m of (c.modules || [])) {
    const def = MODULES_BY_ID[m.moduleId];
    if (def?.armorMultiplier) a += def.armorMultiplier * (silhouette || 1);
  }
  return a;
}
function robotToSchemNodes(robot) {
  // Build shape uses tempId + parentTempId. Inferred chain: every
  // non-core component without an explicit parent attaches to the
  // core.
  const core = (robot.components || []).find(c => c.definition === "CORE");
  return (robot.components || []).map(c => {
    const isCore = c === core;
    const armorMax = componentArmorMax(c, robot.silhouette);
    return {
      _id: c.tempId,
      _parentId: isCore ? null : (c.parentTempId ?? (core ? core.tempId : null)),
      definition: c.definition,
      facing: c.facing,
      name: c.name || c.definition,
      _hpRatio: 1,
      _armorMax: armorMax,
      _armorCurrent: armorMax,
      _destroyed: false,
      _hpLabel: armorMax > 0 ? `${armorMax}/${armorMax}` : "0 ARM",
    };
  });
}
function battleRobotToSchemNodes(r) {
  const core = r.components.find(c => c.definition === "CORE");
  return r.components.map(c => {
    const isCore = c === core;
    const ratio = c.hpMax > 0 ? c.hpCurrent / c.hpMax : 1;
    const label = c.isDestroyed ? "DEAD" : c.hpMax === 0 ? "0 ARM" : `${c.hpCurrent}/${c.hpMax}`;
    return {
      _id: c.componentId,
      _parentId: isCore ? null : (c.parentComponentId ?? (core ? core.componentId : null)),
      definition: c.definition,
      facing: c.facing,
      name: c.name || c.definition,
      _hpRatio: ratio,
      _armorMax: c.hpMax || 0,
      _armorCurrent: c.hpCurrent || 0,
      _destroyed: !!c.isDestroyed,
      _hpLabel: label,
    };
  });
}
handlers["noop"] = () => {};
handlers["edit-component-from-schem"] = ({ rid, id }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(id) });
};
handlers["open-comp-from-schem"] = ({ rid, id }) => {
  pushModal("comp-sheet", { id: Number(rid), cid: Number(id) });
};
handlers["toggle-schem3d"] = ({ rid }) => {
  const r = ROBOTS_BY_ID[Number(rid)];
  if (r) { r._schematic3D = !r._schematic3D; dbPut("robots", r); render(); }
};
handlers["toggle-schem3d-battle"] = ({ rid }) => {
  const r = findBattleRobot(state.activeBattle, Number(rid));
  if (r) { r._schematic3D = !r._schematic3D; dbPut("battles", state.activeBattle); render(); }
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// 3D SCHEMATIC RENDERER
// Hand-rolled orthographic projection, painter's-algorithm depth sort,
// PointerEvent orbit + pinch, wheel zoom, tap-to-select.
// No external dependencies.
// ════════════════════════════════════════════════════════════════════

// World-space box size per definition (x-width, y-height, z-depth).
const DEF_SIZE = {
  CORE:    [52, 52, 52],
  HEAD:    [36, 36, 28],
  ARM:     [28, 44, 22],
  LEG:     [32, 50, 28],
  UTILITY: [30, 30, 22],
};
const DEF_DEFAULT = [32, 36, 24];

// Face colours per definition (base, light-face, dark-face multiplier).
const DEF_COLOR = {
  CORE:    "#4dd0e1",
  HEAD:    "#ef5350",
  ARM:     "#4ece71",
  LEG:     "#ffb347",
  UTILITY: "#8da0b6",
};
const GAP3D = 10;

// Facing → world direction vector.
function facing3D(f) {
  switch (f) {
    case "FRONT":  return [ 0, 0,  1];
    case "BACK":   return [ 0, 0, -1];
    case "LEFT":   return [-1, 0,  0];
    case "RIGHT":  return [ 1, 0,  0];
    case "TOP":    return [ 0, 1,  0];
    case "BOTTOM": return [ 0,-1,  0];
    default:       return [ 0, 0,  1];
  }
}

// Build {id → {pos:[x,y,z], size:[w,h,d]}} world layout from component list.
function build3DLayout(components) {
  const byId = new Map(components.map(c => [c._id, c]));
  const byParent = new Map();
  for (const c of components) {
    const p = c._parentId;
    if (!byParent.has(p)) byParent.set(p, []);
    byParent.get(p).push(c);
  }
  const core = components.find(c => c.definition === "CORE") || components[0];
  if (!core) return new Map();

  const placed = new Map();
  placed.set(core._id, { pos: [0, 0, 0], size: (DEF_SIZE[core.definition] || DEF_DEFAULT).slice() });

  const queue = [core._id];
  while (queue.length) {
    const pid = queue.shift();
    const pp = placed.get(pid);
    if (!pp) continue;
    const children = byParent.get(pid) || [];
    // Group by facing so we can spread siblings perpendicular.
    const byFacing = new Map();
    for (const ch of children) {
      const f = ch.facing || "FRONT";
      if (!byFacing.has(f)) byFacing.set(f, []);
      byFacing.get(f).push(ch);
    }
    for (const [facing, siblings] of byFacing) {
      const dir = facing3D(facing);
      const sz = DEF_SIZE[byId.get(pid)?.definition] || DEF_DEFAULT;
      // perpendicular spread axis: if dir is along Z, spread along X; if X, spread along Z; if Y, spread along X.
      let perpAxis = 0;
      if (Math.abs(dir[2]) > 0.5) perpAxis = 0; // spread X
      else if (Math.abs(dir[0]) > 0.5) perpAxis = 2; // spread Z
      else perpAxis = 0;
      const n = siblings.length;
      const halfSpread = (n - 1) / 2;
      siblings.forEach((ch, i) => {
        const cSz = (DEF_SIZE[ch.definition] || DEF_DEFAULT).slice();
        const parentHalf = sz[dir[0] !== 0 ? 0 : dir[1] !== 0 ? 1 : 2] / 2;
        const childHalf  = cSz[dir[0] !== 0 ? 0 : dir[1] !== 0 ? 1 : 2] / 2;
        const offset = (i - halfSpread) * (cSz[perpAxis] + GAP3D);
        const pos = [
          pp.pos[0] + dir[0] * (parentHalf + childHalf + GAP3D) + (perpAxis === 0 ? offset : 0),
          pp.pos[1] + dir[1] * (parentHalf + childHalf + GAP3D),
          pp.pos[2] + dir[2] * (parentHalf + childHalf + GAP3D) + (perpAxis === 2 ? offset : 0),
        ];
        placed.set(ch._id, { pos, size: cSz });
        queue.push(ch._id);
      });
    }
  }
  return placed;
}

// Project a 3D point to canvas 2D, given camera angles and scale.
function project(x, y, z, rotY, rotX, scale, cx, cy) {
  // Yaw
  const cy_ = Math.cos(rotY), sy_ = Math.sin(rotY);
  const x1 = x * cy_ - z * sy_;
  const z1 = x * sy_ + z * cy_;
  // Pitch
  const cx_ = Math.cos(rotX), sx_ = Math.sin(rotX);
  const y2 = y * cx_ - z1 * sx_;
  // Orthographic project (flip y for canvas)
  return [cx + x1 * scale, cy - y2 * scale];
}

// Lighten/darken a hex colour by a ratio.
function tintColor(hex, ratio) {
  // Bug #11 defensive guard: a caller passing undefined/non-string base
  // colour (e.g. DEF_COLOR miss with no fallback applied) would throw
  // "Cannot read properties of undefined (reading 'slice')" on the
  // first 3D-schematic mount before the rest of the scene wired up.
  const safe = (typeof hex === "string" && hex.startsWith("#") && hex.length >= 7)
    ? hex
    : "#8da0b6";
  const r = parseInt(safe.slice(1, 3), 16);
  const g = parseInt(safe.slice(3, 5), 16);
  const b = parseInt(safe.slice(5, 7), 16);
  const t = v => Math.min(255, Math.max(0, Math.round(v * ratio)));
  return `rgb(${t(r)},${t(g)},${t(b)})`;
}

// Draw a single cuboid face (convex polygon) on ctx.
function drawFace(ctx, pts, fill, strokeW) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.45)";
  ctx.lineWidth = strokeW;
  ctx.stroke();
}

// Draw a single component as a depth-sorted cuboid.
function drawBox(ctx, corners2d, baseColor, selected, dead, hpRatio) {
  // corners2d: array of 8 projected points [tlf, trf, brf, blf, tlb, trb, brb, blb]
  // (front face = 0-3, back face = 4-7)
  // For painter's algorithm we just draw 3 visible faces: top, right, front
  // (visible depends on camera angle; we always draw all 3, painter's algo handles order).
  const alpha = dead ? 0.35 : 1;
  const base = dead ? "#555" : (hpRatio < 0.33 ? "#ef5350" : hpRatio < 0.66 ? "#ffb347" : baseColor);
  const light  = tintColor(base, 1.35);
  const mid    = tintColor(base, 0.85);
  const dark   = tintColor(base, 0.55);

  const sw = selected ? 2.5 : 1;
  ctx.globalAlpha = alpha;

  // Bottom face (y-down)
  drawFace(ctx, [corners2d[3], corners2d[2], corners2d[6], corners2d[7]], dark, sw);
  // Back face
  drawFace(ctx, [corners2d[4], corners2d[5], corners2d[6], corners2d[7]], dark, sw);
  // Left face
  drawFace(ctx, [corners2d[0], corners2d[4], corners2d[7], corners2d[3]], mid, sw);
  // Right face
  drawFace(ctx, [corners2d[1], corners2d[5], corners2d[6], corners2d[2]], mid, sw);
  // Front face
  drawFace(ctx, [corners2d[0], corners2d[1], corners2d[2], corners2d[3]], light, sw);
  // Top face
  drawFace(ctx, [corners2d[0], corners2d[1], corners2d[5], corners2d[4]], light, sw);

  if (selected) {
    // Highlight rim on front + top
    ctx.strokeStyle = "#4dd0e1";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(corners2d[0][0], corners2d[0][1]);
    for (const p of [corners2d[1], corners2d[2], corners2d[3], corners2d[0], corners2d[4], corners2d[5], corners2d[1]]) ctx.lineTo(p[0], p[1]);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

// Get 8 corners of a box centred at (px, py, pz) with half-extents hx,hy,hz.
function boxCorners(px, py, pz, hx, hy, hz, rotY, rotX, scale, cx, cy) {
  const verts = [
    [-hx,  hy,  hz], [ hx,  hy,  hz], [ hx, -hy,  hz], [-hx, -hy,  hz],
    [-hx,  hy, -hz], [ hx,  hy, -hz], [ hx, -hy, -hz], [-hx, -hy, -hz],
  ];
  return verts.map(([x, y, z]) => project(px+x, py+y, pz+z, rotY, rotX, scale, cx, cy));
}

// Full 3D draw pass.
function draw3D(canvas, components, placed, cam, selectedId, tapAct, rid) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;

  // Build draw list with depth key = avg camera-space z.
  const items = components.map(c => {
    const p = placed.get(c._id);
    if (!p) return null;
    const [px, py, pz] = p.pos;
    const cy_ = Math.cos(cam.rotY), sy_ = Math.sin(cam.rotY);
    const cx_ = Math.cos(cam.rotX), sx_ = Math.sin(cam.rotX);
    const z1 = px * sy_ + pz * cy_;
    const depth = z1 * cx_;
    return { c, p, depth };
  }).filter(Boolean);

  // Back-to-front (painter's).
  items.sort((a, b) => a.depth - b.depth);

  // Store projected centers for hit-test.
  canvas._centers = [];
  for (const { c, p } of items) {
    // Bug #11 defensive guard: skip any item whose layout data is half-
    // initialised on first-render race (pos/size missing). Earlier
    // bug surfaced as ".slice of undefined" downstream.
    if (!p || !Array.isArray(p.pos) || !Array.isArray(p.size)) continue;
    const [px, py, pz] = p.pos;
    const [sw, sh, sd] = p.size;
    const corners = boxCorners(px, py, pz, sw/2, sh/2, sd/2, cam.rotY, cam.rotX, cam.scale, cx, cy);
    const base = DEF_COLOR[c.definition] || "#8da0b6";
    drawBox(ctx, corners, base, c._id === selectedId, !!c._destroyed, c._hpRatio ?? 1);

    // Label
    const [sx, sy] = project(px, py, pz, cam.rotY, cam.rotX, cam.scale, cx, cy);
    ctx.globalAlpha = 0.9;
    ctx.font = "bold 9px ui-monospace,monospace";
    ctx.fillStyle = "#d6e3f0";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const labelSrc = String(c.name || c.definition || "?");
    ctx.fillText(labelSrc.slice(0, 8), sx, sy);
    ctx.globalAlpha = 1;

    canvas._centers.push({ id: c._id, sx, sy, tapAct, rid });
  }
}

// Attach pointer/wheel/pinch interaction to a canvas3d element.
// cam is a mutable camera object shared per canvas.
function attach3DInteraction(canvas, components, placed, cam, getSelectedId, setSelectedId, redraw) {
  let ptrState = null;
  let lastPinchDist = null;

  canvas.addEventListener("pointerdown", e => {
    canvas.setPointerCapture(e.pointerId);
    ptrState = { x: e.clientX, y: e.clientY, moved: false, id: e.pointerId };
  });

  canvas.addEventListener("pointermove", e => {
    if (!ptrState || ptrState.id !== e.pointerId) return;
    const dx = e.clientX - ptrState.x;
    const dy = e.clientY - ptrState.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) ptrState.moved = true;
    cam.rotY += dx * 0.008;
    cam.rotX = Math.max(-1.3, Math.min(1.3, cam.rotX + dy * 0.008));
    ptrState.x = e.clientX; ptrState.y = e.clientY;
    redraw();
  });

  canvas.addEventListener("pointerup", e => {
    if (!ptrState || ptrState.id !== e.pointerId) return;
    if (!ptrState.moved && canvas._centers) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
      const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
      let best = null, bestD = 30 * 30;
      for (const item of canvas._centers) {
        const d = (item.sx - mx) ** 2 + (item.sy - my) ** 2;
        if (d < bestD) { bestD = d; best = item; }
      }
      if (best) setSelectedId(best.id, best.tapAct, best.rid);
    }
    ptrState = null;
  });

  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    cam.scale = Math.max(0.3, Math.min(3.0, cam.scale * (e.deltaY > 0 ? 0.92 : 1.09)));
    redraw();
  }, { passive: false });

  // Pinch via two simultaneous pointers.
  const touches = new Map();
  canvas.addEventListener("pointerdown", e => { touches.set(e.pointerId, { x: e.clientX, y: e.clientY }); });
  canvas.addEventListener("pointermove", e => {
    touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (touches.size === 2) {
      const [a, b] = [...touches.values()];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (lastPinchDist !== null) {
        const ratio = dist / lastPinchDist;
        cam.scale = Math.max(0.3, Math.min(3.0, cam.scale * ratio));
        redraw();
      }
      lastPinchDist = dist;
    } else {
      lastPinchDist = null;
    }
  });
  canvas.addEventListener("pointerup",   e => { touches.delete(e.pointerId); if (touches.size < 2) lastPinchDist = null; });
  canvas.addEventListener("pointercancel", e => { touches.delete(e.pointerId); if (touches.size < 2) lastPinchDist = null; });
}

// Cameras keyed by robotId so orbit state survives re-renders within a session.
const _cam3D = {};

// Main entry: mount (or update) the 3D canvas inside `wrap`.
// wrap is a .schem3d-wrap div with data-rid, data-tapact, data-battle.
function mount3DSchematic(wrap) {
  const rid = wrap.dataset.rid;
  const tapAct = wrap.dataset.tapact;
  const isBattle = wrap.dataset.battle === "1";

  const robot = isBattle
    ? findBattleRobot(state.activeBattle, Number(rid))
    : ROBOTS_BY_ID[Number(rid)];
  if (!robot) return;

  const nodes = isBattle ? battleRobotToSchemNodes(robot) : robotToSchemNodes(robot);
  const placed = build3DLayout(nodes);

  // Measure wrap to size canvas.
  const W = Math.max(wrap.clientWidth || 320, 200);
  const H = Math.min(W * 0.65, 380);

  let canvas = wrap.querySelector("canvas");
  if (!canvas) {
    canvas = document.createElement("canvas");
    wrap.appendChild(canvas);
  }
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  wrap.style.height   = H + "px";

  if (!_cam3D[rid]) {
    _cam3D[rid] = { rotY: 0.52, rotX: 0.44, scale: (W / 420) * 1.1 };
  }
  const cam = _cam3D[rid];

  // Scale canvas coords (dpr).
  const dctx = canvas.getContext("2d");
  dctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  let selectedId = wrap._selectedId || null;

  function redraw() {
    dctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw3D(canvas, nodes, placed, cam, selectedId, tapAct, rid);
  }

  function setSelectedId(id, act, r) {
    selectedId = id;
    wrap._selectedId = id;
    redraw();
    // Show ⚙ by re-dispatching the normal handler.
    if (act && act !== "noop") {
      const h = handlers[act];
      if (h) h({ rid: r, id });
    }
  }

  // Avoid double-binding events.
  if (!canvas._3dBound) {
    canvas._3dBound = true;
    attach3DInteraction(canvas, nodes, placed, cam, () => selectedId, setSelectedId, redraw);
  }

  redraw();
}

// Called by render() after DOM insertion to hook up all 3D wraps.
function mountAll3D() {
  document.querySelectorAll(".schem3d-wrap").forEach(wrap => mount3DSchematic(wrap));
}

// Wrap renderSchematic to optionally return 3D scaffold instead of 2D HTML.
// Returns HTML string (3D mode returns a canvas placeholder + toggle; JS mounts after insertion).
const _canvas3DSupported = (() => {
  try { return !!document.createElement("canvas").getContext("2d"); } catch { return false; }
})();

function renderSchematicWithToggle(components, opts, robot, isBattle) {
  const r = robot;
  const is3D = _canvas3DSupported && !!(r && r._schematic3D);
  const rid = opts.rid || "";
  const toggleAct = isBattle ? "toggle-schem3d-battle" : "toggle-schem3d";

  const toggle = _canvas3DSupported ? `
    <div class="schem-toggle-row">
      <span class="schem-toggle-chip ${!is3D ? 'active' : ''}" data-act="${toggleAct}" data-rid="${rid}">2D</span>
      <span class="schem-toggle-chip ${is3D ? 'active' : ''}"  data-act="${toggleAct}" data-rid="${rid}">3D</span>
    </div>
  ` : "";

  if (is3D) {
    return `
      ${toggle}
      <div class="schem3d-wrap" data-rid="${rid}" data-tapact="${opts.tapAct || 'noop'}" data-battle="${isBattle ? 1 : 0}"></div>
    `;
  }
  return toggle + renderSchematic(components, opts);
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PILOT ASSIGN MODAL
// ════════════════════════════════════════════════════════════════════
function renderPilotAssign(fid, assignments) {
  const f = FORCES_BY_ID[fid];
  if (!f) return `<h2>FORCE NOT FOUND</h2>`;
  const allSlots = forceCockpitSlots(f);
  const humanSlots = allSlots.filter(s => !s.isAi);

  // Empty-pilots guard: no pilots created yet but cockpit slots need filling.
  if (state.pilots.length === 0 && humanSlots.length > 0) {
    return `
      <h2>ASSIGN PILOTS</h2>
      <div class="meta" style="margin-bottom:12px">${escapeHtml(f.name)}</div>
      <p style="margin:16px 0">No pilots created yet. Create one in the Pilots tab first.</p>
      <div class="actions" style="margin-top:16px">
        <button class="btn ghost" data-act="cancel-pilot-assign" data-fid="${fid}">CANCEL</button>
        <button class="btn amber" data-act="open-pilots-tab">GO TO PILOTS</button>
      </div>
    `;
  }

  const assignedPilotIds = new Set(Object.values(assignments).filter(Boolean));

  let robotSections = "";
  for (const rid of f.robotIds || []) {
    const robot = ROBOTS_BY_ID[rid];
    if (!robot) continue;
    const slots = robotCockpitSlots(robot);
    if (slots.length === 0) continue;
    // Surface a quick build-warning chip so the player sees red flags
    // before they even open the preview. Pulls from the same struct.
    const _previewWarnings = buildRobotDeployPreview(robot, f)?.warnings || [];
    const _redCount = _previewWarnings.filter(w => w.severity === "red").length;
    const _amberCount = _previewWarnings.filter(w => w.severity === "amber").length;
    const _warnChip = _redCount > 0
      ? ` <span class="chip" style="background:var(--red,#ef4444);color:#fff;font-size:10px">⚠ ${_redCount}</span>`
      : _amberCount > 0
        ? ` <span class="chip" style="background:var(--amber,rgba(245,158,11,0.18));color:var(--amber,#f59e0b);font-size:10px">⚠ ${_amberCount}</span>`
        : "";
    robotSections += `<div style="display:flex; align-items:center; justify-content:space-between; margin:12px 0 6px">
      <div class="label-small" style="margin:0">${escapeHtml(robot.name || "Unnamed")}${_warnChip}</div>
      <button class="btn ghost" style="padding:4px 8px; font-size:10px" data-act="preview-robot-deploy" data-rid="${robot.id}" data-fid="${fid}" title="Show full deploy preview before committing — BP, armor, power, weapons, pilots, build warnings.">👁 PREVIEW</button>
    </div>`;
    for (const slot of slots) {
      const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
      if (slot.isAi) {
        robotSections += `
          <div class="list-card" style="margin-bottom:6px">
            <div style="flex:1">
              <div class="meta">${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)} · ${escapeHtml(slot.componentName)}</div>
              <span class="chip muted">A.I. Core (auto-piloted)</span>
            </div>
          </div>`;
      } else {
        const currentPilotId = assignments[slotKey] || "";
        // Pilots not assigned elsewhere (or assigned to this slot)
        const available = state.pilots.filter(p =>
          !assignedPilotIds.has(p.id) || p.id === currentPilotId
        );
        const opts = `<option value="">— Unassigned —</option>` +
          available.map(p =>
            `<option value="${p.id}" ${p.id === currentPilotId ? "selected" : ""}>${escapeHtml(p.name || "Pilot")} (${p.rank || ""})</option>`
          ).join("");
        robotSections += `
          <div class="list-card" style="margin-bottom:6px">
            <div style="flex:1">
              <div class="meta">${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)} · ${escapeHtml(slot.componentName)}</div>
              <select data-act="pilot-slot-changed" data-fid="${fid}" data-key="${slotKey}"
                style="margin-top:6px;width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:6px;border-radius:4px">
                ${opts}
              </select>
            </div>
          </div>`;
      }
    }
  }

  const allAssigned = humanSlots.every(s => {
    const k = `${s.robotId}:${s.componentId}:${s.slotIndex}`;
    return assignments[k];
  });
  const deployDisabled = allAssigned ? "" : "disabled";
  const deployClass = allAssigned ? "btn amber" : "btn amber disabled";
  const side = (state.modal && state.modal.data && state.modal.data.side) || "P1";
  const deployLabel = side === "P2" ? "ADD TO BATTLE" : "DEPLOY";

  return `
    <h2>ASSIGN PILOTS</h2>
    <div class="meta" style="margin-bottom:12px">${escapeHtml(f.name)}</div>
    ${robotSections}
    <div class="actions" style="margin-top:16px">
      <button class="btn ghost" data-act="cancel-pilot-assign" data-fid="${fid}">CANCEL</button>
      <button class="${deployClass}" data-act="confirm-pilot-assign" data-fid="${fid}" ${deployDisabled}>${deployLabel}</button>
    </div>
  `;
}

handlers["pilot-slot-changed"] = ({ fid, key }, value) => {
  if (!state.modal || state.modal.kind !== "pilot-assign") return;
  state.modal.data.assignments[key] = value || null;
  render();
};

handlers["confirm-pilot-assign"] = ({ fid }) => {
  const f = FORCES_BY_ID[Number(fid)];
  if (!f) return;
  const modalData = (state.modal && state.modal.data) || {};
  const assignments = modalData.assignments || {};
  const side = modalData.side || "P1";
  const slots = forceCockpitSlots(f);
  const humanSlots = slots.filter(s => !s.isAi);
  if (humanSlots.some(s => !assignments[`${s.robotId}:${s.componentId}:${s.slotIndex}`])) return;
  // §27 deploy preview gate (P2 path enters here directly via the
  // opponent-force picker, so we mirror deploy-force's RED-warning
  // confirm here too). Advisory — matches iter 26 policy.
  const _redRobots = [];
  for (const rid of (f.robotIds || [])) {
    const robot = ROBOTS_BY_ID[rid];
    if (!robot) continue;
    const preview = buildRobotDeployPreview(robot, f);
    const redWarns = (preview?.warnings || []).filter(w => w.severity === "red");
    if (redWarns.length > 0) {
      _redRobots.push(`${robot.name || "Unnamed"} (${redWarns.map(w => w.label).join(", ")})`);
    }
  }
  if (_redRobots.length > 0) {
    const sideLabel = side === "P2" ? "Opponent" : "Force";
    const msg = `${sideLabel}: ${_redRobots.length} robot${_redRobots.length===1?"":"s"} have RED build warnings:\n\n${_redRobots.join("\n")}\n\nDeploy anyway?`;
    if (!confirm(msg)) return;
  }

  if (side === "P2") {
    // Add opponent robots to the existing active battle.
    const b = state.activeBattle;
    if (!b) return;
    const p2Robots = f.robotIds.map(rid => {
      const robot = ROBOTS_BY_ID[rid];
      if (!robot) return null;
      const bs = buildBattleRobotState(robot, "P2");
      bs.cockpitPilots = robotCockpitSlots(robot).map(slot => {
        const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
        const pilotId = slot.isAi ? null : (assignments[slotKey] || null);
        // §4-A: see P1 deploy path. Mirror logic here for P2 opponents.
        const pilot = pilotId != null ? PILOTS_BY_ID[pilotId] : null;
        const hasTank = pilot ? (pilot.talents || []).includes("Tank") : false;
        const pilotHpMax = pilot ? (hasTank ? 3 : 2) * (pilot.physical || 1) : 0;
        return {
          componentId: slot.componentId,
          moduleIndex: slot.moduleIndex,
          slotIndex: slot.slotIndex,
          slotName: slot.slotName,
          pilotId,
          isAi: slot.isAi,
          pilotStrain: 0,
          pilotHpMax,
          pilotHpDamage: 0,
        };
      });
      return bs;
    }).filter(Boolean);
    for (const br of p2Robots) b.p2Robots.push(br);
    b.p2ForceId = f.id;
    b.p2ForceName = f.name;
    // §33: now that BOTH side BPs are known, compute starting Priority
    // (lower-BP force takes Priority and becomes the Assaulting Player;
    // ties resolved by random pick). Surfaces in a toast.
    recordUndo("Compute starting Priority");
    computeStartingPriority(b);
    dbPut("battles", b);
    closeModal();
    render();
  } else {
    deployForceWithAssignments(f, assignments);
  }
};

handlers["cancel-pilot-assign"] = ({ fid }) => {
  pushModal("force-editor", { id: Number(fid) });
};

handlers["open-pilots-tab"] = () => {
  closeModal();
  state.tab = "pilots";
  render();
};
</script>

function renderActionLog() {
  const b = state.activeBattle;
  const stack = b ? (b.undoStack || []) : [];
  // Chronological (oldest first): scroll-back through what happened in order.
  // Sequential step numbers shown alongside wall-clock time so the log reads
  // like a turn-by-turn record. UNDO buttons preserved on each row so the
  // existing undo flow stays accessible (recordUndo semantics unchanged).
  const rows = stack.length === 0
    ? `<p style="color:var(--muted, #6b7c8d); margin:16px 0">No recorded actions yet.</p>`

    : "";

    <div id="battle-log-scroll" style="max-height:60vh; overflow-y:auto; margin-top:8px">${rows}</div>
    ${footer}
    <button class="btn ghost wide" style="margin-top:14px" data-act="close-modal">CLOSE</button>

// ════════════════════════════════════════════════════════════════════
// ROBOT DEPLOY PREVIEW (Tom 2026-06-17): when a player is about to
// commit a robot to battle — either via the FORCE editor's per-robot
// row, or the pilot-assign deploy gate, or the P2 opponent flow — the
// PREVIEW button surfaces this modal so they can review BP cost,
// effective Sil, armor totals, power balance, weight load, weapon
// ranges, equipped talents, pilot composition, and existing build
// warnings (§43 power, §44 keyword cap, §weight-overload) BEFORE the
// commit. Advisory only — never blocks the deploy (matches iter 26's
// editor cap-bar policy: surface, don't gate).
//
// buildRobotDeployPreview(robot, force) is a pure structured-data
// builder; renderRobotDeployPreview consumes it and renders the modal.
// ════════════════════════════════════════════════════════════════════
function buildRobotDeployPreview(robot, force) {
  if (!robot) return null;
  const sil = robot.silhouette || 1;
  const effSil = calcEffectiveSil(robot, []);
  const bp = calcRobotBP(robot);
  const depBp = depBP(robot, force);
  const weight = calcTotalWeight(robot);
  const maxLoad = calcMaxLoad(robot);
  const overload = weight - maxLoad;
  const power = calcRobotPower(robot);
  const netPowerRuntime = getRobotNetPower(robot);
  const fuel = calcFuelMax(robot);
  const shields = calcShieldsMax(robot);
  const caps = calcCapacitorPool(robot);
  const strain = calcStrainThreshold(robot);
  const gspd = calcGroundSpeed(robot);
  const boost = calcTotalBoost(robot);
  const glide = calcGlide(robot);
  // Boost distance: ground = boost SU; flying = boost × sil SU
  // (rulebook L456, see action-resolve BOOST picker).
  const boostHoriz = boost;
  const boostVert = boost * sil;
  // Composite armor totals across all components.
  let frameArmor = 0, otherArmor = 0;
  let frameComponents = 0, otherComponents = 0;
  for (const c of robot.components || []) {
    let a = 0;
    for (const m of c.modules || []) {
      a += (MODULES_BY_ID[m.moduleId]?.armorMultiplier || 0) * sil;
    }
    if (c.isFrame !== false) { frameArmor += a; frameComponents++; }
    else { otherArmor += a; otherComponents++; }
  }
  // Weapons summary — walks each equipped piece, flags weapons by
  // damage > 0 (matches loadout-sheet logic). Records min-range and
  // over-keyword-cap advisories per piece.
  const weapons = [];
  for (const c of robot.components || []) {
    for (const e of c.equipment || []) {
      const lib = EQUIPMENT_BY_ID[e.equipmentId];
      if (!lib) continue;
      const stats = equipmentStatsFor(lib);
      const isWeapon = (stats.damage || 0) > 0 || (isLinkedComposite(lib) && (stats.perPartStats || []).some(p => (p.stats?.damage || 0) > 0));
      if (!isWeapon) continue;
      const kw = lib.keywords || [];
      const linked = isLinkedComposite(lib);
      const kwCount = kw.length;
      const kwCap = maxKeywordsFor(lib.silhouette || 1);
      const overKw = !linked && kwCount > kwCap;
      // Min-range: composites take the max-Sil part's footprint per
      // linkedCompositeStats — surface the constituent min if any
      // sub-weapon is external ranged.
      let minRange = 0;
      if (linked) {
        for (const pp of stats.perPartStats || []) {
          // perPartStats entries don't carry socketModuleId; if the
          // composite carries a socketModuleId, all parts share it.
          const ppEq = { ...pp, socketModuleId: e.socketModuleId, silhouette: pp.silhouette };
          minRange = Math.max(minRange, weaponMinRange(ppEq));
        }
      } else {
        minRange = weaponMinRange({ ...lib, socketModuleId: e.socketModuleId });
      }
      weapons.push({
        name: lib.name || "Equipment",
        linked,
        damage: stats.damage || 0,
        damageType: stats.damageType || "Physical",
        range: stats.range || 0,
        minRange,
        maxAmmo: stats.maxAmmo || 0,
        keywords: kw,
        kwCount,
        kwCap,
        overKw,
        componentName: c.name || c.definition || "?",
      });
    }
  }
  // Talents/pilot composition per cockpit slot.
  const slots = robotCockpitSlots(robot);
  const assigns = force ? (force.pilotAssignments || {})[robot.id] || {} : {};
  const pilotEntries = slots.map((slot, i) => {
    if (slot.isAi) {
      // Try to locate the bound AI pilot (or first AI in roster)
      const c = (robot.components || []).find(c => (c.componentId ?? c.tempId) === slot.componentId);
      const mod = c?.modules?.[slot.moduleIndex];
      const aiPilot = findAiPilotForSlot(robot, c, mod);
      return {
        slotName: slot.slotName,
        isAi: true,
        pilot: aiPilot ? {
          name: aiPilot.name || "AI Pilot",
          rank: "AI",
          bpCost: aiPilot.bpCost || (3 * ((aiPilot.physical||1) + (aiPilot.mental||1) + (aiPilot.training||1))),
          physical: aiPilot.physical || 1,
          mental: aiPilot.mental || 1,
          training: aiPilot.training || 1,
          strainThreshold: effectivePilotStrainThreshold(aiPilot, null),
          hpMax: 0,
          talents: aiPilot.talents || [],
        } : null,
      };
    }
    const pid = assigns[i];
    const pilot = pid ? PILOTS_BY_ID[pid] : null;
    let hpMax = 0;
    if (pilot) {
      const hasTank = (pilot.talents || []).includes("Tank");
      hpMax = (hasTank ? 3 : 2) * (pilot.physical || 1);
    }
    return {
      slotName: slot.slotName,
      isAi: false,
      pilot: pilot ? {
        name: pilot.name || "Pilot",
        rank: pilot.rank || "ROOKIE",
        bpCost: pilot.bpCost || 0,
        physical: pilot.physical || 1,
        mental: pilot.mental || 1,
        training: pilot.training || 1,
        strainThreshold: effectivePilotStrainThreshold(pilot, null),
        hpMax,
        talents: pilot.talents || [],
      } : null,
    };
  });
  // Build warnings — mirror the chips iter 26 surfaces on the editor
  // cap-bar and iter 28 surfaces on the equipment list.
  const warnings = [];
  // Iter 36 — each warning carries an OPTIONAL `refKey` so the deploy
  // preview can render a tap-to-peek chip next to it. Adding new
  // warnings: include a refKey from RULE_REFS where applicable;
  // omit the field for warnings with no canonical rule (e.g. cockpit
  // assignment is a workflow issue, not a rulebook clause).
  if (power < 0) warnings.push({ severity: "red", label: `POWER NEGATIVE (${power})`, detail: "§43 / Ch 7 L29 — Robot will trigger an Emergency Shutdown Check on its first action.", refKey: "shutdown-entry" });
  if (overload > 0) warnings.push({ severity: "red", label: `OVERLOADED (+${overload})`, detail: "Weight exceeds Max Load. moveMod goes negative; Ground Speed degrades." });
  if (gspd <= 0 && boost <= 0) warnings.push({ severity: "amber", label: "NO MOBILITY", detail: "Ground Speed 0 and Boost Power 0 — Robot cannot move on its own." });
  if (shields <= 0 && frameArmor === 0 && otherArmor === 0) warnings.push({ severity: "amber", label: "UNARMORED", detail: "No shields and no component armor — every hit goes straight to Frame Save.", refKey: "frame-save" });
  const weaponsOverKw = weapons.filter(w => w.overKw);
  if (weaponsOverKw.length > 0) {
    warnings.push({
      severity: "amber",
      label: `WEAPON KW CAP (${weaponsOverKw.length})`,
      detail: `${weaponsOverKw.length} weapon${weaponsOverKw.length===1?"":"s"} over keyword cap (3 × Sil) per Ch 12 L6. Resolve at the table.`,
      refKey: "keyword-cap",
    });
  }
  const unassignedHuman = pilotEntries.filter(e => !e.isAi && !e.pilot).length;
  if (unassignedHuman > 0) warnings.push({ severity: "amber", label: `${unassignedHuman} COCKPIT UNASSIGNED`, detail: "Human cockpit slot has no pilot. Will block DEPLOY in pilot-assign." });
  // §81 defensive: a pilot is in ONE cockpit at a time. The pick handler
  // dedups on assign, but legacy saves predating §81 may have a pilot
  // double-assigned across robots/slots in this force. Surface a red
  // chip so the player resolves it in the force editor before deploy.
  if (force) {
    const pilotCounts = {};
    for (const slots of Object.values(force.pilotAssignments || {})) {
      for (const pid of Object.values(slots || {})) {
        if (pid == null) continue;
        pilotCounts[pid] = (pilotCounts[pid] || 0) + 1;
      }
    }
    const dupes = Object.keys(pilotCounts).filter(k => pilotCounts[k] > 1);
    if (dupes.length > 0) {
      warnings.push({
        severity: "red",
        label: `DUPLICATE PILOT (${dupes.length})`,
        detail: "A pilot is assigned to multiple cockpits in this force. Open the force editor and re-assign — a pilot can only be in ONE cockpit at a time.",
      });
    }
  }
  // §92 (Ch 2 L59-65) — Head Shared Facings summary. For each ARM that
  // claims a Head as a coordination hub, record the base facings, the
  // effective (post-coordination) facings, and the partner / lone-arm
  // status so the deploy preview can surface a per-arm chip.
  const sharedFacings = [];
  for (const c of robot.components || []) {
    if (c.definition !== "ARM") continue;
    const headRef = c.sharesFacingsWithComponentId
                 ?? c.sharesFacingsWithTempId
                 ?? null;
    if (headRef === null) continue;
    const head = (robot.components || []).find(x =>
      (x.componentId ?? x.tempId) === headRef && x.definition === "HEAD");
    const base = componentEffectiveFacings(c); // no robot — base only
    const effective = componentEffectiveFacings(c, robot);
    const gained = effective.filter(f => !base.includes(f));
    sharedFacings.push({
      armName: c.name || "ARM",
      headName: head?.name || "(head missing)",
      headOk: !!head,
      base,
      effective,
      gained,
      coordActive: gained.length > 0,
    });
  }
  // Surface warnings for lone-arm coordination attempts so the player
  // sees them in the BUILD WARNINGS cluster, not just in the editor.
  for (const s of sharedFacings) {
    if (!s.headOk) {
      warnings.push({
        severity: "amber",
        label: `${s.armName.toUpperCase()} HEAD MISSING`,
        detail: `Arm ${s.armName} points at a Head that no longer exists on this robot — Head Shared Facings coordination disabled (§92 / Ch 2 L59-65).`,
      });
    } else if (!s.coordActive) {
      warnings.push({
        severity: "amber",
        label: `${s.armName.toUpperCase()} LONE COORD`,
        detail: `Arm ${s.armName} shares with ${s.headName} but no partner Arm also shares through it — coordination not active until a second Arm pairs (§92 / Ch 2 L59-65).`,
      });
    }
  }
  return {
    robotId: robot.id,
    robotName: robot.name || "Unnamed",
    sil, effSil, bp, depBp,
    weight, maxLoad, overload,
    power, netPowerRuntime,
    fuel, shields, caps, strain,
    gspd, boost, boostHoriz, boostVert, glide,
    frameArmor, otherArmor, frameComponents, otherComponents,
    weapons, pilotEntries, warnings, sharedFacings,
    forceName: force?.name || null,
  };
}

// §59 (Playwright probe): rapid-click guard wire-up. Wraps every handler
// whose double-fire would mutate game state irreversibly (RESOLVE /
// SUBMIT / ROLL). See withRapidClickGuard above for the debounce
// rationale. List was assembled from the Playwright bug bundle:
//   - resolve-action: SALVO / MELEE_ASSAULT / BOOST / CHARGE / STRAFE /
//     THROW / GRAPPLE / shutdown-pending picker all funnel through here.
//   - apply-damage-submit: the modal's APPLY button — was firing every
//     8 rapid clicks without dedup.
//   - shutdown-*-roll: REBOOT / OVERRIDE / OVERCLOCK — bound to a
//     rolled-dice handler each.
//   - frame-save-roll: Frame Save modal's ROLL button.
//   - overcharge-confirm / redirect-confirm: COMMIT-style buttons.
//   - roller-roll: the dice-roller ROLL button — protects an
//     accidental double-roll inflating pool stats.
//   - fort-seq-roll-physical / fort-seq-roll-fortitude / fort-seq-next:
//     fortitude sequence ROLL + NEXT buttons.
//   - deploy-force: the FORCE → DEPLOY commit button.
// Originals are preserved on `handlers._unguarded` so any internal
// handler-to-handler call that needs to bypass the guard (e.g.
// redirect-confirm → resolve-action re-entry) can use the unguarded
// path. The DOM dispatch path goes through `handlers[name]` and gets
// the guarded version; only programmatic re-entry uses the unguarded.
const _RAPID_CLICK_GUARDED = [
  "resolve-action",
  "apply-damage-submit",
  "shutdown-reboot-roll",
  "shutdown-override-roll",
  "shutdown-overclock-roll",
  "frame-save-roll",
  "overcharge-confirm",
  "redirect-confirm",
  "roller-roll",
  "fort-seq-roll-physical",
  "fort-seq-roll-fortitude",
  "fort-seq-next",
  "deploy-force",
];
handlers._unguarded = handlers._unguarded || {};
for (const _hName of _RAPID_CLICK_GUARDED) {
  if (typeof handlers[_hName] === "function") {
    handlers._unguarded[_hName] = handlers[_hName];
    handlers[_hName] = withRapidClickGuard(handlers[_hName]);
  }
}

async function init() {
  await openDb();
  const [robots, pilots, equipment, forces, battles] = await Promise.all([
    dbGetAll("robots"), dbGetAll("pilots"), dbGetAll("equipment"),
    dbGetAll("forces"), dbGetAll("battles"),
  ]);
  state.robots = robots; state.pilots = pilots; state.equipment = equipment;
  state.forces = forces; state.battles = battles;
  // §87a: build BY_ID maps once after the bulk load. All subsequent
  // mutations rebuild via rebuildByIdMaps() at their respective sites.
  rebuildByIdMaps();
  // §81 defensive: scan loaded forces for duplicate pilot assignments
  // (a pilot assigned to multiple cockpits in the same force). Pre-§81
  // saves could have these; the pick handler now blocks new dupes and
  // buildRobotDeployPreview surfaces a chip. Don't auto-fix — let the
  // player resolve via the force editor so the choice is theirs.
  for (const f of state.forces) {
    const pilotCounts = {};
    for (const slots of Object.values(f.pilotAssignments || {})) {
      for (const pid of Object.values(slots || {})) {
        if (pid == null) continue;
        pilotCounts[pid] = (pilotCounts[pid] || 0) + 1;
      }
    }
    const dupes = Object.keys(pilotCounts).filter(k => pilotCounts[k] > 1);
    if (dupes.length > 0) {
      console.warn(`§81: force "${f.name || f.id}" has duplicate pilot assignment(s) (pilot ids: ${dupes.join(", ")}). Resolve in the force editor before deploy.`);
    }
  }
  // §44 (Tom 2026-06-17): silent boot migration on EVERY saved battle.
  // Runs the central schema migrator first (additive fields), then the
  // legacy pilot-HP backfill — both idempotent, so re-running on a
  // fresh save is a no-op. The user-visible toast fires later on
  // resume-battle when migrateBattlePilotHp re-runs.
  for (const b of battles) {
    const schemaUpdates = migrateBattleSchema(b);
    let pilotHpTouched = false;
    const allRobots = [...(b.p1Robots || []), ...(b.p2Robots || [])];
    for (const robot of allRobots) {
      for (const cp of (robot.cockpitPilots || [])) {
        if (typeof cp.pilotHpMax === "number" && typeof cp.pilotHpDamage === "number") continue;
        const pilot = cp.pilotId != null ? PILOTS_BY_ID[cp.pilotId] : null;
        const hasTank = pilot ? (pilot.talents || []).includes("Tank") : false;
        cp.pilotHpMax = pilot ? (hasTank ? 3 : 2) * (pilot.physical || 1) : 0;
        cp.pilotHpDamage = 0;
        pilotHpTouched = true;
      }
    }
    // Mark for the one-time pilot-HP toast ONLY if cockpit HP actually
    // got backfilled. Schema-only updates are silent (additive fields
    // are too noisy to surface as toasts each iter).
    if (pilotHpTouched) b._legacyHpMigrated = true;
    if (pilotHpTouched || schemaUpdates > 0) dbPut("battles", b);
  }
  // Load content packs; seed urfs-core if not persisted yet.
  // 0.2.6: ALWAYS refresh urfs-core's MODULES/TALENTS/KEYWORDS arrays from
  // the latest in-memory _CORE snapshots. Pre-fix the pack was seeded once
  // per IDB and never updated — every catalog update I shipped after the
  // user's first install (added modules, new keyword flags, etc) silently
  // never reached them. Users keep their `active` flag and any custom
  // pack rows; only the canonical urfs-core content is refreshed.
  const packsRecord = await dbGet("settings", "packs");
  if (packsRecord?.value) {
    state.packs = packsRecord.value;
    const core = state.packs.find(p => p.id === "urfs-core");
    if (core) {
      core.modules = _CORE_MODULES;
      core.talents = _CORE_TALENTS;
      core.keywords = _CORE_KEYWORDS;
      core.version = "1.0";
    } else {
      state.packs.unshift({
        id: "urfs-core", name: "URFS Core", version: "1.0",
        active: true,
        modules: _CORE_MODULES, talents: _CORE_TALENTS, keywords: _CORE_KEYWORDS,
      });
    }
    dbPut("settings", { id: "packs", value: state.packs });
  } else {
    state.packs = [{
      id: "urfs-core", name: "URFS Core", version: "1.0",
      active: true,
      modules: _CORE_MODULES,
      talents: _CORE_TALENTS,
      keywords: _CORE_KEYWORDS,
    }];
    dbPut("settings", { id: "packs", value: state.packs });
  }
  rebuildContent();
  // Migrate robots built before parentTempId was tracked — attach all
  // orphan components to Core so the schematic tree is valid.
  for (const r of state.robots) {
    const core = (r.components || []).find(c => c.definition === "CORE");
    if (!core) continue;
    for (const c of r.components) {
      if (c.definition !== "CORE" && c.parentTempId == null) {
        c.parentTempId = core.tempId;
      }
    }
  }
  // Migrate components built before additionalFacings was tracked.
  for (const r of state.robots) {
    for (const c of (r.components || [])) {
      if (c.additionalFacings == null) c.additionalFacings = [];
    }
  }
  // §75 (Tom 2026-06-17): scrub removed "leg_attack_system" module from
  // saved garage robot designs (state.robots, distinct from battle-snapshot
  // robots scrubbed inside migrateBattleSchema). Module was webapp-only,
  // never wired to melee. BP/Weight is NOT auto-refunded; force editor
  // recomputes on next pilot edit. Idempotent.
  let legAttackRobotScrubs = 0;
  for (const r of state.robots) {
    let touched = false;
    for (const c of (r.components || [])) {
      if (!c || !Array.isArray(c.modules)) continue;
      const before = c.modules.length;
      c.modules = c.modules.filter(m => m && m.moduleId !== "leg_attack_system");
      if (c.modules.length !== before) {
        legAttackRobotScrubs += (before - c.modules.length);
        touched = true;
      }
    }
    if (touched) dbPut("robots", r);
  }
  if (legAttackRobotScrubs > 0) {
    console.info(`[migrate] §75 scrubbed "leg_attack_system" from ${legAttackRobotScrubs} garage-robot module slot(s)`);
  }
  // Normalize legacy battles that predate two-forces schema.
  for (const b of battles) {
    b.p1Robots = b.p1Robots || [];
    b.p2Robots = b.p2Robots || [];
  }
  // If there's a single active battle, resume it.
  if (battles.length === 1) state.activeBattle = battles[0];
  render();
  const seen = await dbGet("settings", "onboardingSeen");
  if (!seen?.value) showOnboarding();
}
init().catch(err => {
  console.error(err);
  document.getElementById("screen").innerHTML = `<div class="empty"><h2>STARTUP ERROR</h2><p>${escapeHtml(err.message)}</p></div>`;
});
