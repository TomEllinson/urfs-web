                    ${on ? `<span class="chip amber" style="margin-left:6px">✓ REDIRECT</span>` : ""}
                  </div>`;
                }).join("")}
                <div class="card tight" data-act="redirect-pick" data-tid="${tid}" data-newtid="SKIP" style="border-color:${picked === "SKIP" ? "var(--amber)" : "var(--surface-3)"}; cursor:pointer">
                  <strong>SKIP — Whiff this slot</strong>
                  <span style="font-size:11px; color:var(--on-surface-muted); margin-left:8px">(§34 Priority transfer if applicable)</span>
                </div>
              </div>
            `}
          </div>
        `;
      }).join("")}
    </div>
    ${isMultiSlot ? `<p style="font-size:11px; color:var(--on-surface-muted); margin-top:8px">SALVO / Melee Assault / Strafe: each slot redirects independently.</p>` : ""}
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>
      <button class="btn amber" data-act="redirect-confirm">CONFIRM REDIRECT</button>
    </div>
  `;
}
handlers["redirect-pick"] = ({ tid, newtid }) => {
  const d = state.modal?.data;
  if (!d) return;
  d.redirects = d.redirects || {};
  const oldTid = Number(tid);
  // SKIP sentinel kept as string; numeric IDs as Number.
  d.redirects[oldTid] = (newtid === "SKIP") ? "SKIP" : Number(newtid);
  render();
};
handlers["redirect-confirm"] = () => {
  const d = state.modal?.data;
  if (!d) return;
  const r = findBattleRobot(state.activeBattle, d.id);
  if (!r) return;
  const invalidTids = d.invalidTids || [];
  const redirects = d.redirects || {};
  // Auto-SKIP slots with no legal alternatives. Nudge if the player
  // left a slot undecided that DOES have alternatives.
  for (const tid of invalidTids) {
    if (redirects[tid] == null) {
      const alts = legalTargetsFor(r, null, tid);
      if (alts.length === 0) {
        redirects[tid] = "SKIP";
      } else {
        showToast(`Pick a redirect (or SKIP) for each slot.`);
        return;
      }
    }
  }
  // Rebuild the targetIds list:
  //   keep originally-valid slots
  //   swap redirected slots to the new target
  //   drop SKIP slots and whiff-credit each (§34).
  // whiffTransferPriority is idempotent past the first transfer, so
  // multiple SKIPs in one action still resolve as one Priority pass.
  const origTargetIds = d._origTargetIds || [];
  const validTids = origTargetIds.filter(tid => !invalidTids.includes(tid));
  const redirectedTids = invalidTids
    .map(tid => redirects[tid])
    .filter(x => x !== "SKIP" && x != null);
  const whiffCount = invalidTids.filter(tid => redirects[tid] === "SKIP").length;
  const finalTargetIds = [...validTids, ...redirectedTids];
  for (let i = 0; i < whiffCount; i++) resolveWhiff(r);
  if (finalTargetIds.length === 0) {
    // Everything skipped, close out cleanly; nothing left to roll.
    showToast(`${ACTIONS[d.k]?.label || "Attack"} — all slots whiffed.`);
    state.activePriorityRobotId = null;
    state.skipRedirectCheck = false;
    closeModal();
    return;
  }
  // Re-enter resolve-action with the patched target list. Set
  // skipRedirectCheck so we don't infinite-loop on §10 re-validation.
  pushModal("action-resolve", { id: d.id, k: d.k, targetIds: finalTargetIds });
  state.skipRedirectCheck = true;
  // §59 (Playwright probe): use the unguarded path — the rapid-click
  // guard is wrapping resolve-action on the DOM dispatcher, but this
  // is a programmatic chain from redirect-confirm and must not be
  // short-circuited by the in-flight guard window.
  const _resolveFn = handlers._unguarded?.["resolve-action"] || handlers["resolve-action"];
  _resolveFn({ id: d.id, k: d.k });
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// DICE ROLLER
// Pool composition + applicable bonus chips per robot/action context
// + actual dice roll. Doesn't auto-apply hits — Tom's spec was
// "display what all needs to be rolled / options for a roll." The
// player still reads hits and decides damage at the table.
//
// Chip catalog ports DiceTalentChips.kt: cockpit-module dice
// (motion/open-air, +3 each), Sharpshooter / Deadeye (talent gated),
// targeting-computer (+1 die ranged), melee-computer (+1 die melee),
// Crouched-on-grabbed-weapon (+2 ranged), multi-arm grab (+2 per
// alive grabber on a melee), inertia-driver pre-melee bonus.
// ════════════════════════════════════════════════════════════════════
const _roller = {
  poolBase: 4,
  threshold: 5,
  chips: {}, // chipId -> boolean
  lastRoll: null, // { rolls: [...], hits, threshold }
};
function rollerComputeChips(r, rollKind, actionKey = null) {
  // Iter 23 (Tom 2026-06-17): `actionKey` is the Action key currently
  // being rolled (e.g., "PARRY", "DODGE", "BLOCK", "QUICK_STRIKE").
  // Combat Instinct fires by Action bucket (=== "reaction"), not by
  // rollKind — Reactions resolve under MELEE / RANGED / PHYSICAL via
  // actionRollKind() and a "REACTION" rollKind never exists. The arg
  // defaults to null so legacy callers don't crash.
  const _action = actionKey && typeof ACTIONS === "object" ? ACTIONS[actionKey] : null;
  const _isReactionBucket = !!(_action && _action.bucket === "reaction");
  const ids = r.components.flatMap(c => c.modules.map(m => m.moduleId));
  const has = id => ids.includes(id);
  const count = id => ids.filter(x => x === id).length;
  const chips = [];
  // Cockpit-module chips (apply when their cockpit type matches roll kind).
  const motionCockpits = r.components.filter(c => c.modules.some(m => m.moduleId === "motion_cockpit" && (m.toggledOn ?? true))).length;
  if (motionCockpits > 0 && (rollKind === "PHYSICAL" || rollKind === "MELEE")) {
    chips.push({ id: "motion", label: `+${motionCockpits * 3} MOTION COCKPIT`, dice: motionCockpits * 3, hint: "+3 dice per cockpit on Physical / Melee checks (rulebook L630)" });
  }
  const openAirCockpits = r.components.filter(c => c.modules.some(m => m.moduleId === "open_air_cockpit" && (m.toggledOn ?? true))).length;
  if (openAirCockpits > 0 && (rollKind === "RANGED" || rollKind === "PHYSICAL")) {
    chips.push({ id: "openair", label: `+${openAirCockpits * 3} OPEN-AIR`, dice: openAirCockpits * 3, hint: "+3 dice per open-air cockpit on Maneuver / Ranged" });
  }
  // Combat computers: detected by module ID, not equipment name strings.
  const targetingComps = count("targeting_comp");
  if (targetingComps > 0 && rollKind === "RANGED") {
    chips.push({ id: "targeting", label: `+${targetingComps * 2} TARGETING`, dice: targetingComps * 2, hint: "+2 dice per Targeting Computer for Ranged" });
  }
  const meleeComps = count("melee_comp");
  if (meleeComps > 0 && rollKind === "MELEE") {
    chips.push({ id: "melee", label: `+${meleeComps * 2} MELEE COMP`, dice: meleeComps * 2, hint: "+2 dice per Melee Computer" });
  }
  // CROUCHED on Grabbed weapons (rulebook L264) → +2 dice on Ranged.
  if ((r.statusEffects || []).includes("CROUCHED") && rollKind === "RANGED") {
    chips.push({ id: "crouched", label: `+2 CROUCHED · grabbed`, dice: 2, hint: "Crouched +2 dice on Ranged with grabbed weapons (L264)" });
  }
  // §13.C GRAPPLED → −2 dice on Ranged Attacks (was −1 prior to
  // Tom 2026-06-13 edit). Only internally-mounted weapons can even
  // fire while GRAPPLED (§13.E note); the chip applies regardless and
  // is auto-ON to lock the penalty into the pool.
  if ((r.statusEffects || []).includes("GRAPPLED") && rollKind === "RANGED") {
    chips.push({ id: "grappled-ranged", label: `−2 GRAPPLED · Ranged`, dice: -2, hint: "Grappled −2 dice on Ranged (Ch 6 §13). Internal mounts only; min range still applies." });
    // Auto-enable so the player doesn't accidentally skip the penalty.
    if (_roller.chips["grappled-ranged"] === undefined) _roller.chips["grappled-ranged"] = true;
  }
  // Inertia driver pre-melee charge bonus.
  if (rollKind === "MELEE" && has("inertia_driver")) {
    chips.push({ id: "inertia", label: `+${r.silhouette} INERTIA DRIVER`, dice: r.silhouette, hint: "Inertia Driver activation. Costs Sil fuel; toggle if used." });
  }
  // Multi-arm grab: presence of any additionalGrabberComponentIds on a weapon (v0.0.2 simplification: skip unless we wire that field).
  // Talent chips (player toggles before roll). Cockpit pilots only store
  // pilotId — talents live on state.pilots, so look them up there.
  const cockpitPilots = r.cockpitPilots || [];
  // KO'd or shutdown pilots can't contribute talent bonuses — only conscious crew.
  const allTalents = cockpitPilots
    .filter(cp => !cp.isAi && !cp.isKO && cp.pilotId)
    .flatMap(cp => PILOTS_BY_ID[cp.pilotId]?.talents || []);
  if (rollKind === "RANGED" && allTalents.includes("Sharpshooter")) {
    // §57 (Tom 2026-06-17, Ch 11 L33): Sharpshooter is ONCE per game,
    // SALVO-only, single-target only, at Inertia 0. Burns the free
    // Incidental (freeToggleIncidentals) when activated. The prior
    // "always-on +3 per Ranged Attack" gate was an over-reach of §31
    // and contradicted the canonical rulebook line — restore the
    // single-target/single-action gate here. Player-toggled (not
    // auto-on) so the Incidental burn only fires when the player
    // explicitly opts in.
    const tids = state.modal?.data?.targetIds || [];
    const isSalvo = actionKey === "SALVO";
    const singleTarget = tids.length === 1;
    const inertiaZero = (r.inertia || 0) === 0;
    const notYetUsed = r._sharpshooterUsed !== true;
    const freeIncidentalsAvailable = (r.freeToggleIncidentals || 0) > 0;
    // Show the chip when ALL four gating conditions are met. The
    // free-Incidental availability is surfaced as a hint when 0 so the
    // player understands why the chip is missing or rejected on toggle.
    if (isSalvo && singleTarget && inertiaZero && notYetUsed) {
      const hintBase = "+3 dice to the Salvo attack (single target only, Inertia 0). Burns 1 free Incidental on activation. Once per game. (Ch 11 L33 / §57)";
      chips.push({
        id: "sharpshooter",
        label: freeIncidentalsAvailable
          ? "+3 SHARPSHOOTER · 1× game"
          : "+3 SHARPSHOOTER · need free Incidental",
        dice: 3,
        hint: freeIncidentalsAvailable
          ? hintBase
          : `${hintBase} — no free Incidental available right now.`,
      });
    }
  }
  if (rollKind === "RANGED" && allTalents.includes("Deadeye")) {
    chips.push({ id: "deadeye", label: "DEADEYE · Unblockable", dice: 0, hint: "Costs +1 token; makes single-target Ranged Unblockable (L625)" });
  }
  if (rollKind === "MELEE" && allTalents.includes("Brawler")) {
    // §31 Tom 2026-06-13: Brawler is a DAMAGE bonus (+½ FS), not a dice
    // chip. Surfaced as a 0-die hint here so the roller still mentions
    // it; actual damage banner lives in the action-resolve modal.
    const bonus = Math.floor((r.frameStrength || 1) / 2);
    chips.push({
      id: "brawler",
      label: `BRAWLER · +${bonus} DAMAGE`,
      dice: 0,
      hint: `+${bonus} Damage (½ Frame Strength) on bare-arm OR socket-mounted Melee (§31)`
    });
  }
  // Berserker: +1 die on Melee when systemStrain > floor(threshold/2).
  if (rollKind === "MELEE" && allTalents.includes("Berserker")) {
    const halfThresh = Math.floor((r.systemStrainThreshold || 0) / 2);
    if ((r.systemStrain || 0) > halfThresh) {
      chips.push({ id: "berserker", label: "+1 BERSERKER", dice: 1, hint: `Berserker: +1 die on Melee when Strain > ${halfThresh} (floor(threshold/2))` });
    }
  }
  // Combat Instinct (rulebook L669): add dice equal to Strain Token
  // count to Reaction rolls. Trigger: pilot has Combat Instinct AND
  // ANY strain tokens. Iter 23 (Tom 2026-06-17): the prior gate keyed
  // off rollKind === "REACTION", which actionRollKind() never returns
  // (Reactions resolve under MELEE/RANGED/PHYSICAL), so this chip
  // never fired. New gate: ACTIONS[actionKey]?.bucket === "reaction".
  if (_isReactionBucket && allTalents.includes("Combat Instinct")) {
    const ciPilots = cockpitPilots.filter(cp => {
      if (cp.isKO || !cp.pilotId) return false;
      const p = (state.pilots || []).find(x => x.id === cp.pilotId);
      return p && (p.talents || []).includes("Combat Instinct") && (cp.pilotStrain || 0) > 0;
    });
    const totalDice = ciPilots.reduce((sum, cp) => sum + (cp.pilotStrain || 0), 0);
    if (totalDice > 0) {
      chips.push({ id: "combat-instinct", label: `+${totalDice} COMBAT INSTINCT`, dice: totalDice, hint: "+dice = Strain Token count on Reaction rolls (rulebook L669)" });
    }
  }
  // §31 Coordinated: NO LONGER a +1-die chip. The new mechanic is a
  // Strain Threshold modifier (Mental × 1.5 while healthy) wired via
  // effectivePilotStrainThreshold() in SALVO overflow + pilots-dialog.
  // The +1-die-when-≥2-Coordinated chip is dropped per Tom 2026-06-13.

  // §31 Martial Artist (Tom 2026-06-13): adds Training to Physical
  // pool for Melee Attack / Parry; double for Priority Melee. The
  // PARRY action routes through rollKind=MELEE; CHARGE / MELEE_ASSAULT
  // / QUICK_STRIKE are the "Priority Melee Attack" actions. Prior
  // "unarmed melee = 1d6 + ½ Physical" chip dropped.
  if (rollKind === "MELEE" && allTalents.includes("Martial Artist")) {
    const k = state.modal?.data?.k;
    const bonus = martialArtistMeleeDiceBonus(r, k);
    if (bonus > 0) {
      const isPriority = k === "CHARGE" || k === "MELEE_ASSAULT" || k === "QUICK_STRIKE";
      chips.push({
        id: "martial-artist",
        label: `+${bonus} MARTIAL ARTIST${isPriority ? " · 2×TR" : ""}`,
        dice: bonus,
        hint: isPriority
          ? `+2 × Training to Physical pool on Priority Melee Attack (§31)`
          : `+Training to Physical pool on Melee / Parry (§31)`
      });
    }
  }
  // §36 G-Adapted (2026-06-17): +4 dice on Fortitude Check vs Inertia
  // loss while Flying (Decelerate / off-Vector turn). The roller has no
  // dedicated "Fortitude" rollKind — Decelerate / Pivot inertia-loss
  // checks route through PHYSICAL. Surface as a player-toggle chip on
  // PHYSICAL rolls while the Robot is Flying (altitude > 0).
  if (rollKind === "PHYSICAL" && allTalents.includes("G-Adapted") && (r.altitude || 0) > 0) {
    chips.push({
      id: "g-adapted",
      label: "+4 G-ADAPTED · Inertia-loss Fortitude",
      dice: 4,
      hint: "Toggle ON for Fortitude vs Inertia loss (Decelerate / off-Vector turn) while Flying. §36 / Ch 11 G-Adapted."
    });
  }
  // §36 Heavy Weapons Specialist (2026-06-17): +2 dice when attacking
  // with a weapon whose Silhouette > Robot's Silhouette. Player-toggle
  // because the chip applies per-weapon but the roller is per-action.
  // Show when ANY equipped weapon on a non-destroyed component has
  // sil > robot.silhouette (qualifying weapon exists).
  if ((rollKind === "RANGED" || rollKind === "MELEE") && allTalents.includes("Heavy Weapons Specialist")) {
    const robotSil = r.silhouette || 1;
    const qualifies = (r.components || []).some(c => {
      if (c.isDestroyed) return false;
      return (c.equipment || []).some(e => (e.silhouette || 1) > robotSil);
    });
    if (qualifies) {
      chips.push({
        id: "heavy-weapons",
        label: "+2 HEAVY WEAPONS SPEC",
        dice: 2,
        hint: "Toggle ON when this attack uses a weapon with Silhouette > Robot's Silhouette. §36 / Ch 11."
      });
    }
  }
  // §36 Last Stand (2026-06-17): +3 dice on ALL attack rolls when this
  // Pilot's HP ≤ 10% (rounded up, minimum 1). Auto-enable when the
  // picked pilot is at the threshold — matches the Grappled-Ranged
  // auto-enable pattern. Look up the picked cockpit pilot if any.
  if ((rollKind === "RANGED" || rollKind === "MELEE") && allTalents.includes("Last Stand")) {
    // Identify the picked acting pilot — the chip should only auto-fire
    // when the Last Stand pilot is the one acting (and is at the HP
    // threshold). If no pilot is picked (MANUAL), still surface the chip
    // as player-toggle so the table can apply it manually.
    const lsCp = (r.cockpitPilots || []).find(cp => {
      if (cp.isAi || cp.isKO || !cp.pilotId) return false;
      const p = (state.pilots || []).find(x => x.id === cp.pilotId);
      if (!p || !(p.talents || []).includes("Last Stand")) return false;
      const hpMax = cp.pilotHpMax || 0;
      if (hpMax <= 0) return false;
      const hp = hpMax - (cp.pilotHpDamage || 0);
      // 10% rounded up, minimum 1 (Ch 11 Last Stand).
      const threshold = Math.max(1, Math.ceil(hpMax * 0.10));
      return hp <= threshold;
    });
    if (lsCp) {
      chips.push({
        id: "last-stand",
        label: "+3 LAST STAND · HP ≤10%",
        dice: 3,
        hint: "Pilot HP ≤10% (rounded up, min 1) — +3 dice to all attacks. §36 / Ch 11 Last Stand."
      });
      if (_roller.chips["last-stand"] === undefined) _roller.chips["last-stand"] = true;
    }
  }
  // §36 Evasive Instinct (2026-06-17): on Boost Dodge Reactions, add
  // Robot's current Inertia as bonus dice (only when Inertia > 0).
  // Boost Dodge routes through rollKind=PHYSICAL — gate on data.k.
  if (rollKind === "PHYSICAL" && allTalents.includes("Evasive Instinct")) {
    const k = state.modal?.data?.k;
    if (k === "BOOST_DODGE" && (r.inertia || 0) > 0) {
      const bonus = r.inertia;
      chips.push({
        id: "evasive-instinct",
        label: `+${bonus} EVASIVE INSTINCT · Inertia`,
        dice: bonus,
        hint: "+Inertia dice on Boost Dodge while Inertia > 0. §36 / Ch 11 Evasive Instinct."
      });
    }
  }
  // Ch 6 Sil-comparison difficulty chip (Tom 2026-06-17): Base = 1 hit
  // required; +1 required hit per Sil the attacker is LARGER than the
  // target (i.e. target smaller), -1 per Sil SMALLER (target larger),
  // minimum 1 total hit. Status effects modify the target's effective
  // Sil per effectiveSilForAttack: CROUCHED halves vs RANGED, DOWN
  // thirds vs ALL. Picks the worst-case picked target (highest Sil-
  // delta penalty). 0-dice display chip — informs the at-table
  // hit-count math; player adjusts the threshold-target manually.
  if (rollKind === "RANGED" || rollKind === "MELEE") {
    const tids = state.modal?.data?.targetIds || [];
    if (tids.length > 0) {
      const b = state.activeBattle;
      const all = [...((b?.p1Robots) || []), ...((b?.p2Robots) || [])];
      const atkSil = r.silhouette || 1;
      let worstDelta = -Infinity;
      let worstTarget = null;
      let worstEff = atkSil;
      for (const tid of tids) {
        const t = all.find(x => x.robotId === tid);
        if (!t) continue;
        const eff = effectiveSilForAttack(t, rollKind);
        // Sil delta = attacker - effective_target. Positive = target
        // smaller → +N hits required. Negative = target larger → -N
        // hits required (rulebook L11409-10).
        const delta = atkSil - eff;
        if (delta > worstDelta) {
          worstDelta = delta;
          worstTarget = t;
          worstEff = eff;
        }
      }
      if (worstTarget) {
        const baseSil = worstTarget.silhouette || 1;
        const statusMod = (worstEff !== baseSil)
          ? ((worstTarget.statusEffects || []).includes("DOWN") ? " (DOWN ⅓)"
            : ((worstTarget.statusEffects || []).includes("CROUCHED") && rollKind === "RANGED") ? " (CROUCHED ½)"
            : "")
          : "";
        if (worstDelta > 0) {
          // Target smaller — +N hits required.
          chips.push({
            id: "sil-comparison",
            label: `+${worstDelta} HIT REQUIRED · Sil ${atkSil} vs ${worstEff}${statusMod}`,
            dice: 0,
            hint: `Attacker Sil ${atkSil} > target effective Sil ${worstEff}${statusMod} → +${worstDelta} hits required (Ch 6 L11409). Add ${worstDelta} to your hit-count target at the table.`
          });
          if (_roller.chips["sil-comparison"] === undefined) _roller.chips["sil-comparison"] = true;
        } else if (worstDelta < 0) {
          // Target larger — bonus reduction (minimum 1 total hit).
          const reduce = -worstDelta;
          chips.push({
            id: "sil-comparison",
            label: `−${reduce} HIT REQUIRED · Sil ${atkSil} vs ${worstEff}${statusMod}`,
            dice: 0,
            hint: `Attacker Sil ${atkSil} < target effective Sil ${worstEff}${statusMod} → −${reduce} hits required, min 1 (Ch 6 L11410). Subtract ${reduce} from your hit-count target at the table (floor at 1).`
          });
          if (_roller.chips["sil-comparison"] === undefined) _roller.chips["sil-comparison"] = true;
        } else if (statusMod) {
          // Status reduced target's effective Sil enough to MATCH attacker
          // exactly — no delta, but the status mod is still worth surfacing
          // (it cancelled an otherwise-positive delta).
          chips.push({
            id: "sil-comparison",
            label: `BASE 1 HIT · Sil ${atkSil} vs ${worstEff}${statusMod}`,
            dice: 0,
            hint: `Status reduced target Sil from ${baseSil} → ${worstEff}${statusMod}; equal to attacker Sil. Base 1 hit required (Ch 6).`
          });
        }
      }
    }
  }
  // §40 (Tom 2026-06-17): targeting penalty when ANY picked target has
  // Inertia > 0. Surfaces as a 0-dice display chip (auto-on) so the
  // player remembers the rulebook L10067 rule: +1 hit required per
  // point of target Inertia. The actual hit-count math happens at the
  // table (or via the threshold input). Picks the highest target
  // Inertia among picked targetIds (worst case for a multi-target
  // SALVO/STRAFE/MELEE_ASSAULT). Both RANGED and MELEE apply.
  if (rollKind === "RANGED" || rollKind === "MELEE") {
    const tids = state.modal?.data?.targetIds || [];
    if (tids.length > 0) {
      const b = state.activeBattle;
      const all = [...((b?.p1Robots) || []), ...((b?.p2Robots) || [])];
      let maxPenalty = 0;
      let multiInertia = 0;
      for (const tid of tids) {
        const t = all.find(x => x.robotId === tid);
        const pen = inertiaTargetingPenalty(t);
        if (pen > maxPenalty) maxPenalty = pen;
        if (pen > 0) multiInertia++;
      }
      if (maxPenalty > 0) {
        chips.push({
          id: "inertia-targeting",
          label: `+${maxPenalty} HIT REQUIRED · target Inertia${multiInertia > 1 ? ` (×${multiInertia})` : ""}`,
          dice: 0,
          hint: `Targeting a Robot with Inertia ${maxPenalty} → +${maxPenalty} hits required (rulebook L10067, §40). Add ${maxPenalty} to your hit-count target at the table.`
        });
        if (_roller.chips["inertia-targeting"] === undefined) _roller.chips["inertia-targeting"] = true;
      }
    }
  }
  // §85a (Tom 2026-06-17, Ch 12 L82): Auto (Ranged) — dice modifier chip.
  // Single-target SALVO with Auto N: +N dice on the attack pool AND +N
  // damage per net hit (banner surfaced post-roll). Multi-target SALVO:
  // -1 die per target past the first per instance per rulebook (the
  // canonical line is "-1 die from the attack pool for every target past
  // the first" — flat -1 per extra target, not per-instance × per-target).
  // SALVO-only because STRAFE / HIP_SHOT fire a single Ranged Attack
  // (no multi-target case) and the chip's single-target +N also fires on
  // those; future patch can broaden. The §85b "extra Ranged Attack per
  // instance" sub-mechanic is deferred (needs new attack-flow scaffolding).
  // Tally instances across firing Linked composite parts + non-Linked
  // Ranged equipment — mirrors the §82 Penetrating + §84 Kinetic tally
  // pattern used in roller-roll attackContext setup.
  if (rollKind === "RANGED" && actionKey === "SALVO" && r) {
    const linkedSel = state.modal?.data?.linkedWeaponSelections || {};
    const firingParts = linkedSelectedPartsForAttack(r, "RANGED", linkedSel);
    let autoCount = 0;
    for (const p of firingParts) {
      const kws = p.keywords || [];
      autoCount += kws.filter(x => x === "Auto").length;
    }
    for (const c of (r.components || [])) {
      if (c.isDestroyed) continue;
      for (const e of (c.equipment || [])) {
        if (!e || e.isLinked) continue;
        if ((e.armorMax || 0) > 0 && (e.armorCurrent ?? 0) <= 0) continue;
        const kws = e.keywords || [];
        if (!kws.includes("Ranged")) continue;
        autoCount += kws.filter(x => x === "Auto").length;
      }
    }
    if (autoCount > 0) {
      const tids = state.modal?.data?.targetIds || [];
      const targetCount = tids.length;
      if (targetCount <= 1) {
        // Single-target (or unpicked default = single): +autoCount dice +
        // +autoCount damage per net hit. Auto-enable so the pool reflects
        // the bonus by default.
        chips.push({
          id: "auto-single",
          label: `+${autoCount} AUTO · single-target`,
          dice: autoCount,
          hint: `Auto (×${autoCount}): +${autoCount} dice on the attack AND +${autoCount} Damage per net hit (hits beyond difficulty). §85a / Ch 12 L82.`,
        });
        if (_roller.chips["auto-single"] === undefined) _roller.chips["auto-single"] = true;
      } else {
        // Multi-target: -1 die per target past the first (rulebook L82 is
        // flat per-target, not per Auto-instance per target).
        const penalty = targetCount - 1;
        chips.push({
          id: "auto-multi",
          label: `−${penalty} AUTO · multi-target (${targetCount} targets)`,
          dice: -penalty,
          hint: `Auto firing at ${targetCount} targets → −1 die per target past the first = −${penalty} dice. §85a / Ch 12 L82.`,
        });
        if (_roller.chips["auto-multi"] === undefined) _roller.chips["auto-multi"] = true;
      }
    }
  }
  return chips;
}

// Passive talent helpers — called from outside rollerComputeChips.

// Shield Rider: +2 Pilot Strain Threshold per Shield Rider pilot while shields > 0.
function calcPilotStrainBonus(r, cp) {
  const p = PILOTS_BY_ID[cp.pilotId];
  if (!p) return 0;
  let bonus = 0;
  if ((p.talents || []).includes("Shield Rider") && (r.shieldsCurrent || 0) > 0) bonus += 2;
  bonus += forceCommanderBonus(r.side);
  return bonus;
}
// Commander passive: +1 Pilot Strain Threshold to all friendly pilots when any
// conscious Commander pilot is on the same side (force-wide, not per-robot).
function forceCommanderBonus(side) {
  const b = state.activeBattle;
  if (!b || !side) return 0;
  const sideRobots = side === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
  for (const robot of sideRobots) {
    for (const cp of (robot.cockpitPilots || [])) {
      if (cp.isKO || !cp.pilotId) continue;
      const p = (state.pilots || []).find(x => x.id === cp.pilotId);
      if ((p?.talents || []).includes("Commander")) return 1;
    }
  }
  return 0;
}

// Tank: HP formula flip — 3 × Physical instead of 2 × Physical.
// KO threshold is used as HP proxy (5 + training); Tank doesn't change that
// formula directly but does flip the STRAIN_VENT extra die (wired in action handler).
function pilotHasTank(pilotId) {
  const p = PILOTS_BY_ID[pilotId];
  return p ? (p.talents || []).includes("Tank") : false;
}

// Neural Link: Physical replaces Mental for pilot strain source.
function pilotHasNeuralLink(pilotId) {
  const p = PILOTS_BY_ID[pilotId];
  return p ? (p.talents || []).includes("Neural Link") : false;
}
// G-Adapted: +4 dice on Fortitude Checks vs Inertia loss while Flying
// (Decelerate / off-Vector turn). Detection mirrors pilotHasTank /
// pilotHasNeuralLink — used by the automated fortitude-sequence path to
// auto-bump the pool when head.source is one of the recognized inertia
// sources. The manual roller chip at rollerComputeChips (PHYSICAL +
// G-Adapted + flying) still handles player-rolled inertia checks; this
// helper handles the auto-rolled per-pilot Fortitudes from §43.
function pilotHasGAdapted(pilotId) {
  const p = PILOTS_BY_ID[pilotId];
  return p ? (p.talents || []).includes("G-Adapted") : false;
}
// Source-string mapping for G-Adapted auto-apply:
//   - "inertia-loss-landing"  → §43 / L10573 Inertia-loss landing per pilot.
//   - "off-vector-fortitude"  → reserved for any future automated off-Vector
//                               turn Fortitude flow (no auto-trigger yet;
//                               the manual roller chip covers player-rolled).
// Anything else (falling-*, neural-link, etc.) does NOT receive the +4.
function gAdaptedAppliesToSource(source) {
  return source === "inertia-loss-landing" || source === "off-vector-fortitude";
}
// Cool Head Under Pressure (§35, Ch 4): triggered effect — when this Pilot
// rolls a Fortitude Check after taking a Reaction and takes no damage,
// remove one Action Token from the Pilot.
//   cp                = cockpitPilots entry (has tokens, pilotId, isKO).
//   fortitudeContext  = { damageTaken: <number> } — caller asserts the
//                       Fortitude result. damageTaken === 0 fires it.
// Returns { fired, reason }. Does NOT toast on no-op so callers can chain.
// Persists via dbPut + drives a toast on fire. The _justTookReaction flag
// is cleared on fire (single-shot per Reaction).
function triggerCoolHead(cp, fortitudeContext) {
  if (!cp || cp.isKO) return { fired: false, reason: "pilot KO or missing" };
  const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
  if (!pilot) return { fired: false, reason: "no pilot assigned" };
  if (!(pilot.talents || []).includes("Cool Head Under Pressure")) {
    return { fired: false, reason: "talent not held" };
  }
  if (!cp._justTookReaction) return { fired: false, reason: "no recent Reaction" };
  const damageTaken = Number(fortitudeContext?.damageTaken ?? 0);
  if (damageTaken !== 0) return { fired: false, reason: "took damage" };
  cp.tokens = Math.max(0, (cp.tokens || 0) - 1);
  cp._justTookReaction = false; // single-shot consume per Reaction
  if (state.activeBattle) dbPut("battles", state.activeBattle);
  showToast(`Cool Head Under Pressure — −1 Action Token (Reaction Fortitude no damage). ${pilot.name || "Pilot"} now ${cp.tokens}.`);
  return { fired: true };
}

// §31 Coordinated (Tom 2026-06-13): Strain Threshold = ceil(Mental × 1.5)
// while the pilot's Pilot HP > half. §4 wired real HP tracking — this
// now reads cp.pilotHpDamage / cp.pilotHpMax instead of strain. If no
// cp provided (build-time UI), assume healthy.
//
// Returns the effective Mental value for any context that compares
// `pilotStrain` against the pilot's strain threshold (SALVO mental
// overflow, pilots-dialog display, etc.).
function effectivePilotStrainThreshold(pilot, cp) {
  if (!pilot) return 0;
  const talents = pilot.talents || [];
  // §77 (Ch 11 L13 + L89): Neural Link replaces Mental with Physical as
  // the base for the Pilot Strain Threshold. "Physical is used instead
  // of Mental for determining when Pilot Strain causes damage, and as
  // the base for the Pilot Strain Threshold."
  const hasNeuralLink = talents.includes("Neural Link");
  const base = hasNeuralLink ? (pilot.physical || 0) : (pilot.mental || 0);
  const hasCoordinated = talents.includes("Coordinated");
  let threshold;
  if (hasCoordinated) {
    // "Above half HP" per rulebook L2394.
    let aboveHalf = true;
    if (cp && typeof cp.pilotHpMax === "number" && cp.pilotHpMax > 0) {
      const hp = cp.pilotHpMax - (cp.pilotHpDamage || 0);
      aboveHalf = hp > Math.floor(cp.pilotHpMax / 2);
    }
    threshold = aboveHalf ? Math.ceil(base * 1.5) : base;
  } else {
    threshold = base;
  }
  // §36 Calm Under Fire (2026-06-17): +2 Strain Threshold ALWAYS.
  // Cumulative with Coordinated (Ch 11 §Strain Threshold Summary).
  if (talents.includes("Calm Under Fire")) threshold += 2;
  return threshold;
}

// §31 Brawler (Tom 2026-06-13): +floor(Frame Strength / 2) added to
// Damage of any melee attack made with a bare arm OR a socket-mounted
// melee weapon. This is a DAMAGE bonus, not a dice bonus — the prior
// flat +1 BRAWLER die chip was wrong (was line ~6347–6349). Surfaced
// as a banner / hint in the action-resolve modal; no dice-chip.
function brawlerMeleeDamageBonus(r) {
  if (!r) return 0;
  const cockpits = r.cockpitPilots || [];
  const hasBrawler = cockpits.some(cp =>
    !cp.isAi && !cp.isKO && cp.pilotId &&
    (PILOTS_BY_ID[cp.pilotId]?.talents || []).includes("Brawler")
  );
  if (!hasBrawler) return 0;
  return Math.floor((r.frameStrength || 1) / 2);
}

// §31 Martial Artist (Tom 2026-06-13): adds Training to Physical pool
// for Melee Attack / Parry. If the action is a Priority Melee Attack
// (CHARGE / MELEE_ASSAULT / QUICK_STRIKE — the primary-bucket melee
// actions), the bonus is doubled (2 × Training). Reaction Melee (PARRY)
// uses single Training. Prior "unarmed melee = 1d6 + ½ Physical" chip
// was wrong (was line ~6376–6378).
function martialArtistMeleeDiceBonus(r, k) {
  if (!r) return 0;
  const cockpits = r.cockpitPilots || [];
  // Look at the highest-Training conscious Martial Artist on board.
  let best = 0;
  for (const cp of cockpits) {
    if (cp.isAi || cp.isKO || !cp.pilotId) continue;
    const p = PILOTS_BY_ID[cp.pilotId];
    if (!p || !(p.talents || []).includes("Martial Artist")) continue;
    const tr = p.training || 0;
    if (tr > best) best = tr;
  }
  if (best <= 0) return 0;
  // Priority Melee Attack = primary-bucket melee actions.
  const isPriorityMelee = k === "CHARGE" || k === "MELEE_ASSAULT" || k === "QUICK_STRIKE";
  return isPriorityMelee ? 2 * best : best;
}

// §28 Pilot KO talent-modifier door (Tom 2026-06-13): future talents
// can hook in to shift the KO threshold. Default modifier table is
// empty — all existing talents return 0 (no shift). KO triggers when
// `cp.pilotHp <= pilotKoThreshold(pilot)` (rulebook L388: incapacitated
// at HP 0). The modifier table can shift the floor for niche talents.
//
// Example future hook (NOT enabled): a "Fragile" talent could register
//   TALENT_KO_MODIFIERS["Fragile"] = (pilot, t) => t + 1;
// to KO a pilot at 1 HP remaining instead of 0.
const TALENT_KO_MODIFIERS = {};
function pilotKoThreshold(pilot) {
  let threshold = 0;
  if (!pilot) return threshold;
  for (const talent of pilot.talents || []) {
    const modifier = TALENT_KO_MODIFIERS[talent];
    if (modifier) threshold = modifier(pilot, threshold);
  }
  return threshold;
}
// §4: KO check anchored on HP (was strain). Returns true when HP at or
// below the talent-shifted KO floor. AI cockpits and unassigned slots
// (no pilotId) never KO. Use everywhere we previously checked
// `cp.pilotStrain >= 5 + training + bonus`.
function pilotKoCheck(cp) {
  if (!cp || cp.isAi || !cp.pilotId) return false;
  const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
  const hpMax = cp.pilotHpMax || 0;
  const hp = hpMax - (cp.pilotHpDamage || 0);
  return hp <= pilotKoThreshold(pilot);
}
// ════════════════════════════════════════════════════════════════════
// §44 (Tom 2026-06-17): centralized save-resilience migration. Iters
// 1–31 added many new per-robot / per-cockpit / per-battle fields:
//   pilotHp{Max,Damage}, pilotTokens, pilotMental, pilotStrain,
//   _justTookReaction, _pendingFortQueue, retainedSharedFacings,
//   occupiedByGrappleId, ammoRemaining (per linkedParts), shieldsCurrent,
//   capacitorsRemaining, fuelCurrent, systemStrain, statusEffects,
//   actionBudget, gspdSpent, freeToggleIncidentals, facingDegrees,
//   altitude, inertia, aiPilotId, b.gameOver/winner/lossReason/loserSide,
//   b.passedThisRound, b.p1ForceName, b.p1Robots/p2Robots.
//
// Each in-flight render / action handler defends with `?? 0` or
// `|| []` at the read site, but a CHOKEPOINT migration on battle load
// is cheaper than re-auditing every read site after each iter — and it
// guarantees a uniform shape so future reads can drop the boilerplate.
//
// Called from:
//   - init() (silent, on every saved battle at boot)
//   - resume-battle handler (toast-free for additive fields, but the
//     legacy-pilot-HP migrate still toasts via migrateBattlePilotHp)
//   - import flow (after dbPut per imported battle)
//
// Idempotent: only adds missing fields with safe defaults; never
// overwrites existing data; never restructures. Returns the count of
// updates applied (0 = nothing to migrate; >0 = call dbPut afterward).
// ════════════════════════════════════════════════════════════════════
function migrateBattleSchema(b) {
  if (!b) return 0;
  let updates = 0;
  // Battle-root shape (two-forces, round, pass tracking, game-over).
  if (!Array.isArray(b.p1Robots)) { b.p1Robots = []; updates++; }
  if (!Array.isArray(b.p2Robots)) { b.p2Robots = []; updates++; }
  if (typeof b.round !== "number" || !isFinite(b.round)) { b.round = 1; updates++; }
  if (!b.passedThisRound || typeof b.passedThisRound !== "object") {
    b.passedThisRound = { P1: false, P2: false }; updates++;
  } else {
    if (typeof b.passedThisRound.P1 !== "boolean") { b.passedThisRound.P1 = false; updates++; }
    if (typeof b.passedThisRound.P2 !== "boolean") { b.passedThisRound.P2 = false; updates++; }
  }
  if (b.p1ForceName == null) { b.p1ForceName = "Your force"; updates++; }
  if (b.p2ForceName == null) { b.p2ForceName = "Opponent"; updates++; }
  // Repair half-set game-over state: gameOver=true but no winner or
  // winner refers to a side that isn't populated → clear the flag so
  // the game-over modal doesn't render a dangling "— WINS" banner.
  if (b.gameOver) {
    const winnerValid = b.winner === "P1" || b.winner === "P2";
    const sidePopulated = (side) => {
      const robots = side === "P1" ? b.p1Robots : b.p2Robots;
      return (robots || []).length > 0;
    };
    if (!winnerValid || !sidePopulated(b.winner)) {
      b.gameOver = false;
      delete b.winner;
      delete b.lossReason;
      delete b.loserSide;
      updates++;
    } else if (typeof b.lossReason !== "string") {
      b.lossReason = `All ${b.loserSide || (b.winner === "P1" ? "P2" : "P1")} Robots Shutdown`;
      updates++;
    }
  }
  // Per-robot shape on BOTH forces. Each field that some recent iter
  // started reading directly (without `?? 0`) gets a safe default.
  const allRobots = [...(b.p1Robots || []), ...(b.p2Robots || [])];
  for (const r of allRobots) {
    if (!r) continue;
    // Core identity. robotName + name both used in toasts/logs.
    if (r.robotName == null) { r.robotName = r.name || "Robot"; updates++; }
    if (r.name == null) { r.name = r.robotName || "Robot"; updates++; }
    if (typeof r.silhouette !== "number") { r.silhouette = 1; updates++; }
    if (typeof r.frameStrength !== "number") { r.frameStrength = 1; updates++; }
    if (typeof r.frameDurability !== "number") { r.frameDurability = 1; updates++; }
    if (typeof r.frameMaterial !== "number") { r.frameMaterial = 1; updates++; }
    // Resource pools. fuel/shields/strain/capacitors all need both the
    // max AND the current; a legacy save missing either renders NaN/NaN.
    if (typeof r.fuelMax !== "number") { r.fuelMax = 0; updates++; }
    if (typeof r.fuelCurrent !== "number") { r.fuelCurrent = r.fuelMax || 0; updates++; }
    if (typeof r.shieldsMax !== "number") { r.shieldsMax = 0; updates++; }
    if (typeof r.shieldsCurrent !== "number") { r.shieldsCurrent = r.shieldsMax || 0; updates++; }
    if (typeof r.systemStrain !== "number") { r.systemStrain = 0; updates++; }
    if (typeof r.systemStrainThreshold !== "number") { r.systemStrainThreshold = 0; updates++; }
    if (typeof r.capacitorsMax !== "number") { r.capacitorsMax = 0; updates++; }
    if (typeof r.capacitorsRemaining !== "number") { r.capacitorsRemaining = r.capacitorsMax || 0; updates++; }
    if (typeof r.boostPower !== "number") { r.boostPower = 0; updates++; }
    if (typeof r.robotWeight !== "number") { r.robotWeight = 0; updates++; }
    if (typeof r.groundSpeed !== "number") { r.groundSpeed = 0; updates++; }
    if (typeof r.maxLoad !== "number") { r.maxLoad = 0; updates++; }
    // Round-state per-robot (pilot tokens, action budget, gspd, facing).
    if (typeof r.pilotTokens !== "number") { r.pilotTokens = 0; updates++; }
    if (typeof r.pilotMental !== "number") { r.pilotMental = 4; updates++; }
    if (typeof r.gspdSpent !== "number") { r.gspdSpent = 0; updates++; }
    if (typeof r.freeToggleIncidentals !== "number") { r.freeToggleIncidentals = 0; updates++; }
    if (typeof r.facingDegrees !== "number") { r.facingDegrees = 0; updates++; }
    if (!r.actionBudget || typeof r.actionBudget !== "object") {
      r.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
      updates++;
    } else {
      if (typeof r.actionBudget.primaryUsed !== "number") { r.actionBudget.primaryUsed = 0; updates++; }
      if (typeof r.actionBudget.reactionsUsed !== "number") { r.actionBudget.reactionsUsed = 0; updates++; }
      if (typeof r.actionBudget.incidentalsUsed !== "number") { r.actionBudget.incidentalsUsed = 0; updates++; }
    }
    // Status effects + flight state (read by render + many handlers).
    if (!Array.isArray(r.statusEffects)) { r.statusEffects = []; updates++; }
    if (typeof r.altitude !== "number") { r.altitude = 0; updates++; }
    if (typeof r.inertia !== "number") { r.inertia = 0; updates++; }
    // Shutdown flags (set by emergency-shutdown path; legacy saves
    // pre-§35 don't have them — false is correct default).
    if (r.shutdown !== true) r.shutdown = !!r.shutdown;
    if (r.shutdownPending !== true) r.shutdownPending = !!r.shutdownPending;
    // §43 Fortitude queue. Always present as [], even if no checks ever
    // happened on this robot.
    if (!Array.isArray(r._pendingFortQueue)) { r._pendingFortQueue = []; updates++; }
    // Components shape. Skip if missing entirely — that's a corrupt
    // save we can't repair (no original schematic to re-snapshot from).
    if (Array.isArray(r.components)) {
      for (const c of r.components) {
        if (!c) continue;
        if (typeof c.hpMax !== "number") { c.hpMax = 0; updates++; }
        if (typeof c.hpCurrent !== "number") { c.hpCurrent = c.hpMax || 0; updates++; }
        if (typeof c.isDestroyed !== "boolean") { c.isDestroyed = !!c.isDestroyed; updates++; }
        if (!Array.isArray(c.modules)) { c.modules = []; updates++; }
        if (!Array.isArray(c.equipment)) { c.equipment = []; updates++; }
        for (const m of c.modules) {
          // Iter 19: aiPilotId on motion_cockpit / open_air_cockpit /
          // ai_core. Optional — pre-iter-19 saves have undefined.
          if (m && !("aiPilotId" in m)) { m.aiPilotId = null; updates++; }
          // occupiedByGrappleId set on Manipulator modules during a
          // grapple. Pre-grapple saves don't have it.
          if (m && m.moduleId === "manipulator" && !("occupiedByGrappleId" in m)) {
            m.occupiedByGrappleId = null; updates++;
          }
        }
        // Iter 22 linked-composite snapshot: per-part ammoRemaining
        // initialized to maxAmmo when missing. (linkedParts on the
        // equipment snapshot, not the library row.)
        for (const e of c.equipment) {
          if (e && e.isLinked && Array.isArray(e.linkedParts)) {
            for (const p of e.linkedParts) {
              if (p && typeof p.ammoRemaining !== "number") {
                p.ammoRemaining = p.maxAmmo || 0;
                updates++;
              }
            }
          }
        }
      }
    }
    // Cockpit pilot per-pilot state. pilotHp{Max,Damage} handled by
    // migrateBattlePilotHp (toasts). Other fields handled silently here.
    if (Array.isArray(r.cockpitPilots)) {
      for (const cp of r.cockpitPilots) {
        if (!cp) continue;
        if (typeof cp.pilotStrain !== "number") { cp.pilotStrain = 0; updates++; }
        if (typeof cp._justTookReaction !== "boolean") {
          cp._justTookReaction = false; updates++;
        }
        // isKO normalize. Pre-§4 saves don't have it.
        if (typeof cp.isKO !== "boolean") { cp.isKO = !!cp.isKO; updates++; }
      }
    }
    // §56 (Tom 2026-06-17): clear legacy Quick Troublemaker per-use flag.
    // Talent itself is removed from TALENTS + UI; the state field has no
    // remaining consumer so we drop it on load.
    if ("quickTroublemakerUsed" in r) { delete r.quickTroublemakerUsed; updates++; }
    // §75 (Tom 2026-06-17): scrub removed "leg_attack_system" module from
    // any installed component.modules[] lists on battle-snapshot robots.
    // Module was webapp-only, never wired to melee. BP/Weight is NOT
    // auto-refunded; force editor recomputes on next pilot edit (matches
    // §56 / §47 iter 26). Idempotent.
    if (Array.isArray(r.components)) {
      let legAttackScrubs = 0;
      for (const c of r.components) {
        if (!c || !Array.isArray(c.modules)) continue;
        const before = c.modules.length;
        c.modules = c.modules.filter(m => m && m.moduleId !== "leg_attack_system");
        if (c.modules.length !== before) {
          legAttackScrubs += (before - c.modules.length);
          updates++;
        }
      }
      if (legAttackScrubs > 0) {
        console.info(`[migrate] §75 scrubbed "leg_attack_system" from ${legAttackScrubs} component module slot(s) on robot ${r.robotName || r.name || "?"}`);
      }
    }
    // §57 (Tom 2026-06-17, Ch 11 L33): once-per-game Sharpshooter flag.
    // Default false on legacy saves so the talent is still available
    // on existing battles. Idempotent — only counts when missing.
    if (typeof r._sharpshooterUsed !== "boolean") { r._sharpshooterUsed = false; updates++; }
    // §76 (Ch 11 L41): Overclock is once-per-game per robot. Initialize the
    // flag so legacy saves correctly gate the talent on resume.
    if (typeof r.overclockUsed !== "boolean") { r.overclockUsed = false; updates++; }
  }
  // §56 (Tom 2026-06-17): scrub the removed "Quick Troublemaker" talent
  // from state.pilots[].talents arrays. Pilot defs live globally (not on
  // the battle row), so we walk them here. Idempotent — only counts an
  // update if a removal actually fires. BP is NOT auto-refunded; let the
  // force editor recompute on next pilot edit (matches §47 / iter 26).
  if (typeof state !== "undefined" && Array.isArray(state.pilots)) {
    let qtmScrubs = 0;
    for (const p of state.pilots) {
      if (!p || !Array.isArray(p.talents)) continue;
      const before = p.talents.length;
      p.talents = p.talents.filter(t => t !== "Quick Troublemaker");
      if (p.talents.length !== before) {
        qtmScrubs += (before - p.talents.length);
        updates++;
      }
    }
    if (qtmScrubs > 0) {
      console.info(`[migrate] §56 scrubbed "Quick Troublemaker" from ${qtmScrubs} pilot talent slot(s)`);
    }
  }
  // Orphan-ID repair: clear b.activePriorityRobotId if the referenced
  // robot is gone. (Lives on `state`, not `b`, but some legacy saves
  // may have leaked it onto the battle row; clear defensively.)
  if (b.activePriorityRobotId != null) {
    const alive = allRobots.find(r => r && r.robotId === b.activePriorityRobotId);
    if (!alive) { delete b.activePriorityRobotId; updates++; }
  }
  if (updates > 0) {
    console.info(`[migrate] battle ${b.id}: applied ${updates} schema updates`);
  }
  // §65 (Audit 10, Ch 8 L49 + Ch 9 L56): pre-§65, BOOST added raw
  // hDist (SU) to Inertia, not hDist÷Sil, and fired on ground too. So
  // any battle with surviving Inertia values may be ~4× inflated.
  // We don't retroactively scrub (Tom can manually zero Inertia on
  // affected Robots, or revert by reloading a pre-§65 backup).
  if (updates > 0) {
    console.info(`[migrate] §65: Inertia values from before §65 may be inflated (raw-SU instead of per-Sil, and grounded Boost gained Inertia). Tom can manually zero affected Robots if needed.`);
  }
  // §66 (Audit 11, Ch 9 L66-74): altitude decay after each Primary /
  // Reaction action is now active. Pre-§66 battles' flying robots
  // never sank between actions; from now on every action costs
  // (Sil − Glide) Altitude (or full Sil if Inertia 0). No retroactive
  // scrub — existing flying robots will start decaying on their next
  // action.
  if (updates > 0) {
    console.info(`[migrate] §66: Altitude decay after each Primary/Reaction action is now active. Pre-§66 flying robots will start sinking on their next action.`);
  }
  return updates;
}

// §4 migration: legacy saved battles predate pilotHp tracking. On
// battle load, backfill pilotHpMax (computed from Physical + Tank) and
// pilotHpDamage (0 — legacy in-flight damage treated as cleared). Once
// any cockpit pilot in the battle is migrated, surface a one-time
// toast. Idempotent: skips cockpits that already have a finite
// pilotHpMax (>0 or explicitly recorded for unassigned slots).
// init() runs a silent variant of this so renders work the first time;
// the toast here fires on resume-battle (either because init flagged
// _legacyHpMigrated OR because resume is being called on a battle that
// init didn't migrate — e.g. just-imported via the import flow).
function migrateBattlePilotHp(b) {
  if (!b) return;
  let migrated = 0;
  const allRobots = [...(b.p1Robots || []), ...(b.p2Robots || [])];
  for (const robot of allRobots) {
    for (const cp of (robot.cockpitPilots || [])) {
      // Already initialized — skip.
      if (typeof cp.pilotHpMax === "number" && typeof cp.pilotHpDamage === "number") continue;
      const pilot = cp.pilotId != null ? (state.pilots || []).find(p => p.id === cp.pilotId) : null;
      const hasTank = pilot ? (pilot.talents || []).includes("Tank") : false;
      cp.pilotHpMax = pilot ? (hasTank ? 3 : 2) * (pilot.physical || 1) : 0;
      cp.pilotHpDamage = 0;
      migrated++;
    }
  }
  // Toast on first resume after init's silent migration OR on a fresh
  // migration here. Either way, clear the flag so it never re-fires.
  if (migrated > 0 || b._legacyHpMigrated) {
    showToast("Pilot HP initialized from legacy save.");
    delete b._legacyHpMigrated;
    dbPut("battles", b);
  }
}

// ════════════════════════════════════════════════════════════════════
// §43 (Tom 2026-06-17): automated Fortitude flows for Falling Damage
// (rulebook L10590) + Inertia-Loss Landing (rulebook L10573). Both
// land on cp.pilotHpDamage via resolveFortitudeCheck(cp, threshold).
//
// Trigger contract:
//   - triggerInertiaLossLanding(r, lostInertia): fires FIRST on a
//     landing with Inertia > 0. Sets r.inertia = 0 and enqueues one
//     fortitude check per conscious pilot vs lostInertia.
//   - triggerFallingDamage(r, drop): fires when altitude decrease > 1.
//     Enqueues a single Physical "stand" check (player picks pilot),
//     then per-pilot fortitude checks. Pass-branch threshold = drop;
//     fail-branch threshold = drop + Sil (and robot goes DOWN).
//
// Both APPEND to r._pendingFortQueue (FIFO) and open the
// fortitude-sequence modal if not already open. Order matters:
// inertia-loss BEFORE falling per rulebook L10573 ("Inertia is
// immediately reduced to 0" precedes the falling-damage flow).
//
// Cool Head Under Pressure (§35 / iter 18): when a Fortitude check
// resolves with 0 damage on a pilot who has the talent AND just took a
// Reaction this round, triggerCoolHead fires the −1 token effect.
// resolveFortitudeCheck calls it on every Fortitude result.
// ════════════════════════════════════════════════════════════════════

// Resolve a Fortitude Check result. dice = number of d6 rolled,
// hits = count at threshold+, threshold = the Fortitude value
// (typically = damage roll). Damage = max(0, threshold − hits).
// Mutates cp.pilotHpDamage, runs pilotKoCheck, fires triggerCoolHead
// on 0-damage outcomes. Returns { damage, koTriggered }.
function resolveFortitudeCheck(cp, threshold, source) {
  if (!cp) return { damage: 0, koTriggered: false };
  const damage = Math.max(0, Number(threshold || 0) - Number(source?.hits || 0));
  if (damage > 0) {
    cp.pilotHpDamage = (cp.pilotHpDamage || 0) + damage;
  }
  let koTriggered = false;
  if (pilotKoCheck(cp) && !cp.isKO) {
    cp.isKO = true;
    koTriggered = true;
    // §71 (Tom 2026-06-17): pilot KO'd by Fortitude damage —
    // scrub their REMAINING queue items so the modal doesn't
    // re-render for an already-KO'd pilot. Mirrors iter 34 §44
    // cockpit-host destruction scrub at ~line 6249. cp arrives
    // without its owning robot — walk activeBattle to find the
    // queue carrying this slotKey. NOTE: we leave queue[0]
    // intact because that's the item currently being resolved
    // (this call site is mid-roll); fort-seq-next will dequeue
    // it on CONTINUE. Filtering it out would cause CONTINUE to
    // skip over the next survivor.
    if (state.activeBattle) {
      const slotKey = _cpSlotKey(cp);
      let dropped = 0;
      const allRobots = [
        ...(state.activeBattle.p1Robots || []),
        ...(state.activeBattle.p2Robots || []),
      ];
      for (const r of allRobots) {
        if (!Array.isArray(r._pendingFortQueue) || r._pendingFortQueue.length <= 1) continue;
        const beforeTail = r._pendingFortQueue.length - 1;
        const head = r._pendingFortQueue[0];
        const tail = r._pendingFortQueue.slice(1).filter(item =>
          !item || item.cpSlot !== slotKey
        );
        r._pendingFortQueue = [head, ...tail];
        dropped += (beforeTail - tail.length);
      }
      if (dropped > 0) {
        recordUndo(`${_pilotName(cp)} KO'd mid-queue — ${dropped} pending Fortitude${dropped === 1 ? "" : "s"} dropped`);
      }
    }
  }
  // §35 Cool Head Under Pressure: when this Fortitude result took no
  // damage AND the pilot just took a Reaction, drop one Action Token.
  // The helper is a no-op on damage > 0 OR if the talent / Reaction
  // gate fails — safe to call unconditionally on every Fortitude
  // resolution. (Iter 18.)
  if (damage === 0) {
    triggerCoolHead(cp, { damageTaken: 0 });
  }
  if (state.activeBattle) dbPut("battles", state.activeBattle);
  return { damage, koTriggered };
}

// Identify conscious cockpit pilots eligible to roll a Fortitude
// (excluded: KO'd, AI cores with no human, unassigned slots).
function _consciousCockpitPilots(r) {
  return (r?.cockpitPilots || []).filter(cp =>
    !cp.isAi && !cp.isKO && cp.pilotId
  );
}
function _cpSlotKey(cp) {
  return `${cp.componentId}:${cp.moduleIndex}:${cp.slotIndex}`;
}
function _cpBySlotKey(r, slotKey) {
  return (r?.cockpitPilots || []).find(c => _cpSlotKey(c) === slotKey) || null;
}
function _pilotName(cp) {
  const p = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
  return p?.name || "(unassigned)";
}

// Enqueue a Fortitude / Physical-stand item on the robot's pending
// queue. Modal opening is DEFERRED via setTimeout so the trigger
// site's surrounding sync stack (resolve-action's closeModal, etc.)
// finishes first — otherwise pushModal here would be wiped by the
// trailing closeModal(). The queue is persisted on the robot so a
// page-reload mid-fall doesn't lose pending checks.
function _enqueueFortItem(r, item) {
  r._pendingFortQueue = (r._pendingFortQueue || []).concat([item]);
  if (state.activeBattle) dbPut("battles", state.activeBattle);
  // Defer modal open to after the current sync handler stack so any
  // trailing closeModal() in resolve-action runs first. If the modal
  // is already open on this robot, just rerender.
  if (state.modal?.kind === "fortitude-sequence" &&
      state.modal?.data?.robotId === r.robotId) {
    render();
    return;
  }
  const rid = r.robotId;
  setTimeout(() => {
    const b = state.activeBattle;
    if (!b) return;
    const robot = findBattleRobot(b, rid);
    if (!robot || !(robot._pendingFortQueue || []).length) return;
    // Don't stomp on an in-progress non-fortitude modal — defer
    // further if the player opened something else. (Rare; the
    // resolve-action flow closes its modal before this fires.)
    if (state.modal && state.modal.kind !== "fortitude-sequence") return;
    pushModal("fortitude-sequence", { robotId: rid, lastRoll: null });
  }, 0);
}

// §50 / Ch 6 L29 (Tom 2026-06-17): Inertia Impact — "If Inertia was used
// in damage and it hits a Component containing a Pilot, that Pilot makes
// a Fortitude Check against the Inertia score." Rulebook also: "If the
// hit destroys a Component and damage overflows to a Component
// containing a Pilot, that Pilot makes the Fortitude Check against the
// full Inertia score, regardless of how much damage actually carried
// over." This helper wraps applyDamage / applyBlockedDamage / scatter
// and enqueues per-pilot Fortitude items for any cockpit-bearing
// Component that the inertia hit lands on — either directly or via
// overflow.
//
// `target` is the Robot taking the hit. `cid` is the FINAL Component the
// damage applies to (in Block redirect, this is the blocker's cid; in
// Scatter, the helper is called once per spread iteration). `inertia` is
// the attacker's Inertia score at the moment of attack — passed through
// because Component-of-Pilot only matters AT hit time and the modal
// caller may have a different inertia by the time Fortitude resolves.
//
// MULTI-PILOT: enumerates every conscious pilot whose cp.componentId
// matches a Component containing a cockpit module that took inertia
// damage. Matches the Neural Link multi-pilot iteration pattern.
//
// OVERFLOW: applyDamage's destruction path routes overflow up the parent
// chain (§15.B) or to the original target (§15.C Block). The overflow
// also fires this Fortitude rule if it lands on a cockpit-bearing
// Component. The helper detects this by snapshotting the set of
// destroyed Components BEFORE applyDamage and comparing AFTER — any
// newly-destroyed cockpit Component whose pilots survive (still in
// cockpitPilots, not KO) is by §44 already KO'd by destroyComponent
// step (6), so those pilots don't roll. But overflow can also land on
// a SECOND cockpit Component (the parent in the build chain). That
// case is captured by post-pass enumeration: any Component containing
// a cockpit AND a non-KO pilot is eligible.
//
// Returns nothing; caller does dbPut via applyDamage's internal flow.
function _componentHasCockpit(c) {
  if (!c || c.isDestroyed) return false;
  const COCKPIT_MODULE_IDS = new Set([
    "standard_cockpit", "open_air_cockpit", "motion_cockpit", "ai_core",
  ]);
  return (c.modules || []).some(m => COCKPIT_MODULE_IDS.has(m.moduleId));
}
function _enqueueInertiaImpactForComponent(r, cid, inertia) {
  if (!r || cid == null || !inertia || inertia <= 0) return 0;
  const c = (r.components || []).find(x => (x.componentId ?? x.tempId) === cid);
  if (!c || !_componentHasCockpit(c)) return 0;
  // Pilots whose cp.componentId matches this cockpit-bearing Component
  // AND who are conscious + human (AI cores can't roll Fortitude).
  const eligible = (r.cockpitPilots || []).filter(cp =>
    cp.componentId === cid && !cp.isAi && !cp.isKO && cp.pilotId
  );
  if (eligible.length === 0) return 0;
  for (const cp of eligible) {
    _enqueueFortItem(r, {
      phase: "fortitude",
      threshold: Number(inertia),
      cpSlot: _cpSlotKey(cp),
      source: "inertia-impact-melee",
    });
  }
  return eligible.length;
}
// Apply inertia-bonus melee/charge damage AND fire the §50 / Ch 6 L29
// post-hit Fortitude for any cockpit pilot whose Component took the
// hit (directly or via overflow). Accepts the same shape as applyDamage
// plus an `inertia` field for the attacker's Inertia score at hit time.
// Routes through applyBlockedDamage when opts.viaBlock is on (Block
// redirect: blocker's pilots roll the Fortitude per §15.C, since the
// inertia hit landed on the blocker's component).
function applyInertiaMeleeDamage(rid, cid, amount, type, inertia, opts = {}) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return;
  const inr = Number(inertia || 0);
  // Snapshot the set of cockpit-bearing Components BEFORE damage so we
  // can also enqueue Fortitude on any cockpit Component that the
  // overflow chain lands on (§50 rulebook L29 — "if the hit destroys a
  // Component and damage overflows to a Component containing a Pilot,
  // that Pilot makes the Fortitude Check against the full Inertia
  // score, regardless of how much damage actually carried over").
  const preCockpitArmor = new Map();
  for (const c of (r.components || [])) {
    if (_componentHasCockpit(c)) {
      preCockpitArmor.set(c.componentId ?? c.tempId, {
        armor: c.hpCurrent || 0,
        destroyed: !!c.isDestroyed,
      });
    }
  }
  // Apply damage via the appropriate pipeline (single / blocked).
  // Iter 52 (Tom 2026-06-17): forward opts.bypassArmor to BOTH branches so
  // Penetrating + Inertia (Melee) bypass actually lands on the hit
  // Component's armor. NOTE: WEAPON_KEYWORD_GATES marks Penetrating as
  // Ranged-only, so this combo is rule-illegal in tournament play, but the
  // helper stays general for table-house-rule cases (and matches the
  // applyScatterDamage / applyBlockedDamage forwarding pattern).
  const bypassArmor = Number(opts.bypassArmor || 0);
  const passOpts = bypassArmor > 0 ? { bypassArmor } : {};
  if (opts.viaBlock && opts.originalTargetCid != null && opts.originalTargetCid !== cid) {
    applyBlockedDamage(rid, opts.originalTargetCid, cid, amount, type, passOpts);
  } else {
    applyDamage(rid, cid, amount, type, passOpts);
  }
  if (inr <= 0) return; // no Inertia → no §50 trigger
  // Re-fetch — applyDamage may have mutated robot state.
  const rPost = findBattleRobot(state.activeBattle, rid);
  if (!rPost) return;
  // Enumerate every cockpit-bearing Component whose armor went DOWN OR
  // which was newly destroyed. Each such Component had the inertia hit
  // land on it (direct + any overflow path). The §44 cockpit-host
  // destruction handler already KO'd pilots whose host was destroyed,
  // so _enqueueInertiaImpactForComponent's eligibility filter naturally
  // skips them — surviving cockpit Components whose pilots are still
  // conscious are the ones that roll.
  let totalEnqueued = 0;
  const hitCockpitCids = [];
  for (const c of (rPost.components || [])) {
    const cid2 = c.componentId ?? c.tempId;
    const pre = preCockpitArmor.get(cid2);
    if (!pre) continue; // not a cockpit Component pre-hit
    const armorDropped = (c.hpCurrent || 0) < pre.armor;
    const newlyDestroyed = !pre.destroyed && c.isDestroyed;
    if (!armorDropped && !newlyDestroyed) continue;
    const n = _enqueueInertiaImpactForComponent(rPost, cid2, inr);
    if (n > 0) {
      totalEnqueued += n;
      hitCockpitCids.push(cid2);
    }
  }
  if (totalEnqueued > 0) {
    const compNames = hitCockpitCids.map(cid2 => {
      const c = (rPost.components || []).find(x => (x.componentId ?? x.tempId) === cid2);
      return escapeHtml(c?.name || c?.definition || "Cockpit");
    }).join(", ");
    showToast(`⚡ INERTIA IMPACT — Pilot Fortitude vs ${inr} enqueued (${totalEnqueued} pilot${totalEnqueued === 1 ? "" : "s"} in ${compNames}). §50 / Ch 6 L29`, 3600);
    // §50 Inertia Impact log entry — surface the Fortitude enqueue so
    // a player auditing the log knows a cockpit pilot owes a
    // Fortitude check vs the attacker's Inertia score. Summary only;
    // the actual roll resolves via the queued Fortitude modal which
    // writes its own undo row when the pilot pass/fails.
    recordUndo(`Inertia ${inr} hit cockpit on ${escapeHtml(rPost.name || "Robot")} — ${totalEnqueued} pilot${totalEnqueued === 1 ? "" : "s"} Fortitude vs ${inr}`);
  }
}

// Falling Damage handler — rulebook L10590. Drop > 1 → Physical
// "stand" check vs drop. Pass = Robot stands; each conscious pilot
// rolls Fortitude vs drop. Fail = Robot goes DOWN; each conscious
// pilot rolls Fortitude vs (drop + Sil). Pilot picker happens at
// modal-time so the player chooses whose Physical roll is the stand.
function triggerFallingDamage(r, drop) {
  const decrease = Number(drop || 0);
  // Rulebook gate: decrease > 1 (a 1-pt drop is "step down", no roll).
  if (decrease <= 1) return;
  const conscious = _consciousCockpitPilots(r);
  if (conscious.length === 0) {
    // No conscious pilot to roll — surface a toast and skip. AI-only
    // robots still take the fall narratively but there's no Pilot HP
    // model to damage. Robot DOWN stays uncontested.
    r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING" && s !== "FLYING"), "DOWN"];
    showToast(`${r.robotName || r.name || "Robot"} fell ${decrease} (no conscious pilot) — DOWN. §43`, 3600);
    return;
  }
  // Single Physical stand check + per-pilot Fortitudes.
  const sil = Number(r.silhouette || 0);
  _enqueueFortItem(r, {
    phase: "pick-stand",
    threshold: decrease,
    decrease,
    sil,
    source: "falling-physical",
  });
  showToast(`⚠ FALLING DAMAGE — ${r.robotName || r.name || "Robot"} drops ${decrease}. Physical stand check + Fortitude. §43 / L10590`, 3600);
}

// Inertia-Loss Landing — rulebook L10573. A flying robot landing
// (altitude → 0) with Inertia > 0 immediately loses ALL inertia and
// every conscious pilot rolls Fortitude vs the lost amount. Fires
// BEFORE falling-damage handler so the queue order matches the
// rulebook's "immediately" wording.
function triggerInertiaLossLanding(r, lostInertia) {
  const lost = Number(lostInertia || 0);
  if (lost <= 0) return;
  // §43 the rulebook says "Inertia is immediately reduced to 0" — caller
  // may have already zeroed it; defensively zero again here.
  r.inertia = 0;
  const conscious = _consciousCockpitPilots(r);
  if (conscious.length === 0) {
    showToast(`${r.robotName || r.name || "Robot"} landed — Inertia 0 (was ${lost}). No conscious pilot for Fortitude. §43 / L10573`, 3200);
    return;
  }
  for (const cp of conscious) {
    _enqueueFortItem(r, {
      phase: "fortitude",
      threshold: lost,
      cpSlot: _cpSlotKey(cp),
      source: "inertia-loss-landing",
    });
  }
  showToast(`⚡ INERTIA-LOSS LANDING — ${r.robotName || r.name || "Robot"} lost ${lost} Inertia. Pilot Fortitude vs ${lost}. §43 / L10573`, 3600);
}

// Central landing-transition handler. Called at every altitude
// mutation site that COULD bring altitude to 0. Compares old vs new
// altitude (caller snapshots oldAltitude before mutating) and fires:
//   1. Inertia-loss landing if oldInertia > 0 AND new altitude is 0.
//   2. Falling damage if drop > 1 AND new altitude is 0.
// Inertia-loss queues first; falling queues second. The sequence
// modal renders them in queue order.
function handleLandingTransition(r, oldAltitude, oldInertia) {
  const newAlt = r.altitude ?? 0;
  const oldAlt = Number(oldAltitude || 0);
  if (newAlt !== 0 || oldAlt <= 0) return;
  const drop = oldAlt - newAlt;
  if (drop <= 0) return;
  // §43 inertia-loss FIRST per rulebook L10573 ("immediately").
  if (Number(oldInertia || 0) > 0) {
    triggerInertiaLossLanding(r, Number(oldInertia));
  }
  // §43 falling-damage gate: decrease > 1.
  if (drop > 1) {
    triggerFallingDamage(r, drop);
  }
}

// ─── Fortitude-sequence modal ───────────────────────────────────────
// Walks r._pendingFortQueue head-first. Modal data:
//   { robotId, lastRoll, _picking?: bool }
// The queue head determines what's shown:
//   - phase=pick-stand: pilot picker for Physical-stand check.
//   - phase=physical: roll Physical dice (n = picked pilot's Physical
//     stat + any auto-applicable bonuses), apply pass/fail.
//   - phase=fortitude: roll Fortitude dice (n = cp's pilot.physical)
//     vs threshold, apply damage.
function renderFortitudeSequence(data) {
  const r = findBattleRobot(state.activeBattle, data?.robotId);
  if (!r) return "<p>?</p>";
  const queue = r._pendingFortQueue || [];
  if (queue.length === 0) {
    return `
      <h2>RESOLUTION COMPLETE</h2>
      <p class="meta">All pending Fortitude / Physical checks for ${escapeHtml(r.robotName || r.name || "Robot")} resolved.</p>
      <div class="actions"><button class="btn amber" data-act="fort-seq-done">DONE</button></div>
    `;
  }
  const head = queue[0];
  const lastRoll = data?.lastRoll;
  const dieChip = (v, threshold) => {
    const hit = v >= threshold;
    return `<span class="chip ${hit ? "amber" : "muted"}" style="font-size:14px; padding:6px 10px; margin-right:4px">${v}</span>`;
  };
  if (head.phase === "pick-stand") {
    const conscious = _consciousCockpitPilots(r);
    return `
      <h2>FALLING — STAND CHECK</h2>
      <p class="meta">${escapeHtml(r.robotName || r.name || "Robot")} dropped <strong>${head.decrease}</strong> Altitude. <strong>One</strong> conscious Pilot rolls a Physical check vs <strong>${head.threshold}+</strong> to land standing. Pass = Robot stands; each Pilot rolls Fortitude vs ${head.decrease}. Fail = Robot DOWN; each Pilot rolls Fortitude vs ${head.decrease + head.sil}.<br/>§43 / L10590</p>
      <div class="row-gap" style="flex-wrap:wrap;gap:4px;margin-top:4px">
        ${rulePeek("fortitude", { label: "📖 FORTITUDE" })}
        ${rulePeek("inertia-overview", { label: "📖 LANDING" })}
      </div>
      <div class="label-small label-cyan" style="margin-top:10px">PICK STAND-ROLLING PILOT</div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:6px">
        ${conscious.map(cp => {
          const p = (state.pilots || []).find(x => x.id === cp.pilotId);
          return `<button class="action-btn" data-act="fort-seq-pick-stand" data-slot="${_cpSlotKey(cp)}">
            <span class="nm">${escapeHtml(p?.name || "Pilot")}</span>
            <span class="hint">PHYSICAL ${p?.physical || 0} d6 vs ${head.threshold}+</span>
          </button>`;
        }).join("")}
      </div>
      <div class="actions"><button class="btn ghost" data-act="fort-seq-skip">SKIP (manual)</button></div>
    `;
  }
  if (head.phase === "physical") {
    const cp = _cpBySlotKey(r, head.cpSlot);
    // §71 (Tom 2026-06-17): defensive — if cp is missing (stale slot,
    // save-load drift) OR cp is already KO'd (scrub source other than
    // resolveFortitudeCheck didn't run), drop this item and re-render
    // rather than rolling for an already-incapacitated pilot.
    // Belt-and-suspenders against any other source of stale items.
    if (!cp || cp.isKO) {
      console.warn("Stale Fortitude queue item (physical), scrubbing", head);
      r._pendingFortQueue = queue.slice(1);
      if (state.activeBattle) dbPut("battles", state.activeBattle);
      setTimeout(render, 0);
      return `<p class="meta">Skipping stale queue item…</p>`;
    }
    const pilot = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
    const pool = pilot?.physical || 0;
    const threshold = 5;
    const hitTarget = head.threshold;
    return `
      <h2>FALLING — PHYSICAL CHECK</h2>
      <p class="meta">${escapeHtml(_pilotName(cp))} rolls <strong>${pool} d6 vs ${threshold}+</strong>, needs <strong>${hitTarget} hit${hitTarget === 1 ? "" : "s"}</strong> to land Standing. §43 / L10590</p>
      <div class="row-gap" style="flex-wrap:wrap;gap:4px;margin-top:4px">
        ${rulePeek("fortitude", { label: "📖 FORTITUDE" })}
        ${rulePeek("inertia-overview", { label: "📖 LANDING" })}
      </div>
      ${lastRoll ? `
        <div style="margin-top:12px">
          <div class="label-small">LAST ROLL</div>
          <div style="margin-top:6px">${lastRoll.dice.map(v => dieChip(v, threshold)).join("")}</div>
          <div style="margin-top:10px; font-size:18px">
            ${lastRoll.hits >= hitTarget
              ? `<span class="label-cyan">✓ PASS · ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} ≥ ${hitTarget} — Robot lands STANDING.</span>`
              : `<span class="label-red">✗ FAIL · ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} < ${hitTarget} — Robot goes DOWN.</span>`}
          </div>
        </div>
      ` : ""}
      <div class="actions" style="margin-top:12px">
        ${lastRoll
          ? `<button class="btn amber" data-act="fort-seq-apply-physical">APPLY · CONTINUE TO FORTITUDE</button>`
          : `<button class="btn ghost" data-act="fort-seq-skip">SKIP (manual)</button>
             <button class="btn amber" data-act="fort-seq-roll-physical">ROLL ${pool} D6 VS ${threshold}+</button>`}
      </div>
    `;
  }
  if (head.phase === "fortitude") {
    const cp = _cpBySlotKey(r, head.cpSlot);
    // §71 (Tom 2026-06-17): defensive — stale cpSlot (pilot KO'd elsewhere
    // mid-queue, host destroyed without §44 scrub running, save-load
    // drift) OR cp is already KO'd. Drop and re-render rather than render
    // a modal for a non-existent / incapacitated pilot.
    if (!cp || cp.isKO) {
      console.warn("Stale Fortitude queue item (fortitude), scrubbing", head);
      r._pendingFortQueue = queue.slice(1);
      if (state.activeBattle) dbPut("battles", state.activeBattle);
      setTimeout(render, 0);
      return `<p class="meta">Skipping stale queue item…</p>`;
    }
    const pilot = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
    const basePool = pilot?.physical || 0;
    // §36 G-Adapted (Tom 2026-06-17): +4 dice on Fortitude vs Inertia-loss
    // landing (and reserved off-Vector source). Auto-applies — matches
    // the roller chip semantics but for the automated fortitude queue.
    const gAdaptedBonus = (pilot && pilotHasGAdapted(pilot.id) && gAdaptedAppliesToSource(head.source)) ? 4 : 0;
    const pool = basePool + gAdaptedBonus;
    const threshold = 5;
    const fortTarget = head.threshold;
    const sourceLabel = head.source === "inertia-loss-landing" ? "INERTIA-LOSS LANDING"
                      : head.source === "falling-fortitude-pass" ? "FALLING (stood)"
                      : head.source === "falling-fortitude-fail" ? "FALLING (down)"
                      : head.source === "neural-link" ? "NEURAL LINK"
                      : head.source === "off-vector-fortitude" ? "OFF-VECTOR FORTITUDE"
                      : head.source === "inertia-impact-melee" ? "INERTIA IMPACT (MELEE)"
                      : "FORTITUDE";
    const rulebookCite = head.source === "inertia-loss-landing" ? "§43 / L10573"
                       : head.source === "neural-link" ? "Ch 11 Neural Link"
                       : head.source === "off-vector-fortitude" ? "Ch 9 Turning in Flight / L11185"
                       : head.source === "inertia-impact-melee" ? "§50 / Ch 6 L29"
                       : "§43 / L10590";
    // Iter 36 — peek-chip set tied to the Fortitude source. Each source
    // gets the canonical Fortitude ref + a source-specific ref (Inertia
    // overview for landing/inertia-loss, Boost for off-Vector, Inertia
    // overview for melee-inertia post-hit prompts).
    const _fortPeekRef =
      head.source === "inertia-loss-landing" || head.source === "falling-fortitude-pass" || head.source === "falling-fortitude-fail"
        ? "inertia-overview"
        : head.source === "off-vector-fortitude"
        ? "boost"
        : head.source === "neural-link"
        ? null
        : head.source === "inertia-impact-melee"
        ? "inertia-impact-melee"
        : "inertia-overview";
    return `
      <h2>${sourceLabel} — FORTITUDE</h2>
      <p class="meta">${escapeHtml(_pilotName(cp))} rolls <strong>${pool} d6 vs ${threshold}+</strong> against <strong>${fortTarget}</strong>. Damage = max(0, ${fortTarget} − hits). ${rulebookCite}${gAdaptedBonus > 0 ? ` <span class="chip amber" style="margin-left:6px">+${gAdaptedBonus} G-ADAPTED</span>` : ""}</p>
      <div class="row-gap" style="flex-wrap:wrap;gap:4px;margin-top:4px">
        ${rulePeek("fortitude", { label: "📖 FORTITUDE" })}
        ${_fortPeekRef ? rulePeek(_fortPeekRef, { label: "📖 SOURCE" }) : ""}
      </div>
      ${lastRoll ? `
        <div style="margin-top:12px">
          <div class="label-small">LAST ROLL</div>
          <div style="margin-top:6px">${lastRoll.dice.map(v => dieChip(v, threshold)).join("")}</div>
          <div style="margin-top:10px; font-size:18px">
            ${lastRoll.damage === 0
              ? `<span class="label-cyan">✓ ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} — NO DAMAGE.</span>`
              : `<span class="label-red">✗ ${lastRoll.hits} hit${lastRoll.hits === 1 ? "" : "s"} — ${lastRoll.damage} HP damage to ${escapeHtml(_pilotName(cp))}.${lastRoll.koTriggered ? " INCAPACITATED." : ""}</span>`}
          </div>
          ${lastRoll.damage === 0 && pilot && (pilot.talents || []).includes("Cool Head Under Pressure") && cp._justTookReaction
            ? `<p class="label-small label-cyan" style="margin-top:6px">⚙ Cool Head Under Pressure check — −1 Action Token if just-took-Reaction (auto-applied).</p>`
            : ""}
        </div>
      ` : ""}
      <div class="actions" style="margin-top:12px">
        ${lastRoll
          ? `<button class="btn amber" data-act="fort-seq-next">CONTINUE</button>`
          : `<button class="btn ghost" data-act="fort-seq-skip">SKIP (manual)</button>
             <button class="btn amber" data-act="fort-seq-roll-fortitude">ROLL ${pool} D6 VS ${threshold}+</button>`}
      </div>
      ${queue.length > 1 ? `<div class="meta" style="font-size:11px; text-align:center; margin-top:8px; color:var(--on-surface-muted)">${queue.length - 1} more check${queue.length - 1 === 1 ? "" : "s"} pending</div>` : ""}
    `;
  }
  return `<p>Unknown phase: ${escapeHtml(head.phase)}</p>
    <div class="actions"><button class="btn ghost" data-act="fort-seq-skip">SKIP</button></div>`;
}

// Pilot-pick for the stand check: replace the head pick-stand item
// with a physical-roll item, keep the per-pilot fortitude follow-ups
// to be enqueued after the physical resolves.
handlers["fort-seq-pick-stand"] = ({ slot }) => {
  const d = state.modal?.data;
  const r = d ? findBattleRobot(state.activeBattle, d.robotId) : null;
  if (!r) return;
  const queue = r._pendingFortQueue || [];
  if (queue.length === 0 || queue[0].phase !== "pick-stand") return;
  const head = queue[0];
  const newHead = {
    phase: "physical",
    threshold: head.threshold,
    decrease: head.decrease,
    sil: head.sil,
    cpSlot: slot,
    source: "falling-physical",
  };
  r._pendingFortQueue = [newHead, ...queue.slice(1)];
  d.lastRoll = null;
  dbPut("battles", state.activeBattle);
  render();
};

// Roll the picked pilot's Physical check. Result + decision held in
// the modal's lastRoll; APPLY commits the pass/fail branch.
handlers["fort-seq-roll-physical"] = () => {
  const d = state.modal?.data;
  const r = d ? findBattleRobot(state.activeBattle, d.robotId) : null;
  if (!r) return;
  const head = (r._pendingFortQueue || [])[0];
  if (!head || head.phase !== "physical") return;
  const cp = _cpBySlotKey(r, head.cpSlot);
  const pilot = cp ? (state.pilots || []).find(x => x.id === cp.pilotId) : null;
  const pool = pilot?.physical || 0;
  const threshold = 5;
  const dice = rollFrameSaveDice(pool);
  const hits = dice.filter(v => v >= threshold).length;
  d.lastRoll = { dice, hits, threshold, hitTarget: head.threshold };
  render();
};

// APPLY: branch on pass/fail. Pass = enqueue per-pilot fortitude vs
// decrease. Fail = mark DOWN + enqueue per-pilot fortitude vs
// (decrease + sil). Either way, dequeue the physical head and clear
// lastRoll.
handlers["fort-seq-apply-physical"] = () => {
  const d = state.modal?.data;
  const r = d ? findBattleRobot(state.activeBattle, d.robotId) : null;
  if (!r) return;
  const queue = r._pendingFortQueue || [];
  const head = queue[0];
  if (!head || head.phase !== "physical" || !d.lastRoll) return;
  const passed = d.lastRoll.hits >= head.threshold;
  const fortThreshold = passed ? head.decrease : (head.decrease + head.sil);
  const fortSource = passed ? "falling-fortitude-pass" : "falling-fortitude-fail";
  if (!passed) {
    // §43 / L10594 Fail branch — Robot goes DOWN (also clears STANDING /
    // FLYING; FLYING was already removed by syncFlyingStatus on alt=0).
    r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING" && s !== "FLYING"), "DOWN"];
    showToast(`${r.robotName || r.name || "Robot"} lands hard — DOWN. §43 / L10594`, 2800);
  } else {
