// Battle state factory. Mirrors BattleRobotState in BattleState.kt.
// ────────────────────────────────────────────────────────────────────
function buildBattleRobotState(robot, side) {
  const ids = robotInstalledModuleIds(robot);
  const cockpits = ids.filter(id =>
    ["standard_cockpit","open_air_cockpit","motion_cockpit","ai_core"].includes(id)
  ).length || 1;
  return {
    robotId: robot.id,
    robotName: robot.name || "Unnamed",
    // Alias name so action-log labels + applyDamage's recordUndo etc. that
    // read r.name find it without falling back to "Robot".
    name: robot.name || "Unnamed",
    side,
    silhouette: robot.silhouette || 1,
    frameStrength: robot.frameStrength || 1,
    frameDurability: robot.frameDurability || 1,
    frameMaterial: robot.frameMaterial || 1,
    components: (robot.components || []).map(c => {
      let armor = 0;
      for (const m of c.modules || []) armor += (MODULES_BY_ID[m.moduleId]?.armorMultiplier || 0) * (robot.silhouette || 1);
      return {
        componentId: c.tempId,
        parentComponentId: c.parentTempId ?? null,
        name: c.name || c.definition,
        definition: c.definition,
        facing: c.facing || "FRONT",
        isFrame: c.isFrame !== false,
        hpMax: armor,
        hpCurrent: armor,
        isDestroyed: false,
        modules: (c.modules || []).map(m => ({
          moduleId: m.moduleId,
          toggledOn: true,
          // Iter 19 (Tom 2026-06-17): preserve AI Pilot binding into battle
          // snapshot so battle-time power calc + future battle-time AI Core
          // reads see the same pilot as the build-time editor. Optional.
          aiPilotId: m.aiPilotId ?? null,
        })),
        // Dereference {equipmentId, socketModuleId} refs into self-contained snapshots
        // so battle state survives later library edits or deletions.
        // §14: Linked composites get an extra `linkedParts` array on the
        // snapshot with per-part stats and a per-part ammoRemaining so
        // attack-time logic can iterate constituent weapons.
        equipment: (c.equipment || []).map((e, i) => {
          const lib = EQUIPMENT_BY_ID[e.equipmentId];
          const linked = lib && isLinkedComposite(lib);
          const stats = lib
            ? (linked
                ? linkedCompositeStats(linkedConstituents(lib))
                : calculateEquipmentStats(lib.keywords || [], lib.silhouette || 1))
            : {};
          const baseSnap = {
            equipmentId: e.equipmentId ?? i,
            socketModuleId: e.socketModuleId ?? null,
            name: lib?.name || "Equipment",
            keywords: lib?.keywords || [],
            silhouette: linked ? (stats.slotSil || 1) : (lib?.silhouette || 1),
            damage: stats.damage || 0,
            range: stats.range || 0,
            armorMax: stats.armor ?? 5,
            armorCurrent: stats.armor ?? 5,
            isDrawn: false,
            isDropped: false,
            mountPoint: !!(lib?.keywords || []).includes("Mount Point"),
          };
          if (linked) {
            // Pull constituent libs and snapshot their per-part stats so
            // resolveAttack can iterate without re-reading state.equipment.
            const partLibs = linkedConstituents(lib);
            baseSnap.isLinked = true;
            baseSnap.linkedParts = partLibs.map(p => {
              const ps = calculateEquipmentStats(p.keywords || [], p.silhouette || 1);
              return {
                equipmentId: p.id,
                name: p.name || "Equipment",
                keywords: p.keywords || [],
                silhouette: p.silhouette || 1,
                damage: ps.damage || 0,
                range: ps.range || 0,
                reach: ps.reach || 0,
                maxAmmo: ps.maxAmmo || 0,
                ammoRemaining: ps.maxAmmo || 0,
                damageType: ps.damageType || "Physical",
                // Per-part Mount Point flag (relevant if any part is
                // externally mounted for min-range checks).
                mountPoint: (p.keywords || []).includes("Mount Point"),
              };
            });
            // Surface the slotFootprint pointer onto the snapshot too.
            baseSnap.slotFootprintEquipmentId = lib.slotFootprintEquipmentId || null;
            // Composite damage type / immunity for the loadout chip.
            baseSnap.damageType = stats.damageType || "Physical";
            baseSnap.immunity = stats.immunity || [];
          }
          return baseSnap;
        }),
      };
    }),
    // Fuel max = sum of fuel_tank module fuelCapacity across all components
    // (BattleTabViewModel.kt:513-514 — no base 10, pure module sum).
    ...(() => {
      let fuelMax = 0;
      for (const c of (robot.components || [])) {
        for (const m of (c.modules || [])) {
          fuelMax += (MODULES_BY_ID[m.moduleId]?.fuelCapacity || 0);
        }
      }
      return { fuelMax, fuelCurrent: fuelMax };
    })(),
    shieldsMax: calcShieldsMax(robot),
    shieldsCurrent: calcShieldsMax(robot),
    systemStrain: 0,
    systemStrainThreshold: calcStrainThreshold(robot),
    capacitorsRemaining: calcCapacitorPool(robot),
    capacitorsMax: calcCapacitorPool(robot),
    pilotTokens: 0,
    pilotMental: 4,
    statusEffects: [],
    boostPower: calcTotalBoost(robot),
    robotWeight: calcTotalWeight(robot),
    groundSpeed: calcGroundSpeed(robot),
    maxLoad: calcMaxLoad(robot),
    altitude: 0, inertia: 0,
    cockpitPilots: [], // populated when force deploys with pilots
    actionBudget: { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 },
    gspdSpent: 0,
    freeToggleIncidentals: 0,
    facingDegrees: 0,
  };
}

const TABS = [
  { id: "garage",  label: "GARAGE",    icon: "🔧", suffix: "// MECH_DB" },
  { id: "equip",   label: "EQUIPMENT", icon: "🔫", suffix: "// ARSENAL" },
  { id: "pilots",  label: "PILOTS",    icon: "👤", suffix: "// CREW_DB" },
  { id: "forces",  label: "FORCES",    icon: "👥", suffix: "// SQUAD_A" },
  { id: "battle",  label: "BATTLE",    icon: "⚡", suffix: "// LIVE_OP" },
];

function render() {
  const tab = TABS.find(t => t.id === state.tab) || TABS[0];
  document.getElementById("title-brand").textContent =
    state.activeBattle && state.tab === "battle" ? "BATTLE" : tab.label;
  document.getElementById("title-suffix").textContent =
    state.activeBattle && state.tab === "battle" ? `ROUND ${state.activeBattle.round || 1}` : tab.suffix;
  document.getElementById("title-suffix").className =
    state.activeBattle && state.tab === "battle" ? "suffix amber" : "suffix";

  const screen = document.getElementById("screen");
  let html = "";
  switch (state.tab) {
    case "garage":  html = renderGarage(); break;
    case "equip":   html = renderEquipment(); break;
    case "pilots":  html = renderPilots(); break;
    case "forces":  html = renderForces(); break;
    case "battle":  html = renderBattle(); break;
  }
  screen.innerHTML = html;

  document.getElementById("botnav").innerHTML = TABS.map(t => `
    <button data-tab="${t.id}" ${state.tab === t.id ? 'aria-current="page"' : ""}>
      <span class="ic">${t.icon}</span>
      <span>${t.label}</span>
    </button>
  `).join("");
  document.querySelectorAll("#botnav button").forEach(b =>
    b.addEventListener("click", () => setState({ tab: b.dataset.tab, activeRobotId: null }))
  );

  document.getElementById("modal-host").innerHTML = state.modal ? renderModal() : "";
  // Iter 36 — Inline Rulebook Reference Peeks. The peek host sits ABOVE
  // the modal host (z-index 110 vs 100) so a peek pops on top of any
  // open modal without closing it. Backdrop-tap dismisses the peek
  // only; the underlying modal stays put.
  document.getElementById("rule-peek-host").innerHTML = state.rulePeek ? renderRulePeek() : "";
  if (state.rulePeek) {
    document.querySelector(".rule-peek-back")?.addEventListener("click", (e) => {
      if (e.target.classList.contains("rule-peek-back")) closeRulePeek();
    });
  }
  if (state.modal) {
    document.querySelector(".modal-back")?.addEventListener("click", (e) => {
      if (e.target.classList.contains("modal-back")) closeModal();
    });
    // Rulebook deep-link scroll: after render, scroll to section if flagged.
    // Bug A: prefer the per-line anchor (rb-line-N), fall back to chapter
    // anchor (rb-sec-N) if the per-line element isn't in the DOM for any
    // reason (e.g., empty / header-only chapter slice).
    const scrollTarget = document.querySelector("[data-rb-scroll]");
    if (scrollTarget) {
      const targetId = scrollTarget.dataset.rbScroll;
      const fallbackId = scrollTarget.dataset.rbScrollFallback;
      if (targetId) setTimeout(() => {
        const el = document.getElementById(targetId)
          || (fallbackId ? document.getElementById(fallbackId) : null);
        el?.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 80);
    }
    // Battle log: scroll to latest (bottom) action so the most recent entry
    // is visible on open. The list is chronological (oldest first), so the
    // "latest" row is at the end of the scroll container.
    const battleLogScroll = document.getElementById("battle-log-scroll");
    if (battleLogScroll) {
      setTimeout(() => { battleLogScroll.scrollTop = battleLogScroll.scrollHeight; }, 0);
    }
    // Rule search: focus the input so typing starts immediately.
    const ruleSearchInput = document.getElementById("rule-search-input");
    if (ruleSearchInput) {
      setTimeout(() => { ruleSearchInput.focus(); }, 0);
    }
    // Wire pack import file input if settings modal is open.
    const packInput = document.getElementById("pack-import-input");
    if (packInput) {
      packInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const pack = JSON.parse(text);
          if (!pack.id || !pack.name || !pack.version) {
            showToast("Invalid pack: missing id, name, or version."); return;
          }
          pack.active = pack.active ?? true;
          pack.modules = Array.isArray(pack.modules) ? pack.modules : [];
          pack.talents = Array.isArray(pack.talents) ? pack.talents : [];
          pack.keywords = Array.isArray(pack.keywords) ? pack.keywords : [];
          const existing = state.packs.findIndex(p => p.id === pack.id);
          if (existing >= 0) state.packs[existing] = pack;
          else state.packs.push(pack);
          rebuildContent();
          dbPut("settings", { id: "packs", value: state.packs });
          showToast(`Pack "${pack.name}" imported.`);
          pushModal("settings", {});
        } catch (err) {
          showToast("Import failed: " + err.message);
        }
      });
    }
  }

  // Wire all action attributes after rendering. Centralised event
  // dispatch means screens stay pure-HTML templates.
  for (const el of document.querySelectorAll("[data-act]")) {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      dispatch(el.dataset.act, el.dataset);
    });
  }

  // Mount 3D canvases after DOM is populated (no rAF needed — layout is sync).
  if (typeof mountAll3D === "function") mountAll3D();

}

<script>
// ════════════════════════════════════════════════════════════════════
// GARAGE
// ════════════════════════════════════════════════════════════════════
function exportImportBar() {
  return `
    <div class="row-gap" style="margin-bottom: 10px; gap: 6px; flex-wrap:wrap">
      <button class="btn ghost" style="flex:1; min-width:80px" data-act="export-json">EXPORT JSON</button>
      <button class="btn ghost" style="flex:1; min-width:80px" data-act="import-json">IMPORT JSON</button>
      <button class="btn ghost" style="flex:1; min-width:80px" data-act="enter-compare-mode">⚖️ COMPARE</button>
      <button class="btn ghost" style="flex:1; min-width:80px" data-act="open-rulebook">📖 RULEBOOK</button>
      <button class="btn ghost" style="flex:1; min-width:80px" data-act="open-rule-search">🔍 RULE SEARCH</button>
      <button class="btn ghost" style="padding:8px 12px" data-act="open-settings" title="Content Pack Settings">⚙</button>
    </div>
  `;
}
renderGarage = function () {
  if (state.robots.length === 0) {
    return `
      ${exportImportBar()}
      <div class="empty">
        <h2>GARAGE</h2>
        <p>No robots yet — tap + to start your first build.</p>
        <button class="btn primary" style="margin-top:14px" data-act="new-robot">+ NEW ROBOT</button>
      </div>
    `;
  }
  const inCompare = state.compareMode;
  const sel = state.compareSelected;
  const compareBanner = inCompare ? `
    <div style="background:var(--surface-3); border:1px solid var(--cyan); border-radius:var(--bevel); padding:10px 14px; margin-bottom:10px; display:flex; align-items:center; gap:10px">
      <span style="flex:1; color:var(--cyan); font-weight:700; font-size:13px; letter-spacing:0.04em">PICK 2 TO COMPARE — ${sel.length}/2 selected</span>
      <button class="btn ghost" style="padding:5px 10px; font-size:11px" data-act="exit-compare-mode">✕ CANCEL</button>
    </div>
  ` : "";
  const cards = state.robots.map(r => {
    const dep = depBP(r);
    const baseBp = calcRobotBP(r);
    const showDep = dep > baseBp;
    const robotValid = validateRobot(r).isValid;
    const isSelected = inCompare && sel.includes(r.id);
    const cardStyle = isSelected ? "box-shadow:0 0 0 2px var(--cyan)" : "";
    const cardAct = inCompare ? "compare-select-robot" : "edit-robot";
    // Detect modules from inactive packs so the user knows content is missing.
    const inactivePacks = robotInactivePacks(r);
    const inactiveChips = inactivePacks.map(n => `<span class="chip" style="background:var(--surface-3);color:var(--amber, #f59e0b);font-size:10px">[pack: ${escapeHtml(n)} inactive]</span>`).join("");
    // Build-time validation chips — surface the two footguns that will
    // bite the player the moment battle starts:
    //   POWER NEGATIVE → Emergency Shutdown Check on the first action
    //     (§43 / Ch 7 L29). Build still saves; chip is advisory.
    //   OVERLOADED → moveMod goes negative (calcGroundSpeed Math.floor
    //     at line 1769), degrading Ground Speed. Calculator already
    //     handles it; this chip just makes the cause visible upstream
    //     of the GSPD readout.
    const buildPower = calcRobotPower(r);
    const buildWeight = calcTotalWeight(r);
    const buildMaxLoad = calcMaxLoad(r);
    const powerChip = buildPower < 0
      ? `<span class="chip" style="background:var(--red,#ef4444);color:#fff;font-size:10px" title="Net power is negative — Robot will trigger an Emergency Shutdown Check the first action it takes (§43 / Ch 7 L29). Add a generator or drop a consumer.">⚠ POWER NEGATIVE (${buildPower})</span>`
      : "";
    const overload = buildWeight - buildMaxLoad;
    const overloadChip = overload > 0
      ? `<span class="chip" style="background:var(--red,#ef4444);color:#fff;font-size:10px" title="Total weight exceeds Max Load (FS × BOTTOM components + Lift Enhancement). moveMod goes negative, degrading Ground Speed. Lighten the Robot or add Lift Enhancement modules.">⚠ OVERLOADED (${overload} over Max Load)</span>`
      : "";
    return `
      <div class="list-card" style="${cardStyle}" data-act="${cardAct}" data-id="${r.id}">
        ${inCompare ? `<div style="width:24px; height:24px; border-radius:50%; border:2px solid ${isSelected ? "var(--cyan)" : "var(--surface-3)"}; background:${isSelected ? "var(--cyan)" : "transparent"}; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; color:#07111a">${isSelected ? "✓" : ""}</div>` : ""}
        <div class="thumb">${r.imageData ? `<img src="${escapeHtml(r.imageData)}" />` : "🤖"}</div>
        <div style="flex:1; min-width:0">
          <h3>${escapeHtml(r.name || "Unnamed")}${robotValid ? "" : ` <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red, #ef4444);vertical-align:middle"></span>`}</h3>
          <div class="row-gap" style="margin-top:4px; flex-wrap:wrap">
            <span class="chip">SIL ${r.silhouette || 1}</span>
            <span class="chip muted">${baseBp} BP</span>
            ${showDep ? `<span class="chip orange">→ ${dep} DEP</span>` : ""}
            ${powerChip}
            ${overloadChip}
            ${inactiveChips}
          </div>
          <div class="meta">
            FS ${r.frameStrength || 1} · FD ${r.frameDurability || 1} · FM ${r.frameMaterial || 1}
            · ${(r.components || []).length} components
          </div>
        </div>
        ${inCompare ? "" : `<button class="btn ghost" style="padding:6px 10px" data-act="delete-robot" data-id="${r.id}">✕</button>`}
      </div>
    `;
  }).join("");
  return `
    ${exportImportBar()}
    ${compareBanner}
    ${cards}
    ${inCompare ? "" : `<button class="fab" data-act="new-robot">＋</button>`}
  `;
};
function robotInactivePacks(robot) {
  const inactivePacks = state.packs.filter(p => !p.active);
  if (inactivePacks.length === 0) return [];
  const robotModuleIds = new Set(
    (robot.components || []).flatMap(c => (c.modules || []).map(m => m.moduleId))
  );
  const matched = new Set();
  for (const p of inactivePacks) {
    if ((p.modules || []).some(m => robotModuleIds.has(m.id))) matched.add(p.name);
  }
  return [...matched];
}

function depBP(robot, force) {
  const base = calcRobotBP(robot);
  if (!force) return base;
  const assignments = force.pilotAssignments || {};
  const robotAssign = assignments[robot.id] || {};
  let pilotBP = 0;
  const slots = robotCockpitSlots(robot);
  for (let i = 0; i < slots.length; i++) {
    const pid = robotAssign[i];
    if (!pid) continue;
    const pilot = PILOTS_BY_ID[pid];
    if (pilot) pilotBP += (pilot.bpCost || 0);
  }
  return base + pilotBP;
}
handlers["new-robot"] = () => {
  const r = newRobot();
  state.robots.push(r);
  saveRobot(r);
  pushModal("robot-editor", { id: r.id });
};
handlers["edit-robot"] = ({ id }) => {
  pushModal("robot-editor", { id: Number(id) });
};
handlers["delete-robot"] = async ({ id }) => {
  if (!confirm("Delete this robot?")) return;
  const rid = Number(id);
  await dbDelete("robots", rid);
  state.robots = state.robots.filter(r => r.id !== rid);
  // §88 (Tom 2026-06-17): scrub orphan robot ID from every force that
  // referenced this robot. Pre-§88 a deleted robot left a stale id in
  // force.robotIds, so the force list rendered "N robots / 0 BP" where
  // N was the orphan count and the BP reducer (~4570, ~6591) silently
  // skipped the missing robot. Mirrors the equipment-deletion cascade
  // pattern — when a parent record goes away, every per-record map /
  // index that references it must be scrubbed in the same transaction.
  // Also scrub pilotAssignments[rid] (defensive) so a recycled robot ID
  // can't inherit stale slot assignments from the deleted predecessor.
  for (const f of (state.forces || [])) {
    if (!Array.isArray(f.robotIds)) continue;
    const before = f.robotIds.length;
    f.robotIds = f.robotIds.filter(robId => robId !== rid);
    const after = f.robotIds.length;
    const hadAssign = !!(f.pilotAssignments && f.pilotAssignments[rid]);
    if (before !== after || hadAssign) {
      if (f.pilotAssignments && f.pilotAssignments[rid]) {
        delete f.pilotAssignments[rid];
      }
      await dbPut("forces", f);
    }
  }
  render();
};

function newRobot() {
  const id = Date.now();
  return {
    id, name: "Mech " + state.robots.length, silhouette: 4,
    frameStrength: 2, frameDurability: 2, frameMaterial: 2,
    components: [{
      tempId: id + 1, definition: "CORE", facing: "FRONT",
      name: "Core", isFrame: true, modules: [], equipment: [],
    }],
    notes: "",
    imageData: null,
  };
}
async function saveRobot(r) { await dbPut("robots", r); }

handlers["enter-compare-mode"] = () => {
  setState({ compareMode: true, compareSelected: [] });
};
handlers["exit-compare-mode"] = () => {

handlers["compare-select-robot"] = ({ id }) => {
  const rid = Number(id);
  const sel = [...state.compareSelected];
  const idx = sel.indexOf(rid);
  if (idx >= 0) {
    sel.splice(idx, 1);
    setState({ compareSelected: sel });
  } else if (sel.length < 2) {
    sel.push(rid);
    if (sel.length === 2) {
      // Auto-open compare modal when 2 are selected.
      state.compareMode = false;
      state.compareSelected = [];
      pushModal("robot-compare", { idA: sel[0], idB: sel[1] });
    } else {
      setState({ compareSelected: sel });
    }
  }
};

// ────────────────────────────────────────────────────────────────────
// Image picker for robot photos. Reads via FileReader → resizes to
// 512px max (center-cropped square via canvas) → stores as data URL
// on `robot.imageData`. Fully local: no server, no upload, IndexedDB
// only. Works on iOS Safari (which supports <input type="file"
// accept="image/*"> + native photo-picker dialog).
// ────────────────────────────────────────────────────────────────────
const IMAGE_MAX_DIM = 512;
const IMAGE_JPEG_QUALITY = 0.82;
function readImageAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = () => reject(fr.error || new Error("read failed"));
    fr.readAsDataURL(file);
  });
}
function downscaleDataUrl(srcUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        // Center-crop to square, then scale to IMAGE_MAX_DIM.
        const minSide = Math.min(img.width, img.height);
        const sx = (img.width - minSide) / 2;
        const sy = (img.height - minSide) / 2;
        const targetSide = Math.min(IMAGE_MAX_DIM, minSide);
        const canvas = document.createElement("canvas");
        canvas.width = targetSide;
        canvas.height = targetSide;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, targetSide, targetSide);
        resolve(canvas.toDataURL("image/jpeg", IMAGE_JPEG_QUALITY));
      } catch (e) { reject(e); }
    };
    img.onerror = () => reject(new Error("image decode failed"));
    img.src = srcUrl;
  });
}
handlers["pick-image"] = ({ id }) => {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";
  inp.onchange = async () => {
    const file = inp.files?.[0];
    if (!file) return;
    try {
      const raw = await readImageAsDataUrl(file);
      const sized = await downscaleDataUrl(raw);
      const r = ROBOTS_BY_ID[Number(id)];
      if (!r) return;

};

// ────────────────────────────────────────────────────────────────────
// JSON export / import. Bundle every store into a versioned blob so
// testers can back up their work and move it between devices. Schema
// version exists so we can break-fix-forward without silently eating
// old files.
// ────────────────────────────────────────────────────────────────────
const EXPORT_SCHEMA = 1;
function buildExportPayload() {
  return {
    schemaVersion: EXPORT_SCHEMA,
    exportedAt: new Date().toISOString(),
    appVersion: APP_VERSION,
    robots: state.robots,
    pilots: state.pilots,
    equipment: state.equipment,
    forces: state.forces,
    battles: state.battles,
  };
}
handlers["export-json"] = () => {
  const payload = buildExportPayload();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0, 16).replace(/[:T]/g, "-");
  a.href = url;
  a.download = `urfs-web-backup-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast("Exported. Check your downloads.");
};
handlers["import-json"] = () => {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "application/json,.json";
  inp.onchange = async () => {
    const file = inp.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const payload = JSON.parse(text);
      if (!payload || typeof payload !== "object") throw new Error("not an object");
      if (payload.schemaVersion !== EXPORT_SCHEMA) {
        if (!confirm(`Schema mismatch (file v${payload.schemaVersion} vs app v${EXPORT_SCHEMA}). Import anyway?`)) return;
      }
      const merge = confirm("OK = MERGE with current data.\nCancel = REPLACE current data.");
      if (!merge) {
        // Wipe each store before importing.
        for (const s of STORES.filter(s => s !== "settings")) {
          const db = await openDb();
          await new Promise((resolve, reject) => {
            const tx = db.transaction(s, "readwrite");
            tx.objectStore(s).clear();
            tx.oncomplete = resolve;
            tx.onerror = () => reject(tx.error);
          });
        }
        state.robots = []; state.pilots = []; state.equipment = [];
        state.forces = []; state.battles = []; state.activeBattle = null;
        // §87a: maps follow the bulk reset.
        rebuildByIdMaps();
      }
      const sets = { robots: state.robots, pilots: state.pilots, equipment: state.equipment, forces: state.forces, battles: state.battles };
      for (const key of ["robots","pilots","equipment","forces","battles"]) {
        const list = payload[key] || [];
        for (const row of list) {
          // Normalize legacy battles missing two-forces fields.
          if (key === "battles") {
            row.p1Robots = row.p1Robots || [];
            row.p2Robots = row.p2Robots || [];
            // §44: run central schema migration on imported battles so
            // they match the current shape before the first render.
            // Idempotent — bytes-fresh exports are no-ops.
            try { if (typeof migrateBattleSchema === "function") migrateBattleSchema(row); } catch (e) { console.warn("migrateBattleSchema failed on import", e); }
          }
          // Re-key any rows that would collide on merge — generate a fresh id.
          if (merge && sets[key].some(x => x.id === row.id)) {
            row.id = Date.now() + Math.floor(Math.random() * 100000);
          }
          await dbPut(key, row);
          sets[key].push(row);
        }
      }
      showToast(`Imported ${(payload.robots || []).length} robots, ${(payload.pilots || []).length} pilots, ${(payload.equipment || []).length} equipment, ${(payload.forces || []).length} forces, ${(payload.battles || []).length} battles.`);
      render();
    } catch (e) {
      console.error(e);
      alert("Import failed: " + e.message);
    }
  };
  inp.click();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════

    </div>
    <div class="row-gap" style="margin-bottom:10px">
      <div class="field" style="flex:1">
        <label>SIL</label>
        <input type="number" min="1" max="10" id="robot-sil" value="${r.silhouette ?? 1}" onchange="window.persistRobotSilhouette(${r.id}, this.value)" />

      </div>
      <div class="field" style="flex:1">

    <div class="row-gap" style="margin-bottom:10px; flex-wrap:wrap; gap:6px; padding:8px; background:var(--surface-1); border-radius:var(--bevel)">

      <span class="chip ${pwr < 0 ? 'red' : 'green'}" title="${pwr < 0 ? `POWER NEGATIVE — Robot will trigger an Emergency Shutdown Check on its first action (§43 / Ch 7 L29).` : `Net power ${pwr >= 0 ? '+' : ''}${pwr}.`}">${pwr >= 0 ? '+' : ''}${pwr} PWR${pwr < 0 ? ` ⚠` : ''}</span>
      <span class="chip">${fuel} FUEL</span>
      <span class="chip">${shields} SHIELDS</span>
      <span class="chip">${caps} CAP</span>

    </div>

    <div class="label-small label-cyan">SCHEMATIC</div>
    ${renderSchematicWithToggle(robotToSchemNodes(r), { tapAct: "edit-component-from-schem", rid: r.id }, r, false)}

    <div class="label-small label-cyan">COMPONENTS</div>
    ${r.components.map((c, idx) => `
      <div class="card tight">

        <div class="meta" style="font-size:11px; color:var(--on-surface-muted); margin-top:4px">
          ${(c.modules || []).length} modules
          · ${(c.equipment || []).length} equipment
          · ${c.definition === "CORE" ? "all facings" : (() => {
            const primary = c.facing || "FRONT";
            const auto = autoAdditionalFacings(c.definition, primary);
            const extras = auto || (c.additionalFacings || []);
            return extras.length > 0 ? `facing ${primary} + ${extras.join(", ")}` : `facing ${primary}`;
          })()}
        </div>
      </div>
    `).join("")}
    <button class="btn wide" data-act="add-component" data-rid="${r.id}">＋ ADD COMPONENT</button>
    <div class="actions" style="align-items:center">
      ${warnChip}
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
function defChipClass(def) {
  switch (def) {
    case "CORE": return "";
    case "HEAD": return "red";
    case "ARM": return "green";
    case "LEG": return "amber";
    case "UTILITY": return "muted";
    default: return "muted";
  }
}
handlers["show-robot-issues"] = ({ id }) => {
  const r = ROBOTS_BY_ID[Number(id)];
  if (!r) return;
  const { issues } = validateRobot(r);
  alert(issues.join("\n"));
};
handlers["modal-close"] = () => {
  // Reset pilot picker on any action-resolve cancel so stale picks don't bleed.
  // §22 + §32: also clear the active-priority-robot tracker so a CANCEL
  // doesn't leave the resolution chain "open" and silently block future
  // reactions on that Robot.
  if (state.modal?.kind === "action-resolve") {
    _pickedPilot = null;
    state.activePriorityRobotId = null;
  }
  // Same for the §10 redirect-target picker — a cancel-via-X drops back
  // to the action-resolve flow without locking the Priority chain open.
  if (state.modal?.kind === "redirect-target") {
    state.activePriorityRobotId = null;
  }
  // Save form values back if editing a robot.
  if (state.modal?.kind === "robot-editor") {
    const r = ROBOTS_BY_ID[state.modal.data.id];
    if (r) {
      const nm = document.getElementById("robot-name")?.value;
      if (nm != null) r.name = nm;
      // §39 — Silhouette change drives FS/FD caps; read it first, then
      // clamp dependent stats against the new Sil (5×Sil for FS, 3×Sil
      // for FD). §1 + §2 of the audit doc fold into this here.
      const newSil = clampInt("robot-sil", 1, 10, r.silhouette);
      const oldSil = r.silhouette;
      r.silhouette = newSil;
      const fsMax = 5 * newSil;
      const fdMax = 3 * newSil;
      const newFs = clampInt("robot-fs", 1, fsMax, r.frameStrength);
      const newFd = clampInt("robot-fd", 1, fdMax, r.frameDurability);
      // Toast if the Sil decrease forced FS or FD to clamp downward —
      // silent clamping would leave the player wondering why their stats
      // dropped. See §39 decision in patches doc.
      if (newSil < oldSil) {
        const fsClamped = r.frameStrength > fsMax;
        const fdClamped = r.frameDurability > fdMax;
        if (fsClamped || fdClamped) {
          const parts = [];
          if (fsClamped) parts.push(`FS ${r.frameStrength}→${newFs}`);
          if (fdClamped) parts.push(`FD ${r.frameDurability}→${newFd}`);
          showToast(`Sil ${oldSil}→${newSil}: clamped ${parts.join(", ")} (5×Sil / 3×Sil cap).`);
        }
      }
      r.frameStrength = newFs;
      r.frameDurability = newFd;
      r.frameMaterial = clampInt("robot-fm", 1, 4, r.frameMaterial);
      saveRobot(r);
    }
  }
  closeModal();
};
handlers["close-modal"] = () => closeModal();
// onchange handlers fire on blur — they persist edits to state + IDB
// immediately so the next re-render (HUD chip update, sub-modal open, etc.)
// doesn't wipe the typed value. Re-render happens so the HUD reflects the
// new stat in real time.
window.persistRobotField = function (id, field, raw) {
  const r = ROBOTS_BY_ID[Number(id)];
  if (!r) return;
  r[field] = raw;
  saveRobot(r);
  render();
};
window.persistRobotStat = function (id, field, raw, lo, hi) {
  const r = ROBOTS_BY_ID[Number(id)];
  if (!r) return;
  const v = parseInt(raw, 10);
  if (Number.isNaN(v)) return;
  // hi is optional — when omitted only the floor is enforced. §1, §2,
  // §39 of the audit doc cap FS at 5×Sil and FD at 3×Sil via the input
  // wiring, which always passes an `hi` for those two.
  r[field] = hi != null ? Math.max(lo, Math.min(hi, v)) : Math.max(lo, v);
  saveRobot(r);
  render();
};
// §39 — Silhouette is the dependency for FS (5×Sil) and FD (3×Sil) caps.
// When Sil decreases, clamp FS/FD downward and toast the player so the
// drop isn't silent (audit doc §39 decision: toast over silent clamp).
window.persistRobotSilhouette = function (id, raw) {
  const r = ROBOTS_BY_ID[Number(id)];
  if (!r) return;
  const v = parseInt(raw, 10);
  if (Number.isNaN(v)) return;
  const newSil = Math.max(1, Math.min(10, v));
  const oldSil = r.silhouette;
  r.silhouette = newSil;
  if (newSil < oldSil) {
    const fsMax = 5 * newSil;
    const fdMax = 3 * newSil;
    const fsClamped = r.frameStrength > fsMax;
    const fdClamped = r.frameDurability > fdMax;
    if (fsClamped || fdClamped) {
      const parts = [];
      if (fsClamped) { parts.push(`FS ${r.frameStrength}→${fsMax}`); r.frameStrength = fsMax; }
      if (fdClamped) { parts.push(`FD ${r.frameDurability}→${fdMax}`); r.frameDurability = fdMax; }
      showToast(`Sil ${oldSil}→${newSil}: clamped ${parts.join(", ")} (5×Sil / 3×Sil cap).`);
    }
  }
  saveRobot(r);
  render();
};
window.persistForceField = function (id, field, raw, asInt) {
  const f = FORCES_BY_ID[Number(id)];
  if (!f) return;
  if (asInt) {
    const v = parseInt(raw, 10);
    f[field] = Number.isNaN(v) ? 0 : Math.max(0, v);
  } else {
    f[field] = raw;
  }
  dbPut("forces", f);
  render();
};
window.persistPilotField = function (id, field, raw) {
  const p = PILOTS_BY_ID[Number(id)];
  if (!p) return;
  p[field] = raw;
  dbPut("pilots", p);
  render();
};
window.persistEquipmentField = function (id, field, raw) {
  const e = EQUIPMENT_BY_ID[Number(id)];
  if (!e) return;
  e[field] = raw;
  dbPut("equipment", e);
  render();
};
function clampInt(id, lo, hi, dflt) {
  const v = parseInt(document.getElementById(id)?.value || "", 10);
  if (Number.isNaN(v)) return dflt;
  return Math.max(lo, Math.min(hi, v));
}
handlers["add-component"] = ({ rid }) => {
  pushModal("add-component", { rid: Number(rid) });
};
handlers["edit-component"] = ({ rid, cid }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};
handlers["delete-component"] = ({ rid, cid }) => {
  if (!confirm("Remove this component?")) return;
  const r = ROBOTS_BY_ID[Number(rid)];
  if (!r) return;
  r.components = r.components.filter(c => c.tempId !== Number(cid));
  saveRobot(r);
  render();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// ADD/EDIT COMPONENT (modal)
// ════════════════════════════════════════════════════════════════════
const COMP_DEFS = ["HEAD","ARM","LEG","UTILITY"];
const FACINGS = ["FRONT","BACK","LEFT","RIGHT","TOP","BOTTOM"];
const HORIZONTAL = ["FRONT","BACK","LEFT","RIGHT"];
const OPPOSITE = { FRONT:"BACK", BACK:"FRONT", LEFT:"RIGHT", RIGHT:"LEFT", TOP:"BOTTOM", BOTTOM:"TOP" };

function eligibleAdditionalFacings(def, primary) {
  const adj = FACINGS.filter(f => f !== primary && f !== OPPOSITE[primary]);
  if (def === "ARM") return adj;
  if (def === "HEAD") {
    if (primary === "TOP" || primary === "BOTTOM") return HORIZONTAL;
    return [];
  }
  if (def === "LEG") {
    if (primary === "TOP" || primary === "BOTTOM") return HORIZONTAL;
    return HORIZONTAL.filter(f => f !== primary);
  }
  return [];
}

function requiredAdditionalCount(def, primary) {
  if (def === "ARM") return 1;
  if (def === "HEAD") return (primary === "TOP" || primary === "BOTTOM") ? 3 : 0;
  if (def === "LEG") return (primary === "TOP" || primary === "BOTTOM") ? 2 : 1;
  return 0;
}

// HEAD on horizontal auto-assigns adjacents; no picker but display them.
function autoAdditionalFacings(def, primary) {
  if (def === "HEAD" && primary !== "TOP" && primary !== "BOTTOM") {
    return FACINGS.filter(f => f !== primary && f !== OPPOSITE[primary] && HORIZONTAL.includes(f));
  }
  return null;
}

// 0.2.6: every facing the component "occupies" — used by the socket-facing
// picker on install of internal/external/swivel weapon sockets. CORE owns
// all 6 facings (rulebook L82-84). Other components: primary + auto-adjacent
// (HEAD-horizontal) + user-picked additionalFacings.
//
// §92 (Ch 2 L59-65) — Head Shared Facings. An ARM whose
// `sharesFacingsWithComponentId` references a HEAD on the same robot
// gains coordinated facings IF at least one OTHER non-destroyed ARM
// also references the same Head. The coordinated set is the union of
// each participating Arm's intersection-with-Head facings:
//   bonus = (A ∩ H) ∪ (B ∩ H)
// per the rulebook example (A=F+R, B=F+L, H=F+L+R → bonus F+L+R).
// Lone arms (no partner) gain nothing. The HEAD itself does not gain
// shared facings — it's a coordination hub.
//
// Retention (Ch 2 L65): if a partner Arm is destroyed, the surviving
// Arm keeps the coordinated facings. `retainedSharedFacings = true` on
// the survivor tells this helper to include destroyed arms pointing
// to the same head in the partner search. Without `robot` we return
// only base facings — callers that need the bonus must pass the
// owning robot.
function componentEffectiveFacings(c, robot) {
  if (!c) return [];
  if (c.definition === "CORE") return FACINGS.slice();
  const primary = c.facing || "FRONT";
  const auto = autoAdditionalFacings(c.definition, primary) || [];
  const extra = c.additionalFacings || [];
  const base = [primary, ...auto, ...extra];
  let bonus = [];
  if (c.definition === "ARM" && robot && Array.isArray(robot.components)) {
    const headRef = c.sharesFacingsWithComponentId
                 ?? c.sharesFacingsWithTempId
                 ?? null;
    if (headRef !== null) {
      const head = robot.components.find(x =>
        (x.componentId ?? x.tempId) === headRef
        && x.definition === "HEAD" && !x.isDestroyed);
      if (head) {
        const hPrim = head.facing || "FRONT";
        const hAuto = autoAdditionalFacings(head.definition, hPrim) || [];
        const hExtra = head.additionalFacings || [];
        const headSet = new Set([hPrim, ...hAuto, ...hExtra]);
        const partners = robot.components.filter(x => {
          if (x === c) return false;
          if (x.definition !== "ARM") return false;
          const xRef = x.sharesFacingsWithComponentId
                    ?? x.sharesFacingsWithTempId
                    ?? null;
          if (xRef !== headRef) return false;
          if (x.isDestroyed && !c.retainedSharedFacings) return false;
          return true;
        });
        if (partners.length > 0) {
          // (self ∩ head) ∪ Σ(partner ∩ head). Coordinated facings are
          // a subset of the Head's facings — that's the "hub" constraint.
          for (const arm of [c, ...partners]) {
            const aPrim = arm.facing || "FRONT";
            const aAuto = autoAdditionalFacings(arm.definition, aPrim) || [];
            const aExtra = arm.additionalFacings || [];
            for (const f of [aPrim, ...aAuto, ...aExtra]) {
              if (headSet.has(f)) bonus.push(f);
            }
          }
        }
      }
    }
  }
  const all = [...base, ...bonus];
  // dedupe while preserving primary-first order
  return all.filter((f, i) => all.indexOf(f) === i);
}

function renderFacingPickerHtml(def, primary, picked, idPrefix) {
  const options = eligibleAdditionalFacings(def, primary);
  const required = requiredAdditionalCount(def, primary);
  const autoFacings = autoAdditionalFacings(def, primary);
  if (autoFacings) {
    return `<div class="field"><label>ADDITIONAL FACINGS</label><div class="meta" style="padding:4px 0">Auto: ${autoFacings.join(", ")} (horizontal adjacents)</div></div>`;
  }
  if (required === 0 || options.length === 0) return "";
  const count = picked.filter(f => options.includes(f)).length;
  const ok = count === required;
  const chips = options.map(f => {
    const on = picked.includes(f);
    return `<button class="chip ${on ? "primary" : "muted"}" style="margin:2px" data-act="toggle-facing-chip" data-prefix="${idPrefix}" data-facing="${f}">${f}</button>`;
  }).join("");
  return `
    <div class="field" id="${idPrefix}-facing-picker">
      <label>ADDITIONAL FACINGS <span style="color:var(--on-surface-muted);font-weight:normal">(pick exactly ${required})</span></label>
      <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">${chips}</div>
      <div style="margin-top:4px;font-size:11px;color:${ok ? "var(--on-surface-muted)" : "var(--danger, #f44)"}">
        ${count}/${required} selected${ok ? "" : " — select exactly " + required}
      </div>
    </div>
  `;
}

const addCompUI = { picked: [] };
const editCompUI = { picked: [] };

handlers["toggle-facing-chip"] = ({ prefix, facing }) => {
  const ui = prefix === "ac" ? addCompUI : editCompUI;
  if (ui.picked.includes(facing)) {
    ui.picked = ui.picked.filter(f => f !== facing);
  } else {
    ui.picked = [...ui.picked, facing];
  }
  const d = prefix === "ac"
    ? document.getElementById("ac-def")?.value
    : document.getElementById("ec-def-hidden")?.value;
  const primary = prefix === "ac"
    ? document.getElementById("ac-facing")?.value
    : document.getElementById("ec-facing")?.value;
  if (d && primary) {
    const options = eligibleAdditionalFacings(d, primary);
    const required = requiredAdditionalCount(d, primary);
    const count = ui.picked.filter(f => options.includes(f)).length;
    const ok = count === required;
    // Refresh chip styles.
    document.querySelectorAll(`[data-prefix="${prefix}"][data-act="toggle-facing-chip"]`).forEach(btn => {
      const f = btn.dataset.facing;
      btn.className = "chip " + (ui.picked.includes(f) ? "primary" : "muted");
      btn.style.margin = "2px";
    });
    // Refresh counter.
    const picker = document.getElementById(`${prefix}-facing-picker`);
    if (picker) {
      const counter = picker.querySelector("div[style*='font-size:11px']");
      if (counter) {
        counter.style.color = ok ? "var(--on-surface-muted)" : "var(--danger, #f44)";
        counter.textContent = `${count}/${required} selected${ok ? "" : " — select exactly " + required}`;
      }
    }
    // Enable/disable the action button.
    const btn = document.getElementById(`${prefix}-action-btn`);
    if (btn) btn.disabled = !ok;
  }
};

function reattachDataActListeners(root) {
  for (const el of (root || document).querySelectorAll("[data-act]")) {
    el.addEventListener("click", (e) => { e.stopPropagation(); dispatch(el.dataset.act, el.dataset); });
  }
}

window.onAddCompDefOrFacingChange = function() {
  const def = document.getElementById("ac-def")?.value;
  const primary = document.getElementById("ac-facing")?.value;
  if (!def || !primary) return;
  const auto = autoAdditionalFacings(def, primary);
  addCompUI.picked = [];
  const required = requiredAdditionalCount(def, primary);
  const pickerEl = document.getElementById("ac-facing-picker-wrap");
  if (pickerEl) {
    pickerEl.innerHTML = renderFacingPickerHtml(def, primary, addCompUI.picked, "ac");
    reattachDataActListeners(pickerEl);
  }
  const btn = document.getElementById("ac-action-btn");
  if (btn) btn.disabled = (required > 0 && !auto && addCompUI.picked.length !== required);
};

let renderAddComponent = function (rid) {
  const r = ROBOTS_BY_ID[rid];
  const core = (r?.components || []).find(c => c.definition === "CORE");
  const defaultParent = core ? core.tempId : "";
  const parentOptions = (r?.components || []).map(c =>
    `<option value="${c.tempId}" ${c.tempId === defaultParent ? "selected" : ""}>${escapeHtml(c.name || c.definition)}</option>`
  ).join("");
  addCompUI.picked = [];
  const initDef = "HEAD";
  const initFacing = "FRONT";
  const initRequired = requiredAdditionalCount(initDef, initFacing);
  const initAuto = autoAdditionalFacings(initDef, initFacing);
  const initDisabled = initRequired > 0 && !initAuto;
  return `
    <h2>ADD COMPONENT</h2>
    <div class="field">
      <label>NAME</label>
      <input id="ac-name" value="" placeholder="e.g. Right Arm" />
    </div>
    <div class="field">
      <label>DEFINITION</label>
      <select id="ac-def" onchange="window.onAddCompDefOrFacingChange()">
        ${COMP_DEFS.map(d => `<option>${d}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label>FACING</label>
      <select id="ac-facing" onchange="window.onAddCompDefOrFacingChange()">
        ${FACINGS.map(f => `<option>${f}</option>`).join("")}
      </select>
    </div>
    <div id="ac-facing-picker-wrap">${renderFacingPickerHtml(initDef, initFacing, [], "ac")}</div>
    <div class="field">
      <label>FRAME COMPONENT?</label>
      <select id="ac-frame">
        <option value="true">Frame (gets Frame Save)</option>
        <option value="false">Non-Frame (utility)</option>
      </select>
    </div>
    <div class="field">
      <label>PARENT</label>
      <select id="ac-parent">
        ${parentOptions}
      </select>
    </div>
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>
      <button id="ac-action-btn" class="btn primary" data-act="confirm-add-component" data-rid="${rid}" ${initDisabled ? "disabled" : ""}>ADD</button>
    </div>
  `;
};
handlers["confirm-add-component"] = ({ rid }) => {
  const r = ROBOTS_BY_ID[Number(rid)];
  if (!r) return;
  const name = document.getElementById("ac-name").value || "Component";
  const def = document.getElementById("ac-def").value;
  const facing = document.getElementById("ac-facing").value;
  const isFrame = document.getElementById("ac-frame").value === "true";
  const parentTempId = Number(document.getElementById("ac-parent").value) || null;
  const auto = autoAdditionalFacings(def, facing);
  const additionalFacings = auto ? auto : [...addCompUI.picked];
  const tempId = Date.now() + Math.floor(Math.random() * 1000);
  r.components.push({
    tempId, definition: def, facing, name, isFrame,
    parentTempId,
    additionalFacings,
    modules: [], equipment: [],
  });
  saveRobot(r);
  pushModal("robot-editor", { id: r.id });
};

window.onEditCompFacingChange = function() {
  const facing = document.getElementById("ec-facing")?.value;
  const def = document.getElementById("ec-def-hidden")?.value;
  if (!facing || !def) return;
  const auto = autoAdditionalFacings(def, facing);
  editCompUI.picked = [];
  const required = requiredAdditionalCount(def, facing);
  const wrap = document.getElementById("ec-facing-picker-wrap");
  if (wrap) {
    wrap.innerHTML = renderFacingPickerHtml(def, facing, editCompUI.picked, "ec");
    reattachDataActListeners(wrap);
  }
  const btn = document.getElementById("ec-action-btn");
  if (btn) btn.disabled = (required > 0 && !auto && editCompUI.picked.length !== required);
};

// §92 (Ch 2 L59-65) — Head Shared Facings builder UI.
// On an ARM: a "SHARES FACINGS THROUGH HEAD" picker listing every HEAD on
// the robot, plus an advisory line that computes the coordination union
// against the current pick. On a HEAD: a read-only "COORDINATING ARMS"
// list of every ARM already pointing to this Head.
function renderHeadShareUiHtml(r, c) {
  if (!r || !c) return "";
  if (c.definition === "ARM") {
    const heads = (r.components || []).filter(x => x.definition === "HEAD");
    if (heads.length === 0) {
      return `
        <div class="field">
          <label>SHARES FACINGS THROUGH HEAD <span style="color:var(--on-surface-muted);font-weight:normal">(§92 / Ch 2 L59-65)</span></label>
          <div class="meta" style="padding:4px 0; font-size:11px">No HEAD components — install a Head to enable coordination.</div>
        </div>
      `;
    }
    const selectedId = c.sharesFacingsWithComponentId
                    ?? c.sharesFacingsWithTempId
                    ?? "";
    const opts = `<option value="">— None (no coordination) —</option>` +
      heads.map(h => `<option value="${h.tempId}" ${String(h.tempId)===String(selectedId)?"selected":""}>${escapeHtml(h.name || h.definition)} · ${h.facing}${(h.additionalFacings||[]).length?" +"+ (h.additionalFacings||[]).join("+"):""}</option>`).join("");
    return `
      <div class="field">
        <label>SHARES FACINGS THROUGH HEAD <span style="color:var(--on-surface-muted);font-weight:normal">(§92 / Ch 2 L59-65)</span></label>
        <select id="ec-share-head" onchange="window.onEditCompShareHeadChange()">${opts}</select>
        <div id="ec-share-head-advisory" class="meta" style="font-size:11px; margin-top:4px">${headShareAdvisoryText(r, c, selectedId === "" ? null : Number(selectedId))}</div>
      </div>
    `;
  }
  if (c.definition === "HEAD") {
    const coords = (r.components || []).filter(x => {
      if (x.definition !== "ARM") return false;
      const ref = x.sharesFacingsWithComponentId ?? x.sharesFacingsWithTempId ?? null;
      return ref === c.tempId || ref === c.componentId;
    });
    const list = coords.length === 0
      ? `<div class="meta" style="font-size:11px; padding:4px 0">No ARMS coordinating through this Head yet.</div>`
      : coords.map(a => `<span class="chip muted" style="margin:2px">${escapeHtml(a.name || "ARM")} · ${a.facing}${(a.additionalFacings||[]).length?" +"+ (a.additionalFacings||[]).join("+"):""}</span>`).join("");
    return `
      <div class="field">
        <label>COORDINATING ARMS <span style="color:var(--on-surface-muted);font-weight:normal">(§92 / Ch 2 L59-65)</span></label>
        <div style="display:flex; flex-wrap:wrap; gap:2px">${list}</div>
        ${coords.length === 1 ? `<div class="meta" style="font-size:11px; margin-top:4px; color:var(--amber,#f59e0b)">Lone Arm — coordination needs a partner Arm also sharing this Head.</div>` : ""}
      </div>
    `;
  }
  return "";
}

// Compute the advisory text for the Arm-picker. If headId is null/none,
// say "no coordination". If a Head is picked but no partner Arm shares,
// say "no partner found — coordination not active". Otherwise list the
// effective facing union the Arm would gain.
function headShareAdvisoryText(r, c, headId) {
  if (!headId) return "No coordination — this Arm uses only its own facings.";
  // Simulate the pick to compute the bonus without mutating.
  const simulated = { ...c, sharesFacingsWithComponentId: headId };
  const heads = (r.components || []).filter(x => x.definition === "HEAD");
  const head = heads.find(h => h.tempId === headId || h.componentId === headId);
  if (!head) return "Selected Head not found on this robot.";
  // Check for a partner Arm sharing the same head.
  const partners = (r.components || []).filter(x => {
    if (x.tempId === c.tempId) return false;
    if (x.definition !== "ARM") return false;
    const ref = x.sharesFacingsWithComponentId ?? x.sharesFacingsWithTempId ?? null;
    return ref === headId;
  });
  if (partners.length === 0) {
    return `Head picked, but no partner Arm shares this Head yet — coordination not active (lone-arm rule, Ch 2 L65).`;
  }
  // Compute the would-be effective facings.
  const eff = componentEffectiveFacings(simulated, { components: [simulated, head, ...partners, ...((r.components || []).filter(x => x.tempId !== c.tempId && !partners.includes(x) && x !== head))] });
  const gained = eff.filter(f => ![simulated.facing, ...(autoAdditionalFacings(simulated.definition, simulated.facing) || []), ...(simulated.additionalFacings || [])].includes(f));
  if (gained.length === 0) {
    return `Coordinated via ${escapeHtml(head.name || "Head")}, but no NEW facings beyond this Arm's own (intersection already in base).`;
  }
  return `Gains <strong>${gained.join("+")}</strong> through ${escapeHtml(head.name || "Head")} (effective: ${eff.join("+")}).`;
}

let renderEditComponent = function (rid, cid) {
  const r = ROBOTS_BY_ID[rid];
  const c = r?.components.find(c => c.tempId === cid);
  if (!c) return "<p>Component not found.</p>";
  editCompUI.picked = [...(c.additionalFacings || [])];
  const installedIds = (c.modules || []).map(m => m.moduleId);
  const available = MODULES.filter(m =>
    (m.definitionLimit.length === 0 || m.definitionLimit.includes(c.definition))
    && (m.maxPerComponent === -1 || !m.maxPerComponent || installedIds.filter(i => i === m.id).length < (m.maxPerComponent || 1))
  );
  // Collect descendants of c so they cannot be chosen as parent (would create a cycle).
  const descendantIds = new Set();
  const queue = [c.tempId];
  while (queue.length) {
    const pid = queue.shift();
    for (const comp of r.components) {
      if (comp.parentTempId === pid && !descendantIds.has(comp.tempId)) {
        descendantIds.add(comp.tempId);
        queue.push(comp.tempId);
      }
    }
  }
  const eligibleParents = (r?.components || []).filter(comp =>
    comp.tempId !== c.tempId && !descendantIds.has(comp.tempId)
  );
  const parentPickerHtml = c.definition === "CORE" ? "" : `
    <div class="field">
      <label>PARENT</label>

          `<option value="${comp.tempId}" ${comp.tempId === c.parentTempId ? "selected" : ""}>${escapeHtml(comp.name || comp.definition)}</option>`
        ).join("")}

    ${parentPickerHtml}
    ${renderHeadShareUiHtml(r, c)}
    ${(() => {
      const slotCap = MODULE_SLOT_CAPS[c.definition] || 8;
      const slotCount = (c.modules || []).length;

          const boundId = m.aiPilotId ?? "";

          const liveDraw = def?.powerDynamic ? aiCorePowerDraw(effPilot) : (def?.power ?? 0);

        ].filter(Boolean).join(" · ");
        // §14: tap-to-expand reveals the constituent parts inline.
        const partsRows = linked
          ? linkedConstituents(eq).map(p => {
              const ps = calculateEquipmentStats(p.keywords || [], p.silhouette || 1);
              const pchip = [
                `SIL ${p.silhouette || 1}`,
                ps.damage > 0 ? `DMG ${ps.damage}` : "",
                ps.range > 0 ? `RNG ${ps.range}` : "",
                `ARM ${ps.armor}`,
              ].filter(Boolean).join(" · ");
              return `<div class="meta" style="font-size:10px; margin-left:10px; opacity:0.85">└ ${escapeHtml(p.name || "?")} · ${pchip}</div>`;
            }).join("")
          : "";
        return `
          <div class="card tight">
            <div class="row-between">
              <div>
                <strong>${escapeHtml(eq.name || "Equipment")}${linked ? ' <span class="chip" style="font-size:9px; margin-left:4px">LINKED</span>' : ""}</strong>
                <div class="meta" style="font-size:10px">${chip}</div>

      return `<div class="label-small label-cyan" style="margin-top:12px">EQUIPMENT (${attachedEquipment.length})</div>${equipmentRows}<button class="btn wide" data-act="add-equipment" data-rid="${rid}" data-cid="${cid}">＋ ADD EQUIPMENT</button>`;
    })()}
    ${(() => {
      if (c.definition === "CORE") return "";
      const req = requiredAdditionalCount(c.definition, c.facing || "FRONT");
      const auto = autoAdditionalFacings(c.definition, c.facing || "FRONT");
      const picked = editCompUI.picked;
      if (req === 0 || auto) return "";
      const ok = picked.filter(f => eligibleAdditionalFacings(c.definition, c.facing || "FRONT").includes(f)).length === req;
      return ok ? "" : `<div style="font-size:11px;color:var(--danger,#f44);margin-bottom:4px">Select exactly ${req} additional facing(s) to save</div>`;
    })()}
    <div class="actions">
      <button id="ec-action-btn" class="btn ghost" data-act="modal-close-component" data-rid="${rid}" data-cid="${cid}" ${(() => {
        if (c.definition === "CORE") return "";
        const req = requiredAdditionalCount(c.definition, c.facing || "FRONT");
        const auto = autoAdditionalFacings(c.definition, c.facing || "FRONT");
        if (req === 0 || auto) return "";
        const options = eligibleAdditionalFacings(c.definition, c.facing || "FRONT");
        const ok = editCompUI.picked.filter(f => options.includes(f)).length === req;
        return ok ? "" : "disabled";
      })()}>DONE</button>
    </div>
  `;
};

handlers["remove-module"] = ({ rid, cid, idx }) => {
  const r = ROBOTS_BY_ID[Number(rid)];
  const c = r?.components.find(c => c.tempId === Number(cid));
  if (!c) return;
  const removedId = c.modules[Number(idx)]?.moduleId;
  const remainingAfterRemove = c.modules.filter((_, i) => i !== Number(idx));
  const remainingIds = remainingAfterRemove.map(m => m.moduleId);
  // A dependent is broken if its requires list has no overlap with the remaining ids (OR semantics).
  const dependents = removedId
    ? remainingAfterRemove.filter(m => {
        const reqs = MODULES_BY_ID[m.moduleId]?.requires;
        if (!reqs || reqs.length === 0) return false;
        return !reqs.some(reqId => remainingIds.includes(reqId));
      })
    : [];
  const doRemove = () => {
    const dependentIds = new Set(dependents.map(m => m.moduleId));
    c.modules = c.modules.filter((m, i) => {
      if (i === Number(idx)) return false;
      if (dependentIds.has(m.moduleId)) return false;
      return true;
    });
    saveRobot(r);
    render();
  };
  if (dependents.length > 0) {
    if (confirm(`This component has ${dependents.length} dependent module(s). Removing breaks them. Continue?`)) {
      doRemove();
    }
  } else {
    doRemove();
  }
};

// Module picker UI state — persists across the in-modal re-renders triggered
// by search/category chip clicks. Reset on modal open.
const modulePickerUI = { search: "", category: "All" };
let renderModulePicker = function (rid, cid) {
  const r = ROBOTS_BY_ID[rid];
  const c = r?.components.find(c => c.tempId === cid);
  if (!c) return "<p>?</p>";
  const installedIds = (c.modules || []).map(m => m.moduleId);
  const q = (modulePickerUI.search || "").trim().toLowerCase();
  const cat = modulePickerUI.category;
  const eligible = MODULES.filter(m => {
    if (m.definitionLimit.length > 0 && !m.definitionLimit.includes(c.definition)) return false;
    if (m.maxPerComponent && m.maxPerComponent !== -1) {
      const have = installedIds.filter(i => i === m.id).length;
      if (have >= m.maxPerComponent) return false;
    }
    if (m.maxCopies !== undefined && m.maxCopies !== -1 && m.maxCopies > 0) {
      const have = installedIds.filter(i => i === m.id).length;
      if (have >= m.maxCopies) return false;
    }
    if (cat !== "All" && m.category !== cat) return false;
    if (q && !(m.name.toLowerCase().includes(q) || (m.description || "").toLowerCase().includes(q))) return false;
    return true;
  });
  const categoryChips = ["All", ...MODULE_CATEGORIES].map(name => {
    const active = name === cat;
    return `<span class="chip ${active ? "" : "muted"}" data-act="module-picker-cat" data-cat="${name}">${name}</span>`;
  }).join("");
  const cardFor = (m) => {
    const stats = [
      `W ${m.weight}`,
      `P ${m.power >= 0 ? "+" : ""}${m.power}`,
    ];
    if (m.fuelCapacity) stats.push(`+${m.fuelCapacity} Fuel Cap`);
    if (m.fuelConsumption) stats.push(`-${m.fuelConsumption} Fuel/rd`);
    if (m.shieldsMultiplier) stats.push(`+${m.shieldsMultiplier}×Sil Shields`);
    if (m.armorMultiplier) stats.push(`+${m.armorMultiplier}×Sil Armor`);
    if (m.boost) stats.push(`+${m.boost} Boost`);
    if (m.glide) stats.push(`+${m.glide} Glide`);
    if (m.groundSpeedMultiplier) stats.push(`+${m.groundSpeedMultiplier}×Sil GSPD`);
    if (m.cockpitSlots) stats.push(`${m.cockpitSlots} Cockpit Slot`);
    if (m.explosiveDamage) stats.push(`Explosive ${m.explosiveDamage}`);
    if (m.emergencyShutdownBonus) stats.push(`+${m.emergencyShutdownBonus} Shutdown die`);
    const tags = [];
    if (m.toggleable) tags.push("Toggleable");
    if (m.stackable) tags.push("Stackable");
    if (m.maxCopies === -1) tags.push("Unlimited copies");
    if (m.maxPerComponent === 1) tags.push("Max 1 per component");
    if (m.definitionLimit && m.definitionLimit.length > 0) tags.push(`Only: ${m.definitionLimit.join(" / ")}`);

    // Check requires — any one of the listed ids must be present (OR semantics per armor_coating).
    // "requires" on armor_coating means "at least one of these must be installed".
    const missingReqs = m.requires
      ? m.requires.filter(reqId => !installedIds.includes(reqId))
      : [];
    const reqsMet = !m.requires || missingReqs.length < m.requires.length;
    const reqChip = (!reqsMet)
      ? `<div style="margin-top:6px; font-size:10px; color:var(--red, #f44)">Requires: ${missingReqs.map(id => escapeHtml(MODULES_BY_ID[id]?.name || id)).join(" / ")}</div>`
      : (m.requires ? `<div class="meta" style="font-size:10px; margin-top:6px">Requires ${m.requires.map(id => escapeHtml(MODULES_BY_ID[id]?.name || id)).join(" / ")}</div>` : "");

    const greyStyle = !reqsMet ? " style=\"opacity:0.4; pointer-events:none\"" : "";
    const act = reqsMet ? `data-act="install-module" data-rid="${rid}" data-cid="${cid}" data-mid="${m.id}"` : "";
    return `
      <div class="card tight"${greyStyle} ${act}>
        <div class="row-between" style="align-items:flex-start; gap:8px">
          <div style="flex:1">
            <strong>${escapeHtml(m.name)}</strong>
            <span class="chip muted" style="font-size:10px; margin-left:6px">${escapeHtml(m.category || "Misc")}</span>
          </div>
          <span class="chip muted" style="white-space:nowrap">${stats.slice(0,2).join(" · ")}</span>
        </div>
        ${stats.length > 2 ? `<div class="meta" style="font-size:11px; margin-top:4px; color:var(--cyan)">${stats.slice(2).join(" · ")}</div>` : ""}
        <div class="meta" style="font-size:12px; margin-top:6px; line-height:1.45">${escapeHtml(m.description)}</div>
        ${tags.length ? `<div class="meta" style="font-size:10px; margin-top:6px; color:var(--on-surface-muted)">${tags.join(" • ")}</div>` : ""}
        ${reqChip}
      </div>
    `;
  };
  return `
    <h2>PICK A MODULE</h2>
    <p>${escapeHtml(c.name)} · ${c.definition}</p>
    <div class="field">
      <input id="module-search" type="search" placeholder="Search name or description" value="${escapeHtml(modulePickerUI.search)}" oninput="window.onModulePickerSearch(this.value)" />
    </div>
    <div class="row-gap" style="flex-wrap:wrap; margin-bottom:8px">${categoryChips}</div>
    ${eligible.length === 0
      ? `<p class="meta">No modules match — clear the filter to see all eligible.</p>`
      : eligible.map(cardFor).join("")}
    <div class="actions">
      <button class="btn ghost" data-act="cancel-module-picker" data-rid="${rid}" data-cid="${cid}">CANCEL</button>
    </div>
  `;
};

  const selVal = selid ? (document.getElementById(selid)?.value || null) : null;
  // selVal is "moduleId:idx"; we only need moduleId for socketModuleId.
  const socketModuleId = selVal ? selVal.split(":")[0] : null;
  c.equipment.push({ equipmentId: Number(eqid), socketModuleId });
  saveRobot(r);
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};
handlers["cancel-equipment-picker"] = ({ rid, cid }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};

let renderEquipmentPicker = function (rid, cid) {
  const r = ROBOTS_BY_ID[rid];
  const c = r?.components.find(c => c.tempId === cid);
  if (!r || !c) return "<p>?</p>";

  // Collect socket modules on this component.
  const socketModules = (c.modules || []).map((m, i) => {
    const type = getSocketTypeForModule(m.moduleId);
    if (!type) return null;
    const def = MODULES_BY_ID[m.moduleId];
    return { idx: i, moduleId: m.moduleId, type, name: def?.name || m.moduleId };
  }).filter(Boolean);

  const itemCards = (state.equipment.length === 0)
    ? `<p class="meta">No equipment in library yet.</p>`
    : state.equipment.map(eq => {
        // §14: linked composites use derived stats AND show as one bundle.
        const stats = equipmentStatsFor(eq);
        const linked = isLinkedComposite(eq);
        const sil = linked ? (stats.slotSil || 1) : (eq.silhouette || 1);
        const chip = [
          `SIL ${sil}${linked ? " (max-of-parts)" : ""}`,
          stats.damage > 0 ? `DMG ${stats.damage}` : "",
          stats.range > 0 ? `RNG ${stats.range}` : "",
          `ARM ${stats.armor}`,
          linked ? `🔗 ${eq.linkedParts.length}` : "",
        ].filter(Boolean).join(" · ");

        // For each socket, check compatibility.
        const compatibleSockets = socketModules.filter(sm => {
          const res = validateEquipmentInSocket(eq, sm.type, r);
          return res.valid;
        });
        const firstIncompat = socketModules.length > 0 && compatibleSockets.length === 0
          ? validateEquipmentInSocket(eq, socketModules[0].type, r).error
          : null;

        if (socketModules.length === 0) {
          return `
            <div class="card tight" style="opacity:0.4">
              <div class="row-between">
                <strong>${escapeHtml(eq.name)}</strong>
                <span class="chip muted">${chip}</span>
              </div>
              <div class="meta" style="font-size:10px; margin-top:4px; color:var(--red, #f44)">Incompatible — no socket modules installed on this component.</div>
            </div>`;
        }
        if (firstIncompat) {
          return `
            <div class="card tight" style="opacity:0.4">
              <div class="row-between">
                <strong>${escapeHtml(eq.name)}</strong>
                <span class="chip muted">${chip}</span>
              </div>
              <div class="meta" style="font-size:10px; margin-top:4px; color:var(--red, #f44)">Incompatible — ${escapeHtml(firstIncompat)}</div>
            </div>`;
        }
        const socketOpts = compatibleSockets.map(sm =>
          `<option value="${escapeHtml(sm.moduleId + ":" + sm.idx)}">${escapeHtml(sm.name)} (${sm.type})</option>`
        ).join("");
        return `
          <div class="card tight">
            <div class="row-between" style="align-items:flex-start; gap:8px">
              <div style="flex:1">
                <strong>${escapeHtml(eq.name)}</strong>
                <div class="meta" style="font-size:10px; margin-top:2px">${chip}</div>
              </div>
              <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px">
                <select id="socket-sel-${eq.id}" style="background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:4px 6px;border-radius:4px;font-size:11px">
                  ${socketOpts}
                </select>
                <button class="btn" style="padding:4px 10px; font-size:11px"
                  data-act="pick-equipment" data-rid="${rid}" data-cid="${cid}" data-eqid="${eq.id}"
                  data-selid="socket-sel-${eq.id}">PICK</button>
              </div>
            </div>
          </div>`;
      }).join("");

  return `
    <h2>PICK EQUIPMENT // ${escapeHtml(c.name || c.definition)} · ${escapeHtml(c.definition)}</h2>
    ${itemCards}
    <div class="actions">
      <button class="btn ghost" data-act="cancel-equipment-picker" data-rid="${rid}" data-cid="${cid}">CANCEL</button>
    </div>
  `;
};

<script>
// ════════════════════════════════════════════════════════════════════
// EQUIPMENT — list + builder
// ════════════════════════════════════════════════════════════════════
renderEquipment = function () {
  if (state.equipment.length === 0) {
    return emptyScreen("EQUIPMENT", "Build weapons, armor, gear here.", "+ NEW EQUIPMENT", "new-equipment");
  }
  return `
    ${state.equipment.map(e => {
      // §44 (Tom 2026-06-17, Ch 12 L6): max Keywords = 3 × Sil. Linked
      // composites derive their keyword roster from the constituent
      // footprint and don't carry an independent keywords[] cap, so
      // skip the warning for them. Soft-warn only — save still allowed.
      const kwCount = (e.keywords || []).length;
      const kwCap = maxKeywordsFor(e.silhouette);
      const overKwCap = !isLinkedComposite(e) && kwCount > kwCap;
      const overKwChip = overKwCap
        ? ` <span class="chip" style="font-size:10px; margin-left:6px; background:var(--amber, rgba(245,158,11,0.18)); color:var(--amber, #f59e0b); outline-color:rgba(245,158,11,0.45)" title="Over keyword cap (${kwCount}/${kwCap}) — rule violation per Ch 12 L6. Max is 3 × Equipment Sil. Save still allowed; resolve at the table.">⚠ KW ${kwCount}/${kwCap}</span>`
        : "";
      return `
      <div class="list-card" data-act="edit-equipment" data-id="${e.id}">
        <div class="thumb" style="${e.imageData ? 'overflow:hidden;padding:0' : ''}">${e.imageData ? `<img src="${escapeHtml(e.imageData)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" />` : (isLinkedComposite(e) ? "🔗" : "🔫")}</div>
        <div style="flex:1">
          <h3>${escapeHtml(e.name || "Unnamed")}${isLinkedComposite(e) ? ` <span class="chip" style="font-size:10px; margin-left:6px">LINKED · ${e.linkedParts.length}</span>` : ""}${overKwChip}</h3>
          ${(() => {
            const stats = equipmentStatsFor(e);
            const sil = isLinkedComposite(e) ? (stats.slotSil || 1) : (e.silhouette || 1);
            // Bug B fix: for Linked composites, show the intersected
            // range WINDOW (per §14, used at attack-time) rather than
            // the max-part range — the latter implied combined fire
            // can reach the longer weapon's full range, which is wrong.
            let rangeChip = "";
            if (isLinkedComposite(e)) {
              const rwin = linkedRangeWindow(linkedConstituents(e));
              if (rwin.empty) {
                rangeChip = ` · RNG —`;
              } else if (rwin.maxRange > 0 || rwin.minRange > 0) {
                rangeChip = rwin.minRange > 0

            }

              SIL ${sil} · BP ${stats.bpCost} · WGT ${stats.weight}${stats.damage > 0 ? ` · DMG ${stats.damage}${stats.damageType === 'Energy' ? ' E' : ''}` : ''}${rangeChip}${stats.armor !== 5 ? ` · ARM ${stats.armor}` : ''}${stats.maxAmmo > 0 ? ` · AMMO ${stats.maxAmmo}` : ''}
            </div>`;
          })()}
          <div class="meta">${isLinkedComposite(e) ? escapeHtml(`Composite: ${linkedConstituents(e).map(p => p.name).join(" + ")}`) : escapeHtml((e.keywords || []).join(", ") || "no keywords")}</div>

      </div>
    `;
    }).join("")}
    ${(() => {
      // §14 link FAB only surfaces when ≥2 unlinked Link-Point items exist.
      const eligible = state.equipment.filter(e =>
        !isLinkedComposite(e) && (e.keywords || []).includes("Link Point")
      );
      if (eligible.length < 2) return `<button class="fab" data-act="new-equipment">＋</button>`;
      return `
        <button class="fab" data-act="new-equipment">＋</button>
        <button class="fab" style="right:88px; background:var(--cyan); color:#07111a" title="Link two or more Link-Point items into a composite (§14)" data-act="open-link-builder">🔗</button>
      `;
    })()}
  `;
};
handlers["new-equipment"] = () => {
  const id = Date.now();
  const eq = { id, name: "Equipment " + state.equipment.length, silhouette: 1, bpCost: 0, weight: 1, armor: 5, keywords: [], notes: "", maxAmmo: 0, mountPoint: false };
  state.equipment.push(eq);
  dbPut("equipment", eq);
  pushModal("equipment-editor", { id });
};
handlers["edit-equipment"] = ({ id }) => pushModal("equipment-editor", { id: Number(id) });
handlers["delete-equipment"] = async ({ id }) => {
  if (!confirm("Delete this equipment?")) return;
  await dbDelete("equipment", Number(id));
  state.equipment = state.equipment.filter(e => e.id !== Number(id));
  // §14: composites referencing the deleted constituent become invalid.
  // Strip the dead ID from every composite's linkedParts list. If a
  // composite drops below 2 parts, delete the composite too.
  const ghosts = [];
  for (const c of state.equipment) {
    if (!isLinkedComposite(c)) continue;
    const before = c.linkedParts.length;
    c.linkedParts = c.linkedParts.filter(pid => pid !== Number(id));
    if (c.linkedParts.length < 2) ghosts.push(c.id);
    else if (c.linkedParts.length !== before) dbPut("equipment", c);
  }
  for (const gid of ghosts) {
    await dbDelete("equipment", gid);
    state.equipment = state.equipment.filter(e => e.id !== gid);
  }
  render();
};

// §14 Linked Equipment builder modal. Open from the 🔗 FAB on the
// Equipment list. Player picks 2+ Link-Point items; on confirm we
// push a composite library entry referencing the picked IDs.
let _linkBuilderUI = { picked: [] };
handlers["open-link-builder"] = () => {
  _linkBuilderUI.picked = [];
  pushModal("link-builder", {});
};
handlers["toggle-link-pick"] = ({ id }) => {
  const eid = Number(id);
  const i = _linkBuilderUI.picked.indexOf(eid);
  if (i >= 0) _linkBuilderUI.picked.splice(i, 1);
  else _linkBuilderUI.picked.push(eid);
  pushModal("link-builder", {});
};
handlers["confirm-link-builder"] = () => {
  const parts = _linkBuilderUI.picked
    .map(id => EQUIPMENT_BY_ID[id])
    .filter(Boolean);
  if (parts.length < 2) {
    showToast("Pick at least 2 Link-Point items.");
    return;
  }
  // Validate every pair via canLink.
  for (let i = 0; i < parts.length; i++) {
    for (let j = i + 1; j < parts.length; j++) {
      const r = canLink(parts[i], parts[j]);
      if (!r.ok) { showToast(r.reason); return; }
    }
  }
  const composite = buildLinkedComposite(parts);
  state.equipment.push(composite);
  dbPut("equipment", composite);
  _linkBuilderUI.picked = [];
  closeModal();
  render();
  showToast(`Linked ${parts.length} items → ${composite.name}`);
};
// Unbundle a composite: delete the composite library row. Constituents
// remain in the library (we never destroyed them — `linkedParts` was a
// reference list). Idempotent.
handlers["unlink-composite"] = async ({ id }) => {
  const eid = Number(id);
  const c = EQUIPMENT_BY_ID[eid];
  if (!c || !isLinkedComposite(c)) return;
  if (!confirm(`Unlink "${c.name}"? Constituent parts will remain in the library.`)) return;
  await dbDelete("equipment", eid);
  state.equipment = state.equipment.filter(e => e.id !== eid);
  render();
  showToast("Composite unlinked.");
};
let renderLinkBuilder = function () {
  const eligible = state.equipment.filter(e =>
    !isLinkedComposite(e) && (e.keywords || []).includes("Link Point")
  );
  const picked = _linkBuilderUI.picked;
  if (eligible.length < 2) {
    return `
      <h2>LINK EQUIPMENT // §14</h2>
      <p class="meta">Need at least two unlinked items with the Link Point keyword to build a composite.</p>
      <div class="actions"><button class="btn ghost" data-act="modal-close">CLOSE</button></div>
    `;
  }
  const rows = eligible.map(e => {
    const stats = calculateEquipmentStats(e.keywords || [], e.silhouette || 1);
    const isPicked = picked.includes(e.id);
    const chip = [
      `SIL ${e.silhouette || 1}`,
      stats.damage > 0 ? `DMG ${stats.damage}` : "",
      stats.range > 0 ? `RNG ${stats.range}` : "",

    return `
      <div class="card tight" data-act="toggle-link-pick" data-id="${e.id}"
           style="border-color:${isPicked ? "var(--cyan)" : "var(--surface-3)"}; cursor:pointer">
        <div class="row-between">
          <div>
            <strong>${isPicked ? "✓ " : ""}${escapeHtml(e.name || "Equipment")}</strong>
            <div class="meta" style="font-size:10px">${chip}</div>
          </div>
        </div>
      </div>`;
  }).join("");
  // Live preview of derived composite stats so the player sees the
  // max-of-max-of-sum economics before committing.
  let preview = "";
  if (picked.length >= 2) {
    const parts = picked.map(id => EQUIPMENT_BY_ID[id]).filter(Boolean);
    const cs = linkedCompositeStats(parts);
    const rangeWin = linkedRangeWindow(parts);
    preview = `
      <div style="margin-top:12px; padding:10px; background:rgba(77,208,225,0.08); border-radius:var(--bevel)">
        <div class="label-small label-cyan">COMPOSITE PREVIEW</div>
        <div class="meta" style="margin-top:4px">
          SIL <strong>${cs.slotSil}</strong> ·
          BP <strong>${cs.bpCost}</strong> ·
          WGT <strong>${cs.weight}</strong> ·
          ARM <strong>${cs.armor}</strong> (max-of-parts)
          ${rangeWin.minRange || rangeWin.maxRange ? `<br/>Range window: <strong>${rangeWin.minRange}–${rangeWin.maxRange}</strong> SU (intersection)${rangeWin.empty ? " <span style=\"color:var(--red,#f44)\">EMPTY — combined ranged fire impossible</span>" : ""}` : ""}
        </div>
        <div class="meta" style="font-size:10px; margin-top:4px; opacity:0.8">
          Damage immunities STRIPPED on the composite${parts.some(p => (p.keywords || []).includes("Energy-Reflective Coating")) ? " EXCEPT Energy-Reflective Coating (retained)." : "."}
        </div>

  }
