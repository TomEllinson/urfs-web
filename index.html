## Facings

[Each Component has one or more **Facings** — the sides from which it can be targeted and from which its mounted Equipment can fire. Facings are the six sides of a cube: FRONT, REAR, LEFT, RIGHT, TOP, BOTTOM.]

[**CORE** has all 6 Facings automatically.]

[**ARM** components have exactly **2 Facings**, chosen from the 6 when attached.]

[**HEAD** components have **1 Facing plus automatic adjacents:**
- If the chosen Facing is a horizontal face (FRONT, REAR, LEFT, RIGHT), the two adjacent horizontal faces are added automatically — total 3 horizontal Facings.
- If the chosen Facing is TOP or BOTTOM, the player picks any **3 horizontal Facings** to add — total 4 Facings.

> [editor's note: The revision notes (L438-449) define Head shared facings. The auto-adjacent rule for horizontal faces is canonical and matches the Android engine (\`HeadSharedFacings.kt\`). Confirm the "pick 3" for TOP/BOTTOM — the Android code may specify this differently.]]

[**LEG** components:
- If the chosen primary Facing is a horizontal face (FRONT, REAR, LEFT, RIGHT), the player picks **1 additional horizontal Facing**.
- If the chosen primary Facing is TOP or BOTTOM, the player picks any **2 horizontal Facings** to add.]

## Modules

[**Modules** fill Component slots and provide all game effects beyond the chassis itself. Modules define a component's Armor, power output, weapons mounts, mobility, piloting capacity, and utility.]

[**Slot caps per component:**]

| Component Type | Module Slots |
|---|---|
| [Core] | [8] |
| [Utility] | [8] |
| [Head] | [6] |
| [Arm] | [4] |
| [Leg] | [4] |

[A Component cannot hold more Modules than its slot cap. There is no robot-wide module limit beyond the sum of its Components' slots.]

[**Toggleable modules:** Some modules can be toggled on or off in play. A toggled-off module contributes nothing to derived stats. Strain Threshold from Coprocessors updates immediately when a Coprocessor is toggled off — the threshold drops in the middle of a turn if the module is disabled. Plan accordingly.]

[**Multi-take modules:** Some modules are marked **(M)** — they can be installed multiple times in the same Component, with each instance contributing its effect independently. The Equipment keywords chapter (Ch. 12) marks which modules allow multi-take. Unless marked (M), a module may not be duplicated in the same Component.]

[**How modules contribute to derived stats:** Modules are the source of almost all numerical robot stats — Armor, Shields, Capacitors, Fuel, Boost Power, Strain Threshold bonus, and Power budget are all sums across modules. See the Derived Stats sections below for each formula.]

## Equipment

[Equipment is any weapon or tool attached to a Component for use in play. See Ch. 12 for keyword rules and how Equipment stats are derived. This section covers how Equipment attaches to a robot.]

[**Attachment requires one of three things on the Component:**
- A **Mount Point** — any Equipment with the Mount Point keyword attaches to a weapon socket module (Internal, External, or Swivel). The socket module defines the firing Facing; the choice is made when the module is installed and is permanent.
- A **MANIPULATOR module** — the arm holds Equipment in a free manipulator. The Equipment fires from the arm's Facings. Held Equipment can be dropped or thrown.
- A **HOLSTER module** — stores one piece of Equipment while not in use. Holstered Equipment is not active and contributes no stats until drawn (a Toggle action).]

[**Equipment Silhouette cap:** A piece of Equipment may not have a Silhouette greater than **2× the wielding Robot's Silhouette**. A Sil 4 robot may equip anything up to Sil 8. A Sil 9 weapon on a Sil 4 robot is illegal.]

[**Equipment weight:** Equipment weight counts toward Robot Load and affects Ground Speed. See Total Weight below.]

> [editor's note: The revision notes (L452-460) formalize the 2× Sil cap as a Tom-confirmed rule. The app enforces it in \`EquipmentSilhouetteRule.kt\`.]

---

## Pilots

[See Ch. 3 for Pilot stats and Talents. This section covers how a Pilot occupies a robot.]

[**Cockpit modules:** To seat a Pilot, a Component must contain a **Cockpit module** (Standard Cockpit or equivalent). One Cockpit = one Pilot slot. The Component the Cockpit is installed in is that Pilot's host Component — if it is destroyed, the Pilot is ejected or incapacitated per the Ejection rules.]

[**Human Pilots** are assigned to a Cockpit and have a Rank (Rookie / Experienced / Veteran) and Talents. See BP Cost below for their cost.]

[**AI Pilot modules** fill a Cockpit slot with an autonomous AI. AI Pilots are **toggleable** — if the module is toggled off (by power loss, electronic warfare, or other effect), the Robot immediately enters Emergency Shutdown. This is the primary vulnerability of AI-only builds.]

[**Multi-cockpit robots:** A robot may have more than one Cockpit module across its Components. Each Cockpit holds one Pilot. All conscious Pilots aboard contribute their Mental dice to Emergency Shutdown checks. Falling and landing damage applies to all conscious Pilots, not just the first.]

> [editor's note: Multi-cockpit and multi-Pilot rules are confirmed in the app (commit \`014a177\` and revision notes L119-121). The statement about all Pilots sharing the Shutdown check is the current canon from Ch. 7.]

---

## Derived Stats — Robot-Wide

[Once Components, Modules, and Equipment are locked in, the following stats are computed. All are robot-wide (not per-Component) unless noted.]

---

### Total Weight (Robot Load)

[**Total Weight** = Σ over each Component { if Frame Component: ceil(Σ module weights / 2); if Utility: Σ module weights } + Σ equipment weights]

[Frame Components halve their module weight contribution (rounded up). Utility Components do not. Equipment weight is added at full value regardless of where it's attached.]

[**Robot Load** is another term for Total Weight. Boost Draw and Ground Speed moveMod both use this value.]

---

### Max Load

[**Max Load** = Frame Strength × count of BOTTOM-facing Components]

[The CORE always counts as BOTTOM-facing (it has all 6 Facings including BOTTOM). Every LEG component with BOTTOM as one of its Facings also counts. A robot with FS 3, one Core, and two BOTTOM-facing Legs has Max Load = 3 × 3 = 9.]

[Max Load determines how heavily a robot can be loaded before its Ground Speed starts to degrade. A robot whose Total Weight exceeds its Max Load moves slower — and the penalty can go negative on extreme overloads.]

---

### Ground Speed

[**moveMod** = ceil((Max Load − Total Weight) / 5)

Note: moveMod has no minimum. An overloaded robot has a negative moveMod and moves slower than its base leg speed.]

[**Ground Speed** = (leg count × Sil) + moveMod + Σ ceil(Sil × wheelMultiplier) for each Wheel module installed]

[Legs contribute directly to Ground Speed, scaled by Silhouette. A heavier-than-max-load robot loses speed from the moveMod penalty. Wheel modules add additional speed per their wheelMultiplier × Sil, rounded up.]

[Ground Speed is used in: Run, Charge, Strafe, Step (floor(Sil/2)), Quick Move (floor(GS/2)), and Reverse (floor(GS/2)).]

> [editor's note: The formula spec and Ch. 8 gap audit both confirm moveMod uses \`ceil\` not \`floor\` (commit \`0559987\`). The "no minimum" on moveMod is confirmed by the app (CE:692).]

---

### Power Budget

[**Power Budget** = Σ power ratings across all modules (generators are positive, draws are negative)]

[The Power Budget is not a pool — it is a running balance. If the Power Budget falls below 0 (net power draw exceeds generation), the robot is in a power-negative state. A power-negative robot must pass an Emergency Shutdown check, and remaining power-negative combined with Strain overflow triggers immediate Shutdown with no check (see Ch. 7). Toggle modules off to return to neutral or positive.]

---

### Fuel Pool

[**Fuel Pool** = Σ fuelCapacity values across all Booster and Reactor modules]

[Fuel is consumed by Boost actions (see Boost Draw, below). Fuel does not regenerate during battle. A robot with no Booster or Reactor modules has a Fuel Pool of 0 and cannot Boost or fly.]

---

### Boost Power and Boost Draw

[**Boost Power** = Σ boost values from all Booster modules]

[**Boost Draw** = ceil(Robot Load / Boost Power) fuel per SU paid]

[Boost Draw is the fuel cost per Scale Unit of ground boost, or per "1 SU of Boost paid" during flight. A heavier robot or one with a low Boost Power burns fuel faster. In flight, direction multiplies the draw: Front = 1×, Left/Right = 2×, Rear = 3× (see Ch. 9).]

---

### Shields Max

[**Shields Max** = Shield Generator count × Sil]

[Shields are a whole-robot pool that absorbs damage before component Armor on any Facing. The pool does not regenerate passively — spend Capacitors (1 Capacitor → +10 Shields, capped at Shields Max) or use Shield-recovery modules. A robot with no Shield Generator modules has Shields Max 0.]

---

### Capacitor Pool

[**Capacitor Pool** = Capacitor Bank count × 2]

[Capacitors are a permanent-spend resource. Uses: +1 die per Capacitor remaining to Emergency Shutdown checks; spend 1 → +10 Shields; spend 1 → −1 System Strain. Capacitors regenerate at +1 per round (at Round Advance), capped at Capacitor Pool max. Once spent below their base pool, they do not fully replenish until end of battle (they regenerate +1/round regardless of origin).]

> [editor's note: The revision notes (L404-408) confirm the +1 die per Capacitor (not +2 per bank). The +1/round regen is from WA:3782. Tom should confirm the regen wording — the app may treat "permanently spent" and "spent this battle" differently.]

---

### Strain Threshold

[**Strain Threshold** = ceil(Sil / 2) + Σ coprocessorBonus across all active Coprocessor modules]

[Only **active** (toggled-on) Coprocessor modules count. Toggling a Coprocessor off mid-battle reduces the threshold immediately — a Shutdown check may be required on that same action if System Strain now exceeds the new threshold.]

---

## Derived Stats — Per Component

### Component Armor Pool

[**Component Armor Pool** = Σ (armorMultiplier × Sil) across all Armor modules on that component]

| Armor Module | Multiplier |
|---|---|
| [Standard Armor] | [1 × Sil] |
| [Heavy Armor] | [3 × Sil] |
| [Composite Armor] | [1 × Sil (weightless)] |

[A component with no Armor modules has an Armor pool of 0. Damage reduces this pool; when it reaches 0, Frame Components make a Frame Save, Non-Frame Components are destroyed.]

---

## BP Cost

[Build Points (BP) measure force power. Every choice in construction costs BP. The total BP of your force is the sum of all robot BPs (with pilots assigned). Forces must fit within the agreed Force BP cap.]

---

### Robot BP

[**Robot BP** = Schematic BP + Frame-Stats BP + Σ Equipment BP]

[This does not include Pilot BP — Pilots are paid for separately but count toward Force BP.]

---

### Schematic BP

[**Schematic BP** = Sil × component count]

[Every Component costs Sil BP regardless of type. A Sil 4 robot with 5 Components has a Schematic BP of 20.]

---

### Frame-Stats BP

[**Frame-Stats BP** = (FS × Sil) + (FD × Sil) + (FD × Sil × FM)]

[Higher Frame Material multiplies Frame Durability's cost — tanky, hard-to-kill frames are expensive. Example: Sil 4, FS 3, FD 2, FM 2 → (3×4) + (2×4) + (2×4×2) = 12 + 8 + 16 = **36 BP**.]

---

### Equipment BP

[**Equipment BP** = keyword count × equipment Sil]

[Each keyword on a piece of Equipment costs equipment Sil BP. A keyword count of 3 on a Sil 4 weapon costs 12 BP. The maximum keyword count is capped at 3 × equipment Sil (see Ch. 12).]

---

### Pilot BP — Human

[**Pilot BP (Human)** = Rank base cost + Σ talent costs]

| Rank | Base BP |
|---|---|
| [Rookie] | [5] |
| [Experienced] | [10] |
| [Veteran] | [15] |

[Talents each have their own BP cost listed in Ch. 11.]

---

### Pilot BP — AI

[**Pilot BP (AI)** = 3 × (Physical + Mental + Training)]

[AI Pilots have no Rank. Every stat point costs 3 BP. An AI with PHY 2, MEN 3, TRN 2 costs 3 × (2+3+2) = **21 BP**.]

---

### Force BP

[**Force BP** = Σ (Robot BP + Pilot BP for each assigned Pilot) across all robots in the force]

[Force BP must not exceed the agreed BP cap for the scenario. The lower-BP force begins as the Assaulting Player (Priority holder) at battle start.]

> [editor's note: The "lower-BP starts with Priority" rule is from commit \`ebd414a\` (1.0.310) and the completeness audit (doc 04, Ch. 4). It is placed here as context for why Force BP matters beyond just meeting the cap.]

# Appendix: Quick Reference

## Priority Pass Conditions

1. Pass action taken
2. Non-Priority Robot deals damage to Priority Robot
3. Priority Robot whiffs an attack (zero hits on attack roll)
4. Priority Robot fails Emergency Shutdown check
5. Priority Robot enters Shutdown for any reason
6. Game effect explicitly causes pass

## Dice

- Hit = 5 or 6 on d6
- Frame Save hit = (7 − Frame Material)+ on d6
- All-Shutdown rule: if a player has only Shutdown Robots, they have lost the game

## Strain Thresholds

- Pilot Strain: tokens > Mental = 1 damage per action (applied at the token that pushes past)
- System Strain: tokens > ceil(Sil / 2) + active Coprocessors = Shutdown check
- Shutdown Check: combined Mental + 1 die per Capacitor remaining, hits on 5+, need hits ≥ System Strain
- Shutdown entry effects: AI Cores auto-disable; System Strain clears to 0; Pilot tokens clear to 0; only a conscious human Pilot can reboot via Pass

## Damage Types

- Physical and Energy
- Both apply equally; keyword interactions differ
- Order: Edge/Energy Edge → Scatter override → Energy Weapon → Overcharged → Limited Ammo → Two-handed ×2 (last)

## Key Formulas

| Stat | Formula |
|---|---|
| Shields | Shield Generators × Silhouette |
| Boost Draw | ceil(Robot Load / Boost Power) Fuel per SU |
| Max Boost / action | min(Boost Power [× Sil while Flying], floor(Fuel / Boost Draw)) |
| Frame Save threshold | 7 − Frame Material |
| Equipment cost | Keywords × Silhouette (BP) |
| Max Keywords | 3 × Equipment Silhouette |
| Pilot HP | 2 × Physical (3× with Tank talent) |
| Pilot KO | at HP 0 (some Talents may modify) |
| Collision (R v R) | (Total Involved Inertia) × Silhouette of largest Robot, both Robots |
| Collision (R v Terrain) | Inertia × Silhouette to terrain; Robot Inertia → 0 |
| Throw range | Reach + Strength × Arms used |
| Throw cap | target Sil ≤ 2 × Robot Sil |
| Ground Inertia gain | +1 per Silhouette-length moved (Run / Charge / Strafe) |
| AI Core power | scales with AI stat sum — see companion app for the curve |

---

## Frame Stats Range Table

| Stat | Range | Notes |
|---|---|---|
| Frame Material (FM) | 1–4 | Set during construction; determines Frame Save difficulty |
| Frame Strength (FS) | 1 – 5 × Silhouette | Drives Max Load, melee damage, and Throw range |
| Frame Durability (FD) | 1 – 3 × Silhouette | Dice pool for Frame Saves |

FM 1 = lightest / easiest to penetrate (save on 6+). FM 4 = heaviest (save on 3+).

---

## BP Formula Quick-Card

**Total Robot BP** = Schematic BP + Frame-stats BP + Equipment BP + Pilot BP

- **Schematic BP** = Silhouette × component count
- **Frame-stats BP** = (FS × Sil) + (FD × Sil) + (FD × Sil × FM)
- **Equipment BP** = keyword count × equipment Silhouette
- **Pilot BP** = tier (Rookie 20 / Experienced 40 / Veteran 80) + talent costs

*Example: Sil 3, 5 components, FS 2, FD 2, FM 2, one weapon with 3 keywords at Sil 2.*
*Schematic = 3 × 5 = 15. Frame-stats = (2×3) + (2×3) + (2×3×2) = 6+6+12 = 24. Equipment = 3 × 2 = 6. Total before Pilot = 45 BP.*

---

## Equipment Auto-Stat Order of Operations

1. **Damage**: Melee/Ranged base → Edge / Energy Edge → Scatter override → Energy Weapon → Overcharged (+Sil × 3 per instance) → Limited Ammo bonus → Two-handed ×2 (last)
2. **Range**: Ranged base → Extended Range (additive) → Long Range ×2 (last)
3. **Weight**: base = Sil → Energy Weapon ceil(weight / 3) if also Melee → Extended Magazine +1 per instance → Armored +1 per instance
4. **Ammo**: only if Limited Ammo present → floor(Sil / 2) × (1 + Extended Magazine count)

---

## Derived Stat Cheat Sheet

| Stat | Formula |
|---|---|
| Strain Threshold | ceil(Sil / 2) + active Coprocessor count |
| Max Load | Frame Strength × count(BOTTOM-facing components); Core counts as BOTTOM |
| Ground Speed | (leg count × Sil) + moveMod; moveMod = ceil((Max Load − weight) / 5) |
| Boost Power | Σ boost values from Booster modules |
| Fuel Pool | Σ fuel capacity from Booster / Reactor modules |
| Shields Max | Shield Generator count × Silhouette |
| Capacitor Pool | Capacitor Bank count × 2 (no in-battle regen; recharges between battles) |

*moveMod can be negative on overloaded builds — Ground Speed can go below base leg value.*

---

## Frame Save

When a Frame Component takes damage that exceeds Armor:

**Roll FD d6 — hit on (7 − FM)+**

| FM | Hit on |
|---|---|
| 1 | 6+ |
| 2 | 5+ |
| 3 | 4+ |
| 4 | 3+ |

Each save hit reduces the incoming damage by 1. If any damage remains, the Component is destroyed and overflow walks to the parent Component in the build dependency chain.

---

## Emergency Shutdown Check

Triggered when System Strain tokens exceed \`ceil(Sil / 2) + active Coprocessors\`, OR when Power is negative.

**Roll (Mental + Capacitors remaining) d6 — hit on 5+**

- Pass if hits ≥ current System Strain total (or any hits on Power-negative triggers)
- Fail = Robot enters **Shutdown**: AI Cores auto-off; System Strain and Pilot tokens clear to 0; rebooted only by a conscious human Pilot via Pass
- Both Power-negative AND Strain-overflow simultaneously = immediate Shutdown (no check)
- A Robot with no power generation and no Capacitors does not make a check at all — immediate Shutdown

---

## Strain Vent

**Roll Mental d6 — hit on 5+**

Each hit removes 1 System Strain token.

*Strain Vent is an Incidental action. Costs 1 action token. May be taken as a Reaction via "Incidental as a Reaction."*

---

## Target Redirection

If a Reaction makes the original target of an attack invalid (target Pivots out of arc; Boost-Dodges out of range or LoF; Crouches / goes Down to invalidate the attack kind), the attacker picks a new valid target before resolving the action. The action is not lost; it redirects. If no valid replacement target exists, the action whiffs (zero hits) and Priority passes accordingly.

- Salvo redirects per-weapon-slot independently
- Pre-declared talents (Sharpshooter, Deadeye) carry to the redirect target
- Player may decline to redirect; the action then whiffs

---

## Grappling Quick-Reference

**Initiate**: opposed Physical; both sides may add +2 dice per free Manipulator.
**Grappled state**: no Movement actions; −2 dice on Ranged Attacks; if grappled Robot Boosts, treat combined weight of both Robots.
**Break Free**: spend a token (Reaction or Priority Action); opposed Physical.
**Throw**: range = Reach + Strength × Arms used; equipment Sil cap = 2 × Robot Silhouette; any-Sil target allowed if range math is positive.
**Mid-grapple**: free arm may Melee; internally-mounted weapons may fire ranged (subject to Minimum Range = Weapon Sil for external, none for internal).
**Disengage**: the grappling Robot may release at any time during any action (free).

---

## Quick Strike Timing

- If the Priority Action **includes a Melee Attack**: Quick Strike resolves **after** it.
- If the Priority Action is **not a Melee Attack** (Ranged, Boost, Pass, etc.): Quick Strike resolves **before** it. (This is the "ranged-in-melee interrupt" rule that punishes Ranged-from-Melee.)

---

## Reactions Cycle

- Reactions cost one Action Token each.
- A Robot resolving a Priority Action cannot react to enemy Reactions.
- Friendly-fire Reactions are allowed (e.g., reacting to a teammate's Hip Shot you're caught in).
- Reactions resolve in proximity order to the Priority Robot; some technically resolve after the Priority Action.`;

// Build a line→index map and section list from RULEBOOK_MD at load time.
// Sections = lines starting with "# " or "## ".
const _rbLines = RULEBOOK_MD.split('\n');

// §87b (Tom 2026-06-17): cumulative line-start offsets across RULEBOOK_MD.
// Built once at load time so searchRulebook can convert a byte offset to a
// line number via binary search (O(log N)) instead of re-slicing+splitting
// the whole rulebook string for every hit (was O(N) per match).
//
// _rbLineOffsets[i] = byte index where line i begins (0-indexed lines).
// Line 0 starts at byte 0; line i+1 starts immediately after the i-th '\n'.
const _rbLineOffsets = (() => {
  const offsets = [0];
  for (let i = 0; i < RULEBOOK_MD.length; i++) {
    if (RULEBOOK_MD.charCodeAt(i) === 10) offsets.push(i + 1);
  }
  return offsets;
})();

// Binary search for the 0-based line number that contains a byte offset.
// Returns the largest i such that _rbLineOffsets[i] <= offset.
function _rbOffsetToLineIdx(offset) {
  let lo = 0, hi = _rbLineOffsets.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (_rbLineOffsets[mid] <= offset) lo = mid;
    else hi = mid - 1;
  }
  return lo;
}
const _rbSections = [];
(function() {
  let curSection = null;
  for (let i = 0; i < _rbLines.length; i++) {
    const line = _rbLines[i];
    if (/^## /.test(line)) {
      if (curSection) curSection.endLine = i - 1;
      curSection = { title: line.replace(/^#+\s*/, ''), startLine: i + 1, endLine: _rbLines.length - 1, level: 2 };
      _rbSections.push(curSection);
    } else if (/^# /.test(line)) {
      if (curSection) curSection.endLine = i - 1;
      curSection = { title: line.replace(/^#+\s*/, ''), startLine: i + 1, endLine: _rbLines.length - 1, level: 1 };
      _rbSections.push(curSection);
    }
  }
})();

// Minimal regex-based markdown renderer. Handles #/##/###, **bold**, *italic*,
// `code`, tables (simplified), list items, hr, paragraph line breaks.
//
// Bug A fix (rule-search deep-link): accepts an optional `startLineNum`
// so each emitted block element carries `id="rb-line-N"` where N is the
// 1-based rulebook line number. The rule-search-jump handler scrolls
// to that anchor so the cited sentence is visible — not just the
// chapter title.
function renderMd(text, startLineNum) {
  const lines = text.split('\n');
  let out = '';
  let inList = false;
  const anchorFor = (i) => (startLineNum != null) ? ` id="rb-line-${startLineNum + i}"` : "";
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code style="background:rgba(77,208,225,0.10);padding:1px 4px;border-radius:3px;font-family:monospace">$1</code>');
    const a = anchorFor(i);
    if (/^---+$/.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<hr${a} style="border:none;border-top:1px solid var(--surface-3);margin:10px 0">`; continue; }
    if (/^### /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<strong${a} style="display:block;margin:8px 0 4px;color:var(--on-surface)">${line.replace(/^###\s*/,'')}</strong>`; continue; }
    if (/^## /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<div${a} style="font-weight:800;color:var(--cyan);font-size:13px;margin:10px 0 4px;letter-spacing:0.04em">${line.replace(/^##\s*/,'')}</div>`; continue; }
    if (/^# /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<div${a} style="font-weight:800;color:var(--cyan);font-size:15px;margin:14px 0 6px;letter-spacing:0.02em">${line.replace(/^#\s*/,'')}</div>`; continue; }
    if (/^\| /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<div${a} style="font-size:11px;color:var(--on-surface-muted);font-family:monospace;white-space:pre-wrap;padding:1px 0">${line}</div>`; continue; }
    if (/^- /.test(raw)) { if (!inList) { out += '<ul style="padding-left:16px;margin:4px 0">'; inList = true; } out += `<li${a} style="margin:2px 0;font-size:13px;color:var(--on-surface)">${line.replace(/^-\s*/,'')}</li>`; continue; }
    if (/^\d+\. /.test(raw)) { if (!inList) { out += '<ol style="padding-left:16px;margin:4px 0">'; inList = true; } out += `<li${a} style="margin:2px 0;font-size:13px;color:var(--on-surface)">${line.replace(/^\d+\.\s*/,'')}</li>`; continue; }
    if (inList) { out += '</ul>'; inList = false; }
    if (raw.trim() === '') { out += `<div${a} style="height:6px"></div>`; continue; }
    out += `<p${a} style="margin:3px 0;font-size:13px;color:var(--on-surface)">${line}</p>`;
  }
  if (inList) out += '</ul>';
  return out;
}

function renderRulebookModal(targetLine) {
  const searchId = "rb-search-" + Date.now();
  // Build a level-1 chapter table by scanning _rbLines directly. The
  // flat _rbSections list short-circuits a level-1 chapter as soon as
  // any level-2 (##) section begins, so its endLine is wrong for the
  // "which chapter contains this rulebook line?" question we need here.
  // Bug A fix: derive chapter ranges from `#` headers only, with
  // endLine = (next # header startLine - 1) or _rbLines.length.
  const _rbChapters = [];
  for (let i = 0; i < _rbLines.length; i++) {
    if (/^# /.test(_rbLines[i])) {
      _rbChapters.push({
        title: _rbLines[i].replace(/^#\s*/, ''),
        startLine: i + 1,
        endLine: _rbLines.length,
      });
    }
  }
  for (let i = 0; i < _rbChapters.length - 1; i++) {
    _rbChapters[i].endLine = _rbChapters[i + 1].startLine - 1;
  }
  // Build section accordion HTML. Each # heading is a collapsible chapter.
  // targetLine (if set) will auto-expand the containing chapter.
  const sectionHtml = _rbChapters.map((s, si) => {
    const sectionLines = _rbLines.slice(s.startLine - 1, s.endLine);
    const lineNum = s.startLine;
    const sectionMd = sectionLines.join('\n');
    const autoOpen = targetLine != null && targetLine >= s.startLine && targetLine <= s.endLine;
    const anchorId = `rb-sec-${si}`;
    return `
      <div class="bucket primary${autoOpen ? ' open' : ''}" id="${anchorId}" style="margin-bottom:6px">
        <div class="header" style="cursor:pointer" onclick="this.parentElement.classList.toggle('open');this.nextElementSibling.style.display=this.parentElement.classList.contains('open')?'block':'none'">
          <span style="font-size:11px;color:var(--on-surface-dim);font-family:monospace;min-width:32px">L${lineNum}</span>
          ${escapeHtml(s.title)}
        </div>
        <div style="display:${autoOpen?'block':'none'};padding:8px 12px">
          ${renderMd(sectionMd, s.startLine)}
        </div>
      </div>`;
  }).join('');

  const targetSecIdx = targetLine != null
    ? _rbChapters.findIndex(s => targetLine >= s.startLine && targetLine <= s.endLine)
    : -1;
  // Bug A fix: prefer the per-line anchor inside the chapter body so the
  // cited sentence (not just the chapter heading) scrolls into view.
  // Falls back to the chapter anchor when no targetLine is set.
  const scrollAttr = targetLine != null && targetSecIdx >= 0
    ? `data-rb-scroll="rb-line-${targetLine}" data-rb-scroll-fallback="rb-sec-${targetSecIdx}"`
    : (targetSecIdx >= 0 ? `data-rb-scroll="rb-sec-${targetSecIdx}"` : "");

  return `
    <h2>📖 RULEBOOK</h2>
    <div class="row-gap" style="margin-bottom:8px">
      <button class="btn ghost" style="flex:1" data-act="open-rule-search">🔍 SNIPPET SEARCH</button>
    </div>
    <input id="${searchId}" type="text" placeholder="Filter chapters by keyword…"
      style="width:100%;background:var(--surface-1);border:1px solid var(--surface-3);border-radius:var(--bevel);padding:8px 10px;color:var(--on-surface);margin-bottom:10px"
      oninput="(function(q){
        const sections = document.querySelectorAll('#rb-sections-list > div.bucket');
        q = q.toLowerCase();
        sections.forEach(sec => {
          if(!q) { sec.style.display=''; return; }
          const text = sec.textContent.toLowerCase();
          sec.style.display = text.includes(q) ? '' : 'none';
          if(text.includes(q)) { sec.classList.add('open'); sec.children[1].style.display='block'; }
        });
      })(this.value)" />
    <div id="rb-sections-list" style="overflow-y:auto;max-height:62vh" ${scrollAttr}>
      ${sectionHtml}
    </div>
    <div class="actions" style="margin-top:10px">
      <button class="btn ghost" data-act="modal-close">CLOSE</button>
    </div>
  `;
}

// ────────────────────────────────────────────────────────────────────
// RULE PEEK SEARCH — snippet-level rulebook search.
//
// Scans RULEBOOK_MD for case-insensitive substring matches and returns
// up to RULE_SEARCH_CAP results, each annotated with the chapter
// (nearest preceding "# " or "## " header) and a 50-100 char snippet
// surrounding the match. The snippet has the match itself wrapped in
// <mark> so the caller can render highlighted hits.
//
// Caller (render side) is responsible for HTML-escaping non-mark text
// — `_highlightSnippet` does that here so the returned `snippetHtml`
// is safe to drop into innerHTML.
// ────────────────────────────────────────────────────────────────────
const RULE_SEARCH_CAP = 25;       // cap per spec decision protocol (20-30)
const RULE_SEARCH_CTX = 35;       // chars on each side of match → ~70+match chars

// Find the chapter (`#` or `##`) heading whose range contains line index `lineIdx`.
// Falls back to the most recent header before lineIdx if no section table covers it.
function _chapterRefForLine(lineIdx) {
  let best = null;
  for (const s of _rbSections) {
    if (s.startLine - 1 <= lineIdx && lineIdx <= s.endLine) {
      // Prefer the most specific (level 2) containing section.
      if (!best || s.level >= best.level) best = s;
    }
  }
  if (best) return { title: best.title, line: best.startLine };
  // Fallback: scan upward from lineIdx for the nearest header line.
  for (let i = Math.min(lineIdx, _rbLines.length - 1); i >= 0; i--) {
    const m = /^#+\s+(.*)$/.exec(_rbLines[i]);
    if (m) return { title: m[1], line: i + 1 };
  }
  return { title: "Rulebook", line: 1 };
}

function _highlightSnippet(text, matchStart, matchEnd) {
  // HTML-escape segments separately so the <mark> wrapper survives.
  const esc = (s) => s
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  const before = esc(text.slice(0, matchStart));
  const hit    = esc(text.slice(matchStart, matchEnd));
  const after  = esc(text.slice(matchEnd));
  return `${before}<mark style="background:rgba(255,193,7,0.35);color:inherit;padding:0 2px;border-radius:2px">${hit}</mark>${after}`;
}

function searchRulebook(query) {
  if (!query || !query.trim()) return [];
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  const text = RULEBOOK_MD;
  const lower = text.toLowerCase();
  const results = [];
  let pos = 0;
  while (results.length < RULE_SEARCH_CAP) {
    const hit = lower.indexOf(q, pos);
    if (hit < 0) break;
    // Skip matches that land inside header lines themselves to avoid
    // chapter titles drowning prose hits — header presence is still
    // shown via chapterRef.
    const lineStart = text.lastIndexOf("\n", hit - 1) + 1;
    const lineEnd = text.indexOf("\n", hit);
    const lineText = text.slice(lineStart, lineEnd < 0 ? text.length : lineEnd);
    const isHeaderLine = /^#+\s/.test(lineText);
    // Compute 0-based line index via §87b binary search over the cumulative
    // line-offset table — was text.slice(0, hit).split("\n").length-1, which
    // re-scanned the entire rulebook prefix on every hit.
    const lineIdx = _rbOffsetToLineIdx(hit);
    const chapterRef = _chapterRefForLine(lineIdx);
    // Carve the snippet: prefer staying within the current line for clarity,
    // but expand symmetrically up to RULE_SEARCH_CTX chars.
    const snipStart = Math.max(0, hit - RULE_SEARCH_CTX);
    const snipEnd   = Math.min(text.length, hit + q.length + RULE_SEARCH_CTX);
    let raw = text.slice(snipStart, snipEnd).replace(/\n+/g, " ⏎ ");
    const prefix = snipStart > 0 ? "…" : "";
    const suffix = snipEnd < text.length ? "…" : "";
    // Adjust match offsets to local slice coordinates AFTER newline replace.
    // The replace can shift offsets; recompute by re-finding the (lowercased)
    // query in the snippet relative to the (lowercased) original slice.
    const localLower = raw.toLowerCase();
    const localHit = localLower.indexOf(q);
    const snippetHtml = localHit >= 0
      ? prefix + _highlightSnippet(raw, localHit, localHit + q.length) + suffix
      : prefix + raw.replace(/&/g, "&amp;").replace(/</g, "&lt;") + suffix;
    if (!isHeaderLine) {
      results.push({
        snippet: raw,
        snippetHtml,
        position: hit,
        line: lineIdx + 1,        // 1-based for parity with rulebook deep-link
        chapterRef,                // { title, line }
      });
    }
    pos = hit + Math.max(1, q.length);
  }
  return results;
}

function renderRuleSearch(initialQuery) {
  const inputId = "rule-search-input";
  const resultsId = "rule-search-results";
  const q = initialQuery || "";
  // Inline JS that re-runs searchRulebook on each keystroke and rewrites
  // the results pane. Keeps focus on the input (no full re-render).
  const onInput = `(function(val){
    const out = document.getElementById('${resultsId}');
    if (!out) return;
    const trimmed = (val || '').trim();
    if (trimmed.length < 2) {
      out.innerHTML = '<p class="meta" style="margin:14px 0">Type at least 2 characters to search the rulebook.</p>';
      return;

    const results = searchRulebook(trimmed);
    if (results.length === 0) {
      out.innerHTML = '<p class="meta" style="margin:14px 0">No matches for "' + (trimmed.replace(/[<&>]/g, '')) + '".</p>';
      return;
    }
    const capNote = results.length >= ${RULE_SEARCH_CAP}
      ? '<div class="meta" style="margin-bottom:6px">Showing first ${RULE_SEARCH_CAP} matches — refine query for more.</div>'
      : '<div class="meta" style="margin-bottom:6px">' + results.length + ' match' + (results.length === 1 ? '' : 'es') + '.</div>';
    out.innerHTML = capNote + results.map(function(r){
      const titleEsc = (r.chapterRef.title || 'Rulebook')

        + '</div>'
        + '<div style="font-size:12px;line-height:1.45;color:var(--on-surface)">' + r.snippetHtml + '</div>'
        + '</div>';
    }).join('');

    });

  return `

    <div id="${resultsId}" style="overflow-y:auto;max-height:58vh">
      <p class="meta" style="margin:14px 0">Type at least 2 characters to search the rulebook.</p>
    </div>
    <div class="actions" style="margin-top:10px">
      <button class="btn ghost" data-act="modal-close">CLOSE</button>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════
// Iter 36 — Inline Rulebook Reference Peeks (pop-up reference panels)
//
// A small 📖 chip the player can tap at any decision surface to see the
// canonical rulebook snippet inline — without leaving the current
// modal context. Builds on iter 29's `_chapterRefForLine` (used to
// derive a header label) and `_rbLines` (the line table).
//
// Render style chosen: OPTION B (sub-modal popped on top of the
// current modal via a separate overlay host). Rationale: the modal
// infrastructure has only one `state.modal` slot and existing modals
// (apply-damage, action-resolve, fortitude-sequence) maintain
// mid-flow state inside `state.modal.data`. A second-tier overlay
// preserves that state without requiring a save/restore. Backdrop
// tap dismisses the peek only.
// ════════════════════════════════════════════════════════════════════

// Canonical "ask-at-table" surfaces the player keeps hitting mid-action.
// Line numbers refer to lines INSIDE RULEBOOK_MD (1-based, matching the
// existing rulebook deep-link plumbing — see _rbLines[lineIdx - 1]).
// `range` is the line span the peek extracts verbatim; `headerHint` is a
// short human label rendered in the peek title. Adding/changing refs
// here is the maintenance surface — no other site has to update.
const RULE_REFS = {
  // All line numbers re-aligned 2026-06-17 to the new RULEBOOK_MD source
  // (canonical chapters from /home/tom/shared/urfs/rulebook-final). The
  // previous alignment (rebuilt 2026-06-17 earlier in the day) targeted
  // a stale draft; this pass re-syncs after the embedded constant was
  // rebuilt from the current canonical chapter sources.
  //
  // Apply-damage pipeline + Frame Save. "## Damage Application" L465 +
  // numbered rules 1-5 at L467-472. Rule 5 (Frame Save) at L472 starts
  // the Frame Material values block (L476-479).
  "apply-damage-pipeline":  { range: [465, 472], headerHint: "Damage Application", chapterLine: 465 },
  "frame-save":             { range: [472, 479], headerHint: "Frame Save (FD d6 vs 7−FM+)", chapterLine: 465 },
  "block-redirect":         { range: [360, 360], headerHint: "Block — overflow returns to original target", chapterLine: 350 },
  // Scatter — used by the apply-damage scatter toggle preview. Keyword
  // entry at L971 inside "## Damage Modifier Keywords" L961.
  "scatter":                { range: [971, 971], headerHint: "Scatter (2 × Sil dmg, all components)", chapterLine: 961 },
  // Shutdown effects (priority-pass + first-action shutdown). "###
  // Emergency Shutdown Check" at L537; chapterLine points at the
  // nearest L2 ("## System Strain" L527).
  "shutdown-entry":         { range: [537, 544], headerHint: "Emergency Shutdown Check", chapterLine: 527 },
  // Priority pass (whiff = pass). "## Priority Pass Conditions" L273
  // with the 5-item numbered list at L277-281 + whiff scope at L285.
  "priority-pass":          { range: [273, 285], headerHint: "Priority Pass Conditions", chapterLine: 273 },
  // Fortitude — used by stat description + fortitude-sequence modal.
  // Physical bullet w/ Fortitude entry at L203-207 in "## Pilot Stats"
  // L199. (No standalone Fortitude section — it's defined as one of
  // the Physical-stat uses.)
  "fortitude":              { range: [203, 207], headerHint: "Fortitude Check (Physical-based)", chapterLine: 199 },
  // Inertia + melee post-hit Fortitude prompt. Damage step (L418) +
  // Inertia Impact step (L419) under "## Melee Attacks" L409.
  "inertia-melee":          { range: [418, 419], headerHint: "Melee Damage · Inertia bonus + Fortitude", chapterLine: 409 },
  // Inertia Impact (overflow scope) — same single line, surfaced
  // separately so the apply-damage modal can label the chip with §50.
  "inertia-impact-melee":   { range: [419, 419], headerHint: "Inertia Impact (Fortitude vs Inertia score)", chapterLine: 409 },
  // Inertia overview — Ch 8 "## Inertia" L625 covers gain / drift /
  // decay / decelerate (L629-633) + the in-combat summary (L635).
  "inertia-overview":       { range: [625, 635], headerHint: "Inertia (build / drift / decay / land)", chapterLine: 625 },
  // Action references — single-line lookups for the action-resolve modal.
  // All under "## Priority Actions" L324 in Ch 5.
  "boost":                  { range: [346, 346], headerHint: "Boost", chapterLine: 324 },
  "charge":                 { range: [332, 332], headerHint: "Charge (Move + Melee)", chapterLine: 324 },
  "strafe":                 { range: [334, 334], headerHint: "Strafe (Move + Ranged)", chapterLine: 324 },
  "salvo":                  { range: [336, 336], headerHint: "Salvo (fire all ranged)", chapterLine: 324 },
  "melee-assault":          { range: [344, 344], headerHint: "Melee Assault (fire all melee)", chapterLine: 324 },
  // Grappling — full "## Grappling" section L452-463 in Ch 6.
  "grapple":                { range: [452, 463], headerHint: "Grappling (initiate / break / throw)", chapterLine: 452 },
  // Throwing — full "## Throwing" section L421-450 in Ch 6.
  "throw":                  { range: [421, 450], headerHint: "Throwing", chapterLine: 421 },
  // Reactions cluster — all under "## Reactions" L350 in Ch 5.
  "parry":                  { range: [362, 362], headerHint: "Parry", chapterLine: 350 },
  "block":                  { range: [360, 360], headerHint: "Block reaction", chapterLine: 350 },
  "quick-strike":           { range: [364, 364], headerHint: "Quick Strike", chapterLine: 350 },
  "hip-shot":               { range: [366, 366], headerHint: "Hip Shot", chapterLine: 350 },
  // Build-warning targets used by the deploy preview chips.
  // Keyword cap formula on L931 ("Max Keywords = 3 x Equipment Silhouette"),
  // chapter is "# Chapter 12: Equipment Keywords" L926 — the indexer
  // accepts both H1 and H2 as section heads.
  "keyword-cap":            { range: [931, 931], headerHint: "Max Keywords = 3 × Sil", chapterLine: 926 },
  // Minimum Range explanation at L407 under "### Minimum Range" L406,
  // parent "## Ranged Attacks" L393.
  "min-range":              { range: [407, 407], headerHint: "Minimum Range (external ranged)", chapterLine: 393 },
  // Crouched status under "## Robot Statuses" L637 in Ch 8 Movement
  // (L641 is the status definition; L374's Crouch Incidental is the
  // action-side counterpart — Build warning peek points at status block).
  "crouched-sil":           { range: [641, 641], headerHint: "Crouched — half Sil vs Ranged", chapterLine: 637 },
};

// Resolve a refKey OR a raw "chN:lineX" / "L<N>" pointer into a peek
// descriptor. Raw forms are used for the inline INERTIA-bonus chip etc.
// where the wired call-site already knows the canonical line.
function _resolveRulePeek(refKey) {
  if (!refKey) return null;
  const r = RULE_REFS[refKey];
  if (r) {
    const [start, end] = r.range;
    return {
      refKey,
      headerHint: r.headerHint,
      chapterLine: r.chapterLine,
      startLine: start,
      endLine: end,
    };
  }
  // Fallback: "L<N>" / "ch<N>:<line>" / plain integer string → single-line peek.
  const m = /^(?:L|ch\d+:)?(\d+)$/i.exec(String(refKey).trim());
  if (m) {
    const line = Math.max(1, Math.min(_rbLines.length, Number(m[1])));
    return {
      refKey,
      headerHint: "Rulebook line " + line,
      chapterLine: line,
      startLine: line,
      endLine: line,
    };
  }
  return null;
}

// Build the tap-chip the player taps to open the peek. Drop the
// returned HTML string directly into an existing modal/section.
// `opts.label` overrides the default "📖 RULE" copy when the call-site
// wants a tighter chip (e.g. "📖 §15.A" inside a frame-save banner).
function rulePeek(refKey, opts = {}) {
  const r = _resolveRulePeek(refKey);
  if (!r) return "";
  const label = opts.label || "📖 RULE";
  const titleAttr = escapeHtml(r.headerHint || "Rulebook reference");
  return `<button type="button" class="rule-chip" data-act="open-rule-peek" data-ref="${escapeHtml(refKey)}" title="${titleAttr}"><span class="ic">📖</span>${escapeHtml(label.replace(/^📖\s*/, ""))}</button>`;
}

function renderRulePeek() {
  if (!state.rulePeek) return "";
  const r = _resolveRulePeek(state.rulePeek.refKey);
  if (!r) {
    return `<div class="rule-peek-back"><div class="rule-peek">
      <h3>RULE PEEK</h3>
      <div class="peek-body">Unknown reference key: ${escapeHtml(String(state.rulePeek.refKey))}.</div>
      <div class="peek-actions"><button class="btn ghost" data-act="close-rule-peek">CLOSE</button></div>
    </div></div>`;
  }
  const chapterRef = _chapterRefForLine(r.chapterLine - 1);
  // Slice the requested range from RULEBOOK_MD and run the existing
  // markdown renderer so the snippet looks consistent with the full
  // rulebook viewer (bold weapon names, bullet lists, etc.).
  const start = Math.max(1, r.startLine);
  const end = Math.min(_rbLines.length, r.endLine);
  const sliceMd = _rbLines.slice(start - 1, end).join("\n");
  const bodyHtml = renderMd(sliceMd);
  const cite = `${escapeHtml(chapterRef.title || "Rulebook")} · L${start}${end !== start ? `–L${end}` : ""}`;
  return `<div class="rule-peek-back"><div class="rule-peek">
    <h3>📖 RULE PEEK <span class="peek-cite">${cite}</span></h3>
    <div class="meta" style="font-size:11px;margin-bottom:4px">${escapeHtml(r.headerHint || "")}</div>
    <div class="peek-body">${bodyHtml}</div>
    <div class="peek-actions">
      <button class="btn ghost" data-act="rule-peek-open-chapter" data-line="${r.chapterLine}">OPEN CHAPTER</button>
      <button class="btn ghost" data-act="close-rule-peek">CLOSE</button>
    </div>
  </div></div>`;
}

function closeRulePeek() {
  state.rulePeek = null;
  render();
}

handlers["open-rule-peek"] = ({ ref } = {}) => {
  if (!ref) return;
  state.rulePeek = { refKey: ref };
  render();
};
handlers["close-rule-peek"] = () => closeRulePeek();
handlers["rule-peek-open-chapter"] = ({ line } = {}) => {
  // Replace the peek with the full rulebook viewer scrolled to the
  // peek's chapter — useful when the player wants more context than
  // the 1–8 line slice. Closes the peek first so the rulebook modal
  // becomes the visible foreground.
  state.rulePeek = null;
  pushModal("rulebook", { line: line ? Number(line) : null });
};

// §87d (Tom 2026-06-17): perf regression smoke test, exposed on `window`
// so it's runnable from devtools without ceremony: `__perf()`. Runs five
// baseline measurements (render, action log, deploy preview, rulebook
// search, battle migration) and console.tables the results, warning if
// any exceeds its threshold. Not a unit test — meant as a manual probe
// before shipping a perf-sensitive change. Each measurement is gated on
// the precondition data existing, so it's safe to run on an empty install.
window.__perf = function () {
  const measurements = {};
  let t0;

  t0 = performance.now();
  try { render(); } catch (e) { console.warn("__perf: render threw", e); }
  measurements.render = performance.now() - t0;

  t0 = performance.now();
  try { if (state.activeBattle && typeof renderActionLog === "function") renderActionLog(); }
  catch (e) { console.warn("__perf: renderActionLog threw", e); }
  measurements.actionLog = performance.now() - t0;

  t0 = performance.now();
  try {
    if ((state.robots || []).length > 0 && typeof buildRobotDeployPreview === "function") {
      buildRobotDeployPreview(state.robots[0]);
    }
  } catch (e) { console.warn("__perf: buildRobotDeployPreview threw", e); }
  measurements.deployPreview = performance.now() - t0;

  t0 = performance.now();
  try { if (typeof searchRulebook === "function") searchRulebook("the"); }
  catch (e) { console.warn("__perf: searchRulebook threw", e); }
  measurements.searchRulebook = performance.now() - t0;

  t0 = performance.now();
  try {
    if (state.activeBattle && typeof migrateBattleSchema === "function") {
      migrateBattleSchema(state.activeBattle);
    }
  } catch (e) { console.warn("__perf: migrateBattleSchema threw", e); }
  measurements.migrate = performance.now() - t0;

  console.table(measurements);

  // Thresholds tuned per §87 perf probe at v0.2.85 — these are forward-
  // looking guards, not current bottlenecks. Anything over the threshold
  // means a slice has shipped a regression; investigate before release.
  const thresholds = { render: 100, actionLog: 100, deployPreview: 100, searchRulebook: 50, migrate: 50 };
  for (const [key, ms] of Object.entries(measurements)) {
    if (ms > thresholds[key]) {
      console.warn(`⚠ ${key}: ${ms.toFixed(2)}ms exceeds ${thresholds[key]}ms threshold`);
    }
  }
  return measurements;
};

// §89 pre-ship regression harness. Call __actionSmoke() from devtools
// console to verify every action handler resolves cleanly. Catches the
// §72b-class bug (ReferenceError after controller edit). See also __perf.
//
// Builds a synthetic in-memory battle (1 robot, 1 pilot, 1 ranged + 1
// melee weapon), iterates every key in ACTIONS, fires the resolve-action
// handler twice per key (picker path + manual path = ~64 invocations),
// captures any thrown errors, then restores activeBattle / modal /
// pilots / _pickedPilot to their original values. dbPut is stubbed for
// the duration so the synthetic fixture never reaches IndexedDB.
// Uses handlers._unguarded["resolve-action"] to bypass the 250ms
// rapid-click debounce that would otherwise drop calls 2..N.
window.__actionSmoke = function () {
  // ── Save state for restoration ──
  const origBattle = state.activeBattle;
  const origModal = state.modal;
  const origPilots = state.pilots;
  const origDbPut = window.dbPut || null;
  const origOnerror = window.onerror;
  const origOnRej = window.onunhandledrejection;
  const origActivePriority = state.activePriorityRobotId;
  const origSkipRedirect = state.skipRedirectCheck;

  // Stub dbPut so the synthetic battle never reaches IndexedDB.
  // The handler calls dbPut("battles", state.activeBattle) at the tail of
  // every resolve. We swallow it. dbPut is a module-level function so we
  // overwrite via the function binding; restore in the finally block.
  const _stubDbPut = async function () { return undefined; };
  // eslint-disable-next-line no-global-assign
  dbPut = _stubDbPut;

  // ── Build synthetic fixture ──
  const TEST_ROBOT_ID = 999999;
  const TEST_PILOT_ID = 999998;
  const TEST_CID = "test-cockpit";
  const synthPilot = {
    id: TEST_PILOT_ID,
    name: "TestPilot",
    physical: 3,
    mental: 4,
    talents: [],
  };
  const synthPilotKey = `${TEST_CID}:0:0`;

  // Minimal battle robot — fields drawn from buildBattleRobotState shape
  // (index.html:2068) plus everything the resolve-action handler reads
  // along its various branches. Two equipment items: one Ranged (for
  // SALVO / STRAFE / HIP_SHOT) and one Melee (for MELEE_ASSAULT /
  // CHARGE / QUICK_STRIKE / PARRY). Components include a structural
  // body + a manipulator arm so countFreeManipulators() returns > 0
  // for INITIATE_GRAPPLE / BREAK_FREE paths.
  const synthRobot = {
    robotId: TEST_ROBOT_ID,
    robotName: "TestBot",
    name: "TestBot",
    side: "P1",
    silhouette: 3,
    frameStrength: 2,
    frameDurability: 4,
    frameMaterial: 2,
    components: [
      {
        componentId: TEST_CID,
        tempId: TEST_CID,
        parentComponentId: null,
        name: "Cockpit",
        definition: "cockpit",
        facing: "FRONT",
        isFrame: true,
        hpMax: 10, hpCurrent: 10,
        isDestroyed: false,
        modules: [{ moduleId: "standard_cockpit", toggledOn: true, aiPilotId: null }],
        equipment: [
          {
            equipmentId: 1,
            socketModuleId: null,
            name: "Test Rifle",
            keywords: ["Ranged"],
            silhouette: 1,
            damage: 3, range: 10,
            armorMax: 5, armorCurrent: 5,
            isDrawn: true, isDropped: false,
            mountPoint: false,
            damageType: "Physical",
          },
        ],
      },
      {
        componentId: "test-arm",
        tempId: "test-arm",
        parentComponentId: null,
        name: "Arm",
        definition: "arm",
        facing: "FRONT",
        isFrame: true,
        hpMax: 8, hpCurrent: 8,
        isDestroyed: false,
        modules: [{ moduleId: "manipulator", toggledOn: true, aiPilotId: null }],
        equipment: [
          {
            equipmentId: 2,
            socketModuleId: null,
            name: "Test Sword",
            keywords: ["Melee"],
            silhouette: 1,
            damage: 4, range: 0,
            armorMax: 5, armorCurrent: 5,
            isDrawn: true, isDropped: false,
            mountPoint: false,
            damageType: "Physical",
          },
        ],
      },
    ],
    fuelMax: 10, fuelCurrent: 10,
    shieldsMax: 20, shieldsCurrent: 20,
    systemStrain: 0, systemStrainThreshold: 5,
    capacitorsRemaining: 3, capacitorsMax: 3,
    pilotTokens: 0, pilotMental: 4,
    statusEffects: ["STANDING"],
    boostPower: 4, robotWeight: 5,
    groundSpeed: 6, maxLoad: 10,
    altitude: 0, inertia: 0,
    cockpitPilots: [{
      componentId: TEST_CID, moduleIndex: 0, slotIndex: 0,
      slotName: "Pilot", pilotId: TEST_PILOT_ID,
      isAi: false, pilotStrain: 0,
      pilotHpMax: 6, pilotHpDamage: 0,
      tokens: 0,
    }],
    actionBudget: { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 },
    gspdSpent: 0, freeToggleIncidentals: 0, facingDegrees: 0,
  };

  const synthBattle = {
    id: 999999,
    round: 1, priority: "P1",
    p1ForceName: "TestForce", p1ForceId: null,
    p2ForceName: "Opponent", p2ForceId: null,
    p1Robots: [synthRobot],
    p2Robots: [],
    undoStack: [],
    passedThisRound: { P1: false, P2: false },
  };

  state.activeBattle = synthBattle;
  state.pilots = [...(origPilots || []), synthPilot];

  // ── Error capture ──
  const caughtAsyncErrors = [];
  window.onerror = function (msg, src, ln, col, err) {
    caughtAsyncErrors.push({ msg: String(msg), stack: err && err.stack });
    return true; // swallow
  };
  window.onunhandledrejection = function (ev) {
    caughtAsyncErrors.push({ msg: String(ev.reason), stack: ev.reason && ev.reason.stack });
  };

  // ── Helper: run one (key, pickedPilot) tuple ──
  // resolve-action reads `_pickedPilot` via the closure variable set by
  // handlers["pick-pilot"]. The function-level `_pickedPilot` is NOT
  // accessible from here, so we route through handlers["pick-pilot"]
  // (which sets it for us). pickerOrManual: "PICKER" → synthPilotKey,
  // "MANUAL" → "MANUAL" sentinel, "NONE" → leave null.
  //
  // The handler is wrapped by withRapidClickGuard at startup; we use
  // handlers._unguarded["resolve-action"] to bypass the 250ms debounce
  // so 64 calls in a row don't drop. Mirrors the redirect-confirm →
  // resolve-action re-entry pattern at index.html:9935.
  const resolveFn = (handlers._unguarded && handlers._unguarded["resolve-action"])
    || handlers["resolve-action"];

  function tryAction(k, pickerOrManual) {
    caughtAsyncErrors.length = 0;
    // Reset robot state per call so an earlier mutation (Strain,
    // statusEffects, fuel) doesn't poison the next call.
    synthRobot.systemStrain = 0;
    synthRobot.pilotTokens = 0;
    synthRobot.fuelCurrent = 10;
    synthRobot.shieldsCurrent = synthRobot.shieldsMax;
    synthRobot.capacitorsRemaining = synthRobot.capacitorsMax;
    synthRobot.statusEffects = ["STANDING"];
    synthRobot.altitude = 0; synthRobot.inertia = 0;
    synthRobot.gspdSpent = 0;
    synthRobot.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    synthRobot.cockpitPilots[0].pilotStrain = 0;
    synthRobot.cockpitPilots[0].pilotHpDamage = 0;
    synthRobot.cockpitPilots[0].tokens = 0;
    synthRobot.cockpitPilots[0].isKO = false;
    synthRobot.cockpitPilots[0]._justTookReaction = false;
    delete synthRobot.salvoTokens;
    delete synthRobot.pendingParryReductions;
    delete synthRobot.grappledById;
    delete synthRobot.grapplingId;
    delete synthRobot.shutdownPending;
    state.activePriorityRobotId = null;
    state.skipRedirectCheck = false;

    // Set _pickedPilot via the pick-pilot handler.
    if (pickerOrManual === "PICKER") {
      try { handlers["pick-pilot"]({ pilot: synthPilotKey }); } catch (e) {}
    } else if (pickerOrManual === "MANUAL") {
      try { handlers["pick-pilot"]({ pilot: "MANUAL" }); } catch (e) {}
    }
    // NONE → leave _pickedPilot as whatever it was (the handler resets
    // it to null on every completion, so it'll be null here).

    // Set the modal data the handler reads (targetIds, distance,
    // decelPts, rotateBy, hDist/vDist for BOOST). Provide sensible
    // defaults so action-specific code paths exercise.
    state.modal = {
      kind: "action-resolve",
      data: {
        rid: TEST_ROBOT_ID,
        id: TEST_ROBOT_ID,
        k: k,
        targetIds: [],            // no other robots in the synth battle
        distance: 1,              // MOVE / CHARGE / STRAFE / QUICK_MOVE
        decelPts: 1,              // DECELERATE
        rotateBy: 45,             // PIVOT
        hDist: 1, vDist: 0,       // BOOST
        targetCount: 1,           // SALVO Mental check
        linkedWeaponSelections: {},
        salvoStandaloneSelections: {},
        meleeStandaloneSelections: {},
      },
    };

    let syncError = null;
    try {
      resolveFn({ id: TEST_ROBOT_ID, rid: TEST_ROBOT_ID, k: k });
    } catch (e) {
      syncError = { msg: String(e && e.message || e), stack: e && e.stack };
    }
    const asyncCopy = caughtAsyncErrors.slice();
    const allErrors = [];
    if (syncError) allErrors.push(syncError);
    allErrors.push(...asyncCopy);
    return { ok: allErrors.length === 0, error: allErrors[0] || null, errors: allErrors };
  }

  // ── Iterate every action ──
  const results = { passed: [], failed: [], skipped: [] };
  try {
    for (const k of Object.keys(ACTIONS)) {
      const pickerResult = tryAction(k, "PICKER");
      const manualResult = tryAction(k, "MANUAL");
      if (pickerResult.ok && manualResult.ok) {
        results.passed.push(k);
      } else {
        results.failed.push({
          key: k,
          pickerError: pickerResult.error,
          manualError: manualResult.error,
        });
      }
    }
  } finally {
    // ── Restore state (must run even on test-time crash) ──
    state.activeBattle = origBattle;
    state.modal = origModal;
    state.pilots = origPilots;
    state.activePriorityRobotId = origActivePriority;
    state.skipRedirectCheck = origSkipRedirect;
    window.onerror = origOnerror;
    window.onunhandledrejection = origOnRej;
    // eslint-disable-next-line no-global-assign
    if (origDbPut) dbPut = origDbPut;
    try { render(); } catch (e) { /* swallow — restoration best-effort */ }
  }

  // ── Report ──
  const summary = {
    total: Object.keys(ACTIONS).length,
    passed: results.passed.length,
    failed: results.failed.length,
  };
  console.table(summary);
  if (results.failed.length > 0) {
    console.group("⚠ __actionSmoke failures");
    for (const f of results.failed) {
      console.error(
        `${f.key}: picker=${f.pickerError?.msg || "ok"}, manual=${f.manualError?.msg || "ok"}`,
      );
      if (f.pickerError?.stack) console.error(f.pickerError.stack);
      if (f.manualError?.stack) console.error(f.manualError.stack);
    }
    console.groupEnd();
  } else {
    console.info(`✓ __actionSmoke: ${summary.passed}/${summary.total} actions clean (picker + manual paths).`);
  }
  return results;
};
</script>
