            <button class="btn ghost" data-act="bump-eq-arm" data-id="${rid}" data-cid="${cid}" data-ei="${i}" data-d="-1" ${e.armorCurrent <= 0 ? "disabled" : ""}>${e.armorCurrent <= 0 ? "DAMAGED" : "DAMAGE −1"}</button>
            <button class="btn ghost" data-act="repair-eq" data-id="${rid}" data-cid="${cid}" data-ei="${i}" ${e.armorCurrent >= e.armorMax ? "disabled" : ""}>REPAIR</button>
          </div>
        </div>
      `).join("")}
    ` : ""}
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-comp-hp"] = ({ id, cid, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.hpCurrent = Math.max(0, Math.min(c.hpMax, c.hpCurrent + parseInt(d, 10)));
  if (c.hpCurrent <= 0 && c.hpMax > 0) c.isDestroyed = true;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["repair-comp"] = ({ id, cid }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.hpCurrent = c.hpMax;
  // Only restore if not destroyed; destruction needs explicit UNDO
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["restore-comp"] = ({ id, cid }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.isDestroyed = false;
  c.hpCurrent = c.hpMax;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["toggle-mod"] = ({ id, cid, mi }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  const m = c.modules[parseInt(mi, 10)];
  m.toggledOn = m.toggledOn === false ? true : false;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["bump-eq-arm"] = ({ id, cid, ei, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (!e) return;
  e.armorCurrent = Math.max(0, Math.min(e.armorMax, e.armorCurrent + parseInt(d, 10)));
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["repair-eq"] = ({ id, cid, ei }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (!e) return;
  e.armorCurrent = e.armorMax;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};

function stepperDialog(title, value, brief, bumpAct, rid) {
  return `
    <h2>${title}</h2>
    <p>${escapeHtml(brief)}</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-${bumpAct}" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${value}</strong>
      <button class="btn ghost" data-act="bump-${bumpAct}" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// 2D SCHEMATIC RENDERER
// Port of android/ui/garage/builder/SchematicRenderer.kt — BFS from
// Core, facing-offset placement, perpendicular sibling spread, post-
// pass collision resolution (alpha.348 fix), mirror convention
// (viewer's right = robot's LEFT).
//
// Returns an HTML string. Callers pass `mode = "build" | "battle"` to
// choose what's bound to each tile's click (open module editor vs
// open damage sheet) and what color rules apply.
// ════════════════════════════════════════════════════════════════════
const SCH_NODE_W = 100, SCH_NODE_H = 56;
const SCH_SPACING_X = 130, SCH_SPACING_Y = 90;
const SCH_PADDING = 24;

// Mirror convention: robot's LEFT side is on the viewer's RIGHT.
// Matches SchematicRenderer.kt facingOffset().
function facingOffset(facing) {
  switch (facing) {
    case "TOP":    return [ 0, -1];
    case "BOTTOM": return [ 0,  1];
    case "FRONT":  return [ 1, -1];
    case "BACK":   return [-1,  1];
    case "RIGHT":  return [-1,  0];
    case "LEFT":   return [ 1,  0];
    default:       return [ 1, -1];
  }
}
// Perpendicular sibling spread — same formula as Kotlin
// perpendicularOffsets(n).
function perpendicularOffsets(n) {
  if (n <= 1) return [0];
  if (n % 2 === 0) {
    const half = n / 2;
    const arr = [];
    for (let i = -half; i <= -1; i++) arr.push(i);
    for (let i =  1; i <=  half; i++) arr.push(i);
    return arr;
  }
  const half = Math.floor(n / 2);
  const arr = [];
  for (let i = -half; i <= half; i++) arr.push(i);
  return arr;
}

function computeSchematicLayout(components) {
  // Build child-of-parent index. Each component is a battle/build
  // component shape — we use tempId/componentId interchangeably (caller
  // normalizes).
  const idOf = c => c._id;
  const byParent = new Map();
  for (const c of components) {
    const p = c._parentId;
    if (!byParent.has(p)) byParent.set(p, []);
    byParent.get(p).push(c);
  }
  const core = components.find(c => c.definition === "CORE") || components[0];
  if (!core) return { nodes: [], minX: 0, minY: 0, maxX: 0, maxY: 0 };

  const positions = [];
  const queue = [{ comp: core, gridX: 0, gridY: 0 }];
  while (queue.length > 0) {
    const cur = queue.shift();
    positions.push(cur);
    const children = byParent.get(idOf(cur.comp)) || [];
    // Group by primary facing.
    const byFacing = new Map();
    for (const ch of children) {
      const f = ch.facing || "FRONT";
      if (!byFacing.has(f)) byFacing.set(f, []);
      byFacing.get(f).push(ch);
    }
    for (const [facing, siblings] of byFacing) {
      const [dx, dy] = facingOffset(facing);
      const perpX = -dy, perpY = dx;
      const offsets = perpendicularOffsets(siblings.length);
      siblings.forEach((ch, idx) => {
        const perp = offsets[idx];
        queue.push({
          comp: ch,
          gridX: cur.gridX + dx + perpX * perp,
          gridY: cur.gridY + dy + perpY * perp,
        });
      });
    }
  }

  // Collision resolution pass (alpha.348 fix). Walk later occupants
  // perpendicular to the parent-link direction until they hit a free
  // cell.
  const occupied = new Set();
  const cellKey = (x, y) => `${x},${y}`;
  for (let i = 0; i < positions.length; i++) {
    let { gridX, gridY } = positions[i];
    if (!occupied.has(cellKey(gridX, gridY))) {
      occupied.add(cellKey(gridX, gridY));
      continue;
    }
    const parent = positions.find(p => idOf(p.comp) === positions[i].comp._parentId);
    let [dx, dy] = parent ? [gridX - parent.gridX, gridY - parent.gridY] : [1, 0];
    dx = Math.sign(dx) || 0; dy = Math.sign(dy) || 0;
    const perpX = -dy || 1, perpY = dx || 0;
    let step = 1;
    let nx = gridX, ny = gridY;
    while (occupied.has(cellKey(nx, ny))) {
      const sign = step % 2 === 1 ? 1 : -1;
      const mag = Math.floor((step + 1) / 2);
      nx = gridX + perpX * sign * mag;
      ny = gridY + perpY * sign * mag;
      step++;
      if (step > 20) break;
    }
    occupied.add(cellKey(nx, ny));
    positions[i] = { ...positions[i], gridX: nx, gridY: ny };
  }

  const minX = Math.min(...positions.map(p => p.gridX));
  const maxX = Math.max(...positions.map(p => p.gridX));
  const minY = Math.min(...positions.map(p => p.gridY));
  const maxY = Math.max(...positions.map(p => p.gridY));
  return { nodes: positions, minX, maxX, minY, maxY };
}

/**
 * Render a 2D schematic from a list of components (battle OR build
 * shape). Each component must have:
 *   _id           : stable component identifier
 *   _parentId     : id of parent, or null for Core
 *   definition    : "CORE" / "HEAD" / "ARM" / "LEG" / "UTILITY"
 *   facing        : "FRONT" / "BACK" / ...
 *   name          : display name
 *   _hpRatio      : 0..1 (1 = full armor, 0 = destroyed)
 *   _destroyed    : boolean
 *   _hpLabel      : "8/8" or "—" etc.
 * Returns an HTML string. `mode` is "build" or "battle"; click action
 * dispatches `tapAct` with `{ id: _id }`.
 */
function renderSchematic(components, opts) {
  const o = Object.assign({ tapAct: "noop", selectedId: null }, opts || {});
  const layout = computeSchematicLayout(components);
  if (layout.nodes.length === 0) {
    return `<div class="meta" style="padding:12px; text-align:center; color:var(--on-surface-muted)">No components yet.</div>`;
  }
  const cols = layout.maxX - layout.minX + 1;
  const rows = layout.maxY - layout.minY + 1;
  const w = SCH_SPACING_X * cols + SCH_NODE_W + 2 * SCH_PADDING;
  const h = SCH_SPACING_Y * rows + SCH_NODE_H + 2 * SCH_PADDING;
  const originX = SCH_PADDING - layout.minX * SCH_SPACING_X;
  const originY = SCH_PADDING - layout.minY * SCH_SPACING_Y;

  // Sort positions so front-row (smaller gridY) draws last → on top
  // for click priority (alpha.348 parity).
  const drawOrder = layout.nodes.slice().sort((a, b) => {
    if ((a.comp._parentId === null) !== (b.comp._parentId === null))
      return a.comp._parentId === null ? -1 : 1;
    if (a.gridY !== b.gridY) return b.gridY - a.gridY;
    return a.gridX - b.gridX;
  });

  // Build the connection-line SVG.
  const lines = [];
  for (const n of layout.nodes) {
    const parent = layout.nodes.find(p => p.comp._id === n.comp._parentId);
    if (!parent) continue;
    const x1 = originX + parent.gridX * SCH_SPACING_X + SCH_NODE_W / 2;
    const y1 = originY + parent.gridY * SCH_SPACING_Y + SCH_NODE_H / 2;
    const x2 = originX + n.gridX * SCH_SPACING_X + SCH_NODE_W / 2;
    const y2 = originY + n.gridY * SCH_SPACING_Y + SCH_NODE_H / 2;
    lines.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#5a6c80" stroke-width="2"/>`);
  }

  const nodeHtml = drawOrder.map(n => {
    const c = n.comp;
    const left = originX + n.gridX * SCH_SPACING_X;
    const top  = originY + n.gridY * SCH_SPACING_Y;
    let cls = "sch-node " + (c.definition || "").toLowerCase();
    if (c._destroyed) cls += " dead";
    else if (c._hpRatio < 0.33) cls += " bad";
    else if (c._hpRatio < 0.66) cls += " warn";
    if (o.selectedId === c._id) cls += " selected";
    const labelChip = c._parentId == null ? "" : `
      <div class="sch-facing" style="left: ${left + SCH_NODE_W / 2}px; top: ${top + SCH_NODE_H - 4}px">
        ${escapeHtml(c.facing || "?")}
      </div>
    `;
    return `
      ${labelChip}
      <div class="${cls}" style="left:${left}px; top:${top}px"
           data-act="${o.tapAct}" data-id="${c._id}" data-rid="${o.rid || ""}">
        <div class="def">${defAbbr2(c.definition)}</div>
        <div class="nm">${escapeHtml(c.name)}</div>
        <div class="hp">${escapeHtml(c._hpLabel || "")}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="schematic-wrap" style="height: ${Math.min(h, 380)}px">
      <div class="schematic-grid" style="width: ${w}px; height: ${h}px">
        <svg width="${w}" height="${h}">${lines.join("")}</svg>
        ${nodeHtml}
      </div>
    </div>
  `;
}
function defAbbr2(d) {
  return ({ CORE: "COR", HEAD: "HEA", ARM: "ARM", LEG: "LEG", UTILITY: "UTL" })[d] || (d || "?").slice(0, 3);
}

// ─ Adapters: normalize a build-shape robot or a battle robot to the
//   schematic data contract.
function robotToSchemNodes(robot) {
  // Build shape uses tempId + parentTempId. Inferred chain: every
  // non-core component without an explicit parent attaches to the
  // core.
  const core = (robot.components || []).find(c => c.definition === "CORE");
  return (robot.components || []).map(c => {
    const isCore = c === core;
    return {
      _id: c.tempId,
      _parentId: isCore ? null : (c.parentTempId ?? (core ? core.tempId : null)),
      definition: c.definition,
      facing: c.facing,
      name: c.name || c.definition,
      _hpRatio: 1,
      _destroyed: false,
      _hpLabel: "",
    };
  });
}
function battleRobotToSchemNodes(r) {
  const core = r.components.find(c => c.definition === "CORE");
  return r.components.map(c => {
    const isCore = c === core;
    const ratio = c.hpMax > 0 ? c.hpCurrent / c.hpMax : 1;
    const label = c.isDestroyed ? "DEAD" : c.hpMax === 0 ? "—" : `${c.hpCurrent}/${c.hpMax}`;
    return {
      _id: c.componentId,
      _parentId: isCore ? null : (c.parentComponentId ?? (core ? core.componentId : null)),
      definition: c.definition,
      facing: c.facing,
      name: c.name || c.definition,
      _hpRatio: ratio,
      _destroyed: !!c.isDestroyed,
      _hpLabel: label,
    };
  });
}
handlers["noop"] = () => {};
handlers["edit-component-from-schem"] = ({ rid, id }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(id) });
};
handlers["open-comp-from-schem"] = ({ rid, id }) => {
  pushModal("comp-sheet", { id: Number(rid), cid: Number(id) });
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PILOT ASSIGN MODAL
// ════════════════════════════════════════════════════════════════════
function renderPilotAssign(fid, assignments) {
  const f = state.forces.find(x => x.id === fid);
  if (!f) return `<h2>FORCE NOT FOUND</h2>`;
  const allSlots = forceCockpitSlots(f);
  const humanSlots = allSlots.filter(s => !s.isAi);

  // Empty-pilots guard: no pilots created yet but cockpit slots need filling.
  if (state.pilots.length === 0 && humanSlots.length > 0) {
    return `
      <h2>ASSIGN PILOTS</h2>
      <div class="meta" style="margin-bottom:12px">${escapeHtml(f.name)}</div>
      <p style="margin:16px 0">No pilots created yet. Create one in the Pilots tab first.</p>
      <div class="actions" style="margin-top:16px">
        <button class="btn ghost" data-act="cancel-pilot-assign" data-fid="${fid}">CANCEL</button>
        <button class="btn amber" data-act="open-pilots-tab">GO TO PILOTS</button>
      </div>
    `;
  }

  const assignedPilotIds = new Set(Object.values(assignments).filter(Boolean));

  let robotSections = "";
  for (const rid of f.robotIds || []) {
    const robot = state.robots.find(r => r.id === rid);
    if (!robot) continue;
    const slots = robotCockpitSlots(robot);
    if (slots.length === 0) continue;
    robotSections += `<div class="label-small" style="margin:12px 0 6px">${escapeHtml(robot.name || "Unnamed")}</div>`;
    for (const slot of slots) {
      const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
      if (slot.isAi) {
        robotSections += `
          <div class="list-card" style="margin-bottom:6px">
            <div style="flex:1">
              <div class="meta">${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)} · ${escapeHtml(slot.componentName)}</div>
              <span class="chip muted">A.I. Core (auto-piloted)</span>
            </div>
          </div>`;
      } else {
        const currentPilotId = assignments[slotKey] || "";
        // Pilots not assigned elsewhere (or assigned to this slot)
        const available = state.pilots.filter(p =>
          !assignedPilotIds.has(p.id) || p.id === currentPilotId
        );
        const opts = `<option value="">— Unassigned —</option>` +
          available.map(p =>
            `<option value="${p.id}" ${p.id === currentPilotId ? "selected" : ""}>${escapeHtml(p.name || "Pilot")} (${p.rank || ""})</option>`
          ).join("");
        robotSections += `
          <div class="list-card" style="margin-bottom:6px">
            <div style="flex:1">
              <div class="meta">${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)} · ${escapeHtml(slot.componentName)}</div>
              <select data-act="pilot-slot-changed" data-fid="${fid}" data-key="${slotKey}"
                style="margin-top:6px;width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:6px;border-radius:4px">
                ${opts}
              </select>
            </div>
          </div>`;
      }
    }
  }

  const allAssigned = humanSlots.every(s => {
    const k = `${s.robotId}:${s.componentId}:${s.slotIndex}`;
    return assignments[k];
  });
  const deployDisabled = allAssigned ? "" : "disabled";
  const deployClass = allAssigned ? "btn amber" : "btn amber disabled";
  const side = (state.modal && state.modal.data && state.modal.data.side) || "P1";
  const deployLabel = side === "P2" ? "ADD TO BATTLE" : "DEPLOY";

  return `
    <h2>ASSIGN PILOTS</h2>
    <div class="meta" style="margin-bottom:12px">${escapeHtml(f.name)}</div>
    ${robotSections}
    <div class="actions" style="margin-top:16px">
      <button class="btn ghost" data-act="cancel-pilot-assign" data-fid="${fid}">CANCEL</button>
      <button class="${deployClass}" data-act="confirm-pilot-assign" data-fid="${fid}" ${deployDisabled}>${deployLabel}</button>
    </div>
  `;
}

handlers["pilot-slot-changed"] = ({ fid, key }, value) => {
  if (!state.modal || state.modal.kind !== "pilot-assign") return;
  state.modal.data.assignments[key] = value || null;
  render();
};

handlers["confirm-pilot-assign"] = ({ fid }) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  const modalData = (state.modal && state.modal.data) || {};
  const assignments = modalData.assignments || {};
  const side = modalData.side || "P1";
  const slots = forceCockpitSlots(f);
  const humanSlots = slots.filter(s => !s.isAi);
  if (humanSlots.some(s => !assignments[`${s.robotId}:${s.componentId}:${s.slotIndex}`])) return;

  if (side === "P2") {
    // Add opponent robots to the existing active battle.
    const b = state.activeBattle;
    if (!b) return;
    const p2Robots = f.robotIds.map(rid => {
      const robot = state.robots.find(r => r.id === rid);
      if (!robot) return null;
      const bs = buildBattleRobotState(robot, "P2");
      bs.cockpitPilots = robotCockpitSlots(robot).map(slot => {
        const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
        return {
          componentId: slot.componentId,
          moduleIndex: slot.moduleIndex,
          slotIndex: slot.slotIndex,
          slotName: slot.slotName,
          pilotId: slot.isAi ? null : (assignments[slotKey] || null),
          isAi: slot.isAi,
          sysStrain: 0,
          pilotStrain: 0,
        };
      });
      return bs;
    }).filter(Boolean);
    for (const br of p2Robots) b.p2Robots.push(br);
    b.p2ForceId = f.id;
    b.p2ForceName = f.name;
    dbPut("battles", b);
    closeModal();
    render();
  } else {
    deployForceWithAssignments(f, assignments);
  }
};

handlers["cancel-pilot-assign"] = ({ fid }) => {
  pushModal("force-editor", { id: Number(fid) });
};

handlers["open-pilots-tab"] = () => {
  closeModal();
  state.tab = "pilots";
  render();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// MODAL ROUTER + INIT
// ════════════════════════════════════════════════════════════════════
renderModal = function () {
  if (!state.modal) return "";
  const { kind, data } = state.modal;
  let body = "";
  switch (kind) {
    case "robot-editor":     body = renderRobotEditor(data.id); break;
    case "add-component":    body = renderAddComponent(data.rid); break;
    case "edit-component":   body = renderEditComponent(data.rid, data.cid); break;
    case "module-picker":    body = renderModulePicker(data.rid, data.cid); break;
    case "equipment-editor": body = renderEquipmentEditor(data.id); break;
    case "pilot-editor":     body = renderPilotEditor(data.id); break;
    case "force-editor":     body = renderForceEditor(data.id); break;
    case "force-add-robot":  body = renderForceAddRobot(data.fid); break;
    case "action-resolve":   body = renderActionResolve(data.id, data.k); break;
    case "strain-dialog":    body = renderStrainDialog(data.id); break;
    case "pilots-dialog":    body = renderPilotsDialog(data.id); break;
    case "shields-dialog":   body = renderShieldsDialog(data.id); break;
    case "cap-dialog":       body = renderCapDialog(data.id); break;
    case "fuel-dialog":      body = renderFuelDialog(data.id); break;
    case "armor-dialog":     body = renderArmorDialog(data.id); break;
    case "move-dialog":      body = renderMoveDialog(data.id); break;
    case "status-picker":    body = renderStatusPicker(data.id); break;
    case "comp-sheet":       body = renderCompSheet(data.id, data.cid); break;
    case "dice-roller":      body = renderDiceRoller(data.id, data.k); break;
    case "pilot-assign":           body = renderPilotAssign(data.fid, data.assignments); break;
    case "opponent-force-picker":  body = renderOpponentForcePicker(); break;
    default: body = "<p>?</p>";
  }
  return `<div class="modal-back"><div class="modal">${body}</div></div>`;
};

async function init() {
  await openDb();
  const [robots, pilots, equipment, forces, battles] = await Promise.all([
    dbGetAll("robots"), dbGetAll("pilots"), dbGetAll("equipment"),
    dbGetAll("forces"), dbGetAll("battles"),
  ]);
  state.robots = robots; state.pilots = pilots; state.equipment = equipment;
  state.forces = forces; state.battles = battles;
  // Normalize legacy battles that predate two-forces schema.
  for (const b of battles) {
    b.p1Robots = b.p1Robots || [];
    b.p2Robots = b.p2Robots || [];
  }
  // If there's a single active battle, resume it.
  if (battles.length === 1) state.activeBattle = battles[0];
  render();
}
init().catch(err => {
  console.error(err);
  document.getElementById("screen").innerHTML = `<div class="empty"><h2>STARTUP ERROR</h2><p>${escapeHtml(err.message)}</p></div>`;
});
</script>
</body>
</html>
