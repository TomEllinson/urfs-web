    // Pass: Robot lands Standing. Clear any DOWN that was prematurely
    // set elsewhere (e.g. a pilot-KO-fall path already toggled DOWN
    // before the fall queue ran). Don't blow away other statuses.
    r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "DOWN" && s !== "FLYING"), "STANDING"];
    showToast(`${r.robotName || r.name || "Robot"} lands STANDING. §43 / L10593`, 2400);
  }
  const conscious = _consciousCockpitPilots(r);
  const fortItems = conscious.map(cp => ({
    phase: "fortitude",
    threshold: fortThreshold,
    cpSlot: _cpSlotKey(cp),
    source: fortSource,
  }));
  r._pendingFortQueue = [...fortItems, ...queue.slice(1)];
  d.lastRoll = null;
  dbPut("battles", state.activeBattle);
  render();
};

// Roll a Fortitude check at the queue head. Result + damage shown
// inline; CONTINUE dequeues and advances.
handlers["fort-seq-roll-fortitude"] = () => {
  const d = state.modal?.data;
  const r = d ? findBattleRobot(state.activeBattle, d.robotId) : null;
  if (!r) return;
  const head = (r._pendingFortQueue || [])[0];
  if (!head || head.phase !== "fortitude") return;
  const cp = _cpBySlotKey(r, head.cpSlot);
  if (!cp) return;
  const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
  const basePool = pilot?.physical || 0;
  // §36 G-Adapted: mirror render's auto-bump so the actual roll matches
  // what the modal advertised. gAdaptedAppliesToSource gates on source.
  const gAdaptedBonus = (pilot && pilotHasGAdapted(pilot.id) && gAdaptedAppliesToSource(head.source)) ? 4 : 0;
  const pool = basePool + gAdaptedBonus;
  const threshold = 5;
  const dice = rollFrameSaveDice(pool);
  const hits = dice.filter(v => v >= threshold).length;
  // §43 resolveFortitudeCheck mutates cp.pilotHpDamage, KO-checks, and
  // fires Cool Head Under Pressure auto-trigger on damage=0.
  const { damage, koTriggered } = resolveFortitudeCheck(cp, head.threshold, { hits });
  d.lastRoll = { dice, hits, threshold, damage, koTriggered };
  if (damage > 0) {
    showToast(`${pilot?.name || "Pilot"} took ${damage} HP — ${cp.pilotHpDamage}/${cp.pilotHpMax}.${koTriggered ? " INCAPACITATED." : ""}`, 3200);
  }
  render();
};

// CONTINUE: dequeue the head, clear lastRoll, render next item.
handlers["fort-seq-next"] = () => {
  const d = state.modal?.data;
  const r = d ? findBattleRobot(state.activeBattle, d.robotId) : null;
  if (!r) return;
  r._pendingFortQueue = (r._pendingFortQueue || []).slice(1);
  d.lastRoll = null;
  dbPut("battles", state.activeBattle);
  render();
};

// SKIP: drop the head item (resolve at the table). Doesn't clear the
// whole queue — only the visible check. Player can re-skip per-item.
handlers["fort-seq-skip"] = () => {
  const d = state.modal?.data;
  const r = d ? findBattleRobot(state.activeBattle, d.robotId) : null;
  if (!r) return;
  const queue = r._pendingFortQueue || [];
  const head = queue[0];
  if (head?.phase === "pick-stand" || head?.phase === "physical") {
    // Skipping the stand check abandons the WHOLE falling resolution —
    // the per-pilot Fortitudes were never enqueued. Drop just the head;
    // the modal closes naturally on next render if the queue empties.
    r._pendingFortQueue = queue.slice(1);
  } else {
    r._pendingFortQueue = queue.slice(1);
  }
  d.lastRoll = null;
  dbPut("battles", state.activeBattle);
  render();
};

// Iter 22 (Tom 2026-06-17): cross-robot queue chaining. When robot A's
// Fortitude queue finishes, scan ALL battle robots (both sides) for any
// with a non-empty _pendingFortQueue and auto-open the modal for the
// FIRST such robot. Without this, an AoE Frame Component destruction
// that queues Neural-Link Fortitudes on two robots simultaneously would
// only resolve the first (the second's queue sits dormant until the
// player happens to trigger another check on it). Returns true if a
// modal was opened.
function _openNextPendingFortQueue() {
  const b = state.activeBattle;
  if (!b) return false;
  const allRobots = [...(b.p1Robots || []), ...(b.p2Robots || [])];
  const next = allRobots.find(r => (r._pendingFortQueue || []).length > 0);
  if (!next) return false;
  pushModal("fortitude-sequence", { robotId: next.robotId, lastRoll: null });
  return true;
}

// DONE: close the sequence modal. If any OTHER robot has a pending
// Fortitude queue, auto-open it instead of fully closing. Loop is
// implicit — each fort-seq-done picks up the next remaining queue.
handlers["fort-seq-done"] = () => {
  closeModal();
  // Defer the chain-open past closeModal's render so state.modal is null
  // when the next pushModal runs (otherwise pushModal would clobber a
  // stale game-over or other modal that closeModal hadn't yet cleared).
  setTimeout(() => {
    if (state.modal) return;
    _openNextPendingFortQueue();
  }, 0);
};

// Iter 22 (Tom 2026-06-17): collect the per-part snapshots from every
// Linked composite on the robot whose constituent matches the roll
// kind ('RANGED' / 'MELEE') AND was opted-in in the per-weapon
// checkboxes. Returns an array of { compositeName, partName, damage,
// damageType, keywords } — one entry per firing part. The selections
// map is keyed `${cid}:${eqIdx}:${partIdx}`; absent key → default-on
// (matches the banner's isOn rule at line 6525-29).
function linkedSelectedPartsForAttack(r, rollKind, selections) {
  if (rollKind !== "RANGED" && rollKind !== "MELEE") return [];
  const wantKw = rollKind === "MELEE" ? "Melee" : "Ranged";
  const sel = selections || {};
  const out = [];
  for (const c of (r.components || [])) {
    if (c.isDestroyed) continue;
    const cid = c.componentId ?? c.tempId;
    for (let eqIdx = 0; eqIdx < (c.equipment || []).length; eqIdx++) {
      const e = c.equipment[eqIdx];
      if (!e?.isLinked || !Array.isArray(e.linkedParts)) continue;
      // Broken composite — armor floor at 0 with armorMax > 0 means dead.
      if (e.armorMax > 0 && (e.armorCurrent ?? 0) <= 0) continue;
      for (let partIdx = 0; partIdx < e.linkedParts.length; partIdx++) {
        const p = e.linkedParts[partIdx];
        if (!(p.keywords || []).includes(wantKw)) continue;
        const key = `${cid}:${eqIdx}:${partIdx}`;
        // Mirror banner's isOn rule: absent = on, explicit false = off.
        const on = !(key in sel) || sel[key] === true;
        if (!on) continue;
        out.push({
          compositeName: e.name || "Linked",
          partName: p.name || "Part",
          damage: Number(p.damage || 0),
          damageType: p.damageType || "Physical",
          keywords: p.keywords || [],
          // Iter 52 (Tom 2026-06-17): per-part silhouette so the roller's
          // Penetrating max-bypass calc can pick true max(silhouette) across
          // opted-in Linked parts instead of falling back to 1. Falls back to
          // the composite equipment's silhouette (parts usually inherit), or
          // the explicit p.silhouette if the part overrides. Backward-compat:
          // existing callers that ignore this field aren't affected.
          silhouette: Number(p.silhouette || e.silhouette || 0),
        });
      }
    }
  }
  return out;
}

    ` : ""}

    <div class="actions">
      <button class="btn ghost" data-act="roller-reset">RESET</button>
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
handlers["roller-pool"] = ({ d }) => {
  _roller.poolBase = Math.max(0, _roller.poolBase + parseInt(d, 10));
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-thresh"] = ({ t }) => {
  _roller.threshold = parseInt(t, 10);
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-toggle-chip"] = ({ id }) => {
  // §57 (Tom 2026-06-17, Ch 11 L33): Sharpshooter is a one-shot Incidental
  // burn — when the player toggles it ON we must (a) verify a free
  // Incidental is available, (b) decrement freeToggleIncidentals,
  // (c) flip r._sharpshooterUsed so the chip doesn't reappear later this
  // game, and (d) refund + un-flip on toggle OFF so a mis-tap is
  // reversible (only within the same roller session — once the player
  // closes the roller, the flag stays committed). Other chips are plain
  // boolean toggles via the fall-through below.
  if (id === "sharpshooter") {
    const r = findBattleRobot(state.activeBattle, state.modal?.data?.id);
    if (!r) return;
    const turningOn = !_roller.chips[id];
    if (turningOn) {
      if ((r.freeToggleIncidentals || 0) <= 0) {
        showToast("Sharpshooter requires a free Incidental — none available.");
        return;
      }
      r.freeToggleIncidentals = (r.freeToggleIncidentals || 0) - 1;
      r._sharpshooterUsed = true;
      _roller.chips[id] = true;
      // §57 talent-burn log entry — Sharpshooter is once-per-game, so
      // a player auditing the log needs to know which Robot burned it
      // and when. Single summary row; the underlying mutation
      // (freeToggleIncidentals -1, _sharpshooterUsed = true) is the
      // observable event.
      recordUndo(`Sharpshooter activated on ${escapeHtml(r.name || "Robot")} (once-per-game)`);
    } else {
      // Mis-tap correction within the same roller session.
      r.freeToggleIncidentals = (r.freeToggleIncidentals || 0) + 1;
      r._sharpshooterUsed = false;
      _roller.chips[id] = false;
    }
    dbPut("battles", state.activeBattle);
    pushModal("dice-roller", state.modal.data);
    return;
  }
  _roller.chips[id] = !_roller.chips[id];
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-roll"] = () => {
  const r = findBattleRobot(state.activeBattle, state.modal.data.id);
  const rollKind = state.modal.data.k ? actionRollKind(state.modal.data.k) : "GENERIC";
  // Iter 23 (Tom 2026-06-17): pass action key for bucket-aware chips
  // (Combat Instinct fires on a.bucket === "reaction", not rollKind).
  const chips = rollKind && r ? rollerComputeChips(r, rollKind, state.modal.data.k) : [];
  const chipDice = chips.filter(c => _roller.chips[c.id]).reduce((s, c) => s + (c.dice || 0), 0);
  const total = _roller.poolBase + chipDice;
  // Iter 22 (Tom 2026-06-17): for attack rolls, ALWAYS run the Linked
  // per-weapon collector — selections may be undefined (player never
  // touched a checkbox = default-all-on), so the helper has to be the
  // source of truth for "what fires." Returns [] if the robot has no
  // matching Linked composite at all, which makes the gate below + the
  // result-panel render no-ops on regular attacks.
  const linkedSel = state.modal?.data?.linkedWeaponSelections || {};
  const linkedFiringParts = r && (rollKind === "RANGED" || rollKind === "MELEE")
    ? linkedSelectedPartsForAttack(r, rollKind, linkedSel)
    : [];
  // Zero-selected Linked attack: per Tom's spec the attack should warn
  // and abort. Only fires when ALL Linked-composite parts of the right
  // type are opted-out AND the robot has at least one such composite —
  // otherwise it's a regular non-Linked attack and we skip the gate.
  if ((rollKind === "RANGED" || rollKind === "MELEE") && r) {
    // Detect "robot has at least one Linked composite with a part of
    // the right kind" — only then is 0-selected a meaningful warning.
    const wantKw = rollKind === "MELEE" ? "Melee" : "Ranged";
    let hasMatchingLinked = false;
    for (const c of (r.components || [])) {
      if (c.isDestroyed) continue;
      for (const e of (c.equipment || [])) {
        if (!e?.isLinked || !Array.isArray(e.linkedParts)) continue;
        if (e.armorMax > 0 && (e.armorCurrent ?? 0) <= 0) continue;
        if (e.linkedParts.some(p => (p.keywords || []).includes(wantKw))) {
          hasMatchingLinked = true;
          break;
        }
      }
      if (hasMatchingLinked) break;
    }
    if (hasMatchingLinked && linkedFiringParts.length === 0) {
      // Check the robot has NON-Linked weapons of the same type — if so,
      // the attack can still fire (just without the Linked composite).
      let hasOtherWeapon = false;
      for (const c of (r.components || [])) {
        if (c.isDestroyed) continue;
        for (const e of (c.equipment || [])) {
          if (e?.isLinked) continue;
          if (e.armorMax > 0 && (e.armorCurrent ?? 0) <= 0) continue;
          if ((e.keywords || []).includes(wantKw)) {
            hasOtherWeapon = true;
            break;
          }
        }
        if (hasOtherWeapon) break;
      }
      if (!hasOtherWeapon) {
        showToast(`No ${wantKw} weapons opted in — Linked composite is the only source and all parts are unchecked. Attack aborted. §14`, 4200);
        return;
      }
    }
  }
  // §26 (Ch 6 L15): if the final dice pool drops to ≤ 0, the target Robot
  // cannot be damaged directly — but cover terrain in the line of fire
  // can still take damage. Webapp has no positional / line-of-fire state,
  // so surface a toast prompting the player to resolve cover damage at
  // the table (mirrors how isValidRangedTarget punts on unknown distance).
  if (total <= 0 && (rollKind === "RANGED" || rollKind === "MELEE")) {
    _roller.lastRoll = { rolls: [], hits: 0, threshold: _roller.threshold, zeroPool: true };
    const kind = rollKind === "RANGED" ? "Ranged" : "Melee";
    showToast(`${kind} pool reduced to 0 — target immune. ${rollKind === "RANGED" ? "Cover in the LoF can be damaged at the table (Ch 6 L15)." : "Whiff — no damage."}`, 4200);
    // §34: zero-pool attack roll is a whiff. If the rolling Robot's
    // side holds Priority, transfer to the opponent.
    if (r) {
      recordUndo(`${r.name || "Robot"} whiff (zero pool)`);
      whiffTransferPriority(state.activeBattle, r);
    }
    pushModal("dice-roller", state.modal.data);
    return;
  }
  const rolls = [];
  for (let i = 0; i < total; i++) rolls.push(1 + Math.floor(Math.random() * 6));
  const baseHits = rolls.filter(v => v >= _roller.threshold).length;
  // §85b (Tom 2026-06-17, Ch 12 L82): Auto — "May make one additional
  // Ranged Attack per instance of this keyword when firing." Tally
  // Auto instances across firing Linked composite parts + non-Linked
  // Ranged equipment (mirrors §85a / §82 Penetrating / §84 Kinetic
  // tally pattern), then auto-fire that many EXTRA dice pools of the
  // same size as the base, separately so per-roll hits surface in the
  // result panel ("Roll 1 (base): X, Roll 2 (Auto): Y, ..., Total =
  // X+Y+..."). Each extra roll uses the same total pool size — the §85a
  // dice modifier chips are already baked into `total`, so the extra
  // rolls inherit them automatically.
  //
  // STRAFE / HIP_SHOT also fire a single Ranged Attack and benefit
  // from Auto extra rolls — gated on rollKind === "RANGED" not action
  // key so any Ranged action with an Auto-tagged weapon picks them up.
  let extraAutoRolls = []; // [[r1,r2,...], [r1,r2,...], ...]
  if (rollKind === "RANGED" && r) {
    let autoN = 0;
    // Linked composite branch — linkedFiringParts is already filtered by
    // linkedSelectedPartsForAttack() to honor per-part opt-out (see
    // ~11893-11895), so opted-out parts are naturally absent here. No
    // additional gate needed.
    for (const p of linkedFiringParts) {
      autoN += (p.keywords || []).filter(x => x === "Auto").length;
    }
    // §85b-followup (Tom 2026-06-17): honor SALVO standalone opt-out per
    // weapon. The picker advisory + Pilot-Strain bill already skip
    // opted-out weapons via salvoWeaponsFiredCount(...,
    // { includeAutoMultiplier: true }), but the roller's standalone Auto
    // tally was iterating r.components directly and ignoring
    // salvoStandaloneSelections — so opting out a standalone Auto weapon
    // showed correct "N-1 weapons firing" in the picker but still rolled
    // N+autoExtras dice pools downstream. Mirror the SALVO picker's gate
    // (~8155-8158): only consult the selection map when k === "SALVO".
    // STRAFE / HIP_SHOT fire a single weapon by rule (no picker, no
    // selection map applies).
    const sasel = state.modal?.data?.salvoStandaloneSelections || {};
    const isSalvo = state.modal?.data?.k === "SALVO";
    for (const c of (r.components || [])) {
      if (c.isDestroyed) continue;
      const cid = c.componentId ?? c.tempId;
      for (let eqIdx = 0; eqIdx < (c.equipment || []).length; eqIdx++) {
        const e = c.equipment[eqIdx];
        if (!e || e.isLinked) continue;
        if ((e.armorMax || 0) > 0 && (e.armorCurrent ?? 0) <= 0) continue;
        const kws = e.keywords || [];
        if (!kws.includes("Ranged")) continue;
        if (isSalvo) {
          const saKey = `${cid}:${eqIdx}`;
          if (saKey in sasel && sasel[saKey] === false) continue;
        }
        autoN += kws.filter(x => x === "Auto").length;
      }
    }
    for (let i = 0; i < autoN; i++) {
      const extra = [];
      for (let j = 0; j < total; j++) extra.push(1 + Math.floor(Math.random() * 6));
      extraAutoRolls.push(extra);
    }
  }
  // Total hits across base + Auto extra rolls. The result panel renders
  // a per-roll breakdown when extraAutoRolls is non-empty; otherwise
  // it falls back to the legacy single-row render.
  const extraHits = extraAutoRolls.reduce(
    (s, arr) => s + arr.filter(v => v >= _roller.threshold).length,
    0,
  );
  const hits = baseHits + extraHits;
  // Iter 22: stash per-part damage on lastRoll so the result panel can
  // list "Weapon A → X dmg, Weapon B → Y dmg, total Z" inline. Only
  // populated on attack rolls with > 0 hits and a non-empty firing-part
  // list — keeps the regular-attack render unchanged.
  let linkedDamage = null;
  if (hits > 0 && (rollKind === "RANGED" || rollKind === "MELEE") && linkedFiringParts.length > 0) {
    const totalDmg = linkedFiringParts.reduce((s, p) => s + p.damage, 0);
    linkedDamage = {
      parts: linkedFiringParts,
      total: totalDmg,
      hits,
    };
    const summary = linkedFiringParts.map(p => `${p.partName} → ${p.damage}`).join(", ");
    showToast(`🔗 LINKED — ${summary}. Total ${totalDmg} dmg per ${hits}-hit attack. §14`, 4600);
  }
  // Iter 51 (Tom 2026-06-17): Roller→apply-damage handoff snapshot.
  // Capture the firing weapons' keywords (Scatter / Penetrating) and
  // attacker Inertia at roll time so the "APPLY DAMAGE TO TARGET"
  // button(s) on the result panel can pre-fill the apply-damage modal
  // without the player re-flagging by hand. Closes the gap from iter 32
  // (Scatter) + iter 39 (Inertia Impact) — both shipped checkbox / type
  // controls but left the burden of remembering to flick them on the
  // player after walking away from the roller.
  //
  // Sources of keywords:
  //   1. Linked composite parts that were opted-in (linkedFiringParts)
  //   2. Non-Linked Equipment on the attacker whose keywords include
  //      the rollKind keyword ("Ranged" / "Melee"). The roller does not
  //      know WHICH specific non-Linked weapon the player is firing
  //      (the action resolves per-weapon at the table), so we union
  //      Scatter / SUM Silhouette across all matching Penetrating
  //      weapons (Ch 12 L66: "Each instance bypasses weapon Silhouette
  //      … if TOTAL bypass exceeds the Component's remaining Armor").
  //      The "Pre-filled from last roll" chip surfaces what was
  //      inherited; the player can untoggle if it doesn't apply.
  let attackContext = null;
  if ((rollKind === "RANGED" || rollKind === "MELEE") && r && hits > 0) {
    const wantKw = rollKind === "MELEE" ? "Melee" : "Ranged";
    let hasScatter = false;
    // §82 (Tom 2026-06-17): Penetrating bypass SUMS across instances per
    // Ch 12 L66 "total bypass". Pre-§82 used Math.max() which under-bypassed
    // multi-Penetrating-instance attacks and multi-part Linked composites.
    let totalPenetratingBypass = 0;
    // Pass 1: Linked composite firing parts (opted-in only).
    for (const p of linkedFiringParts) {
      const kws = p.keywords || [];
      if (kws.includes("Scatter")) hasScatter = true;
      // §82 (Tom 2026-06-17): one part can list Penetrating multiple times
      // (multi-take keyword). Count instances and add Sil × instances to
      // the running total. Mirrors the count-occurrences pattern from
      // calculateEquipmentStats (~index.html:1486).
      const penCount = kws.filter(x => x === "Penetrating").length;
      if (penCount > 0) {
        // Iter 52 (Tom 2026-06-17): per Ch 12 L66 bypass = weapon
        // Silhouette per Penetrating instance. linkedSelectedPartsForAttack
        // carries part silhouette (falling back to composite silhouette,
        // then 1) so the modal pre-fill is accurate for Linked composites
        // with high-Sil parts instead of always defaulting to 1.
        const sil = Math.max(1, Number(p.silhouette || 1));
        totalPenetratingBypass += sil * penCount;
      }
    }
    // Pass 2: Non-Linked equipment matching the rollKind. Iterates the
    // attacker's components → equipment → keywords. Skips broken
    // equipment (armorMax > 0 && armorCurrent <= 0) and destroyed
    // components per the same rule as linkedSelectedPartsForAttack.
    for (const c of (r.components || [])) {
      if (c.isDestroyed) continue;
      for (const e of (c.equipment || [])) {
        if (!e || e.isLinked) continue;
        if ((e.armorMax || 0) > 0 && (e.armorCurrent ?? 0) <= 0) continue;
        const kws = e.keywords || [];
        if (!kws.includes(wantKw)) continue;
        if (kws.includes("Scatter")) hasScatter = true;
        // §82 (Tom 2026-06-17): sum Sil × instance count per Ch 12 L66
        // "total bypass" across every matching Penetrating weapon.
        const penCount = kws.filter(x => x === "Penetrating").length;
        if (penCount > 0) {
          const sil = Math.max(1, Number(e.silhouette || 1));
          totalPenetratingBypass += sil * penCount;
        }
      }
    }
    // Inertia (Melee) only — Ranged hits don't trigger §50 even with
    // attacker Inertia > 0 (rulebook L29 is melee/charge-only).
    let attackerInertia = rollKind === "MELEE" ? Math.max(0, Number(r.inertia || 0)) : 0;
    // §84 (Tom 2026-06-17): Kinetic (Ranged, Ch 12 L82) and Inertia Additive
    // (Melee, Ch 12 L90) each contribute +1 Inertia per instance to the
    // attack's Inertia score. Kinetic is Ranged only; Inertia Additive is
    // Melee only — so we pick the relevant keyword by rollKind. Sum instance
    // counts across firing Linked parts AND non-Linked equipment with the
    // rollKind tag, mirroring the Penetrating tally pattern above.
    //
    // Per Ch 6 L29 §50, only MELEE hits trigger the Pilot Fortitude on
    // cockpit hosts, so the inertiaScore is fed into attackContext for the
    // Apply-Damage modal regardless of rollKind (Ranged Kinetic still
    // surfaces as a chip so the player sees the bonus). The §50 path
    // gates the Fortitude on rollKind === "MELEE" downstream.
    const inertiaKw = rollKind === "RANGED" ? "Kinetic"
      : (rollKind === "MELEE" ? "Inertia Additive" : null);
    if (inertiaKw) {
      let inertiaBonus = 0;
      // Linked composite firing parts (opted-in only).
      for (const p of linkedFiringParts) {
        const kws = p.keywords || [];
        inertiaBonus += kws.filter(x => x === inertiaKw).length;
      }
      // Non-Linked equipment matching the rollKind.
      for (const c of (r.components || [])) {
        if (c.isDestroyed) continue;
        for (const e of (c.equipment || [])) {
          if (!e || e.isLinked) continue;
          if ((e.armorMax || 0) > 0 && (e.armorCurrent ?? 0) <= 0) continue;
          const kws = e.keywords || [];
          if (!kws.includes(wantKw)) continue;
          inertiaBonus += kws.filter(x => x === inertiaKw).length;
        }
      }
      // For Ranged with Kinetic the base attacker.inertia is 0 (the early
      // assignment skips Ranged); we still add the bonus so the chip
      // surfaces it. For Melee the bonus stacks on top of attacker Inertia.
      attackerInertia += inertiaBonus;
    }
    // §85a (Tom 2026-06-17, Ch 12 L82): Auto (Ranged) — tally instances
    // across firing weapons. Single-target = +N dice + N damage / net hit.
    // Multi-target = -1 die per target past the first. The "extra Ranged
    // Attack per instance" sub-mechanic is §85b (deferred — needs new
    // attack-flow scaffolding). Sum instances across Linked composite
    // firing parts AND non-Linked Ranged equipment, mirroring the
    // Penetrating + Kinetic tally pattern above.
    let autoCount = 0;
    if (rollKind === "RANGED") {
      for (const p of linkedFiringParts) {
        const kws = p.keywords || [];
        autoCount += kws.filter(x => x === "Auto").length;
      }
      for (const c of (r.components || [])) {
        if (c.isDestroyed) continue;
        for (const e of (c.equipment || [])) {
          if (!e || e.isLinked) continue;
          if ((e.armorMax || 0) > 0 && (e.armorCurrent ?? 0) <= 0) continue;
          const kws = e.keywords || [];
          if (!kws.includes("Ranged")) continue;
          autoCount += kws.filter(x => x === "Auto").length;
        }
      }
    }
    const tidsCopy = Array.isArray(state.modal?.data?.targetIds)
      ? [...state.modal.data.targetIds]
      : [];
    attackContext = {
      attackerRid: r.robotId,
      rollKind,
      targetIds: tidsCopy,
      scatter: hasScatter,
      penetrating: totalPenetratingBypass > 0,
      bypass: totalPenetratingBypass,
      inertiaScore: attackerInertia,
      autoCount,
    };
  }
  _roller.lastRoll = {
    rolls,
    hits,
    threshold: _roller.threshold,
    linkedDamage,
    attackContext,
    // §85b (Tom 2026-06-17, Ch 12 L82): Auto extra rolls so the result
    // panel can render "Roll 1 (base): X hits, Roll 2 (Auto): Y hits,
    // ..." breakdown. baseHits is the headline count; extraAutoRolls
    // is the per-extra-roll dice array. Empty when no Auto weapons fire.
    baseHits,
    extraAutoRolls,
  };
  // §34: zero-hit Ranged or Melee attack passes Priority to the opponent
  // (only if the rolling Robot currently holds it). Scope: ONLY attack
  // rolls (RANGED / MELEE); Fortitude / Shutdown / Physical / Mental
  // rolls do NOT trigger whiff.
  if (hits === 0 && r && (rollKind === "RANGED" || rollKind === "MELEE")) {
    recordUndo(`${r.name || "Robot"} whiff (0 hits on ${rollKind})`);
    whiffTransferPriority(state.activeBattle, r);
  }
  // §50 / Ch 6 L29 (Tom 2026-06-17): Melee hit with attacker Inertia > 0 →
  // target Pilot Fortitude Check vs attacker Inertia. The dice roller
  // does NOT apply damage (the player opens the apply-damage modal
  // separately); the prompt here directs the player to pick TYPE
  // "Inertia (Melee)" in that modal so the Fortitude is AUTO-enqueued
  // per cockpit pilot of the hit Component. Without that, the §50
  // Fortitude silently drops (multi-pilot cockpits especially).
  if (hits > 0 && rollKind === "MELEE" && r && (r.inertia || 0) > 0) {
    const inr = r.inertia;
    showToast(`⚡ INERTIA IMPACT — Apply Damage on the target, pick TYPE "Inertia (Melee)" (score ${inr}). Per-pilot Fortitude auto-enqueues on cockpit hit. §50 / Ch 6 L29`, 4800);
  }
  // §42 (Tom 2026-06-17): Run / MOVE optional Physical check — +2 × hits SU.
  if (hits > 0 && state.modal?.data?.k === "MOVE") {
    showToast(`Run bonus — +${2 * hits} SU to Move (2 × ${hits} hits). §42`, 3200);
  }
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-reset"] = () => {
  _roller.poolBase = 4;
  _roller.threshold = 5;
  _roller.chips = {};
  _roller.lastRoll = null;
  pushModal("dice-roller", state.modal.data);
};
// Iter 51 (Tom 2026-06-17): roller→apply-damage handoff. Reads the
// _roller.lastRoll.attackContext snapshot captured at roll-time and
// opens the apply-damage modal with Scatter / Penetrating / Inertia
// (Melee) flags pre-applied. The chip "PRE-FILLED FROM LAST ROLL: …"
// renders in renderApplyDamage so the player sees what was inherited.
//
// Idempotency: this handler is the ONLY path that stamps
// prefilledFromRoll=true. The manual handlers["apply-damage"] entry
// point (data-act="apply-damage" on robot-row APPLY DAMAGE button and
// the BLOCK-reaction chain at resolve-action) both leave the flag
// false → the prefill banner stays hidden, default behavior preserved.
//
// Multi-target (Salvo): the result panel renders ONE button per
// targetId; each click opens its own apply-damage modal pre-filled
// with the SAME flag set (correct — the firing weapons' keywords are
// shared across all hits per the rulebook). Block redirect: if the
// player toggles Block in the modal AFTER prefill, the §15.C path
// runs as before — prefill only sets the initial state, not enforced.
function _openApplyDamageWithPrefill(targetRid) {
  const ac = _roller.lastRoll?.attackContext;
  if (!ac) {
    showToast("No roll context — pick APPLY DAMAGE on the robot row instead.", 3000);
    return;
  }
  const tr = findBattleRobot(state.activeBattle, targetRid);
  if (!tr) {
    showToast(`Target Robot ${targetRid} not found — pick a live target.`, 3000);
    return;
  }
  const firstAlive = (tr.components || []).find(c => !c.isDestroyed);
  const defaultCid = firstAlive ? (firstAlive.componentId ?? firstAlive.tempId) : null;
  // Build the prefilledKeywords chip list — drives the amber banner in
  // renderApplyDamage so the player sees a human-readable list of
  // what came through. Only populated entries appear.
  const prefilledKeywords = [];
  if (ac.scatter) prefilledKeywords.push("Scatter");
  if (ac.penetrating) prefilledKeywords.push(`Penetrating (bypass ${ac.bypass})`);
  if (ac.inertiaScore > 0) prefilledKeywords.push(`Inertia Melee (${ac.inertiaScore})`);
  // §50 Inertia (Melee): only auto-select the TYPE if the rollKind was
  // MELEE and attacker Inertia > 0. The §50 Fortitude only fires on a
  // cockpit-host Component hit; the modal's TYPE button respects the
  // player's later choice. RANGED attacks always default to Physical
  // (matches the existing apply-damage default).
  const defaultType = (ac.inertiaScore > 0 && ac.rollKind === "MELEE") ? "Inertia (Melee)" : "Physical";
  pushModal("apply-damage", {
    rid: Number(targetRid),
    cid: defaultCid,
    amount: 1,
    type: defaultType,
    viaBlock: false,
    originalTargetCid: defaultCid,
    viaScatter: !!ac.scatter,
    inertiaScore: ac.inertiaScore || 0,
    viaPenetrating: !!ac.penetrating,
    bypass: ac.penetrating ? ac.bypass : 0,
    prefilledFromRoll: true,
    prefilledKeywords,
  });
}
handlers["apply-damage-from-roller"] = ({ rid }) => {
  _openApplyDamageWithPrefill(Number(rid));
};
handlers["apply-damage-from-roller-pick"] = () => {
  // Fallback path used when no targetIds were declared on the attack.
  // Reads the <select id="apply-damage-from-roller-pick"> the result
  // panel rendered alongside this button.
  const sel = document.getElementById("apply-damage-from-roller-pick");
  if (!sel || !sel.value) {
    showToast("Pick a target Robot first.", 2400);
    return;
  }
  _openApplyDamageWithPrefill(Number(sel.value));
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// STRAIN / TOKENS / SHIELDS / CAPACITORS / FUEL dialogs
// ════════════════════════════════════════════════════════════════════
handlers["show-strain"] = ({ id }) => pushModal("strain-dialog", { id: Number(id) });
handlers["show-pilots"] = ({ id }) => pushModal("pilots-dialog", { id: Number(id) });
handlers["show-shields"] = ({ id }) => pushModal("shields-dialog", { id: Number(id) });

// Collision-dialog form-change handlers. Mutate state.modal.data and

handlers["set-collision-target"] = (_, elValue) => {
  // Iter 31 (Tom 2026-06-17): typed/selected value comes through as the
  // second positional arg from the global change-event delegator (line ~2209).
  // The <select> has no data-value attribute, so dataset.value is always
  // undefined — must read elValue. See apply-damage-set-amount for pattern.
  if (!state.modal?.data) return;
  state.modal.data.targetId = Number(elValue);
  render();
};
handlers["set-collision-kind"] = ({ value }) => {
  if (!state.modal?.data) return;
  state.modal.data.kind = value === "rvt" ? "rvt" : "rvr";
  render();
};
handlers["set-collision-terrain-sil"] = (_, elValue) => {
  // Iter 31 (Tom 2026-06-17): see set-collision-target — read elValue,
  // not dataset.value (always undefined for <input> elements).
  if (!state.modal?.data) return;
  state.modal.data.terrainSil = Math.max(0, Number(elValue) || 0);
  render();
};
handlers["toggle-collision-rear"] = () => {
  if (!state.modal?.data) return;
  state.modal.data.rear = !state.modal.data.rear;
  render();
};

let renderStrainDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return stepperDialog("SYSTEM STRAIN",
    `${r.systemStrain} / ${r.systemStrainThreshold}`,
    "Robot-wide. +1 per action; clears via Strain Vent or a Capacitor spend.",
    "strain", rid);
};
handlers["bump-strain"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.systemStrain = Math.max(0, r.systemStrain + parseInt(d, 10));
  // §43 (Tom 2026-06-17): dual-trigger Emergency Shutdown Check —
  // manually bumping strain past the threshold while Power is already
  // negative triggers immediate Shutdown. The helper also dismisses
  // shutdownPending when both triggers clear (preserves prior behavior).
  checkPostActionShutdownTriggers(state.activeBattle, r);
  dbPut("battles", state.activeBattle);
  pushModal("strain-dialog", { id: Number(id) });
};

let renderPilotsDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  const cockpits = r.cockpitPilots || [];
  if (cockpits.length === 0) {
    // fall back to robot-level tokens
    return stepperDialog("PILOT TOKENS",
      `${r.pilotTokens} / ${r.pilotMental}`,
      "Single-pilot robot. Each action places a token; PASS clears.",
      "tokens", rid);
  }
  return `
    <h2>PILOT STRAIN</h2>
    <p>Action Tokens per pilot. PASS clears.</p>
    ${cockpits.map((cp, i) => {
      const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
      const displayName = pilot?.name ?? "(unassigned)";
      // §31 Coordinated: surfaced strain threshold uses
      // effectivePilotStrainThreshold (Mental × 1.5 while healthy).
      const mental = effectivePilotStrainThreshold(pilot, cp);
      const strain = cp.pilotStrain || 0;
      // §4: surface HP alongside strain so the table sees the canonical
      // KO trigger (HP ≤ 0) not the fake strain threshold.
      const hpMax = cp.pilotHpMax || 0;
      const hpRemaining = hpMax - (cp.pilotHpDamage || 0);
      const koBadge = cp.isKO ? ` <span class="chip red" style="margin-left:6px">KO</span>` : "";
      return `
      <div class="card tight" ${cp.isKO ? `style="opacity:0.5"` : ""}>
        <div class="row-between">
          <strong>${escapeHtml(displayName)}${koBadge}</strong>
          <span>Strain ${strain}${mental ? " / " + mental : ""}${hpMax ? ` · HP ${hpRemaining}/${hpMax}` : ""}</span>
        </div>
        <div class="row-gap" style="margin-top:6px">
          <button class="btn ghost" data-act="bump-pilot-tok" data-id="${rid}" data-p="${i}" data-d="-1">− 1</button>
          <button class="btn ghost" data-act="bump-pilot-tok" data-id="${rid}" data-p="${i}" data-d="1">+ 1</button>
        </div>
      </div>`;
    }).join("")}
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-tokens"] = ({ id, d }) => {

// §16 — Collision calculator. Surfaced from the per-robot INERTIA
// stat-cell. Pure calculator; the user resolves the actual damage at
// the table after seeing the formula breakdown. Chained collisions
// are tracked in the modal's `chain` array so the user can re-target
// the calculator at the next hop without losing context.
let renderCollisionDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const data = state.modal?.data || {};
  const kind = data.kind === "rvt" ? "rvt" : "rvr";
  const rear = !!data.rear;
  const b = state.activeBattle || {};
  const others = [...(b.p1Robots || []), ...(b.p2Robots || [])].filter(x => x.robotId !== r.robotId);
  const targetId = data.targetId || (others[0]?.robotId || 0);
  const target = others.find(x => x.robotId === targetId);
  const cInr = Number(r.inertia || 0);
  const cSil = Number(r.silhouette || 0);

  let breakdown = "";
  let postLines = "";
  if (kind === "rvr") {
    if (!target) {
      breakdown = `<p style="font-size:12px; color:var(--on-surface-muted)">No other Robots on the table to collide with.</p>`;
    } else {
      const tInr = Number(target.inertia || 0);
      const tSil = Number(target.silhouette || 0);
      const calc = computeRobotVRobotCollisionDamage(r, target);
      const cls = classifyCollision(target, rear);
      const silSource = (tInr === 0 && cInr > 0)
        ? `Sil ${calc.useSil} (target stationary → use ${r.name || "collider"}'s Sil)`
        : `Sil ${calc.useSil} (larger Robot)`;
      breakdown = `
        <div class="card tight">
          <div class="label-small label-cyan">CLASSIFICATION</div>
          <div style="margin-top:4px">${cls}
            ${cls === "CHASING" ? `<span class="chip">rear vector + target Inertia ${tInr}</span>` : `<span class="chip muted">default</span>`}
          </div>
        </div>
        <div class="card tight" style="margin-top:6px">
          <div class="label-small label-cyan">DAMAGE</div>
          <div style="margin-top:4px; font-size:18px"><strong>${calc.damage}</strong> to BOTH Robots</div>
          <div class="meta" style="margin-top:4px">(Inertia ${cInr} + ${tInr} = ${calc.involvedInertia}) × ${silSource}</div>
        </div>
        ${cls === "CONVERGING" ? `
          <div class="card tight" style="margin-top:6px">
            <div class="label-small label-cyan">AFTER (CONVERGING)</div>
            <div style="margin-top:4px; font-size:12px">Both Robots reduce Inertia by the greatest Inertia involved (${Math.max(cInr, tInr)}). Negative Inertia → move that many SU opposite, set to 0.</div>
          </div>` : `
          <div class="card tight" style="margin-top:6px">
            <div class="label-small label-cyan">AFTER (CHASING)</div>
            <div style="margin-top:4px; font-size:12px">Collider's Inertia decreases and target's increases by the collider's Inertia used in damage (${cInr}).</div>
          </div>`}
        <div class="card tight" style="margin-top:6px">
          <div class="label-small label-amber">§16.B CHAIN</div>
          <div style="margin-top:4px; font-size:12px">If this collision pushes ${target.name || "target"} into a THIRD Robot, resolve A↔B fully first, then re-open this dialog with the new pair as a Converging hit.</div>
        </div>
      `;
    }
  } else {
    const terrainSil = Math.max(0, Number(data.terrainSil) || 0);
    const calc = computeRobotVTerrainCollisionDamage(r);
    breakdown = `
      <div class="card tight">
        <div class="label-small label-cyan">TERRAIN HIT</div>
        <div style="margin-top:6px; display:flex; gap:8px; align-items:center">
          <label style="font-size:12px; color:var(--on-surface-muted); min-width:100px">Terrain Sil (info)</label>
          <input type="number" min="0" value="${terrainSil}" data-act="set-collision-terrain-sil" style="flex:1; padding:6px" />
        </div>
        <div class="meta" style="margin-top:4px">Terrain Sil is informational only — damage to terrain uses the colliding Robot's Inertia × Sil.</div>
      </div>
      <div class="card tight" style="margin-top:6px">
        <div class="label-small label-cyan">DAMAGE TO TERRAIN</div>
        <div style="margin-top:4px; font-size:18px"><strong>${calc.damage}</strong></div>
        <div class="meta" style="margin-top:4px">Inertia ${cInr} × Sil ${cSil}.</div>
      </div>
      <div class="card tight" style="margin-top:6px">
        <div class="label-small label-amber">AFTER</div>
        <div style="margin-top:4px; font-size:12px">
          ${r.name || "Robot"}'s Inertia drops to <strong>0</strong> (was ${cInr}).<br>
          Pilot makes a <strong>Fortitude Check vs ${calc.lostInertia}</strong>.<br>
          Remaining movement is lost if the terrain isn't destroyed.
        </div>
      </div>
    `;
    postLines = `
      <button class="btn wide amber" style="margin-top:8px" data-act="apply-collision-terrain" data-id="${rid}">APPLY · set Inertia to 0</button>
    `;
  }

  const otherOpts = others.map(o => `<option value="${o.robotId}" ${o.robotId === targetId ? "selected" : ""}>${escapeHtml(o.name || "Robot " + o.robotId)} — Sil ${o.silhouette || "?"}, Inr ${o.inertia || 0}</option>`).join("");

  return `
    <h2>COLLISION CALCULATOR</h2>
    <p style="font-size:12px; color:var(--on-surface-muted)">${escapeHtml(r.name || "Robot")} — Sil ${cSil}, Inertia ${cInr}. <a data-act="open-rulebook" data-line="8349" style="color:var(--cyan); cursor:pointer">§ Collisions</a></p>
    <div style="display:flex; gap:6px; margin:8px 0">
      <button class="btn ${kind === "rvr" ? "amber" : "ghost"}" style="flex:1" data-act="set-collision-kind" data-value="rvr">vs ROBOT</button>
      <button class="btn ${kind === "rvt" ? "amber" : "ghost"}" style="flex:1" data-act="set-collision-kind" data-value="rvt">vs TERRAIN</button>
    </div>
    ${kind === "rvr" ? `
      <div class="card tight">
        <div class="label-small label-cyan">TARGET</div>
        <select data-act="set-collision-target" style="width:100%; padding:8px; margin-top:4px">
          ${otherOpts || `<option>(no other robots)</option>`}
        </select>
        <label style="display:flex; gap:6px; align-items:center; margin-top:8px; font-size:12px">
          <input type="checkbox" ${rear ? "checked" : ""} data-act="toggle-collision-rear" />
          Collider on target's REAR VECTOR
        </label>
      </div>
    ` : ""}
    ${breakdown}
    ${postLines}
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};

// APPLY for the terrain-collision branch: zero the colliding Robot's
// Inertia. (Robot-v-Robot APPLY is intentionally NOT auto-wired —
// damage assignment, Frame Saves, and Inertia mutation per §16.A
// "After a Collision" all run through the existing damage / FS
// pipelines that the user drives manually after seeing the breakdown.)
handlers["apply-collision-terrain"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  if (!r) return;
  const lost = Number(r.inertia || 0);
  r.inertia = 0;
  dbPut("battles", state.activeBattle);
  showToast(`${r.name || "Robot"} — terrain collision: Inertia 0 (was ${lost}). Pilot Fortitude vs ${lost}.`, 3600);
  closeModal();
};

handlers["show-loadout"] = ({ id }) => pushModal("loadout-sheet", { id: Number(id) });
let renderLoadoutSheet = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const allEquip = r.components.flatMap(c => (c.equipment || []).map(e => ({ ...e, _comp: c })));
  // §14: a linked composite counts as a "weapon" row if ANY constituent
  // part has damage > 0, even though the composite's top-level damage
  // mirrors the strongest single part. This avoids misclassifying a
  // shield+gun bundle as utility.
  const hasAnyWeaponDamage = (e) => {
    if ((e.damage || 0) > 0) return true;
    if (e.isLinked && Array.isArray(e.linkedParts)) {
      return e.linkedParts.some(p => (p.damage || 0) > 0);
    }
    return false;
  };
  const weapons = allEquip.filter(hasAnyWeaponDamage);
  const guards  = allEquip.filter(e => (e.keywords || []).includes("Guard") && !hasAnyWeaponDamage(e));
  const utility = allEquip.filter(e => !hasAnyWeaponDamage(e) && !(e.keywords || []).includes("Guard"));
  const eqRow = (e) => {
    const broken = (e.armorCurrent || 0) <= 0 && (e.armorMax || 0) > 0;
    const linkedRows = (e.isLinked && Array.isArray(e.linkedParts))
      ? e.linkedParts.map(p => {
          const ptype = (p.keywords || []).includes("Melee") ? "M" : ((p.keywords || []).includes("Ranged") ? "R" : "·");
          const ammoChip = (p.maxAmmo || 0) > 0 ? ` · AMMO ${p.ammoRemaining ?? p.maxAmmo}/${p.maxAmmo}` : "";
          return `<div class="meta" style="font-size:10px; margin-left:10px">└ [${ptype}] ${escapeHtml(p.name)} · SIL ${p.silhouette} · DMG ${p.damage}${(p.range||0)>0 ? ` · RNG ${p.range}` : ""}${ammoChip}</div>`;
        }).join("")
      : "";
    return `<div class="card tight" style="${broken ? 'opacity:0.55' : ''}">
      <div class="row-between">
        <strong${broken ? ' style="text-decoration:line-through"' : ''}>${escapeHtml(e.name || "Equipment")}${e.isLinked ? ' <span class="chip" style="font-size:9px; margin-left:4px">🔗 LINKED</span>' : ""}</strong>
        <div class="row-gap">
          ${broken ? `<span class="chip red">BROKEN</span>` : ""}
          ${(e.damage||0)>0 ? `<span class="chip">DMG ${e.damage}${e.isLinked ? "*" : ""}</span>` : ""}
          ${(e.range||0)>0  ? `<span class="chip muted">RNG ${e.range}${(() => { const mn = weaponMinRange(e); if (mn <= 0) return ""; const _isIndirect = (e.keywords || []).includes("Indirect"); return _isIndirect ? ` (min ${mn} / Indirect)` : ` (min ${mn})`; })()}</span>` : ""}
          ${(e.armorMax||0)>0 ? `<span class="chip ${broken?'red':e.armorCurrent<e.armorMax?'amber':'muted'}">ARM ${e.armorCurrent}/${e.armorMax}</span>` : ""}
          ${(e.maxAmmo||0)>0 ? `<span class="chip muted">AMMO ${e.ammoRemaining??e.maxAmmo}/${e.maxAmmo}</span>` : ""}

  return `
    <h2>LOADOUT — ${escapeHtml(r.robotName)}</h2>
    <div class="row-gap" style="margin-bottom:8px">
      <span class="chip">${weapons.length} weapon${weapons.length !== 1 ? 's' : ''}</span>
      <span class="chip muted">${allEquip.length} total items</span>
    </div>
    ${allEquip.length === 0 ? `<p class="meta">No equipment installed.</p>` : ""}
    ${section("WEAPONS", weapons)}
    ${section("GUARDS", guards)}
    ${section("UTILITY", utility)}
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
let renderCompSheet = function (rid, cid) {
  const r = findBattleRobot(state.activeBattle, rid);
  const c = r?.components.find(x => x.componentId === cid);
  if (!c) return "<p>?</p>";
  return `
    <div class="label-small" style="margin-bottom:6px;opacity:0.6">← ${escapeHtml(r.robotName)}</div>
    <h2>${escapeHtml(c.name)}</h2>
    <div class="row-gap">
      <span class="chip">${c.definition}</span>
      <span class="chip muted">${c.facing}</span>
      ${c.isFrame ? `<span class="chip">FRAME</span>` : ""}
      ${c.isDestroyed ? `<span class="chip red">DESTROYED</span>` : ""}
    </div>
    ${(() => {
      // §92 (Ch 2 L59-65) — surface the live coordinated facings union
      // so the player sees from-which-facings this Arm can fire mid-
      // battle, including any retained-after-partner-destroyed bonus.
      if (c.definition !== "ARM") return "";
      const base = componentEffectiveFacings(c);
      const eff = componentEffectiveFacings(c, r);
      const gained = eff.filter(f => !base.includes(f));
      if (gained.length === 0) return "";
      const retained = c.retainedSharedFacings ? `<span class="chip" style="background:var(--amber,rgba(245,158,11,0.18)); color:var(--amber,#f59e0b); font-size:10px; margin-left:6px">RETAINED</span>` : "";
      return `<div class="meta" style="font-size:11px; margin-top:6px">FACINGS: ${eff.join("+")}<span class="meta" style="font-size:10px; opacity:0.7"> (base ${base.join("+")} + coord ${gained.join("+")})</span>${retained}</div>`;
    })()}
    <div style="margin:10px 0; padding:10px; background:rgba(0,0,0,0.15); border-radius:var(--bevel)">

      <div class="row-gap" style="margin-top:4px">
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="-1">− 1</button>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="-5">−5</button>
        <strong style="flex:1; text-align:center; font-size:18px">${c.isDestroyed ? "DESTROYED" : c.hpMax === 0 ? "— (no armor)" : `${c.hpCurrent} / ${c.hpMax}`}</strong>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="+1">+ 1</button>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="+5">+5</button>
      </div>
      <button class="btn wide" style="margin-top:6px" data-act="repair-comp" data-id="${rid}" data-cid="${cid}">REPAIR TO MAX</button>
      ${c.isDestroyed ? `
        <button class="btn wide" style="margin-top:6px; background:var(--cyan); color:#07111a" data-act="restore-comp" data-id="${rid}" data-cid="${cid}">UNDO · RESTORE</button>
        <div class="meta" style="font-size:10px; margin-top:2px">Mistake recovery — full HP, no cascade rewind</div>
      ` : ""}
    </div>
    ${(c.modules || []).length > 0 ? `
      <div class="label-small">MODULES</div>
      ${c.modules.map((m, i) => {
        const def = MODULES_BY_ID[m.moduleId];
        return `
          <div class="card tight row-between">
            <div>
              <strong>${escapeHtml(def?.name || m.moduleId)}</strong>
              ${def?.toggleable ? `<span class="chip ${m.toggledOn !== false ? "green" : "muted"}" style="margin-left:8px">${m.toggledOn !== false ? "ON" : "OFF"}</span>` : ""}
            </div>
            ${def?.toggleable ? `<button class="btn ghost" data-act="toggle-mod" data-id="${rid}" data-cid="${cid}" data-mi="${i}">TOGGLE</button>` : ""}
          </div>

      }).join("")}
    ` : ""}
    ${(c.equipment || []).length > 0 ? `
      <div class="label-small" style="margin-top:10px">EQUIPMENT</div>
      ${c.equipment.map((e, i) => {
        const broken = e.armorCurrent <= 0;
        const hasOvercharged = (e.keywords || []).includes("Overcharged");
        return `
        <div class="card tight"${broken ? ` style="opacity:0.6"` : ""}>
          <div class="row-between">
            <strong${broken ? ` style="text-decoration:line-through"` : ""}>${escapeHtml(e.name || ("Equipment " + (i+1)))}</strong>
            <div class="row-gap">
              ${broken ? `<span class="chip red">BROKEN</span>` : ""}
              ${hasOvercharged ? `<span class="chip red" title="Overcharged: +Sil×3 damage per instance. Weapon takes Sil self-damage per firing.">⚡ OVERCHARGED</span>` : ""}
              <span class="chip ${broken ? "red" : e.armorCurrent < e.armorMax ? "amber" : "muted"}">ARM ${e.armorCurrent}/${e.armorMax}</span>
            </div>
          </div>
          <div class="row-gap" style="margin-top:6px">
            <button class="btn ghost" data-act="bump-eq-arm" data-id="${rid}" data-cid="${cid}" data-ei="${i}" data-d="-1" ${broken ? "disabled" : ""}>${broken ? "DAMAGED" : "DAMAGE −1"}</button>
            <button class="btn ghost" data-act="repair-eq" data-id="${rid}" data-cid="${cid}" data-ei="${i}" ${e.armorCurrent >= e.armorMax ? "disabled" : ""}>REPAIR</button>
            ${hasOvercharged && !broken ? `<button class="btn amber" data-act="fire-overcharged" data-id="${rid}" data-cid="${cid}" data-ei="${i}" title="Apply Sil self-damage from one Overcharged firing. If it destroys the weapon, an Explosive attack on this Component is offered for confirmation.">FIRE OVERCHARGED</button>` : ""}

    <div class="actions"><button class="btn ghost" data-act="comp-sheet-done">DONE</button></div>

};
handlers["comp-sheet-done"] = () => {
  closeModal();
  // Scroll schematic back into view so user lands with context, not at page top.
  requestAnimationFrame(() => {
    const el = document.querySelector(".schematic-wrap");
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  });
};
handlers["bump-comp-hp"] = ({ id, cid, d }) => {
  const rid = Number(id);
  const cidNum = Number(cid);
  const r = findBattleRobot(state.activeBattle, rid);
  const c = r.components.find(x => x.componentId === cidNum);
  if (!c) return;
  const delta = parseInt(d, 10);
  if (delta < 0 && c.hpMax > 0 && (c.hpCurrent + delta) <= 0) {
    // Decrement would reach 0 — route through pipeline so Frame Save fires.
    applyDamage(rid, cidNum, Math.abs(delta), "Manual", {});
    // applyDamage calls dbPut + render internally; just reopen the sheet.
    pushModal("comp-sheet", { id: rid, cid: cidNum });
    return;
  }
  c.hpCurrent = Math.max(0, Math.min(c.hpMax, c.hpCurrent + delta));
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: rid, cid: cidNum });
};
handlers["repair-comp"] = ({ id, cid }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.hpCurrent = c.hpMax;
  // Only restore if not destroyed; destruction needs explicit UNDO
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["restore-comp"] = ({ id, cid }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  c.isDestroyed = false;
  c.hpCurrent = c.hpMax;
  // Per alpha.356: cascade collateral (stowed children, fuel-spilled
  // siblings, dropped equipment) is NOT auto-rewound — the player taps
  // each one if they want it back. This restore just clears the host
  // flag, refills its armor, and re-derives shields/cap/strain so the
  // pools snap back to include this component's modules again.
  recomputeDerivedStats(r);
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["toggle-mod"] = ({ id, cid, mi }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  if (!c) return;
  const m = c.modules[parseInt(mi, 10)];
  const def = MODULES_BY_ID[m.moduleId];
  const turningOn = m.toggledOn === false;
  // ON requires: fuel ≥ activation cost, and net power balance stays ≥ 0
  // after activating (def.power is negative for consumers, positive for
  // reactors). OFF flips are always allowed — they free fuel/power back.
  if (turningOn) {
    const fuelCost = def?.fuelToActivate || 0;
    if (fuelCost > 0 && (r.fuelCurrent ?? 0) < fuelCost) {
      showToast(`Not enough fuel (need ${fuelCost}, have ${r.fuelCurrent || 0}).`);
      return;
    }
    // Power: sum of `power` across all ACTIVE non-destroyed modules
    // (toggleable + currently on, or non-toggleable). Then check the
    // candidate's power contribution doesn't push net < 0.
    let netPower = 0;
    for (const comp of (r.components || [])) {
      if (comp.isDestroyed) continue;
      for (const mod of (comp.modules || [])) {
        const mdef = MODULES_BY_ID[mod.moduleId];
        if (!mdef) continue;
        const on = mdef.toggleable ? (mod.toggledOn !== false) : true;
        if (on) netPower += (mdef.power || 0);
      }
    }
    const candidatePower = def?.power || 0;
    if (netPower + candidatePower < 0) {
      showToast(`Not enough power (would drop net to ${netPower + candidatePower}).`);
      return;
    }
    if (fuelCost > 0) r.fuelCurrent = (r.fuelCurrent ?? 0) - fuelCost;
  }
  m.toggledOn = turningOn;
  // §68 (Ch 7 L21): toggling a Coprocessor off mid-battle must update
  // Strain Threshold immediately — recompute derived stats so the
  // post-action Shutdown Check sees the dropped threshold this turn.
  recomputeDerivedStats(r);
  checkPostActionShutdownTriggers(state.activeBattle, r);
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["bump-eq-arm"] = ({ id, cid, ei, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (!e) return;
  e.armorCurrent = Math.max(0, Math.min(e.armorMax, e.armorCurrent + parseInt(d, 10)));
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
handlers["repair-eq"] = ({ id, cid, ei }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const c = r.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (!e) return;
  e.armorCurrent = e.armorMax;
  dbPut("battles", state.activeBattle);
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};

// ── §17 Overcharged firing — self-damage + destruction → Explosive ────
// Per Ch 12 L64: each Overcharged firing deals Sil self-damage to the
// weapon (not per instance). If self-damage destroys the weapon, deal
// the weapon's damage as an Explosive attack on the attached Component;
// internal mount → bypass all armor on that attack. Tom 2026-06-12 SPEC
// TODO: confirmation popup with Undo before resolving the explosion.
handlers["fire-overcharged"] = ({ id, cid, ei }) => {
  const rid = Number(id);
  const cidNum = Number(cid);
  const eiNum = parseInt(ei, 10);
  const r = findBattleRobot(state.activeBattle, rid);
  const c = r?.components.find(x => x.componentId === cidNum);
  const e = c?.equipment[eiNum];
  if (!r || !c || !e) return;
  if ((e.armorCurrent ?? 0) <= 0) {
    showToast("Weapon is already broken — cannot fire.");
    return;
  }
  if (!(e.keywords || []).includes("Overcharged")) {
    showToast("Not an Overcharged weapon.");
    return;
  }
  // Snapshot for Undo (covers self-damage AND any opponent damage the
  // player may already have applied at the table).
  recordUndo(`Overcharged firing — ${escapeHtml(e.name || "weapon")}`);
  const sil = e.silhouette || 1;
  const selfDamage = sil;
  // Apply self-damage to weapon armor.
  const before = e.armorCurrent;
  e.armorCurrent = Math.max(0, before - selfDamage);
  const destroyed = e.armorCurrent <= 0;
  if (!destroyed) {
    dbPut("battles", state.activeBattle);
    showToast(`Overcharged firing — ${escapeHtml(e.name || "weapon")} takes ${selfDamage} self-damage (${e.armorCurrent}/${e.armorMax}).`);
    pushModal("comp-sheet", { id: rid, cid: cidNum });
    return;
  }
  // Destroyed → pop confirmation modal before resolving the Explosive
  // attack on the attached Component.
  const stats = calculateEquipmentStats(e.keywords || [], sil);
  const damage = stats.damage || 0;
  // Mount detection: webapp tracks Mount Point keyword on equipment.
  // `weaponMountType` resolves "INTERNAL" / "EXTERNAL" when a socket
  // module id is present; otherwise fall back to the Mount Point keyword
  // (presence of Mount Point alone doesn't imply internal — surface a
  // null mount as "EXTERNAL" for armor-bypass purposes).
  const mt = weaponMountType(e);
  const isInternal = mt === "INTERNAL";
  pushModal("overcharge-confirm", {
    rid, cid: cidNum, ei: eiNum,
    weaponName: e.name || "weapon",
    componentName: c.name || c.definition || "Component",
    damage,
    isInternal,
  });
};
handlers["overcharge-cancel"] = ({ rid, cid, ei }) => {
  // Cancel: restore self-damage so the firing is fully undone. Opponent
  // damage that the player may have applied at the table is rewound via
  // the recordUndo entry made when FIRE OVERCHARGED was pressed (UNDO
  // button on the battle screen).
  const r = findBattleRobot(state.activeBattle, Number(rid));
  const c = r?.components.find(x => x.componentId === Number(cid));
  const e = c?.equipment[parseInt(ei, 10)];
  if (e) {
    e.armorCurrent = e.armorMax;
    dbPut("battles", state.activeBattle);
  }
  showToast("Overcharged firing CANCELLED — weapon restored. Use UNDO on the battle screen if opponent damage was also applied.");
  pushModal("comp-sheet", { id: Number(rid), cid: Number(cid) });
};
handlers["overcharge-confirm"] = ({ rid, cid, ei }) => {
  const ridNum = Number(rid);
  const cidNum = Number(cid);
  const eiNum = parseInt(ei, 10);
  const r = findBattleRobot(state.activeBattle, ridNum);
  const c = r?.components.find(x => x.componentId === cidNum);
  const e = c?.equipment[eiNum];
  if (!r || !c || !e) return;
  const sil = e.silhouette || 1;
  const stats = calculateEquipmentStats(e.keywords || [], sil);
  const damage = stats.damage || 0;
  const mt = weaponMountType(e);
  const isInternal = mt === "INTERNAL";
  // Internal mount → bypass all armor on the Explosive attack on the
  // attached Component (Ch 12 L64).
  const opts = { type: "Explosive" };
  if (isInternal) opts.bypassArmor = (c.hpCurrent || 0) + (c.hpMax || 0);
  applyDamage(ridNum, cidNum, damage, "Explosive", opts);
  showToast(`Explosive attack on ${escapeHtml(c.name || "Component")} — ${damage} damage${isInternal ? " (internal: bypassed armor)" : ""}.`);
  pushModal("comp-sheet", { id: ridNum, cid: cidNum });
};
function renderOverchargeConfirm(data) {
  const { rid, cid, ei, weaponName, componentName, damage, isInternal } = data;
  return `
    <h2>⚠ WEAPON DESTROYED BY OVERCHARGE</h2>
    <p style="margin-top:6px"><strong>${escapeHtml(weaponName)}</strong> has been destroyed by its own Overcharged self-damage.</p>
    <p style="margin-top:6px">If you confirm, an <strong>Explosive attack</strong> will be applied to <strong>${escapeHtml(componentName)}</strong> for <strong>${damage}</strong> damage.</p>
    ${isInternal ? `<p class="label-small label-amber" style="margin-top:6px">⚠ Internal mount: bypasses all armor on the attached Component.</p>` : `<p style="font-size:12px; color:var(--on-surface-muted); margin-top:6px">External mount: damage resolves through the standard armor pipeline.</p>`}
    <div class="actions" style="margin-top:12px">
      <button class="btn ghost" data-act="overcharge-cancel" data-rid="${rid}" data-cid="${cid}" data-ei="${ei}">CANCEL &amp; UNDO LAST FIRING</button>
      <button class="btn amber" data-act="overcharge-confirm" data-rid="${rid}" data-cid="${cid}" data-ei="${ei}">CONFIRM EXPLOSION</button>
    </div>
  `;
}

function stepperDialog(title, value, brief, bumpAct, rid) {
  return `
    <h2>${title}</h2>
    <p>${escapeHtml(brief)}</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-${bumpAct}" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${value}</strong>
      <button class="btn ghost" data-act="bump-${bumpAct}" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
}
