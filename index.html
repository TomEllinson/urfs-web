# Chapter 10: Terrain

Terrain in URFS is defined by its **Silhouette** — how big it is in Scale Units. There are two types.

## Light Terrain

Light Terrain obscures but does not fully block. Think trees, fences, rubble, light structures.

**Cover:** Light Terrain provides cover only if the terrain's Silhouette is at least half the covered Robot's Silhouette. When a Line of Fire passes through Light Terrain that provides cover, split the attack's damage: half hits the terrain, half hits the Robot. No persistent HP tracking — terrain is either standing or destroyed.

**Destruction:** Light Terrain is **destroyed** if the damage dealt to it in a single shot equals or exceeds 2x its Silhouette. When destroyed, any excess damage beyond the threshold passes through to the Robot. Replace destroyed Light Terrain with Hindering Terrain markers.

**Breach:** A Robot with Strength equal to or greater than the terrain's Silhouette can move through Light Terrain, destroying it. This costs extra movement equal to the terrain's Silhouette in Scale Units.

**Wieldable:** Light Terrain marked as **Wieldable** can be picked up by Robots with sufficient Strength and used as a melee weapon. Wieldable terrain gains the Melee keyword when grabbed, and is destroyed after a successful attack (it takes equal damage back).

## Heavy Terrain

Heavy Terrain blocks Lines of Fire. Think buildings, thick walls, solid rock.

**Cover:** If a Line of Fire passes through Heavy Terrain, reduce the target Robot's effective Silhouette by the terrain's Silhouette. Cover only applies if the terrain's Silhouette is at least half the covered Robot's Silhouette. If the target's modified Silhouette is 0 or less, they **cannot be targeted**.

**Destruction:** Heavy Terrain is **destroyed** if it takes damage equal to 5x its Silhouette in one instance. Replace with Hindering Terrain markers. Heavy Terrain cannot be breached by movement — destroy it first, then move through the rubble.

## Hindering Terrain

Hindering Terrain (rubble, wreckage, destroyed terrain) costs **2x movement** to pass through.

## Terrain and Melee

Terrain does not meaningfully affect melee combat between Robots. It matters for Lines of Fire and ranged cover, not close-quarters fighting.

# Chapter 11: Pilot Talents

Pilots can have Talents that give them an edge in battle. The number of Talents a Pilot can have is limited by their Talent Slots (2 for Rookies, 4 for Experienced, 6 for Veterans). Talents cost additional BP added to the Pilot's base cost. Some Talents have stat requirements.

AI Pilots cannot have Talents.

## Physical Talents

**Tank** (+5 BP) — Pilot HP is Physical x 3 instead of Physical x 2.

**Neural Link** (+7 BP) — Physical is used instead of Mental for determining when Pilot Strain causes damage. If a Frame Component on this Pilot's Robot is destroyed, the Pilot makes a Fortitude Check against (remaining Frame Components + 3) and takes the difference as damage.

**Fast Fingers** (+2 BP) — Whenever you take a Toggle action, you may take 2 instead.

**G-Adapted** (+4 BP) — +4 dice to Fortitude Checks made to resist Inertia changes or Vector changes while Flying.

**Cool Head Under Pressure** (+5 BP) — When this Pilot rolls a Fortitude Check after taking a Reaction and takes no damage, remove one Action Token from the Pilot.

**Quick Troubleshooter** (+2 BP) — When the Robot would check for Emergency Shutdown due to power loss, you may perform Toggles equal to 2x Pilot Mental before making the check. If Power output is neutral or positive after this, skip the Shutdown Check.

**Martial Artist** (+5 BP) — Add Physical to Training for checks made for Melee Attacks and Parry.

**Gunslinger** (+5 BP) — When taking the Salvo action, if you must make a Mental check for more targets than your Mental stat, add +1 die to the check for each target past the first.

**Deadeye** (+6 BP) — After rolling a single-target Ranged Attack, you may add an additional Action Token to this Pilot to make the attack Unblockable.

**Coordinated** (+4 BP) — While Pilot HP is above half, this Pilot's Strain threshold is 1.5x Mental (rounded up) instead of Mental.

**Coolant Manager** (+5 BP) — Once per Priority Action, you may perform a Heat Vent as an additional Incidental. The Pilot takes 1 damage each time this talent is used.

**Sharpshooter** (+3 BP) — When taking the Salvo Action targeting only 1 target, you may burn your free Incidental. If you do, add +3 dice to the attack. Only works at Inertia 0.

## Mental Talents

**Calm Under Fire** (+5 BP) — This Pilot's Strain threshold is Mental + 2. Always active, no conditions. The pilot who stays cool longest.

**Overclock** (+3 BP) — Once per game, this Pilot may double their Mental stat for a single Emergency Shutdown check. The Pilot takes 2 damage regardless of outcome.

## Training Talents

**Ace Pilot** (+10 BP) — +5 Stat Points. Takes two Talent Slots.

**Brawler** (+3 BP) — When making a melee attack with no Grabbed weapon (bare arm), add half Strength to the attack's Damage.

**Combo Fighter** (+5 BP) — When making a Melee Assault with a weapon held in more than one Manipulator, make one separate attack per Manipulator with that weapon.

**Commander** (+10 BP) — While this Pilot is conscious, other Pilots on the same team may use this Pilot's Mental stat as their Strain threshold. When the Commander is incapacitated, all Pilots using this threshold immediately revert to their own Mental. Any Pilot whose current token count exceeds their own Mental takes Strain damage for each token over — all at once.

**Fighter Pilot** (+2 BP) — While at Altitude > 0, when hit by an attack from your Rear Vector, make a Training Check and reduce damage by the number of hits.

**Commando** (+2 BP) — After deployment, move up to maximum Ground Speed before the game starts.

**Heavy Weapons Specialist** (+4 BP) — If your Robot has a weapon with a larger Silhouette than the Robot's own, add +2 dice when attacking with it.

**Disarm** (+3 BP) — When making a Melee Attack, you may instead make an opposed Training Check to end a target's Grab on a piece of Equipment. If your hits exceed theirs, that Grab ends and the Equipment may be Dropped.

## General Talents

**Last Stand** (+4 BP) — When this Pilot's HP is at 10% or less (rounded up, minimum 1), add +3 dice to all attack rolls. The desperate final push.

**Shield Rider** (+3 BP) — While the Robot has Shields remaining, this Pilot's Strain threshold is increased by 2.

**Evasive Instinct** (+3 BP) — When this Pilot's Robot has Inertia > 0, add Inertia as bonus dice to Dodge and Boost Dodge Reactions.

## Strain-Keyed Talents

**Berserker Protocol** (+6 BP) — When this Pilot has Strain Tokens (Action Tokens beyond Mental), add dice equal to Strain Token count to any attack roll. The Pilot takes damage equal to the dice added. The desperation swing.

**Combat Instinct** (+5 BP) — When this Pilot has Strain Tokens, add dice equal to Strain Token count to Reaction rolls. The Pilot takes 1 damage per Reaction taken while over Mental threshold.

**Override** (+4 BP) — When making an Emergency Shutdown check, add Strain Token count as bonus dice. The Pilot takes 1 damage per Shutdown check made with this talent.

# Chapter 12: Equipment Keywords

Equipment is defined by Keywords. Keywords with **(W)** designate Equipment as a Weapon. Keywords with **(M)** may be taken multiple times.

**Equipment costs** = number of Keywords x Silhouette in BP.
**Max Keywords** = 3 x Equipment Silhouette.
**Equipment Weight** = its Silhouette (unless modified).
**Equipment Armor** = 5 (default). Immune to Burst damage.

Weapons may not be used to Block.

When calculating damage from Keywords, multiplication occurs after all other modifications.

## Weapon Type Keywords

**Melee (W)** — Weapon may be used in Melee. Deals Silhouette in Damage. Immune to Physical Damage.

**Ranged (W)** — Weapon is a Ranged Weapon. Range = Sil x 3. Deals Silhouette in Damage.

## Damage Modifier Keywords

**Edge** — +Sil Damage. Requires Melee.

**Energy Edge** — Damage counts as Energy instead of Physical. +Sil Damage. Power -5. Immune to Energy Damage while Parrying. Requires Edge. Cannot combine with Energy Weapon.

**Energy Weapon (M)** — Damage is Energy. +2 Damage x Sil. Melee Energy Weapons are immune to Energy Damage and weight is divided by 3. Energy Weapons impart no Inertia. Power: -5 x Sil. Requires Melee or Ranged.

**Explosive** — Deals Damage to hit Component, half Damage to any attached Component. Pilot checks against half Damage received to cockpit-containing Component as Inertia. Requires Ranged.

**Scatter** — Damage = 2 x Sil, but Range = Sil x 2 (shorter than standard). Hits all targetable Components of target on success. Requires Ranged.

**Limited Ammo** — +2 x Sil Damage, but may only fire half Silhouette times. Requires Ranged.

**Two-handed** — Multiply Damage by 2. Melee weapons may still be wielded one-handed but lose the multiplier. Requires Melee or Ranged.

**Overcharged (M)** — +Sil Damage per instance. Weapon takes Sil damage to itself each time it is used. Small weapons punch above their weight but burn out fast. Requires Melee or Ranged.

**Penetrating (M)** — Each instance bypasses weapon Silhouette in Component Armor. If total bypass exceeds the Component's remaining Armor, Frame Components make a Frame Save; Non-Frame Components are destroyed outright. Requires Ranged.

## Range and Reach Keywords

**Extended Range (M)** — +Sil to Range per instance. Requires Ranged.

**Long Range** — Double the weapon's Range (after keyword modifiers). Minimum range equals the pre-doubled range. Requires Ranged.

**Reach Extender (M)** — +half weapon Sil to Reach per instance. Requires Melee.

## Projectile Keywords

**Auto (M)** — May target one additional target per Ranged Attack per instance of this keyword, removing 1 die per additional target. When firing on a single target, add +1 die per instance and +1 Damage per net hit. Requires Ranged.

**Burst** — Projectile explodes on impact, dealing Damage to everything within 1 SU per Silhouette. Damage decreases by 1 Sil per SU from impact. Pilot can target a specific map point for -2 dice (any hits succeed). Place a die at impact point and draw Lines of Fire from all horizontal faces. Requires Ranged.

**Indirect** — Ignore Lines of Fire; target any legal target within range. Attack gets -2 dice. Requires Ranged.

**Kinetic (M)** — Hits apply +1 Inertia per instance (does not increase Damage, but forces a Fortitude Check). If the firing Robot is Flying, it moves 1 SU per instance in the opposite direction. Does nothing on Energy Weapons. Requires Ranged.

**Inertia Additive (M)** — +1 Inertia per instance added to a Melee hit. Does not increase Damage; affects Fortitude Checks only. Requires Melee.

## Mounting and Attachment Keywords

**Mount Point** — Equipment may be mounted on a Socket. Assumed to have no handle; cannot be operated if unmounted.

**Extending Grip** — Makes Mount Point equipment drawable/holsterable. May also be Grabbed. If a Weapon, treat the Mount Point as a Manipulator for bonus dice. Requires Mount Point.

**Link Point** — May link to another piece of Equipment with Link Point. Linked Equipment is treated as one piece; Silhouette = greatest of its parts, but each piece calculates Damage from its own Sil. Requires one Link Point per attached piece. Linked Weapons fire with one Attack check but deal damage as separate instances.

**Tethered** — Equipment can mount to a Tether Socket, receiving Power and Fuel.

**Corded** — Tethered Equipment cannot move outside the Robot's Reach. Requires Tethered.

## Utility Keywords

**Power Cell (M)** — +5 Power.

**Armored (M)** — +5 Equipment Armor. +1 Weight.

**Guard** — Equipment guards the Component it is grabbed by or attached to. If on a Core Mount Point, guards that facing. Guarding Equipment takes damage in place of the Guarded Component.

**Energy-Reflective Coating** — Equipment is immune to Energy Damage while Armor is at full.

**Module Slot** — Adds a Module Slot to this Equipment. Reduces max keywords by 1.

**Extended Magazine (M)** — Weapon may fire an additional half Silhouette times before depleting. +1 Weight. Requires Limited Ammo.

## Priority Pass Conditions
1. Pass action taken
2. Non-Priority Robot deals damage to Priority Robot
3. Priority Robot whiffs an attack (zero hits on attack roll)

5. Game effect explicitly causes pass

// Build a line→index map and section list from RULEBOOK_MD at load time.
// Sections = lines starting with "# " or "## ".
const _rbLines = RULEBOOK_MD.split('\n');
const _rbSections = [];
(function() {
  let curSection = null;
  for (let i = 0; i < _rbLines.length; i++) {
    const line = _rbLines[i];
    if (/^## /.test(line)) {
      if (curSection) curSection.endLine = i - 1;
      curSection = { title: line.replace(/^#+\s*/, ''), startLine: i + 1, endLine: _rbLines.length - 1, level: 2 };
      _rbSections.push(curSection);
    } else if (/^# /.test(line)) {
      if (curSection) curSection.endLine = i - 1;
      curSection = { title: line.replace(/^#+\s*/, ''), startLine: i + 1, endLine: _rbLines.length - 1, level: 1 };
      _rbSections.push(curSection);
    }
  }
})();

// Minimal regex-based markdown renderer. Handles #/##/###, **bold**, *italic*,
// `code`, tables (simplified), list items, hr, paragraph line breaks.
function renderMd(text) {
  const lines = text.split('\n');
  let out = '';
  let inList = false;
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code style="background:rgba(77,208,225,0.10);padding:1px 4px;border-radius:3px;font-family:monospace">$1</code>');
    if (/^---+$/.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += '<hr style="border:none;border-top:1px solid var(--surface-3);margin:10px 0">'; continue; }
    if (/^### /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<strong style="display:block;margin:8px 0 4px;color:var(--on-surface)">${line.replace(/^###\s*/,'')}</strong>`; continue; }
    if (/^## /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<div style="font-weight:800;color:var(--cyan);font-size:13px;margin:10px 0 4px;letter-spacing:0.04em">${line.replace(/^##\s*/,'')}</div>`; continue; }
    if (/^# /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<div style="font-weight:800;color:var(--cyan);font-size:15px;margin:14px 0 6px;letter-spacing:0.02em">${line.replace(/^#\s*/,'')}</div>`; continue; }
    if (/^\| /.test(raw)) { if (inList) { out += '</ul>'; inList = false; } out += `<div style="font-size:11px;color:var(--on-surface-muted);font-family:monospace;white-space:pre-wrap;padding:1px 0">${line}</div>`; continue; }
    if (/^- /.test(raw)) { if (!inList) { out += '<ul style="padding-left:16px;margin:4px 0">'; inList = true; } out += `<li style="margin:2px 0;font-size:13px;color:var(--on-surface)">${line.replace(/^-\s*/,'')}</li>`; continue; }
    if (/^\d+\. /.test(raw)) { if (!inList) { out += '<ol style="padding-left:16px;margin:4px 0">'; inList = true; } out += `<li style="margin:2px 0;font-size:13px;color:var(--on-surface)">${line.replace(/^\d+\.\s*/,'')}</li>`; continue; }
    if (inList) { out += '</ul>'; inList = false; }
    if (raw.trim() === '') { out += '<div style="height:6px"></div>'; continue; }
    out += `<p style="margin:3px 0;font-size:13px;color:var(--on-surface)">${line}</p>`;
  }
  if (inList) out += '</ul>';
  return out;
}

handlers["open-rulebook"] = ({ line }) => {
  pushModal("rulebook", { line: line ? Number(line) : null });
};

function renderRulebookModal(targetLine) {
  const searchId = "rb-search-" + Date.now();
  // Build section accordion HTML. Each ## heading is a collapsible section.
  // targetLine (if set) will auto-expand the containing section.
  const sectionHtml = _rbSections.filter(s => s.level === 1).map((s, si) => {
    const sectionLines = _rbLines.slice(s.startLine - 1, s.endLine + 1);
    const lineNum = s.startLine;
    // Find sub-sections (## headings within this chapter).
    const sectionMd = sectionLines.join('\n');
    const autoOpen = targetLine != null && targetLine >= s.startLine && targetLine <= s.endLine;
    const anchorId = `rb-sec-${si}`;
    return `
      <div class="bucket primary${autoOpen ? ' open' : ''}" id="${anchorId}" style="margin-bottom:6px">
        <div class="header" style="cursor:pointer" onclick="this.parentElement.classList.toggle('open');this.nextElementSibling.style.display=this.parentElement.classList.contains('open')?'block':'none'">
          <span style="font-size:11px;color:var(--on-surface-dim);font-family:monospace;min-width:32px">L${lineNum}</span>
          ${escapeHtml(s.title)}
        </div>
        <div style="display:${autoOpen?'block':'none'};padding:8px 12px">
          ${renderMd(sectionMd)}
        </div>
      </div>`;
  }).join('');

  const targetSecIdx = targetLine != null
    ? _rbSections.findIndex(s => s.level === 1 && targetLine >= s.startLine && targetLine <= s.endLine)
    : -1;
  const scrollAttr = targetSecIdx >= 0 ? `data-rb-scroll="rb-sec-${targetSecIdx}"` : "";

  return `
    <h2>📖 RULEBOOK</h2>
    <input id="${searchId}" type="text" placeholder="Search rulebook…"
      style="width:100%;background:var(--surface-1);border:1px solid var(--surface-3);border-radius:var(--bevel);padding:8px 10px;color:var(--on-surface);margin-bottom:10px"
      oninput="(function(q){
        const sections = document.querySelectorAll('#rb-sections-list > div.bucket');
        q = q.toLowerCase();
        sections.forEach(sec => {
          if(!q) { sec.style.display=''; return; }
          const text = sec.textContent.toLowerCase();
          sec.style.display = text.includes(q) ? '' : 'none';
          if(text.includes(q)) { sec.classList.add('open'); sec.children[1].style.display='block'; }
        });
      })(this.value)" />
    <div id="rb-sections-list" style="overflow-y:auto;max-height:62vh" ${scrollAttr}>
      ${sectionHtml}
    </div>
    <div class="actions" style="margin-top:10px">
      <button class="btn ghost" data-act="modal-close">CLOSE</button>
    </div>
  `;
}
</script>
