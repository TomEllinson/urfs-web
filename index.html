<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0A1118" />
<title>URFS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='2' fill='%230A1118'/%3E%3Ctext x='32' y='42' font-family='ui-monospace,monospace' font-size='28' font-weight='700' text-anchor='middle' fill='%23FFA13B'%3EU%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800&family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<!--
  URFS — web parity build
  Single-file workaround for iOS testers (no Mac, no native iOS build).
  Mirrors the Android app's visual treatment + interaction model. Data
  persists in IndexedDB; one URL per device. Ship-as-single-file so
  GitHub Pages just serves a static asset.
  ---
  Version: 0.2.7 (2026-06-09) — armor health bars on schematic component nodes
    typography, chamfered chips, register-bracket cards, phosphor amber + comm cyan two-channel ink.
  Version: 0.2.1 (2026-06-08) — Module catalog parity: added targeting_comp, melee_comp, fuel_gen, fuel_reactor,
    component_toggle_system, component_stow_slot, multi_toggle_system, facing_rotation_system,
    guarding_component_structure, aerodynamic_profile, system_strain_coprocessor.
    + Computer dice chips now use module IDs (+2 dice each, not equipment name strings).
    + fuel_powered_generator/fuel_gen burn fuel each round; auto-deactivate at 0.
    + fuel_reactor generates +4 fuel per Pass action.
    + validateRobot warns on multi_toggle_system installs.
  Version: 0.2.0 (2026-06-08) — UX polish: action tabs, comp breadcrumb, fuel/cap display fixes, priority chip
    + JSON export/import (top of Garage). Round-trips everything.
    + Image picker on robot editor (data URL, fully local).
    + Dice roller with applicable bonus chips per robot/context.
    + 2D schematic in robot editor + per-robot battle screen.
  Source of truth for rules: ../android/app/src/main/assets/rulebook.md
-->
<style>
  /* ── ZOID CORE OS — palette (2026-06-08) ────────────────────────── */
  :root {
    /* New canonical tokens */
    --hull:           #0A1118;
    --hull-dim:       #070C12;
    --hull-bright:    #152133;
    --bulkhead:       #1E2C42;
    --register-mark:  #3B4D6A;
    --phosphor-amber: #FFA13B;
    --comm-cyan:      #5BD8FF;
    --squad-gold:     #F0CC55;
    --critical-red:   #E64545;
    --frame-white:    #E8EEF6;
    --frame-muted:    #9AAFC6;
    --frame-dim:      #5A6F89;
    /* Legacy alias shim — existing class refs still resolve */
    --surface-0:      var(--hull);
    --surface-1:      var(--hull-bright);
    --surface-2:      #1B2B3E;   /* mid-tone between hull-bright + bulkhead */
    --surface-3:      var(--bulkhead);
    --on-surface:     var(--frame-white);
    --on-surface-muted: var(--frame-muted);
    --on-surface-dim: var(--frame-dim);
    --cyan:           var(--comm-cyan);
    --cyan-dim:       #3AADDE;
    --amber:          var(--phosphor-amber);
    --warn-amber:     var(--phosphor-amber);
    --orange:         var(--phosphor-amber);  /* action/reaction — warm channel */
    --green:          var(--squad-gold);      /* ready/ok state → squad gold */
    --red:            var(--critical-red);
    --bevel:          2px;   /* hard corners everywhere */
  }

  /* ── Base reset ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--hull); color: var(--frame-white);
    font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont,
      "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.4;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  body { padding-bottom: env(safe-area-inset-bottom); }
  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; }
  a { color: var(--comm-cyan); text-decoration: none; }

  /* ── Layout ─────────────────────────────────────────────────────── */
  #app {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
  }
  .titlebar {
    padding: 14px 16px 8px;
    display: flex; align-items: baseline; gap: 6px;
    border-bottom: 1px solid var(--bulkhead);
  }
  .titlebar .brand {
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-size: 24px; font-weight: 800; color: var(--phosphor-amber);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .titlebar .suffix {
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 10px; color: var(--frame-dim); font-weight: 400;
    margin-left: auto;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .titlebar .suffix.amber { color: var(--phosphor-amber); }

  main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 0 16px 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Bottom nav ─────────────────────────────────────────────────── */
  .botnav {
    position: sticky; bottom: 0;
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: var(--hull-bright);
    border-top: 2px solid var(--bulkhead);
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 10;
  }
  .botnav button {
    background: transparent; border: none; color: var(--frame-dim);
    padding: 8px 4px; display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 9px; font-weight: 400;
    letter-spacing: 0.06em; text-transform: uppercase;
    border-top: 2px solid transparent;
    margin-top: -2px;
    transition: color 0.1s;
  }
  .botnav button .ic {
    font-size: 18px; line-height: 1;
  }
  .botnav button[aria-current="page"] {
    color: var(--phosphor-amber);
    border-top-color: var(--phosphor-amber);
    text-shadow: 0 0 8px rgba(255,161,59,0.5);
  }

  /* ── Headings ───────────────────────────────────────────────────── */
  h2, h3 {
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--phosphor-amber);
  }

  /* ── Generic UI primitives ──────────────────────────────────────── */
  .card {
    background: var(--hull-bright);
    border: 1px solid var(--bulkhead);
    border-radius: var(--bevel);
    padding: 12px;
    margin-bottom: 10px;
  }
  .card.tight { padding: 10px; }
  .card.row { display: flex; gap: 12px; align-items: flex-start; }
  .card.friendly { border-left: 3px solid var(--comm-cyan); }
  .card.opposing { border-left: 3px solid var(--critical-red); }

  /* Chips — chamfered corners via clip-path, Space Mono */
  .chip {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    /* chamfer: top-right + bottom-left */
    clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 4px 100%, 0 calc(100% - 4px));
    background: rgba(91,216,255,0.14);
    color: var(--comm-cyan);
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    border: none;  /* clip-path replaces border radius; keep visual weight via bg */
    outline: 1px solid rgba(91,216,255,0.30);
    outline-offset: -1px;
  }
  .chip.amber {
    background: rgba(255,161,59,0.14); color: var(--phosphor-amber);
    outline-color: rgba(255,161,59,0.35);
  }
  .chip.orange {
    background: rgba(255,161,59,0.14); color: var(--phosphor-amber);
    outline-color: rgba(255,161,59,0.35);
  }
  .chip.red {
    background: rgba(230,69,69,0.14); color: var(--critical-red);
    outline-color: rgba(230,69,69,0.35);
  }
  .chip.green {
    background: rgba(240,204,85,0.14); color: var(--squad-gold);
    outline-color: rgba(240,204,85,0.35);
  }
  .chip.muted {
    background: rgba(90,111,137,0.18); color: var(--frame-dim);
    outline-color: rgba(90,111,137,0.30);
  }
  .chip.primary {
    background: rgba(255,161,59,0.22); color: var(--phosphor-amber);
    outline-color: rgba(255,161,59,0.60);
  }

  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .row-gap { display: flex; align-items: center; gap: 8px; }
  .label-small {
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.08em; font-weight: 400;
    color: var(--frame-muted); text-transform: uppercase;
  }
  .label-cyan { color: var(--comm-cyan); }
  .label-amber { color: var(--phosphor-amber); }
  .label-red { color: var(--critical-red); }

  .stat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .stat-cell {
    background: var(--hull-dim);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    padding: 6px 8px;
    display: flex; align-items: center; gap: 6px;
    font-weight: 700;
    cursor: pointer; user-select: none;
  }
  .stat-cell .lbl {
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 9px; color: var(--frame-dim); text-transform: uppercase;
  }
  .stat-cell .val {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px;
  }
  .stat-cell.over .val { color: var(--critical-red); }
  .stat-cell.warn .val { color: var(--phosphor-amber); }
  .stat-cell.ok .val { color: var(--frame-white); }
  .stat-cell.cyan .val {
    color: var(--comm-cyan);
    filter: drop-shadow(0 0 4px rgba(91,216,255,0.30));
  }

  /* ── Buttons ────────────────────────────────────────────────────── */
  .btn {
    background: var(--hull-bright); color: var(--comm-cyan);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    padding: 8px 14px;
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-weight: 800; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .btn.primary {
    background: var(--phosphor-amber); color: var(--hull);
    border-color: var(--phosphor-amber);
  }
  .btn.primary:not(:disabled):hover {
    filter: drop-shadow(0 0 6px rgba(255,161,59,0.50));
  }
  .btn.amber {
    background: var(--phosphor-amber); color: var(--hull);
    border-color: var(--phosphor-amber);
  }
  .btn.danger {
    background: transparent; color: var(--critical-red);
    border-color: var(--critical-red);
  }
  .btn.ghost {
    background: transparent; color: var(--frame-muted);
    border-color: var(--bulkhead);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.wide { width: 100%; }

  /* ── Modal ──────────────────────────────────────────────────────── */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(7,12,18,0.80);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  .modal {
    background: var(--hull-bright);
    border-radius: 2px 2px 0 0;
    width: 100%; max-width: 540px;
    padding: 16px;
    max-height: 86vh; overflow-y: auto;
    border-top: 2px solid var(--phosphor-amber);
    border-left: 1px solid var(--bulkhead);
    border-right: 1px solid var(--bulkhead);
    margin-bottom: env(safe-area-inset-bottom);
    position: relative;
  }
  /* register brackets on modal */
  .modal::before, .modal::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--register-mark);
    border-style: solid;
    pointer-events: none;
  }
  .modal::before { top: 4px; left: 4px; border-width: 2px 0 0 2px; }
  .modal::after  { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; }
  /* Iter 36 — Inline Rulebook Reference Peek overlay. Sits ABOVE the
     modal layer so a peek can pop without closing the underlying modal. */
  .rule-peek-back {
    position: fixed; inset: 0;
    background: rgba(7,12,18,0.55);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 110;
    padding: 12px;
  }
  .rule-peek {
    background: var(--hull-bright);
    border-radius: 4px;
    width: 100%; max-width: 540px;
    padding: 14px 16px;
    max-height: 60vh; overflow-y: auto;
    border: 1px solid var(--phosphor-amber);
    border-top: 2px solid var(--phosphor-amber);
    margin-bottom: env(safe-area-inset-bottom);
    position: relative;
    box-shadow: 0 -4px 28px rgba(0,0,0,0.65);
  }
  .rule-peek h3 {
    margin: 0 0 6px;
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-weight: 800; text-transform: uppercase;
    color: var(--phosphor-amber);
    font-size: 14px; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 8px;
  }
  .rule-peek .peek-cite {
    font-size: 10px;
    color: var(--on-surface-muted);
    font-family: monospace;
    letter-spacing: 0.02em;
  }
  .rule-peek .peek-body {
    font-size: 12px;
    color: var(--on-surface);
    line-height: 1.45;
    margin: 6px 0 0;
    padding: 6px 8px;
    background: var(--surface-1);
    border-left: 2px solid rgba(255,193,7,0.5);
    border-radius: 2px;
    white-space: normal;
  }
  .rule-peek .peek-actions {
    display: flex; gap: 8px; margin-top: 10px;
    justify-content: flex-end;
  }
  /* Rule-peek chip: small inline tap target the player taps to expand
     the canonical rulebook snippet. Same visual family as `.chip` but
     with a tap-affordance dotted underline. */
  .rule-chip {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(255,193,7,0.10);
    color: var(--phosphor-amber);
    border: 1px solid rgba(255,193,7,0.25);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 10px;
    font-weight: 700;
    font-family: monospace;
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
    text-decoration: none;
    vertical-align: middle;
  }
  .rule-chip:hover, .rule-chip:focus {
    background: rgba(255,193,7,0.18);
    border-color: rgba(255,193,7,0.50);
    outline: none;
  }
  .rule-chip .ic { font-size: 11px; }
  .modal h2 {
    margin: 0 0 6px;
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-weight: 800; text-transform: uppercase;
    color: var(--phosphor-amber);
    font-size: 18px; letter-spacing: 0.04em;
  }
  .modal p { margin: 4px 0; color: var(--frame-muted); }
  .modal .actions {
    display: flex; gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }
  .field {
    display: flex; flex-direction: column; gap: 4px;
    margin: 8px 0;
    /* min-width:0 lets the parent flex shrink this column below content
       width — critical when a `.field` lives inside a `.row-gap` with
       flex:1 siblings, otherwise the input's intrinsic content width
       (number inputs scale with the `max` attr's digit count) blows
       the row past the viewport. */
    min-width: 0;
  }
  .field label {
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 9px; color: var(--frame-dim);
    letter-spacing: 0.08em; font-weight: 400; text-transform: uppercase;
  }
  .field input, .field select, .field textarea {
    background: var(--hull-dim);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    padding: 8px 10px; color: var(--frame-white);
    /* Fill the parent .field column so inputs don't snap to their
       content-driven intrinsic width. Pre-0.2.5, removing max=N from
       FS / FD inputs let them widen and push FM off the page. */
    width: 100%;
    box-sizing: border-box;
    min-width: 0;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--comm-cyan);
  }

  /* ── Action sheet ───────────────────────────────────────────────── */
  .bucket {
    background: var(--hull-bright);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .bucket .header {
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-weight: 800; letter-spacing: 0.08em; font-size: 14px;
    text-transform: uppercase;
    cursor: pointer; user-select: none;
  }
  .bucket .header .ic { font-size: 16px; }
  .bucket.primary .header { color: var(--comm-cyan); }
  .bucket.reaction .header { color: var(--phosphor-amber); }
  .bucket.incidental .header { color: var(--squad-gold); }
  .bucket.pilots .header { color: var(--comm-cyan); }
  .bucket.primary.open { border-color: rgba(91,216,255,0.40); }
  .bucket.reaction.open { border-color: rgba(255,161,59,0.40); }
  .bucket.incidental.open { border-color: rgba(240,204,85,0.40); }
  .bucket.pilots.open { border-color: rgba(91,216,255,0.40); }
  .header.static, .list-card.static { cursor: default; }
  .actions-list {
    padding: 4px 8px 8px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .action-btn {
    background: var(--hull-dim);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    padding: 8px 10px;
    text-align: left;
    color: var(--frame-white);
    display: flex; flex-direction: column; gap: 2px;
  }
  .action-btn:disabled { opacity: 0.4; }
  .action-btn .nm {
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-size: 15px; font-weight: 800; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .action-btn .hint { font-size: 11px; color: var(--frame-muted); }
  .action-btn .reason { font-size: 11px; color: var(--phosphor-amber); }

  /* ── List items ─────────────────────────────────────────────────── */
  .list-card {
    background: var(--hull-bright);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex; gap: 12px; align-items: flex-start;
    cursor: pointer;
    position: relative;
  }
  /* register brackets on list cards */
  .list-card::before, .list-card::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--register-mark);
    border-style: solid;
    pointer-events: none;
  }
  .list-card::before { top: 3px; left: 3px; border-width: 2px 0 0 2px; }
  .list-card::after  { bottom: 3px; right: 3px; border-width: 0 2px 2px 0; }

  .list-card .thumb {
    width: 60px; height: 60px;
    background: var(--hull-dim);
    border-radius: 2px;
    border: 1px solid var(--bulkhead);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--frame-dim);
    overflow: hidden;
    flex-shrink: 0;
  }
  .list-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .list-card h3 {
    margin: 0; font-size: 17px; color: var(--frame-white); font-weight: 800;
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    text-transform: uppercase; letter-spacing: 0.04em;
    line-height: 1.15;
  }
  .list-card .meta {
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 10px; color: var(--frame-dim);
    margin-top: 4px; letter-spacing: 0.04em;
  }

  /* ── FAB ────────────────────────────────────────────────────────── */
  .fab {
    position: fixed; right: 16px;
    bottom: calc(72px + env(safe-area-inset-bottom));
    width: 56px; height: 56px;
    border-radius: 2px;
    background: var(--phosphor-amber); color: var(--hull);
    font-size: 28px; line-height: 56px; text-align: center;
    border: none;
    /* phosphor glow */
    filter: drop-shadow(0 0 8px rgba(255,161,59,0.55));
    z-index: 5;
  }

  /* ── Empty state ────────────────────────────────────────────────── */
  .empty {
    text-align: center; padding: 40px 16px;
    color: var(--frame-muted);
  }
  .empty h2 { margin: 4px 0; color: var(--frame-white); font-size: 18px; }
  .empty p { margin: 4px 0; }

  /* Small screen */
  @media (max-width: 320px) {
    .stat-grid { grid-template-columns: repeat(4, 1fr); }
    .stat-cell { padding: 4px 6px; font-size: 12px; }
  }

  /* ── 2D schematic ───────────────────────────────────────────────── */
  .schematic-wrap {
    overflow: auto;
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    background: var(--hull-dim);
    padding: 8px;
    margin: 8px 0;
    position: relative;
    touch-action: pan-x pan-y;
    -webkit-overflow-scrolling: touch;
  }
  .schematic-grid {
    position: relative;
  }
  .schematic-grid svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .sch-node {
    position: absolute;
    width: 100px; height: 56px;
    border-radius: 2px;
    background: var(--hull-bright);
    border: 1px solid var(--register-mark);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 4px 6px;
    cursor: pointer;
    user-select: none;
    color: var(--frame-white);
  }
  .sch-node.core { background: rgba(91,216,255,0.08); border-color: rgba(91,216,255,0.50); }
  .sch-node.head { background: rgba(230,69,69,0.08); border-color: rgba(230,69,69,0.40); }
  .sch-node.arm  { background: rgba(240,204,85,0.08); border-color: rgba(240,204,85,0.40); }
  .sch-node.leg  { background: rgba(255,161,59,0.08); border-color: rgba(255,161,59,0.40); }
  .sch-node.utility { background: rgba(90,111,137,0.10); border-color: rgba(90,111,137,0.30); }
  .sch-node.warn { border-color: var(--phosphor-amber); }
  .sch-node.bad  { border-color: var(--critical-red); }
  .sch-node.dead { border-color: var(--critical-red); background: rgba(230,69,69,0.16); }
  .sch-node.selected { outline: 2px solid var(--comm-cyan); outline-offset: 1px; }
  /* 0.2.7: armor bar at the top of every schematic node — quick glance
     read for "is this component armored / how much / how damaged".
     Fill color tier follows the parent .warn / .bad / .dead modifiers. */
  .sch-node .armor-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px; background: rgba(58,77,106,0.45);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .sch-node .armor-bar.armor-empty {
    background: rgba(90,111,137,0.30);
  }
  .sch-node .armor-fill {
    height: 100%; background: var(--comm-cyan);
    transition: width 200ms ease-out;
  }
  .sch-node.warn .armor-fill { background: var(--phosphor-amber); }
  .sch-node.bad  .armor-fill { background: var(--critical-red); }
  .sch-node.dead .armor-fill { background: var(--critical-red); width: 0% !important; }
  .sch-node .def {
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 8px; font-weight: 400; letter-spacing: 0.06em;
    color: var(--frame-dim); text-transform: uppercase;
  }
  .sch-node .nm {
    font-size: 11px; font-weight: 700; line-height: 1.1;
    overflow: hidden; text-overflow: ellipsis;
    max-width: 92px; white-space: nowrap;
  }
  .sch-node .hp {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10px; color: var(--frame-muted);
  }
  .sch-facing {
    position: absolute;
    transform: translate(-50%, 0);
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--bulkhead);
    border: 1px solid rgba(91,216,255,0.4);
    font-family: "Space Mono", ui-monospace, monospace;
    font-size: 8px; font-weight: 400;
    color: var(--comm-cyan);
    pointer-events: none;
    text-transform: uppercase;
  }

  /* ── 3D schematic ───────────────────────────────────────────────── */
  .schem-toggle-row {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 4px; margin-bottom: 4px;
  }
  .schem-toggle-chip {
    padding: 2px 9px; font-size: 11px; font-weight: 700;
    border-radius: 2px; border: 1px solid var(--bulkhead);
    background: var(--hull-bright); color: var(--frame-dim);
    cursor: pointer; user-select: none;
    font-family: "Space Mono", ui-monospace, monospace;
    text-transform: uppercase; font-size: 9px;
  }
  .schem-toggle-chip.active {
    background: rgba(91,216,255,0.10); border-color: var(--comm-cyan);
    color: var(--comm-cyan);
  }
  .schem3d-wrap {
    position: relative; overflow: hidden;
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    background: var(--hull-dim);
    margin: 8px 0;
    touch-action: none;
  }
  .schem3d-wrap canvas { display: block; width: 100%; }

  /* ── Toast ──────────────────────────────────────────────────────── */
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(80px + env(safe-area-inset-bottom));
    background: var(--hull-bright); color: var(--frame-white);
    border: 1px solid var(--bulkhead);
    border-radius: 2px;
    padding: 10px 14px; font-size: 13px;
    max-width: 86vw;
    z-index: 200;
  }

  /* ── Onboarding ─────────────────────────────────────────────────── */
  #onboarding-overlay {
    position: fixed; inset: 0; background: rgba(7,12,18,0.94);
    z-index: 300; display: flex; align-items: center; justify-content: center;
  }
  #onboarding-overlay .ob-card {
    background: var(--hull-bright); border: 1px solid var(--phosphor-amber);
    border-radius: 2px; padding: 28px 24px; max-width: 340px; width: 90vw;
    position: relative;
  }
  #onboarding-overlay .ob-card::before {
    content: '';
    position: absolute; top: 4px; left: 4px;
    width: 10px; height: 10px;
    border: 2px solid var(--register-mark);
    border-right: none; border-bottom: none;
  }
  #onboarding-overlay h2 {
    font-family: "Saira Condensed", "Barlow Condensed", ui-sans-serif, sans-serif;
    font-weight: 800; text-transform: uppercase;
    color: var(--phosphor-amber); margin: 0 0 10px;
  }
  #onboarding-overlay p { color: var(--frame-muted); margin: 0 0 20px; line-height: 1.5; font-size: 13px; }
  .ob-dots { display:flex; gap:6px; justify-content:center; margin-bottom:18px; }
  .ob-dot  { width:8px; height:8px; border-radius:0; background:var(--bulkhead); }
  .ob-dot.active { background:var(--phosphor-amber); }
</style>
</head>

// §27 Minimum Range (locked 2026-06-13):
//   - External ranged weapons: Min Range = Weapon Silhouette (SU).
//   - Internal weapons: no minimum range (point-blank ok).
//   - Distance is compared in Scale Units (SU) — same unit as max range.
//
// §30 Frame Strength: applied once per qualifying arm in melee damage
//   and throw range. Throw range formula above already uses
//   `frameStrength × armsUsed`, satisfying this canonical rule.
// ────────────────────────────────────────────────────────────────────
function throwerArmsUsed(thrower) {
  // "Arms used" = non-destroyed ARM components on the thrower. Per
  // §30, Frame Strength applies once per qualifying arm. Default to 1
  // when the thrower has no ARM components recorded (resolve at table).
  const comps = thrower?.components || [];
  const arms = comps.filter(c => c.definition === "ARM" && !c.isDestroyed);
  return Math.max(1, arms.length);
}
function computeThrowRange(thrower, armsUsed) {
  const reach = thrower?.reach || 0;
  const strength = thrower?.frameStrength || 1;
  const arms = (armsUsed != null) ? armsUsed : throwerArmsUsed(thrower);
  return reach + strength * arms;
}
function maxThrowableSilhouette(thrower) {
  // Equipment Silhouette ceiling. A Robot may not throw an object with
  // Silhouette > 2 × its own Robot Silhouette. Applies to Grappled
  // Robots too — Sil-5 Grappled Robot can't be thrown by a Sil-2 mech.
  return 2 * (thrower?.silhouette || 1);
}
function isTargetGrappledBy(thrower, target) {
  if (!thrower || !target) return false;
  return (target.statusEffects || []).includes("GRAPPLED") &&
         target.grappledById === thrower.robotId;
}
// §13 Grappling — Tom 2026-06-13.
// Count un-occupied (toggled-on) Manipulator modules on the Robot.
// A Manipulator carrying a grapple link sets `occupiedByGrappleId` on
// the module instance; the grapple-dice bonus excludes those.
function countFreeManipulators(r) {
  if (!r) return 0;
  let n = 0;
  for (const c of (r.components || [])) {
    if (c.isDestroyed) continue;
    for (const m of (c.modules || [])) {
      if (m.moduleId !== "manipulator") continue;
      if ((m.toggledOn ?? true) !== true) continue;
      if (m.occupiedByGrappleId != null) continue;
      n++;
    }
  }
  return n;
}
// Pick the responding Pilot for an opposed Physical check (Initiate
// Grapple / Break Free). Per Ch 6 / RULEBOOK_REVISION_NOTES L388
// ("defender's player picks which Pilot"): intentionally SINGLE-pilot
// pick — NOT multi. The rulebook gives the defender ONE responding
// Pilot per Grapple/Break-Free, not all conscious pilots rolling
// independently. Webapp doesn't yet surface a chooser, so we default to
// the first conscious cockpit pilot. §44 audit 2026-06-17 confirmed
// SINGLE is correct here.
function pickRespondingPilot(r) {
  if (!r) return null;
  for (const cp of (r.cockpitPilots || [])) {
    if (cp.isAi || cp.isKO || !cp.pilotId) continue;
    const p = (state.pilots || []).find(x => x.id === cp.pilotId);
    if (p) return p;
  }
  return null;
}
// Clear the grapple link between two Robots: drop GRAPPLED / GRAPPLING
// statuses, null out back-link IDs, and release every Manipulator the
// pair had marked occupied for THIS link.
function clearGrappleLink(a, b) {
  const sides = [a, b].filter(Boolean);
  for (const r of sides) {
    r.statusEffects = (r.statusEffects || []).filter(s => s !== "GRAPPLED" && s !== "GRAPPLING");
    r.grappledById = null;
    r.grapplingId = null;
    for (const c of (r.components || [])) {
      for (const m of (c.modules || [])) {
        if (m.moduleId === "manipulator" && m.occupiedByGrappleId != null) {
          m.occupiedByGrappleId = null;
        }
      }
    }
  }
}
// Mark `count` free Manipulators as occupied by the given grapple link
// (other Robot's ID). Returns how many were actually marked. Used at
// Initiate-Grapple resolve time.
function occupyManipulatorsForGrapple(r, otherRobotId, count) {
  let marked = 0;
  for (const c of (r.components || [])) {
    if (c.isDestroyed) continue;
    for (const m of (c.modules || [])) {
      if (marked >= count) return marked;
      if (m.moduleId !== "manipulator") continue;
      if ((m.toggledOn ?? true) !== true) continue;
      if (m.occupiedByGrappleId != null) continue;
      m.occupiedByGrappleId = otherRobotId;
      marked++;
    }
  }
  return marked;
}
// §13.D — Effective Boost Load. While GRAPPLED, treat the linked
// grappler's load as part of this Robot's Boost-Draw load. Uses
// `robotWeight` because Boost Draw is computed from robotWeight in
// the existing webapp (see line 6042 / 5065). Equipment-weight roll-up
// isn't currently summed into robotWeight; if/when it lands, this
// helper inherits it automatically.
function effectiveBoostLoad(r, allRobots) {
  if (!r) return 0;
  const own = r.robotWeight || 0;
  if (!(r.statusEffects || []).includes("GRAPPLED")) return own;
  const id = r.grappledById;
  if (id == null) return own;
  const other = (allRobots || []).find(x => x.robotId === id);
  if (!other) return own;
  return own + (other.robotWeight || 0);
}
// Validates a Throw. Returns { ok: bool, reason?, range?, cap?, armsUsed? }.
function validateThrow(thrower, target) {
  if (!thrower) return { ok: false, reason: "No thrower." };
  const armsUsed = throwerArmsUsed(thrower);
  const range = computeThrowRange(thrower, armsUsed);
  const cap = maxThrowableSilhouette(thrower);
  if (range <= 0) {
    return { ok: false, reason: `Throw range is ${range} SU (needs > 0).`, range, cap, armsUsed };
  }
  // target may be null in early-resolve (math-only check); allow it.
  if (target) {
    const tSil = target.silhouette || 1;
    if (tSil > cap) {
      // Equipment Sil ceiling. Grappled-throw also subject to the cap.
      const why = isTargetGrappledBy(thrower, target)
        ? `Grappled target Sil ${tSil} exceeds 2×Robot Sil cap (${cap}).`
        : `Target Sil ${tSil} exceeds 2×Robot Sil cap (${cap}).`;
      return { ok: false, reason: why, range, cap, armsUsed };
    }
  }
  return { ok: true, range, cap, armsUsed };
}
// §27 Minimum Range. External ranged weapons cannot fire below their
// Silhouette in SU; internal mounts have no min range. Returns the
// numeric min range in Scale Units.
//
// §86 (Tom 2026-06-17, Ch 12 L86): Indirect — "Ignore Lines of Fire;
// target any legal target within range. Minimum Range becomes 1/3
// maximum range." The 1/3 floor takes precedence over the normal
// external-mounted-Sil rule for §27. Max range is sourced via
// calculateEquipmentStats so all the keyword stacking that drives final
// range (Ranged base = Sil×3, Scatter override = Sil×2, Extended Range
// additive, Long Range ×2) is honored — mirrors the §49 Scatter override
// pattern that overrides the same `range` field.
function weaponMinRange(weapon) {
  if (!weapon) return 0;
  // No Ranged keyword → no range concept.
  const kw = (weapon.keywords || []).map(s => String(s));
  if (!kw.includes("Ranged")) return 0;
  // §86 override (Ch 12 L86): Indirect → floor(maxRange / 3). Trust the
  // weapon's already-computed `.range` when present (loadout-sheet path
  // and equipment-list chip path both pre-compute via
  // calculateEquipmentStats); fall back to re-deriving when callers pass
  // a raw library entry without a top-level range field (e.g. the
  // deploy-preview perPartStats path at ~13945).
  if (kw.includes("Indirect")) {
    let maxR = Number(weapon.range || 0);
    if (!(maxR > 0) && typeof calculateEquipmentStats === "function") {
      const s = calculateEquipmentStats(weapon.keywords || [], weapon.silhouette || 1);
      maxR = s.range || 0;
    }
    return maxR > 0 ? Math.floor(maxR / 3) : 0;
  }
  // Lookup mount type via socket module id.
  const mt = weaponMountType(weapon);
  if (mt === "INTERNAL") return 0;
  // External (or hand-held / unspecified) defaults to Weapon Silhouette.
  return weapon.silhouette || 1;
}
function weaponMountType(weapon) {
  if (!weapon) return null;
  if (typeof getSocketTypeForModule === "function" && weapon.socketModuleId) {
    return getSocketTypeForModule(weapon.socketModuleId);
  }
  return null;
}
// Distance in SU. Returns valid if (min <= dist <= max). Validation
// short-circuits to `{ ok: true }` when distance is unknown (webapp
// has no positional state); callers can still surface the min/max
// numbers for player reference.
function isValidRangedTarget(attacker, weapon, target, distanceSu) {
  if (!weapon) return { ok: false, reason: "No weapon." };
  const min = weaponMinRange(weapon);
  const max = (weapon.range || 0);
  if (distanceSu == null) {
    return { ok: true, min, max, unknownDistance: true };
  }
  if (distanceSu < min) {
    return { ok: false, reason: `Below minimum range (Weapon Sil ${min} SU).`, min, max };
  }
  if (max > 0 && distanceSu > max) {
    return { ok: false, reason: `Beyond max range (${max} SU).`, min, max };
  }
  return { ok: true, min, max };
}

// ────────────────────────────────────────────────────────────────────
// §10 Reaction-induced target redirection (Tom 2026-06-10, Ch 5)
//
// Between attack declaration and resolution, a Reaction may have made
// the originally-picked target invalid: Pivot rotated attacker out of
// arc, Boost-Dodge moved target out of range / LoF, Crouch dropped
// hit zones, status change (DOWN, SHUTDOWN) changed compatibility,
// etc. The attacker re-targets; the action is NOT lost. If no legal
// alternative exists OR the player declines, the slot whiffs and
// Priority transfers per §34.
//
// Webapp has no positional state, so geometry checks short-circuit to
// `{ ok: true, unknownGeometry: true }` (mirrors §27 isValidRangedTarget
// on unknown distance). Status checks (destroyed, target SHUTDOWN
// for ranged interception, etc.) ARE doable and ARE enforced.
//
// Talent carry: pre-declared talents (Sharpshooter, Deadeye) are
// roller chips toggled at dice-roll time, NOT bound to a specific
// target. When the player redirects, the same chips remain toggled in
// _roller.chips, so Sharpshooter / Deadeye implicitly transfer to the
// new target — matching the rulebook decision in §10.
// ────────────────────────────────────────────────────────────────────
function isStillValidTarget(attacker, weapon, target, opts) {
  if (!target) return { ok: false, reason: "No target." };
  if (target.destroyed) return { ok: false, reason: "Target destroyed." };
  // Same-robot self-targeting is never valid for SALVO/STRAFE/MELEE.
  if (attacker && target.robotId === attacker.robotId) {
    return { ok: false, reason: "Cannot target self." };
  }
  // Status-based invalidation (Tom 2026-06-10 §10-A note):
  //   CROUCHED   = target took Crouch / Boost-Dodge → out of hit zones
  //                for Ranged attacks (Tom's webapp-proxy for the
  //                "moved out of range / LoF" Reaction outcome).
  //   DOWN       = target is prone; Ranged still valid (rulebook
  //                bonus chips elsewhere reflect this), Melee still
  //                valid. Not flagged here.
  //   SHUTDOWN   = target is offline but still a valid attack target.
  //                Not flagged here.
  // The rollKind comes from the caller via opts.rollKind (string).
  const rollKind = opts?.rollKind;
  const status = target.statusEffects || [];
  if (rollKind === "RANGED" && status.includes("CROUCHED")) {
    return { ok: false, reason: "Target CROUCHED — Reaction moved target out of hit zones (§10)." };
  }
  // Range / LoF / facing checks need positional state the webapp
  // doesn't own. Short-circuit so callers know geometry is unverified.
  return { ok: true, unknownGeometry: true };
}
// §19 Reverse Move classifier (Tom 2026-06-10, rulebook Ch 8 L22).
//
// A movement is "reverse" if the destination position can draw a line
// of fire to the Robot's Rear facing (replaces the older ≥90° arc
// check). Reverse movement is at half speed.
//
// Webapp has no positional / facing-arc state, so this short-circuits
// to `{ reverse: false, unknownGeometry: true }` per the §27 pattern.
// Callers should fall back to the player's at-the-table judgement (or
// a manual reverse toggle in the action picker) when unknownGeometry
// is true.
function classifyReverseMove(robot, destination) {
  if (!robot) return { reverse: false, unknownGeometry: true };
  // No positional state in the webapp; cannot compute LoF-to-Rear.
  // When the schematic / positional sim lands, replace this stub with
  // an isLineOfFireToRearFacing(robot, destination) check.
  return { reverse: false, unknownGeometry: true };
}
// Enumerate non-destroyed Robots on the battle that could absorb a
// redirected attack. Excludes attacker and the original target. Same
// caveat as isStillValidTarget: geometry isn't checked here, so the
// list is "potentially legal" not "guaranteed legal."
function legalTargetsFor(attacker, weapon, originalTargetId) {
  const b = state.activeBattle;
  if (!b) return [];
  const all = [...(b.p1Robots || []), ...(b.p2Robots || [])];
  return all.filter(t =>
    t &&
    !t.destroyed &&
    t.robotId !== attacker?.robotId &&
    t.robotId !== originalTargetId
  );
}
// §10 + §34 whiff path. Apply zero-hit result for a slot, transfer
// Priority if the slot is the resolving Robot's Priority Action.
function resolveWhiff(r) {
  if (!r) return;
  recordUndo(`${escapeHtml(r.name || r.robotName || "Robot")} whiff (no legal target)`);
  whiffTransferPriority(state.activeBattle, r);
  showToast(`Attack whiffs — no legal target. (§34)`);
}
// ────────────────────────────────────────────────────────────────────
// §22 + §32 Reaction validator (Tom 2026-06-13, Ch 5)
//
// Three rules from Tom's Ch 5 Reactions intro:
//   1. Robots resolving a Priority Action CANNOT take Reactions to
//      enemy Reactions. The active resolution chain is one-shot from
//      the Priority Action; Reactions don't trigger counter-Reactions
//      from the resolving Robot.
//   2. Friendly-fire Reactions allowed. If a teammate's Priority
//      Action affects your Robot (e.g. errant Hip Shot), your Robot
//      may declare a Reaction even though the Priority Action came
//      from your own side.
//   3. Proximity-order resolution (table-resolved; not enforced
//      programmatically by the webapp).
//
// Webapp has no separate "react" affordance — Reactions are declared
// via the same `open-action` handler as any other action. The gate
// is therefore hooked at `open-action` for `a.bucket === "reaction"`.
//
// We track the currently-resolving Priority robot in
// `state.activePriorityRobotId`: set when a `primary` action-resolve
// modal opens, cleared on close. If the reacting Robot IS that
// Robot, we block with toast.
//
// No "only enemy attacks trigger Reactions" gate ever existed in the
// webapp (Reactions are opened on the reacting Robot's own action
// sheet — the attacker's side was never inspected); rule #2 is a
// drop-the-gate "verify nothing's blocking" check that passes by
// inspection.
// ────────────────────────────────────────────────────────────────────
function canDeclareReaction(reactingRobot, triggeringAction) {
  if (!reactingRobot) return { ok: false, blockReason: "No reacting Robot." };
  // Rule 1: can't react to a Reaction while resolving own Priority Action.
  const activeId = state.activePriorityRobotId;
  if (activeId != null && reactingRobot.robotId === activeId) {
    return {
      ok: false,
      blockReason: "Cannot react to a Reaction while resolving your own Priority Action.",
    };
  }
  // Rule 2: friendly-fire reactions allowed — no gate to apply here.
  // (Verified by inspection: open-action never checks attacker side.)
  return { ok: true };
}

  STRAIN_CLEAR:       { label: "Strain Clear",      bucket: "incidental", brief: "Spend 1 Capacitor → −1 System Strain.", cost: "1 Capacitor", rules: "(L420) Spend 1 Capacitor (permanently) to remove 1 System Strain." },
  COOL_HEAD:          { label: "Cool Head Under Pressure", bucket: "incidental", brief: "After a Reaction Fortitude with no damage taken, remove 1 Action Token.", cost: "Trigger", rules: "Cool Head Under Pressure talent (Ch 4). Triggered effect: when this Pilot rolls a Fortitude Check after taking a Reaction and takes no damage, remove one Action Token from this Pilot. Not a player-initiated action — resolve at the table when the trigger fires. Gated: requires Cool Head Under Pressure pilot." },
  COOLANT_VENT:       { label: "Coolant Vent",       bucket: "incidental", brief: "Coolant Manager: extra Strain Vent (Mental check, remove hits in S-Strain). Pilot takes 1 damage.", cost: "Free Incidental (Pilot takes 1 damage)", rules: "(Ch 11 L31 + Ch 5 L55) Coolant Manager grants an additional Strain Vent as a free Incidental, once per Priority Action. Standard Strain Vent: Make a Mental check, remove System Strain equal to hits. Pilot takes 1 damage each time the talent is used. Gated: requires Coolant Manager pilot." },
};

// ────────────────────────────────────────────────────────────────────
// IndexedDB layer. Three stores: robots, pilots, equipment, forces,
// battles, settings. Each value is a plain JS object — we treat
// stores as document collections (no JOINs) for sanity.
// ────────────────────────────────────────────────────────────────────
const DB_NAME = "urfs-web";
const DB_VERSION = 1;
const STORES = ["robots", "pilots", "equipment", "forces", "battles", "settings"];

let _db = null;
function openDb() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onupgradeneeded = () => {
      const db = req.result;
      for (const s of STORES) {
        if (!db.objectStoreNames.contains(s)) {
          db.createObjectStore(s, { keyPath: "id", autoIncrement: true });
        }
      }
    };
    req.onsuccess = () => { _db = req.result; resolve(_db); };
  });
}
async function dbPut(store, value) {
  const db = await openDb();
  // §87a: keep BY_ID maps in sync with single-row writes. The state arrays
  // are typically already mutated in place by the caller (they hold the
  // same object reference); but for cases where a new row is being added
  // we also patch the map here. The map points at the same object, so
  // existing-row updates are no-ops for the map.
  if (store === "equipment" && value && value.id != null) EQUIPMENT_BY_ID[value.id] = value;
  else if (store === "robots" && value && value.id != null) ROBOTS_BY_ID[value.id] = value;
  else if (store === "forces" && value && value.id != null) FORCES_BY_ID[value.id] = value;
  else if (store === "pilots" && value && value.id != null) PILOTS_BY_ID[value.id] = value;
  else if (store === "battles" && value && value.id != null) BATTLES_BY_ID[value.id] = value;
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGetAll(store) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(store, id) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbDelete(store, id) {
  const db = await openDb();
  // §87a: keep BY_ID maps in sync with deletes. Mirror dbPut by routing
  // each store name to its map. The caller almost always also splices the
  // state array, but we don't depend on that — the map drop is independent.
  if (store === "equipment") { delete EQUIPMENT_BY_ID[id]; delete EQUIPMENT_BY_ID[Number(id)]; delete EQUIPMENT_BY_ID[String(id)]; }
  else if (store === "robots") { delete ROBOTS_BY_ID[id]; delete ROBOTS_BY_ID[Number(id)]; delete ROBOTS_BY_ID[String(id)]; }
  else if (store === "forces") { delete FORCES_BY_ID[id]; delete FORCES_BY_ID[Number(id)]; delete FORCES_BY_ID[String(id)]; }
  else if (store === "pilots") { delete PILOTS_BY_ID[id]; delete PILOTS_BY_ID[Number(id)]; delete PILOTS_BY_ID[String(id)]; }
  else if (store === "battles") { delete BATTLES_BY_ID[id]; delete BATTLES_BY_ID[Number(id)]; delete BATTLES_BY_ID[String(id)]; }
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ────────────────────────────────────────────────────────────────────
// State + render. Reactive enough for the scale of this app — we
// re-render the active screen on every action. Modals stack on top.
// ────────────────────────────────────────────────────────────────────
const state = {
  tab: "garage", // garage / equip / pilots / forces / battle
  robots: [],
  pilots: [],
  equipment: [],
  forces: [],
  battles: [],
  activeBattle: null, // BattleState
  activeRobotId: null, // when drilled into per-robot battle screen
  modal: null, // { kind, data }
  rulePeek: null, // { refKey } — small contextual rulebook peek layered above modal (iter 36)
  compareMode: false, // multi-select mode for garage.robot_compare
  compareSelected: [], // ids of robots selected for compare (max 2)
  packs: [], // content packs; seeded with urfs-core on init
  _dispatching: false, // §59 rapid-click guard (Playwright probe) — see withRapidClickGuard
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}
function pushModal(kind, data) {
  state.modal = { kind, data };
  render();
  // §59 (Playwright probe): rapid-click guard reset is handled by the
  // debounce timer inside withRapidClickGuard — NOT here. If we reset on
  // pushModal/closeModal, a handler that chains modal→modal (e.g.
  // resolve-action → redirect-target) would let the next queued click
  // through immediately and we'd be back to the 8-Salvo bug. The 250ms
  // debounce window is what actually protects the user beat.
}
function closeModal() {
  state.modal = null;
  render();
}
// §59 (Playwright probe): rapid-click guard. Wrap any handler whose
// double-fire would mutate game state irreversibly (RESOLVE / SUBMIT /
// ROLL). The first call sets `state._dispatching = true` and schedules
// a debounce reset; subsequent clicks within the debounce window
// short-circuit. Resolves the rapid-click bug from Playwright: clicking
// RESOLVE 8× fired 8 Salvos before the modal teared down, jumping
// System Strain 1→9 in a single user beat.
//
// pushModal / closeModal deliberately do NOT reset _dispatching — if
// they did, a handler that chains modal→modal (e.g. resolve-action →
// redirect-target via pushModal) would let the next queued click
// through immediately, defeating the guard. The 250ms debounce window
// is what protects the user beat. 250ms is below human click-cadence
// noise (~150ms) but covers Playwright's machine-speed click spam
// without affecting normal play.
const RAPID_CLICK_DEBOUNCE_MS = 250;
function withRapidClickGuard(fn) {
  return function (...args) {
    if (state._dispatching) return;
    state._dispatching = true;
    setTimeout(() => { state._dispatching = false; }, RAPID_CLICK_DEBOUNCE_MS);
    return fn.apply(this, args);
  };
}

function showToast(msg, ms = 2200) {
  const host = document.getElementById("toast-host");
  host.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(() => { if (host.innerHTML.includes(escapeHtml(msg))) host.innerHTML = ""; }, ms);
}

function recordUndo(label) {
  const b = state.activeBattle;
  if (!b) return;
  b.undoStack = b.undoStack || [];
  const snapshot = JSON.parse(JSON.stringify(b));
  // Remove undoStack from the snapshot to avoid recursive growth.
  delete snapshot.undoStack;
  b.undoStack.push({ label, when: Date.now(), snapshot });
  if (b.undoStack.length > 50) b.undoStack.shift();
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}

// ────────────────────────────────────────────────────────────────────
// Domain helpers — derive stats from a robot the same way the
// Android CalculationEngine does. Limited to v0.0.1 essentials.
// ────────────────────────────────────────────────────────────────────
function robotInstalledModuleIds(robot) {
  const ids = [];
  for (const c of robot.components || []) {
    for (const m of c.modules || []) ids.push(m.moduleId);
  }
  return ids;
}
// §68 (Ch 7 L21): toggled-off modules drop out of stat derivations
// that key off "active" state. Strain Threshold specifically must
// react to Coprocessor toggle-off mid-battle. Skipped destroyed
// components too — a destroyed component's modules can't be active.
function robotActiveModuleIds(robot) {
  const ids = [];
  for (const c of robot.components || []) {
    if (c.isDestroyed) continue;
    for (const m of c.modules || []) {
      if ((m.toggledOn ?? true) === false) continue;
      ids.push(m.moduleId);
    }
  }
  return ids;
}
// Maps a module id to its socket type (null if not a socket module).
function getSocketTypeForModule(moduleId) {
  switch (moduleId) {
    case "manipulator":           return "MANIPULATOR";
    case "holster_point":         return "HOLSTER";
    case "internal_weapon_socket": return "INTERNAL";
    case "fixed_external_socket":
    case "swivel_weapon_socket":  return "EXTERNAL";
    case "tether_socket":         return "TETHER";
    default:                      return null;
  }
}

// Validates that equipment can be placed in a given socket type on a robot.
// Per Android domain/KeywordValidator.kt:44-48.
//
// §14: a Linked composite occupies the slot of its max-Sil constituent.
// Socket compatibility derives from that part's keywords (Mount Point,
// Extending Grip, Tethered). Sil check uses slotSil.
function validateEquipmentInSocket(eq, socketType, robot) {
  let sil = eq.silhouette || 1;
  let kw = eq.keywords || [];
  if (isLinkedComposite(eq)) {
    const parts = linkedConstituents(eq);
    const footprint = parts.find(p => p.id === eq.slotFootprintEquipmentId)
                   || parts.slice().sort((a, b) => (b.silhouette || 1) - (a.silhouette || 1))[0];
    if (footprint) {
      sil = footprint.silhouette || 1;
      kw = footprint.keywords || [];
    }
  }
  if (sil > 2 * (robot.silhouette || 1)) {
    return { valid: false, error: "Equipment silhouette exceeds 2× robot silhouette (Ch 13 L126)." };
  }
  const hasMountPoint   = kw.includes("Mount Point");
  const hasExtendingGrip = kw.includes("Extending Grip");
  const hasTethered     = kw.includes("Tethered");
  if (socketType === "MANIPULATOR" || socketType === "HOLSTER") {
    if (hasMountPoint && !hasExtendingGrip) {
      return { valid: false, error: "Mount Point equipment requires a fixed/swivel socket, not a manipulator or holster (unless it has Extending Grip)." };
    }
  } else if (socketType === "INTERNAL" || socketType === "EXTERNAL") {
    if (!hasMountPoint) {
      return { valid: false, error: "Internal and external sockets require equipment with the Mount Point keyword." };
    }
  } else if (socketType === "TETHER") {
    if (!hasTethered) {
      return { valid: false, error: "Tether sockets require equipment with the Tethered keyword." };
    }
  }
  return { valid: true };
}

// Equipment BP = keyword count × equipment silhouette (Android
// CalculationEngine.kt:162-163). Flat formula — no per-keyword weights.
// §14: Linked Equipment composites pay the SUM of constituent BP
// (full additive per Tom 2026-06-13), not just the marker keyword × Sil.
function calcEquipmentBP(equipment) {
  if (isLinkedComposite(equipment)) {
    const parts = linkedConstituents(equipment);
    return parts.reduce((s, p) => s + ((p.keywords || []).length * (p.silhouette || 1)), 0);
  }
  const kw = equipment?.keywords || [];
  const sil = equipment?.silhouette || 1;
  return kw.length * sil;
}

// Port of Android CalculationEngine.kt:479-629 calculateEquipmentStats.
// Returns { damage, range, power, weight, armor, reach, maxAmmo, damageType, immunity, bpCost }.
function calculateEquipmentStats(keywords, silhouette) {
  const sil = (silhouette < 1 || !silhouette) ? 1 : silhouette;
  // Count occurrences for multi-take keywords.
  const count = {};
  for (const k of (keywords || [])) count[k] = (count[k] || 0) + 1;

  // Base values per CalculationEngine.kt:484-489
  let damage = 0;
  let range = 0;
  let power = 0;
  let weight = sil;  // base = silhouette
  let armor = 5;     // base = 5
  let maxAmmo = 0;
  let damageType = "Physical";
  const immunity = [];
  const isMelee = !!count["Melee"];

  // Damage / type / immunity (lines 495-530)
  if (count["Melee"]) {
    damage += sil;
    if (!immunity.includes("Physical")) immunity.push("Physical");
  }
  if (count["Ranged"]) {
    damage += sil;
    range = sil * 3;
  }
  if (count["Edge"]) damage += sil;
  if (count["Energy Edge"]) {
    damage += sil;
    power -= 5;
    damageType = "Energy";
  }

  // §18 (Ch 12 L141): Scatter resolves BEFORE Energy Weapon in the damage
  // pipeline. Scatter is an override (sets base damage = 2×Sil, range = Sil×2);
  // Energy Weapon then adds +2×Sil on top of the overridden base.
  if (count["Scatter"]) {
    damage = 2 * sil;
    range = sil * 2;
  }

  const energyWeaponCount = count["Energy Weapon"] || 0;
  if (energyWeaponCount > 0) {
    damage += 2 * sil * energyWeaponCount;
    power -= 5 * sil * energyWeaponCount;
    damageType = "Energy";
    if (isMelee) {
      weight = Math.ceil(weight / 3);
      if (!immunity.includes("Energy")) immunity.push("Energy");
    }
  }

  // §17 Overcharged: +Sil × 3 Damage per instance (Ch 12 L64, was +Sil).
  // Weapon also takes Sil self-damage per firing (resolved at the table /
  // via the per-weapon damage tracker; surfaced in equipment tooltip).
  const overchargedCount = count["Overcharged"] || 0;
  if (overchargedCount > 0) damage += sil * 3 * overchargedCount;

  if (count["Power Cell"]) power += 5 * count["Power Cell"];

  // Limited Ammo (lines 555-568) — additive, before Two-handed ×2
  if (count["Limited Ammo"]) {
    damage += 2 * sil;
    const extMags = count["Extended Magazine"] || 0;
    maxAmmo = Math.floor(sil / 2) * (1 + extMags);
    weight += extMags;  // +1 per extended magazine
  }

  // Extended Range additive (line 570-571)
  if (count["Extended Range"]) range += sil * count["Extended Range"];

  // Long Range multiplier (line 575) — applies AFTER additive
  if (count["Long Range"]) range *= 2;

  // Two-handed ×2 damage — last damage operation (line 595)
  if (count["Two-handed"]) damage *= 2;

  // Armored (lines 597-601)
  if (count["Armored"]) {
    armor += 5 * count["Armored"];
    weight += count["Armored"];
  }

  // Energy-Reflective Coating (lines 603-605)
  if (count["Energy-Reflective Coating"] && !immunity.includes("Energy")) {
    immunity.push("Energy");
  }

  // Reach — melee only (lines 612-615); base = sil + extenders
  let reach = 0;
  if (isMelee) {
    const reachExtCount = count["Reach Extender"] || 0;
    reach = sil + reachExtCount * Math.floor(sil / 2);
  }

  // BP cost (line 625) = keywords.length × sil
  const bpCost = (keywords || []).length * sil;

  return {
    damage, range, power,
    weight: Math.ceil(weight),
    armor, reach, maxAmmo,
    damageType, immunity,
    bpCost,
  };
}

// ════════════════════════════════════════════════════════════════════
// §14 LINKED EQUIPMENT — Tom 2026-06-13, Ch 12 L100 Link Point keyword.
// A library equipment entry with non-empty `linkedParts: [equipmentId]`
// is a composite. Cost model: full additive BP across constituent
// parts. Slot footprint: max-Sil part only (the big one absorbs the
// smaller ones into its frame). Combined Sil = max; combined armor =
// max-armor part. Same-type weapons (all Melee OR all Ranged) fire as
// ONE Attack Check with separate Damage rolls per weapon, inheriting
// every constituent's keyword penalties. Different-type linked weapons
// CAN link but can't combine in a single attack. Damage immunities
// are STRIPPED on the composite EXCEPT Energy-Reflective Coating.
// ────────────────────────────────────────────────────────────────────

// True if this library equipment entry is a Linked Equipment composite.
function isLinkedComposite(eq) {
  return !!eq && Array.isArray(eq.linkedParts) && eq.linkedParts.length > 0;
}

// Resolve a composite's `linkedParts` ID array into the actual library
// equipment objects. Filters out any IDs that no longer exist (e.g.
// the player deleted a constituent after linking).
function linkedConstituents(eq) {
  if (!isLinkedComposite(eq)) return [];
  return eq.linkedParts
    .map(id => EQUIPMENT_BY_ID[id])
    .filter(Boolean);
}

// canLink(a, b) — both must have Link Point keyword; not same id; neither
// can already be a composite. (Tom 2026-06-13: composites of composites
// is out of scope; flat lists only.)
function canLink(a, b) {
  if (!a || !b) return { ok: false, reason: "Missing equipment." };
  if (a.id === b.id) return { ok: false, reason: "Cannot link an item to itself." };
  if (!(a.keywords || []).includes("Link Point")) {
    return { ok: false, reason: `${a.name || "First"} lacks Link Point.` };
  }
  if (!(b.keywords || []).includes("Link Point")) {
    return { ok: false, reason: `${b.name || "Second"} lacks Link Point.` };
  }
  if (isLinkedComposite(a) || isLinkedComposite(b)) {
    return { ok: false, reason: "Cannot link an existing Linked composite." };
  }
  return { ok: true };
}

// Build a composite library entry from N constituents. Caller pushes
// the returned object into state.equipment. Does NOT mutate the parts.
function buildLinkedComposite(parts, name) {
  const ids = parts.map(p => p.id);
  const maxSilPart = parts.slice().sort((a, b) => (b.silhouette || 1) - (a.silhouette || 1))[0];
  return {
    id: Date.now(),
    name: name || `Linked: ${parts.map(p => p.name || "?").join(" + ")}`,
    silhouette: maxSilPart ? (maxSilPart.silhouette || 1) : 1,
    bpCost: 0, // derived via linkedCompositeStats at read time
    weight: 0,
    armor: 5,
    keywords: ["Link Point"], // marker; constituent keywords kept on parts
    notes: "Linked Equipment composite — derived stats from constituent parts.",
    maxAmmo: 0,
    mountPoint: !!(maxSilPart && (maxSilPart.keywords || []).includes("Mount Point")),
    linkedParts: ids,
    slotFootprintEquipmentId: maxSilPart ? maxSilPart.id : null,
  };
}

// Range window across selected ranged weapons. Returns
// { minRange, maxRange } where minRange = max of per-weapon minRanges
// (the most restrictive floor) and maxRange = min of per-weapon
// maxRanges (the most restrictive ceiling). If maxRange < minRange the
// window is empty (no shared range exists for combined fire). Weapons
// argument is the array of library equipment entries.
function linkedRangeWindow(weapons) {
  const ranged = (weapons || []).filter(w => (w.keywords || []).includes("Ranged"));
  if (ranged.length === 0) return { minRange: 0, maxRange: 0, empty: true };
  let minR = 0;
  let maxR = Infinity;
  for (const w of ranged) {
    const stats = calculateEquipmentStats(w.keywords || [], w.silhouette || 1);
    const wMin = weaponMinRange(w);
    const wMax = stats.range || 0;
    if (wMin > minR) minR = wMin;
    if (wMax > 0 && wMax < maxR) maxR = wMax;
  }
  const empty = maxR < minR || maxR === Infinity;
  return { minRange: minR, maxRange: empty ? 0 : maxR, empty };
}

// Derive combined stats for a Linked composite. Returns a stats object
// compatible with calculateEquipmentStats' shape (damage/range/power/
// weight/armor/reach/maxAmmo/damageType/immunity/bpCost) PLUS link-
// specific fields: { slotSil, partCount, perPartStats }.
//
// Damage: composite "damage" surfaces the LARGEST per-part damage so
// the loadout chip is informative. Per-part damage is exposed via
// `perPartStats` so the attack-time flow can roll separately.
//
// Immunity: union of constituent immunities MINUS damage-type
// immunities ("Physical", "Energy"), EXCEPT Energy-Reflective Coating
// is retained (signalled by ANY constituent having that keyword).
function linkedCompositeStats(parts) {
  const partsArr = (parts || []).filter(Boolean);
  if (partsArr.length === 0) {
    return {
      damage: 0, range: 0, power: 0, weight: 0, armor: 5, reach: 0,
      maxAmmo: 0, damageType: "Physical", immunity: [], bpCost: 0,
      slotSil: 1, partCount: 0, perPartStats: [],
    };
  }
  const perPartStats = partsArr.map(p => ({
    id: p.id,
    name: p.name || "Equipment",
    keywords: p.keywords || [],
    silhouette: p.silhouette || 1,
    stats: calculateEquipmentStats(p.keywords || [], p.silhouette || 1),
  }));
  // Slot footprint = max-Sil part.
  const slotSil = perPartStats.reduce((m, pp) => Math.max(m, pp.silhouette), 1);
  // BP = sum across parts (full additive per Tom 2026-06-13).
  const bpCost = perPartStats.reduce((s, pp) => s + (pp.stats.bpCost || 0), 0);
  // Combined weight = sum (linked pieces still each weigh something).
  const weight = perPartStats.reduce((s, pp) => s + (pp.stats.weight || 0), 0);
  // Combined power draw = sum (each piece draws its own).
  const power = perPartStats.reduce((s, pp) => s + (pp.stats.power || 0), 0);
  // Armor = max-armor part.
  const armor = perPartStats.reduce((m, pp) => Math.max(m, pp.stats.armor || 0), 0);
  // Surface the highest single-weapon damage as the composite "damage"
  // chip (informative only — at attack time each weapon rolls its own).
  const damage = perPartStats.reduce((m, pp) => Math.max(m, pp.stats.damage || 0), 0);
  // Range chip = widest single-weapon range. The range WINDOW used at
  // attack-time is the intersection (linkedRangeWindow); the chip is
  // a single number for the loadout list.
  const range = perPartStats.reduce((m, pp) => Math.max(m, pp.stats.range || 0), 0);
  // Reach = max constituent reach (for combined melee in the same way
  // as range: at attack-time the intersection rule applies; the chip
  // surfaces the widest).
  const reach = perPartStats.reduce((m, pp) => Math.max(m, pp.stats.reach || 0), 0);
  // Max ammo = sum (each weapon keeps its own magazine).
  const maxAmmo = perPartStats.reduce((s, pp) => s + (pp.stats.maxAmmo || 0), 0);
  // Damage type — composite mixes; use Energy if ANY part is Energy.
  const damageType = perPartStats.some(pp => pp.stats.damageType === "Energy") ? "Energy" : "Physical";
  // Immunity stripping rule. Union of constituent immunities, then
  // remove "Physical" / "Energy" damage-type immunities UNLESS the
  // composite includes Energy-Reflective Coating (retained per §14).
  const hasERC = partsArr.some(p => (p.keywords || []).includes("Energy-Reflective Coating"));
  const rawImmunity = [...new Set(perPartStats.flatMap(pp => pp.stats.immunity || []))];
  const immunity = rawImmunity.filter(i => {
    // Energy-Reflective Coating preserves Energy immunity ONLY.
    if (i === "Energy") return hasERC;
    return false; // strip Physical and any other damage-type flag
  });
  return {
    damage, range, power, weight, armor, reach, maxAmmo,
    damageType, immunity, bpCost,
    slotSil, partCount: partsArr.length, perPartStats,
  };
}

// Convenience: pass a library equipment entry; returns either the
// regular stats (non-linked) or the composite stats (linked). Used in
// loadout chips and equipment list rendering so callers don't have to
// branch on `isLinkedComposite`.
function equipmentStatsFor(eq) {
  if (isLinkedComposite(eq)) {
    return linkedCompositeStats(linkedConstituents(eq));
  }
  return calculateEquipmentStats(eq.keywords || [], eq.silhouette || 1);
}

function calcRobotBP(robot) {
  const sil = robot.silhouette || 1;
  const str = robot.frameStrength || 1;
  const dur = robot.frameDurability || 1;
  const mat = robot.frameMaterial || 1;
  const cc = (robot.components || []).length || 0;
  // Schematic + frame stats per CalculationEngine.kt:130-144
  const schematicBP = sil * cc;
  const frameStatsBP = (str * sil) + (dur * sil) + (dur * sil * mat);
  // Equipment BP across all components (RobotWizardViewModel.kt:1596).
  // c.equipment[] entries are refs {equipmentId, socketModuleId}; dereference from library.
  let equipmentBP = 0;
  for (const c of (robot.components || [])) {
    for (const e of (c.equipment || [])) {
      const eq = EQUIPMENT_BY_ID[e.equipmentId];
      if (eq) equipmentBP += calcEquipmentBP(eq);
    }
  }
  return schematicBP + frameStatsBP + equipmentBP;
}
function calcShieldsMax(robot) {
  const ids = robotInstalledModuleIds(robot);
  const gens = ids.filter(id => MODULES_BY_ID[id]?.shieldsMultiplier > 0).length;
  return gens * (robot.silhouette || 1);
}
function calcCapacitorPool(robot) {
  const ids = robotInstalledModuleIds(robot);
  const banks = ids.filter(id => MODULES_BY_ID[id]?.emergencyShutdownBonus > 0).length;
  return banks * 2;
}
function calcStrainThreshold(robot) {
  const sil = robot.silhouette || 1;
  const ids = robotActiveModuleIds(robot);  // §68: active, not installed
  const coproc = ids.reduce((sum, id) => sum + (MODULES_BY_ID[id]?.coprocessorBonus || 0), 0);

}
function calcTotalBoost(robot) {
  return robotInstalledModuleIds(robot)
    .map(id => MODULES_BY_ID[id]?.boost || 0)
    .reduce((a,b) => a+b, 0);
}
function calcTotalWeight(robot) {
  let w = 0;
  for (const c of robot.components || []) {
    let raw = 0;
    for (const m of c.modules || []) raw += MODULES_BY_ID[m.moduleId]?.weight || 0;
    w += c.isFrame ? Math.ceil(raw / 2) : raw;
    // §79 (Ch 13 L158): Total Weight includes "+ Σ equipment weights" at
    // FULL value, regardless of which component it's attached to. Frame
    // halving applies ONLY to module weights, NOT to equipment weights.
    // Equipment lives on c.equipment[] as refs {equipmentId, socketModuleId};
    // dereference from the library and use equipmentStatsFor so Linked
    // composites return their summed-constituent weight (linkedCompositeStats).
    for (const e of (c.equipment || [])) {
      const eq = EQUIPMENT_BY_ID[e.equipmentId];
      if (!eq) continue;
      const stats = equipmentStatsFor(eq);
      w += stats.weight || 0;

}
function calcMaxLoad(robot) {
  const fs = robot.frameStrength || 1;
  // §53 (Ch 13 L168): CORE always counts as BOTTOM-facing (has all 6 facings).
  // LEG counts if BOTTOM is its primary facing OR in additionalFacings.
  const bottomCount = (robot.components || []).reduce((count, c) => {
    if (c.definition === "CORE") return count + 1;
    if (c.definition === "LEG") {
      const hasBottom = c.facing === "BOTTOM" || (c.additionalFacings || []).includes("BOTTOM");
      return count + (hasBottom ? 1 : 0);

  const wheels = (robot.components || []).flatMap(c =>
    (c.modules || []).filter(m => m.moduleId === "wheels")
  );
  // §80 (Ch 13 L182): read groundSpeedMultiplier from the wheel module def
  // so future wheel-variants (tracks, hover-skids, etc.) can declare their own.
  const wheelsBonus = wheels.reduce((acc, w) => {
    const mult = MODULES_BY_ID[w.moduleId]?.groundSpeedMultiplier || 0;
    return acc + Math.ceil(sil * mult);
  }, 0);
  if (legs === 0 && wheels.length === 0) return 0;
  const totalWeight = calcTotalWeight(robot);
  const maxLoad = calcMaxLoad(robot);
  // §70 (Audit 14, 2026-06-17): moveMod uses ceil per current canonical text.
  // Ch 13 L178: "moveMod = ceil((Max Load − Total Weight) / 5)"
  // Ch 13 L188 editor's note: "formula spec and Ch. 8 gap audit both confirm
  //   moveMod uses `ceil` not `floor` (commit 0559987)"
  // Prior §42 floor was based on then-ambiguous prose; rulebook clarified since.
  const moveMod = Math.ceil((maxLoad - totalWeight) / 5);

function calcFuelMax(robot) {

    if (c.isDestroyed) continue;
    for (const m of c.modules || []) {
      if ((m.toggledOn ?? true) === false) continue;
      total += MODULES_BY_ID[m.moduleId]?.fuelCapacity || 0;
    }
  }

}
// §5 AI Core dynamic power (Tom 2026-06-10): an AI Core's draw scales
// logarithmically with the assigned AI Pilot's stat sum:
//   power = -(5 + ceil(5 × ln(stats - 5)))
// where stats = PHY + MEN + TRN.
//
// Floor of 5 ensures every AI Core draws at least 2.5× a Standard
// Cockpit's −2. Min legal AI is 3/3/3 (stats=9 → −12). Below the log
// domain (stats ≤ 5, defensive — shouldn't reach in practice) returns
// the static catalog fallback of −10.
function aiCorePowerDraw(aiPilot) {
  const stats =
    ((aiPilot?.physical) || 0) +
    ((aiPilot?.mental) || 0) +
    ((aiPilot?.training) || 0);
  if (stats <= 5) return -10;
  return -(5 + Math.ceil(5 * Math.log(stats - 5)));

// §5 helper: locate the AI Pilot assigned to a given ai_core slot on a
// robot. Iter 19 (Tom 2026-06-17): each ai_core module may now carry a
// `aiPilotId` field bound via the cockpit editor. When set + the pilot
// still exists + is still flagged as AI, return that pilot. Otherwise
// fall back to the legacy first-AI-in-roster scan so existing builds
// (no binding yet) keep working until the player opens the cockpit
// editor and binds explicitly.
function findAiPilotForSlot(robot, component, module) {

  const boundId = module?.aiPilotId;
  if (boundId != null) {
    const bound = state.pilots.find(p => p && p.id === boundId && p.isAi);
    if (bound) return bound;

function calcRobotPower(robot) {
  let total = 0;
  for (const c of robot?.components || []) {
    for (const m of c.modules || []) {
      const def = MODULES_BY_ID[m.moduleId];
      if (!def) continue;
      if (def.powerDynamic && m.moduleId === "ai_core") {
        // Build-time HUD: if no AI Pilot is in the roster, use the
        // minimum legal stat block (3/3/3) so the readout is sane.
        const aiPilot = findAiPilotForSlot(robot, c, m) ||
          { physical: 3, mental: 3, training: 3 };

const POWER_GEN_IDS = new Set(["stable_reactor","aux_reactor","volatile_reactor","fuel_powered_generator"]);
function validateRobot(robot) {
  const issues = [];
  const ids = robotInstalledModuleIds(robot);
  if (!ids.some(id => POWER_GEN_IDS.has(id)))
    issues.push("No power generator installed");
  if (calcRobotPower(robot) < 0)
    issues.push("Net power is negative");
  if (calcTotalWeight(robot) > calcMaxLoad(robot))
    issues.push("Weight exceeds max load");
  const legs = (robot.components || []).filter(c => c.definition === "LEG").length;
  const wheels = ids.filter(id => id === "wheels").length;
  if (legs === 0 && wheels === 0)
    issues.push("No ground movement");
  const totalCockpitSlots = ids.reduce((sum, id) => sum + (MODULES_BY_ID[id]?.cockpitSlots || 0), 0);
  if (totalCockpitSlots > 0) {
    const assignedPilots = (robot.pilotIds || []).length;
    const unassigned = totalCockpitSlots - assignedPilots;
    if (unassigned > 0)
      issues.push(`Cockpit slot unassigned (${unassigned})`);
  }
  for (const c of (robot.components || [])) {
    if (c.definition === "CORE") continue;
    const primary = c.facing || "FRONT";
    const auto = autoAdditionalFacings(c.definition, primary);
    if (auto) continue;
    const required = requiredAdditionalCount(c.definition, primary);
    if (required === 0) continue;
    const options = eligibleAdditionalFacings(c.definition, primary);
    const valid = (c.additionalFacings || []).filter(f => options.includes(f));
    if (valid.length !== required) {
      const label = c.name || c.definition;
      issues.push(`${label}: needs ${required} additional facing(s) selected (has ${valid.length})`);
    }
  }
  // Advisory notes are non-blocking — they appear in the issues list
  // alongside blockers but isValid is computed on blockers only so the
  // robot saves clean. Multi-Toggle System is "valid but needs table
  // bookkeeping" — flagging is informational, not gating.
  const advisories = [];
  const multiToggleCount = ids.filter(id => id === "multi_toggle_system").length;
  if (multiToggleCount > 0)
    advisories.push(`Multi-Toggle System: ${multiToggleCount} slot(s) — resolve assignments at the table.`);

}
function calcEffectiveSil(robot, statuses) {
  let sil = robot.silhouette || 1;
  const ids = robotInstalledModuleIds(robot);
  const hf = ids.includes("horizontal_framing");
  if (hf) sil = Math.ceil(sil / 2);
  if (statuses && statuses.includes("CROUCHED")) sil = Math.ceil(sil / 2);
  return sil;
}

function robotCockpitSlots(robot) {
  // Build shape uses tempId; battle/force shapes use componentId.
  const slots = [];
  const components = robot?.components || [];
  for (const c of components) {
    const componentId = c.componentId ?? c.tempId;
    const componentName = (c.name && c.name.trim()) || c.definition || "?";
    const modules = c.modules || [];
    for (let moduleIndex = 0; moduleIndex < modules.length; moduleIndex++) {
      const mod = modules[moduleIndex];
      const def = MODULES_BY_ID[mod.moduleId];
      if (!def) continue;
      const capacity = def.cockpitSlots || 0;
      if (capacity <= 0) continue;
      const isAi = mod.moduleId === "ai_core";
      for (let slotIndex = 0; slotIndex < capacity; slotIndex++) {
        slots.push({
          componentId,
          componentName,
          moduleIndex,
          moduleId: mod.moduleId,
          moduleName: def.name,
          slotIndex,
          slotName: `COCKPIT ${slots.length + 1}`,
          isAi,
        });
      }
    }
  }
  return slots;
}

// Pure adapter — no DOM, no side effects, no state mutation.
function forceCockpitSlots(force) {
  const slots = [];
  for (const rid of force.robotIds || []) {
    const robot = ROBOTS_BY_ID[rid];
    if (!robot) continue;
    for (const slot of robotCockpitSlots(robot)) {
      slots.push({ robotId: robot.id, robotName: robot.name || "Unnamed", ...slot });
    }
  }
  return slots;
}
