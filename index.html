    <h2>LINK EQUIPMENT // §14</h2>
    <p class="meta">Pick 2+ items with the Link Point keyword. Slot footprint = max-Sil part; BP = sum; armor = max.</p>
    ${rows}
    ${preview}
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>
      <button class="btn" data-act="confirm-link-builder" ${picked.length < 2 ? "disabled" : ""}>LINK ${picked.length} ITEMS</button>
    </div>
  `;
};

let KEYWORDS = [
  // Stat-modifying (port from CalculationEngine.kt:479-629)
  "Melee", "Ranged", "Edge", "Energy Edge", "Energy Weapon",
  "Power Cell", "Extended Range", "Scatter", "Long Range",
  "Two-handed", "Limited Ammo", "Extended Magazine",
  "Armored", "Reach Extender", "Energy-Reflective Coating",
  "Overcharged",
  // Flavor / mechanical only (no stat changes)
  "Mount Point", "Extending Grip", "Auto", "Explosive",
  "Burst", "Guard", "Inertia Additive", "Kinetic",
  // §14 Link Point: marker keyword; canLink() + buildLinkedComposite()
  // wire the actual combine semantics (cost = sum, slot = max-Sil part,
  // armor = max-of-parts, same-type weapons fire under one Attack Check
  // with separate damage rolls). Range window narrows to intersection.
  "Link Point", "Tethered", "Corded", "Penetrating",
  "Indirect", "Module Slot",
];

// 0.2.3: keyword-on-keyword constraints from Android KeywordValidator.kt
// + packs/urfs-core/keywords.json. Three relations per keyword:
//   requires    — the listed keyword (or any in requiresAny) must already
//                 be on the equipment before this one can be added
//   requiresAny — at least one of these must be present (OR semantics)
//   excludes    — bidirectional mutual exclusion
// Tom 2026-06-08: webapp pre-0.2.3 let you put Extended Magazine on a sword.
const KEYWORD_RULES = {
  "Edge":              { requires: "Melee" },
  "Energy Edge":       { requires: "Edge", excludes: ["Energy Weapon"] },
  "Energy Weapon":     { requiresAny: ["Melee", "Ranged"], excludes: ["Energy Edge"] },
  "Extended Magazine": { requires: "Limited Ammo" },
  "Reach Extender":    { requires: "Melee" },
  "Auto":              { requires: "Ranged" },
  // §18 (Ch 12 L141): Scatter excludes Long Range — short-range shot pattern
  // is incompatible with the Long Range range multiplier.
  "Scatter":           { requires: "Ranged", excludes: ["Long Range"] },
  "Limited Ammo":      { requires: "Ranged" },
  "Long Range":        { requires: "Ranged", excludes: ["Scatter"] },
  "Extended Range":    { requires: "Ranged" },
  "Explosive":         { requires: "Ranged" },
  "Burst":             { requires: "Ranged" },
  "Indirect":          { requires: "Ranged" },
  // §18: Kinetic excludes Energy Weapon (still). Recoil rule on Flying Robots
  // was removed in Ch 12 edit — effect is now solely +1 Inertia per instance.
  "Kinetic":           { requires: "Ranged", excludes: ["Energy Weapon"] },
  "Penetrating":       { requires: "Ranged" },
  // §18 (Ch 12 L141): Two-handed excludes Mount Point — Mount Point equipment
  // is mounted on a Socket and has no handle to grip with a second hand.
  "Two-handed":        { requiresAny: ["Melee", "Ranged"], excludes: ["Mount Point"] },
  "Mount Point":       { excludes: ["Two-handed"] },
  // §83 (Tom 2026-06-17): Overcharged is Ranged-only per Ch 12 L64. Pre-§83
  // requiresAny ["Melee", "Ranged"] allowed Melee, contradicting the rulebook.
  "Overcharged":       { requires: "Ranged" },
  "Inertia Additive":  { requires: "Melee" },
  "Extending Grip":    { requires: "Mount Point" },
  "Corded":            { requires: "Tethered" },
};

// Returns { ok: true } when adding `kw` to `currentKeywords` would be valid,
// otherwise { ok: false, reason } with a one-sentence why-not.
function canAddKeyword(kw, currentKeywords) {
  const rule = KEYWORD_RULES[kw];
  if (!rule) return { ok: true };
  if (rule.requires && !currentKeywords.includes(rule.requires)) {
    return { ok: false, reason: `${kw} requires ${rule.requires}.` };
  }
  if (rule.requiresAny && !rule.requiresAny.some(r => currentKeywords.includes(r))) {
    return { ok: false, reason: `${kw} requires one of: ${rule.requiresAny.join(" / ")}.` };
  }
  if (rule.excludes) {
    const conflict = rule.excludes.find(x => currentKeywords.includes(x));
    if (conflict) return { ok: false, reason: `${kw} conflicts with ${conflict}.` };
  }
  return { ok: true };
}

// Returns true if removing `kw` would orphan a dependent already on the
// equipment (e.g. removing Limited Ammo while Extended Magazine is on).
function dependentOnKeyword(kw, currentKeywords) {
  return currentKeywords.filter(other => {
    if (other === kw) return false;
    const rule = KEYWORD_RULES[other];
    if (!rule) return false;
    if (rule.requires === kw) return true;
    if (rule.requiresAny && rule.requiresAny.includes(kw)) {
      const remaining = rule.requiresAny.filter(r => r !== kw && currentKeywords.includes(r));
      return remaining.length === 0;
    }
    return false;
  });
}

// Max keyword count = 3 × silhouette per rulebook L680.
function maxKeywordsFor(silhouette) { return 3 * (silhouette || 1); }

// Snapshot the built-in data as the urfs-core pack definition.
// This is captured once at parse time so rebuildContent can restore it.
const _CORE_MODULES = MODULES.slice();
const _CORE_TALENTS = TALENTS.slice();
const _CORE_KEYWORDS = KEYWORDS.slice();

function rebuildContent() {
  const activePacks = state.packs.filter(p => p.active);
  if (activePacks.length === 0) {
    MODULES = []; TALENTS = []; KEYWORDS = [];
  } else {
    MODULES = activePacks.flatMap(p => p.modules || []);
    TALENTS = activePacks.flatMap(p => p.talents || []);
    KEYWORDS = [...new Set(activePacks.flatMap(p => p.keywords || []))];
  }
  MODULES_BY_ID = Object.fromEntries(MODULES.map(m => [m.id, m]));
}

// §87a (Tom 2026-06-17): BY_ID maps for the four user libraries, mirroring
// the MODULES_BY_ID pattern. The webapp had 105 `.find(x => x.id === id)`
// call sites doing O(n) scans on each lookup — replaced with O(1) hash
// lookups via these maps. The maps are rebuilt after every mutation
// (dbPut / dbDelete / bulk replace) via rebuildByIdMaps().
//
// Performance: with ~50 robots / ~30 pilots / ~20 forces / ~40 equipment in
// a populated install, the worst-case render walks ~10 lookups per frame.
// At 105 sites the cumulative cost was ~16k array probes per render; now
// it's 105 hash probes. Saves ~6-10ms per render on a populated install.
let EQUIPMENT_BY_ID = {};
let ROBOTS_BY_ID = {};
let FORCES_BY_ID = {};
let PILOTS_BY_ID = {};
let BATTLES_BY_ID = {};

function rebuildByIdMaps() {
  EQUIPMENT_BY_ID = Object.fromEntries((state.equipment || []).map(e => [e.id, e]));
  ROBOTS_BY_ID = Object.fromEntries((state.robots || []).map(r => [r.id, r]));
  FORCES_BY_ID = Object.fromEntries((state.forces || []).map(f => [f.id, f]));
  PILOTS_BY_ID = Object.fromEntries((state.pilots || []).map(p => [p.id, p]));
  BATTLES_BY_ID = Object.fromEntries((state.battles || []).map(b => [b.id, b]));
}

let renderEquipmentEditor = function (id) {
  const e = EQUIPMENT_BY_ID[id];
  if (!e) return "<p>?</p>";
  // §14: Linked composites get a read-only summary editor (parts list +
  // derived stats + UNLINK button). The constituent parts are edited by
  // opening their individual library entries.
  if (isLinkedComposite(e)) {
    const parts = linkedConstituents(e);
    const cs = linkedCompositeStats(parts);
    const rangeWin = linkedRangeWindow(parts);
    return `
      <h2>LINKED EQUIPMENT // §14</h2>
      <div class="field"><label>NAME</label><input id="eq-name" value="${escapeHtml(e.name)}" onchange="window.persistEquipmentField(${e.id}, 'name', this.value)" /></div>
      <div class="label-small label-cyan" style="margin-top:10px">CONSTITUENT PARTS (${parts.length})</div>
      ${parts.map(p => {
        const ps = calculateEquipmentStats(p.keywords || [], p.silhouette || 1);
        return `
        <div class="card tight">
          <div class="row-between">
            <div>
              <strong>${escapeHtml(p.name)}</strong>
              <div class="meta" style="font-size:10px">SIL ${p.silhouette || 1} · DMG ${ps.damage} · RNG ${ps.range} · ARM ${ps.armor} · BP ${ps.bpCost}</div>
              <div class="meta" style="font-size:10px">${escapeHtml((p.keywords || []).join(", ") || "no keywords")}</div>
            </div>
            <button class="btn ghost" data-act="edit-equipment" data-id="${p.id}">EDIT</button>
          </div>
        </div>`;
      }).join("")}
      <div style="margin-top:12px; padding:10px; background:rgba(77,208,225,0.08); border-radius:var(--bevel)">
        <div class="label-small label-cyan">COMPOSITE STATS (DERIVED)</div>
        <div class="meta" style="margin-top:4px">
          SIL <strong>${cs.slotSil}</strong> (max-of-parts) ·
          BP <strong>${cs.bpCost}</strong> (sum) ·
          WGT <strong>${cs.weight}</strong> ·
          ARM <strong>${cs.armor}</strong> (max-of-parts) ·
          DMG chip <strong>${cs.damage}</strong> (largest single part)
          ${rangeWin.minRange || rangeWin.maxRange ? `<br/>Range window: <strong>${rangeWin.minRange}–${rangeWin.maxRange}</strong> SU${rangeWin.empty ? " (empty)" : ""}` : ""}
          ${cs.immunity.length ? `<br/>Immunities retained: ${cs.immunity.join(", ")}` : "<br/>Immunities: stripped per §14 (except Energy-Reflective Coating)."}
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost" data-act="unlink-composite" data-id="${e.id}">🔗 UNLINK</button>
        <button class="btn ghost" data-act="modal-close">DONE</button>
      </div>
    `;
  }
  return `
    <h2>EQUIPMENT // EDIT</h2>
    <div class="row-gap" style="margin-bottom:10px; align-items:center">
      <div style="width:56px; height:56px; border-radius:var(--bevel); background:var(--surface-1); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; font-size:28px">
        ${e.imageData ? `<img src="${escapeHtml(e.imageData)}" style="width:100%;height:100%;object-fit:cover" />` : "🔫"}
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:4px">
        <button class="btn ghost" data-act="pick-equipment-image" data-id="${e.id}">${e.imageData ? "REPLACE PHOTO" : "PICK PHOTO"}</button>
        ${e.imageData ? `<button class="btn ghost" data-act="clear-equipment-image" data-id="${e.id}">REMOVE</button>` : ""}
      </div>
    </div>
    <div class="field"><label>NAME</label><input id="eq-name" value="${escapeHtml(e.name)}" onchange="window.persistEquipmentField(${e.id}, 'name', this.value)" /></div>
    <div class="row-gap" style="flex-wrap:wrap">
      <div class="field" style="flex:1; min-width:96px"><label>SIL</label><input id="eq-sil" type="number" min="1" value="${e.silhouette || 1}" /></div>
    </div>
    <div class="field">
      <label>KEYWORDS <span style="font-weight:normal;color:var(--frame-dim, var(--on-surface-muted));font-size:11px">(${(e.keywords || []).length}/${maxKeywordsFor(e.silhouette)} · max 3 × sil)</span></label>
      <div class="row-gap" style="flex-wrap:wrap">
        ${KEYWORDS.map(k => {
          const cur = e.keywords || [];
          const has = cur.includes(k);
          const check = has ? { ok: true } : canAddKeyword(k, cur);
          const atCap = !has && cur.length >= maxKeywordsFor(e.silhouette);
          const blocked = !has && (!check.ok || atCap);
          const reason = !check.ok ? check.reason : (atCap ? `Cap: ${maxKeywordsFor(e.silhouette)} keywords at SIL ${e.silhouette}.` : null);
          const klass = has ? "" : (blocked ? "muted" : "muted");
          const styleX = blocked ? " style=\"opacity:0.35;cursor:not-allowed\"" : "";
          const titleX = reason ? ` title="${escapeHtml(reason)}"` : "";
          return `<span class="chip ${klass}"${styleX}${titleX} data-act="toggle-keyword" data-id="${e.id}" data-k="${k}">${k}</span>`;
        }).join("")}
      </div>
    </div>
    <div style="margin-top:12px; padding:10px; background:rgba(77,208,225,0.08); border-radius:var(--bevel)">
      <div class="label-small label-cyan">COMPUTED STATS</div>
      <div class="meta" style="margin-top:4px">${(() => {
        const stats = calculateEquipmentStats(e.keywords || [], e.silhouette || 1);
        return `BP <strong>${stats.bpCost}</strong> · Weight <strong>${stats.weight}</strong> · Damage <strong>${stats.damage}${stats.damageType === 'Energy' ? ' ⚡' : ''}</strong>${stats.range > 0 ? ` · Range <strong>${stats.range}</strong>` : ''} · Armor <strong>${stats.armor}</strong>${stats.maxAmmo > 0 ? ` · Max Ammo <strong>${stats.maxAmmo}</strong>` : ''}${stats.power !== 0 ? ` · Power <strong>${stats.power > 0 ? '+' : ''}${stats.power}</strong>` : ''}${stats.immunity.length ? ` · Immune ${stats.immunity.join('/')}` : ''}`;
      })()}</div>
    </div>
    <div class="field">
      <label>NOTES</label>
      <textarea id="eq-notes" rows="3">${escapeHtml(e.notes || "")}</textarea>
    </div>
    <div class="actions">
      <button class="btn ghost" data-act="save-equipment" data-id="${e.id}">DONE</button>
    </div>
  `;
};
handlers["toggle-keyword"] = ({ id, k }) => {
  const e = EQUIPMENT_BY_ID[Number(id)];
  if (!e) return;
  // Persist in-flight form values before re-render, otherwise toggling a
  // keyword wipes the user's unsaved NAME / SIL / NOTES edits.
  const nameEl = document.getElementById("eq-name");
  const silEl = document.getElementById("eq-sil");
  const notesEl = document.getElementById("eq-notes");
  if (nameEl) e.name = nameEl.value || e.name;
  if (silEl) e.silhouette = parseInt(silEl.value, 10) || 1;
  if (notesEl) e.notes = notesEl.value || "";
  e.keywords = e.keywords || [];
  const has = e.keywords.includes(k);
  if (has) {
    // 0.2.3: refuse to remove a keyword that would orphan dependents
    // (e.g. removing Limited Ammo while Extended Magazine is still on).
    // Show a toast naming the dependents so the player removes them
    // first. Mount Point exclusion is handled below.
    const dependents = dependentOnKeyword(k, e.keywords);
    if (dependents.length > 0) {
      showToast(`Remove ${dependents.join(", ")} first — ${k} is required for ${dependents.length > 1 ? "them" : "it"}.`);
      return;
    }
    e.keywords = e.keywords.filter(x => x !== k);
  } else {
    // 0.2.3: gate the add on the canonical Android KeywordValidator rules
    // + the 3 × silhouette cap.
    const check = canAddKeyword(k, e.keywords);
    if (!check.ok) { showToast(check.reason); return; }
    if (e.keywords.length >= maxKeywordsFor(e.silhouette)) {
      showToast(`Keyword cap reached (${maxKeywordsFor(e.silhouette)} at SIL ${e.silhouette}). Raise SIL or remove one first.`);
      return;
    }
    e.keywords.push(k);
  }
  if (k === "Mount Point") e.mountPoint = e.keywords.includes(k);
  dbPut("equipment", e);
  render();
};
handlers["save-equipment"] = ({ id }) => {
  const e = EQUIPMENT_BY_ID[Number(id)];
  if (e) {
    e.name = document.getElementById("eq-name").value || e.name;
    e.silhouette = parseInt(document.getElementById("eq-sil").value, 10) || 1;
    e.notes = document.getElementById("eq-notes").value || "";
    // Derive computed fields from keywords so battle state reads are consistent
    const stats = calculateEquipmentStats(e.keywords || [], e.silhouette);
    e.bpCost = stats.bpCost;
    e.weight = stats.weight;
    e.armor = stats.armor;
    e.maxAmmo = stats.maxAmmo;
    dbPut("equipment", e);
  }
  closeModal();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PILOTS — list + builder
// ════════════════════════════════════════════════════════════════════
const RANKS = ["ROOKIE","EXPERIENCED","VETERAN"];
renderPilots = function () {
  if (state.pilots.length === 0) {
    return emptyScreen("PILOTS", "Build pilots here.", "+ NEW PILOT", "new-pilot");
  }
  return `
    ${state.pilots.map(p => `
      <div class="list-card" data-act="edit-pilot" data-id="${p.id}">
        <div class="thumb" style="${p.imageData ? 'overflow:hidden;padding:0' : ''}">${p.imageData ? `<img src="${escapeHtml(p.imageData)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" />` : (p.isAi ? "🤖" : "👤")}</div>
        <div style="flex:1">
          <h3>${escapeHtml(p.name || "Unnamed")}</h3>
          <div class="row-gap" style="margin-top:4px; flex-wrap:wrap">
            <span class="chip">${escapeHtml(p.rank || "ROOKIE")}</span>
            <span class="chip muted">${p.bpCost || 0} BP</span>
          </div>
          <div class="meta">PHY ${p.physical || 1} · MEN ${p.mental || 1} · TRA ${p.training || 1}</div>
          <div class="meta">${(p.talents || []).join(", ") || "no talents"}</div>
        </div>
        <button class="btn ghost" style="padding:6px 10px" data-act="delete-pilot" data-id="${p.id}">✕</button>
      </div>
    `).join("")}
    <button class="fab" data-act="new-pilot">＋</button>
  `;
};
handlers["new-pilot"] = () => {
  const id = Date.now();
  const p = { id, name: "Pilot " + state.pilots.length, rank: "ROOKIE", physical: 2, mental: 2, training: 2, talents: [], bpCost: 20, isAi: false };
  state.pilots.push(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id });
};
handlers["edit-pilot"] = ({ id }) => pushModal("pilot-editor", { id: Number(id) });
handlers["delete-pilot"] = async ({ id }) => {
  if (!confirm("Delete this pilot?")) return;
  await dbDelete("pilots", Number(id));
  state.pilots = state.pilots.filter(p => p.id !== Number(id));
  render();
};
function pilotStatPointsUsed(p) {
  // Each stat starts at 1 baseline; budget covers points above that minimum.
  return ((p.physical || 1) - 1) + ((p.mental || 1) - 1) + ((p.training || 1) - 1);
}
// §36 Ace Pilot (2026-06-17): +5 stat points. Single source of truth
// for "this pilot's stat budget" — both renderPilotEditor and the
// pilot-stat / pilot-rank handlers route through it so the +5 bonus
// is visible in the BUDGET display AND enforced in the increment gate.
function pilotStatBudget(p) {
  const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
  let total = budget.statPoints;
  if ((p.talents || []).includes("Ace Pilot")) total += 5;
  return total;
}
function pilotTalentSlotsUsed(p) {
  const names = new Set(p.talents || []);
  return TALENTS.filter(t => names.has(t.name)).reduce((s, t) => s + t.slots, 0);
}
function pilotBpReadout(p) {
  if (p.isAi) return 3 * ((p.physical || 1) + (p.mental || 1) + (p.training || 1));
  const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
  const talentNames = new Set(p.talents || []);
  const talentCost = TALENTS.filter(t => talentNames.has(t.name)).reduce((s, t) => s + t.cost, 0);
  return budget.bpCost + talentCost;
}
function pilotMeetsStatReq(p, reqs) {
  if (!reqs) return true;
  if (reqs.physical && (p.physical || 1) < reqs.physical) return false;
  if (reqs.mental   && (p.mental   || 1) < reqs.mental)   return false;
  if (reqs.training && (p.training || 1) < reqs.training) return false;
  return true;
}
let renderPilotEditor = function (id) {
  const p = PILOTS_BY_ID[id];
  if (!p) return "<p>?</p>";
  const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
  // §36 Ace Pilot: +5 stat points routed through pilotStatBudget(p).
  const statBudget = pilotStatBudget(p);
  const spUsed = pilotStatPointsUsed(p);
  const spLeft = statBudget - spUsed;
  const slotsUsed = pilotTalentSlotsUsed(p);
  const slotsLeft = budget.talentSlots - slotsUsed;
  const talentSet = new Set(p.talents || []);
  const bp = pilotBpReadout(p);
  const statRow = (label, field, val) => {
    const canDec = val > 1;
    const canInc = spLeft > 0 && val < 6;
    return `
      <div style="display:flex; align-items:center; gap:8px; margin-top:6px">
        <span style="width:80px; font-size:12px; font-weight:700; color:var(--on-surface-muted)">${label}</span>
        <button class="btn ghost" style="padding:4px 10px" data-act="pilot-stat" data-id="${p.id}" data-f="${field}" data-d="-1" ${canDec?'':'disabled'}">−</button>
        <span style="min-width:24px; text-align:center; font-weight:700; font-size:16px">${val}</span>
        <button class="btn ghost" style="padding:4px 10px" data-act="pilot-stat" data-id="${p.id}" data-f="${field}" data-d="1" ${canInc?'':'disabled'}">+</button>
      </div>`;
  };
  return `
    <h2>PILOT // EDIT</h2>
    <div class="row-gap" style="margin-bottom:10px; align-items:center">
      <div style="width:56px; height:56px; border-radius:50%; background:var(--surface-1); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; font-size:28px">
        ${p.imageData ? `<img src="${escapeHtml(p.imageData)}" style="width:100%;height:100%;object-fit:cover" />` : "👤"}
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:4px">
        <button class="btn ghost" data-act="pick-pilot-image" data-id="${p.id}">${p.imageData ? "REPLACE PHOTO" : "PICK PHOTO"}</button>
        ${p.imageData ? `<button class="btn ghost" data-act="clear-pilot-image" data-id="${p.id}">REMOVE</button>` : ""}
      </div>
    </div>
    <div class="field"><label>NAME</label><input id="p-name" value="${escapeHtml(p.name)}" onchange="window.persistPilotField(${p.id}, 'name', this.value)" /></div>
    <div class="row-gap" style="flex-wrap:wrap; margin-top:6px">
      <div class="field" style="flex:1; min-width:120px">
        <label>RANK</label>
        <select id="p-rank" data-act="pilot-rank" data-id="${p.id}">${RANKS.map(r => `<option ${r===p.rank?'selected':''}>${r}</option>`).join("")}</select>
      </div>
      <div class="field" style="flex:1; min-width:96px">
        <label>AI?</label>
        <select id="p-ai" data-act="pilot-ai" data-id="${p.id}">
          <option value="false" ${!p.isAi?'selected':''}>Human</option>
          <option value="true" ${p.isAi?'selected':''}>AI</option>
        </select>
      </div>
    </div>

    <div class="label-small label-cyan" style="margin-top:10px">STATS — ${spLeft} pts remaining (budget ${statBudget}${statBudget !== budget.statPoints ? " · ACE PILOT +5" : ""})</div>
    <div class="meta" style="font-size:11px; margin-top:2px; color:var(--on-surface-dim)">1 = baseline (free); each +1 above = 1 pt.</div>
    ${statRow("PHYSICAL", "physical", p.physical || 1)}
    ${statRow("MENTAL",   "mental",   p.mental   || 1)}
    ${statRow("TRAINING", "training", p.training || 1)}

    <div class="label-small" style="margin-top:10px; color:var(--amber)">BP: ${bp}</div>

    ${p.isAi ? `<p class="meta" style="margin-top:8px; font-size:11px">AI pilots have no talents. BP = 3 × (PHY + MEN + TRN).</p>` : `
      <div class="label-small label-cyan" style="margin-top:10px">TALENTS (${slotsUsed}/${budget.talentSlots} slots)</div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px">
        ${TALENTS.map(t => {
          const selected = talentSet.has(t.name);
          const meetsReqs = pilotMeetsStatReq(p, t.statReqs);
          const wouldFit = selected || (slotsLeft >= t.slots);
          const disabled = !selected && (!wouldFit || !meetsReqs);
          const reqLabel = t.statReqs ? Object.entries(t.statReqs).map(([k,v]) => `${k[0].toUpperCase()}${v}`).join(" ") : "";
          return `<button class="action-btn" data-act="toggle-talent" data-id="${p.id}" data-t="${escapeHtml(t.name)}"
            style="opacity:${meetsReqs ? 1 : 0.4}; ${disabled && !selected ? 'pointer-events:none;' : ''}"
            title="${meetsReqs ? '' : 'Requires: ' + reqLabel}">
            <span class="nm" style="color:${selected ? 'var(--cyan)' : 'var(--on-surface-muted)'}">
              ${selected ? '☑' : '☐'} ${escapeHtml(t.name)} <span style="font-size:11px">[${t.slots}sl · ${t.cost}bp]</span>
            </span>
            <span class="hint">${escapeHtml(t.description)}${reqLabel ? ' · Req: ' + reqLabel : ''}</span>
          </button>`;
        }).join("")}
      </div>
    `}
    <div class="actions">
      <button class="btn ghost" data-act="save-pilot" data-id="${p.id}">DONE</button>
    </div>
  `;
};
handlers["pilot-stat"] = ({ id, f, d }) => {
  const p = PILOTS_BY_ID[Number(id)];
  if (!p) return;
  p.name = document.getElementById("p-name")?.value || p.name;
  // §36 Ace Pilot: stat budget routed through pilotStatBudget(p).
  const statBudget = pilotStatBudget(p);
  const delta = parseInt(d, 10);
  const cur = p[f] || 1;
  const spUsed = pilotStatPointsUsed(p);
  const spLeft = statBudget - spUsed;
  if (delta > 0 && (spLeft <= 0 || cur >= 6)) return;
  if (delta < 0 && cur <= 1) return;
  p[f] = cur + delta;
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["pilot-rank"] = ({ id }) => {
  const p = PILOTS_BY_ID[Number(id)];
  if (!p) return;
  p.name = document.getElementById("p-name")?.value || p.name;
  p.rank = document.getElementById("p-rank").value;
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["pilot-ai"] = ({ id }) => {
  const p = PILOTS_BY_ID[Number(id)];
  if (!p) return;
  p.name = document.getElementById("p-name")?.value || p.name;
  p.isAi = document.getElementById("p-ai").value === "true";
  if (p.isAi) p.talents = [];
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["toggle-talent"] = ({ id, t }) => {
  const p = PILOTS_BY_ID[Number(id)];
  if (!p || p.isAi) return;
  // Sync ALL in-flight form values before toggling — otherwise stat-req checks
  // use stale stat values from the last save, not what the user just typed.
  p.name = document.getElementById("p-name")?.value || p.name;
  const physEl = document.getElementById("p-physical");
  const menEl = document.getElementById("p-mental");
  const trnEl = document.getElementById("p-training");
  if (physEl) p.physical = parseInt(physEl.value, 10) || p.physical;
  if (menEl) p.mental = parseInt(menEl.value, 10) || p.mental;
  if (trnEl) p.training = parseInt(trnEl.value, 10) || p.training;
  p.talents = p.talents || [];
  const talent = TALENTS.find(x => x.name === t);
  if (!talent) return;
  if (p.talents.includes(t)) {
    p.talents = p.talents.filter(x => x !== t);
  } else {
    if (!pilotMeetsStatReq(p, talent.statReqs)) return;
    const slotsUsed = pilotTalentSlotsUsed(p);
    const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
    if (slotsUsed + talent.slots > budget.talentSlots) return;
    p.talents.push(t);
  }
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["save-pilot"] = ({ id }) => {
  const p = PILOTS_BY_ID[Number(id)];
  if (p) {
    p.name = document.getElementById("p-name").value || p.name;
    p.isAi = document.getElementById("p-ai").value === "true";
    p.rank = document.getElementById("p-rank").value;
    p.bpCost = pilotBpReadout(p);
    dbPut("pilots", p);
  }
  closeModal();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// FORCES — list + builder + deploy
// ════════════════════════════════════════════════════════════════════
renderForces = function () {
  if (state.forces.length === 0) {
    return emptyScreen("FORCES", "Build a force (squad) here.", "+ NEW FORCE", "new-force");
  }
  return `
    ${state.forces.map(f => {
      const totalBP = (f.robotIds || []).reduce((sum, rid) => {
        const r = ROBOTS_BY_ID[rid];
        return r ? sum + depBP(r, f) : sum;
      }, 0);
      const cap = f.bpCap || 0;
      const over = cap > 0 && totalBP > cap;
      return `
      <div class="list-card" data-act="edit-force" data-id="${f.id}">
        <div class="thumb">👥</div>
        <div style="flex:1">
          <h3>${escapeHtml(f.name || "Unnamed Force")}</h3>
          <div class="row-gap" style="margin-top:4px; flex-wrap:wrap">
            <span class="chip">${(f.robotIds || []).length} robots</span>
            <span class="chip muted">${cap > 0 ? `${totalBP} / ${cap} BP` : `${totalBP} BP`}</span>
            ${over ? `<span class="chip" style="background:var(--red,#ef4444);color:#fff" title="Force BP exceeds the agreed cap. Lower BP or raise the cap before deploying.">⚠ OVER BP CAP (${totalBP}/${cap})</span>` : ""}
          </div>
        </div>
        <button class="btn ghost" style="padding:6px 10px" data-act="delete-force" data-id="${f.id}">✕</button>
      </div>`;
    }).join("")}
    <button class="fab" data-act="new-force">＋</button>
  `;
};
handlers["new-force"] = () => {
  const id = Date.now();
  const f = { id, name: "Force " + state.forces.length, bpCap: 300, robotIds: [] };
  state.forces.push(f);
  dbPut("forces", f);
  pushModal("force-editor", { id });
};
handlers["edit-force"] = ({ id }) => pushModal("force-editor", { id: Number(id) });
handlers["delete-force"] = async ({ id }) => {
  if (!confirm("Delete this force?")) return;
  await dbDelete("forces", Number(id));
  state.forces = state.forces.filter(f => f.id !== Number(id));
  render();
};
let renderForceEditor = function (id) {
  const f = FORCES_BY_ID[id];
  if (!f) return "<p>?</p>";
  const assigns = f.pilotAssignments || {};
  const totalBP = (f.robotIds || []).reduce((sum, rid) => {
    const r = ROBOTS_BY_ID[rid];
    return r ? sum + depBP(r, f) : sum;
  }, 0);
  const cap = f.bpCap || 0;
  const overCap = cap > 0 && totalBP > cap;
  const robotRows = (f.robotIds || []).map(rid => {
    const r = ROBOTS_BY_ID[rid];
    if (!r) return "";
    const slots = robotCockpitSlots(r);
    const robotAssign = assigns[r.id] || {};
    const usedPilotIds = new Set(
      Object.entries(assigns).flatMap(([rk, slotMap]) =>
        Object.entries(slotMap || {}).map(([, pid]) => pid).filter(Boolean)
      )
    );
    const slotRows = slots.map((slot, i) => {
      if (slot.isAi) return `<div class="meta" style="margin:4px 0 4px 8px">${escapeHtml(slot.slotName)} · A.I. Core (auto)</div>`;
      const cur = robotAssign[i] || "";
      // Human cockpit slots show human pilots only (AI Core slots already
      // short-circuit above); allow re-selecting the current pick even if it
      // appears in the used-elsewhere set.
      const available = state.pilots.filter(p => (!usedPilotIds.has(p.id) || p.id === cur) && !p.isAi);
      const opts = `<option value="">— Unassigned —</option>` +
        available.map(p =>
          `<option value="${p.id}" ${p.id === cur ? "selected" : ""}>${escapeHtml(p.name || "Pilot")} <span class="chip">${p.bpCost || 0} BP</span></option>`
        ).join("");
      const assignedPilot = cur ? PILOTS_BY_ID[cur] : null;
      const slotPortrait = assignedPilot?.imageData
        ? `<div style="width:28px;height:28px;border-radius:50%;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px"><img src="${escapeHtml(assignedPilot.imageData)}" style="width:100%;height:100%;object-fit:cover" /></div>`
        : `<span style="font-size:16px;margin-right:4px">👤</span>`;
      return `
        <div style="margin:4px 0 4px 8px">
          <div class="meta" style="display:flex;align-items:center">${slotPortrait}${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)}</div>
          <select data-act="force-editor-pilot-pick" data-fid="${f.id}" data-rid="${r.id}" data-slot="${i}"
            style="margin-top:4px;width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:6px;border-radius:4px">
            ${opts}
          </select>
        </div>`;
    }).join("");
    return `
      <div class="card tight" style="margin-bottom:8px">
        <div class="row-between">
          <span>${escapeHtml(r.name)} <span class="chip muted">${depBP(r, f)} BP</span></span>
          <div class="row-gap">
            <button class="btn ghost" style="padding:4px 8px; font-size:11px" data-act="preview-robot-deploy" data-rid="${r.id}" data-fid="${f.id}" title="Show full deploy preview — BP, armor, power, weapons, pilots, build warnings.">👁 PREVIEW</button>
            <button class="btn ghost" data-act="force-remove-robot" data-fid="${f.id}" data-rid="${rid}">✕</button>
          </div>
        </div>
        ${slotRows}
      </div>`;
  }).join("");

  const capBar = cap > 0 ? (() => {
    const pct = Math.min(100, Math.round(totalBP / cap * 100));
    const barColor = overCap ? "var(--red, #ef4444)" : "var(--cyan, #22d3ee)";
    return `
      <div style="margin:10px 0 4px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${barColor};transition:width .2s"></div>
      </div>
      <div class="row-between" style="margin-bottom:8px">
        <span class="meta">${totalBP} / ${cap} BP</span>
        ${overCap ? `<span class="chip" style="background:var(--red,#ef4444);color:#fff" title="Force BP exceeds the agreed cap. Lower BP or raise the cap before deploying.">⚠ OVER BP CAP (${totalBP}/${cap})</span>` : ""}
      </div>`;
  })() : `<div class="meta" style="margin:6px 0">${totalBP} BP (no cap)</div>`;

  return `
    <h2>FORCE // EDIT</h2>
    <div class="field"><label>NAME</label><input id="f-name" value="${escapeHtml(f.name)}" onchange="window.persistForceField(${f.id}, 'name', this.value)" /></div>
    <div class="field"><label>BP CAP</label><input id="f-cap" type="number" min="0" value="${f.bpCap ?? 0}" onchange="window.persistForceField(${f.id}, 'bpCap', this.value, true)" /></div>
    <div class="label-small label-cyan" style="margin-top:8px">ROBOTS (${(f.robotIds || []).length})</div>
    ${robotRows}
    <button class="btn wide" data-act="force-add-robot" data-fid="${f.id}">＋ ADD ROBOT</button>
    ${capBar}
    <div class="actions">
      <button class="btn ghost" data-act="save-force" data-id="${f.id}">DONE</button>
      ${((f.robotIds || []).length === 0)
        ? `<button class="btn ghost" disabled style="opacity:0.5; cursor:not-allowed" title="Force has no robots to deploy. Add a robot first.">DEPLOY — EMPTY</button>`
        : `<button class="btn amber" data-act="deploy-force" data-id="${f.id}">DEPLOY</button>`}
    </div>
  `;
};
handlers["force-editor-pilot-pick"] = ({ fid, rid, slot }, value) => {
  const f = FORCES_BY_ID[Number(fid)];
  if (!f) return;
  f.pilotAssignments = f.pilotAssignments || {};
  f.pilotAssignments[Number(rid)] = f.pilotAssignments[Number(rid)] || {};
  const ridN = Number(rid);
  const slotN = Number(slot);
  const newPilotId = value ? Number(value) : null;
  // §81 (rulebook: a pilot is in ONE cockpit at a time, though a single
  // robot may have multiple cockpit modules per Ch 13). If this pilot is
  // already assigned to ANY other (rid, slot) in this force — including
  // a different slot on the same robot — auto-unassign there first.
  // Matches the "moving a pilot from one cockpit to another" UX. The
  // render path at line ~4553 already filters duplicates out of the
  // <select> options, so this is a defensive backstop for legacy data
  // or any handler-bypass path.
  if (newPilotId != null) {
    for (const [otherRid, slots] of Object.entries(f.pilotAssignments)) {
      for (const [otherSlot, pid] of Object.entries(slots || {})) {
        if (Number(pid) !== newPilotId) continue;
        if (Number(otherRid) === ridN && Number(otherSlot) === slotN) continue;
        delete f.pilotAssignments[otherRid][otherSlot];
        const pilotName = (PILOTS_BY_ID[newPilotId]?.name) || "Pilot";
        const oldRobot = ROBOTS_BY_ID[Number(otherRid)];
        const newRobot = ROBOTS_BY_ID[ridN];
        const oldRobotName = oldRobot?.name || `Robot ${otherRid}`;
        const newRobotName = newRobot?.name || `Robot ${ridN}`;
        if (Number(otherRid) === ridN) {
          showToast(`${pilotName} moved to slot ${slotN + 1} of ${newRobotName}`);
        } else {
          showToast(`${pilotName} moved from ${oldRobotName} to ${newRobotName}`);
        }
      }
    }
  }
  f.pilotAssignments[ridN][slotN] = newPilotId;
  dbPut("forces", f);
  render();
};
handlers["save-force"] = ({ id }) => {
  const f = FORCES_BY_ID[Number(id)];
  if (f) {
    f.name = document.getElementById("f-name").value || f.name;
    f.bpCap = parseInt(document.getElementById("f-cap").value, 10) || 0;
    dbPut("forces", f);
  }
  closeModal();
};
handlers["force-add-robot"] = ({ fid }) => {
  pushModal("force-add-robot", { fid: Number(fid) });
};
let renderForceAddRobot = function (fid) {
  const f = FORCES_BY_ID[fid];
  const candidates = state.robots.filter(r => !(f.robotIds || []).includes(r.id));
  if (candidates.length === 0) return `<h2>NO ROBOTS</h2><p>Build robots in the GARAGE first.</p><div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>`;
  return `
    <h2>ADD A ROBOT</h2>
    ${candidates.map(r => `
      <div class="card tight" data-act="confirm-force-add-robot" data-fid="${fid}" data-rid="${r.id}">
        <strong>${escapeHtml(r.name)}</strong>
        <span class="chip muted" style="margin-left:8px">${calcRobotBP(r)} BP</span>
      </div>
    `).join("")}
    <div class="actions"><button class="btn ghost" data-act="back-to-force" data-fid="${fid}">CANCEL</button></div>
  `;
};
handlers["confirm-force-add-robot"] = ({ fid, rid }) => {
  const f = FORCES_BY_ID[Number(fid)];
  if (!f) return;
  f.robotIds = f.robotIds || [];
  f.robotIds.push(Number(rid));
  dbPut("forces", f);
  pushModal("force-editor", { id: Number(fid) });
};
handlers["back-to-force"] = ({ fid }) => pushModal("force-editor", { id: Number(fid) });
handlers["force-remove-robot"] = ({ fid, rid }) => {
  const f = FORCES_BY_ID[Number(fid)];
  if (!f) return;
  f.robotIds = (f.robotIds || []).filter(x => x !== Number(rid));
  dbPut("forces", f);
  pushModal("force-editor", { id: Number(fid) });
};
handlers["deploy-force"] = ({ id }) => {
  const f = FORCES_BY_ID[Number(id)];
  if (!f || (f.robotIds || []).length === 0) {
    // §59 (Playwright probe, Bug 5): empty-force gate. The DEPLOY
    // button is also rendered as disabled (force-editor) so this is
    // a belt-and-suspenders fallback for any caller that bypasses
    // the disabled affordance.
    showToast("Force has no robots to deploy — add a robot first.");
    return;
  }
  const cap = f.bpCap || 0;
  if (cap > 0) {
    const totalBP = (f.robotIds || []).reduce((sum, rid) => {
      const r = ROBOTS_BY_ID[rid];
      return r ? sum + depBP(r, f) : sum;
    }, 0);
    if (totalBP > cap && !confirm(`Force exceeds BP cap (${totalBP}/${cap}). Continue anyway?`)) return;
  }
  // §27 deploy preview gate: surface any RED build warnings (power
  // negative, overloaded) one last time before commit. Matches iter
  // 26's advisory-only policy — confirm-to-proceed, not a hard block.
  // Runs on BOTH the AI-only branch and the human-cockpit branch.
  const _redRobots = [];
  for (const rid of (f.robotIds || [])) {
    const robot = ROBOTS_BY_ID[rid];
    if (!robot) continue;
    const preview = buildRobotDeployPreview(robot, f);
    const redWarns = (preview?.warnings || []).filter(w => w.severity === "red");
    if (redWarns.length > 0) {
      _redRobots.push(`${robot.name || "Unnamed"} (${redWarns.map(w => w.label).join(", ")})`);
    }
  }
  if (_redRobots.length > 0) {
    const msg = `${_redRobots.length} robot${_redRobots.length===1?"":"s"} have RED build warnings:\n\n${_redRobots.join("\n")}\n\nDeploy anyway?`;
    if (!confirm(msg)) return;
  }
  if (forceCockpitSlots(f).filter(s => !s.isAi).length === 0) {
    // No human cockpit slots — build AI-only battle directly.
    deployForceWithAssignments(f, {});
  } else {
    // Seed pilot-assign modal from force editor pre-assignments so the user can review/confirm.
    const seeded = {};
    for (const rid of (f.robotIds || [])) {
      const robot = ROBOTS_BY_ID[rid];
      if (!robot) continue;
      const robotAssign = (f.pilotAssignments || {})[rid] || {};
      const slots = robotCockpitSlots(robot);
      for (let i = 0; i < slots.length; i++) {
        const pid = robotAssign[i];
        if (pid) seeded[`${rid}:${slots[i].componentId}:${slots[i].slotIndex}`] = pid;
      }
    }
    pushModal("pilot-assign", { fid: f.id, assignments: seeded });
  }
};

function deployForceWithAssignments(f, assignments) {
  const battle = {
    id: Date.now(),
    name: f.name + " — " + new Date().toLocaleString(),
    round: 1,
    // §33: placeholder — P2 force isn't selected yet, so we can't
    // compute starting Priority by BP. computeStartingPriority(b) runs
    // at the moment P2 deploys (in the confirm-pilot-assign side==P2
    // branch) and overwrites this with the lower-BP side.
    priority: "P1",
    p1ForceName: f.name,
    p1ForceId: f.id,
    p2ForceName: "Opponent",
    p2ForceId: null,
    undoStack: [],
    p1Robots: f.robotIds.map(rid => {
      const robot = ROBOTS_BY_ID[rid];
      const bs = buildBattleRobotState(robot, "P1");
      bs.cockpitPilots = robotCockpitSlots(robot).map(slot => {
        const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
        const pilotId = slot.isAi ? null : (assignments[slotKey] || null);
        // §4-A: Pilot HP = 2 × Physical (3 × with Tank). AI cockpits and
        // unassigned slots don't track HP (left 0).
        const pilot = pilotId != null ? PILOTS_BY_ID[pilotId] : null;
        const hasTank = pilot ? (pilot.talents || []).includes("Tank") : false;
        const pilotHpMax = pilot ? (hasTank ? 3 : 2) * (pilot.physical || 1) : 0;
        return {
          componentId: slot.componentId,
          moduleIndex: slot.moduleIndex,
          slotIndex: slot.slotIndex,
          slotName: slot.slotName,
          pilotId,
          isAi: slot.isAi,
          pilotStrain: 0,
          // §4-A (rulebook L810): HP = 2 × Physical (3 × with Tank).
          // KO at HP 0 per L388. pilotStrain is a separate counter.
          pilotHpMax,
          pilotHpDamage: 0,
        };
      });
      return bs;
    }),
    p2Robots: [],
  };
  state.battles.push(battle);
  state.activeBattle = battle;
  state.tab = "battle";
  state.activeRobotId = null;
  dbPut("battles", battle);
  closeModal();
  render();
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// BATTLE — overview + per-robot
// ════════════════════════════════════════════════════════════════════
renderBattle = function () {
  if (!state.activeBattle) {
    return `
      <div class="empty">
        <h2>NO ACTIVE BATTLE</h2>
        <p>Pick a force in the FORCES tab and tap DEPLOY.</p>
        <button class="btn primary" style="margin-top:14px" data-act="go-forces">GO TO FORCES</button>
        ${state.battles.length > 0 ? `
          <div class="label-small" style="margin-top:24px">RECENT BATTLES</div>
          ${state.battles.map(b => {
            // Bug #10 fix: legacy battles or battles whose source force was
            // deleted can have b.name undefined/empty. Fall back to the
            // p1ForceName, then to a date-stamped placeholder, then to a
            // round label so the <h3> never renders empty.
            const dateLabel = b.id ? new Date(b.id).toLocaleString() : null;
            const heading = (b.name && b.name.trim())
              || b.p1ForceName
              || (dateLabel ? `Battle from ${dateLabel}` : null)
              || `Round ${b.round || 1}`;
            return `
            <div class="list-card" data-act="resume-battle" data-id="${b.id}">
              <div class="thumb">⚡</div>
              <div style="flex:1"><h3>${escapeHtml(heading)}</h3><div class="meta">Round ${b.round}</div></div>
            </div>
          `;}).join("")}
        ` : ""}
      </div>
    `;
  }
  const b = state.activeBattle;
  if (state.activeRobotId) {
    return renderPerRobotBattle(b, state.activeRobotId);
  }
  return renderBattleOverview(b);
};
handlers["resume-battle"] = ({ id }) => {
  // §87c (Tom 2026-06-17): tolerate both numeric and string ids. The
  // original `x.id === Number(id)` silently no-op'd on string ids
  // (`Number("foo")` is NaN, and NaN !== anything). Content packs and
  // imports can ship string ids; fall back to BY_ID map lookup for
  // O(1) plus a String-equality probe so neither id shape gets dropped.
  const b = BATTLES_BY_ID[id]
    || BATTLES_BY_ID[Number(id)]
    || BATTLES_BY_ID[String(id)]
    || state.battles.find(x => x.id === id || x.id === Number(id) || String(x.id) === String(id));
  if (b) {
    // §44 (Tom 2026-06-17): central schema migration BEFORE pilotHp.
    // Backfills every additive field iters 1–31 introduced, repairs
    // orphan IDs, and persists if anything was applied. Idempotent —
    // resume after a clean save is a no-op.
    const schemaUpdates = migrateBattleSchema(b);
    if (schemaUpdates > 0) dbPut("battles", b);
    // §4 migration: legacy battles predate pilotHp tracking. Backfill
    // on resume so KO checks + UI work from the first render.
    migrateBattlePilotHp(b);
    state.activeBattle = b;
    state.activeRobotId = null;
    // §43 (Tom 2026-06-17): if the battle was saved mid-Fortitude-sequence,
    // scan all robots (both forces) for non-empty _pendingFortQueue and
    // re-open the fortitude-sequence modal on the FIRST robot with pending
    // items. The queue itself is persisted on the robot (dbPut in
    // _enqueueFortItem / fort-seq-* handlers), so resume just needs to
    // surface the modal. setTimeout(0) defers past the initial render so
    // the modal host is mounted before pushModal runs.
    const allRobots = [...(b.p1Robots || []), ...(b.p2Robots || [])];
    const pendingRobot = allRobots.find(r => (r._pendingFortQueue || []).length > 0);
    if (pendingRobot) {
      setTimeout(() => {
        // Re-check live state — user could have closed the battle between
        // the find above and the deferred pushModal.
        if (state.activeBattle?.id !== b.id) return;
        if (state.modal) return;
        pushModal("fortitude-sequence", { robotId: pendingRobot.robotId, lastRoll: null });
        showToast(`Resumed mid-Fortitude — ${(pendingRobot._pendingFortQueue || []).length} check(s) pending on ${pendingRobot.robotName || pendingRobot.name || "Robot"}. §43`, 3600);
      }, 0);
    }
    render();
  }
};

function renderBattleOverview(b) {
  // Single-force mode: the webapp tracks YOUR side only. Opponents stay at
  // the table, off-app. No P2 chrome, no add-opponent affordance.
  // Iter 22 (Tom 2026-06-17): game-over banner — visible whenever
  // b.gameOver === true, lets the player re-summon the dismissed modal.
  const gameOverBanner = b.gameOver ? `
    <div class="card" style="border:2px solid var(--squad-gold); margin-bottom:8px; cursor:pointer" data-act="show-game-over">
      <div class="label-small" style="color:var(--squad-gold)">BATTLE COMPLETE</div>
      <strong>${escapeHtml(b.winner || "—")} WINS</strong>
      <div class="meta" style="font-size:12px; margin-top:2px">${escapeHtml(b.lossReason || "")} · tap for details</div>
    </div>
  ` : "";
  return `
    ${gameOverBanner}
    <div class="card friendly row-between">
      <div>
        <div class="label-small label-cyan">YOUR FORCE</div>
        <strong>${escapeHtml(b.p1ForceName || "Your force")}</strong>
      </div>
      <div class="row-gap">
        <span class="chip">ROUND ${b.round}</span>
        ${(b.passedThisRound || {}).P1
          ? `<span class="chip muted">PASSED — opp's turn</span>`
          : `<span class="chip amber">YOUR TURN</span>`}
      </div>
    </div>
    ${b.p1Robots.map(r => robotOverviewCard(r)).join("")}
    <div class="row-gap" style="margin-top:14px">
      <button class="btn amber wide" data-act="pass-priority">PASS PRIORITY</button>
    </div>
    <div class="row-gap" style="margin-top:8px">
      <button class="btn ghost" data-act="round-prev">− ROUND</button>
      <button class="btn ghost" data-act="round-next" style="flex:1">＋ ROUND</button>
      <button class="btn danger" data-act="end-battle">END</button>
    </div>
    <div class="row-gap" style="margin-top:8px">
      <button class="btn ghost" style="flex:1" data-act="open-action-log">📜 BATTLE LOG (${(b.undoStack || []).length})</button>
      <button class="btn ghost" style="flex:1" data-act="open-rule-search">🔍 RULE SEARCH</button>
    </div>
  `;
}
function renderOpponentForcePicker() {
  const b = state.activeBattle;
  // Exclude the deployed P1 force AND any force that would put a robot.id
  // into both sides (findBattleRobot resolves first-match-wins, so a
  // collision would make a P2 robot effectively unreachable).
  const p1RobotIds = new Set((b.p1Robots || []).map(r => r.robotId));
  const eligible = state.forces.filter(f => {
    if (f.id === b.p1ForceId) return false;
    const fRobotIds = f.robotIds || [];
    return !fRobotIds.some(id => p1RobotIds.has(id));
  });
  const p1Label = b.p1ForceName || "your force";
  if (eligible.length === 0) {
    return `
      <h2>ADD OPPONENT FORCE</h2>
      <p style="margin:16px 0">No other forces available — every existing force either is your current one or shares a robot with it. Create a new force in the FORCES tab first.</p>
      <div class="actions" style="margin-top:16px">
        <button class="btn ghost" data-act="close-opponent-picker">CANCEL</button>
      </div>
    `;
  }
  return `
    <h2>ADD OPPONENT FORCE</h2>
    <div class="meta" style="margin-bottom:12px">Pick the force that will oppose ${escapeHtml(p1Label)}.</div>
    ${eligible.map(f => `
      <div class="list-card" data-act="select-opponent-force" data-fid="${f.id}" style="cursor:pointer;margin-bottom:6px">
        <div style="flex:1">
          <h3 style="margin:0">${escapeHtml(f.name || "Unnamed Force")}</h3>
          <div class="meta">${f.robotIds ? f.robotIds.length : 0} robot(s)</div>
        </div>
        <span class="chip">SELECT</span>
      </div>
    `).join("")}
    <div class="actions" style="margin-top:16px">
      <button class="btn ghost" data-act="close-opponent-picker">CANCEL</button>
    </div>
  `;
}

handlers["close-opponent-picker"] = () => {
  closeModal();
};

handlers["select-opponent-force"] = ({ fid }) => {
  pushModal("pilot-assign", { fid: Number(fid), assignments: {}, side: "P2" });
};

function robotOverviewCard(r) {
  const armorCurrent = r.components.reduce((a, c) => a + c.hpCurrent, 0);
  const armorMax = r.components.reduce((a, c) => a + c.hpMax, 0);
  const sideClass = r.side === "P2" ? "opposing" : "friendly";
  return `
    <div class="card ${sideClass}" data-act="open-robot" data-id="${r.robotId}">
      <div class="row-between">
        <div>
          <h3 style="margin:0">${escapeHtml(r.robotName)}</h3>
        </div>
        <div class="row-gap">
          ${statusChip(r)}
          ${silChip(r)}
        </div>
      </div>
      <div class="stat-grid" style="margin-top:8px">
        <div class="stat-cell ${armorCurrent < armorMax ? 'warn' : 'ok'}"><span class="lbl">ARM</span><span class="val">${armorCurrent}/${armorMax}</span></div>
        <div class="stat-cell ${r.fuelMax > 0 && r.fuelCurrent < r.fuelMax * 0.25 ? 'warn' : 'ok'}"><span class="lbl">FUEL</span><span class="val">${r.fuelMax === 0 ? "—" : `${r.fuelCurrent}/${r.fuelMax}`}</span></div>
        <div class="stat-cell ok"><span class="lbl">SHLD</span><span class="val">${r.shieldsCurrent}/${r.shieldsMax}</span></div>
        <div class="stat-cell ${r.systemStrain > r.systemStrainThreshold ? 'over' : 'ok'}"><span class="lbl">STR</span><span class="val">${r.systemStrain}/${r.systemStrainThreshold}</span></div>
      </div>
    </div>
  `;
}
function silChip(r) {
  const eff = calcEffectiveSilBattle(r);
  if (eff !== r.silhouette) return `<span class="chip amber">SIL ${eff}* (base ${r.silhouette})</span>`;
  return `<span class="chip">SIL ${r.silhouette}</span>`;
}
// Status impact tooltip text (Tom 2026-06-17): hovering a status chip
// surfaces the mechanical effect of that status. Pulled from the
// rulebook citations already embedded in ACTIONS (CROUCH L264) and
// Ch 6/8/13/35. Kept terse so the title attribute reads cleanly.
const STATUS_IMPACT = {
  SHUTDOWN:  "Pilot Emergency Shutdown (§35). Robot is unconscious — no actions, no Reactions. Wake via §35 recovery rules.",
  DOWN:      "Knocked prone (Ch 8). Sil counts as 1/3 (floor, min 1) for ALL attacks vs this Robot. Stand-up costs 1/3 Sil in movement before any other movement.",
  CROUCHED:  "Sil counts as ½ (floor) for enemy RANGED Attacks only. +2 dice on own Ranged with Grabbed weapons (L264). Any movement ends Crouch.",
  FLYING:    "Altitude > 0. Movement is Vector-based; off-Vector turns force Fortitude Checks (Ch 9). +1 hit required per point of target Inertia (Ch 6 §40).",
  GRAPPLED:  "Held by another Robot (§13.C). Cannot take Movement actions; −2 dice on Ranged Attacks. Only internally-mounted ranged weapons can fire (min range still applies).",
  GRAPPLING: "Holding another Robot (§13.F). Manipulators committed to the grab are occupied while grappling continues. Click chip to release as a free action.",
};
function statusChip(r) {
  const s = r.statusEffects || [];
  // §59 (Playwright probe, Bug 6): SHUTDOWN derived from the canonical
  // r.shutdown flag, NOT just statusEffects. applyImmediateShutdown /
  // applyShutdownEntryEffects set r.shutdown = true but did NOT push
  // "SHUTDOWN" into statusEffects, so the badge fell through to
  // FLYING (the prior status) and the player saw an in-flight badge
  // on a robot that had just powered down. r.shutdown beats every
  // other status display per the rulebook: a shutdown Robot is by
  // definition not flying / standing / crouched.
  if (r.shutdown || s.includes("SHUTDOWN")) return `<span class="chip red" title="${escapeHtml(STATUS_IMPACT.SHUTDOWN)}">SHUTDOWN</span>`;
  // Ch 8 (Tom 2026-06-17): when DOWN, surface a STAND UP affordance
  // right on the chip. Per rulebook: "Must spend 1/3 Silhouette in
  // movement to stand up before any other movement." The webapp doesn't
  // track per-action movement budgets, so the toast surfaces the cost
  // for the table; the click only mutates the status.
  if (s.includes("DOWN")) {
    const sil = r.silhouette || 1;
    const cost = Math.ceil(sil / 3);
    return `<span class="chip red" title="${escapeHtml(STATUS_IMPACT.DOWN)}">DOWN</span>` +
      `<button class="chip amber" data-act="stand-up-from-down" data-id="${r.robotId}" style="cursor:pointer; border:none; margin-left:6px" title="Stand up — costs ${cost} SU of movement (1/3 Silhouette, Ch 8). Resolve cost at the table.">STAND UP</button>`;
  }
  if (s.includes("GRAPPLED")) return `<span class="chip orange" title="${escapeHtml(STATUS_IMPACT.GRAPPLED)}">GRAPPLED</span>`;
  // §13.F — GRAPPLING chip is also the Release-Grapple affordance.
  // Tap to drop both sides' link as a free action (no token cost).
  if (s.includes("GRAPPLING")) {
    return `<span class="chip orange" data-act="release-grapple" data-id="${r.robotId}" style="cursor:pointer" title="${escapeHtml(STATUS_IMPACT.GRAPPLING)} Click to release (free action — both sides drop GRAPPLED/GRAPPLING).">GRAPPLING ✕</span>`;
  }
  if (s.includes("CROUCHED")) return `<span class="chip amber" title="${escapeHtml(STATUS_IMPACT.CROUCHED)}">CROUCHED</span>`;
  if (s.includes("FLYING") || r.altitude > 0) return `<span class="chip" title="${escapeHtml(STATUS_IMPACT.FLYING)}">FLYING</span>`;
  return `<span class="chip green" title="No active status. Robot is grounded and able to act normally.">STANDING</span>`;
}
function calcEffectiveSilBattle(r) {
  let s = r.silhouette;
  const hf = r.components.some(c => c.modules.some(m => m.moduleId === "horizontal_framing"));
  if (hf) s = Math.ceil(s / 2);
  if ((r.statusEffects || []).includes("CROUCHED")) s = Math.ceil(s / 2);
  return s;
}
// Ch 6 Sil-comparison difficulty (Tom 2026-06-17): when computing the
// hits-required difficulty for an Attack, status effects on the target
// shrink its effective Silhouette in specific ways:
//   - CROUCHED: half (floor) for enemy RANGED attacks only. Melee
//     against a Crouched target uses full Sil — rulebook L264 says
//     "counts as half for enemy Ranged Attacks" specifically.
//   - DOWN: 1/3 (floor, minimum 1) for ALL attack kinds.
//   - FLYING / SHUTDOWN: no Sil modifier from the status itself.
// Returns the effective Silhouette to use on the target side of the
// attacker_sil vs target_sil comparison. Distinct from
// calcEffectiveSilBattle (which handles Horizontal Framing + CROUCHED
// for general display purposes) — this one is attack-kind aware.
function effectiveSilForAttack(target, attackKind) {
  if (!target) return 1;
  const sil = target.silhouette || 1;
  const statuses = target.statusEffects || [];
  if (statuses.includes("DOWN")) return Math.max(1, Math.floor(sil / 3));
  if (statuses.includes("CROUCHED") && attackKind === "RANGED") return Math.max(1, Math.floor(sil / 2));
  return sil;
}
function findBattleRobot(b, rid) {
  // Either id type may be string or number depending on call site.
  const n = Number(rid);
  const p1 = (b?.p1Robots || []).find(x => x.robotId === n || x.robotId === rid);
  if (p1) return p1;
  return (b?.p2Robots || []).find(x => x.robotId === n || x.robotId === rid);
}
// §41 (Tom 2026-06-17): per-action Inertia decay. Rulebook L10062:
// "Inertia decreases by (half Silhouette − Glide) after each action
// resolves." Glide modules (Wings et al.) slow the decay. Floor at 0
// so a Glide-heavy build never gains Inertia from decay.
//
// Companion helper: applyInertiaDecay() mutates the robot's Inertia
// in place and toasts the delta. Called from resolve-action after
// Primary / Reaction completion.
function calcGlide(robot) {
  let glide = 0;
  for (const c of robot.components || []) {
    for (const m of c.modules || []) {
      const def = MODULES_BY_ID[m.moduleId];
      if (def && def.glide) glide += def.glide;
    }
  }
  return glide;
}
function inertiaDecayAmount(robot) {
  if (!robot) return 0;
  const sil = robot.silhouette || 1;
  const glide = calcGlide(robot);
  return Math.max(0, Math.floor(sil / 2) - glide);
}
function applyInertiaDecay(robot) {
  if (!robot) return 0;
  const before = robot.inertia || 0;
  if (before <= 0) return 0;
  const decay = inertiaDecayAmount(robot);
  if (decay <= 0) return 0;
  const after = Math.max(0, before - decay);
  robot.inertia = after;
  return before - after;
}
// §40 (Tom 2026-06-17): targeting a Robot with Inertia > 0 requires
// +N additional hits where N = target's Inertia. Returns the worst-
// case penalty across all currently-selected targetIds in the modal.
// Returns 0 if no inertia-bearing target picked.
function inertiaTargetingPenalty(target) {
  if (!target) return 0;
  return Math.max(0, Number(target.inertia || 0));
}
// §40 melee bonus damage: attackerInertia × targetSil added to base
// damage on melee hit. Returns 0 when attacker has no Inertia.
function inertiaMeleeBonus(attacker, target) {
  if (!attacker || !target) return 0;
  const inr = Number(attacker.inertia || 0);
  const sil = Number(target.silhouette || 0);
  if (inr <= 0 || sil <= 0) return 0;
  return inr * sil;
}
// Deducts fuel for active fuel_gen / fuel_powered_generator modules each round.
// Auto-deactivates if fuel hits 0 while the generator is still on.
function applyRoundFuelBurn(robot) {
  for (const c of robot.components || []) {
    for (const m of c.modules || []) {
      const def = MODULES_BY_ID[m.moduleId];
      if (!def || !def.fuelConsumption) continue;
      if (!(m.toggledOn ?? true)) continue;
      robot.fuelCurrent = Math.max(0, (robot.fuelCurrent || 0) - def.fuelConsumption);
      if (robot.fuelCurrent === 0) m.toggledOn = false;
    }
  }
}
function hoverFloorFor(r) {
  // §67 (Ch 9 L74): Hover Systems are stackable — three Hover Systems
  // set floor 3, not floor 1. Count all toggled-on hover_system
  // modules on non-destroyed Components and sum.
  // Drift would re-flatten to "any hover → floor 1" and silently
  // ignore the stackable: true entry in MODULES (line 855), making
  // 3-Hover-System BR builds lose 2 altitude they paid for.
  let floor = 0;
  for (const c of (r.components || [])) {
    if (c.isDestroyed) continue;
    for (const m of (c.modules || [])) {
      if (m.moduleId === "hover_system" && (m.toggledOn ?? true)) floor++;
    }
  }
  return floor;
}
function syncFlyingStatus(r) {
  const flying = (r.statusEffects || []).includes("FLYING");
  if ((r.altitude ?? 0) > 0 && !flying) {
    r.statusEffects = [...(r.statusEffects || []).filter(s => s !== "STANDING"), "FLYING"];
    // §19 Vector Die rotation prompt (Tom 2026-06-10, rulebook Ch 9
    // L16). Surface the placement reminder on first transition into
    // Flying state per battle. Dedup with r._vectorDieTipShown so a
    // Robot that takes off / lands / takes off again only sees it
    // once.
    if (!r._vectorDieTipShown && typeof showToast === "function") {
      r._vectorDieTipShown = true;
      showToast("Place Vector Die in front of Robot in flight direction; keep Facing Die at model's front.", 3600);
    }
  } else if ((r.altitude ?? 0) <= 0 && flying) {
    r.statusEffects = (r.statusEffects || []).filter(s => s !== "FLYING");
  }
}
// Ch 5 (Tom 2026-06-17): Crouch auto-end. "Any movement, Boosting, or
// Altitude/Inertia change ends the Crouch." Centralized so every site
// that mutates altitude/inertia/position can call it with the reason
// string and get a consistent toast. Returns true if CROUCHED was
// actually cleared (caller can chain logging if needed).
function endCrouchIfActive(r, reason) {
  if (!r) return false;
  const wasCrouched = (r.statusEffects || []).includes("CROUCHED");
  if (!wasCrouched) return false;
  r.statusEffects = (r.statusEffects || []).filter(s => s !== "CROUCHED");
  // Push STANDING back on if it isn't already present (and no other
  // mutex status like DOWN/SHUTDOWN/GRAPPLED is dominant — those are
  // set by their own paths and shouldn't be displaced by a Crouch-end).
  const s = r.statusEffects || [];
  const hasDominant = s.includes("DOWN") || s.includes("SHUTDOWN") ||
                      s.includes("GRAPPLED") || s.includes("FLYING");
  if (!hasDominant && !s.includes("STANDING")) {
    r.statusEffects = [...s, "STANDING"];
  }
  if (typeof showToast === "function") {
    showToast(`Crouch ended: ${reason}.`, 2400);
  }
  return true;
}
// §13.F Release Grapple — free action (no token cost). Tapped from the
// GRAPPLING chip on the grappler's status banner. Clears both sides'
// link, drops statuses, releases occupied Manipulators.
// Ch 8 (Tom 2026-06-17): one-click Stand Up from DOWN. Surfaced from
// the DOWN status chip. Per rulebook: "Must spend 1/3 Silhouette in
// movement to stand up before any other movement." The webapp doesn't
// track per-action movement budgets, so the cost is surfaced in the
// toast for the table; the mutation itself only flips the status.
handlers["stand-up-from-down"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, Number(id));
  if (!r) return;
  if (!(r.statusEffects || []).includes("DOWN")) {
    showToast("Stand Up — Robot is not DOWN.");
    return;
  }
  recordUndo(`${r.robotName || "Robot"} stood up`);
  // Clear DOWN, drop any stale movement status, set STANDING.
  r.statusEffects = [...(r.statusEffects || [])
    .filter(s => s !== "DOWN" && s !== "STANDING"), "STANDING"];
  const sil = r.silhouette || 1;
  const cost = Math.ceil(sil / 3);
  dbPut("battles", state.activeBattle);
  render();
  showToast(`Stand Up — DOWN → STANDING. Costs ${cost} SU of movement (1/3 Sil ${sil}). Ch 8`, 3200);
};
handlers["release-grapple"] = ({ id }) => {
  const b = state.activeBattle;
  if (!b) return;
  const all = [...(b.p1Robots || []), ...(b.p2Robots || [])];
  const grappler = all.find(x => x.robotId === Number(id));
  if (!grappler) return;
  if (!(grappler.statusEffects || []).includes("GRAPPLING")) {
    showToast("Not grappling anyone.");
    return;
  }
  const otherId = grappler.grapplingId;
  const other = otherId != null ? all.find(x => x.robotId === otherId) : null;
  recordUndo(`${grappler.robotName || "Robot"} released grapple`);
  clearGrappleLink(grappler, other);
  dbPut("battles", b);
  render();
  showToast(`Grapple released — ${grappler.robotName || "Robot"} ↔ ${other?.robotName || "partner"}. Free action.`);
};
handlers["pass-priority"] = ({ side } = {}) => {
  const b = state.activeBattle;
  if (!b) return;
  const _passSide = side || b.priority || "P1";
  recordUndo(`${_passSide} passed`);
  b.passedThisRound = b.passedThisRound || { P1: false, P2: false };
  const passingSide = side || b.priority || "P1";
  const sideRobots = passingSide === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
  // Pass clears Pilot Strain per L220. fuel_reactor generates +4 fuel per Pass (rulebook).
  for (const r of sideRobots) {
    r.pilotTokens = 0;
    // Ch 7 L11: "Pass clears Pilot Strain — all Pilot tokens on that
    // Robot are cleared." Webapp tracks Pilot tokens on three fields
    // (legacy + per-pilot picker path + Cool Head decrement source).
    // Clear all three so no stale token count survives a Pass.
    r.cockpitPilots = (r.cockpitPilots || []).map(p => ({ ...p, pilotStrain: 0, tokens: 0 }));
    const hasFuelReactor = r.components?.some(c => c.modules?.some(m => m.moduleId === "fuel_reactor"));
    if (hasFuelReactor) {
      const fuelMax = calcFuelMax(r) || 0;
      r.fuelCurrent = Math.min(fuelMax, (r.fuelCurrent || 0) + 4);
    }
  }
  b.passedThisRound[passingSide] = true;
  const hasP2 = (b.p2Robots || []).length > 0;
  if (!hasP2 || (b.passedThisRound.P1 && b.passedThisRound.P2)) {
    // Skirmish solo path OR both sides passed → advance round.
    b.round = (b.round || 1) + 1;
    b.passedThisRound = { P1: false, P2: false };
    // §priority Ch 4: Pass transfers Priority to the opponent. The
    // round-advance branch was hardcoding "P1" which silently flipped
    // priority away from whichever side was the legitimate next holder
    // (e.g. P2 passed first → P1 passed second → opponent of the LAST
    // passer is P2, not P1). Mirror the non-round-end branch (L5211) so
    // both paths use the same rule. Skirmish solo path (no P2) keeps
    // priority on P1.
    if (hasP2) {
      b.priority = passingSide === "P1" ? "P2" : "P1";
    } else {
      b.priority = "P1";
    }
    for (const robot of [...(b.p1Robots || []), ...(b.p2Robots || [])]) {
      robot.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
      robot.gspdSpent = 0;
      robot.pendingParryReductions = 0;
      // §35: clear the per-pilot "just took a Reaction" flag at round end —
      // Cool Head only fires Fortitude-after-Reaction within the same round.
      for (const cp of (robot.cockpitPilots || [])) cp._justTookReaction = false;
      // Tom 2026-06-10 §12: NO in-battle Capacitor regen. Capacitors
      // recharge between battles only. Once spent, gone for the rest
      // of this battle.
      // Shutdown-this-round clears at round advance — but only if a
      // conscious human Pilot is aboard. AI Pilots cannot reboot the
      // Robot (§6.B). Robots with no live human stay Shutdown.
      if (robot.shutdown) {
        const hasConsciousHuman = (robot.cockpitPilots || []).some(cp =>
          !cp.isAi && !cp.isKO && cp.pilotId
        );
        if (hasConsciousHuman) robot.shutdown = false;
      }
      applyRoundFuelBurn(robot);
      // Parity with manual "+ ROUND" branch (round-next handler):
      // Fast Fingers grants 1 free Toggle Incidental per FF pilot per
      // round. Was only rebuilt on manual round-bump; the natural Pass-
      // driven round-advance path was leaving last round's counter
      // intact, silently denying FF pilots their reset bucket on the
      // most common round-advance path.
      const ffCount = (robot.cockpitPilots || [])
        .filter(cp => !cp.isAi && !cp.isKO && cp.pilotId)
        .filter(cp => (PILOTS_BY_ID[cp.pilotId]?.talents || []).includes("Fast Fingers"))
        .length;
      robot.freeToggleIncidentals = ffCount;
    }
    showToast(`Round ${b.round} begins.`);
  } else {
    b.priority = passingSide === "P1" ? "P2" : "P1";
    showToast(`${passingSide} passed. ${b.priority} has priority.`);
  }
  dbPut("battles", b);
  render();
};
handlers["round-prev"] = () => { if (state.activeBattle.round > 1) state.activeBattle.round--; dbPut("battles", state.activeBattle); render(); };
handlers["round-next"] = () => {
  const b = state.activeBattle;
  recordUndo(`Round ${b.round} ended`);
  b.round++;
  b.passedThisRound = { P1: false, P2: false };
  b.priority = "P1";
  for (const robot of [...(b.p1Robots || []), ...(b.p2Robots || [])]) {
    robot.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    // Parity with the Pass-driven round-advance branch (L5203-L5206):
    // gspdSpent + pendingParryReductions are per-round counters that
    // were silently surviving manual "+ ROUND" advances. Drift would
    // cap a Robot's Ground Speed at last round's spend even though the
    // round actually rolled over.
    robot.gspdSpent = 0;
    robot.pendingParryReductions = 0;
    // §35: clear the per-pilot "just took a Reaction" flag at round end.
    for (const cp of (robot.cockpitPilots || [])) cp._justTookReaction = false;
    // Tom 2026-06-10 §12: NO in-battle Capacitor regen.
    // §6.B: AI Pilots cannot reboot — only a live human Pilot does.
    if (robot.shutdown) {
      const hasConsciousHuman = (robot.cockpitPilots || []).some(cp =>
        !cp.isAi && !cp.isKO && cp.pilotId
      );
      if (hasConsciousHuman) robot.shutdown = false;
    }
    applyRoundFuelBurn(robot);
    // Fast Fingers: grant 1 free Toggle Incidental per Fast Fingers pilot per round.
    const ffCount = (robot.cockpitPilots || [])
      .filter(cp => !cp.isAi && !cp.isKO && cp.pilotId)
      .filter(cp => (PILOTS_BY_ID[cp.pilotId]?.talents || []).includes("Fast Fingers"))
      .length;
    robot.freeToggleIncidentals = ffCount;
  }
  dbPut("battles", b);
  render();
};
handlers["show-game-over"] = () => {
  // §59 (Playwright probe, Bug 7): "BATTLE COMPLETE — tap for details"
  // banner click wire-up. Pre-fix the handler silently returned when
  // either activeBattle was null OR gameOver was false. Playwright
  // reported the tap doing nothing — most likely because state.modal
  // bookkeeping had drift and re-rendering the game-over modal needs
  // an explicit pushModal. We now always push the modal with the
  // current battle id; renderGameOver itself has the "no completed
  // battle" fallback, so a stale click still produces a visible result
  // instead of a silent no-op.
  const b = state.activeBattle;
  if (!b) {
    showToast("No active battle to inspect.");
    return;
  }
  pushModal("game-over", { battleId: b.id });
};
handlers["end-battle"] = async () => {
  if (!confirm("End this battle?")) return;
  await dbDelete("battles", state.activeBattle.id);
  state.battles = state.battles.filter(b => b.id !== state.activeBattle.id);
  state.activeBattle = null;
  render();
};
handlers["open-robot"] = ({ id }) => {
  state.activeRobotId = Number(id);
  render();
};
handlers["open-action-log"] = () => pushModal("action-log", {});
handlers["undo-battle-step"] = ({ idx }) => {
  const b = state.activeBattle;
  if (!b || !b.undoStack) return;
  const i = Number(idx);
  const entry = b.undoStack[i];
  if (!entry) return;
  // Restore snapshot, keep the stack up to (not including) this entry.
  const restored = JSON.parse(JSON.stringify(entry.snapshot));
  restored.undoStack = b.undoStack.slice(0, i);
  state.activeBattle = restored;
  // Sync back into battles array and persist.
  const bi = state.battles.findIndex(x => x.id === restored.id);
  if (bi >= 0) state.battles[bi] = restored;
  dbPut("battles", restored);
  // Stay on action-log modal so user can see the updated (shorter) list.
  pushModal("action-log", {});
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PER-ROBOT BATTLE — VitalsPanel, action sheet, components map
// ════════════════════════════════════════════════════════════════════
function renderPerRobotBattle(b, rid) {
  const r = findBattleRobot(b, rid);
  if (!r) return `<p>Robot ${rid} not found.</p>`;
  const armorCurrent = r.components.reduce((a, c) => a + c.hpCurrent, 0);
  const armorMax = r.components.reduce((a, c) => a + c.hpMax, 0);
  const eff = calcEffectiveSilBattle(r);
  const silModified = eff !== r.silhouette;
  // §36 Commando (2026-06-17): pre-game free move up to max Ground Speed.
  // "Before the game starts" maps to Round 1 in the webapp. Surface a
  // one-time advisory banner when round === 1 AND a conscious Commando
  // pilot is in the cockpit. Resolves at the table.
  const _commandoBanner = (() => {
    if ((b.round || 1) !== 1) return "";
    const hasCommando = (r.cockpitPilots || []).some(cp =>
      !cp.isAi && !cp.isKO && cp.pilotId &&
      ((state.pilots || []).find(p => p.id === cp.pilotId)?.talents || []).includes("Commando")
    );
    if (!hasCommando) return "";
    return `<div class="card tight" style="border-color:var(--cyan); margin-top:6px"><span class="label-small label-cyan">COMMANDO — pre-game</span> Move up to maximum Ground Speed (${r.groundSpeed || 0} SU) before the game starts. Resolve at the table. §36 / Ch 11.</div>`;
  })();
  return `
    <div class="card">
      <div class="row-between">
        <button class="btn ghost" style="padding:4px 10px" data-act="back-overview">← ${escapeHtml(b.p1ForceName)}</button>
        <h3 style="margin:0">${escapeHtml(r.robotName)}</h3>
        ${silModified
          ? `<span class="chip amber">SIL ${eff}* (base ${r.silhouette})</span>`
          : `<span class="chip">SIL ${r.silhouette}</span>`}
      </div>
      <div class="row-gap" style="margin-top:6px; flex-wrap:wrap">
        ${statusChip(r)}
        ${aiPilotAtMentalCap(r) ? `<span class="chip amber" title="AI Pilot Action Tokens ${r.pilotTokens || 0}/${aiPilotMentalCap(r)} — must PASS. §Ch 3 / L11380">🤖 AI AT MENTAL CAP</span>` : ""}
        <button class="btn ghost" style="padding:4px 8px" data-act="status-picker" data-id="${r.robotId}">▾ STATUS</button>
        <button class="btn ghost" style="padding:4px 8px" data-act="show-loadout" data-id="${r.robotId}">LOADOUT</button>
        <button class="btn ghost" style="padding:4px 8px; margin-left:auto" data-act="open-roller" data-id="${r.robotId}" data-k="">🎲 ROLL</button>
      </div>
      <div class="stat-grid" style="margin-top:8px">
        <div class="stat-cell ${armorCurrent < armorMax ? 'warn' : 'ok'}" data-act="show-armor" data-id="${r.robotId}"><span class="lbl">ARMOR</span><span class="val">${armorCurrent}/${armorMax}</span></div>
        <div class="stat-cell ${r.fuelMax > 0 && r.fuelCurrent < r.fuelMax * 0.25 ? 'warn' : 'ok'}" data-act="show-fuel" data-id="${r.robotId}"><span class="lbl">FUEL</span><span class="val">${r.fuelMax === 0 ? "—" : `${r.fuelCurrent}/${r.fuelMax}`}</span></div>
        <div class="stat-cell ok" data-act="show-shields" data-id="${r.robotId}"><span class="lbl">SHLD</span><span class="val">${r.shieldsCurrent}/${r.shieldsMax}</span></div>
        <div class="stat-cell" data-act="show-pilots" data-id="${r.robotId}">
          <span class="lbl">P TOK</span>
          <span class="val">${pilotTokSummary(r)}</span>
        </div>
      </div>
      <div class="stat-grid" style="margin-top:6px">
        <div class="stat-cell ${r.systemStrain > r.systemStrainThreshold ? 'over' : 'ok'}" data-act="show-strain" data-id="${r.robotId}"><span class="lbl">STR</span><span class="val">${r.systemStrain}/${r.systemStrainThreshold}</span></div>

//

// (the legacy robot-level counter). Human cockpits accumulate strain on
// `cp.pilotStrain` via the pilot picker (actionShowsPilotPicker), so
// `r.pilotTokens` is bumped ONLY by the legacy non-picker path (line
// ~7594) and by BOOST (line ~7404) — both of which are the paths an AI
// cockpit's actions take. `r.pilotTokens` is therefore the AI Pilot's
// Action Token counter.

// resolves the bound AI Pilot via aiPilotId (falling back to the first

// opts.viaEquipment     — equipment object that dealt damage (for Guard checks).
// opts.isOverflow       — set internally when this call routes overflow from a
//                          destroyed child Component; skips shields + suppresses

function applyDamage(robotId, componentId, amount, type, opts = {}) {

  let remaining = amount;

      dbPut("battles", state.activeBattle);

      render();

    }

    showToast(`Shields absorb ${shieldAbsorb}. ${remaining} continues to armor.`);
  }

  // ── Stage 2: Guard equipment ────────────────────────────────────────
  // Guard equipment on the component intercepts damage before component armor.

    (e.keywords || []).includes("Guard") && (e.armorCurrent ?? 0) > 0

    // Energy-Reflective Coating: reflect full Energy hit when guard is at full armor.
    if (type === "Energy"
        && (guardEq.keywords || []).includes("Energy-Reflective Coating")
        && guardEq.armorCurrent === guardEq.armorMax) {
      r.damageLog = r.damageLog || [];
      r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "reflected" });
      dbPut("battles", state.activeBattle);
      showToast(`Energy REFLECTED by ${escapeHtml(guardEq.name || "Guard equipment")}.`);
      render();
      return { reflected: true };
    }
    // Tom 2026-06-13 (§15.D): Guarding Equipment is now generic — it absorbs
    // damage up to its armor pool regardless of type. The old Melee-weapon →
    // Physical-immunity branch is STRUCK (per Ch 12 L112). Damage immunities
    // other than Energy-Reflective Coating are lost while Guarding.
    // Guard equipment absorbs up to its armorCurrent; overflow continues down
    // the pipeline to the guarded Component. If guard armor is fully depleted

    // intercept the next attack — predicate above already gates on > 0.
    const guardAbsorb = Math.min(guardEq.armorCurrent, remaining);

      dbPut("battles", state.activeBattle);

      showToast(`${guardAbsorb} absorbed by ${escapeHtml(guardEq.name || "Guard equipment")}. No breach.${brokenMsg}`);

    r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "coating-absorbed" });

      r.damageLog.push({ when: Date.now(), componentId, amount, type, result: "overwhelmed" });
      dbPut("battles", state.activeBattle);
      showToast(`Armor overwhelmed — ${escapeHtml(c.name || c.definition || "component")} destroyed!`);

  r.damageLog = r.damageLog || [];
  r.damageLog.push({ when: Date.now(), componentId, amount, type, absorbed, breach });
  dbPut("battles", state.activeBattle);

    // Non-Frame Components are destroyed at zero armor with no save —
    // breach routes immediately as overflow to the parent Component (§15.B).
    if (c.isFrame) {
      showToast(`${absorbed} absorbed, ${breach} breach — rolling Frame Save.`);
      pushModal("frame-save", {
        rid: robotId, cid: componentId,
        fd: r.frameDurability || 1,
        fm: r.frameMaterial || 1,
        breach,

      destroyComponent(robotId, componentId);

      // overflow goes BACK to the originally-targeted Component, NOT up the
      // blocker's parent chain (Ch 6 L82).
      if (opts.blockOriginalCid != null && opts.blockOriginalCid !== componentId) {
        showToast(`${breach} overflow → original Block target (§15.C).`);
        // Iter 52 (Tom 2026-06-17): Penetrating bypass on a Block-redirected
        // hit propagates to the original-target overflow per same-hit
