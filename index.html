<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0b0f14" />
<title>URFS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230b0f14'/%3E%3Ctext x='32' y='42' font-family='ui-monospace,monospace' font-size='28' font-weight='700' text-anchor='middle' fill='%234dd0e1'%3EU%3C/text%3E%3C/svg%3E" />
<!--
  URFS — web parity build
  Single-file workaround for iOS testers (no Mac, no native iOS build).
  Mirrors the Android app's visual treatment + interaction model. Data
  persists in IndexedDB; one URL per device. Ship-as-single-file so
  GitHub Pages just serves a static asset.
  ---
  Version: 0.0.13 (2026-06-05)
    + JSON export/import (top of Garage). Round-trips everything.
    + Image picker on robot editor (data URL, fully local).
    + Dice roller with applicable bonus chips per robot/context.
    + 2D schematic in robot editor + per-robot battle screen.
  Source of truth for rules: ../android/app/src/main/assets/rulebook.md
-->
<style>
  /* ── Theme — mirrors android/ui/theme/Color.kt ─────────────────── */
  :root {
    --surface-0: #0b0f14;
    --surface-1: #11171f;
    --surface-2: #161e29;
    --surface-3: #1d2734;
    --on-surface: #d6e3f0;
    --on-surface-muted: #8da0b6;
    --on-surface-dim: #5a6c80;
    --cyan: #4dd0e1;
    --cyan-dim: #2da4b8;
    --amber: #ffb347;
    --warn-amber: #ffb74d;
    --orange: #ff8a5b;
    --green: #4ece71;
    --red: #ef5350;
    --bevel: 4px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--surface-0); color: var(--on-surface);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
      "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.4;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  body { padding-bottom: env(safe-area-inset-bottom); }
  button, input, select, textarea {
    font: inherit; color: inherit;
  }
  button { cursor: pointer; }
  a { color: var(--cyan); text-decoration: none; }

  /* ── Layout ─────────────────────────────────────────────────────── */
  #app {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
  }
  .titlebar {
    padding: 14px 16px 8px;
    display: flex; align-items: baseline; gap: 6px;
  }
  .titlebar .brand {
    font-size: 22px; font-weight: 800; color: var(--cyan);
    letter-spacing: 0.02em;
  }
  .titlebar .suffix {
    font-size: 12px; color: var(--on-surface-muted); font-weight: 700;
    margin-left: auto;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .titlebar .suffix.amber { color: var(--amber); }

  main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 0 16px 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Bottom nav ─────────────────────────────────────────────────── */
  .botnav {
    position: sticky; bottom: 0;
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: var(--surface-1);
    border-top: 1px solid var(--surface-3);
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 10;
  }
  .botnav button {
    background: transparent; border: none; color: var(--on-surface-muted);
    padding: 8px 4px; display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em;
  }
  .botnav button .ic {
    font-size: 18px; line-height: 1;
  }
  .botnav button[aria-current="page"] {
    color: var(--cyan);
  }

  /* ── Generic UI primitives ──────────────────────────────────────── */
  .card {
    background: var(--surface-1);
    border: 1px solid var(--surface-3);
    border-radius: var(--bevel);
    padding: 12px;
    margin-bottom: 10px;
  }
  .card.tight { padding: 10px; }
  .card.row { display: flex; gap: 12px; align-items: flex-start; }
  .card.friendly { border-left: 3px solid var(--cyan); }
  .card.opposing { border-left: 3px solid var(--red); }
  .chip {
    display: inline-flex; align-items: center;
    padding: 2px 6px; border-radius: 3px;
    background: rgba(77, 208, 225, 0.15);
    color: var(--cyan);
    font-size: 11px; font-weight: 700;
    border: 1px solid rgba(77, 208, 225, 0.35);
    letter-spacing: 0.04em;
  }
  .chip.amber { background: rgba(255, 179, 71, 0.15); color: var(--amber); border-color: rgba(255, 179, 71, 0.35); }
  .chip.orange { background: rgba(255, 138, 91, 0.15); color: var(--orange); border-color: rgba(255, 138, 91, 0.35); }
  .chip.red { background: rgba(239, 83, 80, 0.15); color: var(--red); border-color: rgba(239, 83, 80, 0.35); }
  .chip.green { background: rgba(78, 206, 113, 0.15); color: var(--green); border-color: rgba(78, 206, 113, 0.35); }
  .chip.muted { background: rgba(141, 160, 182, 0.12); color: var(--on-surface-muted); border-color: rgba(141, 160, 182, 0.25); }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .row-gap { display: flex; align-items: center; gap: 8px; }
  .label-small {
    font-size: 10px; letter-spacing: 0.08em; font-weight: 700;
    color: var(--on-surface-muted); text-transform: uppercase;
  }
  .label-cyan { color: var(--cyan); }
  .label-amber { color: var(--amber); }
  .label-red { color: var(--red); }
  .stat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .stat-cell {
    background: rgba(0,0,0,0.18);
    border-radius: var(--bevel);
    padding: 6px 8px;
    display: flex; align-items: center; gap: 6px;
    font-weight: 700;
    cursor: pointer; user-select: none;
  }
  .stat-cell .lbl { font-size: 10px; color: var(--on-surface-muted); }
  .stat-cell .val { font-size: 13px; }
  .stat-cell.over .val { color: var(--red); }
  .stat-cell.warn .val { color: var(--amber); }
  .stat-cell.ok .val { color: var(--on-surface); }
  .stat-cell.cyan .val { color: var(--cyan); }
  .btn {
    background: var(--surface-2); color: var(--cyan);
    border: 1px solid rgba(77, 208, 225, 0.40);
    border-radius: var(--bevel);
    padding: 8px 14px; font-weight: 700; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .btn.primary {
    background: var(--cyan); color: #07111a; border-color: var(--cyan);
  }
  .btn.amber {
    background: var(--amber); color: #1f1208; border-color: var(--amber);
  }
  .btn.danger {
    background: transparent; color: var(--red); border-color: var(--red);
  }
  .btn.ghost {
    background: transparent; color: var(--on-surface-muted);
    border-color: var(--surface-3);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.wide { width: 100%; }

  /* ── Modal ──────────────────────────────────────────────────────── */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  .modal {
    background: var(--surface-2);
    border-radius: 10px 10px 0 0;
    width: 100%; max-width: 540px;
    padding: 16px;
    max-height: 86vh; overflow-y: auto;
    border-top: 1px solid var(--surface-3);
    margin-bottom: env(safe-area-inset-bottom);
  }
  .modal h2 {
    margin: 0 0 6px;
    color: var(--cyan);
    font-size: 16px; letter-spacing: 0.04em;
  }
  .modal p { margin: 4px 0; color: var(--on-surface-muted); }
  .modal .actions {
    display: flex; gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }
  .field {
    display: flex; flex-direction: column; gap: 4px;
    margin: 8px 0;
  }
  .field label { font-size: 10px; color: var(--on-surface-muted); letter-spacing: 0.06em; font-weight: 700; text-transform: uppercase; }
  .field input, .field select, .field textarea {
    background: var(--surface-1);
    border: 1px solid var(--surface-3);
    border-radius: var(--bevel);
    padding: 8px 10px; color: var(--on-surface);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--cyan);
  }

  /* ── Schematic damage map ───────────────────────────────────────── */
  .dmap {
    display: flex; flex-direction: column; gap: 6px;
    align-items: center;
    padding: 8px 0;
  }
  .dmap .row {
    display: flex; justify-content: center;
    gap: 6px; align-items: center;
  }
  .dmap .col {
    display: flex; flex-direction: column;
    gap: 4px; align-items: center;
  }
  .dmap .tile {
    width: 60px; height: 60px;
    border-radius: var(--bevel);
    background: rgba(78,206,113,0.16);
    border: 1px solid rgba(78,206,113,0.55);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4px; gap: 0;
    font-size: 11px; color: var(--on-surface);
    cursor: pointer;
  }
  .dmap .tile.big { width: 80px; height: 80px; }
  .dmap .tile.warn { background: rgba(255,179,71,0.16); border-color: rgba(255,179,71,0.55); }
  .dmap .tile.bad { background: rgba(239,83,80,0.18); border-color: rgba(239,83,80,0.55); }
  .dmap .tile.dim { background: rgba(141,160,182,0.10); border-color: rgba(141,160,182,0.35); color: var(--on-surface-muted); }
  .dmap .tile.dead { background: rgba(239,83,80,0.20); border-color: rgba(239,83,80,0.65); }
  .dmap .tile .abbr { font-size: 11px; font-weight: 800; letter-spacing: 0.04em; }
  .dmap .tile .nm { font-size: 9px; color: var(--on-surface-muted); }
  .dmap .tile .hp { font-weight: 700; font-size: 10px; }
  .dmap .col-lbl { font-size: 9px; color: var(--on-surface-dim); letter-spacing: 0.08em; font-weight: 700; }

  /* ── Action sheet ───────────────────────────────────────────────── */
  .bucket {
    background: var(--surface-2);
    border: 1px solid rgba(77, 208, 225, 0.15);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .bucket .header {
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 800; letter-spacing: 0.08em; font-size: 13px;
    cursor: pointer; user-select: none;
  }
  .bucket .header .ic { font-size: 16px; }
  .bucket.primary .header { color: var(--cyan); }
  .bucket.reaction .header { color: var(--orange); }
  .bucket.incidental .header { color: var(--amber); }
  .bucket.pilots .header { color: var(--cyan); }
  .bucket.primary.open { border-color: rgba(77, 208, 225, 0.45); }
  .bucket.reaction.open { border-color: rgba(255, 138, 91, 0.45); }
  .bucket.incidental.open { border-color: rgba(255, 179, 71, 0.45); }
  .bucket.pilots.open { border-color: rgba(77, 208, 225, 0.45); }
  .header.static, .list-card.static { cursor: default; }
  .actions-list {
    padding: 4px 8px 8px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .action-btn {
    background: var(--surface-1);
    border: 1px solid rgba(77, 208, 225, 0.20);
    border-radius: 4px;
    padding: 8px 10px;
    text-align: left;
    color: var(--on-surface);
    display: flex; flex-direction: column; gap: 2px;
  }
  .action-btn:disabled { opacity: 0.4; }
  .action-btn .nm { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; }
  .action-btn .hint { font-size: 11px; color: var(--on-surface-muted); }
  .action-btn .reason { font-size: 11px; color: var(--orange); }

  /* ── List items ─────────────────────────────────────────────────── */
  .list-card {
    background: var(--surface-1);
    border: 1px solid var(--surface-3);
    border-radius: var(--bevel);
    padding: 12px;
    margin-bottom: 10px;
    display: flex; gap: 12px; align-items: flex-start;
    cursor: pointer;
  }
  .list-card .thumb {
    width: 60px; height: 60px;
    background: var(--surface-2);
    border-radius: var(--bevel);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--on-surface-dim);
    overflow: hidden;
  }
  .list-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .list-card h3 {
    margin: 0; font-size: 16px; color: var(--cyan); font-weight: 700;
    line-height: 1.15;
  }
  .list-card .meta {
    font-size: 11px; color: var(--on-surface-muted);
    margin-top: 4px;
  }

  .fab {
    position: fixed; right: 16px;
    bottom: calc(72px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--cyan); color: #07111a;
    font-size: 28px; line-height: 56px; text-align: center;
    border: none; box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 5;
  }

  .empty {
    text-align: center; padding: 40px 16px;
    color: var(--on-surface-muted);
  }
  .empty h2 { margin: 4px 0; color: var(--on-surface); font-size: 18px; }
  .empty p { margin: 4px 0; }

  /* Skip header on small screens */
  @media (max-width: 320px) {
    .stat-grid { grid-template-columns: repeat(4, 1fr); }
    .stat-cell { padding: 4px 6px; font-size: 12px; }
  }

  /* ── 2D schematic ───────────────────────────────────────────────── */
  .schematic-wrap {
    overflow: auto;
    border: 1px solid var(--surface-3);
    border-radius: var(--bevel);
    background: rgba(0,0,0,0.20);
    padding: 8px;
    margin: 8px 0;
    /* iOS Safari touch-action so users can pan */
    touch-action: pan-x pan-y;
    -webkit-overflow-scrolling: touch;
  }
  .schematic-grid {
    position: relative;
  }
  .schematic-grid svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .sch-node {
    position: absolute;
    width: 100px; height: 56px;
    border-radius: var(--bevel);
    background: var(--surface-2);
    border: 1px solid rgba(141,160,182,0.30);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 4px 6px;
    cursor: pointer;
    user-select: none;
    color: var(--on-surface);
  }
  .sch-node.core { background: rgba(77, 208, 225, 0.10); border-color: rgba(77, 208, 225, 0.55); }
  .sch-node.head { background: rgba(239, 83, 80, 0.10); border-color: rgba(239, 83, 80, 0.45); }
  .sch-node.arm { background: rgba(78, 206, 113, 0.10); border-color: rgba(78, 206, 113, 0.45); }
  .sch-node.leg { background: rgba(255, 179, 71, 0.10); border-color: rgba(255, 179, 71, 0.45); }
  .sch-node.utility { background: rgba(141, 160, 182, 0.10); border-color: rgba(141, 160, 182, 0.30); }
  .sch-node.warn { border-color: var(--amber); }
  .sch-node.bad { border-color: var(--red); }
  .sch-node.dead { border-color: var(--red); background: rgba(239, 83, 80, 0.18); }
  .sch-node.selected { box-shadow: 0 0 0 2px var(--cyan); }
  .sch-node .def {
    font-size: 8px; font-weight: 800; letter-spacing: 0.06em;
    color: var(--on-surface-muted);
  }
  .sch-node .nm {
    font-size: 11px; font-weight: 700; line-height: 1.1;
    overflow: hidden; text-overflow: ellipsis;
    max-width: 92px; white-space: nowrap;
  }
  .sch-node .hp {
    font-size: 10px; color: var(--on-surface-muted);
  }
  .sch-facing {
    position: absolute;
    transform: translate(-50%, 0);
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--surface-3);
    border: 1px solid rgba(77, 208, 225, 0.4);
    font-size: 8px; font-weight: 700;
    color: var(--cyan);
    pointer-events: none;
  }

  /* ── Toast ──────────────────────────────────────────────────────── */
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(80px + env(safe-area-inset-bottom));
    background: var(--surface-2); color: var(--on-surface);
    border: 1px solid var(--surface-3);
    border-radius: 6px;
    padding: 10px 14px; font-size: 13px;
    max-width: 86vw;
    z-index: 200;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<div id="app">
  <div class="titlebar">
    <span class="brand" id="title-brand">GARAGE</span>
    <span class="suffix" id="title-suffix">// MECH_DB</span>
  </div>
  <main id="screen"></main>
  <nav class="botnav" id="botnav"></nav>
</div>
<div id="modal-host"></div>
<div id="toast-host"></div>
<script>
// ────────────────────────────────────────────────────────────────────
// URFS Web — single-file build.
//
// Architecture: imperative state object + render() function that
// rewrites the screen on every action. State is persisted to
// IndexedDB on every mutation. No build step, no framework.
//
// Mirrors the Android app's data model 1:1 — same RobotEntity /
// ComponentEntity / ModuleInstance / EquipmentSocket / BattleState
// shapes — so JSON exported here can be hand-fed back into the
// Android app once Tom has time to wire the import path.
// ────────────────────────────────────────────────────────────────────

// ────────────────────────────────────────────────────────────────────
// Module catalog. Mirrors android/app/src/main/assets/packs/urfs-core/
// modules.json (a subset of the full pack — the most important rule-
// bearing modules for v0.0.1). Tom can paste the full pack into the
// MODULES constant any time; the loader reads it as a flat list.
// ────────────────────────────────────────────────────────────────────
const MODULES = [
  { id: "stable_reactor",      name: "Stable Reactor",       weight: 2, power: 25, definitionLimit: ["CORE","UTILITY"], description: "+25 Power. Core/Utility only." },
  { id: "aux_reactor",         name: "Aux Reactor",          weight: 1, power: 10, definitionLimit: [], description: "+10 Power. Auxiliary support reactor." },
  { id: "volatile_reactor",    name: "Volatile Reactor",     weight: 1, power: 30, definitionLimit: ["CORE","UTILITY"], description: "+30 Power. Explodes if its component is destroyed.", explosiveDamage: 1 },
  { id: "fuel_powered_generator", name: "Fuel-powered Generator", weight: 1, power: 10, definitionLimit: [], description: "+10 Power, burns fuel each round.", fuelConsumption: 1 },
  { id: "fuel_tank",           name: "Fuel Tank",            weight: 1, power: 0,  definitionLimit: [], description: "+10 Fuel Capacity.", fuelCapacity: 10, toggleable: true },
  { id: "capacitor_bank",      name: "Capacitor Bank",       weight: 1, power: 0,  definitionLimit: [], description: "Adds 2 Capacitors. Each remaining +1 Shutdown die.", emergencyShutdownBonus: 1, maxCopies: -1, stackable: true },
  { id: "shield_gen",          name: "Shield Generator",     weight: 2, power: -10, definitionLimit: ["CORE","UTILITY"], description: "+Silhouette shields. Core/Utility only.", shieldsMultiplier: 1, toggleable: true },
  { id: "standard_cockpit",    name: "Standard Cockpit",     weight: 1, power: -2, definitionLimit: ["CORE","HEAD","UTILITY"], description: "Pilot seat. Weight 1, Power -2.", cockpitSlots: 1 },
  { id: "open_air_cockpit",    name: "Open-Air Cockpit",     weight: 1, power: -2, definitionLimit: ["CORE","HEAD","UTILITY"], description: "+3 dice on Maneuver / Ranged.", cockpitSlots: 1 },
  { id: "motion_cockpit",      name: "Motion-Control Cockpit", weight: 2, power: -5, definitionLimit: ["CORE","HEAD","UTILITY"], description: "+3 dice on Physical-stat checks.", cockpitSlots: 1 },
  { id: "ai_core",             name: "A.I. Core",            weight: 0, power: -10, definitionLimit: ["CORE","HEAD","UTILITY"], description: "AI pilot. Toggleable; off ≠ shutdown.", cockpitSlots: 1, toggleable: true },
  { id: "armor",               name: "Armor",                weight: 1, power: 0,  definitionLimit: [], description: "+1× Sil component armor.", armorMultiplier: 1, stackable: true },
  { id: "heavy_armor",         name: "Heavy Armor",          weight: 3, power: 0,  definitionLimit: [], description: "+3× Sil component armor.", armorMultiplier: 3, stackable: true },
  { id: "composite_armor",     name: "Composite Armor",      weight: 0, power: 0,  definitionLimit: [], description: "+1× Sil component armor, weightless.", armorMultiplier: 1, stackable: true },
  { id: "armor_coating",       name: "Armor Coating",        weight: 1, power: 0,  definitionLimit: [], description: "Immune to Energy at full armor.", requires: ["armor","heavy_armor","composite_armor"], maxPerComponent: 1 },
  { id: "manipulator",         name: "Manipulator",          weight: 1, power: -2, definitionLimit: ["ARM"], description: "Hand. Required for weapons.", maxPerComponent: 1 },
  { id: "internal_weapon_socket", name: "Internal Weapon Socket", weight: 0, power: -2, definitionLimit: [], description: "Mounts a Mount-Point ranged weapon, one chosen facing.", maxCopies: -1 },
  { id: "fixed_external_socket",  name: "Fixed External Equipment Socket", weight: 0, power: 0, definitionLimit: [], description: "Mounts a Mount-Point weapon, one chosen facing.", maxCopies: -1 },
  { id: "swivel_weapon_socket",   name: "Swivel Weapon Socket", weight: 1, power: -1, definitionLimit: [], description: "Mounts a Mount-Point weapon; fires into base + 2 adjacent arcs.", maxCopies: -1 },
  { id: "holster_point",       name: "Holster Point",        weight: 0, power: 0, definitionLimit: [], description: "Stows a held weapon for Draw.", maxCopies: -1 },
  { id: "tether_socket",       name: "Tether Socket",        weight: 0, power: -1, definitionLimit: [], description: "Mounts Tethered equipment.", maxCopies: -1 },
  { id: "booster",             name: "Booster",              weight: 1, power: 0, definitionLimit: [], description: "+1 Boost Power.", boost: 1, stackable: true },
  { id: "high_output_booster", name: "High Output Booster",  weight: 2, power: -2, definitionLimit: [], description: "+3 Boost Power.", boost: 3 },

// ────────────────────────────────────────────────────────────────────
// IndexedDB layer. Three stores: robots, pilots, equipment, forces,
// battles, settings. Each value is a plain JS object — we treat
// stores as document collections (no JOINs) for sanity.
// ────────────────────────────────────────────────────────────────────
const DB_NAME = "urfs-web";
const DB_VERSION = 1;
const STORES = ["robots", "pilots", "equipment", "forces", "battles", "settings"];

let _db = null;
function openDb() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onupgradeneeded = () => {
      const db = req.result;
      for (const s of STORES) {
        if (!db.objectStoreNames.contains(s)) {
          db.createObjectStore(s, { keyPath: "id", autoIncrement: true });
        }
      }
    };
    req.onsuccess = () => { _db = req.result; resolve(_db); };
  });
}
async function dbPut(store, value) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGetAll(store) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(store, id) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbDelete(store, id) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function showToast(msg, ms = 2200) {
  const host = document.getElementById("toast-host");
  host.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(() => { if (host.innerHTML.includes(escapeHtml(msg))) host.innerHTML = ""; }, ms);
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}

// ────────────────────────────────────────────────────────────────────
// Domain helpers — derive stats from a robot the same way the
// Android CalculationEngine does. Limited to v0.0.1 essentials.
// ────────────────────────────────────────────────────────────────────
function robotInstalledModuleIds(robot) {
  const ids = [];
  for (const c of robot.components || []) {
    for (const m of c.modules || []) ids.push(m.moduleId);
  }
  return ids;
}
function calcRobotBP(robot) {
  // Frame BP = silhouette × (frameStrength + frameDurability + frameMaterial)
  // matches alpha.348 calculateTotalBP shape (simplified).
  const sil = robot.silhouette || 1;
  const fs = robot.frameStrength || 1;
  const fd = robot.frameDurability || 1;
  const fm = robot.frameMaterial || 1;
  const cc = (robot.components || []).length || 1;
  return (fs + fd + fm) * sil + cc;
}
function calcShieldsMax(robot) {
  const ids = robotInstalledModuleIds(robot);
  const gens = ids.filter(id => MODULES_BY_ID[id]?.shieldsMultiplier > 0).length;
  return gens * (robot.silhouette || 1);
}
function calcCapacitorPool(robot) {
  const ids = robotInstalledModuleIds(robot);
  const banks = ids.filter(id => MODULES_BY_ID[id]?.emergencyShutdownBonus > 0).length;
  return banks * 2;
}
function calcStrainThreshold(robot) {
  const sil = robot.silhouette || 1;
  const ids = robotInstalledModuleIds(robot);
  const coproc = ids.filter(id => MODULES_BY_ID[id]?.actionTokenBonus > 0).length;
  return Math.ceil(sil / 2) + coproc;
}
function calcTotalBoost(robot) {
  return robotInstalledModuleIds(robot)
    .map(id => MODULES_BY_ID[id]?.boost || 0)
    .reduce((a,b) => a+b, 0);
}
function calcTotalWeight(robot) {
  let w = 0;
  for (const c of robot.components || []) {
    let raw = 0;
    for (const m of c.modules || []) raw += MODULES_BY_ID[m.moduleId]?.weight || 0;
    w += c.isFrame ? Math.ceil(raw / 2) : raw;
  }
  return w;
}
function calcMaxLoad(robot) {
  const fs = robot.frameStrength || 1;
  const bottomCount = (robot.components || []).filter(c => c.facing === "BOTTOM").length;
  const lifts = robotInstalledModuleIds(robot)
    .filter(id => id === "lift_enhancement").length;
  return fs * bottomCount + lifts * 2;
}
function calcGroundSpeed(robot) {
  const sil = robot.silhouette || 1;
  const legs = (robot.components || []).filter(c => c.definition === "LEG").length;
  const wheels = (robot.components || []).flatMap(c =>
    (c.modules || []).filter(m => m.moduleId === "wheels")
  );
  const wheelsBonus = wheels.reduce((acc, w) => acc + Math.ceil(sil * 0.5), 0);
  if (legs === 0 && wheels.length === 0) return 0;
  const totalWeight = calcTotalWeight(robot);
  const maxLoad = calcMaxLoad(robot);
  const moveMod = Math.ceil((maxLoad - totalWeight) / 5);
  return legs * sil + moveMod + wheelsBonus;
}
function calcEffectiveSil(robot, statuses) {
  let sil = robot.silhouette || 1;
  const ids = robotInstalledModuleIds(robot);
  const hf = ids.includes("horizontal_framing");
  if (hf) sil = Math.ceil(sil / 2);
  if (statuses && statuses.includes("CROUCHED")) sil = Math.ceil(sil / 2);
  return sil;
}

function robotCockpitSlots(robot) {
  // Build shape uses tempId; battle/force shapes use componentId.
  const slots = [];
  const components = robot?.components || [];
  for (const c of components) {
    const componentId = c.componentId ?? c.tempId;
    const componentName = (c.name && c.name.trim()) || c.definition || "?";
    const modules = c.modules || [];
    for (let moduleIndex = 0; moduleIndex < modules.length; moduleIndex++) {
      const mod = modules[moduleIndex];
      const def = MODULES_BY_ID[mod.moduleId];
      if (!def) continue;
      const capacity = def.cockpitSlots || 0;
      if (capacity <= 0) continue;
      const isAi = mod.moduleId === "ai_core";
      for (let slotIndex = 0; slotIndex < capacity; slotIndex++) {
        slots.push({
          componentId,
          componentName,
          moduleIndex,
          moduleId: mod.moduleId,
          moduleName: def.name,
          slotIndex,
          slotName: `COCKPIT ${slots.length + 1}`,
          isAi,
        });
      }
    }
  }
  return slots;
}

// Pure adapter — no DOM, no side effects, no state mutation.
function forceCockpitSlots(force) {
  const slots = [];
  for (const rid of force.robotIds || []) {
    const robot = state.robots.find(r => r.id === rid);
    if (!robot) continue;
    for (const slot of robotCockpitSlots(robot)) {
      slots.push({ robotId: robot.id, robotName: robot.name || "Unnamed", ...slot });
    }
  }
  return slots;
}

// ────────────────────────────────────────────────────────────────────
// Battle state factory. Mirrors BattleRobotState in BattleState.kt.
// ────────────────────────────────────────────────────────────────────
function buildBattleRobotState(robot, side) {
  const ids = robotInstalledModuleIds(robot);
  const cockpits = ids.filter(id =>
    ["standard_cockpit","open_air_cockpit","motion_cockpit","ai_core"].includes(id)
  ).length || 1;
  return {
    robotId: robot.id,
    robotName: robot.name || "Unnamed",
    side,
    silhouette: robot.silhouette || 1,
    components: (robot.components || []).map(c => {
      let armor = 0;
      for (const m of c.modules || []) armor += (MODULES_BY_ID[m.moduleId]?.armorMultiplier || 0) * (robot.silhouette || 1);
      return {
        componentId: c.tempId,
        name: c.name || c.definition,
        definition: c.definition,
        facing: c.facing || "FRONT",
        isFrame: c.isFrame !== false,
        hpMax: armor,
        hpCurrent: armor,
        isDestroyed: false,
        modules: (c.modules || []).map(m => ({
          moduleId: m.moduleId,
          toggledOn: true,
        })),
        equipment: (c.equipment || []).map((e, i) => ({
          equipmentId: e.id ?? i,
          name: e.name || "Equipment",
          armorMax: e.armor || 5,
          armorCurrent: e.armor || 5,
          isDrawn: !!e.isDrawn,
          isDropped: false,
          mountPoint: !!e.mountPoint,
        })),
      };
    }),
    fuelMax: ids.filter(id => id === "fuel_tank").length * 10 + 10,
    fuelCurrent: ids.filter(id => id === "fuel_tank").length * 10 + 10,
    shieldsMax: calcShieldsMax(robot),
    shieldsCurrent: calcShieldsMax(robot),
    systemStrain: 0,
    systemStrainThreshold: calcStrainThreshold(robot),
    capacitorsRemaining: calcCapacitorPool(robot),
    pilotTokens: 0,
    pilotMental: 4,
    statusEffects: [],
    boostPower: calcTotalBoost(robot),
    robotWeight: calcTotalWeight(robot),
    groundSpeed: calcGroundSpeed(robot),
    maxLoad: calcMaxLoad(robot),
    altitude: 0, inertia: 0,
    cockpitPilots: [], // populated when force deploys with pilots
    actionBudget: { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 },
  };
}

// Routing / top-level render
// ────────────────────────────────────────────────────────────────────
const TABS = [
  { id: "garage",  label: "GARAGE",    icon: "🔧", suffix: "// MECH_DB" },
  { id: "equip",   label: "EQUIPMENT", icon: "🔫", suffix: "// ARSENAL" },
  { id: "pilots",  label: "PILOTS",    icon: "👤", suffix: "// CREW_DB" },
  { id: "forces",  label: "FORCES",    icon: "👥", suffix: "// SQUAD_A" },
  { id: "battle",  label: "BATTLE",    icon: "⚡", suffix: "// LIVE_OP" },
];

function render() {
  const tab = TABS.find(t => t.id === state.tab) || TABS[0];
  document.getElementById("title-brand").textContent =
    state.activeBattle && state.tab === "battle" ? "BATTLE" : tab.label;
  document.getElementById("title-suffix").textContent =
    state.activeBattle && state.tab === "battle" ? `ROUND ${state.activeBattle.round || 1}` : tab.suffix;
  document.getElementById("title-suffix").className =
    state.activeBattle && state.tab === "battle" ? "suffix amber" : "suffix";

  const screen = document.getElementById("screen");
  let html = "";
  switch (state.tab) {
    case "garage":  html = renderGarage(); break;
    case "equip":   html = renderEquipment(); break;
    case "pilots":  html = renderPilots(); break;
    case "forces":  html = renderForces(); break;
    case "battle":  html = renderBattle(); break;
  }
  screen.innerHTML = html;

  document.getElementById("botnav").innerHTML = TABS.map(t => `
    <button data-tab="${t.id}" ${state.tab === t.id ? 'aria-current="page"' : ""}>
      <span class="ic">${t.icon}</span>
      <span>${t.label}</span>
    </button>
  `).join("");
  document.querySelectorAll("#botnav button").forEach(b =>
    b.addEventListener("click", () => setState({ tab: b.dataset.tab, activeRobotId: null }))
  );

  document.getElementById("modal-host").innerHTML = state.modal ? renderModal() : "";
  if (state.modal) {
    document.querySelector(".modal-back")?.addEventListener("click", (e) => {
      if (e.target.classList.contains("modal-back")) closeModal();
    });
  }

  // Wire all action attributes after rendering. Centralised event
  // dispatch means screens stay pure-HTML templates.
  for (const el of document.querySelectorAll("[data-act]")) {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      dispatch(el.dataset.act, el.dataset);
    });
  }

}

// ────────────────────────────────────────────────────────────────────
// Image picker for robot photos. Reads via FileReader → resizes to
// 512px max (center-cropped square via canvas) → stores as data URL
// on `robot.imageData`. Fully local: no server, no upload, IndexedDB
// only. Works on iOS Safari (which supports <input type="file"
// accept="image/*"> + native photo-picker dialog).
// ────────────────────────────────────────────────────────────────────
const IMAGE_MAX_DIM = 512;
const IMAGE_JPEG_QUALITY = 0.82;
function readImageAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = () => reject(fr.error || new Error("read failed"));
    fr.readAsDataURL(file);
  });
}
function downscaleDataUrl(srcUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        // Center-crop to square, then scale to IMAGE_MAX_DIM.
        const minSide = Math.min(img.width, img.height);
        const sx = (img.width - minSide) / 2;
        const sy = (img.height - minSide) / 2;
        const targetSide = Math.min(IMAGE_MAX_DIM, minSide);
        const canvas = document.createElement("canvas");
        canvas.width = targetSide;
        canvas.height = targetSide;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, targetSide, targetSide);
        resolve(canvas.toDataURL("image/jpeg", IMAGE_JPEG_QUALITY));
      } catch (e) { reject(e); }
    };
    img.onerror = () => reject(new Error("image decode failed"));
    img.src = srcUrl;
  });
}
handlers["pick-image"] = ({ id }) => {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";
  inp.onchange = async () => {
    const file = inp.files?.[0];
    if (!file) return;
    try {
      const raw = await readImageAsDataUrl(file);
      const sized = await downscaleDataUrl(raw);
      const r = state.robots.find(x => x.id === Number(id));
      if (!r) return;
      r.imageData = sized;
      await saveRobot(r);
      pushModal("robot-editor", { id: Number(id) });
    } catch (e) {
      console.error(e);
      alert("Image read failed: " + e.message);
    }
  };
  inp.click();
};

// ────────────────────────────────────────────────────────────────────
// JSON export / import. Bundle every store into a versioned blob so
// testers can back up their work and move it between devices. Schema
// version exists so we can break-fix-forward without silently eating
// old files.
// ────────────────────────────────────────────────────────────────────
const EXPORT_SCHEMA = 1;
function buildExportPayload() {
  return {
    schemaVersion: EXPORT_SCHEMA,
    exportedAt: new Date().toISOString(),
    appVersion: "0.0.2",
    robots: state.robots,
    pilots: state.pilots,
    equipment: state.equipment,
    forces: state.forces,
    battles: state.battles,
  };
}
handlers["export-json"] = () => {
  const payload = buildExportPayload();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0, 16).replace(/[:T]/g, "-");
  a.href = url;
  a.download = `urfs-web-backup-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast("Exported. Check your downloads.");
};
handlers["import-json"] = () => {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "application/json,.json";
  inp.onchange = async () => {
    const file = inp.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const payload = JSON.parse(text);
      if (!payload || typeof payload !== "object") throw new Error("not an object");
      if (payload.schemaVersion !== EXPORT_SCHEMA) {
        if (!confirm(`Schema mismatch (file v${payload.schemaVersion} vs app v${EXPORT_SCHEMA}). Import anyway?`)) return;
      }
      const merge = confirm("OK = MERGE with current data.\nCancel = REPLACE current data.");
      if (!merge) {
        // Wipe each store before importing.
        for (const s of STORES.filter(s => s !== "settings")) {
          const db = await openDb();
          await new Promise((resolve, reject) => {
            const tx = db.transaction(s, "readwrite");
            tx.objectStore(s).clear();
            tx.oncomplete = resolve;
            tx.onerror = () => reject(tx.error);
          });
        }
        state.robots = []; state.pilots = []; state.equipment = [];
        state.forces = []; state.battles = []; state.activeBattle = null;
      }
      const sets = { robots: state.robots, pilots: state.pilots, equipment: state.equipment, forces: state.forces, battles: state.battles };
      for (const key of ["robots","pilots","equipment","forces","battles"]) {
        const list = payload[key] || [];
        for (const row of list) {
          // Normalize legacy battles missing two-forces fields.
          if (key === "battles") {
            row.p1Robots = row.p1Robots || [];
            row.p2Robots = row.p2Robots || [];
          }
          // Re-key any rows that would collide on merge — generate a fresh id.
          if (merge && sets[key].some(x => x.id === row.id)) {
            row.id = Date.now() + Math.floor(Math.random() * 100000);
          }
          await dbPut(key, row);
          sets[key].push(row);
        }
      }
      showToast(`Imported ${(payload.robots || []).length} robots, ${(payload.pilots || []).length} pilots, ${(payload.equipment || []).length} equipment, ${(payload.forces || []).length} forces, ${(payload.battles || []).length} battles.`);
      render();
    } catch (e) {
      console.error(e);
      alert("Import failed: " + e.message);
    }
  };
  inp.click();
};
</script>

<script>

renderForces = function () {

handlers["new-force"] = () => {

handlers["delete-force"] = async ({ id }) => {

  await dbDelete("forces", Number(id));

};
let renderForceEditor = function (id) {
  const f = state.forces.find(x => x.id === id);
  if (!f) return "<p>?</p>";
  return `
    <h2>FORCE // EDIT</h2>
    <div class="field"><label>NAME</label><input id="f-name" value="${escapeHtml(f.name)}" /></div>
    <div class="field"><label>BP CAP</label><input id="f-cap" type="number" min="0" value="${f.bpCap}" /></div>
    <div class="label-small label-cyan" style="margin-top:8px">ROBOTS (${(f.robotIds || []).length})</div>
    ${(f.robotIds || []).map(rid => {
      const r = state.robots.find(x => x.id === rid);
      return r ? `
        <div class="card tight row-between">
          <span>${escapeHtml(r.name)}  <span class="chip muted">${calcRobotBP(r)} BP</span></span>
          <button class="btn ghost" data-act="force-remove-robot" data-fid="${f.id}" data-rid="${rid}">✕</button>
        </div>
      ` : "";
    }).join("")}
    <button class="btn wide" data-act="force-add-robot" data-fid="${f.id}">＋ ADD ROBOT</button>
    <div class="actions">
      <button class="btn ghost" data-act="save-force" data-id="${f.id}">DONE</button>
      <button class="btn amber" data-act="deploy-force" data-id="${f.id}">DEPLOY</button>

};
handlers["save-force"] = ({ id }) => {

  if (f) {

    f.bpCap = parseInt(document.getElementById("f-cap").value, 10) || 0;
    dbPut("forces", f);
  }
  closeModal();
};
handlers["force-add-robot"] = ({ fid }) => {
  pushModal("force-add-robot", { fid: Number(fid) });
};
let renderForceAddRobot = function (fid) {
  const f = state.forces.find(x => x.id === fid);
  const candidates = state.robots.filter(r => !(f.robotIds || []).includes(r.id));
  if (candidates.length === 0) return `<h2>NO ROBOTS</h2><p>Build robots in the GARAGE first.</p><div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>`;
  return `
    <h2>ADD A ROBOT</h2>
    ${candidates.map(r => `
      <div class="card tight" data-act="confirm-force-add-robot" data-fid="${fid}" data-rid="${r.id}">
        <strong>${escapeHtml(r.name)}</strong>
        <span class="chip muted" style="margin-left:8px">${calcRobotBP(r)} BP</span>
      </div>
    `).join("")}
    <div class="actions"><button class="btn ghost" data-act="back-to-force" data-fid="${fid}">CANCEL</button></div>
  `;
};
handlers["confirm-force-add-robot"] = ({ fid, rid }) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  f.robotIds = f.robotIds || [];
  f.robotIds.push(Number(rid));
  dbPut("forces", f);
  pushModal("force-editor", { id: Number(fid) });
};
handlers["back-to-force"] = ({ fid }) => pushModal("force-editor", { id: Number(fid) });
handlers["force-remove-robot"] = ({ fid, rid }) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  f.robotIds = (f.robotIds || []).filter(x => x !== Number(rid));
  dbPut("forces", f);
  pushModal("force-editor", { id: Number(fid) });
};
handlers["deploy-force"] = ({ id }) => {
  const f = state.forces.find(x => x.id === Number(id));
  if (!f || (f.robotIds || []).length === 0) {
    showToast("Add at least one robot first.");
    return;
  }
  if (forceCockpitSlots(f).filter(s => !s.isAi).length === 0) {
    // No human cockpit slots — build AI-only battle directly.
    deployForceWithAssignments(f, {});
  } else {
    pushModal("pilot-assign", { fid: f.id, assignments: {} });
  }
};

function deployForceWithAssignments(f, assignments) {
  const battle = {
    id: Date.now(),
    name: f.name + " — " + new Date().toLocaleString(),
    round: 1,
    priority: "P1",
    p1ForceName: f.name,
    p1ForceId: f.id,
    p2ForceName: "Opponent",
    p2ForceId: null,
    p1Robots: f.robotIds.map(rid => {
      const robot = state.robots.find(r => r.id === rid);
      const bs = buildBattleRobotState(robot, "P1");
      bs.cockpitPilots = robotCockpitSlots(robot).map(slot => {
        const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
        return {
          componentId: slot.componentId,
          moduleIndex: slot.moduleIndex,
          slotIndex: slot.slotIndex,
          slotName: slot.slotName,
          pilotId: slot.isAi ? null : (assignments[slotKey] || null),
          isAi: slot.isAi,
          sysStrain: 0,
          pilotStrain: 0,
        };
      });
      return bs;
    }),
    p2Robots: [],
  };
  state.battles.push(battle);
  state.activeBattle = battle;
  state.tab = "battle";
  state.activeRobotId = null;
  dbPut("battles", battle);
  closeModal();
  render();
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// BATTLE — overview + per-robot
// ════════════════════════════════════════════════════════════════════
renderBattle = function () {
  if (!state.activeBattle) {
    return `
      <div class="empty">
        <h2>NO ACTIVE BATTLE</h2>
        <p>Pick a force in the FORCES tab and tap DEPLOY.</p>
        <button class="btn primary" style="margin-top:14px" data-act="go-forces">GO TO FORCES</button>
        ${state.battles.length > 0 ? `
          <div class="label-small" style="margin-top:24px">RECENT BATTLES</div>
          ${state.battles.map(b => `
            <div class="list-card" data-act="resume-battle" data-id="${b.id}">
              <div class="thumb">⚡</div>
              <div style="flex:1"><h3>${escapeHtml(b.name)}</h3><div class="meta">Round ${b.round}</div></div>
            </div>
          `).join("")}
        ` : ""}
      </div>
    `;
  }
  const b = state.activeBattle;
  if (state.activeRobotId) {
    return renderPerRobotBattle(b, state.activeRobotId);
  }
  return renderBattleOverview(b);
};
handlers["resume-battle"] = ({ id }) => {
  const b = state.battles.find(x => x.id === Number(id));
  if (b) { state.activeBattle = b; state.activeRobotId = null; render(); }
};

function renderBattleOverview(b) {
  const passed = b.passedThisRound || { P1: false, P2: false };
  const passChip = side => passed[side]
    ? `<span class="chip muted">✓ PASSED</span>`
    : (b.priority === side ? `<span class="chip amber">PRIORITY</span>` : "");
  return `
    <div class="card friendly row-between">
      <div>
        <div class="label-small label-cyan">YOUR FORCE</div>
        <strong>${escapeHtml(b.p1ForceName || "Your force")}</strong>
      </div>
      <div class="row-gap">
        <span class="chip">ROUND ${b.round}</span>
        ${passChip("P1")}
      </div>
    </div>
    ${b.p1Robots.map(r => robotOverviewCard(r)).join("")}
    ${(b.p2Robots && b.p2Robots.length > 0) ? `
    <div class="card opposing row-between" style="margin-top:10px">
      <div>
        <div class="label-small label-red">OPPONENT FORCE</div>
        <strong>${escapeHtml(b.p2ForceName || "Opponent")}</strong>
      </div>
      <div class="row-gap">${passChip("P2")}</div>
    </div>
    ${b.p2Robots.map(r => robotOverviewCard(r)).join("")}` : `
    <div style="margin-top:10px">
      <button class="btn ghost" data-act="add-opponent-force">+ ADD OPPONENT FORCE</button>
    </div>`}
    <div class="row-gap" style="margin-top:14px">
      <button class="btn amber wide" data-act="pass-priority">PASS PRIORITY</button>
    </div>
    <div class="row-gap" style="margin-top:8px">
      <button class="btn ghost" data-act="round-prev">− ROUND</button>
      <button class="btn ghost" data-act="round-next" style="flex:1">＋ ROUND</button>
      <button class="btn danger" data-act="end-battle">END</button>
    </div>
  `;
}
function renderOpponentForcePicker() {
  const b = state.activeBattle;
  // Exclude the deployed P1 force AND any force that would put a robot.id
  // into both sides (findBattleRobot resolves first-match-wins, so a
  // collision would make a P2 robot effectively unreachable).
  const p1RobotIds = new Set((b.p1Robots || []).map(r => r.robotId));
  const eligible = state.forces.filter(f => {
    if (f.id === b.p1ForceId) return false;
    const fRobotIds = f.robotIds || [];
    return !fRobotIds.some(id => p1RobotIds.has(id));
  });
  const p1Label = b.p1ForceName || "your force";
  if (eligible.length === 0) {
    return `
      <h2>ADD OPPONENT FORCE</h2>
      <p style="margin:16px 0">No other forces available — every existing force either is your current one or shares a robot with it. Create a new force in the FORCES tab first.</p>
      <div class="actions" style="margin-top:16px">
        <button class="btn ghost" data-act="close-opponent-picker">CANCEL</button>
      </div>
    `;
  }
  return `
    <h2>ADD OPPONENT FORCE</h2>
    <div class="meta" style="margin-bottom:12px">Pick the force that will oppose ${escapeHtml(p1Label)}.</div>
    ${eligible.map(f => `
      <div class="list-card" data-act="select-opponent-force" data-fid="${f.id}" style="cursor:pointer;margin-bottom:6px">
        <div style="flex:1">
          <h3 style="margin:0">${escapeHtml(f.name || "Unnamed Force")}</h3>
          <div class="meta">${f.robotIds ? f.robotIds.length : 0} robot(s)</div>
        </div>
        <span class="chip">SELECT</span>
      </div>
    `).join("")}
    <div class="actions" style="margin-top:16px">
      <button class="btn ghost" data-act="close-opponent-picker">CANCEL</button>
    </div>
  `;
}

handlers["add-opponent-force"] = () => {
  pushModal("opponent-force-picker", {});
};

handlers["close-opponent-picker"] = () => {
  closeModal();
};

handlers["select-opponent-force"] = ({ fid }) => {
  pushModal("pilot-assign", { fid: Number(fid), assignments: {}, side: "P2" });
};

function robotOverviewCard(r) {
  const armorCurrent = r.components.reduce((a, c) => a + c.hpCurrent, 0);
  const armorMax = r.components.reduce((a, c) => a + c.hpMax, 0);
  const sideClass = r.side === "P2" ? "opposing" : "friendly";
  return `
    <div class="card ${sideClass}" data-act="open-robot" data-id="${r.robotId}">
      <div class="row-between">
        <div>
          <h3 style="margin:0">${escapeHtml(r.robotName)}</h3>
        </div>
        <div class="row-gap">
          ${statusChip(r)}
          ${silChip(r)}
        </div>
      </div>
      <div class="stat-grid" style="margin-top:8px">
        <div class="stat-cell ${armorCurrent < armorMax ? 'warn' : 'ok'}"><span class="lbl">ARM</span><span class="val">${armorCurrent}/${armorMax}</span></div>
        <div class="stat-cell ${r.fuelCurrent < r.fuelMax/2 ? 'warn' : 'ok'}"><span class="lbl">FUEL</span><span class="val">${r.fuelCurrent}/${r.fuelMax}</span></div>
        <div class="stat-cell ok"><span class="lbl">SHLD</span><span class="val">${r.shieldsCurrent}/${r.shieldsMax}</span></div>
        <div class="stat-cell ${r.systemStrain > r.systemStrainThreshold ? 'over' : 'ok'}"><span class="lbl">STR</span><span class="val">${r.systemStrain}/${r.systemStrainThreshold}</span></div>
      </div>
    </div>
  `;
}
function silChip(r) {
  const eff = calcEffectiveSilBattle(r);
  if (eff !== r.silhouette) return `<span class="chip amber">SIL ${eff}* (base ${r.silhouette})</span>`;
  return `<span class="chip">SIL ${r.silhouette}</span>`;
}
function statusChip(r) {
  const s = r.statusEffects || [];
  if (s.includes("SHUTDOWN")) return `<span class="chip red">SHUTDOWN</span>`;
  if (s.includes("DOWN")) return `<span class="chip red">DOWN</span>`;
  if (s.includes("GRAPPLED")) return `<span class="chip orange">GRAPPLED</span>`;
  if (s.includes("CROUCHED")) return `<span class="chip amber">CROUCHED</span>`;
  if (s.includes("FLYING") || r.altitude > 0) return `<span class="chip">FLYING</span>`;
  return `<span class="chip green">STANDING</span>`;
}
function calcEffectiveSilBattle(r) {
  let s = r.silhouette;
  const hf = r.components.some(c => c.modules.some(m => m.moduleId === "horizontal_framing"));
  if (hf) s = Math.ceil(s / 2);
  if ((r.statusEffects || []).includes("CROUCHED")) s = Math.ceil(s / 2);
  return s;
}
function findBattleRobot(b, rid) {
  // Either id type may be string or number depending on call site.
  const n = Number(rid);
  const p1 = (b?.p1Robots || []).find(x => x.robotId === n || x.robotId === rid);
  if (p1) return p1;
  return (b?.p2Robots || []).find(x => x.robotId === n || x.robotId === rid);
}
handlers["pass-priority"] = () => {
  const b = state.activeBattle;
  if (!b) return;
  b.passedThisRound = b.passedThisRound || { P1: false, P2: false };
  const passingSide = b.priority || "P1";
  const sideRobots = passingSide === "P1" ? (b.p1Robots || []) : (b.p2Robots || []);
  // Pass clears Pilot Strain per L220.
  for (const r of sideRobots) {
    r.pilotTokens = 0;
    r.cockpitPilots = (r.cockpitPilots || []).map(p => ({ ...p, pilotStrain: 0 }));
  }
  b.passedThisRound[passingSide] = true;
  const hasP2 = (b.p2Robots || []).length > 0;
  if (!hasP2 || (b.passedThisRound.P1 && b.passedThisRound.P2)) {
    // Skirmish solo path OR both sides passed → advance round.
    b.round = (b.round || 1) + 1;
    b.passedThisRound = { P1: false, P2: false };
    b.priority = "P1";
    for (const robot of [...(b.p1Robots || []), ...(b.p2Robots || [])]) {
      robot.actionBudget = { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    }
    showToast(`Round ${b.round} begins.`);
  } else {
    b.priority = passingSide === "P1" ? "P2" : "P1";
    showToast(`${passingSide} passed. ${b.priority} has priority.`);
  }
  dbPut("battles", b);
  render();
};
handlers["round-prev"] = () => { if (state.activeBattle.round > 1) state.activeBattle.round--; dbPut("battles", state.activeBattle); render(); };
handlers["round-next"] = () => { state.activeBattle.round++; dbPut("battles", state.activeBattle); render(); };
handlers["end-battle"] = async () => {
  if (!confirm("End this battle?")) return;
  await dbDelete("battles", state.activeBattle.id);
  state.battles = state.battles.filter(b => b.id !== state.activeBattle.id);
  state.activeBattle = null;
  render();
};
handlers["open-robot"] = ({ id }) => {
  state.activeRobotId = Number(id);
  render();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════

function pilotTokSummary(r) {

handlers["back-overview"] = () => { state.activeRobotId = null; render(); };

<script>
// ════════════════════════════════════════════════════════════════════
// ACTION RESOLVE MODAL + STRAIN DIALOGS + COMPONENT SHEET
// ════════════════════════════════════════════════════════════════════
handlers["open-action"] = ({ id, k }) => {
  // Defense-in-depth: refuse to open a spent action even if the disabled
  // attribute was bypassed somehow. PASS is always available.
  const r = findBattleRobot(state.activeBattle, id);
  const a = ACTIONS[k];
  if (r && a && k !== "PASS") {
    const b = r.actionBudget || { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    if (a.bucket === "primary" && b.primaryUsed >= 1) { showToast("Primary already spent this round."); return; }
    if (a.bucket === "reaction" && b.reactionsUsed >= 2) { showToast("Both reactions spent this round."); return; }
  }
  pushModal("action-resolve", { id: Number(id), k });
};
let renderActionResolve = function (rid, k) {
  const r = findBattleRobot(state.activeBattle, rid);
  const a = ACTIONS[k];
  if (!r || !a) return "<p>?</p>";
  const cockpits = r.cockpitPilots || [];
  return `
    <h2>${a.label.toUpperCase()}</h2>
    <p>${escapeHtml(a.brief)}</p>
    <p class="label-small label-amber">COST: ${escapeHtml(a.cost)}</p>
    ${(() => {
      if (!actionShowsPilotPicker(k)) return "";
      const humanCockpits = cockpits.filter(c => !c.isAi);
      if (humanCockpits.length === 0) return "";
      // Auto-pick first human cockpit by composite key on first render
      const firstKey = `${humanCockpits[0].componentId}:${humanCockpits[0].moduleIndex}:${humanCockpits[0].slotIndex}`;
      if (_pickedPilot === null) { _pickedPilot = firstKey; }
      return `
      <div class="label-small label-cyan" style="margin-top:10px">ACTING PILOT</div>
      <p style="font-size:12px; color:var(--on-surface-muted)">Strain auto-applies to picked pilot AND robot. MANUAL = resolve at the table.</p>
      <div id="pilot-pick-list">
        ${humanCockpits.map(cp => {
          const key = `${cp.componentId}:${cp.moduleIndex}:${cp.slotIndex}`;
          const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
          const pilotName = pilot ? pilot.name : "unassigned";
          const border = _pickedPilot === key ? "var(--cyan)" : "var(--surface-3)";
          return `<div class="card tight" data-act="pick-pilot" data-pilot="${key}" style="border-color:${border}">
            <strong>${escapeHtml(cp.slotName || "Cockpit")} — ${escapeHtml(pilotName)}</strong>
            <span class="chip muted" style="margin-left:8px">P-STR ${cp.pilotStrain || 0}</span>
          </div>`;
        }).join("")}
        <div class="card tight" data-act="pick-pilot" data-pilot="MANUAL" style="border-color:${_pickedPilot === "MANUAL" ? "var(--cyan)" : "var(--surface-3)"}">
          <strong>MANUAL</strong>
          <span style="font-size:11px; color:var(--on-surface-muted); margin-left:8px">I'll bump strain at the table</span>
        </div>
      </div>
      `;
    })()}
    ${actionRollKind(k) ? `
      <button class="btn wide" style="margin-top:10px" data-act="open-roller" data-id="${rid}" data-k="${k}">🎲 OPEN DICE ROLLER</button>
      <div class="meta" style="font-size:10px; margin-top:2px; color:var(--on-surface-muted)">Shows the pool composition, available bonus chips, and lets you roll — doesn't auto-apply hits.</div>
    ` : ""}
    <details style="margin-top:10px">
      <summary class="label-small label-cyan" style="cursor:pointer">▶ SHOW FULL RULES</summary>
      <p style="font-size:12px; color:var(--on-surface-muted); margin-top:6px">${escapeHtml(a.rules)}</p>
    </details>
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>
      <button class="btn amber" data-act="resolve-action" data-id="${rid}" data-k="${k}">RESOLVE</button>
    </div>
  `;
};
// Per spec: these four actions surface the pilot picker for pilot-strain routing.
// (HEAT_VENT shows it to identify the rolling pilot — its cost is Free.)
function actionShowsPilotPicker(k) {
  return k === "SALVO" || k === "CHARGE" || k === "MELEE_ASSAULT" || k === "HEAT_VENT";
}
// Baseline pilot strain delta on RESOLVE.
// SALVO/MELEE_ASSAULT are "per target" in the rulebook — webapp applies +1 baseline;
// per-target multiplication ships with the per-target dice flow in stage 6.
function actionPilotStrainCost(k) {
  if (k === "SALVO" || k === "CHARGE" || k === "MELEE_ASSAULT") return 1;
  return 0; // HEAT_VENT cost is Free (Mental check); picker only routes identity
}
// Each action whose mechanics include rolling dice maps to a roll
// kind that influences which bonus chips show in the roller.
function actionRollKind(k) {
  switch (k) {
    case "CHARGE": case "MELEE_ASSAULT": case "QUICK_STRIKE": case "PARRY":
      return "MELEE";
    case "STRAFE": case "SALVO": case "HIP_SHOT":
      return "RANGED";
    case "DODGE": case "BOOST_DODGE":
      return "PHYSICAL";
    case "HEAT_VENT":
      return "MENTAL";
    case "BOOST":
      return null; // resolved at table, no roll inherent to BOOST itself
    case "QUICK_MOVE": case "MOVE":
      return "PHYSICAL"; // optional Physical check on MOVE
    default:
      return null;
  }
}
handlers["open-roller"] = ({ id, k }) => {
  pushModal("dice-roller", { id: Number(id), k: k || null });
};
let _pickedPilot = null;
handlers["pick-pilot"] = ({ pilot }) => {
  _pickedPilot = pilot; // composite key "componentId:moduleIndex:slotIndex" or "MANUAL"
  for (const el of document.querySelectorAll("#pilot-pick-list .card")) {
    el.style.borderColor = "var(--surface-3)";
  }
  const target = document.querySelector(`#pilot-pick-list [data-pilot="${pilot}"]`);
  if (target) target.style.borderColor = "var(--cyan)";
};
handlers["resolve-action"] = ({ id, k }) => {
  const r = findBattleRobot(state.activeBattle, id);
  const a = ACTIONS[k];
  if (!r || !a) return;
  // Apply mechanical effect — at minimum bump strain per action's cost line.
  // v0.0.1 picks the dominant effect: primary +1S +1P (or pilot mental hard-cap-check),
  // reaction +1S +1P, incidental free. The "MANUAL" pilot pick suppresses the bump.
  const isManual = _pickedPilot === "MANUAL";
  if (k === "PASS") {
    r.pilotTokens = 0;
    r.cockpitPilots = (r.cockpitPilots || []).map(p => ({ ...p, pilotStrain: 0 }));
    state.activeBattle.priority = state.activeBattle.priority === "P1" ? "P2" : "P1";
    showToast("PASSED — pilot strain cleared.");
  } else if (k === "SHIELD_RECOVERY") {
    if (r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax) {
      r.capacitorsRemaining--;
      r.shieldsCurrent = Math.min(r.shieldsMax, r.shieldsCurrent + 10);
      showToast("+10 Shields, −1 Cap.");
    } else {
      showToast("Can't recover shields (no cap or already full).");
      _pickedPilot = null;
      return;
    }
  } else if (k === "STRAIN_CLEAR") {
    if (r.capacitorsRemaining > 0 && r.systemStrain > 0) {
      r.capacitorsRemaining--;
      r.systemStrain = Math.max(0, r.systemStrain - 1);
      showToast("−1 System Strain, −1 Cap.");
    } else {
      showToast("Can't clear strain.");
      _pickedPilot = null;
      return;
    }
  } else if (!isManual) {
    if (a.bucket === "primary" || a.bucket === "reaction") {
      r.systemStrain++;
      let pilotStrainMsg = "";
      if (actionShowsPilotPicker(k)) {
        const cost = actionPilotStrainCost(k);
        if (cost > 0 && _pickedPilot && _pickedPilot !== "MANUAL") {
          const cp = (r.cockpitPilots || []).find(c =>
            `${c.componentId}:${c.moduleIndex}:${c.slotIndex}` === _pickedPilot
          );
          if (cp) {
            cp.pilotStrain = (cp.pilotStrain || 0) + cost;
            const pilot = (state.pilots || []).find(x => x.id === cp.pilotId);
            const pilotName = pilot ? pilot.name : "pilot";
            pilotStrainMsg = `, +1 PStrain (${pilotName})`;
          }
        }
      } else {
        // Legacy path: non-picker primary/reaction actions bump pilotTokens
        r.pilotTokens = (r.pilotTokens || 0) + 1;
        pilotStrainMsg = " +1 PStrain";
      }
      showToast(`${a.label} — +1 SStrain${pilotStrainMsg}.`);
    } else {
      showToast(`${a.label} — free incidental.`);
    }
  } else {
    showToast(`${a.label} — manually resolved.`);
  }
  _pickedPilot = null;
  // Bump per-robot action budget — purely additive; UI affordances in next slice.
  if (k !== "PASS") {
    r.actionBudget = r.actionBudget || { primaryUsed: 0, reactionsUsed: 0, incidentalsUsed: 0 };
    if (a.bucket === "primary") r.actionBudget.primaryUsed++;
    else if (a.bucket === "reaction") r.actionBudget.reactionsUsed++;
    else if (a.bucket === "incidental") r.actionBudget.incidentalsUsed++;
  }
  dbPut("battles", state.activeBattle);
  closeModal();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// DICE ROLLER
// Pool composition + applicable bonus chips per robot/action context
// + actual dice roll. Doesn't auto-apply hits — Tom's spec was
// "display what all needs to be rolled / options for a roll." The
// player still reads hits and decides damage at the table.
//
// Chip catalog ports DiceTalentChips.kt: cockpit-module dice
// (motion/open-air, +3 each), Sharpshooter / Deadeye (talent gated),
// targeting-computer (+1 die ranged), melee-computer (+1 die melee),
// Crouched-on-grabbed-weapon (+2 ranged), multi-arm grab (+2 per
// alive grabber on a melee), inertia-driver pre-melee bonus.
// ════════════════════════════════════════════════════════════════════
const _roller = {
  poolBase: 4,
  threshold: 5,
  chips: {}, // chipId -> boolean
  lastRoll: null, // { rolls: [...], hits, threshold }
};
function rollerComputeChips(r, rollKind) {
  const ids = r.components.flatMap(c => c.modules.map(m => m.moduleId));
  const has = id => ids.includes(id);
  const count = id => ids.filter(x => x === id).length;
  const chips = [];
  // Cockpit-module chips (apply when their cockpit type matches roll kind).
  const motionCockpits = r.components.filter(c => c.modules.some(m => m.moduleId === "motion_cockpit" && (m.toggledOn ?? true))).length;
  if (motionCockpits > 0 && (rollKind === "PHYSICAL" || rollKind === "MELEE")) {
    chips.push({ id: "motion", label: `+${motionCockpits * 3} MOTION COCKPIT`, dice: motionCockpits * 3, hint: "+3 dice per cockpit on Physical / Melee checks (rulebook L630)" });
  }
  const openAirCockpits = r.components.filter(c => c.modules.some(m => m.moduleId === "open_air_cockpit" && (m.toggledOn ?? true))).length;
  if (openAirCockpits > 0 && (rollKind === "RANGED" || rollKind === "PHYSICAL")) {
    chips.push({ id: "openair", label: `+${openAirCockpits * 3} OPEN-AIR`, dice: openAirCockpits * 3, hint: "+3 dice per open-air cockpit on Maneuver / Ranged" });
  }
  // Mount-point combat computers (modeled as keyword on equipment — count their presence).
  const targetingComps = r.components.flatMap(c => c.equipment).filter(e => (e.name || "").toLowerCase().includes("targeting comp")).length;
  if (targetingComps > 0 && rollKind === "RANGED") {
    chips.push({ id: "targeting", label: `+${targetingComps} TARGETING`, dice: targetingComps, hint: "+1 die per Targeting Computer for Ranged" });
  }
  const meleeComps = r.components.flatMap(c => c.equipment).filter(e => (e.name || "").toLowerCase().includes("melee comp")).length;
  if (meleeComps > 0 && rollKind === "MELEE") {
    chips.push({ id: "melee", label: `+${meleeComps} MELEE COMP`, dice: meleeComps, hint: "+1 die per Melee Computer" });
  }
  // CROUCHED on Grabbed weapons (rulebook L264) → +2 dice on Ranged.
  if ((r.statusEffects || []).includes("CROUCHED") && rollKind === "RANGED") {
    chips.push({ id: "crouched", label: `+2 CROUCHED · grabbed`, dice: 2, hint: "Crouched +2 dice on Ranged with grabbed weapons (L264)" });
  }
  // Inertia driver pre-melee charge bonus.
  if (rollKind === "MELEE" && has("inertia_driver")) {
    chips.push({ id: "inertia", label: `+${r.silhouette} INERTIA DRIVER`, dice: r.silhouette, hint: "Inertia Driver activation. Costs Sil fuel; toggle if used." });
  }
  // Multi-arm grab: presence of any additionalGrabberComponentIds on a weapon (v0.0.2 simplification: skip unless we wire that field).
  // Talent chips (player toggles before roll). Cockpit pilots only store
  // pilotId — talents live on state.pilots, so look them up there.
  const cockpitPilots = r.cockpitPilots || [];
  const allTalents = cockpitPilots
    .filter(cp => !cp.isAi && cp.pilotId)
    .flatMap(cp => state.pilots.find(p => p.id === cp.pilotId)?.talents || []);
  if (rollKind === "RANGED" && allTalents.includes("Sharpshooter")) {
    chips.push({ id: "sharpshooter", label: "+3 SHARPSHOOTER", dice: 3, hint: "Burns the free Incidental, single target only (L631)" });
  }
  if (rollKind === "RANGED" && allTalents.includes("Deadeye")) {
    chips.push({ id: "deadeye", label: "DEADEYE · Unblockable", dice: 0, hint: "Costs +1 token; makes single-target Ranged Unblockable (L625)" });
  }
  if (rollKind === "MELEE" && allTalents.includes("Brawler")) {
    chips.push({ id: "brawler", label: "+1 BRAWLER", dice: 1, hint: "Brawler talent: +1 die on Melee" });
  }
  return chips;
}
let renderDiceRoller = function (rid, k) {
  const r = findBattleRobot(state.activeBattle, rid);
  if (!r) return "<p>?</p>";
  const rollKind = k ? actionRollKind(k) : "GENERIC";
  const chips = rollKind ? rollerComputeChips(r, rollKind) : [];
  const enabledChipDice = chips
    .filter(c => _roller.chips[c.id])
    .reduce((sum, c) => sum + (c.dice || 0), 0);
  const total = _roller.poolBase + enabledChipDice;
  const a = k ? ACTIONS[k] : null;
  return `
    <h2>🎲 ${a ? a.label.toUpperCase() : "ROLL DICE"} ${rollKind && rollKind !== "GENERIC" ? `<span class="chip">${rollKind}</span>` : ""}</h2>
    <p style="font-size:12px; color:var(--on-surface-muted)">
      ${a ? "Pool starts at your base attack/skill dice. Toggle each chip below if it applies. The roller shows hits; you read damage at the table." : "Generic d6 pool for ad-hoc rule checks."}
    </p>

    <div class="label-small label-cyan" style="margin-top:10px">POOL</div>
    <div class="row-gap" style="margin-top:4px">
      <button class="btn ghost" data-act="roller-pool" data-d="-1">−</button>
      <strong style="flex:1; text-align:center; font-size:18px">${total} d6</strong>
      <button class="btn ghost" data-act="roller-pool" data-d="1">+</button>
    </div>
    <div class="meta" style="font-size:11px; text-align:center; color:var(--on-surface-muted)">
      base ${_roller.poolBase}${enabledChipDice > 0 ? ` + ${enabledChipDice} chips` : ""}
    </div>

    <div class="label-small label-cyan" style="margin-top:10px">HITS ON</div>
    <div class="row-gap" style="margin-top:4px">
      ${[4,5,6].map(t => `<button class="btn ${_roller.threshold === t ? "primary" : "ghost"}" style="flex:1" data-act="roller-thresh" data-t="${t}">${t}+</button>`).join("")}
    </div>

    ${chips.length > 0 ? `
      <div class="label-small label-cyan" style="margin-top:10px">APPLICABLE CHIPS</div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px">
        ${chips.map(c => `
          <button class="action-btn" data-act="roller-toggle-chip" data-id="${c.id}">
            <span class="nm" style="color: ${_roller.chips[c.id] ? "var(--cyan)" : "var(--on-surface-muted)"}">
              ${_roller.chips[c.id] ? "☑" : "☐"} ${escapeHtml(c.label)}
            </span>
            <span class="hint">${escapeHtml(c.hint)}</span>
          </button>
        `).join("")}
      </div>
    ` : `
      <p class="meta" style="font-size:11px; margin-top:10px">No bonus chips available for this roll kind.</p>
    `}

    <button class="btn amber wide" style="margin-top:12px" data-act="roller-roll">ROLL ${total} d6 vs ${_roller.threshold}+</button>

    ${_roller.lastRoll ? `
      <div class="card" style="margin-top:12px">
        <div class="label-small">LAST ROLL</div>
        <div class="row-gap" style="flex-wrap:wrap; margin-top:6px">
          ${_roller.lastRoll.rolls.map(v => `<span class="chip ${v >= _roller.lastRoll.threshold ? "green" : "muted"}" style="font-size:14px; padding:4px 8px">${v}</span>`).join("")}
        </div>
        <p style="margin-top:8px; text-align:center; font-size:20px; font-weight:700">
          ${_roller.lastRoll.hits} HIT${_roller.lastRoll.hits === 1 ? "" : "S"}
        </p>
      </div>
    ` : ""}

    <div class="actions">
      <button class="btn ghost" data-act="roller-reset">RESET</button>
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
handlers["roller-pool"] = ({ d }) => {
  _roller.poolBase = Math.max(0, _roller.poolBase + parseInt(d, 10));
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-thresh"] = ({ t }) => {
  _roller.threshold = parseInt(t, 10);
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-toggle-chip"] = ({ id }) => {
  _roller.chips[id] = !_roller.chips[id];
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-roll"] = () => {
  const r = findBattleRobot(state.activeBattle, state.modal.data.id);
  const rollKind = state.modal.data.k ? actionRollKind(state.modal.data.k) : "GENERIC";
  const chips = rollKind && r ? rollerComputeChips(r, rollKind) : [];
  const chipDice = chips.filter(c => _roller.chips[c.id]).reduce((s, c) => s + (c.dice || 0), 0);
  const total = _roller.poolBase + chipDice;
  const rolls = [];
  for (let i = 0; i < total; i++) rolls.push(1 + Math.floor(Math.random() * 6));
  const hits = rolls.filter(v => v >= _roller.threshold).length;
  _roller.lastRoll = { rolls, hits, threshold: _roller.threshold };
  pushModal("dice-roller", state.modal.data);
};
handlers["roller-reset"] = () => {
  _roller.poolBase = 4;
  _roller.threshold = 5;
  _roller.chips = {};
  _roller.lastRoll = null;
  pushModal("dice-roller", state.modal.data);
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// STRAIN / TOKENS / SHIELDS / CAPACITORS / FUEL dialogs
// ════════════════════════════════════════════════════════════════════
handlers["show-strain"] = ({ id }) => pushModal("strain-dialog", { id: Number(id) });
handlers["show-pilots"] = ({ id }) => pushModal("pilots-dialog", { id: Number(id) });

handlers["show-fuel"] = ({ id }) => pushModal("fuel-dialog", { id: Number(id) });

handlers["status-picker"] = ({ id }) => pushModal("status-picker", { id: Number(id) });

let renderStrainDialog = function (rid) {

  pushModal("pilots-dialog", { id: Number(id) });
};
handlers["bump-pilot-tok"] = ({ id, p, d }) => {
  const r = findBattleRobot(state.activeBattle, id);

  target.tokens = Math.max(0, (target.tokens || 0) + parseInt(d, 10));
  dbPut("battles", state.activeBattle);
  pushModal("pilots-dialog", { id: Number(id) });
};

let renderShieldsDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>SHIELDS</h2>
    <p>Whole-robot shield pool. Absorbs damage before any component takes a hit. Recovery: spend 1 capacitor for +10 (rulebook L417).</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-shields" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${r.shieldsCurrent} / ${r.shieldsMax}</strong>
      <button class="btn ghost" data-act="bump-shields" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <button class="btn wide ${r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax ? "amber" : "ghost"}"
      ${r.capacitorsRemaining <= 0 || r.shieldsCurrent >= r.shieldsMax ? "disabled" : ""}
      data-act="recover-shields" data-id="${rid}">RECOVER · 1 Cap → +10</button>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-shields"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.shieldsCurrent = Math.max(0, Math.min(r.shieldsMax, r.shieldsCurrent + parseInt(d, 10)));
  dbPut("battles", state.activeBattle);
  pushModal("shields-dialog", { id: Number(id) });
};
handlers["recover-shields"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  if (r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax) {
    r.capacitorsRemaining--;
    r.shieldsCurrent = Math.min(r.shieldsMax, r.shieldsCurrent + 10);
    dbPut("battles", state.activeBattle);
    pushModal("shields-dialog", { id: Number(id) });
  }
};

let renderCapDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>CAPACITORS — ${r.capacitorsRemaining} left</h2>
    <p>+1 die per remaining cap to Shutdown checks. Spend 1 to recover 10 Shields OR remove 1 SStrain (rulebook L417-420).</p>
    <div class="row-gap" style="margin:12px 0">
      <button class="btn ghost" data-act="bump-cap" data-id="${rid}" data-d="-1">− 1</button>
      <strong style="flex:1; text-align:center; font-size:18px">${r.capacitorsRemaining}</strong>
      <button class="btn ghost" data-act="bump-cap" data-id="${rid}" data-d="1">+ 1</button>
    </div>
    <button class="btn wide ${r.capacitorsRemaining > 0 && r.shieldsCurrent < r.shieldsMax ? "" : "ghost"}"
      ${r.capacitorsRemaining <= 0 || r.shieldsCurrent >= r.shieldsMax ? "disabled" : ""}
      data-act="recover-shields" data-id="${rid}">+10 SHIELDS · spend 1 Cap</button>
    <button class="btn wide ${r.capacitorsRemaining > 0 && r.systemStrain > 0 ? "" : "ghost"}" style="margin-top:6px"
      ${r.capacitorsRemaining <= 0 || r.systemStrain <= 0 ? "disabled" : ""}
      data-act="spend-cap-strain" data-id="${rid}">−1 SYSTEM STRAIN · spend 1 Cap</button>
    <div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>
  `;
};
handlers["bump-cap"] = ({ id, d }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.capacitorsRemaining = Math.max(0, r.capacitorsRemaining + parseInt(d, 10));
  dbPut("battles", state.activeBattle);
  pushModal("cap-dialog", { id: Number(id) });
};
handlers["spend-cap-strain"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  if (r.capacitorsRemaining > 0 && r.systemStrain > 0) {
    r.capacitorsRemaining--; r.systemStrain--;
    dbPut("battles", state.activeBattle);
    pushModal("cap-dialog", { id: Number(id) });
  }
};

let renderFuelDialog = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);

let renderArmorDialog = function (rid) {

let renderMoveDialog = function (rid) {

const STATUSES = ["STANDING","CROUCHED","FLYING","GRAPPLED"];
let renderStatusPicker = function (rid) {
  const r = findBattleRobot(state.activeBattle, rid);
  return `
    <h2>SET STATUS</h2>
    <p>Player-controlled canonical status. DOWN / SHUTDOWN are gameplay-set.</p>
    ${STATUSES.map(s => {
      const active = (r.statusEffects || []).includes(s) || (s === "STANDING" && (r.statusEffects || []).length === 0);
      return `<div class="card tight ${active?"":""}" data-act="set-status" data-id="${rid}" data-s="${s}" style="border-color: var(--${s==="STANDING"?"green":s==="CROUCHED"?"amber":s==="FLYING"?"cyan":"orange"})">${s} ${active ? "<span style='float:right'>ACTIVE</span>" : ""}</div>`;
    }).join("")}
    <div class="actions">
      <button class="btn ghost" data-act="clear-status" data-id="${rid}">CLEAR → STANDING</button>
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
const CANONICAL_STATUSES = ["STANDING","CROUCHED","FLYING","DOWN","SHUTDOWN","GRAPPLED"];
handlers["set-status"] = ({ id, s }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.statusEffects = (r.statusEffects || []).filter(e => !CANONICAL_STATUSES.includes(e));

handlers["clear-status"] = ({ id }) => {
  const r = findBattleRobot(state.activeBattle, id);
  r.statusEffects = (r.statusEffects || []).filter(e => !CANONICAL_STATUSES.includes(e));
  dbPut("battles", state.activeBattle);

};

handlers["open-comp"] = ({ id, cid }) => {
  pushModal("comp-sheet", { id: Number(id), cid: Number(cid) });
};
let renderCompSheet = function (rid, cid) {

      <span class="chip">${c.definition}</span>
      <span class="chip muted">${c.facing}</span>
      ${c.isFrame ? `<span class="chip">FRAME</span>` : ""}

        <strong style="flex:1; text-align:center; font-size:18px">${c.isDestroyed ? "DESTROYED" : c.hpMax === 0 ? "— (no armor)" : `${c.hpCurrent} / ${c.hpMax}`}</strong>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="+1">+ 1</button>
        <button class="btn ghost" data-act="bump-comp-hp" data-id="${rid}" data-cid="${cid}" data-d="+5">+5</button>

          <div class="card tight row-between">

          <div class="row-between">
