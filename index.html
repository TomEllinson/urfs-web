        <div class="row-between">
          <div>
            <span class="chip ${defChipClass(c.definition)}">${c.definition}</span>
            <strong style="margin-left:8px">${escapeHtml(c.name)}</strong>
          </div>
          <div class="row-gap">
            <button class="btn ghost" style="padding:4px 8px" data-act="edit-component" data-rid="${r.id}" data-cid="${c.tempId}">⚙</button>
            ${idx === 0 ? "" : `<button class="btn ghost" style="padding:4px 8px" data-act="delete-component" data-rid="${r.id}" data-cid="${c.tempId}">✕</button>`}
          </div>
        </div>
        <div class="meta" style="font-size:11px; color:var(--on-surface-muted); margin-top:4px">
          ${(c.modules || []).length} modules
          · ${(c.equipment || []).length} equipment
          · ${c.definition === "CORE" ? "all facings" : (() => {
            const primary = c.facing || "FRONT";
            const auto = autoAdditionalFacings(c.definition, primary);
            const extras = auto || (c.additionalFacings || []);
            return extras.length > 0 ? `facing ${primary} + ${extras.join(", ")}` : `facing ${primary}`;
          })()}
        </div>
      </div>
    `).join("")}
    <button class="btn wide" data-act="add-component" data-rid="${r.id}">＋ ADD COMPONENT</button>
    <div class="actions" style="align-items:center">
      ${warnChip}
      <button class="btn ghost" data-act="modal-close">DONE</button>
    </div>
  `;
};
function defChipClass(def) {
  switch (def) {
    case "CORE": return "";
    case "HEAD": return "red";
    case "ARM": return "green";
    case "LEG": return "amber";
    case "UTILITY": return "muted";
    default: return "muted";
  }
}
handlers["show-robot-issues"] = ({ id }) => {
  const r = state.robots.find(x => x.id === Number(id));
  if (!r) return;
  const { issues } = validateRobot(r);
  alert(issues.join("\n"));
};
handlers["modal-close"] = () => {
  // Reset pilot picker on any action-resolve cancel so stale picks don't bleed.
  if (state.modal?.kind === "action-resolve") { _pickedPilot = null; }
  // Save form values back if editing a robot.
  if (state.modal?.kind === "robot-editor") {
    const r = state.robots.find(x => x.id === state.modal.data.id);
    if (r) {
      const nm = document.getElementById("robot-name")?.value;
      if (nm != null) r.name = nm;
      r.silhouette = clampInt("robot-sil", 1, 10, r.silhouette);
      r.frameStrength = clampInt("robot-fs", 1, 6, r.frameStrength);
      r.frameDurability = clampInt("robot-fd", 1, 6, r.frameDurability);
      r.frameMaterial = clampInt("robot-fm", 1, 6, r.frameMaterial);
      saveRobot(r);
    }
  }
  closeModal();
};
handlers["close-modal"] = () => closeModal();
// onchange handlers fire on blur — they persist edits to state + IDB
// immediately so the next re-render (HUD chip update, sub-modal open, etc.)
// doesn't wipe the typed value. Re-render happens so the HUD reflects the
// new stat in real time.
window.persistRobotField = function (id, field, raw) {
  const r = state.robots.find(x => x.id === Number(id));
  if (!r) return;
  r[field] = raw;
  saveRobot(r);
  render();
};
window.persistRobotStat = function (id, field, raw, lo, hi) {
  const r = state.robots.find(x => x.id === Number(id));
  if (!r) return;
  const v = parseInt(raw, 10);
  if (Number.isNaN(v)) return;
  r[field] = Math.max(lo, Math.min(hi, v));
  saveRobot(r);
  render();
};
window.persistForceField = function (id, field, raw, asInt) {
  const f = state.forces.find(x => x.id === Number(id));
  if (!f) return;
  if (asInt) {
    const v = parseInt(raw, 10);
    f[field] = Number.isNaN(v) ? 0 : Math.max(0, v);
  } else {
    f[field] = raw;
  }
  dbPut("forces", f);
  render();
};
window.persistPilotField = function (id, field, raw) {
  const p = state.pilots.find(x => x.id === Number(id));
  if (!p) return;
  p[field] = raw;
  dbPut("pilots", p);
  render();
};
window.persistEquipmentField = function (id, field, raw) {
  const e = state.equipment.find(x => x.id === Number(id));
  if (!e) return;
  e[field] = raw;
  dbPut("equipment", e);
  render();
};
function clampInt(id, lo, hi, dflt) {
  const v = parseInt(document.getElementById(id)?.value || "", 10);
  if (Number.isNaN(v)) return dflt;
  return Math.max(lo, Math.min(hi, v));
}
handlers["add-component"] = ({ rid }) => {
  pushModal("add-component", { rid: Number(rid) });
};
handlers["edit-component"] = ({ rid, cid }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};
handlers["delete-component"] = ({ rid, cid }) => {
  if (!confirm("Remove this component?")) return;
  const r = state.robots.find(x => x.id === Number(rid));
  if (!r) return;
  r.components = r.components.filter(c => c.tempId !== Number(cid));
  saveRobot(r);
  render();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// ADD/EDIT COMPONENT (modal)
// ════════════════════════════════════════════════════════════════════
const COMP_DEFS = ["HEAD","ARM","LEG","UTILITY"];
const FACINGS = ["FRONT","BACK","LEFT","RIGHT","TOP","BOTTOM"];
const HORIZONTAL = ["FRONT","BACK","LEFT","RIGHT"];
const OPPOSITE = { FRONT:"BACK", BACK:"FRONT", LEFT:"RIGHT", RIGHT:"LEFT", TOP:"BOTTOM", BOTTOM:"TOP" };

function eligibleAdditionalFacings(def, primary) {
  const adj = FACINGS.filter(f => f !== primary && f !== OPPOSITE[primary]);
  if (def === "ARM") return adj;
  if (def === "HEAD") {
    if (primary === "TOP" || primary === "BOTTOM") return HORIZONTAL;
    return [];
  }
  if (def === "LEG") {
    if (primary === "TOP" || primary === "BOTTOM") return HORIZONTAL;
    return HORIZONTAL.filter(f => f !== primary);
  }
  return [];
}

function requiredAdditionalCount(def, primary) {
  if (def === "ARM") return 1;
  if (def === "HEAD") return (primary === "TOP" || primary === "BOTTOM") ? 3 : 0;
  if (def === "LEG") return (primary === "TOP" || primary === "BOTTOM") ? 2 : 1;
  return 0;
}

// HEAD on horizontal auto-assigns adjacents; no picker but display them.
function autoAdditionalFacings(def, primary) {
  if (def === "HEAD" && primary !== "TOP" && primary !== "BOTTOM") {
    return FACINGS.filter(f => f !== primary && f !== OPPOSITE[primary] && HORIZONTAL.includes(f));
  }
  return null;
}

function renderFacingPickerHtml(def, primary, picked, idPrefix) {
  const options = eligibleAdditionalFacings(def, primary);
  const required = requiredAdditionalCount(def, primary);
  const autoFacings = autoAdditionalFacings(def, primary);
  if (autoFacings) {
    return `<div class="field"><label>ADDITIONAL FACINGS</label><div class="meta" style="padding:4px 0">Auto: ${autoFacings.join(", ")} (horizontal adjacents)</div></div>`;
  }
  if (required === 0 || options.length === 0) return "";
  const count = picked.filter(f => options.includes(f)).length;
  const ok = count === required;
  const chips = options.map(f => {
    const on = picked.includes(f);
    return `<button class="chip ${on ? "primary" : "muted"}" style="margin:2px" data-act="toggle-facing-chip" data-prefix="${idPrefix}" data-facing="${f}">${f}</button>`;
  }).join("");
  return `
    <div class="field" id="${idPrefix}-facing-picker">
      <label>ADDITIONAL FACINGS <span style="color:var(--on-surface-muted);font-weight:normal">(pick exactly ${required})</span></label>
      <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">${chips}</div>
      <div style="margin-top:4px;font-size:11px;color:${ok ? "var(--on-surface-muted)" : "var(--danger, #f44)"}">
        ${count}/${required} selected${ok ? "" : " — select exactly " + required}
      </div>
    </div>
  `;
}

const addCompUI = { picked: [] };
const editCompUI = { picked: [] };

handlers["toggle-facing-chip"] = ({ prefix, facing }) => {
  const ui = prefix === "ac" ? addCompUI : editCompUI;
  if (ui.picked.includes(facing)) {
    ui.picked = ui.picked.filter(f => f !== facing);
  } else {
    ui.picked = [...ui.picked, facing];
  }
  const d = prefix === "ac"
    ? document.getElementById("ac-def")?.value
    : document.getElementById("ec-def-hidden")?.value;
  const primary = prefix === "ac"
    ? document.getElementById("ac-facing")?.value
    : document.getElementById("ec-facing")?.value;
  if (d && primary) {
    const options = eligibleAdditionalFacings(d, primary);
    const required = requiredAdditionalCount(d, primary);
    const count = ui.picked.filter(f => options.includes(f)).length;
    const ok = count === required;
    // Refresh chip styles.
    document.querySelectorAll(`[data-prefix="${prefix}"][data-act="toggle-facing-chip"]`).forEach(btn => {
      const f = btn.dataset.facing;
      btn.className = "chip " + (ui.picked.includes(f) ? "primary" : "muted");
      btn.style.margin = "2px";
    });
    // Refresh counter.
    const picker = document.getElementById(`${prefix}-facing-picker`);
    if (picker) {
      const counter = picker.querySelector("div[style*='font-size:11px']");
      if (counter) {
        counter.style.color = ok ? "var(--on-surface-muted)" : "var(--danger, #f44)";
        counter.textContent = `${count}/${required} selected${ok ? "" : " — select exactly " + required}`;
      }
    }
    // Enable/disable the action button.
    const btn = document.getElementById(`${prefix}-action-btn`);
    if (btn) btn.disabled = !ok;
  }
};

function reattachDataActListeners(root) {
  for (const el of (root || document).querySelectorAll("[data-act]")) {
    el.addEventListener("click", (e) => { e.stopPropagation(); dispatch(el.dataset.act, el.dataset); });
  }
}

window.onAddCompDefOrFacingChange = function() {
  const def = document.getElementById("ac-def")?.value;
  const primary = document.getElementById("ac-facing")?.value;
  if (!def || !primary) return;
  const auto = autoAdditionalFacings(def, primary);
  addCompUI.picked = [];
  const required = requiredAdditionalCount(def, primary);
  const pickerEl = document.getElementById("ac-facing-picker-wrap");
  if (pickerEl) {
    pickerEl.innerHTML = renderFacingPickerHtml(def, primary, addCompUI.picked, "ac");
    reattachDataActListeners(pickerEl);
  }
  const btn = document.getElementById("ac-action-btn");
  if (btn) btn.disabled = (required > 0 && !auto && addCompUI.picked.length !== required);
};

let renderAddComponent = function (rid) {
  const r = state.robots.find(x => x.id === rid);
  const core = (r?.components || []).find(c => c.definition === "CORE");
  const defaultParent = core ? core.tempId : "";
  const parentOptions = (r?.components || []).map(c =>
    `<option value="${c.tempId}" ${c.tempId === defaultParent ? "selected" : ""}>${escapeHtml(c.name || c.definition)}</option>`
  ).join("");
  addCompUI.picked = [];
  const initDef = "HEAD";
  const initFacing = "FRONT";
  const initRequired = requiredAdditionalCount(initDef, initFacing);
  const initAuto = autoAdditionalFacings(initDef, initFacing);
  const initDisabled = initRequired > 0 && !initAuto;
  return `
    <h2>ADD COMPONENT</h2>
    <div class="field">
      <label>NAME</label>
      <input id="ac-name" value="" placeholder="e.g. Right Arm" />
    </div>
    <div class="field">
      <label>DEFINITION</label>
      <select id="ac-def" onchange="window.onAddCompDefOrFacingChange()">
        ${COMP_DEFS.map(d => `<option>${d}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label>FACING</label>
      <select id="ac-facing" onchange="window.onAddCompDefOrFacingChange()">
        ${FACINGS.map(f => `<option>${f}</option>`).join("")}
      </select>
    </div>
    <div id="ac-facing-picker-wrap">${renderFacingPickerHtml(initDef, initFacing, [], "ac")}</div>
    <div class="field">
      <label>FRAME COMPONENT?</label>
      <select id="ac-frame">
        <option value="true">Frame (gets Frame Save)</option>
        <option value="false">Non-Frame (utility)</option>
      </select>
    </div>
    <div class="field">
      <label>PARENT</label>
      <select id="ac-parent">
        ${parentOptions}
      </select>
    </div>
    <div class="actions">
      <button class="btn ghost" data-act="modal-close">CANCEL</button>
      <button id="ac-action-btn" class="btn primary" data-act="confirm-add-component" data-rid="${rid}" ${initDisabled ? "disabled" : ""}>ADD</button>
    </div>
  `;
};
handlers["confirm-add-component"] = ({ rid }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  if (!r) return;
  const name = document.getElementById("ac-name").value || "Component";
  const def = document.getElementById("ac-def").value;
  const facing = document.getElementById("ac-facing").value;
  const isFrame = document.getElementById("ac-frame").value === "true";
  const parentTempId = Number(document.getElementById("ac-parent").value) || null;
  const auto = autoAdditionalFacings(def, facing);
  const additionalFacings = auto ? auto : [...addCompUI.picked];
  const tempId = Date.now() + Math.floor(Math.random() * 1000);
  r.components.push({
    tempId, definition: def, facing, name, isFrame,
    parentTempId,
    additionalFacings,
    modules: [], equipment: [],
  });
  saveRobot(r);
  pushModal("robot-editor", { id: r.id });
};

window.onEditCompFacingChange = function() {
  const facing = document.getElementById("ec-facing")?.value;
  const def = document.getElementById("ec-def-hidden")?.value;
  if (!facing || !def) return;
  const auto = autoAdditionalFacings(def, facing);
  editCompUI.picked = [];
  const required = requiredAdditionalCount(def, facing);
  const wrap = document.getElementById("ec-facing-picker-wrap");
  if (wrap) {
    wrap.innerHTML = renderFacingPickerHtml(def, facing, editCompUI.picked, "ec");
    reattachDataActListeners(wrap);
  }
  const btn = document.getElementById("ec-action-btn");
  if (btn) btn.disabled = (required > 0 && !auto && editCompUI.picked.length !== required);
};

let renderEditComponent = function (rid, cid) {
  const r = state.robots.find(x => x.id === rid);
  const c = r?.components.find(c => c.tempId === cid);
  if (!c) return "<p>Component not found.</p>";
  editCompUI.picked = [...(c.additionalFacings || [])];
  const installedIds = (c.modules || []).map(m => m.moduleId);
  const available = MODULES.filter(m =>
    (m.definitionLimit.length === 0 || m.definitionLimit.includes(c.definition))
    && (m.maxPerComponent === -1 || !m.maxPerComponent || installedIds.filter(i => i === m.id).length < (m.maxPerComponent || 1))
  );
  // Collect descendants of c so they cannot be chosen as parent (would create a cycle).
  const descendantIds = new Set();
  const queue = [c.tempId];
  while (queue.length) {
    const pid = queue.shift();
    for (const comp of r.components) {
      if (comp.parentTempId === pid && !descendantIds.has(comp.tempId)) {
        descendantIds.add(comp.tempId);
        queue.push(comp.tempId);
      }
    }
  }
  const eligibleParents = (r?.components || []).filter(comp =>
    comp.tempId !== c.tempId && !descendantIds.has(comp.tempId)
  );
  const parentPickerHtml = c.definition === "CORE" ? "" : `
    <div class="field">
      <label>PARENT</label>
      <select id="ec-parent">
        ${eligibleParents.map(comp =>
          `<option value="${comp.tempId}" ${comp.tempId === c.parentTempId ? "selected" : ""}>${escapeHtml(comp.name || comp.definition)}</option>`
        ).join("")}
      </select>
    </div>
  `;
  return `
    <h2>${escapeHtml(c.name)} // ${c.definition}</h2>
    <div class="field">
      <label>NAME</label>
      <input id="ec-name" value="${escapeHtml(c.name)}" />
    </div>
    <input type="hidden" id="ec-def-hidden" value="${c.definition}" />
    ${c.definition === "CORE" ? `
      <div class="field">
        <label>FACING</label>
        <div class="meta" style="padding:8px 0">Core occupies all facings (rulebook L82-84).</div>
      </div>
    ` : `
      <div class="field">
        <label>FACING</label>
        <select id="ec-facing" onchange="window.onEditCompFacingChange()">
          ${FACINGS.map(f => `<option ${f===c.facing?'selected':''}>${f}</option>`).join("")}
        </select>
      </div>
      <div id="ec-facing-picker-wrap">${renderFacingPickerHtml(c.definition, c.facing || "FRONT", editCompUI.picked, "ec")}</div>
    `}
    ${parentPickerHtml}
    ${(() => {
      const slotCap = MODULE_SLOT_CAPS[c.definition] || 8;
      const slotCount = (c.modules || []).length;
      const slotsFull = slotCount >= slotCap;
      const moduleRows = (c.modules || []).map((m, i) => {
        const def = MODULES_BY_ID[m.moduleId];
        return `
          <div class="card tight row-between">
            <div>
              <strong>${escapeHtml(def?.name || m.moduleId)}</strong>
              <div class="meta" style="font-size:10px">W ${def?.weight ?? 0} · P ${def?.power ?? 0}</div>
            </div>
            <button class="btn ghost" data-act="remove-module" data-rid="${rid}" data-cid="${cid}" data-idx="${i}">✕</button>
          </div>
        `;
      }).join("");
      const addBtn = slotsFull
        ? `<button class="btn wide" disabled data-act="add-module-full" data-rid="${rid}" data-cid="${cid}" data-count="${slotCount}" data-cap="${slotCap}">＋ ADD MODULE</button>`
        : `<button class="btn wide" data-act="add-module" data-rid="${rid}" data-cid="${cid}">＋ ADD MODULE</button>`;
      return `<div class="label-small label-cyan" style="margin-top:8px">MODULES (${slotCount}/${slotCap})</div>${moduleRows}${addBtn}`;
    })()}
    ${(() => {
      const attachedEquipment = (c.equipment || []);
      const equipmentRows = attachedEquipment.map((e, i) => {
        const eq = state.equipment.find(x => x.id === e.equipmentId);
        if (!eq) return "";
        const stats = calculateEquipmentStats(eq.keywords || [], eq.silhouette || 1);
        const chip = [
          stats.damage > 0 ? `DMG ${stats.damage}` : "",
          stats.range > 0 ? `RNG ${stats.range}` : "",
          `ARM ${stats.armor}`,
        ].filter(Boolean).join(" · ");
        return `
          <div class="card tight row-between">
            <div>
              <strong>${escapeHtml(eq.name || "Equipment")}</strong>
              <div class="meta" style="font-size:10px">${chip}</div>
            </div>
            <button class="btn ghost" data-act="remove-equipment" data-rid="${rid}" data-cid="${cid}" data-idx="${i}">✕</button>
          </div>
        `;
      }).join("");
      return `<div class="label-small label-cyan" style="margin-top:12px">EQUIPMENT (${attachedEquipment.length})</div>${equipmentRows}<button class="btn wide" data-act="add-equipment" data-rid="${rid}" data-cid="${cid}">＋ ADD EQUIPMENT</button>`;
    })()}
    ${(() => {
      if (c.definition === "CORE") return "";
      const req = requiredAdditionalCount(c.definition, c.facing || "FRONT");
      const auto = autoAdditionalFacings(c.definition, c.facing || "FRONT");
      const picked = editCompUI.picked;
      if (req === 0 || auto) return "";
      const ok = picked.filter(f => eligibleAdditionalFacings(c.definition, c.facing || "FRONT").includes(f)).length === req;
      return ok ? "" : `<div style="font-size:11px;color:var(--danger,#f44);margin-bottom:4px">Select exactly ${req} additional facing(s) to save</div>`;
    })()}
    <div class="actions">
      <button id="ec-action-btn" class="btn ghost" data-act="modal-close-component" data-rid="${rid}" data-cid="${cid}" ${(() => {
        if (c.definition === "CORE") return "";
        const req = requiredAdditionalCount(c.definition, c.facing || "FRONT");
        const auto = autoAdditionalFacings(c.definition, c.facing || "FRONT");
        if (req === 0 || auto) return "";
        const options = eligibleAdditionalFacings(c.definition, c.facing || "FRONT");
        const ok = editCompUI.picked.filter(f => options.includes(f)).length === req;
        return ok ? "" : "disabled";
      })()}>DONE</button>
    </div>
  `;
};
handlers["modal-close-component"] = ({ rid, cid }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  const c = r?.components.find(c => c.tempId === Number(cid));
  if (c) {
    c.name = document.getElementById("ec-name")?.value || c.name;
    const newFacing = document.getElementById("ec-facing")?.value;
    if (newFacing) c.facing = newFacing;
    const def = c.definition;
    const primary = c.facing;
    const auto = autoAdditionalFacings(def, primary);
    if (def !== "CORE") {
      c.additionalFacings = auto ? auto : [...editCompUI.picked];
    }
    const parentEl = document.getElementById("ec-parent");
    if (parentEl) c.parentTempId = Number(parentEl.value) || null;
    saveRobot(r);
  }
  pushModal("robot-editor", { id: Number(rid) });
};
handlers["add-module"] = ({ rid, cid }) => {
  modulePickerUI.search = "";
  modulePickerUI.category = "All";
  pushModal("module-picker", { rid: Number(rid), cid: Number(cid) });
};
handlers["add-module-full"] = ({ count, cap }) => {
  showToast(`Component slots full (${count}/${cap})`);
};
handlers["remove-module"] = ({ rid, cid, idx }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  const c = r?.components.find(c => c.tempId === Number(cid));
  if (!c) return;
  const removedId = c.modules[Number(idx)]?.moduleId;
  const remainingAfterRemove = c.modules.filter((_, i) => i !== Number(idx));
  const remainingIds = remainingAfterRemove.map(m => m.moduleId);
  // A dependent is broken if its requires list has no overlap with the remaining ids (OR semantics).
  const dependents = removedId
    ? remainingAfterRemove.filter(m => {
        const reqs = MODULES_BY_ID[m.moduleId]?.requires;
        if (!reqs || reqs.length === 0) return false;
        return !reqs.some(reqId => remainingIds.includes(reqId));
      })
    : [];
  const doRemove = () => {
    const dependentIds = new Set(dependents.map(m => m.moduleId));
    c.modules = c.modules.filter((m, i) => {
      if (i === Number(idx)) return false;
      if (dependentIds.has(m.moduleId)) return false;
      return true;
    });
    saveRobot(r);
    render();
  };
  if (dependents.length > 0) {
    if (confirm(`This component has ${dependents.length} dependent module(s). Removing breaks them. Continue?`)) {
      doRemove();
    }
  } else {
    doRemove();
  }
};

// Module picker UI state — persists across the in-modal re-renders triggered
// by search/category chip clicks. Reset on modal open.
const modulePickerUI = { search: "", category: "All" };
let renderModulePicker = function (rid, cid) {
  const r = state.robots.find(x => x.id === rid);
  const c = r?.components.find(c => c.tempId === cid);
  if (!c) return "<p>?</p>";
  const installedIds = (c.modules || []).map(m => m.moduleId);
  const q = (modulePickerUI.search || "").trim().toLowerCase();
  const cat = modulePickerUI.category;
  const eligible = MODULES.filter(m => {
    if (m.definitionLimit.length > 0 && !m.definitionLimit.includes(c.definition)) return false;
    if (m.maxPerComponent && m.maxPerComponent !== -1) {
      const have = installedIds.filter(i => i === m.id).length;
      if (have >= m.maxPerComponent) return false;
    }
    if (m.maxCopies !== undefined && m.maxCopies !== -1 && m.maxCopies > 0) {
      const have = installedIds.filter(i => i === m.id).length;
      if (have >= m.maxCopies) return false;
    }
    if (cat !== "All" && m.category !== cat) return false;
    if (q && !(m.name.toLowerCase().includes(q) || (m.description || "").toLowerCase().includes(q))) return false;
    return true;
  });
  const categoryChips = ["All", ...MODULE_CATEGORIES].map(name => {
    const active = name === cat;
    return `<span class="chip ${active ? "" : "muted"}" data-act="module-picker-cat" data-cat="${name}">${name}</span>`;
  }).join("");
  const cardFor = (m) => {
    const stats = [
      `W ${m.weight}`,
      `P ${m.power >= 0 ? "+" : ""}${m.power}`,
    ];
    if (m.fuelCapacity) stats.push(`+${m.fuelCapacity} Fuel Cap`);
    if (m.fuelConsumption) stats.push(`-${m.fuelConsumption} Fuel/rd`);
    if (m.shieldsMultiplier) stats.push(`+${m.shieldsMultiplier}×Sil Shields`);
    if (m.armorMultiplier) stats.push(`+${m.armorMultiplier}×Sil Armor`);
    if (m.boost) stats.push(`+${m.boost} Boost`);
    if (m.glide) stats.push(`+${m.glide} Glide`);
    if (m.groundSpeedMultiplier) stats.push(`+${m.groundSpeedMultiplier}×Sil GSPD`);
    if (m.cockpitSlots) stats.push(`${m.cockpitSlots} Cockpit Slot`);
    if (m.explosiveDamage) stats.push(`Explosive ${m.explosiveDamage}`);
    if (m.emergencyShutdownBonus) stats.push(`+${m.emergencyShutdownBonus} Shutdown die`);
    const tags = [];
    if (m.toggleable) tags.push("Toggleable");
    if (m.stackable) tags.push("Stackable");
    if (m.maxCopies === -1) tags.push("Unlimited copies");
    if (m.maxPerComponent === 1) tags.push("Max 1 per component");
    if (m.definitionLimit && m.definitionLimit.length > 0) tags.push(`Only: ${m.definitionLimit.join(" / ")}`);

    // Check requires — any one of the listed ids must be present (OR semantics per armor_coating).
    // "requires" on armor_coating means "at least one of these must be installed".
    const missingReqs = m.requires
      ? m.requires.filter(reqId => !installedIds.includes(reqId))
      : [];
    const reqsMet = !m.requires || missingReqs.length < m.requires.length;
    const reqChip = (!reqsMet)
      ? `<div style="margin-top:6px; font-size:10px; color:var(--red, #f44)">Requires: ${missingReqs.map(id => escapeHtml(MODULES_BY_ID[id]?.name || id)).join(" / ")}</div>`
      : (m.requires ? `<div class="meta" style="font-size:10px; margin-top:6px">Requires ${m.requires.map(id => escapeHtml(MODULES_BY_ID[id]?.name || id)).join(" / ")}</div>` : "");

    const greyStyle = !reqsMet ? " style=\"opacity:0.4; pointer-events:none\"" : "";
    const act = reqsMet ? `data-act="install-module" data-rid="${rid}" data-cid="${cid}" data-mid="${m.id}"` : "";
    return `
      <div class="card tight"${greyStyle} ${act}>
        <div class="row-between" style="align-items:flex-start; gap:8px">
          <div style="flex:1">
            <strong>${escapeHtml(m.name)}</strong>
            <span class="chip muted" style="font-size:10px; margin-left:6px">${escapeHtml(m.category || "Misc")}</span>
          </div>
          <span class="chip muted" style="white-space:nowrap">${stats.slice(0,2).join(" · ")}</span>
        </div>
        ${stats.length > 2 ? `<div class="meta" style="font-size:11px; margin-top:4px; color:var(--cyan)">${stats.slice(2).join(" · ")}</div>` : ""}
        <div class="meta" style="font-size:12px; margin-top:6px; line-height:1.45">${escapeHtml(m.description)}</div>
        ${tags.length ? `<div class="meta" style="font-size:10px; margin-top:6px; color:var(--on-surface-muted)">${tags.join(" • ")}</div>` : ""}
        ${reqChip}
      </div>
    `;
  };
  return `
    <h2>PICK A MODULE</h2>
    <p>${escapeHtml(c.name)} · ${c.definition}</p>
    <div class="field">
      <input id="module-search" type="search" placeholder="Search name or description" value="${escapeHtml(modulePickerUI.search)}" oninput="window.onModulePickerSearch(this.value)" />
    </div>
    <div class="row-gap" style="flex-wrap:wrap; margin-bottom:8px">${categoryChips}</div>
    ${eligible.length === 0
      ? `<p class="meta">No modules match — clear the filter to see all eligible.</p>`
      : eligible.map(cardFor).join("")}
    <div class="actions">
      <button class="btn ghost" data-act="cancel-module-picker" data-rid="${rid}" data-cid="${cid}">CANCEL</button>
    </div>
  `;
};
handlers["module-picker-cat"] = ({ cat }) => {
  const searchEl = document.getElementById("module-search");
  if (searchEl) modulePickerUI.search = searchEl.value || "";
  modulePickerUI.category = cat;
  render();
};
// Debounced search re-render so each keystroke doesn't thrash the modal.
let _modulePickerSearchTimer = null;
window.onModulePickerSearch = function (v) {
  modulePickerUI.search = v || "";
  clearTimeout(_modulePickerSearchTimer);
  _modulePickerSearchTimer = setTimeout(() => {
    render();
    // Restore caret position + focus on the new (re-rendered) input.
    const el = document.getElementById("module-search");
    if (el) {
      el.focus();
      const pos = el.value.length;
      el.setSelectionRange?.(pos, pos);
    }
  }, 120);
};
handlers["install-module"] = ({ rid, cid, mid }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  const c = r?.components.find(c => c.tempId === Number(cid));

  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};
handlers["cancel-module-picker"] = ({ rid, cid }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};
handlers["add-equipment"] = ({ rid, cid }) => {
  pushModal("equipment-picker", { rid: Number(rid), cid: Number(cid) });
};
handlers["remove-equipment"] = ({ rid, cid, idx }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  const c = r?.components.find(c => c.tempId === Number(cid));
  if (!c) return;
  c.equipment = (c.equipment || []).filter((_, i) => i !== Number(idx));
  saveRobot(r);
  render();
};
handlers["pick-equipment"] = ({ rid, cid, eqid, selid }) => {
  const r = state.robots.find(x => x.id === Number(rid));
  const c = r?.components.find(c => c.tempId === Number(cid));
  if (!c) return;
  if (!c.equipment) c.equipment = [];
  // selid points to the socket <select> rendered in the picker for this equipment item.
  const selVal = selid ? (document.getElementById(selid)?.value || null) : null;
  // selVal is "moduleId:idx"; we only need moduleId for socketModuleId.
  const socketModuleId = selVal ? selVal.split(":")[0] : null;
  c.equipment.push({ equipmentId: Number(eqid), socketModuleId });
  saveRobot(r);
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};
handlers["cancel-equipment-picker"] = ({ rid, cid }) => {
  pushModal("edit-component", { rid: Number(rid), cid: Number(cid) });
};

let renderEquipmentPicker = function (rid, cid) {
  const r = state.robots.find(x => x.id === rid);
  const c = r?.components.find(c => c.tempId === cid);
  if (!r || !c) return "<p>?</p>";

  // Collect socket modules on this component.
  const socketModules = (c.modules || []).map((m, i) => {
    const type = getSocketTypeForModule(m.moduleId);
    if (!type) return null;
    const def = MODULES_BY_ID[m.moduleId];
    return { idx: i, moduleId: m.moduleId, type, name: def?.name || m.moduleId };
  }).filter(Boolean);

  const itemCards = (state.equipment.length === 0)
    ? `<p class="meta">No equipment in library yet.</p>`
    : state.equipment.map(eq => {
        const stats = calculateEquipmentStats(eq.keywords || [], eq.silhouette || 1);
        const chip = [
          `SIL ${eq.silhouette || 1}`,
          stats.damage > 0 ? `DMG ${stats.damage}` : "",
          stats.range > 0 ? `RNG ${stats.range}` : "",
          `ARM ${stats.armor}`,
        ].filter(Boolean).join(" · ");

        // For each socket, check compatibility.
        const compatibleSockets = socketModules.filter(sm => {
          const res = validateEquipmentInSocket(eq, sm.type, r);
          return res.valid;
        });
        const firstIncompat = socketModules.length > 0 && compatibleSockets.length === 0
          ? validateEquipmentInSocket(eq, socketModules[0].type, r).error
          : null;

        if (socketModules.length === 0) {
          return `
            <div class="card tight" style="opacity:0.4">
              <div class="row-between">
                <strong>${escapeHtml(eq.name)}</strong>
                <span class="chip muted">${chip}</span>
              </div>
              <div class="meta" style="font-size:10px; margin-top:4px; color:var(--red, #f44)">Incompatible — no socket modules installed on this component.</div>
            </div>`;
        }
        if (firstIncompat) {
          return `
            <div class="card tight" style="opacity:0.4">
              <div class="row-between">
                <strong>${escapeHtml(eq.name)}</strong>
                <span class="chip muted">${chip}</span>
              </div>
              <div class="meta" style="font-size:10px; margin-top:4px; color:var(--red, #f44)">Incompatible — ${escapeHtml(firstIncompat)}</div>
            </div>`;
        }
        const socketOpts = compatibleSockets.map(sm =>
          `<option value="${escapeHtml(sm.moduleId + ":" + sm.idx)}">${escapeHtml(sm.name)} (${sm.type})</option>`
        ).join("");
        return `
          <div class="card tight">
            <div class="row-between" style="align-items:flex-start; gap:8px">
              <div style="flex:1">
                <strong>${escapeHtml(eq.name)}</strong>
                <div class="meta" style="font-size:10px; margin-top:2px">${chip}</div>
              </div>
              <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px">
                <select id="socket-sel-${eq.id}" style="background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:4px 6px;border-radius:4px;font-size:11px">
                  ${socketOpts}
                </select>
                <button class="btn" style="padding:4px 10px; font-size:11px"
                  data-act="pick-equipment" data-rid="${rid}" data-cid="${cid}" data-eqid="${eq.id}"
                  data-selid="socket-sel-${eq.id}">PICK</button>
              </div>
            </div>
          </div>`;
      }).join("");

  return `
    <h2>PICK EQUIPMENT // ${escapeHtml(c.name || c.definition)} · ${escapeHtml(c.definition)}</h2>
    ${itemCards}
    <div class="actions">
      <button class="btn ghost" data-act="cancel-equipment-picker" data-rid="${rid}" data-cid="${cid}">CANCEL</button>
    </div>
  `;
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// EQUIPMENT — list + builder
// ════════════════════════════════════════════════════════════════════
renderEquipment = function () {
  if (state.equipment.length === 0) {
    return emptyScreen("EQUIPMENT", "Build weapons, armor, gear here.", "+ NEW EQUIPMENT", "new-equipment");
  }
  return `
    ${state.equipment.map(e => `
      <div class="list-card" data-act="edit-equipment" data-id="${e.id}">
        <div class="thumb" style="${e.imageData ? 'overflow:hidden;padding:0' : ''}">${e.imageData ? `<img src="${escapeHtml(e.imageData)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" />` : "🔫"}</div>
        <div style="flex:1">
          <h3>${escapeHtml(e.name || "Unnamed")}</h3>
          ${(() => {
            const stats = calculateEquipmentStats(e.keywords || [], e.silhouette);
            return `<div class="meta">
              SIL ${e.silhouette || 1} · BP ${stats.bpCost} · WGT ${stats.weight}${stats.damage > 0 ? ` · DMG ${stats.damage}${stats.damageType === 'Energy' ? ' E' : ''}` : ''}${stats.range > 0 ? ` · RNG ${stats.range}` : ''}${stats.armor !== 5 ? ` · ARM ${stats.armor}` : ''}${stats.maxAmmo > 0 ? ` · AMMO ${stats.maxAmmo}` : ''}
            </div>`;
          })()}
          <div class="meta">${escapeHtml((e.keywords || []).join(", ") || "no keywords")}</div>
        </div>
        <button class="btn ghost" style="padding:6px 10px" data-act="delete-equipment" data-id="${e.id}">✕</button>
      </div>
    `).join("")}
    <button class="fab" data-act="new-equipment">＋</button>
  `;
};
handlers["new-equipment"] = () => {
  const id = Date.now();
  const eq = { id, name: "Equipment " + state.equipment.length, silhouette: 1, bpCost: 0, weight: 1, armor: 5, keywords: [], notes: "", maxAmmo: 0, mountPoint: false };
  state.equipment.push(eq);
  dbPut("equipment", eq);
  pushModal("equipment-editor", { id });
};
handlers["edit-equipment"] = ({ id }) => pushModal("equipment-editor", { id: Number(id) });
handlers["delete-equipment"] = async ({ id }) => {
  if (!confirm("Delete this equipment?")) return;
  await dbDelete("equipment", Number(id));
  state.equipment = state.equipment.filter(e => e.id !== Number(id));
  render();
};

let KEYWORDS = [
  // Stat-modifying (port from CalculationEngine.kt:479-629)
  "Melee", "Ranged", "Edge", "Energy Edge", "Energy Weapon",
  "Power Cell", "Extended Range", "Scatter", "Long Range",
  "Two-handed", "Limited Ammo", "Extended Magazine",
  "Armored", "Reach Extender", "Energy-Reflective Coating",
  "Overcharged",
  // Flavor / mechanical only (no stat changes)
  "Mount Point", "Extending Grip", "Auto", "Explosive",
  "Burst", "Guard", "Inertia Additive", "Kinetic",
  "Link Point", "Tethered", "Corded", "Penetrating",
  "Indirect", "Module Slot",
];

// 0.2.3: keyword-on-keyword constraints from Android KeywordValidator.kt
// + packs/urfs-core/keywords.json. Three relations per keyword:
//   requires    — the listed keyword (or any in requiresAny) must already
//                 be on the equipment before this one can be added
//   requiresAny — at least one of these must be present (OR semantics)
//   excludes    — bidirectional mutual exclusion
// Tom 2026-06-08: webapp pre-0.2.3 let you put Extended Magazine on a sword.
const KEYWORD_RULES = {
  "Edge":              { requires: "Melee" },
  "Energy Edge":       { requires: "Edge", excludes: ["Energy Weapon"] },
  "Energy Weapon":     { requiresAny: ["Melee", "Ranged"], excludes: ["Energy Edge"] },
  "Extended Magazine": { requires: "Limited Ammo" },
  "Reach Extender":    { requires: "Melee" },
  "Auto":              { requires: "Ranged" },
  "Scatter":           { requires: "Ranged" },
  "Limited Ammo":      { requires: "Ranged" },
  "Long Range":        { requires: "Ranged" },
  "Extended Range":    { requires: "Ranged" },
  "Explosive":         { requires: "Ranged" },
  "Burst":             { requires: "Ranged" },
  "Indirect":          { requires: "Ranged" },
  "Kinetic":           { requires: "Ranged" },
  "Penetrating":       { requires: "Ranged" },
  "Two-handed":        { requiresAny: ["Melee", "Ranged"] },
  "Overcharged":       { requiresAny: ["Melee", "Ranged"] },
  "Inertia Additive":  { requires: "Melee" },
  "Extending Grip":    { requires: "Mount Point" },
  "Corded":            { requires: "Tethered" },
};

// Returns { ok: true } when adding `kw` to `currentKeywords` would be valid,
// otherwise { ok: false, reason } with a one-sentence why-not.
function canAddKeyword(kw, currentKeywords) {
  const rule = KEYWORD_RULES[kw];
  if (!rule) return { ok: true };
  if (rule.requires && !currentKeywords.includes(rule.requires)) {
    return { ok: false, reason: `${kw} requires ${rule.requires}.` };
  }
  if (rule.requiresAny && !rule.requiresAny.some(r => currentKeywords.includes(r))) {
    return { ok: false, reason: `${kw} requires one of: ${rule.requiresAny.join(" / ")}.` };
  }
  if (rule.excludes) {
    const conflict = rule.excludes.find(x => currentKeywords.includes(x));
    if (conflict) return { ok: false, reason: `${kw} conflicts with ${conflict}.` };
  }
  return { ok: true };
}

// Returns true if removing `kw` would orphan a dependent already on the
// equipment (e.g. removing Limited Ammo while Extended Magazine is on).
function dependentOnKeyword(kw, currentKeywords) {
  return currentKeywords.filter(other => {
    if (other === kw) return false;
    const rule = KEYWORD_RULES[other];
    if (!rule) return false;
    if (rule.requires === kw) return true;
    if (rule.requiresAny && rule.requiresAny.includes(kw)) {
      const remaining = rule.requiresAny.filter(r => r !== kw && currentKeywords.includes(r));
      return remaining.length === 0;
    }
    return false;
  });
}

// Max keyword count = 3 × silhouette per rulebook L680.
function maxKeywordsFor(silhouette) { return 3 * (silhouette || 1); }

// Snapshot the built-in data as the urfs-core pack definition.
// This is captured once at parse time so rebuildContent can restore it.
const _CORE_MODULES = MODULES.slice();
const _CORE_TALENTS = TALENTS.slice();
const _CORE_KEYWORDS = KEYWORDS.slice();

function rebuildContent() {
  const activePacks = state.packs.filter(p => p.active);
  if (activePacks.length === 0) {
    MODULES = []; TALENTS = []; KEYWORDS = [];
  } else {
    MODULES = activePacks.flatMap(p => p.modules || []);
    TALENTS = activePacks.flatMap(p => p.talents || []);
    KEYWORDS = [...new Set(activePacks.flatMap(p => p.keywords || []))];
  }
  MODULES_BY_ID = Object.fromEntries(MODULES.map(m => [m.id, m]));
}

let renderEquipmentEditor = function (id) {
  const e = state.equipment.find(x => x.id === id);
  if (!e) return "<p>?</p>";
  return `
    <h2>EQUIPMENT // EDIT</h2>
    <div class="row-gap" style="margin-bottom:10px; align-items:center">
      <div style="width:56px; height:56px; border-radius:var(--bevel); background:var(--surface-1); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; font-size:28px">
        ${e.imageData ? `<img src="${escapeHtml(e.imageData)}" style="width:100%;height:100%;object-fit:cover" />` : "🔫"}
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:4px">
        <button class="btn ghost" data-act="pick-equipment-image" data-id="${e.id}">${e.imageData ? "REPLACE PHOTO" : "PICK PHOTO"}</button>
        ${e.imageData ? `<button class="btn ghost" data-act="clear-equipment-image" data-id="${e.id}">REMOVE</button>` : ""}
      </div>
    </div>
    <div class="field"><label>NAME</label><input id="eq-name" value="${escapeHtml(e.name)}" onchange="window.persistEquipmentField(${e.id}, 'name', this.value)" /></div>
    <div class="row-gap" style="flex-wrap:wrap">
      <div class="field" style="flex:1; min-width:96px"><label>SIL</label><input id="eq-sil" type="number" min="1" value="${e.silhouette || 1}" /></div>
    </div>
    <div class="field">
      <label>KEYWORDS <span style="font-weight:normal;color:var(--frame-dim, var(--on-surface-muted));font-size:11px">(${(e.keywords || []).length}/${maxKeywordsFor(e.silhouette)} · max 3 × sil)</span></label>
      <div class="row-gap" style="flex-wrap:wrap">
        ${KEYWORDS.map(k => {
          const cur = e.keywords || [];
          const has = cur.includes(k);
          const check = has ? { ok: true } : canAddKeyword(k, cur);
          const atCap = !has && cur.length >= maxKeywordsFor(e.silhouette);
          const blocked = !has && (!check.ok || atCap);
          const reason = !check.ok ? check.reason : (atCap ? `Cap: ${maxKeywordsFor(e.silhouette)} keywords at SIL ${e.silhouette}.` : null);
          const klass = has ? "" : (blocked ? "muted" : "muted");
          const styleX = blocked ? " style=\"opacity:0.35;cursor:not-allowed\"" : "";
          const titleX = reason ? ` title="${escapeHtml(reason)}"` : "";
          return `<span class="chip ${klass}"${styleX}${titleX} data-act="toggle-keyword" data-id="${e.id}" data-k="${k}">${k}</span>`;
        }).join("")}
      </div>
    </div>
    <div style="margin-top:12px; padding:10px; background:rgba(77,208,225,0.08); border-radius:var(--bevel)">
      <div class="label-small label-cyan">COMPUTED STATS</div>
      <div class="meta" style="margin-top:4px">${(() => {
        const stats = calculateEquipmentStats(e.keywords || [], e.silhouette || 1);
        return `BP <strong>${stats.bpCost}</strong> · Weight <strong>${stats.weight}</strong> · Damage <strong>${stats.damage}${stats.damageType === 'Energy' ? ' ⚡' : ''}</strong>${stats.range > 0 ? ` · Range <strong>${stats.range}</strong>` : ''} · Armor <strong>${stats.armor}</strong>${stats.maxAmmo > 0 ? ` · Max Ammo <strong>${stats.maxAmmo}</strong>` : ''}${stats.power !== 0 ? ` · Power <strong>${stats.power > 0 ? '+' : ''}${stats.power}</strong>` : ''}${stats.immunity.length ? ` · Immune ${stats.immunity.join('/')}` : ''}`;
      })()}</div>
    </div>
    <div class="field">
      <label>NOTES</label>
      <textarea id="eq-notes" rows="3">${escapeHtml(e.notes || "")}</textarea>
    </div>
    <div class="actions">
      <button class="btn ghost" data-act="save-equipment" data-id="${e.id}">DONE</button>
    </div>
  `;
};
handlers["toggle-keyword"] = ({ id, k }) => {
  const e = state.equipment.find(x => x.id === Number(id));
  if (!e) return;
  // Persist in-flight form values before re-render, otherwise toggling a
  // keyword wipes the user's unsaved NAME / SIL / NOTES edits.
  const nameEl = document.getElementById("eq-name");
  const silEl = document.getElementById("eq-sil");
  const notesEl = document.getElementById("eq-notes");
  if (nameEl) e.name = nameEl.value || e.name;
  if (silEl) e.silhouette = parseInt(silEl.value, 10) || 1;
  if (notesEl) e.notes = notesEl.value || "";
  e.keywords = e.keywords || [];
  const has = e.keywords.includes(k);
  if (has) {
    // 0.2.3: refuse to remove a keyword that would orphan dependents
    // (e.g. removing Limited Ammo while Extended Magazine is still on).
    // Show a toast naming the dependents so the player removes them
    // first. Mount Point exclusion is handled below.
    const dependents = dependentOnKeyword(k, e.keywords);
    if (dependents.length > 0) {
      showToast(`Remove ${dependents.join(", ")} first — ${k} is required for ${dependents.length > 1 ? "them" : "it"}.`);
      return;
    }
    e.keywords = e.keywords.filter(x => x !== k);
  } else {
    // 0.2.3: gate the add on the canonical Android KeywordValidator rules
    // + the 3 × silhouette cap.
    const check = canAddKeyword(k, e.keywords);
    if (!check.ok) { showToast(check.reason); return; }
    if (e.keywords.length >= maxKeywordsFor(e.silhouette)) {
      showToast(`Keyword cap reached (${maxKeywordsFor(e.silhouette)} at SIL ${e.silhouette}). Raise SIL or remove one first.`);
      return;
    }
    e.keywords.push(k);
  }
  if (k === "Mount Point") e.mountPoint = e.keywords.includes(k);
  dbPut("equipment", e);
  render();
};
handlers["save-equipment"] = ({ id }) => {
  const e = state.equipment.find(x => x.id === Number(id));
  if (e) {
    e.name = document.getElementById("eq-name").value || e.name;
    e.silhouette = parseInt(document.getElementById("eq-sil").value, 10) || 1;
    e.notes = document.getElementById("eq-notes").value || "";
    // Derive computed fields from keywords so battle state reads are consistent
    const stats = calculateEquipmentStats(e.keywords || [], e.silhouette);
    e.bpCost = stats.bpCost;
    e.weight = stats.weight;
    e.armor = stats.armor;
    e.maxAmmo = stats.maxAmmo;
    dbPut("equipment", e);
  }
  closeModal();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// PILOTS — list + builder
// ════════════════════════════════════════════════════════════════════
const RANKS = ["ROOKIE","EXPERIENCED","VETERAN"];
renderPilots = function () {
  if (state.pilots.length === 0) {
    return emptyScreen("PILOTS", "Build pilots here.", "+ NEW PILOT", "new-pilot");
  }
  return `
    ${state.pilots.map(p => `
      <div class="list-card" data-act="edit-pilot" data-id="${p.id}">
        <div class="thumb" style="${p.imageData ? 'overflow:hidden;padding:0' : ''}">${p.imageData ? `<img src="${escapeHtml(p.imageData)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" />` : (p.isAi ? "🤖" : "👤")}</div>
        <div style="flex:1">
          <h3>${escapeHtml(p.name || "Unnamed")}</h3>
          <div class="row-gap" style="margin-top:4px; flex-wrap:wrap">
            <span class="chip">${escapeHtml(p.rank || "ROOKIE")}</span>
            <span class="chip muted">${p.bpCost || 0} BP</span>
          </div>
          <div class="meta">PHY ${p.physical || 1} · MEN ${p.mental || 1} · TRA ${p.training || 1}</div>
          <div class="meta">${(p.talents || []).join(", ") || "no talents"}</div>
        </div>
        <button class="btn ghost" style="padding:6px 10px" data-act="delete-pilot" data-id="${p.id}">✕</button>
      </div>
    `).join("")}
    <button class="fab" data-act="new-pilot">＋</button>
  `;
};
handlers["new-pilot"] = () => {
  const id = Date.now();
  const p = { id, name: "Pilot " + state.pilots.length, rank: "ROOKIE", physical: 2, mental: 2, training: 2, talents: [], bpCost: 20, isAi: false };
  state.pilots.push(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id });
};
handlers["edit-pilot"] = ({ id }) => pushModal("pilot-editor", { id: Number(id) });
handlers["delete-pilot"] = async ({ id }) => {
  if (!confirm("Delete this pilot?")) return;
  await dbDelete("pilots", Number(id));
  state.pilots = state.pilots.filter(p => p.id !== Number(id));
  render();
};
function pilotStatPointsUsed(p) {
  // Each stat starts at 1 baseline; budget covers points above that minimum.
  return ((p.physical || 1) - 1) + ((p.mental || 1) - 1) + ((p.training || 1) - 1);
}
function pilotTalentSlotsUsed(p) {
  const names = new Set(p.talents || []);
  return TALENTS.filter(t => names.has(t.name)).reduce((s, t) => s + t.slots, 0);
}
function pilotBpReadout(p) {
  if (p.isAi) return 3 * ((p.physical || 1) + (p.mental || 1) + (p.training || 1));
  const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
  const talentNames = new Set(p.talents || []);
  const talentCost = TALENTS.filter(t => talentNames.has(t.name)).reduce((s, t) => s + t.cost, 0);
  return budget.bpCost + talentCost;
}
function pilotMeetsStatReq(p, reqs) {
  if (!reqs) return true;
  if (reqs.physical && (p.physical || 1) < reqs.physical) return false;
  if (reqs.mental   && (p.mental   || 1) < reqs.mental)   return false;
  if (reqs.training && (p.training || 1) < reqs.training) return false;
  return true;
}
let renderPilotEditor = function (id) {
  const p = state.pilots.find(x => x.id === id);
  if (!p) return "<p>?</p>";
  const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
  const spUsed = pilotStatPointsUsed(p);
  const spLeft = budget.statPoints - spUsed;
  const slotsUsed = pilotTalentSlotsUsed(p);
  const slotsLeft = budget.talentSlots - slotsUsed;
  const talentSet = new Set(p.talents || []);
  const bp = pilotBpReadout(p);
  const statRow = (label, field, val) => {
    const canDec = val > 1;
    const canInc = spLeft > 0 && val < 6;
    return `
      <div style="display:flex; align-items:center; gap:8px; margin-top:6px">
        <span style="width:80px; font-size:12px; font-weight:700; color:var(--on-surface-muted)">${label}</span>
        <button class="btn ghost" style="padding:4px 10px" data-act="pilot-stat" data-id="${p.id}" data-f="${field}" data-d="-1" ${canDec?'':'disabled'}">−</button>
        <span style="min-width:24px; text-align:center; font-weight:700; font-size:16px">${val}</span>
        <button class="btn ghost" style="padding:4px 10px" data-act="pilot-stat" data-id="${p.id}" data-f="${field}" data-d="1" ${canInc?'':'disabled'}">+</button>
      </div>`;
  };
  return `
    <h2>PILOT // EDIT</h2>
    <div class="row-gap" style="margin-bottom:10px; align-items:center">
      <div style="width:56px; height:56px; border-radius:50%; background:var(--surface-1); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; font-size:28px">
        ${p.imageData ? `<img src="${escapeHtml(p.imageData)}" style="width:100%;height:100%;object-fit:cover" />` : "👤"}
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:4px">
        <button class="btn ghost" data-act="pick-pilot-image" data-id="${p.id}">${p.imageData ? "REPLACE PHOTO" : "PICK PHOTO"}</button>
        ${p.imageData ? `<button class="btn ghost" data-act="clear-pilot-image" data-id="${p.id}">REMOVE</button>` : ""}
      </div>
    </div>
    <div class="field"><label>NAME</label><input id="p-name" value="${escapeHtml(p.name)}" onchange="window.persistPilotField(${p.id}, 'name', this.value)" /></div>
    <div class="row-gap" style="flex-wrap:wrap; margin-top:6px">
      <div class="field" style="flex:1; min-width:120px">
        <label>RANK</label>
        <select id="p-rank" data-act="pilot-rank" data-id="${p.id}">${RANKS.map(r => `<option ${r===p.rank?'selected':''}>${r}</option>`).join("")}</select>
      </div>
      <div class="field" style="flex:1; min-width:96px">
        <label>AI?</label>
        <select id="p-ai" data-act="pilot-ai" data-id="${p.id}">
          <option value="false" ${!p.isAi?'selected':''}>Human</option>
          <option value="true" ${p.isAi?'selected':''}>AI</option>
        </select>
      </div>
    </div>

    <div class="label-small label-cyan" style="margin-top:10px">STATS — ${spLeft} pts remaining (budget ${budget.statPoints})</div>
    ${statRow("PHYSICAL", "physical", p.physical || 1)}
    ${statRow("MENTAL",   "mental",   p.mental   || 1)}
    ${statRow("TRAINING", "training", p.training || 1)}

    <div class="label-small" style="margin-top:10px; color:var(--amber)">BP: ${bp}</div>

    ${p.isAi ? `<p class="meta" style="margin-top:8px; font-size:11px">AI pilots have no talents. BP = 3 × (PHY + MEN + TRN).</p>` : `
      <div class="label-small label-cyan" style="margin-top:10px">TALENTS (${slotsUsed}/${budget.talentSlots} slots)</div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px">
        ${TALENTS.map(t => {
          const selected = talentSet.has(t.name);
          const meetsReqs = pilotMeetsStatReq(p, t.statReqs);
          const wouldFit = selected || (slotsLeft >= t.slots);
          const disabled = !selected && (!wouldFit || !meetsReqs);
          const reqLabel = t.statReqs ? Object.entries(t.statReqs).map(([k,v]) => `${k[0].toUpperCase()}${v}`).join(" ") : "";
          return `<button class="action-btn" data-act="toggle-talent" data-id="${p.id}" data-t="${escapeHtml(t.name)}"
            style="opacity:${meetsReqs ? 1 : 0.4}; ${disabled && !selected ? 'pointer-events:none;' : ''}"
            title="${meetsReqs ? '' : 'Requires: ' + reqLabel}">
            <span class="nm" style="color:${selected ? 'var(--cyan)' : 'var(--on-surface-muted)'}">
              ${selected ? '☑' : '☐'} ${escapeHtml(t.name)} <span style="font-size:11px">[${t.slots}sl · ${t.cost}bp]</span>
            </span>
            <span class="hint">${escapeHtml(t.description)}${reqLabel ? ' · Req: ' + reqLabel : ''}</span>
          </button>`;
        }).join("")}
      </div>
    `}
    <div class="actions">
      <button class="btn ghost" data-act="save-pilot" data-id="${p.id}">DONE</button>
    </div>
  `;
};
handlers["pilot-stat"] = ({ id, f, d }) => {
  const p = state.pilots.find(x => x.id === Number(id));
  if (!p) return;
  p.name = document.getElementById("p-name")?.value || p.name;
  const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
  const delta = parseInt(d, 10);
  const cur = p[f] || 1;
  const spUsed = pilotStatPointsUsed(p);
  const spLeft = budget.statPoints - spUsed;
  if (delta > 0 && (spLeft <= 0 || cur >= 6)) return;
  if (delta < 0 && cur <= 1) return;
  p[f] = cur + delta;
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["pilot-rank"] = ({ id }) => {
  const p = state.pilots.find(x => x.id === Number(id));
  if (!p) return;
  p.name = document.getElementById("p-name")?.value || p.name;
  p.rank = document.getElementById("p-rank").value;
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["pilot-ai"] = ({ id }) => {
  const p = state.pilots.find(x => x.id === Number(id));
  if (!p) return;
  p.name = document.getElementById("p-name")?.value || p.name;
  p.isAi = document.getElementById("p-ai").value === "true";
  if (p.isAi) p.talents = [];
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["toggle-talent"] = ({ id, t }) => {
  const p = state.pilots.find(x => x.id === Number(id));
  if (!p || p.isAi) return;
  // Sync ALL in-flight form values before toggling — otherwise stat-req checks
  // use stale stat values from the last save, not what the user just typed.
  p.name = document.getElementById("p-name")?.value || p.name;
  const physEl = document.getElementById("p-physical");
  const menEl = document.getElementById("p-mental");
  const trnEl = document.getElementById("p-training");
  if (physEl) p.physical = parseInt(physEl.value, 10) || p.physical;
  if (menEl) p.mental = parseInt(menEl.value, 10) || p.mental;
  if (trnEl) p.training = parseInt(trnEl.value, 10) || p.training;
  p.talents = p.talents || [];
  const talent = TALENTS.find(x => x.name === t);
  if (!talent) return;
  if (p.talents.includes(t)) {
    p.talents = p.talents.filter(x => x !== t);
  } else {
    if (!pilotMeetsStatReq(p, talent.statReqs)) return;
    const slotsUsed = pilotTalentSlotsUsed(p);
    const budget = RANK_BUDGETS[p.rank] || RANK_BUDGETS.ROOKIE;
    if (slotsUsed + talent.slots > budget.talentSlots) return;
    p.talents.push(t);
  }
  p.bpCost = pilotBpReadout(p);
  dbPut("pilots", p);
  pushModal("pilot-editor", { id: Number(id) });
};
handlers["save-pilot"] = ({ id }) => {
  const p = state.pilots.find(x => x.id === Number(id));
  if (p) {
    p.name = document.getElementById("p-name").value || p.name;
    p.isAi = document.getElementById("p-ai").value === "true";
    p.rank = document.getElementById("p-rank").value;
    p.bpCost = pilotBpReadout(p);
    dbPut("pilots", p);
  }
  closeModal();
};
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// FORCES — list + builder + deploy
// ════════════════════════════════════════════════════════════════════
renderForces = function () {
  if (state.forces.length === 0) {
    return emptyScreen("FORCES", "Build a force (squad) here.", "+ NEW FORCE", "new-force");
  }
  return `
    ${state.forces.map(f => {
      const totalBP = (f.robotIds || []).reduce((sum, rid) => {
        const r = state.robots.find(x => x.id === rid);
        return r ? sum + depBP(r, f) : sum;
      }, 0);
      const cap = f.bpCap || 0;
      const over = cap > 0 && totalBP > cap;
      return `
      <div class="list-card" data-act="edit-force" data-id="${f.id}">
        <div class="thumb">👥</div>
        <div style="flex:1">
          <h3>${escapeHtml(f.name || "Unnamed Force")}</h3>
          <div class="row-gap" style="margin-top:4px; flex-wrap:wrap">
            <span class="chip">${(f.robotIds || []).length} robots</span>
            <span class="chip muted">${cap > 0 ? `${totalBP} / ${cap} BP` : `${totalBP} BP`}</span>
            ${over ? `<span class="chip" style="background:var(--red,#ef4444);color:#fff">OVER CAP</span>` : ""}
          </div>
        </div>
        <button class="btn ghost" style="padding:6px 10px" data-act="delete-force" data-id="${f.id}">✕</button>
      </div>`;
    }).join("")}
    <button class="fab" data-act="new-force">＋</button>
  `;
};
handlers["new-force"] = () => {
  const id = Date.now();
  const f = { id, name: "Force " + state.forces.length, bpCap: 300, robotIds: [] };
  state.forces.push(f);
  dbPut("forces", f);
  pushModal("force-editor", { id });
};
handlers["edit-force"] = ({ id }) => pushModal("force-editor", { id: Number(id) });
handlers["delete-force"] = async ({ id }) => {
  if (!confirm("Delete this force?")) return;
  await dbDelete("forces", Number(id));
  state.forces = state.forces.filter(f => f.id !== Number(id));
  render();
};
let renderForceEditor = function (id) {
  const f = state.forces.find(x => x.id === id);
  if (!f) return "<p>?</p>";
  const assigns = f.pilotAssignments || {};
  const totalBP = (f.robotIds || []).reduce((sum, rid) => {
    const r = state.robots.find(x => x.id === rid);
    return r ? sum + depBP(r, f) : sum;
  }, 0);
  const cap = f.bpCap || 0;
  const overCap = cap > 0 && totalBP > cap;
  const robotRows = (f.robotIds || []).map(rid => {
    const r = state.robots.find(x => x.id === rid);
    if (!r) return "";
    const slots = robotCockpitSlots(r);
    const robotAssign = assigns[r.id] || {};
    const usedPilotIds = new Set(
      Object.entries(assigns).flatMap(([rk, slotMap]) =>
        Object.entries(slotMap || {}).map(([, pid]) => pid).filter(Boolean)
      )
    );
    const slotRows = slots.map((slot, i) => {
      if (slot.isAi) return `<div class="meta" style="margin:4px 0 4px 8px">${escapeHtml(slot.slotName)} · A.I. Core (auto)</div>`;
      const cur = robotAssign[i] || "";
      // Human cockpit slots show human pilots only (AI Core slots already
      // short-circuit above); allow re-selecting the current pick even if it
      // appears in the used-elsewhere set.
      const available = state.pilots.filter(p => (!usedPilotIds.has(p.id) || p.id === cur) && !p.isAi);
      const opts = `<option value="">— Unassigned —</option>` +
        available.map(p =>
          `<option value="${p.id}" ${p.id === cur ? "selected" : ""}>${escapeHtml(p.name || "Pilot")} <span class="chip">${p.bpCost || 0} BP</span></option>`
        ).join("");
      const assignedPilot = cur ? state.pilots.find(p => p.id === cur) : null;
      const slotPortrait = assignedPilot?.imageData
        ? `<div style="width:28px;height:28px;border-radius:50%;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px"><img src="${escapeHtml(assignedPilot.imageData)}" style="width:100%;height:100%;object-fit:cover" /></div>`
        : `<span style="font-size:16px;margin-right:4px">👤</span>`;
      return `
        <div style="margin:4px 0 4px 8px">
          <div class="meta" style="display:flex;align-items:center">${slotPortrait}${escapeHtml(slot.slotName)} · ${escapeHtml(slot.moduleName)}</div>
          <select data-act="force-editor-pilot-pick" data-fid="${f.id}" data-rid="${r.id}" data-slot="${i}"
            style="margin-top:4px;width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--border);padding:6px;border-radius:4px">
            ${opts}
          </select>
        </div>`;
    }).join("");
    return `
      <div class="card tight" style="margin-bottom:8px">
        <div class="row-between">
          <span>${escapeHtml(r.name)} <span class="chip muted">${depBP(r, f)} BP</span></span>
          <button class="btn ghost" data-act="force-remove-robot" data-fid="${f.id}" data-rid="${rid}">✕</button>
        </div>
        ${slotRows}
      </div>`;
  }).join("");

  const capBar = cap > 0 ? (() => {
    const pct = Math.min(100, Math.round(totalBP / cap * 100));
    const barColor = overCap ? "var(--red, #ef4444)" : "var(--cyan, #22d3ee)";
    return `
      <div style="margin:10px 0 4px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${barColor};transition:width .2s"></div>
      </div>
      <div class="row-between" style="margin-bottom:8px">
        <span class="meta">${totalBP} / ${cap} BP</span>
        ${overCap ? `<span class="chip" style="background:var(--red,#ef4444);color:#fff">OVER CAP</span>` : ""}
      </div>`;
  })() : `<div class="meta" style="margin:6px 0">${totalBP} BP (no cap)</div>`;

  return `
    <h2>FORCE // EDIT</h2>
    <div class="field"><label>NAME</label><input id="f-name" value="${escapeHtml(f.name)}" onchange="window.persistForceField(${f.id}, 'name', this.value)" /></div>
    <div class="field"><label>BP CAP</label><input id="f-cap" type="number" min="0" value="${f.bpCap}" onchange="window.persistForceField(${f.id}, 'bpCap', this.value, true)" /></div>
    <div class="label-small label-cyan" style="margin-top:8px">ROBOTS (${(f.robotIds || []).length})</div>
    ${robotRows}
    <button class="btn wide" data-act="force-add-robot" data-fid="${f.id}">＋ ADD ROBOT</button>
    ${capBar}
    <div class="actions">
      <button class="btn ghost" data-act="save-force" data-id="${f.id}">DONE</button>
      <button class="btn amber" data-act="deploy-force" data-id="${f.id}">DEPLOY</button>
    </div>
  `;
};
handlers["force-editor-pilot-pick"] = ({ fid, rid, slot }, value) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  f.pilotAssignments = f.pilotAssignments || {};
  f.pilotAssignments[Number(rid)] = f.pilotAssignments[Number(rid)] || {};
  f.pilotAssignments[Number(rid)][Number(slot)] = value ? Number(value) : null;
  dbPut("forces", f);
  render();
};
handlers["save-force"] = ({ id }) => {
  const f = state.forces.find(x => x.id === Number(id));
  if (f) {
    f.name = document.getElementById("f-name").value || f.name;
    f.bpCap = parseInt(document.getElementById("f-cap").value, 10) || 0;
    dbPut("forces", f);
  }
  closeModal();
};
handlers["force-add-robot"] = ({ fid }) => {
  pushModal("force-add-robot", { fid: Number(fid) });
};
let renderForceAddRobot = function (fid) {
  const f = state.forces.find(x => x.id === fid);
  const candidates = state.robots.filter(r => !(f.robotIds || []).includes(r.id));
  if (candidates.length === 0) return `<h2>NO ROBOTS</h2><p>Build robots in the GARAGE first.</p><div class="actions"><button class="btn ghost" data-act="modal-close">DONE</button></div>`;
  return `
    <h2>ADD A ROBOT</h2>
    ${candidates.map(r => `
      <div class="card tight" data-act="confirm-force-add-robot" data-fid="${fid}" data-rid="${r.id}">
        <strong>${escapeHtml(r.name)}</strong>
        <span class="chip muted" style="margin-left:8px">${calcRobotBP(r)} BP</span>
      </div>
    `).join("")}
    <div class="actions"><button class="btn ghost" data-act="back-to-force" data-fid="${fid}">CANCEL</button></div>
  `;
};
handlers["confirm-force-add-robot"] = ({ fid, rid }) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  f.robotIds = f.robotIds || [];
  f.robotIds.push(Number(rid));
  dbPut("forces", f);
  pushModal("force-editor", { id: Number(fid) });
};
handlers["back-to-force"] = ({ fid }) => pushModal("force-editor", { id: Number(fid) });
handlers["force-remove-robot"] = ({ fid, rid }) => {
  const f = state.forces.find(x => x.id === Number(fid));
  if (!f) return;
  f.robotIds = (f.robotIds || []).filter(x => x !== Number(rid));
  dbPut("forces", f);
  pushModal("force-editor", { id: Number(fid) });
};
handlers["deploy-force"] = ({ id }) => {
  const f = state.forces.find(x => x.id === Number(id));
  if (!f || (f.robotIds || []).length === 0) {
    showToast("Add at least one robot first.");
    return;
  }
  const cap = f.bpCap || 0;
  if (cap > 0) {
    const totalBP = (f.robotIds || []).reduce((sum, rid) => {
      const r = state.robots.find(x => x.id === rid);
      return r ? sum + depBP(r, f) : sum;
    }, 0);
    if (totalBP > cap && !confirm(`Force exceeds BP cap (${totalBP}/${cap}). Continue anyway?`)) return;
  }
  if (forceCockpitSlots(f).filter(s => !s.isAi).length === 0) {
    // No human cockpit slots — build AI-only battle directly.
    deployForceWithAssignments(f, {});
  } else {
    // Seed pilot-assign modal from force editor pre-assignments so the user can review/confirm.
    const seeded = {};
    for (const rid of (f.robotIds || [])) {
      const robot = state.robots.find(r => r.id === rid);
      if (!robot) continue;
      const robotAssign = (f.pilotAssignments || {})[rid] || {};
      const slots = robotCockpitSlots(robot);
      for (let i = 0; i < slots.length; i++) {
        const pid = robotAssign[i];
        if (pid) seeded[`${rid}:${slots[i].componentId}:${slots[i].slotIndex}`] = pid;
      }
    }
    pushModal("pilot-assign", { fid: f.id, assignments: seeded });
  }
};

function deployForceWithAssignments(f, assignments) {
  const battle = {
    id: Date.now(),
    name: f.name + " — " + new Date().toLocaleString(),
    round: 1,
    priority: "P1",
    p1ForceName: f.name,
    p1ForceId: f.id,
    p2ForceName: "Opponent",
    p2ForceId: null,
    undoStack: [],
    p1Robots: f.robotIds.map(rid => {
      const robot = state.robots.find(r => r.id === rid);
      const bs = buildBattleRobotState(robot, "P1");
      bs.cockpitPilots = robotCockpitSlots(robot).map(slot => {
        const slotKey = `${robot.id}:${slot.componentId}:${slot.slotIndex}`;
        return {
          componentId: slot.componentId,
          moduleIndex: slot.moduleIndex,
          slotIndex: slot.slotIndex,
          slotName: slot.slotName,
          pilotId: slot.isAi ? null : (assignments[slotKey] || null),
          isAi: slot.isAi,
          sysStrain: 0,
          pilotStrain: 0,
        };
      });
      return bs;
    }),
    p2Robots: [],
  };
  state.battles.push(battle);
  state.activeBattle = battle;
  state.tab = "battle";
  state.activeRobotId = null;
  dbPut("battles", battle);
  closeModal();
  render();
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// BATTLE — overview + per-robot
// ════════════════════════════════════════════════════════════════════
renderBattle = function () {
  if (!state.activeBattle) {
    return `
      <div class="empty">
        <h2>NO ACTIVE BATTLE</h2>
        <p>Pick a force in the FORCES tab and tap DEPLOY.</p>

        ` : ""}

  }
  const b = state.activeBattle;
  if (state.activeRobotId) {
    return renderPerRobotBattle(b, state.activeRobotId);
  }
  return renderBattleOverview(b);
};
handlers["resume-battle"] = ({ id }) => {
  const b = state.battles.find(x => x.id === Number(id));
  if (b) { state.activeBattle = b; state.activeRobotId = null; render(); }
};

function renderBattleOverview(b) {
  // Single-force mode: the webapp tracks YOUR side only. Opponents stay at
  // the table, off-app. No P2 chrome, no add-opponent affordance.
  return `
    <div class="card friendly row-between">
      <div>
        <div class="label-small label-cyan">YOUR FORCE</div>
        <strong>${escapeHtml(b.p1ForceName || "Your force")}</strong>
      </div>
      <div class="row-gap">
        <span class="chip">ROUND ${b.round}</span>
        ${(b.passedThisRound || {}).P1
          ? `<span class="chip muted">PASSED — opp's turn</span>`
          : `<span class="chip amber">YOUR TURN</span>`}
      </div>
    </div>
    ${b.p1Robots.map(r => robotOverviewCard(r)).join("")}

    </div>
    <div class="row-gap" style="margin-top:8px">
      <button class="btn ghost" data-act="round-prev">− ROUND</button>
      <button class="btn ghost" data-act="round-next" style="flex:1">＋ ROUND</button>
      <button class="btn danger" data-act="end-battle">END</button>
